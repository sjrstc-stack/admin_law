사원의 4분의 3 이상의 동의가 필요하다(민법 제78조).","3":"맞음. 민법상 청산절차에 관한 규정(강행규정)에 반하는 잔여재산 처분행위는 특별한 사정이 없는 한 무효이다(판례).","4":"맞음. 청산 중의 법인은 변제기에 이르지 않은 채권에 대해서도 변제할 수 있다(민법 제90조).","5":"틀림. 채권신고기간 내에 채권자에게 변제하지 못하더라도 법인은 그 기간 동안 발생한 지연손해배상의무를 면하지 않는다(판례). 변제 금지는 채권자 평등을 위한 것이므로 지연배상 면제와는 무관하다."},"expl_sub":{}},{"num":8,"question":"물건에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 주물의 소유자의 상용에 공여되고 있더라도 주물 자체의 효용과 관계가 없는 물건은 종물이 아니다.","② 원본채권이 양도되면 특별한 사정이 없는 한 이미 변제기에 도달한 이자채권도 당연히 함께 양도된다.","③ 주물을 처분할 때 종물을 제외하거나 종물만을 별도로 처분하는 특약은 무효이다.","④ 피상속인이 유언으로 자신의 유골의 매장장소를 지정한 경우, 제사주재자는 피상속인의 의사에 따를 법률적 의무를 부담한다.","⑤ ‘종물은 주물의 처분에 따른다’고 규정한 민법 제100조 제2항의 ‘처분’에는 공법상 처분은 포함되지 않는다."],"sub_items":[],"expl_core":"종물의 성립 요건: 주물 자체의 효용과 직접 관계가 있어야 한다. 이미 변제기에 도달한 이자채권의 원본 양도 시 당연 포함 여부, 종물 분리 특약 유효성, 공법상 처분 포함 여부도 중요 포인트다.","expl_choices":{"1":"맞음. 주물의 소유자의 상용에 공여되더라도 주물 자체의 효용과 관계가 없는 물건은 종물이 아니다(판례).","2":"틀림. 원본채권이 양도될 때 이미 변제기에 도달한 이자채권은 원본채권과 분리되어 독립된 채권이 되므로, 특별한 사정이 없는 한 당연히 함께 양도되지 않는다(판례).","3":"틀림. 주물을 처분할 때 종물을 제외하거나 종물만을 별도로 처분하는 특약은 유효하다. 민법 제100조②는 임의규정이다.","4":"틀림. 피상속인이 유언으로 유골의 매장장소를 지정하더라도 제사주재자는 피상속인의 의사에 따를 법률적 의무를 부담하지 않는다(판례).","5":"틀림. '종물은 주물의 처분에 따른다'는 민법 제100조②의 '처분'에는 공법상 처분도 포함된다(판례)."},"expl_sub":{}},{"num":9,"question":"임의대리권의 범위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 임의대리권의 범위는 원칙적으로 수권행위에 의하여 정해진다.","② 특별한 사정이 없는 한 통상의 임의대리권은 필요한 한도에서 수령대리권을 포함한다.","③ 매도인으로부터 매매계약체결에 대한 대리권을 수여받은 자는 특별한 사정이 없는 한그 매매계약에 따른 중도금을 수령할 권한이 있다.","④ 매도인으로부터 매매계약의 체결과 이행에 대해 포괄적인 대리권을 수여받은 자는 특별한 사정이 없는 한 약정된 매매대금의 지급기일을 연기해 줄 권한이 없다.","⑤ 부동산을 매수할 권한을 수여받은 자는 원칙적으로 그 부동산을 처분할 권한이 없다."],"sub_items":[],"expl_core":"포괄적 대리권이 있으면 이행에 관한 세부 사항(지급기일 연기 등)도 권한에 포함된다(판례). '특별한 사정이 없는 한 권한이 없다'는 ④가 오류. 매매계약 체결 대리권과 중도금 수령권의 관계도 함께 정리.","expl_choices":{"1":"맞음. 임의대리권의 범위는 원칙적으로 수권행위에 의하여 정해진다.","2":"맞음. 통상의 임의대리권은 필요한 한도에서 수령대리권을 포함한다(판례).","3":"맞음. 매매계약 체결에 대한 대리권을 수여받은 자는 특별한 사정이 없는 한 중도금을 수령할 권한도 있다(판례).","4":"틀림. 매매계약의 체결과 이행에 대해 포괄적인 대리권을 수여받은 자는 매매대금 지급기일을 연기해 줄 권한도 포함된다(판례). '권한이 없다'는 서술이 오류다.","5":"맞음. 부동산을 매수할 권한을 수여받은 자는 원칙적으로 그 부동산을 처분할 권한은 없다."},"expl_sub":{}},{"num":10,"question":"의사표시에 관한 설명으로 옳지 않은 것은?","answer":2,"answer_str":"2","choices":["① 청약의 의사표시는 그 표시가 상대방에게 도달한 때에 그 효력이 생긴다.","② 의사표시자가 청약의 의사표시를 발송한 후 사망하였다면, 그 의사표시는 처음부터 무효인 것으로 본다.","③ 행위능력을 갖춘 미성년자에게는 특별한 사정이 없는 한 의사표시의 수령능력이 인정된다.","④ 표의자가 과실없이 상대방을 알지 못하는 경우, 민사소송법 공시송달의 규정에 의하여 의사표시를 송달할 수 있다.","⑤ 의사표시의 상대방이 의사표시를 받은 때에 제한능력자인 경우, 특별한 사정이 없는 한의사표시자는 그 의사표시로써 대항할 수 없다."],"sub_items":[],"expl_core":"의사표시 발신 후 표의자의 사망·제한능력은 의사표시의 효력에 영향을 미치지 않는다(민법 제111조②). '처음부터 무효'라는 ②가 오류. 도달주의, 수령능력, 공시송달, 제한능력자 상대방도 함께 정리.","expl_choices":{"1":"맞음. 청약의 의사표시는 그 표시가 상대방에게 도달한 때에 그 효력이 생긴다(도달주의, 민법 제111조①).","2":"틀림. 의사표시자가 청약을 발송한 후 사망하더라도 그 의사표시의 효력에는 영향이 없다(민법 제111조②). '처음부터 무효'라는 서술이 오류다.","3":"맞음. 행위능력을 갖춘 미성년자(예: 영업 허락을 받은 경우 등)에게는 특별한 사정이 없는 한 의사표시의 수령능력이 인정된다(판례).","4":"맞음. 표의자가 과실 없이 상대방을 알지 못하는 경우, 민사소송법 공시송달의 규정에 의하여 의사표시를 송달할 수 있다(민법 제113조).","5":"맞음. 의사표시를 받은 때에 상대방이 제한능력자인 경우, 특별한 사정이 없는 한 의사표시자는 그 의사표시로써 대항할 수 없다(민법 제112조)."},"expl_sub":{}},{"num":11,"question":"대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 대리인은 행위능력자임을 요하지 아니한다.","② 사실상의 용태에 의하여 대리권의 수여가 추단될 수 있다.","③ 임의대리의 원인된 법률관계가 종료하기 전이라도 본인은 수권행위를 철회할 수 있다.","④ 수권행위에서 권한을 정하지 아니한 대리인은 보존행위만을 할 수 있다.","⑤ 복대리인은 본인의 대리인이다."],"sub_items":[],"expl_core":"권한을 정하지 아니한 대리인의 권한 범위(민법 제118조): 보존행위 + 이용행위 + 개량행위. '보존행위만'이라는 ④가 오류. 대리인의 행위능력 불요, 수권행위 철회 가능, 복대리인=본인의 대리인도 함께 정리.","expl_choices":{"1":"맞음. 대리인은 행위능력자임을 요하지 않는다(민법 제117조).","2":"맞음. 사실상의 용태에 의하여 대리권의 수여가 추단될 수 있다(판례).","3":"맞음. 임의대리의 원인된 법률관계가 종료하기 전이라도 본인은 언제든지 수권행위를 철회할 수 있다(판례).","4":"틀림. 권한을 정하지 아니한 대리인은 보존행위, 이용행위, 개량행위를 할 수 있다(민법 제118조). '보존행위만'이라는 서술이 오류다.","5":"맞음. 복대리인은 대리인의 대리인이 아니라 본인의 대리인이다(민법 제123조②)."},"expl_sub":{}},{"num":12,"question":"무권대리행위에 대한 본인의 추인에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 추인은 무권대리인의 동의가 있어야 유효하다.","② 추인은 무권대리인이 아닌 무권대리행위의 상대방에게 하여야 한다.","③ 무권대리행위가 범죄가 되는 경우, 본인이 그 사실을 알고 장기간 형사고소를 하지 않았 다면 묵시적 추인이 인정된다.","④ 추인은 무권대리행위가 있음을 알고 하여야 한다.","⑤ 무권대리행위의 일부에 대한 추인은 상대방의 동의가 없더라도 유효하다."],"sub_items":[],"expl_core":"무권대리 추인은 무권대리행위가 있었음을 알고 하여야 한다(④ 맞음). 추인은 무권대리인 동의 불요, 상대방 또는 무권대리인 어느 쪽에도 가능, 단순 고소 미제기가 묵시 추인 아님, 일부 추인은 상대방 동의 필요 등 정리.","expl_choices":{"1":"틀림. 추인은 무권대리인의 동의 없이도 유효하다.","2":"틀림. 추인은 무권대리인에게도 할 수 있다. 다만 무권대리인에게 한 추인은 상대방이 알기 전에는 상대방에게 대항하지 못한다(판례).","3":"틀림. 무권대리행위가 범죄가 되는 경우, 단순히 장기간 형사고소를 하지 않은 것만으로 묵시적 추인이 있었다고 볼 수 없다(판례).","4":"맞음. 추인은 무권대리행위가 있음을 알고 하여야 한다. 무권대리 사실을 모르고 한 추인은 효력이 없다.","5":"틀림. 무권대리행위의 일부에 대한 추인은 상대방의 동의가 없으면 효력이 없다(민법 제133조 유추). 전부 추인이 원칙이다."},"expl_sub":{}},{"num":13,"question":"불공정한 법률행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 불공정한 법률행위는 원칙적으로 추인에 의해서 유효로 될 수 없다.","② 궁박은 경제적 원인에 기인하는 것을 말하며, 심리적 원인에 기인할 수 없다.","③ 특별한 사정이 없는 한 경솔ㆍ궁박은 본인을 기준으로 판단하고, 무경험은 대리인을 기준으로 판단한다.","④ 법률행위가 현저하게 공정성을 잃은 경우, 그 법률행위 당사자의 궁박ㆍ경솔ㆍ무경험은 추정된다.","⑤ 불공정한 법률행위에는 무효행위의 전환에 관한 민법 제138조는 적용되지 않는다."],"sub_items":[],"expl_core":"불공정 법률행위의 5가지 쟁점: ①추인 불가(원칙), ②궁박=심리적 원인도 포함, ③경솔·무경험은 대리의 경우 대리인 기준, ④궁박 등은 추정 안 됨, ⑤무효행위 전환 가능. ①만 맞는 설명이다.","expl_choices":{"1":"맞음. 불공정한 법률행위는 원칙적으로 추인에 의해서 유효로 될 수 없다(판례).","2":"틀림. 궁박은 경제적 원인에 기인하는 경우뿐 아니라 심리적 원인에 기인할 수도 있다(판례).","3":"틀림. 대리에 의한 법률행위에서 경솔·무경험은 대리인을 기준으로, 궁박은 본인 또는 대리인 중 일방에 있으면 된다. '경솔·궁박은 본인, 무경험은 대리인'이라는 서술이 오류다.","4":"틀림. 법률행위가 현저하게 공정성을 잃었다는 사정만으로 궁박·경솔·무경험이 추정되지 않는다. 이들은 별도로 입증해야 한다(판례).","5":"틀림. 불공정한 법률행위로 무효인 경우에도 무효행위의 전환(민법 제138조)이 적용될 여지가 있다(판례). '적용되지 않는다'는 서술이 오류다."},"expl_sub":{}},{"num":14,"question":"사기에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 광고에 있어 다소의 과장은 일반 상거래의 관행과 신의칙에 비추어 시인될 수 있는 한기망성이 결여된다.","② 부작위에 의한 기망행위에서 고지의무는 조리상 일반원칙에 의해서는 인정될 수 없다.","③ 사기에 의한 의사표시가 인정되기 위해서는 의사표시자에게 재산상의 손실을 주려는 사기자의 고의는 필요하지 않다.","④ 기망행위로 인하여 법률행위의 내용으로 표시되지 않은 동기에 관하여 착오를 일으킨 경우에도 그 법률행위를 사기에 의한 의사표시를 이유로 취소할 수 있다.","⑤ 사기에 의한 의사표시의 취소는 선의의 제3자에게 대항하지 못한다."],"sub_items":[],"expl_core":"부작위에 의한 기망행위의 고지의무는 신의칙상 원칙뿐 아니라 조리상 일반원칙에 의해서도 인정될 수 있다(판례). '조리상 일반원칙에 의해서는 인정될 수 없다'는 ②가 오류다. 광고 과장의 기망성 결여, 재산 손실 목적 불요도 함께 정리.","expl_choices":{"1":"맞음. 광고에 있어 다소의 과장은 일반 상거래 관행과 신의칙에 비추어 시인될 수 있는 한 기망성이 결여된다(판례).","2":"틀림. 부작위에 의한 기망행위에서 고지의무는 신의칙상 원칙뿐 아니라 조리상 일반원칙에 의해서도 인정될 수 있다(판례). '조리상 일반원칙에 의해서는 인정될 수 없다'는 서술이 오류다.","3":"맞음. 사기의 고의는 기망 고의와 착오로 인한 의사표시 고의로 충분하다. 재산상 손실을 주려는 사기자의 고의는 불필요하다(판례).","4":"맞음. 기망행위로 법률행위의 내용으로 표시되지 않은 동기에 착오를 일으킨 경우에도 사기를 이유로 취소할 수 있다(판례).","5":"맞음. 사기에 의한 의사표시의 취소는 선의의 제3자에게 대항하지 못한다(민법 제110조③)."},"expl_sub":{}},{"num":15,"question":"통정허위표시를 기초로 새로운 법률상의 이해관계를 맺은 제3자를 모두 고른 것은?","answer":3,"answer_str":"3","choices":["① ㄱ","② ㄷ","③ ㄱ, ㄴ","④ ㄱ, ㄷ","⑤ ㄴ, ㄷ"],"sub_items":["ㄱ. 가장매매의 매수인으로부터 그와의 매매계약에 의한 소유권이전청구권 보전을 위한 가등기를 마친 자ㄴ. 허위의 선급금 반환채무 부담행위에 기하여 그 채무를 보증하고 이행까지 하여 구상권을 취득한 자ㄷ. 가장소비대차에 있어 대주의 계약상의 지위를 이전받은 자"],"expl_core":"통정허위표시의 제3자 해당 여부: 가등기권자(ㄱ)와 보증인(ㄴ)은 제3자에 해당, 계약상 지위 이전받은 자(ㄷ)는 제3자 아님. 새로운 법률상 이해관계를 맺었는지를 기준으로 판단.","expl_choices":{"1":"틀림. ①선지 ㄱ만. ㄴ도 제3자에 해당하므로 오답이다.","2":"틀림. ②선지 ㄷ만. ㄷ은 제3자가 아니어서 오답이다.","3":"맞음. ③선지 ㄱ, ㄴ. 둘 다 제3자에 해당한다. 정답.","4":"틀림. ④선지 ㄱ, ㄷ. ㄷ이 제3자가 아니어서 오답이다.","5":"틀림. ⑤선지 ㄴ, ㄷ. ㄷ이 제3자가 아니어서 오답이다."},"expl_sub":{"ㄱ":"맞음. 가장매매의 매수인으로부터 소유권이전청구권 보전을 위한 가등기를 마친 자는 가장행위를 기초로 새로운 법률상 이해관계를 맺은 제3자에 해당한다(판례).","ㄴ":"맞음. 허위의 선급금 반환채무를 보증하고 이행하여 구상권을 취득한 자는 새로운 법률상 이해관계를 맺은 제3자에 해당한다(판례).","ㄷ":"틀림. 가장소비대차에서 대주의 계약상 지위를 이전받은 자는 기존 당사자의 지위를 승계한 것으로 새로운 이해관계를 맺은 제3자에 해당하지 않는다(판례)."}},{"num":16,"question":"착오로 인한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 법률행위 내용의 중요부분에 착오가 있는 경우, 그 착오가 표의자의 중과실로 인한 것이 아니라면 특별한 사정이 없는 한 이를 이유로 의사표시를 취소할 수 있다.","② 표의자는 자신에게 중과실이 없음에 대한 주장ㆍ증명책임을 부담한다.","③ 착오로 인한 의사표시에 관한 민법 제109조 제1항의 적용은 당사자의 합의로 배제할 수있다.","④ 착오로 인하여 표의자가 경제적 불이익을 입지 않았다면 이는 법률행위 내용의 중요 부분의 착오로 볼 수 없다.","⑤ 표의자가 장래에 있을 어떤 사항의 발생이 미필적임을 알아 그 발생을 예기한 데 지나지 않는 경우, 그 기대가 이루어지지 않은 것을 착오로 볼 수는 없다."],"sub_items":[],"expl_core":"착오에서 중대한 과실의 증명책임: 상대방이 부담(판례). '표의자가 중과실 없음을 증명해야 한다'는 ②가 오류. 제109조①은 임의규정, 경제적 불이익 없으면 중요부분 착오 아님도 함께 정리.","expl_choices":{"1":"맞음. 법률행위 내용의 중요부분에 착오가 있고 그 착오가 표의자의 중과실로 인한 것이 아니라면 취소할 수 있다(민법 제109조①).","2":"틀림. 표의자의 중대한 과실 유무에 관한 증명책임은 표의자가 아니라 그 상대방(취소를 저지하려는 자)이 부담한다(판례). '표의자가 중과실 없음을 증명해야 한다'는 서술이 오류다.","3":"맞음. 착오로 인한 의사표시에 관한 민법 제109조①은 임의규정으로 당사자 합의로 배제할 수 있다(판례).","4":"맞음. 착오로 인하여 표의자가 경제적 불이익을 입지 않았다면 법률행위 내용의 중요부분의 착오라고 볼 수 없다(판례).","5":"맞음. 장래의 어떤 사항의 발생이 미필적임을 알아 그 발생을 예기한 데 지나지 않는 경우, 그 기대가 이루어지지 않았더라도 착오라고 할 수 없다(판례)."},"expl_sub":{}},{"num":17,"question":"반사회질서의 법률행위에 해당하는 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① ㄱ","② ㄷ","③ ㄱ, ㄴ","④ ㄴ, ㄷ","⑤ ㄱ, ㄴ, ㄷ"],"sub_items":["ㄱ. 수사기관에서 참고인으로 자신이 잘 알지 못하는 내용에 대한 허위 진술의 대가로 작성된 각서에 기한 급부의 약정 ㄴ. 강제집행을 면하기 위해 부동산에 허위의 근저당권설정등기를 경료하는 행위 ㄷ. 전통사찰의 주지직을 거액의 금품을 대가로 양도ㆍ양수하기로 하는 약정이 있음을 알고도 이를 묵인한 상태에서 한 종교법인의 주지 임명행위"],"expl_core":"반사회질서 법률행위 해당 여부: ㄱ(허위진술 대가 급부 약정)=해당, ㄴ(강제집행 면탈 허위 근저당)=비해당, ㄷ(주지직 매매 묵인 임명행위)=비해당. ㄱ만 반사회질서이므로 정답 ①.","expl_choices":{"1":"맞음. ①선지 ㄱ만. ㄱ만이 반사회질서 법률행위에 해당한다.","2":"틀림. ②선지 ㄷ만. ㄷ은 반사회질서에 해당하지 않아 오답이다.","3":"틀림. ③선지 ㄱ, ㄴ. ㄴ이 반사회질서에 해당하지 않아 오답이다.","4":"틀림. ④선지 ㄴ, ㄷ. 둘 다 반사회질서에 해당하지 않아 오답이다.","5":"틀림. ⑤선지 ㄱ, ㄴ, ㄷ. ㄴ, ㄷ이 반사회질서에 해당하지 않아 오답이다."},"expl_sub":{"ㄱ":"맞음. 수사기관에서 참고인으로 자신이 잘 알지 못하는 내용에 대해 허위 진술하는 대가로 급부를 약정하는 것은 반사회질서 법률행위다(판례).","ㄴ":"틀림(반사회질서 해당 아님). 강제집행을 면하기 위해 허위의 근저당권설정등기를 마치는 행위 자체는 반사회질서 법률행위가 아니다(판례). 허위표시로 무효의 문제다.","ㄷ":"틀림(반사회질서 해당 아님). 주지직 금품 양수도 약정을 알고 묵인한 상태에서 한 임명행위는 그 자체로 반사회질서 법률행위에 해당하지 않는다(판례)."}},{"num":18,"question":"법률행위의 부관에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 상계의 의사표시에는 원칙적으로 조건을 붙일 수 있다.","② 조건부 법률행위에서 조건의 내용자체가 불법적이어서 무효인 경우, 원칙적으로 그 조건 만이 무효이고 나머지 법률행위는 유효이다.","③ 해제조건부 법률행위의 조건이 불능조건인 경우, 그 법률행위는 무효이다.","④ 시기(始期) 있는 법률행위는 기한이 도래한 때로부터 그 효력을 잃는다.","⑤ 기한은 특별한 사정이 없는 한 채무자의 이익을 위한 것으로 추정한다."],"sub_items":[],"expl_core":"기한의 이익 추정(채무자)이 맞는 내용(⑤). 나머지 함정: ①상계는 조건 부가 불가, ②불법조건=전부 무효(조건만 무효 아님), ③불능 해제조건=조건 없는 행위로 유효(무효 아님), ④시기 도래=효력 발생(종기 도래=효력 소멸과 혼동 주의).","expl_choices":{"1":"틀림. 상계의 의사표시는 단독행위로서 상대방의 이익에 중대한 영향을 주므로 원칙적으로 조건을 붙일 수 없다(판례).","2":"틀림. 조건의 내용 자체가 불법적이어서 무효인 경우(불법조건), 그 조건만이 아니라 법률행위 전부가 무효가 된다(민법 제151조①).","3":"틀림. 해제조건부 법률행위의 조건이 불능조건인 경우, 그 법률행위는 조건 없는 법률행위로 유효하다(민법 제151조②).","4":"틀림. 시기(始期) 있는 법률행위는 기한이 도래한 때로부터 그 효력이 생긴다. 효력을 잃는 것은 종기(終期) 도래 시다(민법 제152조).","5":"맞음. 기한은 특별한 사정이 없는 한 채무자의 이익을 위한 것으로 추정한다(민법 제153조①)."},"expl_sub":{}},{"num":19,"question":"법률행위의 무효에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 진의 아닌 의사표시는 원칙적으로 무효이다.","② 법률행위가 무효와 취소사유를 모두 포함하고 있는 경우, 당사자는 취소권이 있더라도 무효에 따른 효과를 제거하기 위해 이미 무효인 법률행위를 취소할 수 없다.","③ 법률행위의 무효는 제한능력자, 착오나 사기․강박에 의하여 의사표시를 한 자, 그의 대리인 또는 승계인 이외에는 주장할 수 없다.","④ 타인의 권리를 목적으로 하는 매매계약은 특별한 사정이 없는 한 유효하다.","⑤ 무효인 법률행위는 추인할 수 있는 날로부터 3년, 법률행위를 한 날로부터 10년 이후에는 추인할 수 없다."],"sub_items":[],"expl_core":"타인의 권리를 목적으로 하는 매매계약은 특별한 사정이 없는 한 유효하다(민법 제569조). 매도인이 그 권리를 취득하여 이전할 의무를 지는 것이다. 비진의 표시의 원칙적 유효, 무효·취소 경합 가능, 무효 주장 제한 없음, 무효 추인의 기간 제한 없음도 정리.","expl_choices":{"1":"틀림. 진의 아닌 의사표시는 원칙적으로 유효하다(민법 제107조①). 상대방이 알거나 알 수 있었을 때에만 무효가 된다.","2":"틀림. 법률행위가 무효와 취소사유를 모두 포함하는 경우, 취소권자는 취소를 선택적으로 주장할 수 있다(무효와 취소는 경합 가능, 판례).","3":"틀림. 법률행위의 무효는 누구나 주장할 수 있다. 제한능력자, 착오·사기·강박 표의자, 대리인, 승계인에 한정되지 않는다.","4":"맞음. 타인의 권리를 목적으로 하는 매매계약(타인 권리 매매)은 특별한 사정이 없는 한 유효하다(민법 제569조).","5":"틀림. 무효인 법률행위의 추인에는 민법 제146조의 기간 제한(3년, 10년)이 적용되지 않는다. 그 기간 제한은 취소권에 관한 것이다."},"expl_sub":{}},{"num":20,"question":"취소할 수 있는 법률행위의 법정추인에 해당하지 않는 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 취소할 수 있는 행위로부터 생긴 채무의 이행을 위해 취소권자가 상대방에게 일부 이행을한 경우","② 취소할 수 있는 행위로부터 생긴 채무의 이행을 위해 취소권자가 상대방에게 이행을 청구하는 경우","③ 취소할 수 있는 행위로부터 생긴 채무의 이행을 위해 취소권자가 상대방에게 저당권을 설정해 준 경우","④ 취소권자가 취소할 수 있는 행위에 의하여 성립된 채권을 소멸시키고 그 대신 다른 채권을 성립시키는 경개를 하는 경우","⑤ 취소할 수 있는 행위로부터 취득한 권리의 전부를 취소권자의 상대방이 제3자에게 양도 하는 경우"],"sub_items":[],"expl_core":"법정추인(민법 제145조)은 취소권자가 하는 행위를 기준으로 판단. 상대방이 제3자에게 권리를 양도하는 행위는 취소권자의 행위가 아니므로 법정추인 사유가 아니다(⑤). 이행, 이행청구, 담보제공, 경개, 강제집행이 법정추인 사유.","expl_choices":{"1":"틀림(=법정추인 해당). 취소권자가 상대방에게 일부 이행을 한 경우 법정추인 사유에 해당한다(민법 제145조①).","2":"틀림(=법정추인 해당). 취소권자가 상대방에게 이행을 청구하는 경우 법정추인 사유에 해당한다(민법 제145조②).","3":"틀림(=법정추인 해당). 취소권자가 상대방에게 저당권을 설정해 준 경우(담보 제공)는 법정추인 사유에 해당한다(민법 제145조④).","4":"틀림(=법정추인 해당). 취소권자가 경개를 하는 경우 법정추인 사유에 해당한다(민법 제145조③).","5":"맞음(=법정추인 비해당). 취소권자의 상대방이 취득한 권리를 제3자에게 양도하는 행위는 취소권자의 행위가 아니므로 법정추인 사유에 해당하지 않는다."},"expl_sub":{}},{"num":21,"question":"민법상 기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 연령 계산에는 출생일을 산입한다.","② 기간의 초일(初日)이 공휴일에 해당한 때에는 기간은 그 익일부터 기산한다.","③ 기간을 시, 분, 초로 정한 때에는 즉시로부터 기산한다.","④ 기간을 주, 월 또는 연으로 정한 때에는 역(曆)에 의하여 계산한다.","⑤ 기간을 일, 주, 월로 정한 때에는 그 기간이 오전 영(零)시로부터 시작하는 때가 아니면 기간의 초일은 산입하지 않는다."],"sub_items":[],"expl_core":"초일 공휴일과 말일 공휴일의 차이가 핵심. 말일이 공휴일이면 익일 만료(민법 제161조), 초일이 공휴일이어도 익일부터 기산하는 규정은 없다. ②의 '초일이 공휴일이면 익일부터 기산'이 오류. 초일 불산입 원칙과 공휴일 규정은 별개다.","expl_choices":{"1":"맞음. 연령 계산에는 출생일을 산입한다(민법 제158조).","2":"틀림. 기간의 초일이 공휴일에 해당하더라도 초일 불산입 원칙에 따라 다음 날부터 기산하는 것이 아니다. 초일 불산입 원칙(제157조)과 말일 공휴일 규정(제161조)은 별개다. 공휴일 관련 규정은 말일에만 적용된다.","3":"맞음. 기간을 시, 분, 초로 정한 때에는 즉시로부터 기산한다(민법 제156조).","4":"맞음. 기간을 주, 월 또는 연으로 정한 때에는 역(曆)에 의하여 계산한다(민법 제160조①).","5":"맞음. 기간을 일, 주, 월로 정한 때에는 기간이 오전 영시로부터 시작하는 때가 아니면 초일은 산입하지 않는다(민법 제157조)."},"expl_sub":{}},{"num":22,"question":"소멸시효와 제척기간에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 소멸시효가 완성되면 그 기간이 경과한 때부터 장래에 향하여 권리가 소멸하지만, 제척 기간이 완성되면 그 기산일에 소급하여 권리가 소멸한다.","② 소멸시효는 그 성질상 기간의 중단이 있을 수 없지만, 제척기간은 권리자의 청구가 있으면 기간이 중단된다.","③ 소멸시효가 완성된 이후 그 이익을 포기하는 것은 원칙적으로 인정되지만, 제척기간은그 포기가 인정되지 않는다.","④ 소멸시효 완성에 의한 권리소멸은 법원의 직권조사 사항이지만, 제척기간에 의한 권리의 소멸은 원용권자가 이를 주장하여야 한다.","⑤ 매도인의 하자담보책임에 기한 매수인의 손해배상청구권과 같이 청구권에 관하여 제척기 간을 정하고 있는 경우에는 제척기간이 적용되므로 소멸시효는 당연히 적용될 수 없다."],"sub_items":[],"expl_core":"소멸시효 vs 제척기간 핵심 비교: 소멸시효=기산일 소급 효력·중단 가능·완성 후 이익 포기 가능·당사자 원용 필요. 제척기간=장래 소멸·중단 없음·포기 불가·법원 직권 조사. ③이 이를 정확히 서술한 맞는 설명이다.","expl_choices":{"1":"틀림. 소멸시효가 완성되면 기산일에 소급하여 효력이 생기고(민법 제167조), 제척기간이 완성되면 장래에 향하여 권리가 소멸한다. ①은 이를 반대로 서술하였다.","2":"틀림. 소멸시효는 중단이 가능하고, 제척기간은 중단이 인정되지 않는다. ②는 이를 반대로 서술하였다.","3":"맞음. 소멸시효의 이익은 완성 후에 포기할 수 있으나(민법 제184조 반대 해석), 제척기간은 그 성질상 포기가 인정되지 않는다.","4":"틀림. 소멸시효 완성에 의한 권리소멸은 당사자의 원용을 요하고, 제척기간에 의한 권리의 소멸은 법원이 직권으로 조사한다. ④는 이를 반대로 서술하였다.","5":"틀림. 하자담보책임에 기한 손해배상청구권에 제척기간이 정해진 경우에도 소멸시효가 함께 적용될 수 있다(판례). 제척기간이 있다고 소멸시효가 당연 배제되지 않는다."},"expl_sub":{}},{"num":23,"question":"민법상 1년의 소멸시효 기간의 적용을 받는 채권이 아닌 것은?","answer":3,"answer_str":"3","choices":["① 음식점의 음식대금채권","② 여관의 숙박대금채권","③ 판결에 의하여 확정된 채권","④ 의복 등 동산의 사용료 채권","⑤ 연예인의 임금채권"],"sub_items":[],"expl_core":"확정판결에 의한 채권은 단기시효 해당이라도 10년으로 연장된다(민법 제165조①). 1년 단기시효 채권(음식·숙박·동산사용료·연예인 임금 등)이라도 판결로 확정되면 10년이 된다. 이것이 ③이다.","expl_choices":{"1":"틀림(=1년 시효 해당). 음식점의 음식대금채권은 민법 제164조①에 해당하여 1년의 소멸시효가 적용된다.","2":"틀림(=1년 시효 해당). 여관의 숙박대금채권은 민법 제164조①에 해당하여 1년의 소멸시효가 적용된다.","3":"맞음(=1년 시효 비해당). 판결에 의하여 확정된 채권은 원래 단기소멸시효에 해당하더라도 그 시효기간이 10년으로 된다(민법 제165조①).","4":"틀림(=1년 시효 해당). 의복 등 동산의 사용료 채권은 민법 제164조②에 해당하여 1년의 소멸시효가 적용된다.","5":"틀림(=1년 시효 해당). 연예인의 임금채권은 민법 제164조③에 해당하여 1년의 소멸시효가 적용된다."},"expl_sub":{}},{"num":24,"question":"甲이 자신 소유의 X 토지를 乙에게 매도하고, 乙은 甲에게 매매대금을 모두 지급하 였다. 甲과 乙이 행사하는 다음 등기청구권 중 소멸시효가 진행되는 경우를 모두 고른 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① ㄱ","② ㄴ","③ ㄱ, ㄷ","④ ㄴ, ㄷ","⑤ ㄱ, ㄴ, ㄷ"],"sub_items":["ㄱ. 乙이 甲을 상대로 위 매매계약에 기하여 X 토지에 대해 소유권이전등기청구 권을 행사하는 경우 ㄴ. 乙이 위 매매계약에 기하여 甲으로부터 X 토지를 인도받아 사용ㆍ수익하고 있으나, 아직 甲의 명의로 소유권이전등기가 남아 있어 甲을 상대로 X 토지에 대해 소유권이전등기청구권을 행사하는 경우 ㄷ. 乙이 위 매매계약에 기하여 甲으로부터 X 토지에 대해 소유권이전등기를 경료받았으나, 이후 甲과 乙의 매매계약이 적법하게 취소되어 甲이 乙을 상대로 소유권에 기한 말소등기청구권을 행사하는 경우"],"expl_core":"소멸시효 진행 여부: ㄱ(인도받지 않은 상태의 등기청구권)=진행, ㄴ(인도받아 점유 중인 등기청구권)=불진행, ㄷ(소유권에 기한 말소등기청구권)=소멸시효 안 걸림. ㄱ만 진행이므로 정답 ①.","expl_choices":{"1":"맞음. ①선지 ㄱ만. 소멸시효가 진행하는 경우는 ㄱ뿐이다. 정답.","2":"틀림. ②선지 ㄴ만. ㄴ은 점유 중이므로 시효 불진행이어서 오답이다.","3":"틀림. ③선지 ㄱ, ㄷ. ㄷ은 소멸시효가 걸리지 않아 오답이다.","4":"틀림. ④선지 ㄴ, ㄷ. 둘 다 시효 불진행 또는 비대상이어서 오답이다.","5":"틀림. ⑤선지 ㄱ, ㄴ, ㄷ. ㄴ, ㄷ이 포함되어 오답이다."},"expl_sub":{"ㄱ":"맞음(시효 진행). 乙이 X토지를 인도받지 않은 상태에서 행사하는 소유권이전등기청구권은 채권으로서 소멸시효가 진행한다(판례).","ㄴ":"틀림(시효 불진행). 乙이 X토지를 인도받아 계속 점유하면서 사용·수익하고 있는 경우, 소유권이전등기청구권의 소멸시효가 진행하지 않는다(판례).","ㄷ":"틀림(시효 비대상). 甲이 행사하는 소유권에 기한 말소등기청구권(물권적 청구권)은 소멸시효에 걸리지 않는다(판례)."}},{"num":25,"question":"甲이 자신 소유의 X 토지를 乙에게 매도하면서 乙의 매매대금의 지급과 동시에 乙 앞으로 소유권이전등기를 마쳐주기로 약정하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 甲과 乙이 소유권이전등기와 매매대금의 지급을 이행하였으나 위 매매계약이 통정허위 표시로 무효인 경우, 특별한 사정이 없는 한 甲이 지급받은 매매대금과 乙명의로 마쳐진 소유권등기를 각각 부당이득으로 반환 청구할 수 있다.","② 甲과 乙의 매매계약이 甲이 미성년자임을 이유로 적법하게 취소된 경우, 甲은 특별한 사정이 없는 한 이익이 현존하는 한도에서 상환할 책임이 있다.","③ 甲이 乙의 매매대금지급 불이행을 이유로 매매계약을 적법하게 해제한 경우, 乙은 계약 해제에 따른 손해배상책임을 면하기 위해 착오를 이유로 그 매매계약을 취소할 수 없다.","④ 甲과 乙이 각각 소유권이전등기와 매매대금의 지급을 이행한 이후, 乙이 甲의 사기를 이유로위 매매계약을 적법하게 취소한 경우, 甲의 매매대금반환과 乙의 소유권이전등기말소는 특별한 사정이 없는 한 동시에 이행되어야 한다.","⑤ 甲과 乙의 매매계약이 관련 법령에 따라 관할청의 허가를 받아야 함에도 아직 토지거래 허가를 받지 않아 유동적 무효 상태인 경우, 乙은 甲에게 계약의 무효를 주장하여 이미 지급한 계약금의 반환을 부당이득으로 청구할 수 없다. 2021년도 제9회 행정사 1차 1교시 A형 ( 22 - 1 )"],"sub_items":[],"expl_core":"해제 후 손해배상책임을 면하기 위해 착오를 이유로 취소할 수 있는지가 핵심. 판례: 계약이 해제된 후에도 해제의 상대방은 착오를 이유로 취소할 수 있다. '취소할 수 없다'는 ③이 오류. 유동적 무효 상태에서의 부당이득 반환 청구 불가도 함께 정리.","expl_choices":{"1":"맞음. 통정허위표시로 무효인 매매계약에서 甲이 지급받은 매매대금과 乙 명의로 마쳐진 소유권등기를 각각 부당이득으로 반환 청구할 수 있다(판례).","2":"맞음. 미성년자 甲의 매매계약이 미성년을 이유로 취소된 경우, 甲은 특별한 사정이 없는 한 현존이익의 한도에서 상환할 책임이 있다(민법 제141조 단서).","3":"틀림. 甲이 乙의 채무불이행을 이유로 계약을 해제한 후에도, 乙은 손해배상책임을 면하기 위해 착오를 이유로 그 매매계약을 취소할 수 있다(판례). '취소할 수 없다'는 서술이 오류다.","4":"맞음. 乙이 甲의 사기를 이유로 매매계약을 취소한 경우, 甲의 매매대금 반환과 乙의 소유권이전등기 말소는 동시이행 관계에 있다(판례).","5":"맞음. 유동적 무효 상태인 경우, 乙은 계약의 무효를 주장하여 이미 지급한 계약금의 반환을 부당이득으로 청구할 수 없다(판례)."},"expl_sub":{}}],"2021":[{"num":1,"question":"다음 중 형성권이 아닌 것은?","answer":1,"answer_str":"1","choices":["① 물권적 청구권","② 취소권","③ 추인권","④ 동의권","⑤ 계약해지권"],"sub_items":[],"expl_core":"형성권이란 일방적 의사표시만으로 법률관계를 발생·변경·소멸시키는 권리다. 취소권·추인권·동의권·계약해지권은 모두 형성권에 해당한다. 물권적 청구권은 상대방에게 특정 행위를 요구하는 청구권이지, 일방적으로 법률관계를 변동시키는 형성권이 아니다.","expl_choices":{"1":"맞음(=형성권 아님). 물권적 청구권은 상대방에게 반환·방해제거·방해예방을 청구하는 권리로, 상대방의 이행이 있어야 효과가 실현되는 청구권이다. 형성권이 아니다.","2":"틀림(=형성권 해당). 취소권은 취소의 의사표시만으로 법률행위의 효력을 소멸시키는 형성권이다.","3":"틀림(=형성권 해당). 추인권은 취소할 수 있는 법률행위를 확정적으로 유효하게 만드는 형성권이다.","4":"틀림(=형성권 해당). 동의권은 일방적 의사표시로 법률행위에 효력을 부여하는 형성권이다.","5":"틀림(=형성권 해당). 계약해지권은 일방적 의사표시로 계속적 계약관계를 장래에 향하여 소멸시키는 형성권이다."},"expl_sub":{}},{"num":2,"question":"권리남용에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 확정판결에 따른 강제집행도 특별한 사정이 있으면 권리남용이 될 수 있다.","② 주로 자기의 채무 이행만을 회피할 목적으로 동시이행항변권을 행사하는 경우에 그 항변권의 행사는 권리남용이 될 수 있다.","③ 권리남용이 인정되기 위해서는 권리행사로 인한 권리자의 이익과 상대방의 불이익 사이에 현저한 불균형이 있어야 한다.","④ 권리남용이 불법행위가 되어 발생한 손해배상청구권은 1년의 단기소멸시효가 적용된다.","⑤ 토지소유자의 건물 철거 청구가 권리남용으로 인정된 경우라도 토지소유자는 그 건물의 소유자에 대해 그 토지의 사용대가를 부당이득으로 반환청구할 수 있다."],"sub_items":[],"expl_core":"권리남용으로 발생한 불법행위 손해배상청구권의 소멸시효기간이 쟁점. 불법행위 손해배상청구권의 단기시효는 3년(민법 제766조①)이지 1년이 아니다. '1년'이라는 ④의 서술이 오류. 확정판결 강제집행의 권리남용 가능성, 현저한 불균형 요건도 함께 정리.","expl_choices":{"1":"맞음. 확정판결에 따른 강제집행도 특별한 사정이 있으면 권리남용이 될 수 있다(판례).","2":"맞음. 주로 자기의 채무 이행만을 회피할 목적으로 동시이행항변권을 행사하는 경우에 그 항변권의 행사는 권리남용이 될 수 있다(판례).","3":"맞음. 권리남용이 인정되기 위해서는 권리행사로 인한 권리자의 이익과 상대방의 불이익 사이에 현저한 불균형이 있어야 한다(판례).","4":"틀림. 권리남용이 불법행위가 되어 발생한 손해배상청구권의 단기소멸시효는 3년이다(민법 제766조①). '1년'이라는 서술이 오류다.","5":"맞음. 토지소유자의 건물 철거 청구가 권리남용으로 인정된 경우라도, 토지소유자는 건물 소유자에 대해 토지 사용대가를 부당이득으로 반환청구할 수 있다(판례)."},"expl_sub":{}},{"num":3,"question":"제한능력자에 관한 설명으로 옳지 않은 것은?","answer":3,"answer_str":"3","choices":["① 권리만을 얻는 법률행위는 미성년자가 단독으로 할 수 있다.","② 미성년자가 법정대리인으로부터 허락을 얻은 특정한 영업에 관하여는 성년자와 동일한 행위능력이 있다.","③ 법정대리인이 미성년자에게 한 특정한 영업의 허락을 취소하는 경우 그 취소로 선의의 제3자에게 대항할 수 있다.","④ 제한능력자의 상대방은 계약 당시 제한능력자임을 알았을 경우에는 그 의사표시를 철회할 수 없다.","⑤ 상대방이 거절의 의사표시를 할 수 있는 경우 제한능력자를 상대로 그 의사표시를 할수 있다."],"sub_items":[],"expl_core":"영업 허락의 취소와 선의의 제3자 대항 불가가 핵심(민법 제8조②). '대항할 수 있다'는 ③이 정반대의 서술이다. 권리만 얻는 행위의 단독 가능 여부, 철회권 제한, 거절 의사표시 등도 함께 정리.","expl_choices":{"1":"맞음. 권리만을 얻거나 의무만을 면하는 법률행위는 미성년자가 단독으로 할 수 있다(민법 제5조①).","2":"맞음. 미성년자가 법정대리인으로부터 허락을 얻은 특정한 영업에 관하여는 성년자와 동일한 행위능력이 있다(민법 제8조①).","3":"틀림. 법정대리인이 미성년자에게 한 특정한 영업의 허락을 취소하는 경우, 그 취소는 선의의 제3자에게 대항하지 못한다(민법 제8조②). '대항할 수 있다'는 서술이 정반대다.","4":"맞음. 제한능력자의 상대방은 계약 당시 제한능력자임을 알았을 경우에는 그 의사표시를 철회할 수 없다(민법 제15조①).","5":"맞음. 상대방이 거절의 의사표시를 할 수 있는 경우 제한능력자를 상대로 그 의사표시를 할 수 있다(민법 제15조③)."},"expl_sub":{}},{"num":4,"question":"부재에 관한 설명으로 옳지 않은 것은?","answer":2,"answer_str":"2","choices":["① 부재자가 정한 재산관리인의 권한이 부재자의 부재 중에 소멸한 때에는 법원은 이해관 계인이나 검사의 청구에 의하여 재산관리에 관하여 필요한 처분을 명하여야 한다.","② 부재자가 재산관리인을 정한 경우 부재자의 생사가 분명하지 아니하게 되어 이해관계인이 청구를 하더라도 법원은 그 재산관리인을 개임할 수 없다.","③ 부재자의 생사가 분명하지 아니한 경우 부재자가 정한 재산관리인이 권한을 넘는 행위를 할 때에는 법원의 허가를 얻어야 한다.","④ 법원이 선임한 재산관리인은 관리할 재산목록을 작성하여야 한다.","⑤ 법원이 선임한 재산관리인에 대하여 법원은 부재자의 재산으로 상당한 보수를 지급할수 있다."],"sub_items":[],"expl_core":"부재자가 재산관리인을 정한 경우라도 부재자의 생사가 불분명하게 되면 법원이 그 관리인을 개임할 수 있다(민법 제22조②). '개임할 수 없다'는 ②가 오류. 부재자가 정한 관리인과 법원이 선임한 관리인의 취급이 다른 경우도 구별.","expl_choices":{"1":"맞음. 부재자가 정한 재산관리인의 권한이 부재 중에 소멸한 때에는 법원은 이해관계인이나 검사의 청구에 의하여 재산관리에 관하여 필요한 처분을 명하여야 한다(민법 제23조②).","2":"틀림. 부재자가 재산관리인을 정한 경우라도 부재자의 생사가 분명하지 아니하게 된 때에는 법원은 이해관계인이나 검사의 청구에 의하여 그 재산관리인을 개임할 수 있다(민법 제22조②). '개임할 수 없다'는 서술이 오류다.","3":"맞음. 부재자의 생사가 분명하지 않은 경우 부재자가 정한 재산관리인이 권한을 넘는 행위를 할 때에는 법원의 허가를 얻어야 한다.","4":"맞음. 법원이 선임한 재산관리인은 관리할 재산목록을 작성하여야 한다(민법 제24조①).","5":"맞음. 법원이 선임한 재산관리인에 대하여 법원은 부재자의 재산으로 상당한 보수를 지급할 수 있다(민법 제26조)."},"expl_sub":{}},{"num":5,"question":"법인에 관한 설명으로 옳은 것을 모두 고른 것은?","answer":4,"answer_str":"4","choices":["① ㄱ, ㄴ","② ㄷ, ㄹ","③ ㄱ, ㄴ, ㄷ","④ ㄴ, ㄷ, ㄹ","⑤ ㄱ, ㄴ, ㄷ, ㄹ"],"sub_items":["ㄱ. 임시이사는 법인과 이사의 이익이 상반하는 사항에 관하여 선임되는 법인의 기관이다.","ㄴ. 법인의 이사가 여러 명인 경우에는 정관에 다른 규정이 없으면 법인의 사무집 행은 이사의 과반수로써 결정한다.","ㄷ. 법인의 대표에 관하여는 대리에 관한 규정을 준용한다.","ㄹ. 이사는 정관 또는 총회의 결의로 금지하지 아니한 사항에 한하여 타인으로 하여금 특정한 행위를 대리하게 할 수 있다."],"expl_core":"임시이사와 특별대리인의 구별이 핵심. 임시이사는 이사 결원 시 선임(민법 제63조), 특별대리인은 이사와 법인의 이익상반 시 선임(민법 제64조). ㄱ이 이를 혼동한 오류. ㄴ·ㄷ·ㄹ은 모두 맞는 설명으로 정답 ④(ㄴ, ㄷ, ㄹ).","expl_choices":{"1":"틀림. ①선지 ㄱ, ㄴ. ㄱ이 틀린 설명이어서 오답이다.","2":"틀림. ②선지 ㄷ, ㄹ. ㄴ이 빠져 오답이다.","3":"틀림. ③선지 ㄱ, ㄴ, ㄷ. ㄱ이 틀린 설명이어서 오답이다.","4":"맞음. ④선지 ㄴ, ㄷ, ㄹ. 세 가지 모두 옳은 설명이다. 정답.","5":"틀림. ⑤선지 ㄱ, ㄴ, ㄷ, ㄹ. ㄱ이 틀린 설명이어서 오답이다."},"expl_sub":{"ㄱ":"틀림. 법인과 이사의 이익이 상반하는 사항에 관하여 선임되는 것은 임시이사가 아니라 특별대리인이다(민법 제64조). 임시이사는 이사의 결원으로 손해가 생길 염려가 있는 경우에 선임된다(민법 제63조).","ㄴ":"맞음. 이사가 여러 명인 경우 정관에 다른 규정이 없으면 법인의 사무집행은 이사의 과반수로써 결정한다(민법 제58조②).","ㄷ":"맞음. 법인의 대표에 관하여는 대리에 관한 규정을 준용한다(민법 제59조②).","ㄹ":"맞음. 이사는 정관 또는 총회의 결의로 금지하지 아니한 사항에 한하여 타인으로 하여금 특정한 행위를 대리하게 할 수 있다(민법 제62조)."}},{"num":6,"question":"사단법인 甲의 대표자 乙이 직무에 관한 불법행위로 丙에게 손해를 가하였다. 甲의 불법행위능력(민법 제35조)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 甲의 불법행위가 성립하여 甲이 丙에게 손해를 배상하면 甲은 乙에게 구상할 수 있다.","② 乙이 법인을 실질적으로 운영하면서 사실상 대표하여 사무를 집행하였더라도 대표자로 등기되지 않았다면 민법 제35조에서 정한 ‘대표자’에 해당하지 않는다.","③ 甲의 불법행위책임은 그가 乙의 선임ㆍ감독에 주의를 다하였음을 이유로 면책되지 않는다.","④ 乙의 행위가 외형상 대표자의 직무행위로 인정되는 경우라면 그것이 乙 개인의 이익만을 도모하기 위한 것이라도 직무에 관한 행위에 해당한다.","⑤ 乙이 청산인인 경우에도 甲의 불법행위책임이 성립할 수 있다."],"sub_items":[],"expl_core":"법인 대표자 여부 판단: 실질적으로 법인을 대표하여 사무를 집행하는 자는 등기 여부와 무관하게 민법 제35조의 대표자에 해당할 수 있다(판례). '등기되지 않았다면 해당하지 않는다'는 ②가 오류.","expl_choices":{"1":"맞음. 甲의 불법행위가 성립하여 甲이 丙에게 손해를 배상하면 甲은 乙에게 구상할 수 있다(민법 제35조②).","2":"틀림. 법인을 실질적으로 운영하면서 사실상 대표하여 사무를 집행한 자는 대표자로 등기되지 않았더라도 민법 제35조의 대표자에 해당할 수 있다(판례). '등기되지 않았다면 해당하지 않는다'는 서술이 오류다.","3":"맞음. 甲의 불법행위책임은 乙의 선임·감독에 주의를 다하였음을 이유로 면책되지 않는다. 민법 제35조는 무과실책임이다.","4":"맞음. 乙의 행위가 외형상 대표자의 직무행위로 인정되는 경우라면, 그것이 乙 개인의 이익만을 도모하기 위한 것이라도 직무에 관한 행위에 해당한다(판례).","5":"맞음. 乙이 청산인인 경우에도 청산 목적 범위 내의 직무행위라면 甲의 불법행위책임이 성립할 수 있다(판례)."},"expl_sub":{}},{"num":7,"question":"법인에 관한 설명으로 옳지 않은 것은?","answer":4,"answer_str":"4","choices":["① 영리 아닌 사업을 목적으로 하는 재단은 주무관청의 허가를 얻어 이를 법인으로 할 수있다.","② 법인은 그 주된 사무소의 소재지에서 설립등기를 함으로써 성립한다.","③ 법인은 법률의 규정에 좇아 정관으로 정한 목적의 범위 내에서 권리와 의무의 주체가 된다.","④ 재단법인의 존립시기는 정관의 필요적 기재사항이다.","⑤ 재단법인의 설립자가 그 명칭만 정하지 아니하고 사망한 때에는 이해관계인 또는 검사의 청구에 의하여 법원이 이를 정한다."],"sub_items":[],"expl_core":"재단법인의 정관 필요적 기재사항과 임의적 기재사항 구별이 핵심. 존립시기와 해산사유는 임의적 기재사항이다(민법 제43조). '필요적 기재사항이다'는 ④가 오류. 법인의 권리능력 범위(목적 범위), 설립등기시 성립도 정리.","expl_choices":{"1":"맞음. 영리 아닌 사업을 목적으로 하는 재단도 주무관청의 허가를 얻어 법인으로 할 수 있다(민법 제32조).","2":"맞음. 법인은 그 주된 사무소의 소재지에서 설립등기를 함으로써 성립한다(민법 제33조).","3":"맞음. 법인은 법률의 규정에 좇아 정관으로 정한 목적의 범위 내에서 권리와 의무의 주체가 된다(민법 제34조).","4":"틀림. 재단법인의 존립시기는 정관의 임의적 기재사항이다(민법 제43조). 필요적 기재사항은 목적, 명칭, 사무소 소재지, 자산에 관한 규정, 이사의 임면 방법이다.","5":"맞음. 재단법인의 설립자가 명칭만 정하지 않고 사망한 때에는 이해관계인 또는 검사의 청구에 의하여 법원이 이를 정한다(민법 제44조)."},"expl_sub":{}},{"num":8,"question":"물건에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 관리할 수 있는 자연력은 동산이다.","② 분묘에 안치되어 있는 선조의 유골은 그 제사주재자에게 승계된다.","③ 금전은 동산이다.","④ 주물을 점유에 의하여 시효취득하여도 종물을 점유하지 않았다면 그 효력은 종물에 미치지 않는다.","⑤ 권리의 과실(果實)은 민법상 과실(果實)이다."],"sub_items":[],"expl_core":"권리의 과실(이자채권 등)은 민법상 과실(果實)이 아니다. 민법상 과실은 물건의 과실(천연과실·법정과실)만을 의미한다. '권리의 과실도 민법상 과실이다'는 ⑤가 오류. 유골의 제사주재자 귀속, 자연력의 동산 성격, 종물 시효취득도 정리.","expl_choices":{"1":"맞음. 관리할 수 있는 자연력은 물건으로서 동산에 해당한다(민법 제98조, 제99조 반대해석).","2":"맞음. 분묘에 안치되어 있는 선조의 유골은 그 제사주재자에게 승계된다(판례).","3":"맞음. 금전은 동산이다.","4":"맞음. 주물을 점유에 의하여 시효취득하더라도 종물을 점유하지 않았다면 그 시효취득의 효력은 종물에 미치지 않는다(판례).","5":"틀림. 권리의 과실(예: 이자채권)은 민법상 과실(果實)에 해당하지 않는다. 민법상 과실은 물건으로부터 발생하는 천연과실과 법정과실을 의미하며, 권리 자체에서 발생하는 이익은 여기에 포함되지 않는다."},"expl_sub":{}},{"num":9,"question":"반사회적 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 형사사건의 변호사 성공보수약정은 반사회적 법률행위이다.","② 아버지 소유의 부동산이 이미 제3자에게 매도되어 제3자로부터 등기독촉을 받고 있는 사정을 잘 알고 있는 아들이 그 아버지로부터 그 부동산을 증여받은 경우, 그 증여는 반사회적 법률행위이다.","③ 살인을 포기할 것을 조건으로 한 증여는 반사회적 법률행위가 아니다.","④ 부부간에 어떠한 일이 있어도 이혼하지 않겠다는 합의는 반사회적 법률행위이다.","⑤ 수사기관에서 참고인으로 허위진술하는 대가로 돈을 받기로 한 약정은 반사회적 법률행 위이다."],"sub_items":[],"expl_core":"살인을 포기할 것을 조건으로 한 증여의 반사회질서 해당 여부가 쟁점. 판례상 이는 반사회질서에 해당하는 법률행위로 본다. 살인 의사의 존재를 전제로 한 계약 자체가 반사회적이기 때문이다. '반사회적이 아니다'는 ③이 오류. 변호사 성공보수, 이혼금지 합의도 함께 정리.","expl_choices":{"1":"맞음. 형사사건의 변호사 성공보수약정은 반사회질서 법률행위에 해당한다(판례).","2":"맞음. 제3자에게 이미 매도된 부동산이라는 사정을 잘 알면서 그 부동산을 증여받은 경우, 배임행위에 적극 가담한 것으로 반사회질서 법률행위에 해당한다(판례).","3":"틀림. 살인을 포기할 것을 조건으로 한 증여는 반사회질서 법률행위에 해당한다(판례). 살인 의사의 존재를 전제로 하는 계약 자체가 사회질서에 반하기 때문이다.","4":"맞음. 부부간에 어떠한 일이 있어도 이혼하지 않겠다는 합의는 이혼의 자유를 박탈하는 반사회질서 법률행위다(판례).","5":"맞음. 수사기관에서 참고인으로 허위진술하는 대가로 돈을 받기로 한 약정은 반사회질서 법률행위다(판례)."},"expl_sub":{}},{"num":10,"question":"甲이 乙에게 X부동산을 허위표시로 매도하고 이전등기를 해 주었다. 이에 관한 설명 으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 甲은 乙을 상대로 매매대금의 지급을 청구할 수 없다.","② 甲은 乙을 상대로 X부동산의 반환을 구할 수 있다.","③ 만약 乙과 X부동산에 대해 저당권설정계약을 체결하고 저당권설정등기를 한 丙이 허위 표시에 대해 선의인 경우, 甲은 그 저당권등기의 말소를 구할 수 없다.","④ 만약 乙 명의로 등기된 X부동산을 가압류한 丙이 허위표시에 대해 선의이지만 과실이 있는 경우, 甲은 丙에 대하여 가압류의 무효를 주장할 수 없다.","⑤ 만약 X부동산이 乙로부터 丙, 丙으로부터 丁에게 차례로 매도되어 각기 그 명의로 이전 등기까지 된 경우, 허위표시에 대해 丙이 악의이면 丁이 선의이더라도 甲은 丁 명의 이전등기의 말소를 구할 수 있다."],"sub_items":[],"expl_core":"통정허위표시의 선의의 제3자 보호는 각 전득자별로 독립하여 판단한다. 중간의 丙이 악의더라도 전득자 丁이 선의이면 甲은 丁에게 무효를 대항할 수 없다. '丙이 악의이면 丁이 선의라도 말소 청구 가능하다'는 ⑤가 오류.","expl_choices":{"1":"맞음. 통정허위표시로 무효인 계약에서 甲은 乙에게 매매대금의 지급을 청구할 수 없다.","2":"맞음. 통정허위표시로 계약이 무효이므로 甲은 乙에게 X부동산의 반환을 구할 수 있다(부당이득).","3":"맞음. 丙이 허위표시에 대해 선의인 경우, 甲은 丙의 저당권등기의 말소를 청구할 수 없다(민법 제108조②).","4":"맞음. 丙이 선의이지만 과실이 있는 경우에도 乙에 대한 가압류의 무효를 甲이 丙에게 주장할 수 없다. 선의의 제3자 보호는 과실 유무를 불문한다(판례).","5":"틀림. X부동산이 乙→丙→丁으로 차례로 매도된 경우, 각 전득자의 선의·악의는 독립하여 판단된다. 丙이 악의라도 丁이 선의이면 甲은 丁에게 무효를 대항할 수 없고 말소 청구도 할 수 없다(판례)."},"expl_sub":{}},{"num":11,"question":"착오에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 법률행위의 내용의 중요부분에 착오가 있으면 취소할 수 있는 것이 원칙이다.","② 1심 판결에서 패소한 자가 항소심 판결 선고 전에 패소를 예상하고 법률행위를 하였으나 이후 항소심에서 승소판결이 선고된 경우 착오를 이유로 그 법률행위를 취소할 수 있다.","③ 의사표시의 착오가 표의자의 중대한 과실로 발생하였으나 상대방이 표의자의 착오를 알고 이용한 경우 표의자는 의사표시를 취소할 수 있다.","④ 착오한 표의자의 중대한 과실 유무에 관한 증명책임은 의사표시를 취소하게 하지 않으 려는 상대방에게 있다.","⑤ 착오자의 착오로 인한 취소로 상대방이 손해를 입게 되더라도, 착오자는 불법행위로 인한 손해배상책임을 부담하지 않는다."],"sub_items":[],"expl_core":"1심 패소를 예상하고 한 법률행위가 항소심에서 승소하더라도 착오를 이유로 취소할 수 없다. 장래 사항에 대한 예측이 빗나간 것은 착오가 아니라 기대의 실현 여부 문제다. ②의 '착오를 이유로 취소할 수 있다'는 서술이 오류.","expl_choices":{"1":"맞음. 법률행위의 내용의 중요부분에 착오가 있으면 중과실이 없는 한 취소할 수 있는 것이 원칙이다(민법 제109조①).","2":"틀림. 1심에서 패소를 예상하고 법률행위를 하였으나 항소심에서 승소한 경우, 장래 사항에 대한 예측이 빗나간 것에 불과하므로 착오를 이유로 취소할 수 없다(판례).","3":"맞음. 의사표시의 착오가 표의자의 중대한 과실로 발생하였더라도, 상대방이 표의자의 착오를 알고 이를 이용한 경우에는 표의자는 착오를 이유로 의사표시를 취소할 수 있다(판례).","4":"맞음. 착오한 표의자의 중대한 과실 유무에 관한 증명책임은 의사표시를 취소하게 하지 않으려는 상대방이 부담한다(판례).","5":"맞음. 착오자의 착오로 인한 취소로 상대방이 손해를 입더라도, 착오자는 불법행위로 인한 손해배상책임을 부담하지 않는다(판례)."},"expl_sub":{}},{"num":12,"question":"사기에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 상대방이 기망하였으나 표의자가 기망되지 않고 의사표시를 하였다면 기망을 이유로 그의사표시를 취소할 수 없다.","② 제3자가 행한 사기로 계약을 체결한 경우 상대방이 그 사실을 알았거나 알 수 있었을 경우에 한하여 그 계약을 취소할 수 있다.","③ 상대방의 대리인이 사기를 행하여 계약을 체결한 경우 그 대리인은 ‘제3자에 의한 사기’ 에서의 ‘제3자’에 해당되지 않는다.","④ 상대방이 사용자책임을 져야 할 관계에 있는 피용자가 사기를 행하여 계약을 체결한 경우 그 피용자는 ‘제3자에 의한 사기’에서의 ‘제3자’에 해당한다.","⑤ ‘제3자에 의한 사기’로 계약을 체결한 피기망자는 그 계약을 취소하지 않은 상태에서 그제3자에 대하여 불법행위로 인한 손해배상청구를 할 수 없다."],"sub_items":[],"expl_core":"제3자 사기로 계약을 체결한 피기망자는 계약을 취소하지 않은 상태에서도 제3자에게 불법행위 손해배상 청구가 가능하다(판례). '취소하지 않는 한 청구할 수 없다'는 ⑤가 오류. 사용자책임 피용자의 제3자성도 함께 정리.","expl_choices":{"1":"맞음. 상대방이 기망하였으나 표의자가 기망되지 않고 의사표시를 하였다면 인과관계가 없으므로 기망을 이유로 취소할 수 없다.","2":"맞음. 제3자가 행한 사기로 계약을 체결한 경우, 상대방이 그 사실을 알았거나 알 수 있었을 경우에 한하여 취소할 수 있다(민법 제110조②).","3":"맞음. 상대방의 대리인이 사기를 행하여 계약을 체결한 경우 그 대리인은 제3자가 아닌 상대방 측의 사람으로 취급된다(판례).","4":"맞음. 상대방이 사용자책임을 져야 할 관계에 있는 피용자가 사기를 행한 경우, 그 피용자는 제3자에 해당한다(판례). 대리인과 달리 독립된 제3자로 취급된다.","5":"틀림. 제3자에 의한 사기로 계약을 체결한 피기망자는 계약을 취소하지 않은 상태에서도 그 제3자에 대하여 불법행위로 인한 손해배상을 청구할 수 있다(판례)."},"expl_sub":{}},{"num":13,"question":"대리행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 미성년자 甲의 법정대리인 乙이 제3자 丙의 이익만을 위한 대리행위를 하고 그 사정을 상대방 丁이 알고 있었다면, 그 대리행위는 甲에게 효과가 없다.","② 매매위임장을 제시하고 매매계약을 체결하면서 계약서에 대리인의 성명만 기재하는 경우, 특단의 사정이 없는 한 그 계약은 본인에게 효력이 없다.","③ 특정한 법률행위를 위임한 경우에 대리인이 본인의 지시에 좇아 그 행위를 한 때에는 본인은 자기가 안 사정에 관하여 대리인의 부지(不知)를 주장할 수 있다.","④ 하나의 물건에 대해 본인과 대리인이 각각 계약을 체결한 경우, 대리인이 체결한 계약은 무효이다.","⑤ 본인은 임의대리인이 제한능력자라는 이유로 대리행위를 취소할 수 있다."],"sub_items":[],"expl_core":"대리권 남용: 대리인이 제3자의 이익만을 위한 대리행위를 하고 상대방이 그 사정을 알고 있었다면 본인에게 효력이 없다(판례, ① 맞음). 매매위임장 제시=현명주의 충족(본인에게 효력 있음), 지시에 따른 대리인의 사정 부지 주장 불가, 쌍방계약 시 대리계약 유효, 제한능력자 대리인 취소 불가도 정리.","expl_choices":{"1":"맞음. 법정대리인 乙이 제3자 丙의 이익만을 위한 대리행위를 하고 상대방 丁이 그 사정을 알고 있었다면, 그 대리행위는 甲에게 효력이 없다(대리권 남용, 판례).","2":"틀림. 매매위임장을 제시하고 계약을 체결하면서 계약서에 대리인의 성명만 기재한 경우에도 위임장 제시를 통해 본인을 위한 대리임을 알 수 있으므로, 특단의 사정이 없는 한 그 계약은 본인에게 효력이 있다(판례).","3":"틀림. 특정한 법률행위를 위임한 경우 대리인이 본인의 지시에 좇아 행위한 때에는 본인은 자기가 안 사정에 관하여 대리인의 부지(不知)를 주장하지 못한다(민법 제116조②).","4":"틀림. 하나의 물건에 대해 본인과 대리인이 각각 계약을 체결하더라도 대리인이 체결한 계약은 그 자체로 무효가 되지 않는다. 이행 과정에서 어느 쪽을 먼저 이행하느냐의 문제가 될 뿐이다.","5":"틀림. 대리인은 행위능력자임을 요하지 않으므로(민법 제117조), 본인은 임의대리인이 제한능력자라는 이유만으로 대리행위를 취소할 수 없다."},"expl_sub":{}},{"num":14,"question":"임의대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 권한을 정하지 아니한 대리인은 대리의 목적물에 대해 모든 개량행위를 할 수 있다.","② 대리권은 그 권한에 부수하여 필요한 한도에서 상대방의 의사표시를 수령하는 수령대리 권을 포함하는 것이 원칙이다.","③ 수권행위는 묵시적인 의사표시로 할 수 있다.","④ 대리권의 존속 중 원인된 법률관계가 종료하기 전에는 본인은 수권행위를 철회할 수 있다.","⑤ 대리인에 대한 성년후견의 개시는 대리권의 소멸사유이다."],"sub_items":[],"expl_core":"권한을 정하지 아니한 대리인은 목적물의 성질을 변하지 않는 범위에서 이용·개량행위를 할 수 있다(민법 제118조). '모든 개량행위를 할 수 있다'는 ①이 오류. '목적물의 성질을 변하지 않는 범위 내'라는 제한이 있다.","expl_choices":{"1":"틀림. 권한을 정하지 아니한 대리인은 보존행위와 이용행위·개량행위를 할 수 있으나, 개량행위는 대리의 목적인 물건이나 권리의 성질을 변하지 않는 범위에서만 허용된다(민법 제118조). '모든 개량행위'는 이 한계를 넘는 표현이다.","2":"맞음. 대리권은 그 권한에 부수하여 필요한 한도에서 상대방의 의사표시를 수령하는 수령대리권을 포함하는 것이 원칙이다(판례).","3":"맞음. 수권행위는 묵시적인 의사표시로도 할 수 있다(판례).","4":"맞음. 대리권이 존속하는 중에 원인된 법률관계가 종료하기 전이라도 본인은 수권행위를 철회할 수 있다(판례).","5":"맞음. 대리인에 대한 성년후견의 개시는 임의대리권의 소멸사유이다(민법 제127조②)."},"expl_sub":{}},{"num":15,"question":"미성년자 甲의 법정대리인 乙이 복대리인 丙을 선임한 경우에 관한 설명으로 옳지 않은 것은?","answer":2,"answer_str":"2","choices":["① 乙은 항상 복임권이 있다.","② 丙도 법정대리인의 지위를 가진다.","③ 乙이 부득이한 사유로 丙을 선임한 경우라면 甲에 대하여 그 선임감독에 관한 책임이 있다.","④ 乙이 사망한 경우 丙의 복대리인의 지위는 원칙적으로 소멸한다.","⑤ 丙은 자신이 수령한 법률행위의 목적물을 乙에게 인도할 의무가 있다."],"sub_items":[],"expl_core":"복대리인은 대리인의 대리인이 아닌 본인의 대리인이다. '법정대리인의 지위를 가진다'는 ②가 오류. 법정대리인의 복임권(항상 가능), 선임책임, 대리인 사망 시 복대리권 소멸도 함께 정리.","expl_choices":{"1":"맞음. 법정대리인(乙)은 언제나 복임권이 있다(민법 제122조). 임의대리인과 달리 별도의 요건이 없다.","2":"틀림. 복대리인 丙은 법정대리인의 지위가 아닌 본인(甲)의 대리인의 지위를 가진다(민법 제123조②).","3":"맞음. 乙이 부득이한 사유로 丙을 선임한 경우라면 甲에 대하여 선임·감독에 관한 책임만 부담한다(민법 제122조 단서).","4":"맞음. 乙이 사망한 경우 乙의 대리권이 소멸하고, 이에 따라 丙의 복대리인의 지위도 원칙적으로 소멸한다.","5":"맞음. 복대리인 丙은 자신이 수령한 법률행위의 목적물을 대리인 乙에게 인도할 의무가 있다."},"expl_sub":{}},{"num":16,"question":"대리에 관한 설명으로 옳은 것을 모두 고른 것은?","answer":5,"answer_str":"5","choices":["① ㄱ, ㄴ","② ㄱ, ㄷ","③ ㄴ, ㄷ","④ ㄴ, ㄹ","⑤ ㄷ, ㄹ"],"sub_items":["ㄱ. 계약의 무권대리에 대한 추인은 다른 의사표시가 없으면 추인한 때부터 그 효력이 생긴다.","ㄴ. 무권대리의 상대방이 상당한 추인기간을 설정한 경우, 그 기간 내에 본인이 확답을 발하지 않은 때에는 추인한 것으로 본다.","ㄷ. 대리인이 수인인 경우 각자가 본인을 대리하는 것이 원칙이다.","ㄹ. 채무의 이행의 경우 본인의 허락이 없어도 쌍방대리는 유효하다."],"expl_core":"무권대리 추인의 소급효(ㄱ), 최고에 대한 침묵의 효과(ㄴ)가 핵심. 추인은 계약 시에 소급(ㄱ 틀림), 최고에 대한 침묵=추인 거절(ㄴ 틀림). 대리인 수인 시 각자 대리 원칙(ㄷ 맞음), 채무이행 시 쌍방대리 허용(ㄹ 맞음) → 정답 ⑤(ㄷ, ㄹ).","expl_choices":{"1":"틀림. ①선지 ㄱ, ㄴ. 둘 다 틀린 설명이어서 오답이다.","2":"틀림. ②선지 ㄱ, ㄷ. ㄱ이 틀린 설명이어서 오답이다.","3":"틀림. ③선지 ㄴ, ㄷ. ㄴ이 틀린 설명이어서 오답이다.","4":"틀림. ④선지 ㄴ, ㄹ. ㄴ이 틀린 설명이어서 오답이다.","5":"맞음. ⑤선지 ㄷ, ㄹ. 둘 다 옳은 설명이다. 정답."},"expl_sub":{"ㄱ":"틀림. 계약의 무권대리에 대한 추인은 다른 의사표시가 없으면 계약 시에 소급하여 효력이 생긴다(민법 제133조). '추인한 때부터'라는 서술이 오류다.","ㄴ":"틀림. 무권대리의 상대방이 상당한 기간을 정하여 추인 여부의 확답을 최고한 경우, 그 기간 내에 본인이 확답을 발하지 않으면 추인을 거절한 것으로 본다(민법 제131조). '추인한 것으로 본다'는 서술이 정반대다.","ㄷ":"맞음. 대리인이 수인인 경우에는 각자가 본인을 대리하는 것이 원칙이다(민법 제119조).","ㄹ":"맞음. 쌍방대리는 원칙적으로 금지되나, 채무의 이행에 있어서는 본인의 허락이 없어도 유효하다(민법 제124조 단서)."}},{"num":17,"question":"권한을 넘은 표현대리(민법 제126조)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 권한을 넘은 대리행위와 기본대리권이 반드시 동종의 것이어야 하는 것은 아니다.","② 대리인이 사술을 써서 대리행위의 표시를 하지 아니하고 단지 본인의 성명을 모용하여 자기가 본인인 것처럼 기망하여 본인 명의로 직접 법률행위를 한 경우에는 특별한 사정이 없는 한 권한을 넘은 표현대리는 성립할 수 없다.","③ 권한을 넘은 표현대리에 관한 규정에서의 제3자에는 당해 표현대리행위의 직접 상대방이 된 자 외에 전득자도 포함된다.","④ 권한을 넘은 표현대리에 있어서 정당한 이유의 유무는 대리행위 당시를 기준으로 하여 판단한다.","⑤ 복임권이 없는 대리인이 선임한 복대리인의 대리권도 권한을 넘은 표현대리에서의 기본 대리권이 될 수 있다."],"sub_items":[],"expl_core":"권한을 넘은 표현대리에서 '제3자'는 표현대리행위의 직접 상대방만을 의미하고 전득자는 포함되지 않는다(판례). '전득자도 포함된다'는 ③이 오류. 기본대리권의 이종(異種) 가능, 사술로 본인 사칭 시 표현대리 불성립, 복임권 없는 복대리인의 기본대리권도 정리.","expl_choices":{"1":"맞음. 권한을 넘은 대리행위와 기본대리권이 반드시 동종의 것이어야 하는 것은 아니다(판례).","2":"맞음. 대리인이 대리행위의 표시를 하지 않고 자기가 본인인 것처럼 기망하여 본인 명의로 직접 법률행위를 한 경우, 특별한 사정이 없는 한 권한을 넘은 표현대리가 성립할 수 없다(판례).","3":"틀림. 권한을 넘은 표현대리에 관한 규정에서의 '제3자'는 당해 표현대리행위의 직접 상대방이 된 자만을 의미하고, 전득자는 포함되지 않는다(판례).","4":"맞음. 권한을 넘은 표현대리에서 정당한 이유의 유무는 대리행위 당시를 기준으로 판단한다(판례).","5":"맞음. 복임권이 없는 대리인이 선임한 복대리인의 대리권도 권한을 넘은 표현대리에서의 기본대리권이 될 수 있다(판례)."},"expl_sub":{}},{"num":18,"question":"계약에 대한 무권대리에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 범죄가 되는 무권대리행위에 대하여 장기간 형사고소를 하지 아니하였다는 사실만으로 묵시적인 추인이 있었다고 볼 수 있다.","② 본인이 추인을 거절하더라도 상대방은 철회권을 행사할 수 있다.","③ 본인이 무권대리행위의 일부에 대해 추인을 한 경우, 그에 대하여 상대방의 동의를 얻으면 유효하다.","④ 본인이 무권대리인에게 한 추인의 의사표시는 항상 효력이 없다.","⑤ 무권대리인의 계약상대방에 대한 책임(민법 제135조 제1항)은 대리권의 흠결에 관하여 대리인에게 과실이 있어야 인정된다."],"sub_items":[],"expl_core":"무권대리에서 본인의 일부 추인의 효력은 상대방의 동의를 얻으면 유효하다(③ 맞음). 본인의 추인 거절 후 철회권 행사 불가(②), 무권대리인에 대한 추인 가능하나 상대방 대항 제한(④), 무권대리인 책임=무과실책임(⑤)도 함께 정리.","expl_choices":{"1":"맞음. 범죄가 되는 무권대리행위에 대하여 장기간 형사고소를 하지 않았다는 사실만으로는 묵시적인 추인이 있었다고 볼 수 없다(판례).","2":"틀림. 본인이 추인을 거절하면 무권대리 계약은 확정적으로 무효가 되므로 상대방은 철회권을 행사할 여지가 없다. 철회는 본인의 추인 전에만 가능하다.","3":"맞음. 본인이 무권대리행위의 일부에 대해 추인을 한 경우, 그에 대하여 상대방의 동의를 얻으면 유효하다(민법 제133조 유추).","4":"틀림. 본인이 무권대리인에게 추인의 의사표시를 한 경우, 그 추인은 효력이 있다. 다만 상대방이 이를 알기 전에는 상대방에게 대항하지 못할 뿐이다(판례).","5":"틀림. 무권대리인의 계약상대방에 대한 이행·손해배상 책임(민법 제135조①)은 대리인의 과실 유무와 무관한 무과실책임이다."},"expl_sub":{}},{"num":19,"question":"무권대리와 표현대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 유권대리에 관한 주장 속에는 무권대리에 속하는 표현대리의 주장이 포함되어 있다고볼 수 없다.","② 표현대리가 성립하는 경우, 상대방에게 과실이 있어도 과실상계의 법리를 유추적용하여 본인의 책임을 경감할 수 없다.","③ 대리행위가 강행법규 위반으로 무효인 경우 표현대리 법리가 적용되지 않는다.","④ 상대방은 계약 당시에 대리인에게 대리권이 없음을 안 때에는 계약을 철회할 수 없다.","⑤ 제한능력자인 무권대리인은 민법 제135조 제1항에 따라 계약을 이행할 책임 또는 손해를 배상할 책임이 있다."],"sub_items":[],"expl_core":"제한능력자인 무권대리인은 민법 제135조②에 의해 이행·손해배상 책임을 지지 않는다. '책임이 있다'는 ⑤가 오류. 유권대리 주장 속에 표현대리 주장 포함 불가, 과실상계 불가, 강행법규 위반 시 표현대리 불적용도 정리.","expl_choices":{"1":"맞음. 유권대리에 관한 주장 속에는 무권대리에 속하는 표현대리의 주장이 포함되어 있다고 볼 수 없다(판례).","2":"맞음. 표현대리가 성립하는 경우, 상대방에게 과실이 있어도 과실상계의 법리를 유추적용하여 본인의 책임을 경감할 수 없다(판례).","3":"맞음. 대리행위가 강행법규 위반으로 무효인 경우 표현대리 법리가 적용되지 않는다(판례).","4":"맞음. 계약 당시에 대리권이 없음을 안 상대방은 계약을 철회할 수 없다(민법 제134조 단서).","5":"틀림. 제한능력자인 무권대리인은 민법 제135조②에 의해 계약 이행 또는 손해배상 책임을 지지 않는다. '책임이 있다'는 서술이 오류다."},"expl_sub":{}},{"num":20,"question":"법률행위의 무효에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 법률행위의 일부분이 무효이면 그 일부분만 무효로 되는 것이 원칙이다.","② 의사무능력을 이유로 법률행위가 무효인 경우 의사무능력자는 이익의 현존여부를 불문 하고 받은 이익 전부를 반환하여야 한다.","③ 무효인 법률행위에 대해 당사자가 무효임을 알고 추인하면 그 법률행위는 소급하여 유효하게 되는 것이 원칙이다.","④ 불공정한 법률행위로서 무효인 경우 그 무효인 법률행위는 추인에 의하여 유효로 될 수없다.","⑤ 반사회적 법률행위로서 무효인 경우 그 무효로 선의의 제3자에게 대항할 수 없다."],"sub_items":[],"expl_core":"불공정 법률행위로 무효인 경우 추인으로 유효가 될 수 없다는 것이 맞는 설명(④). 일부무효=전부무효 원칙(① 틀림), 의사무능력 무효=현존이익 반환(② 틀림), 무효 추인=새로운 법률행위(소급 아님)(③ 틀림), 반사회질서 무효=절대적 무효(⑤ 틀림)도 정리.","expl_choices":{"1":"틀림. 법률행위의 일부분이 무효이면 그 전부를 무효로 하는 것이 원칙이다(민법 제137조). '일부분만 무효'라는 서술이 오류다.","2":"틀림. 의사무능력을 이유로 법률행위가 무효인 경우 의사무능력자는 현존이익의 한도에서만 반환 책임을 진다. '이익의 현존여부를 불문하고 전부 반환'이라는 서술이 오류다.","3":"틀림. 무효인 법률행위에 대해 당사자가 무효임을 알고 추인하면 새로운 법률행위로 본다(민법 제139조 단서). '소급하여 유효하게 된다'는 서술이 오류다.","4":"맞음. 불공정한 법률행위로서 무효인 경우, 그 법률행위는 추인에 의하여 유효로 될 수 없다(판례).","5":"틀림. 반사회적 법률행위로서 무효는 절대적 무효이므로 선의의 제3자에게도 대항할 수 있다. '선의의 제3자에게 대항할 수 없다'는 서술이 오류다."},"expl_sub":{}},{"num":21,"question":"법률행위의 취소에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 제한능력자도 단독으로 취소권을 행사할 수 있다.","② 법률행위의 취소로 무효가 된 그 법률행위는 무효행위의 추인의 법리에 따라 추인할 수없다.","③ 근로계약이 취소된 경우 이미 제공된 근로자의 노무를 기초로 형성된 취소 이전의 법률 관계는 소급하여 효력을 잃지 않는다.","④ 취소권자가 추인할 수 있은 후에 이의를 보류한 상태에서 취소할 수 있는 계약을 이행한 때에는 법정추인이 되지 않는다.","⑤ 계약이 해제된 후에도 해제의 상대방은 해제로 인한 불이익을 면하기 위하여 취소권을 행사하여 계약 전체를 무효로 돌릴 수 있다."],"sub_items":[],"expl_core":"취소로 무효가 된 법률행위도 무효행위의 추인 법리에 따라 추인이 가능하다(판례). '추인할 수 없다'는 ②가 오류. 제한능력자의 취소권 단독 행사, 근로계약 취소의 소급효 제한, 이의보류 이행과 법정추인도 정리.","expl_choices":{"1":"맞음. 제한능력자도 단독으로 취소권을 행사할 수 있다(민법 제140조).","2":"틀림. 취소로 무효가 된 법률행위도 무효행위의 추인 법리에 따라 추인할 수 있다(판례). 취소 후에는 새로운 법률행위로서 효력이 생긴다.","3":"맞음. 근로계약이 취소된 경우, 이미 제공된 근로자의 노무를 기초로 형성된 취소 이전의 법률관계는 소급하여 효력을 잃지 않는다(판례).","4":"맞음. 취소권자가 추인할 수 있은 후에 이의를 보류한 상태에서 취소할 수 있는 계약을 이행한 때에는 법정추인이 되지 않는다(민법 제145조 단서).","5":"맞음. 계약이 해제된 후에도 해제의 상대방은 해제로 인한 불이익을 면하기 위하여 취소권을 행사하여 계약 전체를 무효로 돌릴 수 있다(판례)."},"expl_sub":{}},{"num":22,"question":"기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 계약 기간의 기산점을 오는 7월 1일부터 기산하여 주(週)로 정한 때에는 기간의 초일은 산입하지 아니한다.","② 기간을 시(時)로 정한 때에는 즉시로부터 기산한다.","③ 기간을 월(月)로 정한 경우에 최종의 월에 해당일이 없는 때에는 그 월의 말일로 기간이 만료한다.","④ 기간의 말일이 토요일 또는 공휴일에 해당한 때에는 기간은 그 익일로 만료한다.","⑤ 정년이 60세라 함은 만 60세에 도달하는 날을 말하는 것이라고 보는 것이 상당하다."],"sub_items":[],"expl_core":"'오는 7월 1일부터'처럼 기산점이 특정 일자로 명시된 경우에는 그 날 자체를 기산일로 산입한다(초일 산입 예외). '초일은 산입하지 아니한다'는 ①이 오류. 말일 토요일·공휴일=익일 만료(제161조), 정년 60세=만 60세 도달하는 날도 정리.","expl_choices":{"1":"틀림. '오는 7월 1일부터 기산하여'처럼 기산점이 특정 일자로 명시된 경우에는 초일(7월 1일)을 산입하여 기산한다. '산입하지 아니한다'는 서술이 오류다. 초일 불산입은 기산점이 명시되지 않은 경우에 적용된다.","2":"맞음. 기간을 시(時)로 정한 때에는 즉시로부터 기산한다(민법 제156조).","3":"맞음. 기간을 월(月)로 정한 경우에 최종의 월에 해당일이 없는 때에는 그 월의 말일로 기간이 만료한다(민법 제160조②).","4":"맞음. 기간의 말일이 토요일 또는 공휴일에 해당한 때에는 기간은 그 익일로 만료한다(민법 제161조).","5":"맞음. 정년이 60세라 함은 만 60세에 도달하는 날을 말하는 것이라고 보는 것이 상당하다(판례)."},"expl_sub":{}},{"num":23,"question":"소멸시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 시효기간 만료로 인한 권리의 소멸은 시효의 이익을 받은 자가 시효완성의 항변을 하지 않으면 그 의사에 반하여 재판할 수 없다.","② 시효를 원용할 수 있는 사람은 권리의 소멸에 의하여 직접 이익을 받는 사람에 한정된다.","③ 시효가 완성된 채권의 시효이익을 채무자가 포기하면 포기한 때로부터 그 채권의 시효가 새로 진행한다.","④ 시효는 법률행위에 의하여 이를 배제하거나 경감할 수 없다.","⑤ 시효는 그 기산일에 소급하여 효력이 생긴다."],"sub_items":[],"expl_core":"소멸시효의 '경감(단축)'은 법률행위로 할 수 있다. 민법 제184조②는 배제·연장·가중을 금지하지만 경감(단축)은 금지하지 않는다(판례). '경감할 수 없다'는 ④가 오류. 시효이익 원용권자 범위(직접 이익자), 포기 후 새 시효 진행도 정리.","expl_choices":{"1":"맞음. 시효기간 만료로 인한 권리의 소멸은 시효의 이익을 받은 자가 시효완성의 항변을 하지 않으면 그 의사에 반하여 재판할 수 없다.","2":"맞음. 시효를 원용할 수 있는 사람은 권리의 소멸에 의하여 직접 이익을 받는 사람에 한정된다(판례).","3":"맞음. 시효가 완성된 채권의 시효이익을 채무자가 포기하면 포기한 때로부터 그 채권의 소멸시효가 새로 진행한다(판례).","4":"틀림. 소멸시효는 법률행위로 이를 배제하거나 연장·가중할 수는 없으나, 경감(단축)은 허용된다(판례). '경감할 수 없다'는 서술이 오류다.","5":"맞음. 시효는 그 기산일에 소급하여 효력이 생긴다(민법 제167조)."},"expl_sub":{}},{"num":24,"question":"소멸시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 채권 및 소유권 이외의 재산권은 10년간 행사하지 아니하면 시효가 완성한다.","② 점유권은 시효에 걸리지 아니한다.","③ 시효는 권리행사에 법률상의 장애사유가 없는 때로부터 진행한다.","④ 정지조건부 권리는 조건이 성취된 때부터 시효가 진행된다.","⑤ 부작위를 목적으로 하는 채권의 시효는 위반행위를 한 때로부터 진행한다."],"sub_items":[],"expl_core":"채권 및 소유권 이외의 재산권(지상권·지역권 등 물권)의 소멸시효기간은 20년이다(민법 제162조②). '10년'이라는 ①이 오류. 채권의 소멸시효는 10년, 재산권(소유권 외)은 20년으로 구별해야 한다.","expl_choices":{"1":"틀림. 채권 및 소유권 이외의 재산권은 20년간 행사하지 아니하면 소멸시효가 완성한다(민법 제162조②). '10년'이라는 서술이 오류다. 참고로 채권의 일반 소멸시효는 10년(제162조①)이다.","2":"맞음. 점유권은 시효에 걸리지 아니한다(판례).","3":"맞음. 시효는 권리행사에 법률상의 장애사유가 없는 때로부터 진행한다(민법 제166조①).","4":"맞음. 정지조건부 권리는 조건이 성취된 때부터 시효가 진행된다(판례).","5":"맞음. 부작위를 목적으로 하는 채권의 시효는 위반행위를 한 때로부터 진행한다(민법 제166조②)."},"expl_sub":{}},{"num":25,"question":"소멸시효의 중단에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 채무자가 제기한 소에 대하여 채권자가 응소하여 그 소송에서 적극적으로 권리를 주장 하고 그것이 받아들여진 경우 재판상의 청구가 될 수 있다.","② 시효완성 전에 한 채무의 일부변제는 특별한 사정이 없는 한 시효중단사유가 될 수 있다.","③ 현존하지 않는 장래의 채권을 시효진행이 개시되기 전에 미리 승인하는 것도 허용된다.","④ 임의출석의 경우에 화해가 성립되지 아니한 때에는 1월내에 소를 제기하지 아니하면 시효중단의 효력이 없다.","⑤ 시효의 중단은 당사자 및 그 승계인 사이에만 효력이 있는 것이 원칙이다."],"sub_items":[],"expl_core":"현존하지 않는 장래의 채권을 시효 진행 개시 전에 미리 승인하는 것은 허용되지 않는다(판례). 소멸시효의 승인은 현재 존재하는 권리에 대한 채무자의 인식 표시여야 하기 때문이다. '허용된다'는 ③이 오류.","expl_choices":{"1":"맞음. 채무자가 제기한 소에 대하여 채권자가 응소하여 적극적으로 권리를 주장하고 그것이 받아들여진 경우, 재판상의 청구로서 시효중단 효력이 있다(판례).","2":"맞음. 시효완성 전에 한 채무의 일부변제는 특별한 사정이 없는 한 채무 전체에 대한 승인으로서 시효중단 사유가 될 수 있다(판례).","3":"틀림. 현존하지 않는 장래의 채권을 시효 진행 개시 전에 미리 승인하는 것은 허용되지 않는다(판례). 소멸시효 중단의 승인은 현재 존재하는 권리를 전제로 한다.","4":"맞음. 임의출석의 경우에 화해가 성립되지 아니한 때에는 1월 내에 소를 제기하지 아니하면 시효중단의 효력이 없다(민법 제173조).","5":"맞음. 시효의 중단은 당사자 및 그 승계인 사이에만 효력이 있는 것이 원칙이다(민법 제169조)."},"expl_sub":{}}]};
const YEARS=["2025","2024","2023","2022","2021"],CIR=["①","②","③","④","⑤"];
let curYr="2025",state={};
try{state=JSON.parse(localStorage.getItem("mb_st")||"{}");}catch(e){}
function save(){localStorage.setItem("mb_st",JSON.stringify(state));}
function ens(y,n){if(!state[y])state[y]={};if(!state[y][n])state[y][n]={sel:null,checked:false,correct:null};}
function renderTabs(){document.getElementById("yT").innerHTML=YEARS.map(y=>`<button class="ytab${y===curYr?" active":""}" onclick="sw('${y}')">${y}</button>`).join("");}
function sw(y){curYr=y;renderTabs();renderQs();upd();}
function upd(){let s=0,c=0,h=0;if(state[curYr])(QD[curYr]||[]).forEach(q=>{const t=state[curYr][q.num];if(!t||!t.checked)return;h++;if(t.correct){c++;s+=4;}});document.getElementById("sS").textContent=s;document.getElementById("sC").textContent=c;document.getElementById("sH").textContent=h;}
function resetAll(){if(!confirm("모든 회차 진행 상태를 초기화하겠습니까?"))return;state={};save();renderQs();upd();}
function renderQs(){document.getElementById("main").innerHTML=(QD[curYr]||[]).map(q=>card(q)).join("");}
function escH(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function bldEx(q){
  let h="";
  if(q.expl_core)h+=`<div class="esec ecore"><div class="esec-title">▸ 핵심정리</div><p>${escH(q.expl_core)}</p></div>`;
  const sk=Object.keys(q.expl_sub||{});
  if(sk.length){h+=`<hr class="ediv"><div class="esec"><div class="esec-title">▸ 지문별 해설</div>`;sk.forEach(k=>{const t=q.expl_sub[k]||"";const ok=t.startsWith("맞음");h+=`<div class="se"><span class="si">${escH(k)}</span><span class="${ok?"vok":"vno"}">${ok?"맞음":"틀림"}</span>${escH(t.replace(/^(맞음|틀림)[.\s]*/,""))}</div>`;});h+=`</div>`;}
  h+=`<hr class="ediv"><div class="esec"><div class="esec-title">▸ 선택지별 해설</div>`;
  q.choices.forEach((c,i)=>{const r=q.expl_choices[String(i+1)]||"";const ok=r.startsWith("맞음");h+=`<div class="ce"><span class="ci">${CIR[i]}</span><span class="${ok?"vok":"vno"}">${ok?"맞음":"틀림"}</span>${escH(r.replace(/^(맞음|틀림)[.\s]*/,""))}</div>`;});
  h+=`</div>`;return h;
}
function card(q){
  const yr=curYr;ens(yr,q.num);const st=state[yr][q.num];
  let cc="qcard";if(st.checked)cc+=(st.correct?" cor":" wrg");
  let qM=q.question,qC="";
  const qi=q.question.indexOf("?");
  if(qi>=0&&qi<q.question.length-1){qM=q.question.slice(0,qi+1).trim();const rw=q.question.slice(qi+1).trim();if(rw.length){if(rw.includes(" ○ ")||rw.startsWith("○")){const pts=rw.split(/\s*○\s*/).filter(Boolean);qC=`<div class="q-ctx">${pts.map(s=>`<span class="ci2">○ ${escH(s.trim())}</span>`).join("")}</div>`;}else qC=`<div class="q-ctx">${escH(rw)}</div>`;}}
  let sub="";if(q.sub_items&&q.sub_items.length)sub=`<div class="sub-items">${q.sub_items.map(s=>`<div>${escH(s)}</div>`).join("")}</div>`;
  const chs=q.choices.map((c,i)=>{const idx=i+1;let cls="choice";if(st.checked){cls+=" dis";if(idx===q.answer)cls+=" ca";else if(idx===st.sel)cls+=" wa";}else if(idx===st.sel)cls+=" sel";const dot=st.checked?(idx===q.answer?"✓":(idx===st.sel?"✗":"")):(idx===st.sel?"●":"");return`<div class="${cls}" onclick="pick(${q.num},${idx})"><div class="dot">${dot}</div><span>${escH(c)}</span></div>`;}).join("");
  const bD=st.checked?"disabled":"";const bT=st.checked?(st.correct?"✓ 정답":"✗ 오답"):"정답확인/해설";const eS=st.checked?" show":"";
  return`<div class="${cc}" id="qc-${q.num}"><div class="q-head"><span class="q-num">Q${q.num}</span><span class="q-text">${escH(qM)}</span></div>${qC}${sub}<div class="choices" id="ch-${q.num}">${chs}</div><button class="btn-chk" id="bt-${q.num}" onclick="chk(${q.num})" ${bD}>${bT}</button><div class="expl${eS}" id="ex-${q.num}">${st.checked?bldEx(q):""}</div></div>`;
}
function pick(num,idx){const yr=curYr;ens(yr,num);const st=state[yr][num];if(st.checked)return;st.sel=idx;save();const q=QD[yr].find(x=>x.num===num);document.getElementById("ch-"+num).innerHTML=q.choices.map((c,i)=>{const i2=i+1;return`<div class="choice${i2===idx?" sel":""}" onclick="pick(${num},${i2})"><div class="dot">${i2===idx?"●":""}</div><span>${escH(c)}</span></div>`;}).join("");}
function chk(num){const yr=curYr;ens(yr,num);const st=state[yr][num];if(st.checked)return;if(st.sel===null){alert("선택지를 먼저 선택해주세요.");return;}const q=QD[yr].find(x=>x.num===num);st.checked=true;st.correct=(st.sel===q.answer);save();document.getElementById("qc-"+num).className="qcard "+(st.correct?"cor":"wrg");document.getElementById("ch-"+num).innerHTML=q.choices.map((c,i)=>{const idx=i+1;let cls="choice dis";if(idx===q.answer)cls+=" ca";else if(idx===st.sel)cls+=" wa";return`<div class="${cls}"><div class="dot">${idx===q.answer?"✓":(idx===st.sel?"✗":"")}</div><span>${escH(c)}</span></div>`;}).join("");const bt=document.getElementById("bt-"+num);bt.disabled=true;bt.textContent=st.correct?"✓ 정답":"✗ 오답";const ex=document.getElementById("ex-"+num);ex.innerHTML=bldEx(q);ex.classList.add("show");upd();}
renderTabs();renderQs();upd();
</script>
</body>
