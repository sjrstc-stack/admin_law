<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[민법] 2021-2025 기출문제 초정밀해설</title>
<style>:root{--bg:#f5f6f8;--card:#fff;--border:#e2e5ea;--accent:#2f7d32;--accent-light:#e8f5e9;--cor:#2f9e44;--cor-bg:#ebfbee;--wrg:#c92a2a;--wrg-bg:#fff5f5;--text:#1c1c1e;--sub:#6b7280;--sel:#d8f3dc;--sel-b:#40c057;--expl-bg:#f1f8f1;--expl-b:#a9d9aa;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;font-size:14px;line-height:1.6}
#header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:7px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.h-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;max-width:860px;margin:0 auto}
.h-title{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
.year-tabs{display:flex;gap:3px}.ytab{padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;background:#fff;color:var(--sub)}
.ytab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats{display:flex;gap:5px;margin-left:auto;align-items:center}.sbox{display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:6px;border:1px solid var(--border);font-size:11px;background:#fff}
.sbox .lbl{color:var(--sub)}.sbox .val{font-weight:700}
.btn-reset{padding:3px 9px;border-radius:6px;border:1px solid #f03e3e;background:#fff;color:#f03e3e;font-size:11px;font-weight:600;cursor:pointer}
#main{max-width:860px;margin:0 auto;padding:10px 12px 40px}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.qcard.cor{border-left:3px solid var(--cor)}.qcard.wrg{border-left:3px solid var(--wrg)}
.q-head{display:flex;align-items:baseline;gap:7px;margin-bottom:9px}
.q-num{font-size:11px;font-weight:700;color:#fff;background:var(--accent);padding:1px 6px;border-radius:4px;flex-shrink:0}
.q-text{font-size:14px;font-weight:600;line-height:1.55}
.q-ctx{background:#f1f8f1;border:1px solid #a9d9aa;border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:8px 11px;margin:5px 0 9px;font-size:13px;line-height:1.75;color:#2b2d42}
.q-ctx .ci2{display:block;padding:1px 0}
.sub-items{background:#f8f9ff;border:1px solid #e0e5ff;border-radius:6px;padding:9px 11px;margin-bottom:9px;font-size:13px;line-height:1.7}
.choices{display:flex;flex-direction:column;gap:5px;margin-bottom:9px}
.choice{display:flex;align-items:flex-start;gap:7px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;user-select:none}
.choice:hover:not(.dis){background:var(--accent-light);border-color:#a9d9aa}
.choice.sel{background:var(--sel);border-color:var(--sel-b)}.choice.ca{background:var(--cor-bg);border-color:var(--cor)}.choice.wa{background:var(--wrg-bg);border-color:var(--wrg)}.choice.dis{cursor:default}
.dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;background:#fff;font-weight:700}
.choice.sel .dot{border-color:var(--sel-b);background:var(--sel-b);color:#fff}.choice.ca .dot{border-color:var(--cor);background:var(--cor);color:#fff}.choice.wa .dot{border-color:var(--wrg);background:var(--wrg);color:#fff}
.btn-chk{display:block;width:100%;padding:8px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px}
.btn-chk:hover:not(:disabled){background:#1b5e20}.btn-chk:disabled{background:#adb5bd;cursor:default}
.expl{display:none;background:var(--expl-bg);border:1px solid var(--expl-b);border-radius:6px;padding:11px 13px;font-size:13px;line-height:1.7}
.expl.show{display:block}.esec{margin-bottom:8px}.esec-title{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:5px}
.ecore p{color:#2b2d42}.ediv{border:none;border-top:1px dashed #a9d9aa;margin:8px 0}
.ce,.se{padding:4px 0;border-bottom:1px solid #d8f3dc;font-size:12.5px}.ce:last-child,.se:last-child{border-bottom:none}
.ci{font-weight:700;color:var(--accent);margin-right:3px}.si{font-weight:700;color:#6741d9;margin-right:3px}
.vok{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--cor-bg);color:var(--cor);margin-right:3px}
.vno{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--wrg-bg);color:var(--wrg);margin-right:3px}
@media(max-width:600px){.stats{gap:3px}.sbox{padding:2px 5px;font-size:10px}.ytab{padding:3px 7px;font-size:11px}}</style>
</head>
<body>
<div id="header">
  <div class="h-row">
    <span class="h-title">민법 기출</span>
    <div class="year-tabs" id="yT"></div>
    <div class="stats">
      <div class="sbox"><span class="lbl">점수</span>&nbsp;<span class="val" id="sS">0</span></div>
      <div class="sbox"><span class="lbl">정답</span>&nbsp;<span class="val" id="sC">0</span></div>
      <div class="sbox"><span class="lbl">체크</span>&nbsp;<span class="val" id="sH">0</span></div>
      <button class="btn-reset" onclick="resetAll()">전체리셋</button>
    </div>
  </div>
</div>
<div id="main"></div>
<script>
const QD={"2025":[{"num":1,"question":"관습법과 사실인 관습에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 미등기 무허가건물의 취득자에게는 소유권에 준하는 관습법상의 물권이 있다.","② 사실인 관습은 법원(法源)으로서 법령에 저촉되지 않는 한 법칙으로서의 효력이 있다.","③ 시효로 관습법상 분묘기지권을 취득한 사람은 토지소유자가 분묘기지에 관한 지료를 청구하면 그 청구한 날부터의 지료를 지급하여야 한다.","④ 관습법은 그 존재를 당사자가 주장, 증명하여야 하고, 법원이 직권으로 확정할 수 없다.","⑤ 사실인 관습은 관련 분야의 제정법이 강행규정이라도 특별한 사정이 없는 한 법률행위의 의사를 보충하는 기능으로서 재판의 자료로 할 수 있다."],"sub_items":[],"expl_core":"관습법=법원 직권 확정 가능. 사실인 관습=의사 보충(강행규정 위반 불가). 분묘기지권 지료=청구한 날부터.","expl_choices":{"1":"틀림. 미등기 무허가건물 취득자에게 소유권에 준하는 관습법상 물권은 인정되지 않는다(판례).","2":"틀림. 사실인 관습은 법원(法源)이 아니다.","3":"맞음. 분묘기지권자는 토지소유자가 지료를 청구한 날부터 지료를 지급해야 한다(판례).","4":"틀림. 관습법은 법원이 직권으로 확정할 수 있다.","5":"틀림. 사실인 관습은 강행규정에 위반되면 재판의 자료가 될 수 없다."},"expl_sub":{}},{"num":2,"question":"신의성실의 원칙에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 신의성실의 원칙은 당사자의 주장이 없더라도 법원이 직권으로 판단할 수 있다.","② 소멸시효를 이유로 한 채무자의 항변권 행사에는 신의성실의 원칙이 적용되지 않는다.","③ 무권대리인이 본인을 단독 상속한 경우, 본인의 지위에서 추인을 거절하더라도 신의성실의 원칙에 반하지 않는다.","④ 강행규정에 위반하여 계약을 체결한 자가 스스로 그 계약의 무효를 주장하는 것은 특별한 사정이 없는 한 신의성실의 원칙에 반한다.","⑤ 조건의 성취로 이익을 받을 당사자가 신의성실에 반하여 조건을 성취시키더라도, 상대방이그 조건이 성취하지 아니한 것으로 주장할 수는 없다."],"sub_items":[],"expl_core":"신의칙: 법원 직권 판단 가능. 소멸시효 항변에도 적용 가능. 무권대리인이 본인 단독 상속 시 추인 거절=신의칙 위반. 강행규정 위반 무효 주장=신의칙 위반 아님.","expl_choices":{"1":"맞음. 신의성실의 원칙은 법원이 직권으로 판단할 수 있다(판례).","2":"틀림. 소멸시효 항변에도 신의칙이 적용될 수 있다(판례).","3":"틀림. 무권대리인이 본인을 단독 상속한 경우, 추인 거절은 신의칙에 반한다(판례).","4":"틀림. 강행규정 위반 계약을 스스로 무효 주장하는 것은 신의칙에 반하지 않는다(판례).","5":"틀림. 신의성실에 반하여 조건을 성취시킨 경우 상대방은 불성취로 주장할 수 있다(민법 제150조①)."},"expl_sub":{}},{"num":3,"question":"법원에 의하여 부재자 甲의 재산관리인으로 선임된 乙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 乙은 관리할 甲의 재산목록을 작성해야 한다.","② 법원은 甲의 재산으로 乙에게 상당한 보수를 지급할 수 있다.","③ 乙은 법원의 허가가 없으면 부동산 소유권이전등기말소절차의 이행을 청구할 수 없다.","④ 법원은 甲 소유 부동산에 대한 乙의 처분행위를 사후 추인의 방법으로 허가할 수 있다.","⑤ 乙이 甲의 사망을 확인했더라도, 부재자 재산관리인으로서의 선임결정이 취소되지 않으면, 乙은 계속하여 그 권한을 행사할 수 있다."],"sub_items":[],"expl_core":"부재자 재산관리인: 보존행위=허가 불요, 처분행위=허가 필요. 소유권이전등기말소청구=보존행위로 허가 불요(판례).","expl_choices":{"1":"맞음. 재산관리인은 재산목록을 작성해야 한다(민법 제24조).","2":"맞음. 법원은 부재자 재산으로 관리인에게 보수를 지급할 수 있다.","3":"틀림. 부동산 소유권이전등기말소청구는 보존행위이므로 법원 허가 없이 청구할 수 있다(판례).","4":"맞음. 법원은 처분행위에 대해 사후 추인 방식으로 허가할 수 있다.","5":"맞음. 부재자 사망이 확인되어도 선임결정이 취소되지 않으면 관리인의 권한이 유지된다."},"expl_sub":{}},{"num":4,"question":"제한능력자 甲이 법정대리인 乙의 동의가 없었음에도 있었던 것처럼 속이고 丙과 X 토지에 대하여 매매계약을 체결하였다. 이에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① ㄹ","② ㄱ, ㄷ","③ ㄷ, ㄹ","④ ㄱ, ㄴ, ㄷ","⑤ ㄱ, ㄴ, ㄷ, ㄹ"],"sub_items":["ㄱ. 속임수를 쓴 甲이 미성년자라면, 乙은 매매계약을 취소할 수 없다.","ㄴ. 甲의 취소권이 배제되기 위해서는 甲이 속임수를 쓴 사실을 丙이 증명해야 한다.","ㄷ. 甲이 자신을 단순히 능력자라고 말하는 것은 취소권을 배제할 수 있는 속임수에 해당되지 않는다.","ㄹ. 속임수를 쓴 甲이 피성년후견인이라면, 甲은 매매계약을 취소할 수 없다."],"expl_core":"제한능력자의 속임수(민법 제17조): 미성년자·피성년후견인 모두 취소권 배제. 법정대리인도 취소 불가. '능력자'라고 단순히 말하는 것은 속임수 해당 안 됨(판례). 속임수 입증책임=상대방.","expl_choices":{"1":"틀림. ㄹ만으로는 정답 조합이 부족하다.","2":"틀림. ㄴ을 누락했다.","3":"틀림. ㄹ이 부적절하다.","4":"맞음. ㄱ, ㄴ, ㄷ 모두 옳은 설명이다.","5":"틀림. ㄹ까지 포함하면 과도하다."},"expl_sub":{"ㄱ":"맞음. 미성년자가 속임수를 쓴 경우 법정대리인 乙도 취소할 수 없다(민법 제17조).","ㄴ":"맞음. 속임수 사실의 증명책임은 상대방 丙에게 있다.","ㄷ":"맞음. 단순히 능력자라고 말하는 것만으로는 속임수에 해당하지 않는다(판례).","ㄹ":"틀림. ㄹ의 결론은 맞지만 정답 조합(ㄱ, ㄴ, ㄷ)에 포함되지 않는다."}},{"num":5,"question":"민법상 한정후견인 제도에 관한 설명으로 옳지 않은 것은?","answer":2,"answer_str":"2","choices":["① 가정법원은 피한정후견인이 한정후견인의 동의를 받아야 하는 행위의 범위를 정할 수있다.","② 질병, 장애, 노령 등으로 인한 정신적 제약 때문에 사무 처리 능력이 지속적으로 결여된 사람을 위한 제도이다.","③ 가정법원이 한정후견개시의 심판을 할 때 피성년후견의 경우에서와 마찬가지로 본인의 의사를 고려하여야 한다.","④ 피한정후견인의 행위에서 한정후견인의 동의가 필요한 범위에 대한 변경 청구는 검사나 지방자치단체의 장도 할 수 있다.","⑤ 피한정후견인이 한 법률행위가 일상생활에 필요하고 그 대가가 과도하지 않다면, 그 법률행위는 한정후견인이 취소할 수 없다."],"sub_items":[],"expl_core":"한정후견(민법 제12조): 사무처리 능력 '부족'한 사람 대상. 지속적 결여=성년후견. 일상생활 행위=취소 불가. 동의 범위 변경=검사·지방자치단체장도 청구 가능.","expl_choices":{"1":"맞음. 가정법원은 동의가 필요한 행위의 범위를 정할 수 있다(민법 제13조).","2":"틀림. 사무처리 능력이 지속적으로 결여된 사람은 성년후견 대상이다. 한정후견은 능력이 '부족'한 사람 대상이다.","3":"맞음. 한정후견 심판 시에도 본인의 의사를 고려해야 한다.","4":"맞음. 검사나 지방자치단체장도 동의 범위 변경 청구를 할 수 있다.","5":"맞음. 일상생활에 필요하고 대가가 과도하지 않은 행위는 취소할 수 없다(민법 제13조④)."},"expl_sub":{}},{"num":6,"question":"민법상 법인의 정관에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 사단법인의 정관은 자치법규가 아니라 계약이다.","② 재단법인의 정관은 특별한 사정이 없는 한, 그 변경방법을 정관에 정한 때에 한하여 변경할 수 있다.","③ 이사의 대표권에 대한 제한은 이를 정관에 기재하지 않더라도 등기하면 효력이 있다.","④ 사단법인의 정관 변경은 법원의 허가를 얻지 않으면 효력이 없다.","⑤ 재단법인의 존립시기나 해산사유는 정관의 필요적 기재사항이다."],"sub_items":[],"expl_core":"재단법인 정관 변경: 변경방법을 정관에 정한 때에만 가능. 사단법인 정관=자치법규(계약 아님). 이사 대표권 제한=정관 기재+등기 필요. 사단법인 정관 변경=총회 결의+주무관청 허가.","expl_choices":{"1":"틀림. 사단법인의 정관은 계약이 아니라 자치법규이다.","2":"맞음. 재단법인의 정관은 변경방법을 정관에 정한 때에만 변경 가능하다(민법 제45조).","3":"틀림. 이사의 대표권 제한은 정관에 기재해야 하며, 정관 기재 없이 등기만으로는 효력이 없다(민법 제60조).","4":"틀림. 사단법인 정관 변경은 주무관청 허가가 필요하다. 법원 허가가 아니다.","5":"틀림. 재단법인의 존립시기·해산사유는 임의적 기재사항이다."},"expl_sub":{}},{"num":7,"question":"민법상 사단법인에 관한 규정 중 비법인사단에 유추적용할 수 없는 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 임시이사의 선임에 관한 제63조","② 법인의 권리능력에 관한 제34조","③ 법인의 해산에 따른 청산인을 정하는 제82조","④ 이사의 대표권에 대한 제한의 대항요건을 규정한 제60조","⑤ 대표자의 불법행위에 대한 법인의 책임을 규정한 제35조 제1항"],"sub_items":[],"expl_core":"비법인사단 유추적용 가능: 제34조(권리능력), 제35조①(불법행위), 제63조(임시이사), 제82조(청산인). 불가: 제60조(대표권 제한 등기 대항)—등기 능력 없음.","expl_choices":{"1":"맞음. 임시이사 선임 규정(제63조)은 유추적용 가능하다(판례).","2":"맞음. 권리능력 범위(제34조)는 유추적용 가능하다.","3":"맞음. 청산인 규정(제82조)은 유추적용 가능하다.","4":"틀림. 대표권 제한의 등기 대항요건(제60조)은 비법인사단에 유추적용 불가. 등기 능력이 없기 때문이다(판례).","5":"맞음. 불법행위능력(제35조①)은 유추적용 가능하다(판례)."},"expl_sub":{}},{"num":8,"question":"민법상 법인의 소멸에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 사단법인은 사원이 없게 되거나 총회의 결의로도 해산한다.","② 청산종결등기가 마쳐진 경우에도 청산사무가 종료되지 않았다면 청산법인으로 존속한다.","③ 청산인은 채권자에 대하여 채권신고를 최고해야 하고, 알고 있는 채권자는 청산에서 제외할 수 있다.","④ 법인이 파산이 아닌 사유로 해산한 경우 정관 또는 총회의 결의로 달리 정한 바가 없으면, 이사가 청산인이 된다.","⑤ 민법상의 청산절차에 관한 규정은 강행규정이므로 이에 반하는 잔여재산의 처분행위는 특별한 사정이 없는 한 무효이다."],"sub_items":[],"expl_core":"법인 청산: 알고 있는 채권자=각별히 최고해야 하며 청산에서 제외 불가(민법 제88조②). 청산종결등기 후에도 사무 미종료 시 법인 존속.","expl_choices":{"1":"맞음. 사원이 없게 되거나 총회 결의로 해산한다(민법 제77조).","2":"맞음. 청산종결등기 후에도 청산사무가 종료되지 않았다면 법인은 존속한다(판례).","3":"틀림. 알고 있는 채권자는 청산에서 제외할 수 없고 각별히 최고해야 한다(민법 제88조②).","4":"맞음. 파산 외의 사유로 해산 시 이사가 당연 청산인이 된다(민법 제82조).","5":"맞음. 청산절차 규정은 강행규정이므로 이에 반하는 처분은 무효이다(판례)."},"expl_sub":{}},{"num":9,"question":"주물과 종물에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 주물과 종물은 동일한 소유자에 속한 것으로 법률상 하나의 물건으로 취급된다.","② 주물 소유자의 상용에 공여되고 있는 물건이라도 주물 자체의 효용과 직접 관계가 없다면 종물이 될 수 없다.","③ 주물을 처분할 때 특약으로 종물을 제외할 수 없고 종물만을 별도로 처분할 수도 없다.","④ 주물과 종물의 관계에 관한 법리는 주된 권리와 종된 권리 상호간에는 적용되지 않는다.","⑤ 종물은 주물의 처분에 따른다는 법률효과는 주물의 권리관계가 공법상 처분에 의하여 생긴 경우에는 적용되지 않는다."],"sub_items":[],"expl_core":"종물(민법 제100조): 주물의 효용을 직접 돕는 독립 물건. 주물 자체 효용과 무관하면 종물 불인정. 특약으로 분리 가능. 주·종 법리는 권리 간에도 유추적용.","expl_choices":{"1":"틀림. 주물과 종물은 각각 독립된 물건이며 법률상 하나의 물건이 아니다.","2":"맞음. 주물 자체의 효용과 직접 관계없는 물건은 종물이 될 수 없다(판례).","3":"틀림. 특약으로 종물을 주물 처분에서 제외하거나 종물만 별도 처분할 수 있다.","4":"틀림. 주·종 법리는 주된 권리와 종된 권리 사이에도 유추적용된다(판례).","5":"틀림. 공법상 처분에 의한 경우에도 종물이 주물에 따르는 법리가 적용된다(판례)."},"expl_sub":{}},{"num":10,"question":"법률행위에 관한 설명으로 옳지 않은 것은?","answer":4,"answer_str":"4","choices":["① 법률행위인 계약의 자유는 사적 자치의 주요한 발현 형식이다.","② 계약은 청약과 승낙의 의사표시가 합치하여 성립하는 법률행위이다.","③ 단독행위는 법률행위의 일종으로서 법률효과를 발생시키는 법률요건이다.","④ 법률행위인 유언과 상속은 법률효과의 발생에 의사표시가 필수적이라는 점에서 공통점이 있다.","⑤ 종기가 있는 법률행위는 기한이 도래한 때로부터 그 효력을 잃는다."],"sub_items":[],"expl_core":"법률행위의 종류: 계약(쌍방행위), 단독행위, 합동행위. 상속은 법률사실. 종기 도래 시 효력 상실.","expl_choices":{"1":"맞음. 계약의 자유는 사적 자치의 핵심 발현이다.","2":"맞음. 계약은 청약과 승낙의 합치로 성립한다.","3":"맞음. 단독행위도 법률효과를 발생시키는 법률요건이다.","4":"틀림. 상속은 법률의 규정에 의해 발생하는 법률사실로, 의사표시가 필수적이지 않다.","5":"맞음. 종기 도래 시 효력이 소멸한다(민법 제152조②)."},"expl_sub":{}},{"num":11,"question":"단독행위가 아닌 것은?","answer":3,"answer_str":"3","choices":["① 상계","② 유언","③ 사인증여","④ 소유권의 포기","⑤ 법정해제권의 행사"],"sub_items":[],"expl_core":"단독행위: 상계, 유언, 소유권 포기, 취소, 해제, 추인, 동의 등. 사인증여=증여계약의 일종(계약)으로 단독행위 아님.","expl_choices":{"1":"맞음. 상계는 단독행위이다.","2":"맞음. 유언은 단독행위이다.","3":"틀림. 사인증여는 증여자와 수증자 간의 계약이므로 단독행위가 아니다.","4":"맞음. 소유권 포기는 단독행위이다.","5":"맞음. 법정해제권의 행사는 단독행위이다."},"expl_sub":{}},{"num":12,"question":"반사회질서의 법률행위에 해당하지 않는 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 매도인의 배임행위에 적극 가담한 이중매매계약","② 도박자금에 제공할 목적으로 한 금전소비대차계약","③ 형사사건의 변호에서 무죄 판결을 받기 위해 성공보수를 약정하는 계약","④ 소송에서 사실대로 증언해 주는 대가로 통상적이지 않은 거액을 받기로 한 약정","⑤ 해외파견 교육연수를 받은 근로자가 일정기간 소속 회사에 근무하기로 한 약정"],"sub_items":[],"expl_core":"반사회질서(민법 제103조) 비해당: 해외 연수 후 의무 근무 약정(유효, 판례). 해당: 이중매매 배임 가담, 도박자금 대여, 형사 성공보수, 허위증언 대가.","expl_choices":{"1":"맞음. 이중매매에서 배임행위에 적극 가담한 계약은 반사회질서 법률행위(판례).","2":"맞음. 도박자금 조달 목적 금전소비대차는 반사회질서 법률행위(판례).","3":"맞음. 형사사건 무죄 판결을 위한 성공보수 약정은 반사회질서 법률행위(판례).","4":"맞음. 사실대로 증언에 통상 기준을 넘는 거액 대가 약정은 반사회질서 법률행위.","5":"틀림. 해외 연수 후 의무 근무 약정은 반사회질서에 해당하지 않아 유효하다(판례)."},"expl_sub":{}},{"num":13,"question":"불공정한 법률행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 특별한 사정이 없는 한 경매에도 불공정한 법률행위에 관한 민법 제104조가 적용된다.","② 매매계약이 약정된 대금의 과다로 인해 불공정한 법률행위에 해당하여 무효인 경우, 무효행위의 전환에 관한 민법 제138조는 적용될 여지가 없다.","③ 불공정한 법률행위는 원칙적으로 무효행위의 추인에 의해서 유효로 될 수 없다.","④ 무상 증여계약도 불공정한 법률행위가 될 수 있다.","⑤ 불공정한 법률행위로서 무효인 경우에 선의의 제3자에 대해서는 무효를 주장할 수 없다."],"sub_items":[],"expl_core":"불공정 법률행위(민법 제104조): 궁박·경솔·무경험+현저한 불균형. 경매 불적용. 무상계약(증여) 불적용. 추인 불가(원칙). 선의 제3자에게도 무효 주장 가능.","expl_choices":{"1":"틀림. 경매에는 불공정한 법률행위 규정이 적용되지 않는다(판례).","2":"틀림. 불공정 법률행위로 무효여도 무효행위의 전환이 가능하다(판례).","3":"맞음. 불공정한 법률행위는 원칙적으로 추인에 의해 유효로 될 수 없다(판례).","4":"틀림. 무상 증여는 급부 간 불균형이 없으므로 불공정 법률행위 성립 불가(판례).","5":"틀림. 불공정 법률행위로 무효인 경우 선의 제3자에게도 무효를 주장할 수 있다."},"expl_sub":{}},{"num":14,"question":"진의 아닌 표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 진의 아닌 의사표시는 원칙적으로 표시된 대로 법적 효과가 발생한다.","② 진의 아님을 알았다는 사실은 의사표시의 유효를 주장하는 사람이 증명해야 한다.","③ 진의는 특정 내용의 의사표시를 하고자 하는 표의자의 생각이지 표의자가 진정으로 마음속에서 바라는 사항을 뜻하는 것은 아니다.","④ 표시가 진의와 다름을 표의자가 알고 있다는 점은 착오와 구별된다.","⑤ 표시와 진의의 불일치가 상대방과 합의된 것이라면 통정허위표시이다."],"sub_items":[],"expl_core":"비진의 표시(민법 제107조): 원칙 유효. 상대방이 알았거나 알 수 있었을 때 무효. '알았다' 증명책임=무효 주장자(표의자). 진의=표시하려는 의사.","expl_choices":{"1":"맞음. 비진의 표시는 원칙적으로 표시된 대로 유효하다.","2":"틀림. 상대방이 진의 아님을 알았다는 사실은 무효를 주장하는 자(표의자)가 증명해야 한다.","3":"맞음. 진의는 표시하고자 하는 의사이지 마음속으로 바라는 것이 아니다(판례).","4":"맞음. 비진의 표시는 표의자가 불일치를 알고 있다는 점에서 착오와 구별된다.","5":"맞음. 불일치가 상대방과 합의된 것이면 통정허위표시이다."},"expl_sub":{}},{"num":15,"question":"사기에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 의사표시의 상대방이 없는 경우라면, 기망행위를 누가 했는지에 상관없이 취소할 수 있다.","② 상대방의 대리인에 의한 사기는 민법 제110조 제2항에서 말하는 제3자의 사기에 해당하지 않는다.","③ 고지의무가 있는 사람이 알리지 않고 일부러 침묵하였다면, 부작위라도 기망행위가 될수 있다.","④ 기망행위로 착오에 빠지게 된 경우이므로, 의사와 표시의 불일치가 아니라 의사표시의 동기에 착오가 있는 것이다.","⑤ 표의자에게 특정한 의사표시를 하도록 하는 것을 넘어 재산상의 손실을 주려는 기망 행위자의 고의가 있어야 한다."],"sub_items":[],"expl_core":"사기의 고의: 기망 고의+착오 유발 고의+착오로 인한 의사표시 고의. 재산 손실 고의는 불필요. 고지의무 위반도 사기 가능. 상대방 대리인의 사기=상대방 사기.","expl_choices":{"1":"맞음. 의사표시 상대방 없는 경우 기망행위 주체 불문하고 취소 가능.","2":"맞음. 상대방의 대리인 사기는 제3자 사기가 아닌 상대방 사기로 취급된다(판례).","3":"맞음. 고지의무자의 고의적 침묵도 기망행위가 될 수 있다(판례).","4":"맞음. 사기에 의한 의사표시는 동기의 착오 문제이다.","5":"틀림. 사기의 고의는 착오 유발 고의와 그로 인한 의사표시 고의로 충분하며, 재산상 손실 목적은 불요이다."},"expl_sub":{}},{"num":16,"question":"표현대리에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 권한을 넘은 표현대리에서 법정대리권도 기본 대리권이 될 수 있다.","② 대리행위가 강행법규 위반으로 무효이더라도 표현대리 법리가 적용된다.","③ 처음부터 아무 대리권도 없었던 사람의 대리행위에 대하여 대리권 소멸 후의 표현대리를 유추 적용할 수 있다.","④ 대리권 수여의 표시로 인한 표현대리에서 대리권 존재에 대한 상대방의 선의 및 무과실은 요건이 아니다.","⑤ 표현대리의 성립으로 본인이 이행책임을 질 때 상대방의 과실이 있는 경우에는 과실상 계의 법리에 따라 본인의 책임이 경감된다."],"sub_items":[],"expl_core":"표현대리: 법정대리권도 기본 대리권 가능. 강행법규 위반 무효 시 표현대리 불적용. 과실상계 불가. 대리권 수여 표시=선의·무과실 요건.","expl_choices":{"1":"맞음. 권한을 넘은 표현대리에서 기본 대리권에 법정대리권도 포함된다(판례).","2":"틀림. 대리행위가 강행법규 위반으로 무효이면 표현대리 법리가 적용되지 않는다(판례).","3":"틀림. 처음부터 아무 대리권도 없던 경우에는 대리권 소멸 후 표현대리 유추적용 불가(판례).","4":"틀림. 대리권 수여 표시 표현대리에서도 상대방의 선의·무과실이 요건이다(민법 제125조).","5":"틀림. 표현대리 성립 시 상대방의 과실을 이유로 과실상계할 수 없다(판례)."},"expl_sub":{}},{"num":17,"question":"민법상 법률행위의 무효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 법률행위의 일부분이 무효인 때에는 그 전부를 무효로 하지만, 무효부분이 없더라도 법률행위를 하였을 것이라고 인정될 때에는 나머지 부분은 무효가 되지 않는다.","② 무효인 법률행위가 다른 법률행위의 요건을 구비하고, 당사자가 무효를 알았더라면 다른 법률행위를 하는 것을 의욕하였으리라고 인정될 때에는 다른 법률행위로서 효력을 가진다.","③ 무효인 법률행위는 추인하여도 효력이 생기지 않지만, 당사자가 무효임을 알고 추인한 때에는 새로운 법률행위로 본다.","④ 토지거래 허가구역 내 토지에 대하여 허가를 받기 전에 한 매매가 처음부터 허가를 배제하는 내용의 계약인 경우, 그 매매는 유동적 무효이다.","⑤ 무권리자가 타인의 권리를 처분하는 계약을 한 경우, 권리자가 추인하면 그 계약의 효과는 원칙적으로 계약체결시로 소급한다."],"sub_items":[],"expl_core":"허가 배제 목적 토지거래계약=확정적 무효. 일부 무효=원칙 전부 무효. 무효 추인=새로운 법률행위.","expl_choices":{"1":"맞음. 민법 제137조 일부무효 원칙이다.","2":"맞음. 무효행위의 전환(민법 제138조)이다.","3":"맞음. 무효 추인은 새로운 법률행위로 본다(민법 제139조 단서).","4":"틀림. 처음부터 허가를 배제하는 내용의 계약은 확정적 무효이다(판례). 유동적 무효라는 설명이 틀리다.","5":"맞음. 무권리자 처분행위를 권리자가 추인하면 계약체결 시로 소급하여 효력 발생(판례)."},"expl_sub":{}},{"num":18,"question":"미성년자의 매매계약을 미성년을 이유로 취소하는 경우, 민법 제146조가 규정하는 취소권의 행사기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 취소권은 추인할 수 있는 날로부터 3년 내에, 매매계약을 한 날로부터 10년 내에 행사해야 한다.","② 추인할 수 있는 날은 취소 원인의 종료로 취소권행사에 관한 장애가 없어져서 취소권자가 추인할 수도 있고 취소할 수도 있는 상태가 된 때이다.","③ 미성년자가 성년에 이른 날로부터 3년, 법정대리인이 미성년자의 매매계약을 안 날로부터 3년, 그 매매계약을 한 날로부터 10년 중 어느 것이든 먼저 경과하면 취소권을 행사할 수 없다.","④ 민법 제146조의 취소권 소멸 규정은 제척기간이 아니라 소멸시효기간에 관한 것이다.","⑤ 취소권은 재판상이든 재판외이든 민법 제146조가 규정하는 기간 내에 행사하면 된다."],"sub_items":[],"expl_core":"취소권 행사기간(민법 제146조): 추인 가능일부터 3년, 법률행위한 날부터 10년. 제척기간(소멸시효 아님). 재판상·재판 외 모두 행사 가능.","expl_choices":{"1":"맞음. 추인 가능일부터 3년, 행위일부터 10년이다.","2":"맞음. 추인 가능일=취소 원인 소멸 후 자유롭게 의사결정 가능한 때.","3":"맞음. 미성년자=성년 달한 날부터 3년, 법정대리인이 안 날부터 3년, 행위일부터 10년.","4":"틀림. 민법 제146조는 소멸시효가 아닌 제척기간이다(판례).","5":"맞음. 취소권은 재판상·재판 외 모두 기간 내 행사 가능하다."},"expl_sub":{}},{"num":19,"question":"취소할 수 있는 법률행위의 법정추인 사유에 해당하지 않는 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 취소권자 상대방의 이행청구","② 취소권자의 전부나 일부 이행","③ 경개계약","④ 취소권자의 저당권 설정행위","⑤ 취소권자의 강제집행"],"sub_items":[],"expl_core":"법정추인(민법 제145조): 전부·일부 이행, 이행청구(취소권자→상대방), 경개, 담보제공, 강제집행. 상대방이 취소권자에게 이행청구하는 것은 사유 아님.","expl_choices":{"1":"틀림. 상대방의 이행청구(상대방→취소권자)는 법정추인 사유가 아니다.","2":"맞음. 취소권자의 전부·일부 이행은 법정추인 사유이다(민법 제145조①).","3":"맞음. 경개계약은 법정추인 사유이다(민법 제145조③).","4":"맞음. 담보제공(저당권 설정)은 법정추인 사유이다(민법 제145조④).","5":"맞음. 강제집행은 법정추인 사유이다(민법 제145조⑥)."},"expl_sub":{}},{"num":20,"question":"법률행위의 조건에 관한 설명으로 옳은 것은?","answer":5,"answer_str":"5","choices":["① 해제조건이 있는 법률행위는 조건이 성취한 때부터 효력이 생긴다.","② 조건의 성취가 미정한 권리의무는 일반규정에 의해 처분, 상속 또는 담보로 할 수 없다.","③ 선량한 풍속 기타 사회질서에 위반한 조건의 법률행위는 조건이 없는 법률행위이다.","④ 해제조건이 법률행위의 당시에 이미 성취할 수 없는 것인 경우 그 법률행위는 무효이다.","⑤ 기한은 특별한 사정이 없는 한 채무자의 이익을 위한 것으로 추정한다."],"sub_items":[],"expl_core":"조건: 정지조건=성취 시 효력 발생, 해제조건=성취 시 효력 소멸. 불법조건=무효. 불능해제조건=조건 없는 행위. 기한은 채무자 이익 추정.","expl_choices":{"1":"틀림. 해제조건 성취 시 효력이 소멸한다. 정지조건 성취 시 효력이 생긴다.","2":"틀림. 조건부 권리의무는 처분·상속·담보 가능하다(민법 제149조).","3":"틀림. 불법조건 법률행위는 무효이다(민법 제151조①).","4":"틀림. 불능 해제조건 법률행위는 조건 없는 법률행위로 유효하다(민법 제151조②).","5":"맞음. 기한은 특별한 사정이 없는 한 채무자의 이익을 위한 것으로 추정한다(민법 제153조①)."},"expl_sub":{}},{"num":21,"question":"민법상 기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 기간의 계산은 법령, 재판상의 처분 또는 법률행위에 다른 정한 바가 없으면 민법의 규정에 의한다.","② 민법의 기간에 관한 규정은 사법관계뿐만 아니라 공법관계에도 적용된다.","③ 나이는 출생일을 산입하여 만(滿) 나이로 계산한다.","④ 기간을 일, 주, 월 또는 년으로 정한 때는 초일 불산입의 원칙이 적용되어 당사자간의 합의에 의해 이와 달리 정할 수 없다.","⑤ 기간의 말일이 토요일 또는 공휴일에 해당한 때는 기간은 그 익일로 만료한다."],"sub_items":[],"expl_core":"기간 계산: 초일 불산입 원칙(강행규정 아님, 합의로 달리 정할 수 있음). 말일 토요일·공휴일이면 익일 만료. 나이는 출생일 산입하여 만 나이 계산.","expl_choices":{"1":"맞음. 민법 제155조.","2":"맞음. 기간 규정은 사법·공법 모두 적용된다.","3":"맞음. 나이는 출생일 산입 만 나이 계산(민법 제158조).","4":"틀림. 초일 불산입 원칙은 강행규정이 아니어서 당사자 합의로 달리 정할 수 있다.","5":"맞음. 말일이 토요일·공휴일이면 익일로 만료한다(민법 제161조)."},"expl_sub":{}},{"num":22,"question":"소멸시효와 제척기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 소멸시효의 이익은 미리 포기할 수 있다.","② 소멸시효는 그 기산일에 소급하여 효력이 생긴다.","③ 제척기간이 경과한 때부터 장래에 향하여 권리가 소멸한다.","④ 제척기간의 기산점은 특별한 사정이 없는 한 원칙적으로 권리가 발생한 때이다.","⑤ 제척기간이 도과했는지 여부는 당사자의 주장이 없더라도 법원이 직권으로 조사하여 재판에 고려해야 한다."],"sub_items":[],"expl_core":"소멸시효: 미리 포기 불가(민법 제184조), 기산일 소급 효력(제167조). 제척기간: 장래 소멸, 기산점=권리 발생 시, 법원 직권 조사.","expl_choices":{"1":"틀림. 소멸시효의 이익은 미리 포기할 수 없다(민법 제184조①).","2":"맞음. 소멸시효는 기산일에 소급하여 효력이 생긴다(민법 제167조).","3":"맞음. 제척기간 경과 시 장래를 향해 권리가 소멸한다.","4":"맞음. 제척기간의 기산점은 원칙적으로 권리 발생 시이다.","5":"맞음. 제척기간 도과 여부는 법원이 직권으로 조사한다."},"expl_sub":{}},{"num":23,"question":"민법상 3년의 소멸시효 기간의 적용을 받는 채권이 아닌 것은?","answer":5,"answer_str":"5","choices":["① 이자 기타 1년 이내의 기간으로 정한 금전지급채권","② 의사의 치료에 관한 채권","③ 도급받은 자의 공사에 관한 채권","④ 변호사의 직무에 관한 채권","⑤ 판결에 의하여 확정된 채권"],"sub_items":[],"expl_core":"3년 소멸시효(민법 제163조): 이자·1년 이내 금전채권, 의사 치료비, 도급 공사비, 변호사·변리사 직무비 등. 판결 확정 채권=10년(제165조).","expl_choices":{"1":"맞음. 이자 기타 1년 이내 금전채권은 3년 시효(민법 제163조①).","2":"맞음. 의사의 치료비는 3년 시효(민법 제163조②).","3":"맞음. 도급받은 자의 공사비는 3년 시효(민법 제163조③).","4":"맞음. 변호사의 직무비는 3년 시효(민법 제163조⑤).","5":"틀림. 판결로 확정된 채권은 10년 소멸시효가 적용된다(민법 제165조①)."},"expl_sub":{}},{"num":24,"question":"소멸시효의 기산점에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 동시이행의 항변권이 붙은 채권의 소멸시효는 이행기부터 진행한다.","② 이행불능으로 인한 전보배상청구권의 소멸시효는 이행불능시부터 진행한다.","③ 기한의 정함이 없는 채권의 소멸시효는 채권이 성립한 때부터 진행한다.","④ 형성권적 기한이익 상실의 특약이 있는 할부채무는 1회의 불이행시부터 바로 전액에 대해 소멸시효가 진행한다.","⑤ 부작위를 목적으로 하는 채권의 소멸시효는 위반행위를 한 때부터 진행한다."],"sub_items":[],"expl_core":"소멸시효 기산점: 권리 행사 가능한 때. 동시이행 항변권 있어도 이행기부터 진행(판례). 형성권적 기한이익 상실 특약: 채권자가 상실 주장한 때부터 전액에 대해 진행.","expl_choices":{"1":"맞음. 동시이행 항변권 있는 채권도 이행기부터 소멸시효 진행(판례).","2":"맞음. 이행불능으로 인한 전보배상청구권은 이행불능 시부터 진행.","3":"맞음. 기한 정함 없는 채권은 성립 시부터 진행(민법 제166조).","4":"틀림. 형성권적 기한이익 상실 특약에서는 채권자가 상실을 주장한 때부터 전액에 대해 시효가 진행한다. 1회 불이행 즉시 자동으로 진행하지는 않는다(판례).","5":"맞음. 부작위 채권의 시효는 위반행위 시부터 진행(민법 제166조②)."},"expl_sub":{}},{"num":25,"question":"소멸시효 중단에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 재판상의 청구는 그 소송이 각하, 기각 또는 취하된 경우에는 그로부터 6월 내에 다시 재판상의 청구 등을 하지 않는 한 시효중단의 효력이 없다.","② 시효중단의 효력있는 승인은 상대방의 권리에 관한 처분의 능력이나 권한이 있음을 요한다.","③ 시효의 중단은 원칙적으로 당사자 및 그 승계인간에만 효력이 있다.","④ 압류는 시효의 이익을 받은 자에 대해 하지 않은 때에는 이를 그에게 통지한 후가 아니면 시효중단의 효력이 없다.","⑤ 재판상의 청구로 인해 중단한 시효는 재판이 확정된 때부터 새로이 진행한다. 2024년도 제12회 행정사 1차 1교시 A형 ( 22 - 1 )"],"sub_items":[],"expl_core":"소멸시효 중단: 승인은 처분 능력·권한 불요(민법 제177조). 재판상 청구 각하·기각·취하 시 6개월 내 재청구 없으면 중단 효력 없음.","expl_choices":{"1":"맞음. 소 각하·기각·취하된 경우 6개월 내 재청구 없으면 시효중단 효력 없다(민법 제170조).","2":"틀림. 시효중단 효력 있는 승인은 처분 능력이나 권한이 없어도 된다(민법 제177조).","3":"맞음. 시효완성 전 압류·가압류·가처분은 채무자에 통지하지 않으면 중단 효력 없다(민법 제176조).","4":"맞음. 최고 후 6개월 내 재판상 청구 등 해야 시효중단 효력이 있다(민법 제174조).","5":"맞음. 연대채무자 1인에 대한 이행청구는 다른 연대채무자에게도 효력이 있다(민법 제416조)."},"expl_sub":{}}],"2024":[{"num":1,"question":"신의성실의 원칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 신의칙 위반 여부는 당사자의 주장이 없더라도 법원이 직권으로 판단할 수 있다.","② 사정변경의 원칙에서의 사정이란 계약을 체결하게 된 일방 당사자의 주관적ㆍ개인적 사정을 의미한다.","③ 실효의 원칙은 공법관계인 권력관계에도 적용될 수 있다.","④ 여행계약상 기획여행업자는 여행자의 안전을 확보하기 위한 합리적 조치를 할 신의칙상 안전배려의무가 있다.","⑤ 주로 자기의 채무 이행만을 회피하기 위한 수단으로 동시이행항변권을 행사하는 경우, 그 항변권의 행사는 권리남용이 될 수 있다."],"sub_items":[],"expl_core":"사정변경 원칙의 '사정'이란 계약의 기초가 된 객관적 사정을 말하며, 일방 당사자의 주관적·개인적 사정이 아니다. 신의칙은 법원이 직권으로 판단 가능하고, 실효 원칙은 공법관계에도 적용될 수 있다. 이 문제의 핵심은 사정변경의 '사정' 개념 오류를 찾는 것이다.","expl_choices":{"1":"맞음. 신의칙 위반 여부는 당사자의 주장 없이도 법원이 직권으로 판단할 수 있다(판례).","2":"틀림. 사정변경 원칙에서의 '사정'은 계약을 체결하게 된 기초가 된 객관적 사정을 의미한다. '일방 당사자의 주관적·개인적 사정'이라는 서술이 함정이다(판례).","3":"맞음. 실효의 원칙은 사법관계뿐 아니라 공법관계인 권력관계에도 적용될 수 있다(판례).","4":"맞음. 기획여행업자는 여행자 안전을 확보하기 위한 합리적 조치를 할 신의칙상 안전배려의무가 있다(판례).","5":"맞음. 자기 채무 이행만 회피하기 위해 동시이행항변권을 행사하는 것은 권리남용이 될 수 있다(판례)."},"expl_sub":{}},{"num":2,"question":"의사무능력자 甲은 乙로부터 금전을 차용하는 소비대차계약을 乙과 체결하고 차용금을 전부 수령하였다. 이에 관한 설명으로 옳지 않은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① ㄴ","② ㄷ","③ ㄱ, ㄴ","④ ㄱ, ㄷ","⑤ ㄱ, ㄴ, ㄷ"],"sub_items":["ㄱ. 甲의 특별대리인 丙이 甲의 의사무능력을 이유로 계약의 무효를 주장하는 것은 특별한 사정이 없는 한 신의칙에 반한다.","ㄴ. 甲의 의사무능력을 이유로 계약이 무효가 된 경우, 甲은 그 선의ㆍ악의를 불문하고 乙에게 그 현존이익을 반환할 책임이 있다.","ㄷ. 甲이 수령한 차용금을 모두 소비한 경우, 乙은 甲에게 그 이익이 현존한다는 사실에 관한 증명책임을 부담한다."],"expl_core":"의사무능력자 무효의 법률효과 3가지를 묻는 조합형. 핵심 쟁점: ①특별대리인의 무효 주장이 신의칙 위반인지(→ 위반 아님), ②현존이익 반환에서 선의·악의 불문 여부(→ 불문하고 현존이익 반환), ③현존이익 증명책임 소재(→ 의사무능력자인 甲이 현존이익 소멸 증명). ㄱ, ㄷ이 틀린 설명이다.","expl_choices":{"1":"틀림. 옳지 않은 것은 ㄱ, ㄷ인데, ①선지는 ㄴ만 선택한 것이어서 오답이다.","2":"틀림. ②선지는 ㄷ만 선택한 것. ㄱ도 틀린 설명인데 누락되어 오답이다.","3":"틀림. ③선지 ㄱ, ㄴ 조합. ㄴ은 옳은 설명이므로 이 조합은 오답이다.","4":"맞음. ④선지 ㄱ, ㄷ 조합. 둘 다 틀린 설명이므로 정답이다.","5":"틀림. ⑤선지 ㄱ, ㄴ, ㄷ 전부. ㄴ은 옳은 설명이므로 이 조합은 오답이다."},"expl_sub":{"ㄱ":"틀림. 판례상 의사무능력자의 특별대리인 丙이 의사무능력을 이유로 계약 무효를 주장하는 것은 신의칙에 반하지 않는다. 특별대리인은 무능력자 보호를 위해 선임된 자이므로 무효 주장이 허용된다.","ㄴ":"맞음. 의사무능력을 이유로 무효가 된 경우 甲은 선의·악의를 불문하고 현존이익을 반환할 책임이 있다(민법 제141조 단서 유추).","ㄷ":"틀림. 현존이익 반환에서 이익이 현존하지 않는다는 증명책임은 반환의무자인 甲에게 있다. 乙이 현존한다는 사실을 증명하는 것이 아니다."}},{"num":3,"question":"민법상 미성년자의 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 미성년자의 법률행위에 법정대리인의 동의를 요하도록 하는 규정은 강행규정이다.","② 법정대리인의 동의를 요하는 미성년자의 법률행위에 있어서 법정대리인의 동의는 묵시 적으로는 할 수 없다.","③ 미성년자가 법정대리인으로부터 허락을 얻은 특정한 영업에 관해서는 성년자와 동일한 행위능력이 있다.","④ 법정대리인이 미성년자에게 한 특정한 영업의 허락을 취소하는 경우, 그 취소는 선의의 제3자에게 대항할 수 없다.","⑤ 미성년자와 계약을 체결한 상대방은 계약 당시 미성년자임을 알았을 경우에는 그 의사 표시를 철회할 수 없다."],"sub_items":[],"expl_core":"미성년자 법률행위의 동의는 명시적뿐 아니라 묵시적으로도 가능하다는 것이 판례 입장이다. '묵시적으로는 할 수 없다'는 ②선지가 함정이다. 영업허락 취소의 선의 제3자 대항불가(제8조②), 상대방의 철회권 박탈(미성년자임을 안 경우)도 중요 포인트다.","expl_choices":{"1":"맞음. 미성년자 법률행위에 법정대리인의 동의를 요하도록 하는 규정은 강행규정이다(판례).","2":"틀림. 법정대리인의 동의는 명시적뿐 아니라 묵시적으로도 할 수 있다(판례). '묵시적으로는 할 수 없다'는 서술이 오류다.","3":"맞음. 허락받은 특정 영업에 관해서는 성년자와 동일한 행위능력이 있다(민법 제8조①).","4":"맞음. 영업 허락의 취소는 선의의 제3자에게 대항하지 못한다(민법 제8조②).","5":"맞음. 상대방이 계약 당시 미성년자임을 알았다면 철회할 수 없다(민법 제15조①)."},"expl_sub":{}},{"num":4,"question":"성년후견에 관한 설명으로 옳지 않은 것은?","answer":2,"answer_str":"2","choices":["① 피성년후견인도 의사능력이 있으면 유효하게 임의대리행위를 할 수 있다.","② 가정법원은 본인의 의사에 반하더라도 특정후견의 심판을 할 수 있다.","③ 검사나 지방자치단체의 장도 특정후견의 심판을 청구할 수 있는 자에 포함된다.","④ 특정후견은 특정후견의 심판에서 정한 기간이 경과하면 가정법원의 종료심판 없이도 종료한다.","⑤ 특정후견의 심판을 하는 경우에는 특정후견의 기간 또는 사무의 범위를 정하여야 한다."],"sub_items":[],"expl_core":"특정후견의 핵심 요건: 본인의 의사에 반하여 심판 불가(민법 제14조의2 제2항). 성년후견·한정후견과 달리 특정후견은 본인의 의사를 반드시 존중해야 한다. ②가 이 규정을 위반한 설명이다.","expl_choices":{"1":"맞음. 피성년후견인도 의사능력이 있으면 유효하게 임의대리 수여행위를 할 수 있다(판례).","2":"틀림. 특정후견의 심판은 본인의 의사에 반하여 할 수 없다(민법 제14조의2 제2항). 성년후견·한정후견은 본인 의사 '고려'이지만, 특정후견은 의사에 반하면 불가하다는 점이 차이다.","3":"맞음. 검사나 지방자치단체의 장도 특정후견 심판 청구권자에 포함된다(민법 제14조의2 제1항).","4":"맞음. 심판에서 정한 기간이 경과하면 종료 심판 없이 자동 종료한다.","5":"맞음. 특정후견 심판 시 기간 또는 사무의 범위를 반드시 정하여야 한다(민법 제14조의2 제3항)."},"expl_sub":{}},{"num":5,"question":"민법상 법인에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 재단법인은 법률의 규정에 의함이 아니면 성립하지 못한다.","② 재단법인의 설립자가 정관에 필요적 기재사항 중 이사임면의 방법만 정하지 않고 사망한 경우, 이해관계인 또는 검사의 청구에 의하여 법원이 이를 정한다.","③ 재단법인의 목적을 달성할 수 없는 경우, 설립자나 이사는 주무관청의 허가를 얻어 설립의 취지를 참작하여 그 목적에 관한 정관규정을 변경할 수 있다.","④ 사단법인의 감사는 법인의 재산상황에 관하여 부정한 것이 있음을 발견한 경우, 이를 총회에 보고하기 위해 필요하더라도 임시총회를 소집할 권한은 없다.","⑤ 법인에 대한 청산종결등기가 경료되었더라도 청산사무가 종결되지 않는 한, 법인은 그범위 내에서는 청산법인으로 존속한다."],"sub_items":[],"expl_core":"감사의 임시총회 소집권이 쟁점이다. 민법 제67조: 감사는 법인 재산상황 또는 업무집행에 관해 부정·불비한 것이 있음을 발견한 때 총회에 보고해야 하며, 보고를 위해 필요한 때에는 총회를 소집할 수 있다. '권한이 없다'는 서술이 오류다.","expl_choices":{"1":"맞음. 재단법인은 법률의 규정에 의함이 아니면 성립하지 못한다(민법 제31조).","2":"맞음. 필요적 기재사항 중 이사임면 방법만 정하지 않고 설립자가 사망한 경우, 이해관계인 또는 검사의 청구로 법원이 보충한다(민법 제44조).","3":"맞음. 재단법인 목적 달성 불가 시 설립자나 이사는 주무관청 허가를 얻어 목적 관련 정관 규정을 변경할 수 있다(민법 제46조).","4":"틀림. 감사는 법인 재산상황에 부정한 것이 있음을 발견하면 총회에 보고하기 위해 필요한 때 임시총회를 소집할 수 있다(민법 제67조). '권한이 없다'는 서술이 오류다.","5":"맞음. 청산종결등기 후에도 청산사무가 종결되지 않는 한 청산법인으로 존속한다(판례)."},"expl_sub":{}},{"num":6,"question":"민법상 법인의 이사에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 이사가 여러 명인 경우 정관에 다른 정함이 없으면 법인의 사무집행은 이사의 과반수로써 결정한다.","② 이사의 결원으로 법인에게 손해가 생길 염려가 있는 경우, 법원은 이해관계인이나 검사의 청구에 의하여 임시이사를 선임하여야 한다.","③ 이사는 정관 또는 총회의 결의로 금지하지 아니한 사항에 한하여 타인으로 하여금 특정한 행위를 대리하게 할 수 있다.","④ 법인의 정관에 이사의 해임사유에 관한 규정이 있는 경우, 법인은 특별한 사정이 없는 한정관에서 정하지 아니한 사유로 이사를 해임할 수 없다.","⑤ 이사의 사임은 특별한 사정이 없는 한 주무관청의 승인이 있어야 그 효력이 발생한다."],"sub_items":[],"expl_core":"이사의 사임은 법인에 대한 단독 의사표시로 효력이 발생하며, 주무관청의 승인이 필요하지 않다. 이사 임면과 정관상 해임사유 제한, 임시이사 선임 요건도 함께 정리해둘 것.","expl_choices":{"1":"맞음. 이사 수인인 경우 정관에 다른 정함이 없으면 과반수로 사무집행을 결정한다(민법 제58조②).","2":"맞음. 이사 결원으로 법인에 손해가 생길 염려가 있으면 법원은 임시이사를 선임하여야 한다(민법 제63조). 선임 의무다.","3":"맞음. 이사는 정관 또는 총회 결의로 금지하지 않은 사항에 한해 특정 행위를 타인에게 대리하게 할 수 있다(민법 제62조).","4":"맞음. 정관에 해임사유 규정이 있으면 정관 외 사유로 이사를 해임할 수 없다(판례).","5":"틀림. 이사의 사임은 법인에 대한 의사표시로 효력이 발생하며, 주무관청 승인은 요건이 아니다."},"expl_sub":{}},{"num":7,"question":"사단법인 A의 대표이사 甲이 A를 대표하여 乙과 매매계약을 체결하였다. 이에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① ㄱ","② ㄷ","③ ㄱ, ㄴ","④ ㄴ, ㄷ","⑤ ㄱ, ㄴ, ㄷ"],"sub_items":["ㄱ. 매매계약을 체결하는 것이 甲과 A의 이익이 상반하는 사항인 경우, 甲은 A를 대표할 권한이 없다.","ㄴ. 甲이 A를 위하여 매수인 乙로부터 매매대금을 수령한 경우에 A의 채무 불이행을 이유로 乙이 매매계약을 유효하게 해제하면, 특별한 사정이 없는한 해제로 인한 원상회복의무는 甲이 부담한다.","ㄷ. 만약 A가 정관에 甲의 매매계약체결에 관한 대표권을 제한하는 규정을 두었지만 이를 등기하지 않은 경우, A는 이러한 사실을 알았던 乙에게 그 대표권 제한사실로써 대항할 수 있다."],"expl_core":"조합형. 쟁점: ①이익상반행위 시 대표권 부존재(민법 제64조), ②해제로 인한 원상회복 의무자=계약당사자 법인(A)이지 대표자(甲) 아님, ③대표권 제한 등기 미경료와 악의 제3자 대항 여부. 행정사 시험 기준: 제60조 등기 미경료 시 악의 제3자에도 대항 불가라는 입장 적용 시 ㄷ은 틀림. ㄱ만 맞음.","expl_choices":{"1":"맞음. ①선지 ㄱ만 옳은 설명이므로 정답이다.","2":"틀림. ②선지 ㄷ만. ㄷ은 틀린 설명이어서 오답이다.","3":"틀림. ③선지 ㄱ, ㄴ. ㄴ이 틀린 설명이어서 오답이다.","4":"틀림. ④선지 ㄴ, ㄷ. 둘 다 틀린 설명이므로 오답이다.","5":"틀림. ⑤선지 ㄱ, ㄴ, ㄷ. ㄴ, ㄷ이 틀린 설명이어서 오답이다."},"expl_sub":{"ㄱ":"맞음. 대표자와 법인의 이익이 상반하는 사항에서는 대표자는 대표권이 없고, 이사회가 특별대리인을 선임해야 한다(민법 제64조).","ㄴ":"틀림. 甲이 매매대금을 수령한 경우에도, 해제로 인한 원상회복 의무는 계약당사자인 사단법인 A가 부담한다. 대표자 甲이 원상회복의무자가 되지 않는다.","ㄷ":"틀림. 민법 제60조에 따라 이사의 대표권 제한은 등기하지 않으면 제3자에게 대항하지 못한다. 시험 기준상 악의의 제3자에게도 등기 없이는 대항 불가라는 입장이 적용되어 ㄷ은 틀린 설명으로 처리된다."}},{"num":8,"question":"민법상 물건에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 주물의 구성부분도 종물이 될 수 있다.","② 독립한 물건이라도 부동산은 종물이 될 수 없다.","③ 주물에 대한 점유시효취득의 효력은 점유하지 않는 종물에도 미친다.","④ 천연과실은 물건의 사용대가로 받는 금전 기타의 물건을 말한다.","⑤ 당사자는 주물을 처분할 때에 특약으로 종물을 제외할 수 있다."],"sub_items":[],"expl_core":"종물 성립 요건: ①독립된 물건(구성부분 불가), ②주물의 상용에 공여, ③주물 자체의 효용과 직접 관계 있을 것. 천연과실과 법정과실 구별, 종물에 대한 특약 분리 가능 여부도 핵심이다.","expl_choices":{"1":"틀림. 종물은 주물과 독립한 별개의 물건이어야 한다. 주물의 구성부분은 종물이 될 수 없다.","2":"틀림. 독립한 물건이라면 부동산도 종물이 될 수 있다.","3":"틀림. 주물을 점유에 의해 시효취득하더라도, 점유하지 않는 종물에는 시효취득의 효력이 미치지 않는다(판례).","4":"틀림. 천연과실은 물건의 용법에 의하여 수취하는 산출물이다. 사용대가로 받는 금전 기타 물건은 법정과실이다.","5":"맞음. 주물을 처분할 때 특약으로 종물을 제외할 수 있다. 민법 제100조②는 임의규정이다."},"expl_sub":{}},{"num":9,"question":"반사회질서의 법률행위에 해당하지 않는 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 행정기관에 진정서를 제출하여 상대방을 궁지에 빠뜨린 다음 이를 취하하는 조건으로 거액의 급부를 제공받기로 한 약정","② 보험계약자가 다수의 보험계약을 통하여 보험금을 부정취득할 목적으로 체결한 보험계약","③ 성매매행위를 전제로 한 선불금의 대여행위","④ 반사회질서의 법률행위에 의하여 조성된 재산인 이른바 비자금을 소극적으로 은닉하기 위하여 임치한 행위","⑤ 도박자금에 제공할 목적으로 한 금전대차계약"],"sub_items":[],"expl_core":"반사회질서 법률행위(민법 제103조) 비해당: 비자금을 소극적으로 은닉하기 위한 임치행위는 그 자체로 반사회질서에 해당하지 않는다(판례). 해당하는 것: 진정서 취하 조건 급부 약정, 보험사기 목적 계약, 성매매 전제 선불금 대여, 도박자금 금전대차.","expl_choices":{"1":"틀림(=반사회질서 해당함). 행정기관에 진정서를 제출해 궁지에 빠뜨린 뒤 취하 조건으로 거액 급부를 받기로 한 약정은 반사회질서 법률행위다(판례).","2":"틀림(=반사회질서 해당함). 다수 보험계약으로 보험금을 부정취득할 목적으로 체결한 보험계약은 반사회질서 법률행위다(판례).","3":"틀림(=반사회질서 해당함). 성매매행위를 전제로 한 선불금 대여행위는 반사회질서 법률행위다(판례).","4":"맞음(=반사회질서 해당 안 함). 비자금을 소극적으로 은닉하기 위해 임치한 행위는 그 자체가 반사회질서 법률행위가 아니다(판례). 비자금의 출처가 반사회적이더라도 임치행위 자체의 목적이 적극적으로 반사회적인 것은 아니다.","5":"틀림(=반사회질서 해당함). 도박자금에 제공할 목적으로 한 금전대차계약은 반사회질서 법률행위다(판례)."},"expl_sub":{}},{"num":10,"question":"불공정한 법률행위에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 특별한 사정이 없는 한 경매에도 불공정한 법률행위에 관한 민법 제104조가 적용된다.","② 불공정한 법률행위에 해당하는지는 법률행위가 이루어진 시점을 기준으로 약속된 급부와 반대급부 사이의 객관적 가치를 비교 평가하여 판단하여야 한다.","③ 불공정한 법률행위가 성립하기 위한 요건인 궁박, 경솔, 무경험은 그 중 일부만 갖추어져도 충분하다.","④ 궁박은 급박한 곤궁을 의미하는 것으로서 심리적 원인에 기인할 수도 있다.","⑤ 무경험은 어느 특정영역에 있어서의 경험부족이 아니라 거래일반에 대한 경험부족을 뜻한다."],"sub_items":[],"expl_core":"경매에는 민법 제104조 불공정 법률행위가 적용되지 않는다(판례). 이것이 이 문제의 핵심이다. 궁박·경솔·무경험은 택일적 요건(일부만으로도 충분), 심리적 원인 기인 가능, 무경험은 거래일반의 경험 부족.","expl_choices":{"1":"틀림. 경매에는 불공정한 법률행위에 관한 민법 제104조가 적용되지 않는다(판례). '적용된다'는 서술이 오류다.","2":"맞음. 불공정 법률행위 해당 여부는 법률행위가 이루어진 시점을 기준으로 급부와 반대급부 사이의 객관적 가치를 비교하여 판단한다(판례).","3":"맞음. 궁박·경솔·무경험은 택일적 요건으로, 그 중 일부만 갖추어져도 충분하다(판례).","4":"맞음. 궁박은 경제적 원인뿐 아니라 심리적 원인에 기인할 수도 있다(판례).","5":"맞음. 무경험은 특정 영역의 경험 부족이 아니라 거래일반에 대한 경험 부족을 의미한다(판례)."},"expl_sub":{}},{"num":11,"question":"민법상 비진의 의사표시로서 무효가 아닌 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① ㄱ","② ㄷ","③ ㄱ, ㄴ","④ ㄴ, ㄷ","⑤ ㄱ, ㄴ, ㄷ"],"sub_items":["ㄱ. 공무원이 한 사직의 의사표시 ㄴ. 학교법인이 사립학교법상의 제한규정 때문에 그 학교의 교직원들의 명의를 빌려서 금융기관으로부터 금원을 차용한 경우에 교직원들의 채무부담 의사 표시 ㄷ. 재산을 강제로 뺏긴다는 것이 표의자의 본심으로 잠재되어 있었으나, 표의자가 강박에 의하여서나마 증여를 하기로 하고 그에 따라 한 증여의의 사표시"],"expl_core":"비진의 의사표시(민법 제107조)는 원칙적으로 유효(상대방이 알지 못한 경우). 조합형 문제로 ㄱ, ㄴ, ㄷ 모두 무효가 아님을 판단해야 한다. ㄷ의 경우 강박으로 증여를 결의하고 의사표시를 한 것은 비진의 표시가 아니라 강박에 의한 의사표시로, 비진의 무효 규정 자체가 적용되지 않는다.","expl_choices":{"1":"틀림. ①선지 ㄱ만. ㄴ, ㄷ도 무효가 아니므로 ㄱ만으로는 부족하다.","2":"틀림. ②선지 ㄷ만. ㄱ, ㄴ도 무효가 아니어서 오답이다.","3":"틀림. ③선지 ㄱ, ㄴ. ㄷ도 무효가 아니므로 오답이다.","4":"틀림. ④선지 ㄴ, ㄷ. ㄱ도 무효가 아니므로 오답이다.","5":"맞음. ⑤선지 ㄱ, ㄴ, ㄷ 모두 비진의 의사표시로서 무효가 아니다. 정답."},"expl_sub":{"ㄱ":"맞음(무효 아님). 공무원 사직의 의사표시는 비진의 표시라도 상대방이 알지 못한 이상 유효하다(판례). 무효가 아니다.","ㄴ":"맞음(무효 아님). 학교법인이 교직원 명의를 빌려 차용한 경우 교직원들의 채무부담 의사표시는 비진의 표시지만, 금융기관이 진의 아님을 알지 못했다면 유효하다(판례). 무효가 아니다.","ㄷ":"맞음(무효 아님). 강박에 의하여서나마 증여하기로 하고 한 증여의 의사표시는 비진의 표시가 아니다. 표의자에게 증여 의사(진의)가 있었으므로 제107조 적용 자체가 없다. 무효가 아니다."}},{"num":12,"question":"甲은 乙과 통정허위표시로 대출약정을 하고, 이를 통해 乙에 대하여 가장채권을 보유하고 있다. 이에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① ㄱ","② ㄴ","③ ㄱ, ㄴ","④ ㄱ, ㄷ","⑤ ㄴ, ㄷ"],"sub_items":["ㄱ. 丙이 대출약정과 관련한 甲의 계약상 지위를 이전받은 경우, 乙은 丙에게 대출약정이 무효라고 대항할 수 있다.","ㄴ. 甲의 일반채권자 丁이 대출약정이 유효하다고 믿고 가장채권을 가압류한 경우, 위와 같이 믿은 것에 丁에게 과실이 있더라도 乙은 丁에게 대출약 정이 무효라고 대항할 수 없다.","ㄷ. 甲에게 파산이 선고된 경우, 파산관재인 戊가 대출약정이 통정허위표시라는 사실을 알았다면 파산채권자 중 일부가 선의라도 乙은 戊에 대하여 대출약정이 무효라고 대항할 수 있다."],"expl_core":"통정허위표시(민법 제108조)의 제3자 보호 범위가 쟁점. ㄱ: 계약상 지위 이전받은 자는 제3자 보호 안 됨(乙이 무효 주장 가능). ㄴ: 과실 있는 일반채권자의 가압류=선의 제3자로 보호(과실 불문). ㄷ: 파산관재인의 선의 여부는 파산채권자 기준으로 판단.","expl_choices":{"1":"틀림. ①선지 ㄱ만. ㄴ도 옳은 설명이어서 오답이다.","2":"틀림. ②선지 ㄴ만. ㄱ도 옳은 설명이어서 오답이다.","3":"맞음. ③선지 ㄱ, ㄴ 둘 다 옳은 설명이다. 정답.","4":"틀림. ④선지 ㄱ, ㄷ. ㄷ은 틀린 설명이어서 오답이다.","5":"틀림. ⑤선지 ㄴ, ㄷ. ㄷ이 틀린 설명이어서 오답이다."},"expl_sub":{"ㄱ":"맞음. 계약상 지위를 이전받은 丙은 새로운 법률상 이해관계를 맺은 '제3자'가 아니라, 甲의 지위를 승계한 자이므로 乙은 丙에게 무효를 대항할 수 있다(판례).","ㄴ":"맞음. 일반채권자 丁이 가장채권을 가압류한 경우, 과실이 있어도 선의이면 제108조②의 제3자로서 보호된다. 乙은 丁에게 무효를 대항할 수 없다(판례).","ㄷ":"틀림. 파산관재인의 선의 여부는 파산채권자들을 기준으로 판단한다. 파산채권자 중 일부가 선의인 경우, 戊(파산관재인)가 악의라도 선의 파산채권자 보호를 위해 乙은 무효를 주장할 수 없다(판례)."}},{"num":13,"question":"착오로 인한 의사표시에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 표의자가 경과실로 인한 착오로 의사표시를 하고 그 착오를 이유로 의사표시를 취소한 경우, 표의자는 그 취소로 인한 손해를 배상할 책임이 있다.","② 착오로 인한 의사표시의 취소에 관한 민법 제109조 제1항은 당사자의 합의로 그 적용을 배제할 수 없다.","③ 매도인이 매수인의 채무불이행을 이유로 매매계약을 적법하게 해제한 후에도 매수인은 착오를 이유로 매매계약을 취소할 수 있다.","④ 매도인의 하자담보책임이 성립하는 경우, 매매계약 내용의 중요 부분에 착오가 있더라도 매수인은 착오를 이유로 매매계약을 취소할 수 없다.","⑤ 상대방이 표의자의 착오를 알고 이를 이용한 경우라도 의사표시의 착오가 표의자의 중대한 과실로 인한 것이라면 표의자는 착오를 이유로 의사표시를 취소할 수 없다."],"sub_items":[],"expl_core":"착오 취소의 4가지 쟁점: ①경과실 착오 취소 시 손해배상 없음, ②제109조①은 임의규정(합의 배제 가능), ③해제 후에도 착오 취소 가능, ④하자담보책임과 착오 취소 경합 가능, ⑤상대방이 착오 이용 시 중과실도 취소 가능.","expl_choices":{"1":"틀림. 착오로 의사표시를 취소한 표의자에게는 취소로 인한 손해배상 책임이 없다. 착오 취소는 적법한 권리 행사다.","2":"틀림. 민법 제109조①은 임의규정으로, 당사자 합의로 적용을 배제할 수 있다(판례).","3":"맞음. 매도인이 적법하게 계약을 해제한 후에도 매수인은 착오를 이유로 매매계약을 취소할 수 있다. 해제와 취소는 병존 가능하다(판례).","4":"틀림. 하자담보책임이 성립하는 경우에도 착오를 이유로 취소할 수 있다. 양 제도는 경합 가능하다(판례).","5":"틀림. 상대방이 표의자의 착오를 알고 이를 이용한 경우에는, 표의자에게 중대한 과실이 있더라도 착오를 이유로 취소할 수 있다(판례). 상대방 이용=보호할 필요 없음."},"expl_sub":{}},{"num":14,"question":"사기ㆍ강박에 의한 의사표시에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 신의칙상 고지의무를 부담하는 자는 고지의무의 대상이 되는 사실을 이미 알고 있는 자에 대해서도 그 사실을 고지하여야 한다.","② 계약이 제3자의 위법한 사기행위로 체결된 경우, 표의자가 제3자를 상대로 사기로 인한 손해배상을 청구하기 위해서는 그 계약을 취소해야 한다.","③ 강박에 의한 의사표시에 대한 취소권의 행사기간은 소멸시효기간이다.","④ 소송행위가 강박에 의하여 이루어진 경우, 특별한 사정이 없는 한 강박을 이유로 소송 행위를 취소할 수 있다.","⑤ 상품의 선전ㆍ광고에 다소의 과장이나 허위가 수반되는 것은 그것이 일반 상거래의 관행과 신의칙에 비추어 시인될 수 있는 한 기망성이 결여된다."],"sub_items":[],"expl_core":"사기의 고의 범위, 고지의무의 존부, 소송행위에 대한 민법 규정 적용 불가, 강박 취소권의 제척기간 성격, 과장 광고의 기망성 결여가 핵심 포인트다. ⑤번이 맞는 설명이다.","expl_choices":{"1":"틀림. 신의칙상 고지의무는 상대방이 이미 알고 있는 사실에 대해서는 발생하지 않는다. 이미 알고 있는 자에게 고지할 의무는 없다(판례).","2":"틀림. 제3자 사기로 체결된 계약에서, 표의자는 계약을 취소하지 않아도 제3자에게 불법행위로 인한 손해배상을 청구할 수 있다(판례).","3":"틀림. 강박에 의한 취소권의 행사기간은 제척기간이다. 소멸시효기간이 아니다.","4":"틀림. 소송행위에는 민법상 사기·강박에 의한 취소 규정이 적용되지 않는다(판례). 소송행위의 하자는 별도 절차로 다툰다.","5":"맞음. 상품의 선전·광고에서 일반 상거래 관행과 신의칙에 비추어 시인될 수 있는 범위의 과장·허위는 기망성이 결여된다(판례)."},"expl_sub":{}},{"num":15,"question":"甲은 친구 乙로부터 丙 소유의 X토지를 매수할 대리권을 수여받아, 乙을 대리하여 丙과 X에 관한 매매계약을 체결하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 매매계약 내용의 중요부분에 관하여 乙의 착오가 있는 경우, 甲에게는 착오가 없더라도 乙은 자신의 착오를 이유로 매매계약을 취소할 수 있다.","② 甲의 사기로 丙이 매도의 의사표시를 한 경우, 乙이 그 사실을 몰랐더라도 丙은 사기를 이유로 그 의사표시를 취소할 수 있다.","③ 丙이 이중매매를 하였고 위 매매계약이 제2매매인 경우에 甲이 丙의 배임행위에 적극 가담하였다면, 乙이 그 사정을 몰랐더라도 매매계약은 무효이다.","④ 매매계약이 乙에게 불공정한 법률행위에 해당하는지 판단할 때 경솔, 무경험은 乙이 아닌 甲을 기준으로 판단한다.","⑤ 丙의 채무불이행이 있는 경우, 甲은 특별한 사정이 없는 한 채무불이행을 이유로 한계약해제권을 가지지 않는다."],"sub_items":[],"expl_core":"대리에서 착오의 기준: 대리인이 한 행위의 착오 유무는 원칙적으로 대리인을 기준으로 판단(민법 제116조). 본인 乙의 착오만으로는 취소 불가. 반면 대리인 甲의 사기는 상대방 사기로 취급(제3자 사기 아님).","expl_choices":{"1":"틀림. 대리에서 착오 유무는 대리인인 甲을 기준으로 판단한다(민법 제116조). 甲에게 착오가 없으면, 본인 乙에게 착오가 있어도 취소할 수 없다.","2":"맞음. 대리인 甲의 사기로 丙이 의사표시를 한 경우, 이는 상대방(乙) 측의 사기로 취급된다. 乙의 선의·악의와 무관하게 丙은 사기를 이유로 취소할 수 있다.","3":"맞음. 대리인 甲이 丙의 배임행위에 적극 가담한 이중매매는 반사회질서 법률행위로 무효이며, 본인 乙의 선의·악의는 무관하다.","4":"맞음. 불공정 법률행위에서 경솔·무경험은 대리행위를 한 대리인 甲을 기준으로 판단한다. 본인 乙이 아니다.","5":"맞음. 계약해제권은 계약당사자인 본인 乙에게 귀속된다. 대리인 甲은 특별한 사정이 없는 한 해제권을 가지지 않는다."},"expl_sub":{}},{"num":16,"question":"권한을 넘은 표현대리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 권한을 넘은 표현대리에 관한 규정은 법정대리에도 적용된다.","② 대리인이 그 권한 외의 법률행위를 한 경우, 대리인에게 그 권한이 있다고 상대방이 믿을 만한 정당한 이유가 있는지 여부는 대리행위 당시를 기준으로 결정해야 한다.","③ 복대리인 선임권이 없는 대리인에 의하여 선임된 복대리인의 권한은 기본대리권이 될수 없다.","④ 대리권소멸 후의 표현대리가 인정되는 경우, 그 표현대리의 권한을 넘은 대리행위가 있을 때에는 권한을 넘은 표현대리가 성립할 수 있다.","⑤ 대리행위의 표시를 하지 아니하고 자기가 본인인 것처럼 기망하여 본인 명의로 직접 법률행위를 한 경우, 특별한 사정이 없는 한 권한을 넘은 표현대리는 성립할 수 없다."],"sub_items":[],"expl_core":"권한을 넘은 표현대리(민법 제126조)에서 복대리인 선임권 없는 대리인이 선임한 복대리인의 권한도 기본대리권이 될 수 있다(판례). ③이 이를 부정하므로 오류. 법정대리권도 기본대리권 가능, 중첩 표현대리 가능도 함께 정리.","expl_choices":{"1":"맞음. 권한을 넘은 표현대리 규정은 법정대리에도 적용된다(판례).","2":"맞음. 정당한 이유 유무는 대리행위 당시를 기준으로 판단한다(판례).","3":"틀림. 복대리인 선임권이 없는 대리인이 선임한 복대리인의 권한도 권한을 넘은 표현대리에서 기본대리권이 될 수 있다(판례). '될 수 없다'는 서술이 오류다.","4":"맞음. 대리권소멸 후 표현대리가 인정되는 경우, 그 권한을 넘은 행위에 대해서도 권한을 넘은 표현대리가 중첩하여 성립할 수 있다(판례).","5":"맞음. 대리행위 표시 없이 자기가 본인인 것처럼 기망한 경우, 특별한 사정이 없는 한 권한을 넘은 표현대리가 성립하지 않는다(판례)."},"expl_sub":{}},{"num":17,"question":"법률행위의 무효와 취소에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 취소된 법률행위는 처음부터 무효인 것으로 본다.","② 무효행위의 추인은 묵시적으로 할 수 있다.","③ 토지거래계약 허가구역 내 토지에 대하여 처음부터 허가를 잠탈하는 내용의 매매계약이 체결된 경우, 그 계약은 유동적 무효이다.","④ 반사회질서의 법률행위로서 무효인 경우, 그 무효로 선의의 제3자에게 대항할 수 있다.","⑤ 취소할 수 있는 법률행위의 상대방이 확정된 경우에는 그 취소는 그 상대방에 대한 의사표시로 하여야 한다."],"sub_items":[],"expl_core":"허가구역 내 토지거래계약의 유동적 무효와 확정적 무효 구별이 핵심. 처음부터 허가를 잠탈(배제)하는 내용의 계약=확정적 무효(유동적 무효 아님). 단순히 허가를 받지 않은 계약=유동적 무효.","expl_choices":{"1":"맞음. 취소된 법률행위는 처음부터 무효인 것으로 본다(민법 제141조).","2":"맞음. 무효행위의 추인은 묵시적으로도 할 수 있다(판례).","3":"틀림. 처음부터 허가를 잠탈하는 내용의 매매계약은 확정적 무효이다(판례). '유동적 무효'라는 서술이 오류다. 단순히 허가 없이 체결된 계약이 유동적 무효다.","4":"맞음. 반사회질서의 법률행위로서의 무효는 절대적 무효로 선의의 제3자에게도 대항할 수 있다.","5":"맞음. 취소할 수 있는 법률행위의 상대방이 확정된 경우에는 그 상대방에 대한 의사표시로 취소해야 한다(민법 제142조)."},"expl_sub":{}},{"num":18,"question":"미성년자 甲은 자신의 자전거를 乙에게 매도하는 계약을 체결하였고 甲은 미성년자 임을 이유로 계약을 취소하려고 한다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 甲은 계약을 취소하면 그가 악의인 경우에도 그 현존이익의 한도에서 상환할 책임이 있다.","② 甲은 법정대리인의 동의 없이 단독으로 계약을 취소할 수 있다.","③ 甲의 취소권의 행사기간은 법원의 직권조사사항이다.","④ 甲의 법정대리인이 취소할 수 있는 법률행위를 추인하는 경우, 그 추인은 취소의 원인이 소멸된 후에 하여야만 효력이 있다.","⑤ 甲의 취소권은 추인할 수 있는 날로부터 3년내에, 법률행위를 한 날로부터 10년내에 행사하여야 한다."],"sub_items":[],"expl_core":"법정대리인의 추인과 취소권자 본인의 추인을 구별. 취소 원인이 소멸된 후에만 추인이 가능한 것은 취소권자 본인(미성년자)의 경우이고, 법정대리인은 언제든지 추인할 수 있다(민법 제143조). ④가 이를 혼동한 오류다.","expl_choices":{"1":"맞음. 취소한 경우 악의라도 현존이익의 한도에서만 상환 책임이 있다(민법 제141조 단서).","2":"맞음. 미성년자는 법정대리인 동의 없이 단독으로 취소권을 행사할 수 있다(민법 제140조).","3":"맞음. 취소권 행사기간은 제척기간이므로 법원이 직권으로 조사한다.","4":"틀림. 법정대리인의 추인은 취소 원인이 종료하기 전(미성년 상태에서)에도 가능하다. '취소의 원인이 소멸된 후에야 효력이 있다'는 서술은 취소권자 본인의 추인에 해당하는 내용으로, 법정대리인의 추인에 적용하면 오류다.","5":"맞음. 취소권은 추인할 수 있는 날로부터 3년, 법률행위를 한 날로부터 10년 내에 행사해야 한다(민법 제146조)."},"expl_sub":{}},{"num":19,"question":"법률행위의 조건과 기한에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 기한의 이익은 특약이나 법률행위의 성질로 분명하지 아니한 경우에는 채무자를 위한 것으로 추정한다.","② 채무자가 담보를 손상하게 한 때에 그는 기한의 이익을 주장하지 못한다.","③ 조건있는 법률행위의 당사자는 조건의 성부가 미정한 동안에는 조건의 성취로 인하여 생길 상대방의 이익을 해하지 못한다.","④ 2024년 4월에 ‘2024년 제12회 행정사 시험에 응시하여 최종 합격하면 자동차를 사준다’는 법률행위를 한 경우, 이는 특별한 사정이 없는 한 정지조건부 법률행위이다.","⑤ 불법조건이 붙은 법률행위는 그 조건만 무효이다."],"sub_items":[],"expl_core":"불법조건의 효력에 관한 민법 제151조①: 불법조건이 붙은 법률행위는 그 조건만 무효가 아니라 '법률행위 전부'가 무효다. ⑤가 이를 잘못 서술한 것이다. 불능조건의 효력(정지·해제), 기한이익 포기 불가 사유도 함께 정리.","expl_choices":{"1":"맞음. 기한의 이익은 특약이나 법률행위의 성질로 분명하지 않은 경우 채무자를 위한 것으로 추정한다(민법 제153조①).","2":"맞음. 채무자가 담보를 손상하게 한 때 기한의 이익을 주장하지 못한다(민법 제388조).","3":"맞음. 조건부 법률행위의 당사자는 조건 성부 미정 기간 동안 상대방의 기대이익을 침해해서는 안 된다(민법 제148조).","4":"맞음. '합격하면 자동차를 사준다'는 법률행위는 합격이라는 불확실한 사실에 효력 발생을 매단 정지조건부 법률행위다.","5":"틀림. 불법조건이 붙은 법률행위는 그 조건만 무효가 아니라 법률행위 전부가 무효다(민법 제151조①). '조건만 무효'라는 서술이 오류다. 단순 불능조건이면 조건만 무효 또는 유효 처리됨과 구별할 것."},"expl_sub":{}},{"num":20,"question":"법률행위의 부관에 관한 설명으로 옳은 것은?","answer":4,"answer_str":"4","choices":["① 정지조건 있는 법률행위는 조건이 성취한 때로부터 그 효력을 잃는다.","② 조건이 법률행위의 당시에 이미 성취할 수 없는 불능조건인 경우에는 그 조건이 해제 조건이면 그 법률행위는 무효로 한다.","③ 종기(終期)있는 법률행위는 기한이 도래한 때로부터 그 효력이 생긴다.","④ 기한의 이익이 상대방에게도 있는 경우에 당사자 일방은 그 상대방의 손해를 배상하고 기한의 이익을 포기할 수 있다.","⑤ 조건의 성취가 미정한 권리의무는 일반규정에 의하여 처분, 상속 또는 담보로 할 수 없다."],"sub_items":[],"expl_core":"기한의 이익 포기와 상대방 손해 배상이 쟁점. 기한의 이익이 상대방에게도 있으면 상대방 동의 없이 포기 가능하지만 손해를 배상해야 한다(민법 제153조②). 정지·해제조건 효력, 시기·종기 효력, 조건부 권리 처분 가능 여부도 정리.","expl_choices":{"1":"틀림. 정지조건 있는 법률행위는 조건이 성취한 때부터 그 효력이 '생긴다'. 효력을 잃는 것은 해제조건이다(민법 제147조).","2":"틀림. 불능 해제조건인 경우 법률행위는 조건 없는 법률행위로서 유효하다(민법 제151조②). '무효'라는 서술이 오류다.","3":"틀림. 종기(終期) 있는 법률행위는 기한이 도래한 때부터 그 효력을 '잃는다'. 효력이 생기는 것은 시기(始期)다(민법 제152조).","4":"맞음. 기한의 이익이 상대방에게도 있는 경우, 일방은 상대방의 손해를 배상하고 기한의 이익을 포기할 수 있다(민법 제153조②).","5":"틀림. 조건의 성취가 미정한 권리의무는 일반규정에 의하여 처분, 상속 또는 담보로 할 수 있다(민법 제149조)."},"expl_sub":{}},{"num":21,"question":"민법상 기간에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 내년 6월 1일부터 ‘4일 동안’이라고 하는 경우에 그 기산점은 내년 6월 1일이다.","② 기간을 시(時)로 정한 때에는 즉시로부터 기산한다.","③ 정년이 60세라고 하는 것은 특별한 사정이 없으면 만60세가 만료되는 날을 말한다.","④ 1세에 이른 사람의 나이는 출생일을 산입하여 만(滿) 나이로 계산하고 연수(年數)로 표시한다.","⑤ 어느 기간의 말일인 6월 4일이 토요일이고 6월 6일이 공휴일인 경우, 그 기간은 6월 7일에 만료한다."],"sub_items":[],"expl_core":"정년 60세의 의미: 판례상 만 60세에 '도달하는 날'을 말한다. '만료되는 날'이 아니다. 만 나이 계산(출생일 산입), 초일 불산입 예외(특정일부터 명시 시 초일 산입), 말일 공휴일 처리도 중요 포인트다.","expl_choices":{"1":"맞음. '내년 6월 1일부터 4일 동안'처럼 기산점이 특정된 경우 초일을 산입한다. 기산점은 6월 1일이다.","2":"맞음. 기간을 시(時)로 정한 때에는 즉시로부터 기산한다(민법 제156조).","3":"틀림. 정년 60세는 만 60세에 '도달하는 날'을 말한다(판례). '만료되는 날'은 다음 날로 오해를 줄 수 있어 오류다.","4":"맞음. 1세에 이른 사람의 나이는 출생일을 산입하여 만 나이로 계산하고 연수로 표시한다(민법 제158조).","5":"맞음. 기간 말일인 6월 4일이 토요일, 6월 6일이 공휴일이면 익일(6월 7일)에 만료한다(민법 제161조)."},"expl_sub":{}},{"num":22,"question":"甲의 乙에 대한 채권의 소멸시효기간이 가장 긴 것은? (甲, 乙은 상인이 아님)","answer":4,"answer_str":"4","choices":["① 甲이 연예인 乙에게 물건을 공급한 경우, 甲의 물건공급대금채권","② 甲의 동산을 乙이 사용한 경우, 甲의 동산사용료채권","③ 甲교사의 강의를 乙학생이 수강한 경우, 甲의 수강료채권","④ 甲이 乙에게 부동산을 매도한 경우, 甲의 매매대금채권","⑤ 생산자 甲이 乙에게 생산물을 판매한 경우, 甲의 생산물대금채권"],"sub_items":[],"expl_core":"소멸시효기간 비교: ①연예인에게 물건 공급=민법 제164조③ 1년, ②동산사용료=제164조② 1년, ③교사 수강료=제164조④ 1년, ④부동산 매매대금=일반채권 10년(제162조), ⑤생산자 생산물 대가=제163조⑤ 3년. 따라서 가장 긴 것은 ④.","expl_choices":{"1":"틀림. 연예인에게 공급한 물건의 대가 채권은 민법 제164조③에 해당하여 1년의 단기소멸시효가 적용된다.","2":"틀림. 동산사용료 채권은 민법 제164조②에 해당하여 1년의 단기소멸시효가 적용된다.","3":"틀림. 학생의 교육에 관한 급여 채권은 민법 제164조④에 해당하여 1년의 단기소멸시효가 적용된다.","4":"맞음. 부동산 매매대금채권은 특별 규정이 없는 일반채권으로 10년의 소멸시효가 적용된다(민법 제162조①). 선지 중 가장 길다.","5":"틀림. 생산자의 생산물 판매 대금채권은 민법 제163조⑤에 해당하여 3년의 소멸시효가 적용된다."},"expl_sub":{}},{"num":23,"question":"소멸시효의 효력에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 소멸시효는 그 기산일에 소급하여 효력이 생긴다.","② 주된 권리의 소멸시효가 완성한 때에는 종속된 권리에 그 효력이 미친다.","③ 소멸시효는 법률행위에 의하여 이를 배제할 수 없으나 연장할 수는 있다.","④ 소멸시효의 이익은 미리 포기하지 못한다.","⑤ 채무자가 소멸시효 완성 후 채권자에 대하여 채무 일부를 변제함으로써 시효의 이익을 포기한 경우, 포기한 때로부터 새로이 소멸시효가 진행한다."],"sub_items":[],"expl_core":"소멸시효는 법률행위로 배제, 연장, 가중 모두 불가하다(민법 제184조①). '연장할 수 있다'는 서술이 핵심 함정이다. 이익의 소급효(기산일), 주·종 권리 시효 연동, 이익 미리 포기 불가, 포기 후 새로운 시효 진행도 정리.","expl_choices":{"1":"맞음. 소멸시효는 기산일에 소급하여 효력이 생긴다(민법 제167조).","2":"맞음. 주된 권리의 소멸시효 완성 시 종속된 권리(이자, 위약금 등)에도 그 효력이 미친다(민법 제183조).","3":"틀림. 소멸시효는 법률행위로 배제할 수 없고, 연장도 할 수 없다(민법 제184조①). '연장할 수는 있다'는 부분이 오류다.","4":"맞음. 소멸시효의 이익은 미리 포기하지 못한다(민법 제184조①).","5":"맞음. 소멸시효 완성 후 일부 변제로 시효이익을 포기한 경우, 포기한 때부터 새로이 소멸시효가 진행한다(판례)."},"expl_sub":{}},{"num":24,"question":"소멸시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 부동산 매수인이 목적 부동산을 인도받아 계속 점유하고 있는 경우, 매수인의 소유권 이전등기청구권은 채권이므로 소멸시효가 진행한다.","② 소유권에 기한 물권적 청구권은 소멸시효에 걸리지 아니한다.","③ 판결에 의하여 확정되고 판결 확정 당시에 변제기가 도래한 채권은 단기소멸시효에 해당한 것이라도 그 판결의 당사자 사이에서 그 시효기간은 10년으로 한다.","④ 시효의 중단은 원칙적으로 당사자 및 그 승계인 사이에만 효력이 있다.","⑤ 점유권은 시효에 걸리지 아니한다."],"sub_items":[],"expl_core":"목적물을 인도받아 계속 점유 중인 매수인의 소유권이전등기청구권: 판례상 채권이지만, 점유라는 사실상태가 계속되는 한 소멸시효가 진행하지 않는다. '채권이므로 소멸시효가 진행한다'는 서술이 오류다.","expl_choices":{"1":"틀림. 부동산 매수인이 목적 부동산을 인도받아 계속 점유하고 있는 경우에는 매수인의 소유권이전등기청구권의 소멸시효가 진행하지 않는다(판례). 채권이지만 점유 계속이라는 사정으로 시효 불진행.","2":"맞음. 소유권에 기한 물권적 청구권은 소멸시효에 걸리지 않는다(판례).","3":"맞음. 판결로 확정된 채권은 단기소멸시효 해당이라도 10년의 소멸시효가 적용된다(민법 제165조①).","4":"맞음. 시효의 중단은 원칙적으로 당사자 및 그 승계인 사이에만 효력이 있다(민법 제169조).","5":"맞음. 점유권은 시효에 걸리지 않는다(민법 제162조 참조, 판례)."},"expl_sub":{}},{"num":25,"question":"소멸시효의 중단과 정지에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 채무자가 제기한 소에 대하여 채권자가 응소하여 그 소송에서 적극적으로 권리를 주장 하고 그것이 받아들여진 경우, 재판상의 청구가 될 수 있다.","② 승소 확정판결을 받은 채권자가 그 판결상 채권의 시효중단을 위해 후소를 제기하는 경우, 재판상 청구가 있다는 점에 대하여만 확인을 구하는 형태의 새로운 방식의 확인소송은 허용될 수 없다.","③ 상속재산에 속한 권리나 상속재산에 대한 권리는 상속인의 확정, 관리인의 선임 또는 파산선고가 있는 때로부터 6월내에는 소멸시효가 완성하지 아니한다.","④ 화해를 위한 소환은 상대방이 출석하지 아니한 때에는 화해신청인이 1월내에 소를 제기 하지 아니하면 시효중단의 효력이 없다.","⑤ 천재 기타 사변으로 소멸시효를 중단할 수 없을 때에는 그 사유가 종료한 때로부터 1월 내에는 시효가 완성하지 아니한다. 2023년도 제11회 행정사 1차 1교시 A형 ( 22 - 1 )"],"sub_items":[],"expl_core":"승소 확정판결 채권의 시효중단을 위한 후소 형태로 '재판상 청구가 있다는 점에 대하여만 확인을 구하는 확인소송'이 허용되는지가 쟁점. 판례는 이를 허용한다. ②의 '허용될 수 없다'는 서술이 오류다.","expl_choices":{"1":"맞음. 채무자가 제기한 소에 채권자가 응소하여 적극적으로 권리를 주장하고 받아들여진 경우 재판상 청구가 될 수 있다(판례).","2":"틀림. 판례는 승소 확정판결 채권의 시효중단을 위해 '재판상 청구가 있다는 점에 대하여만 확인을 구하는 새로운 방식의 확인소송'을 허용한다. '허용될 수 없다'는 서술이 오류다.","3":"맞음. 상속재산에 속한 권리는 상속인 확정·관리인 선임·파산선고가 있는 때부터 6개월 내에는 소멸시효가 완성하지 않는다(민법 제180조①).","4":"맞음. 화해를 위한 소환은 상대방이 출석하지 않은 때 화해신청인이 1개월 내 소를 제기하지 않으면 시효중단 효력이 없다(민법 제173조).","5":"맞음. 천재 기타 사변으로 소멸시효를 중단할 수 없을 때에는 그 사유 종료 후 1개월 내에는 시효가 완성하지 않는다(민법 제182조)."},"expl_sub":{}}],"2023":[{"num":1,"question":"부재자의 재산관리에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 법원이 선임한 재산관리인은 법원의 허가 없이 재산의 보존행위를 할 수 없다.","② 법원은 그 선임한 재산관리인으로 하여금 재산의 관리 및 반환에 관하여 상당한 담보를 제공하게 할 수 있다.","③ 법원이 선임한 재산관리인은 관리할 재산목록을 작성하여야 한다.","④ 법원은 그 선임한 재산관리인에 대하여 부재자의 재산으로 상당한 보수를 지급할 수 있다.","⑤ 법원이 선임한 부재자의 재산관리인은 그 부재자의 사망이 확인된 후라도 그에 대한 선임결정이 취소되지 않는 한 그 관리인으로서의 권한이 소멸되지 않는다."],"sub_items":[],"expl_core":"법원이 선임한 부재자 재산관리인의 권한 범위가 핵심. 보존행위=법원 허가 불요, 처분행위=허가 필요(민법 제25조). '보존행위도 허가가 필요하다'는 ①이 틀린 설명이다. 사망 확인 후에도 선임결정이 취소되지 않으면 권한 유지됨도 함께 정리.","expl_choices":{"1":"틀림. 법원이 선임한 재산관리인은 보존행위는 법원의 허가 없이 할 수 있다(민법 제25조). '보존행위도 허가가 필요하다'는 서술이 오류다. 처분행위에만 허가가 필요하다.","2":"맞음. 법원은 선임한 재산관리인에게 재산의 관리 및 반환에 관하여 상당한 담보를 제공하게 할 수 있다(민법 제25조).","3":"맞음. 법원이 선임한 재산관리인은 관리할 재산목록을 작성하여야 한다(민법 제24조①).","4":"맞음. 법원은 부재자의 재산으로 재산관리인에게 상당한 보수를 지급할 수 있다(민법 제26조).","5":"맞음. 부재자의 사망이 확인되었더라도 재산관리인 선임결정이 취소되지 않는 한 관리인의 권한은 소멸하지 않는다(판례)."},"expl_sub":{}},{"num":2,"question":"신의성실의 원칙(이하 ‘신의칙’)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 사적 자치의 영역을 넘어 공공질서를 위하여 공익적 요구를 선행시켜야 할 경우에도 특별한 사정이 없는 한 신의칙이 합법성의 원칙보다 우월하다.","② 신의칙이란 “법률관계의 당사자는 상대방의 이익을 고려하여 형평에 어긋나거나 신의를 저버리는 내용 또는 방법으로 권리를 행사하거나 의무를 이행하여서는 안 된다.”는 추상적 규범을 말한다.","③ 숙박업자는 신의칙상 부수적 의무로서 고객의 안전을 배려할 보호의무를 부담한다.","④ 인지청구권에는 실효의 법리가 적용되지 않는다.","⑤ 이사가 회사 재직 중에 채무액과 변제기가 특정되어 있는 회사채무를 보증한 후 사임한 경우, 그 이사는 사정변경을 이유로 그 보증계약을 일방적으로 해지할 수 없다."],"sub_items":[],"expl_core":"신의칙과 합법성 원칙의 관계가 핵심. 공익적 요구가 선행되어야 할 경우에는 합법성 원칙이 신의칙보다 우월하다(판례). ①의 '신의칙이 합법성 원칙보다 우월하다'는 서술이 오류다. 인지청구권에는 실효 법리가 적용되지 않고, 특정 보증채무는 사정변경 해지 불가도 정리.","expl_choices":{"1":"틀림. 사적 자치 영역을 넘어 공익적 요구를 선행해야 할 경우에는 합법성의 원칙이 신의칙보다 우월하다(판례). '신의칙이 우월하다'는 서술이 오류다.","2":"맞음. 신의칙은 상대방 이익을 고려하여 형평에 맞게 권리를 행사하고 의무를 이행해야 한다는 추상적 규범이다.","3":"맞음. 숙박업자는 신의칙상 부수적 의무로서 고객의 안전을 배려할 보호의무를 부담한다(판례).","4":"맞음. 인지청구권은 신분 관계 확인의 성격상 실효의 법리가 적용되지 않는다(판례).","5":"맞음. 채무액과 변제기가 특정된 회사채무를 보증한 후 사임한 이사는 사정변경을 이유로 보증계약을 일방적으로 해지할 수 없다(판례)."},"expl_sub":{}},{"num":3,"question":"실종선고에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 부재자의 제1순위 상속인이 따로 있는 경우, 제2순위 상속인은 특별한 사정이 없는 한부재자에 대하여 실종선고를 청구할 수 있는 이해관계인이 아니다.","② 실종선고가 취소되지 않았더라도 반증을 들어 실종선고의 효과를 다툴 수 있다.","③ 실종선고의 요건이 충족되면 법원은 이해관계인이나 검사의 청구에 의하여 실종선고를 하여야 한다.","④ 실종선고를 받은 자는 특별한 사정이 없는 한 실종기간이 만료한 때에 사망한 것으로 본다.","⑤ 실종선고가 취소된 때 실종선고를 직접원인으로 재산을 취득한 자가 선의인 경우에는그 받은 이익이 현존하는 한도에서 반환할 의무가 있다."],"sub_items":[],"expl_core":"실종선고의 효력은 취소 전까지 절대적으로 유지된다. 취소되지 않은 상태에서 반증으로 실종선고의 사망의제 효과를 다투는 것은 불가하다(판례). 이것이 ②의 오류다. 이해관계인 범위(제2순위 상속인 해당 여부), 선의 취득자 현존이익 반환도 정리.","expl_choices":{"1":"맞음. 부재자의 제1순위 상속인이 있는 경우, 제2순위 상속인은 특별한 사정이 없는 한 실종선고 청구의 이해관계인이 아니다(판례).","2":"틀림. 실종선고가 취소되지 않는 한, 반증을 들어 실종선고의 효과를 다툴 수 없다(판례). 실종선고는 법원 취소 절차에 의해서만 효력을 잃는다.","3":"맞음. 실종선고의 요건이 충족되면 법원은 이해관계인이나 검사의 청구에 의하여 실종선고를 하여야 한다(민법 제27조).","4":"맞음. 실종선고를 받은 자는 특별한 사정이 없는 한 실종기간이 만료한 때에 사망한 것으로 본다(민법 제28조).","5":"맞음. 실종선고가 취소된 때 선의의 취득자는 현존이익 한도에서 반환 의무를 진다(민법 제29조②)."},"expl_sub":{}},{"num":4,"question":"미성년자 乙은 친권자 甲의 처분동의가 필요한 자기 소유의 물건을 甲의 동의 없이 丙에게 매도하는 계약을 체결하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 丙은 乙이 성년이 된 후에 그에게 1개월 이상의 기간을 정하여 계약의 추인 여부의 확답을 촉구할 수 있다.","② 성년이 된 乙이 ①에서 丙이 정한 기간 내에 확답을 발송하지 아니하면 계약을 추인한 것으로 본다.","③ 丙이 계약 당시에 乙이 미성년자임을 알았더라도 丙은 자신의 의사표시를 철회할 수 있다.","④ 丙이 계약 당시에 乙이 미성년자임을 알지 못한 경우, 丙은 乙에게도 철회의 의사표시를할 수 있다.","⑤ 乙이 계약 당시에 甲의 동의서를 위조하여 甲의 동의가 있는 것으로 丙을 믿게 한 경우, 甲은 그 계약을 취소할 수 없다."],"sub_items":[],"expl_core":"미성년자 상대방의 철회권 제한: 계약 당시 미성년자임을 안 상대방은 철회 불가(민법 제15조①). '알았더라도 철회할 수 있다'는 ③이 오류다. 추인 촉구와 간주 추인(법정기간 내 미발송), 속임수에 의한 취소권 박탈도 구별.","expl_choices":{"1":"맞음. 丙은 乙이 성년이 된 후에 1개월 이상의 기간을 정하여 추인 여부의 확답을 촉구할 수 있다(민법 제15조①).","2":"맞음. 성년이 된 乙이 정한 기간 내에 확답을 발송하지 않으면 추인한 것으로 본다(민법 제15조②).","3":"틀림. 미성년자임을 알았던 丙은 의사표시를 철회할 수 없다(민법 제15조① 단서). '알았더라도 철회할 수 있다'는 서술이 오류다.","4":"맞음. 丙이 미성년자임을 알지 못한 경우, 丙은 미성년자인 乙에게도 철회의 의사표시를 할 수 있다(민법 제15조).","5":"맞음. 乙이 동의서를 위조하여 법정대리인의 동의가 있는 것처럼 속인 경우, 甲은 계약을 취소할 수 없다(민법 제17조 속임수)."},"expl_sub":{}},{"num":5,"question":"피성년후견인과 피한정후견인에 관한 설명으로 옳지 않은 것은?","answer":2,"answer_str":"2","choices":["① 가정법원은 성년후견개시의 심판을 할 때 본인의 의사를 고려하여야 한다.","② 성년후견개시의 심판은 일정한 사유로 인한 정신적 제약으로 사무처리능력이 일시적으로 부족한 사람에게 허용된다.","③ 가정법원은 피한정후견인이 한정후견인의 동의를 받아야 하는 행위의 범위를 정할 수있다.","④ 일상생활에 필요하고 그 대가가 과도하지 아니한 피성년후견인의 법률행위는 성년후견 인이 취소할 수 없다.","⑤ 가정법원이 피성년후견인에 대하여 한정후견개시의 심판을 할 때에는 종전의 성년후견의 종료 심판을 한다."],"sub_items":[],"expl_core":"성년후견·한정후견·특정후견의 대상 구별이 핵심. 성년후견=사무처리능력이 '지속적으로 결여'된 사람, 한정후견='부족'한 사람, 특정후견=특정 사무에 후원이 필요한 사람. '일시적으로 부족'한 사람을 성년후견 대상으로 서술한 ②가 오류다.","expl_choices":{"1":"맞음. 가정법원은 성년후견개시 심판 시 본인의 의사를 고려하여야 한다(민법 제9조②).","2":"틀림. 성년후견은 정신적 제약으로 사무처리능력이 '지속적으로 결여'된 사람에게 허용된다. '일시적으로 부족한 사람'이라는 서술이 오류다. 일시적 부족은 특정후견 등의 대상이다.","3":"맞음. 가정법원은 피한정후견인이 한정후견인의 동의를 받아야 하는 행위의 범위를 정할 수 있다(민법 제13조①).","4":"맞음. 일상생활에 필요하고 그 대가가 과도하지 않은 피성년후견인의 법률행위는 성년후견인이 취소할 수 없다(민법 제10조④).","5":"맞음. 가정법원이 피성년후견인에게 한정후견개시 심판을 할 때에는 종전 성년후견의 종료 심판을 한다(민법 제14조②)."},"expl_sub":{}},{"num":6,"question":"미성년자의 법률행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 법정대리인이 취소한 미성년자의 법률행위는 취소한 때로부터 그 효력을 상실한다.","② 법정대리인이 재산의 범위를 정하여 미성년자에게 처분을 허락한 경우, 법정대리인은 그재산에 관하여 유효한 대리행위를 할 수 없다.","③ 법정대리인이 미성년자에게 특정한 영업을 허락한 경우, 법정대리인은 그 영업에 관하여 유효한 대리행위를 할 수 있다.","④ 미성년자가 자신의 주민등록증을 변조하여 자기를 능력자로 믿게 하여 법률행위를 한경우, 미성년자는 그 법률행위를 취소할 수 없다.","⑤ 미성년자가 오직 권리만을 얻는 법률행위를 할 경우에도 특별한 사정이 없는 한 법정 대리인의 동의가 필요하다."],"sub_items":[],"expl_core":"미성년자 법률행위의 4가지 쟁점: ①취소 효력의 소급효(처음부터 무효), ②처분허락 후 법정대리인 대리권 유지 여부, ③영업허락 후 법정대리인 대리권 소멸, ④속임수로 취소권 박탈, ⑤권리만 얻는 행위는 동의 불요. 정답 ④만 맞음.","expl_choices":{"1":"틀림. 취소된 법률행위는 소급하여 처음부터 무효가 된다(민법 제141조). '취소한 때로부터'가 아니라 '처음부터' 무효다.","2":"틀림. 법정대리인이 재산 범위를 정하여 처분 허락한 경우, 법정대리인은 그 재산에 관해서도 여전히 대리권을 가진다(처분 허락과 법정대리권은 공존).","3":"틀림. 법정대리인이 특정 영업을 허락한 경우, 그 영업에 관해 미성년자가 성년자와 동일한 행위능력을 갖게 되므로 법정대리인은 그 영업에 관해 대리권을 행사할 수 없다(판례).","4":"맞음. 미성년자가 주민등록증을 변조하여 자기를 능력자로 믿게 하고 법률행위를 한 경우, 미성년자는 그 법률행위를 취소할 수 없다(민법 제17조 속임수).","5":"틀림. 오직 권리만을 얻는 법률행위(채무 없는 증여 수령 등)는 법정대리인의 동의 없이 단독으로 할 수 있다(민법 제5조①)."},"expl_sub":{}},{"num":7,"question":"민법상 법인의 불법행위능력에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 법인의 대표자는 법인을 사실상 대표하는지 여부와 관계없이 대표자로 등기되었는지 여부만을 기준으로 판단하여야 한다.","② 법인의 대표자가 부정한 대표행위를 한 경우에 그 행위가 직무범위 내에 있더라도 법인의 불법행위가 성립될 여지가 없다.","③ 행위의 외형상 법인의 대표자의 직무행위라고 인정되더라도 법령의 규정에 위배된 것이 라면 직무에 관한 행위에 해당하지 않는다.","④ 법인의 대표자의 행위로 법인의 불법행위책임이 성립하는 경우, 특별한 사정이 없는 한법인만이 피해자에게 불법행위책임을 진다.","⑤ 법인의 대표자의 행위가 직무행위에 해당하지 아니함을 피해자 자신이 경과실로 알지 못한 경우에는 법인에게 손해배상책임을 물을 수 있다."],"sub_items":[],"expl_core":"법인의 불법행위책임(민법 제35조) 성립 요건: 대표자가 외형상 직무행위를 하였을 것. 판례는 실질적 대표 여부를 기준으로 보고, 외형상 직무행위이면 법령 위반도 직무 관련으로 본다. 피해자의 경과실은 면책 사유가 아님(⑤가 맞는 설명).","expl_choices":{"1":"틀림. 대표자 여부 판단은 단순히 등기 여부만으로 결정되지 않는다. 실질적으로 법인을 대표하여 사무를 집행하는 자도 대표자에 해당할 수 있다(판례).","2":"틀림. 대표자가 부정한 대표행위를 하였더라도 그 행위가 외형상 직무범위 내에 있으면 법인의 불법행위가 성립할 수 있다(판례).","3":"틀림. 법인 대표자의 행위가 외형상 직무행위로 인정되면, 법령에 위배된 경우에도 '직무에 관한 행위'에 해당할 수 있다(판례).","4":"틀림. 법인의 불법행위 성립 시 법인과 대표자 개인이 연대하여 배상책임을 진다. 법인만 책임지는 것이 아니다(민법 제35조).","5":"맞음. 법인 대표자의 행위가 직무행위에 해당하지 않음을 피해자가 경과실로 알지 못한 경우에는 법인에게 손해배상책임을 물을 수 있다(판례)."},"expl_sub":{}},{"num":8,"question":"민법상 비법인사단에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① 비법인사단에는 대표권제한의 등기에 관한 규정이 적용되지 않는다.","② 비법인사단이 총유물에 관한 매매계약을 체결하는 행위는 총유물의 처분행위가 아니다.","③ 교회가 의결권을 가진 교인 2/3 이상의 찬성으로 소속 교단을 탈퇴한 경우, 종전 교회의 재산은 탈퇴한 교회 소속 교인들의 총유로 귀속되지 않는다.","④ 비법인사단의 구성원은 지분권에 기하여 총유물의 보존행위를 할 수 있다.","⑤ 비법인사단이 타인 간의 금전채무를 보증하는 행위는 총유물의 관리ㆍ처분행위로 볼 수있다."],"sub_items":[],"expl_core":"비법인사단의 특징: ①대표권 제한 등기 규정 불적용(등기능력 없음), ②총유물 매매계약=처분행위(사원총회 결의 필요), ③구성원에게 지분권 없음, ④보증행위는 총유물 관리·처분 아님. ①이 맞는 설명이다.","expl_choices":{"1":"맞음. 비법인사단은 등기능력이 없으므로 법인의 이사 대표권 제한 등기에 관한 민법 제60조 규정이 적용되지 않는다(판례).","2":"틀림. 비법인사단이 총유물에 관한 매매계약을 체결하는 행위는 총유물의 처분행위에 해당하므로 사원총회의 결의가 필요하다(판례).","3":"틀림. 교회가 의결권 있는 교인 2/3 이상의 찬성으로 소속 교단을 탈퇴한 경우, 종전 교회 재산은 탈퇴한 교회 소속 교인들의 총유로 귀속된다(판례).","4":"틀림. 비법인사단의 구성원은 총유물에 대하여 지분권을 갖지 않는다. 따라서 지분권에 기하여 보존행위를 할 수 없다(판례).","5":"틀림. 비법인사단이 타인 간의 금전채무를 보증하는 행위는 총유물 자체의 관리·처분행위가 아니라 채무 부담행위로 총유물의 처분과 무관하다(판례)."},"expl_sub":{}},{"num":9,"question":"물건에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 물건이라 함은 유체물 및 전기 기타 관리할 수 있는 자연력을 말한다.","② 주유소의 주유기는 특별한 사정이 없는 한 주유소 건물의 종물이다.","③ 타인의 토지 위에 권원 없이 식재한 수목의 소유권은 특별한 사정이 없는 한 식재한 자에게 속한다.","④ 물건의 용법에 의하여 수취하는 산출물은 천연과실이다.","⑤ 최소한의 기둥과 지붕 및 주벽이 있는 건물은 토지와는 별개의 독립한 물건으로 인정될수 있다."],"sub_items":[],"expl_core":"권원 없이 타인의 토지에 식재한 수목의 귀속이 쟁점. 판례: 권원 없이 식재한 수목은 토지에 부합하여 토지 소유자의 소유가 된다. '식재한 자에게 속한다'는 ③이 오류다. 주유기-주유소 건물의 종물 관계도 함께 정리.","expl_choices":{"1":"맞음. 물건이라 함은 유체물 및 전기 기타 관리할 수 있는 자연력을 말한다(민법 제98조).","2":"맞음. 주유소의 주유기는 특별한 사정이 없는 한 주유소 건물의 종물이다(판례).","3":"틀림. 타인의 토지 위에 권원 없이 식재한 수목은 토지에 부합하여 토지 소유자의 소유가 된다(판례). '식재한 자에게 속한다'는 서술이 오류다.","4":"맞음. 물건의 용법에 의하여 수취하는 산출물은 천연과실이다(민법 제101조①).","5":"맞음. 최소한의 기둥, 지붕 및 주벽이 있는 건물은 토지와 독립한 별개의 물건으로 인정될 수 있다(판례)."},"expl_sub":{}},{"num":10,"question":"준법률행위에 해당하는 것을 모두 고른 것은?","answer":4,"answer_str":"4","choices":["① ㄱ, ㄴ","② ㄴ, ㄷ","③ ㄷ, ㄹ","④ ㄱ, ㄴ, ㄹ","⑤ ㄴ, ㄷ, ㄹ"],"sub_items":["ㄱ. 채무의 승인 ㄴ. 채권양도의 통지 ㄷ. 매매계약의 해제 ㄹ. 무권대리인의 상대방이 본인에게 하는 무권대리행위의 추인 여부에 대한 확답의 최고"],"expl_core":"준법률행위 vs 법률행위 구별이 핵심. 준법률행위(의사·관념·감정의 통지): 채무 승인(관념의 통지), 채권양도 통지(관념의 통지), 최고(의사의 통지). 법률행위: 계약 해제(단독행위). 정답 ④ (ㄱ, ㄴ, ㄹ).","expl_choices":{"1":"틀림. ①선지 ㄱ, ㄴ. ㄹ도 준법률행위이므로 누락되어 오답이다.","2":"틀림. ②선지 ㄴ, ㄷ. ㄷ(매매계약 해제)은 법률행위(단독행위)이고 ㄱ, ㄹ이 누락되어 오답이다.","3":"틀림. ③선지 ㄷ, ㄹ. ㄷ이 법률행위여서 오답이다.","4":"맞음. ④선지 ㄱ, ㄴ, ㄹ. 셋 다 준법률행위에 해당한다.","5":"틀림. ⑤선지 ㄴ, ㄷ, ㄹ. ㄷ이 법률행위여서 오답이다."},"expl_sub":{"ㄱ":"맞음. 채무의 승인은 관념의 통지로서 준법률행위에 해당한다.","ㄴ":"맞음. 채권양도의 통지는 관념의 통지로서 준법률행위에 해당한다.","ㄷ":"틀림. 매매계약의 해제는 법률행위(단독행위)이므로 준법률행위가 아니다.","ㄹ":"맞음. 본인에게 하는 무권대리행위 추인 여부의 확답 최고는 의사의 통지로서 준법률행위에 해당한다."}},{"num":11,"question":"민법상 강행규정을 위반한 법률행위의 효과에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 강행규정을 위반한 법률행위는 당사자의 주장이 없더라도 법원이 직권으로 판단할 수있다.","② 강행규정을 위반하여 확정적 무효가 된 법률행위는 특별한 사정이 없는 한 당사자의 추인에 의해 유효로 할 수 없다.","③ 강행규정에 위반하여 무효인 계약의 상대방이 그 위반사실에 대하여 선의ㆍ무과실이더 라도 표현대리의 법리가 적용될 여지는 없다.","④ 강행규정에 위반한 약정을 한 자가 스스로 그 약정의 무효를 주장하는 것은 특별한 사정이 없는 한 신의성실 원칙에 반하여 허용될 수 없다.","⑤ 법률의 금지에 위반되는 행위라도 그것이 선량한 풍속 기타 사회질서에 위반하지 않는 경우에는 민법 제746조가 규정하는 불법원인에 해당하지 않는다."],"sub_items":[],"expl_core":"강행규정 위반한 자가 스스로 무효를 주장하는 것이 신의칙에 반하는지가 쟁점. 판례: 강행규정 위반 계약의 무효를 스스로 주장하는 것은 신의칙에 반하지 않는다. ④가 이를 반대로 서술한 오류. 불공정 법률행위나 사기·강박 취소와는 다름에 주의.","expl_choices":{"1":"맞음. 강행규정 위반 여부는 당사자의 주장이 없더라도 법원이 직권으로 판단할 수 있다.","2":"맞음. 강행규정을 위반하여 확정적 무효가 된 법률행위는 당사자의 추인에 의해 유효로 할 수 없다.","3":"맞음. 강행규정 위반으로 무효인 계약에는 설령 상대방이 선의·무과실이라도 표현대리 법리가 적용될 여지가 없다(판례).","4":"틀림. 강행규정에 위반한 약정을 한 자가 스스로 그 약정의 무효를 주장하는 것은 특별한 사정이 없는 한 신의성실의 원칙에 반하지 않는다(판례). '반하여 허용될 수 없다'는 서술이 오류다.","5":"맞음. 법률의 금지에 위반되는 행위라도 선량한 풍속 기타 사회질서에 위반하지 않는 경우에는 민법 제746조의 불법원인에 해당하지 않는다(판례)."},"expl_sub":{}},{"num":12,"question":"권리의 승계취득에 해당하는 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)","answer":1,"answer_str":"1","choices":["① ㄱ, ㄴ","② ㄴ, ㄷ","③ ㄴ, ㄹ","④ ㄷ, ㄹ","⑤ ㄱ, ㄴ, ㄹ"],"sub_items":["ㄱ. 타인 소유의 부동산에 저당권을 취득한 경우 ㄴ. 신축건물의 소유권 보존등기를 마친 자로부터 그 건물에 대하여 전세권을 취득한 경우 ㄷ. 유실물에 대하여 적법하게 소유권을 취득한 경우 ㄹ. 점유취득시효의 완성에 의해 완전한 부동산 소유권을 취득한 경우"],"expl_core":"승계취득 vs 원시취득 구별이 핵심. 승계취득: 기존 권리자의 권리를 기초로 취득(저당권 설정, 전세권 취득). 원시취득: 기존 권리와 무관하게 취득(유실물 소유권 취득, 시효취득). ㄱ, ㄴ이 승계취득, ㄷ, ㄹ이 원시취득.","expl_choices":{"1":"맞음. ①선지 ㄱ, ㄴ. 둘 다 승계취득에 해당한다. 정답.","2":"틀림. ②선지 ㄴ, ㄷ. ㄷ(유실물 소유권)은 원시취득이어서 오답이다.","3":"틀림. ③선지 ㄴ, ㄹ. ㄹ(시효취득)은 원시취득이어서 오답이다.","4":"틀림. ④선지 ㄷ, ㄹ. 둘 다 원시취득이어서 오답이다.","5":"틀림. ⑤선지 ㄱ, ㄴ, ㄹ. ㄹ이 원시취득이어서 오답이다."},"expl_sub":{"ㄱ":"맞음. 타인 소유 부동산에 저당권을 취득하는 것은 기존 소유권을 기초로 설정받는 승계취득이다.","ㄴ":"맞음. 보존등기를 마친 자로부터 전세권을 취득하는 것은 기존 소유자의 소유권에 기초한 승계취득이다.","ㄷ":"틀림. 유실물에 대한 소유권 취득은 기존 권리와 무관한 원시취득이다.","ㄹ":"틀림. 점유취득시효에 의한 소유권 취득은 원시취득이다(판례)."}},{"num":13,"question":"선량한 풍속 기타 사회질서에 반하는 법률행위에 해당하지 않는 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 살인할 것을 조건으로 증여한 경우","② 형사사건에 관하여 보수약정과 별개로 성공보수를 약정한 경우","③ 강제집행을 면할 목적으로 부동산에 허위의 근저당권등기를 마친 경우","④ 수증자가 매도인의 매수인에 대한 배임행위에 적극 가담하여 매매목적 부동산을 증여받은 경우","⑤ 당초부터 오로지 보험사고를 가장하여 보험금을 취득할 목적으로 생명보험계약을 체결한 경우"],"sub_items":[],"expl_core":"반사회질서 법률행위(민법 제103조) 비해당: 강제집행 면탈 목적 허위 근저당 등기 설정. 해당: 살인 조건 증여, 형사 성공보수, 보험사기 목적 생명보험, 배임행위 적극 가담 증여. 강제집행 면탈 목적 허위표시는 별개의 문제(근저당권 자체는 설정계약이 아예 반사회질서는 아님).","expl_choices":{"1":"틀림(=반사회질서 해당). 살인을 조건으로 한 증여는 반사회질서 법률행위로 무효다(민법 제103조).","2":"틀림(=반사회질서 해당). 형사사건에 관하여 보수약정과 별개로 성공보수를 약정하는 것은 반사회질서 법률행위다(판례).","3":"맞음(=반사회질서 비해당). 강제집행을 면할 목적으로 부동산에 허위의 근저당권등기를 마치는 행위 자체는 반사회질서 법률행위에 해당하지 않는다(판례). 허위표시로 무효가 되는 문제이지, 반사회질서는 아니다.","4":"틀림(=반사회질서 해당). 매도인의 배임행위에 적극 가담하여 증여받은 경우 반사회질서 법률행위로 무효다(판례).","5":"틀림(=반사회질서 해당). 처음부터 보험금을 부정취득할 목적으로 체결한 생명보험계약은 반사회질서 법률행위다(판례)."},"expl_sub":{}},{"num":14,"question":"사기에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 사기에 의한 의사표시에는 의사와 표시의 불일치가 있을 수 없고, 단지 의사표시의 동기에 착오가 있는 것에 불과하다.","② 사기의 의사표시로 인해 부동산의 소유권을 취득한 자로부터 그 부동산의 소유권을 새로이 취득한 제3자는 특별한 사정이 없는 한 선의로 추정된다.","③ 교환계약의 당사자가 자기 소유의 목적물의 시가를 묵비하는 것은 특별한 사정이 없는한 기망행위가 되지 않는다.","④ 상대방의 대리인에 의한 사기는 민법 제110조 제2항 소정의 제3자의 사기에 해당하지 않는다.","⑤ 계약이 제3자의 위법한 사기행위로 체결된 경우, 표의자는 그 계약을 취소하지 않는 한제3자를 상대로 그로 인해 발생한 손해의 배상을 청구할 수 없다."],"sub_items":[],"expl_core":"제3자 사기로 계약이 체결된 경우: 표의자는 계약 취소 없이도 제3자에게 불법행위로 인한 손해배상을 청구할 수 있다(판례). ⑤의 '취소하지 않는 한 청구할 수 없다'는 서술이 오류다. 상대방 대리인의 사기=상대방 사기, 교환계약 시가 묵비는 기망 아님도 정리.","expl_choices":{"1":"맞음. 사기에 의한 의사표시는 의사·표시 사이에 불일치가 없고, 의사표시의 동기에 착오가 있는 것에 불과하다.","2":"맞음. 사기로 소유권을 취득한 자로부터 새로이 소유권을 취득한 제3자는 특별한 사정이 없는 한 선의로 추정된다(판례).","3":"맞음. 교환계약에서 자기 소유 목적물의 시가를 묵비하는 것은 특별한 사정이 없는 한 기망행위가 되지 않는다(판례).","4":"맞음. 상대방의 대리인에 의한 사기는 민법 제110조②의 제3자 사기에 해당하지 않는다. 상대방 사기와 동일하게 취급된다(판례).","5":"틀림. 계약이 제3자의 위법한 사기행위로 체결된 경우, 표의자는 계약을 취소하지 않더라도 제3자에게 불법행위로 인한 손해배상을 청구할 수 있다(판례)."},"expl_sub":{}},{"num":15,"question":"“부동산 매매계약에서 당사자 쌍방이 모두 X토지를 그 목적물로 삼았으나 X토지의 지번에 착오를 일으켜 계약체결 시에 계약서상으로는 그 목적물을 Y토지로 표시한 경우라도, X토지를 매매 목적물로 한다는 당사자 쌍방의 의사합치가 있은 이상 그매매계약은 X토지에 관하여 성립한 것으로 보아야 한다.”고 하는 법률행위의 해석방 법은?","answer":3,"answer_str":"3","choices":["① 문언해석","② 통일적 해석","③ 자연적 해석","④ 규범적 해석","⑤ 보충적 해석"],"sub_items":[],"expl_core":"법률행위 해석 방법론 문제. 당사자 쌍방이 실제로 의도한 목적물(X토지)에 관하여 계약이 성립한 것으로 보아야 한다는 해석은 '자연적 해석'이다. 당사자의 공통된 진의(합의된 의사)를 우선하는 방법이다.","expl_choices":{"1":"틀림. 문언해석은 계약서의 문언 그대로 해석하는 방법이다. 이 사례는 문언(Y토지)과 달리 X토지로 해석하므로 문언해석이 아니다.","2":"틀림. 통일적 해석은 여러 조항을 전체적으로 일관성 있게 해석하는 방법이다. 이 사례와 무관하다.","3":"맞음. 자연적 해석은 당사자 쌍방의 공통된 진의(실제 합의 내용)를 기준으로 해석하는 방법이다. 문언과 달리 X토지로 해석하는 것이 자연적 해석이다.","4":"틀림. 규범적 해석은 상대방이 이해했어야 할 객관적 의미를 기준으로 해석하는 방법이다. 이 사례는 쌍방의 공통 의사가 있으므로 규범적 해석 이전에 자연적 해석이 적용된다.","5":"틀림. 보충적 해석은 당사자가 정하지 않은 사항을 법원이 보충하는 방법이다. 이 사례와 무관하다."},"expl_sub":{}},{"num":16,"question":"통정허위표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 채무자의 법률행위가 통정허위표시인 경우에도 채권자취소권의 대상이 될 수 있다.","② 가장 근저당권설정계약이 유효하다고 믿고 그 피담보채권을 가압류한 자는 허위표시의 무효로부터 보호되는 선의의 제3자에 해당한다.","③ 의사표시의 진의와 표시의 불일치에 관하여 상대방과 사이에 합의가 있으면 통정허위표 시가 성립한다.","④ 통정허위표시에 따른 법률효과를 침해하는 것처럼 보이는 위법행위가 있는 경우에도 그에 따른 손해배상을 청구할 수 없다.","⑤ 자신의 채권을 보전하기 위해 가장양도인의 가장양수인에 대한 권리를 대위행사하는 채권자는 허위표시를 기초로 새로운 법률상의 이해관계를 맺은 제3자에 해당한다."],"sub_items":[],"expl_core":"통정허위표시의 제3자 보호 범위 문제. 채권자대위권을 행사하여 가장양수인에 대한 권리를 대위행사하는 채권자는 새로운 법률상 이해관계를 맺은 제3자가 아니다(판례). ⑤가 이를 반대로 서술한 오류.","expl_choices":{"1":"맞음. 채무자의 법률행위가 통정허위표시인 경우에도 채권자취소권의 대상이 될 수 있다(판례).","2":"맞음. 가장 근저당권설정계약이 유효하다고 믿고 그 피담보채권을 가압류한 자는 선의의 제3자에 해당한다(판례).","3":"맞음. 진의와 표시의 불일치에 관하여 상대방과 사이에 합의가 있으면 통정허위표시가 성립한다.","4":"맞음. 통정허위표시에 따른 법률효과를 침해하는 위법행위가 있더라도, 가장 법률행위에 기한 손해배상은 청구할 수 없다(판례).","5":"틀림. 자신의 채권을 보전하기 위하여 가장양도인의 가장양수인에 대한 권리를 채권자대위권으로 행사하는 채권자는 통정허위표시를 기초로 새로운 법률상 이해관계를 맺은 제3자에 해당하지 않는다(판례). 따라서 선의 여부와 무관하게 보호받지 못한다."},"expl_sub":{}},{"num":17,"question":"착오에 의한 의사표시에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 착오로 인하여 표의자가 경제적 불이익을 입은 것이 아니라면 이를 법률행위 내용의 중요부분의 착오라고 할 수 없다.","② 기망행위로 인하여 법률행위의 내용으로 표시되지 않은 동기에 관하여 착오를 일으킨 경우에도 표의자는 그 법률행위를 사기에 의한 의사표시를 이유로 취소할 수 있다.","③ 대리인에 의한 계약체결의 경우, 특별한 사정이 없는 한 착오의 유무는 대리인을 표준으로 판단하여야 한다.","④ 매도인이 매수인의 채무불이행을 이유로 매매계약을 적법하게 해제한 후라도 매수인은 착오를 이유로 취소권을 행사할 수 있다.","⑤ 착오로 인한 의사표시에 있어서 표의자의 중대한 과실 유무에 관한 증명책임은 그 상대 방이 아니라 착오자에게 있다."],"sub_items":[],"expl_core":"착오의 중대한 과실 증명책임이 핵심. 판례: 표의자의 중대한 과실 유무에 관한 증명책임은 착오자가 아니라 그 상대방(취소를 저지하려는 자)에게 있다. ⑤의 '착오자에게 있다'는 서술이 오류.","expl_choices":{"1":"맞음. 착오로 인하여 표의자가 경제적 불이익을 입지 않았다면 법률행위 내용의 중요부분의 착오라고 할 수 없다(판례).","2":"맞음. 기망행위로 인하여 법률행위의 내용으로 표시되지 않은 동기에 착오를 일으킨 경우에도 사기를 이유로 취소할 수 있다(판례).","3":"맞음. 대리인에 의한 계약체결의 경우, 특별한 사정이 없는 한 착오의 유무는 대리인을 표준으로 판단한다(판례).","4":"맞음. 매도인이 매수인의 채무불이행을 이유로 계약을 적법하게 해제한 후라도 매수인은 착오를 이유로 취소권을 행사할 수 있다(판례).","5":"틀림. 착오로 인한 의사표시에서 표의자의 중대한 과실 유무에 관한 증명책임은 착오자가 아니라 그 상대방이 부담한다(판례)."},"expl_sub":{}},{"num":18,"question":"법률행위의 무효와 취소에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 계약이 불공정한 법률행위로서 무효인 경우, 그 계약에 대한 부제소합의는 특별한 사정이 없는 한 유효하다.","② 취소할 수 있는 법률행위에서 취소권자의 상대방이 이행을 청구하는 경우에는 법정추인이 된다.","③ 매매계약이 약정된 대금의 과다로 인해 불공정한 법률행위에 해당하여 무효인 경우, 무효행위의 전환에 관한 민법 제138조는 적용될 여지가 없다.","④ 무권리자가 타인의 권리를 처분하는 계약을 체결한 경우, 권리자가 이를 추인하면 계약의 효과는 원칙적으로 계약체결시에 소급하여 권리자에게 귀속된다.","⑤ 취소할 수 있는 법률행위의 상대방이 그 법률행위로 취득한 권리를 타인에게 임의로 양도한 경우, 특별한 사정이 없는 한 그 취소의 의사표시는 그 양수인을 상대방으로 하여야 한다."],"sub_items":[],"expl_core":"무권리자 처분행위를 권리자가 추인하면 계약 시에 소급하여 효력 발생(④ 맞음). ①불공정 법률행위로 무효인 계약의 부제소합의는 무효(유효 아님), ②법정추인의 이행청구는 취소권자가 상대방에게 하는 것, ③무효행위 전환은 가능, ⑤취소 상대방은 원래 상대방이다.","expl_choices":{"1":"틀림. 계약이 불공정한 법률행위로서 무효인 경우, 그 계약에 대한 부제소합의도 무효다(판례). '유효하다'는 서술이 오류다.","2":"틀림. 법정추인(민법 제145조)에서 '이행청구'는 취소권자가 상대방에게 하는 이행청구이다. 상대방이 취소권자에게 이행청구하는 것은 법정추인 사유가 아니다.","3":"틀림. 불공정 법률행위로 무효인 경우에도 무효행위의 전환(민법 제138조)은 적용될 여지가 있다(판례).","4":"맞음. 무권리자가 타인의 권리를 처분하는 계약을 체결한 경우, 권리자가 추인하면 계약의 효과는 원칙적으로 계약체결 시에 소급하여 권리자에게 귀속된다(판례).","5":"틀림. 취소할 수 있는 법률행위의 상대방이 그 권리를 타인에게 임의로 양도한 경우에도, 취소의 의사표시는 원래 상대방을 기준으로 하여야 한다(판례)."},"expl_sub":{}},{"num":19,"question":"법률행위의 조건과 기한에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 기한이익 상실의 특약은 특별한 사정이 없는 한 정지조건부 기한이익 상실의 특약으로 추정한다.","② 당사자가 불확정한 사실이 발생한 때를 이행기한으로 정한 경우, 그 사실의 발생이 불가 능하게 된 때에는 기한의 도래로 볼 수 없다.","③ 조건성취로 불이익을 받을 자가 과실로 신의성실에 반하여 조건의 성취를 방해한 때에는 상대방은 조건이 성취된 것으로 주장할 수 없다.","④ 기한부 법률행위의 당사자가 기한도래의 효력을 그 도래 전으로 소급하게 할 의사를 표시한 때에는 그 의사에 의한다.","⑤ 조건이 성립하기 위해서는 조건의사와 그 표시가 필요하고, 조건의사가 있더라도 그것이 외부에 표시되지 않으면 원칙적으로 법률행위의 동기에 불과하다."],"sub_items":[],"expl_core":"조건의 성립 요건: 조건의사와 그 표시가 모두 필요하다. 조건의사만 있고 표시되지 않으면 원칙적으로 법률행위의 동기에 불과하다(⑤ 맞음). 기한이익 상실 특약의 종류(형성권적 vs 정지조건부), 불확정기한 처리, 조건 성취 방해 법리도 구별.","expl_choices":{"1":"틀림. 기한이익 상실 특약에는 '형성권적'(채권자가 상실 의사를 표시해야 효력)과 '정지조건부'(불이행 사실 자체로 자동 상실) 두 가지가 있다. 특별한 사정이 없는 한 형성권적으로 추정한다는 것이 판례 입장이다.","2":"틀림. 당사자가 불확정한 사실의 발생을 이행기한으로 정한 경우, 그 사실의 발생이 불가능하게 된 때에는 기한이 도래한 것으로 본다(판례).","3":"틀림. 조건성취로 불이익을 받을 자가 신의성실에 반하여 조건 성취를 방해한 경우, 고의뿐 아니라 과실에 의한 방해도 포함하여 상대방은 조건이 성취된 것으로 주장할 수 있다(민법 제150조①).","4":"틀림. 기한도래의 효력은 소급하지 않는 것이 원칙이다(민법 제152조③). 당사자 사이에 소급 의사 표시가 있어도 제3자의 권리를 침해할 수 없다는 점에서 이를 인정하는 것도 한계가 있다.","5":"맞음. 조건이 성립하기 위해서는 조건의사와 그 표시가 모두 필요하다. 조건의사가 있어도 외부에 표시되지 않으면 원칙적으로 법률행위의 동기에 불과하다."},"expl_sub":{}},{"num":20,"question":"복대리에 관한 설명으로 옳은 것은?","answer":2,"answer_str":"2","choices":["① 복대리인은 대리인의 대리인이다.","② 법정대리인은 언제나 복임권이 있다.","③ 대리인이 파산하여도 복대리권은 소멸하지 않는다.","④ 임의대리인은 본인의 승낙이 있는 때에 한하여 복임권을 갖는다.","⑤ 복대리인이 선임되면 특별한 사정이 없는 한 대리인의 대리권은 소멸한다."],"sub_items":[],"expl_core":"복대리의 핵심 4가지: ①복대리인=본인의 대리인(대리인의 대리인 아님), ②법정대리인=언제나 복임권 있음(임의대리인과 구별), ③복대리인 선임해도 원래 대리인의 대리권 유지, ④임의대리인=본인 승낙 또는 부득이한 사유 시 복임 가능.","expl_choices":{"1":"틀림. 복대리인은 대리인의 대리인이 아니라 본인의 대리인이다(민법 제123조②).","2":"맞음. 법정대리인은 언제나 복임권이 있다(민법 제122조). 임의대리인과 달리 별도의 요건 없이 복대리인을 선임할 수 있다.","3":"틀림. 대리인이 파산한 경우 대리권이 소멸하고(민법 제127조③), 대리권 소멸에 따라 복대리권도 소멸한다.","4":"틀림. 임의대리인은 본인의 승낙이 있거나 부득이한 사유가 있는 때에 복임권을 가진다(민법 제120조). '승낙만 있는 때'로 한정하면 오류다.","5":"틀림. 복대리인이 선임되어도 원래 대리인의 대리권은 소멸하지 않는다. 복대리와 원래 대리권은 병존한다."},"expl_sub":{}},{"num":21,"question":"무권대리인 乙은 아무런 권한 없이 자신을 甲의 대리인이라고 칭하면서 丙과 甲소유의 X토지에 대한 매매계약을 체결하였다. 이에 관한 설명으로 옳지 않은 것은? (표 현대리는 성립하지 않으며, 다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 丙이 계약 체결 당시 乙이 무권대리인임을 알지 못하였다면, 丙은 甲의 추인이 있기 전에 乙을 상대로 계약을 철회할 수 있다.","② 丙이 계약 체결 당시 乙이 무권대리인임을 알았더라도 丙은 상당한 기간을 정하여 甲에게 추인 여부의 확답을 최고할 수 있다.","③ 甲이 乙의 무권대리행위의 내용을 변경하여 추인한 경우, 그 추인은 그에 대한 丙의 동의가 있어야 유효하다.","④ 乙이 대리권을 증명하지 못하고 甲의 추인도 받지 못한 경우, 丙은 계약 체결 당시 乙이 무권대리인임을 알았더라도 乙에게 계약의 이행이나 손해배상을 청구할 수 있다.","⑤ 계약 체결 후 乙이 甲의 지위를 단독상속한 경우, 乙은 본인의 지위에서 丙을 상대로 계약의 추인을 거절할 수 없다."],"sub_items":[],"expl_core":"무권대리인의 상대방 책임(민법 제135조): 상대방이 선의이고 무과실인 경우에 한해 무권대리인에게 이행 또는 손해배상 청구 가능. ④의 '알았더라도 청구할 수 있다'는 서술이 오류. 악의인 상대방은 청구 불가.","expl_choices":{"1":"맞음. 丙이 계약 당시 무권대리인임을 알지 못하였다면, 甲의 추인이 있기 전에 乙을 상대로 계약을 철회할 수 있다(민법 제134조).","2":"맞음. 丙이 무권대리인임을 알았더라도 최고권은 제한 없이 행사할 수 있다(민법 제131조). 최고권은 악의의 상대방도 행사 가능하다.","3":"맞음. 甲이 무권대리행위의 내용을 변경하여 추인한 경우, 그 추인은 丙의 동의가 있어야 유효하다(판례).","4":"틀림. 무권대리인 乙의 상대방에 대한 이행·손해배상 책임(민법 제135조①)은 상대방이 선의이고 무과실인 경우에만 성립한다. 丙이 무권대리인임을 알았다면(악의) 乙에게 책임을 물을 수 없다.","5":"맞음. 무권대리인이 본인을 단독 상속한 경우, 乙은 본인의 지위에서 추인 거절을 할 수 없다. 이는 신의칙에 반한다(판례)."},"expl_sub":{}},{"num":22,"question":"민법상 기간에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 2023년 6월 1일(목) 14시부터 2일간의 기간이 만료하는 때는 2023년 6월 4일 24시이다.","② 2023년 6월 1일(목) 16시부터 72시간의 기간이 만료하는 때는 2023년 6월 4일 16시이다.","③ 2023년 4월 1일(토) 09시부터 2개월의 기간이 만료하는 때는 2023년 6월 2일 24시이다.","④ 2004년 5월 16일(일) 오전 7시에 태어난 사람은 2023년 5월 16일 24시에 성년자가 된다.","⑤ 민법 제157조의 초일불산입의 원칙은 강행규정이므로 당사자의 합의로 달리 정할 수 없다."],"sub_items":[],"expl_core":"기간 계산의 핵심 구별: 시(時)로 정한 경우=즉시 기산(초일 불산입 불적용), 일·월 등으로 정한 경우=초일 불산입(단, 오전 0시 시작 또는 특정일 명시는 예외). ②는 72시간=시(時)로 정한 기간으로 즉시 기산, 6월 1일 16시부터 72시간 후=6월 4일 16시로 정확하다.","expl_choices":{"1":"틀림. '2일간'은 일로 정한 기간이므로 초일 불산입. 6월 1일 14시 시작 → 6월 1일(초일) 불산입 → 6월 2일부터 기산 → 2일 후 6월 3일 24시에 만료한다. '6월 4일 24시'라는 서술이 오류다.","2":"맞음. '72시간'은 시(時)로 정한 기간으로 즉시 기산한다(민법 제156조). 6월 1일 16시부터 72시간=6월 4일 16시에 만료한다.","3":"틀림. '4월 1일 09시부터 2개월'은 월로 정한 기간. 09시 시작이므로 초일(4월 1일) 불산입 → 4월 2일부터 기산 → 6월 2일 24시에 만료하는 것이 원칙이나, 역산법으로 4월 1일부터 2개월=6월 1일 24시로 보는 견해도 있어 '6월 2일 24시'라는 서술은 오류다.","4":"틀림. 출생일을 산입하여 만 나이 계산 시, 2004년 5월 16일 출생자는 2023년 5월 16일이 시작되는 시각(5월 15일 24시=5월 16일 0시)에 만 19세가 되어 성년이 된다. '5월 16일 24시'(= 5월 16일이 끝나는 시각)가 아니다.","5":"틀림. 민법 제157조의 초일 불산입 원칙은 강행규정이 아니라 임의규정으로, 당사자의 합의로 달리 정할 수 있다(판례)."},"expl_sub":{}},{"num":23,"question":"소멸시효에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":4,"answer_str":"4","choices":["① 선택채권의 소멸시효는 선택권을 행사할 수 있는 때로부터 진행한다.","② 부작위를 목적으로 하는 채권의 소멸시효는 위반행위를 한 때로부터 진행한다.","③ 불확정기한부 채권의 소멸시효는 그 기한이 객관적으로 도래한 때로부터 진행한다.","④ 어떤 권리의 소멸시효기간이 얼마나 되는지에 대해서는 법원이 직권으로 판단할 수 없다.","⑤ 부동산에 대한 매매대금채권이 소유권이전등기청구권과 동시이행의 관계에 있는 경우, 매매대금 청구권은 그 지급기일 이후 시효의 진행에 걸린다."],"sub_items":[],"expl_core":"소멸시효기간이 얼마인지는 법원이 직권으로 판단한다. 시효이익의 '원용'만이 당사자의 주장을 요하는 것이고, 시효기간 자체는 법률 규정으로 법원이 직권 판단 가능. ④의 '직권으로 판단할 수 없다'는 서술이 오류.","expl_choices":{"1":"맞음. 선택채권의 소멸시효는 선택권을 행사할 수 있는 때로부터 진행한다.","2":"맞음. 부작위를 목적으로 하는 채권의 소멸시효는 위반행위를 한 때로부터 진행한다(민법 제166조②).","3":"맞음. 불확정기한부 채권의 소멸시효는 그 기한이 객관적으로 도래한 때로부터 진행한다.","4":"틀림. 어떤 권리의 소멸시효기간이 얼마인지에 대해서는 법원이 직권으로 판단할 수 있다(판례). 시효이익의 원용과는 구별해야 한다. '직권으로 판단할 수 없다'는 서술이 오류다.","5":"맞음. 부동산 매매대금채권이 소유권이전등기청구권과 동시이행 관계에 있더라도, 매매대금 청구권은 지급기일 이후 소멸시효가 진행한다(판례)."},"expl_sub":{}},{"num":24,"question":"민법상 3년의 소멸시효 기간의 적용을 받는 채권이 아닌 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 의사의 치료에 관한 채권","② 세무사의 직무에 관한 채권","③ 도급받은 자의 공사에 관한 채권","④ 공인회계사의 직무에 관한 채권","⑤ 수공업자의 업무에 관한 채권"],"sub_items":[],"expl_core":"민법 제163조(3년 시효) 해당 직종 열거: 의사·의료인, 도급인·기사, 변호사·변리사·공증인·공인회계사·법무사, 생산자·상인, 수공업자·제조자. 세무사는 이 열거에 없다 → 10년 일반 시효 적용. 공인회계사와 세무사를 혼동하는 함정에 주의.","expl_choices":{"1":"틀림(=3년 시효 해당). 의사의 치료에 관한 채권은 3년 소멸시효가 적용된다(민법 제163조②).","2":"맞음(=3년 시효 비해당). 세무사는 민법 제163조에 열거된 직종에 포함되지 않는다. 세무사의 직무에 관한 채권은 10년의 일반 소멸시효가 적용된다.","3":"틀림(=3년 시효 해당). 도급받은 자의 공사에 관한 채권은 3년 소멸시효가 적용된다(민법 제163조③).","4":"틀림(=3년 시효 해당). 공인회계사의 직무에 관한 채권은 3년 소멸시효가 적용된다(민법 제163조④). 세무사와 혼동 주의.","5":"틀림(=3년 시효 해당). 수공업자의 업무에 관한 채권은 3년 소멸시효가 적용된다(민법 제163조⑥)."},"expl_sub":{}},{"num":25,"question":"소멸시효 중단에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 지급명령에 의한 시효중단의 효과는 지급명령을 신청한 때에 발생한다.","② 시효이익을 받을 본인의 대리인은 소멸시효 중단사유인 채무의 승인을 할 수 있다.","③ 가압류의 피보전채권에 관하여 본안의 승소판결이 확정되면 가압류에 의한 시효중단의 효력은 당연히 소멸한다.","④ 재판상의 청구로 인하여 중단한 소멸시효는 재판이 확정된 때로부터 새로이 진행한다.","⑤ 시효중단의 효력 있는 승인에는 상대방의 권리에 관한 처분능력이나 권한 있음을 요하지 않는다. 2022년도 제10회 행정사 1차 1교시 A형 ( 22 - 1 )"],"sub_items":[],"expl_core":"가압류에 의한 시효중단 효력과 본안 판결의 관계가 핵심. 판례: 가압류의 피보전채권에 관하여 본안 승소판결이 확정되어도, 가압류에 의한 시효중단 효력이 당연히 소멸하는 것은 아니다. '당연히 소멸한다'는 ③이 오류. 승인의 처분능력 불요, 지급명령 시효중단 시점도 정리.","expl_choices":{"1":"맞음. 지급명령에 의한 시효중단의 효과는 지급명령을 신청한 때에 발생한다(민법 제170조②).","2":"맞음. 시효이익을 받을 본인의 대리인도 소멸시효 중단사유인 채무의 승인을 할 수 있다(판례).","3":"틀림. 가압류의 피보전채권에 관하여 본안의 승소판결이 확정되더라도, 가압류에 의한 시효중단의 효력은 당연히 소멸하지 않는다(판례).","4":"맞음. 재판상의 청구로 인하여 중단한 소멸시효는 재판이 확정된 때로부터 새로이 진행한다(민법 제178조①).","5":"맞음. 시효중단의 효력 있는 승인은 상대방의 권리에 관한 처분능력이나 권한이 없어도 된다(민법 제177조)."},"expl_sub":{}}],"2022":[{"num":1,"question":"민법의 법원(法源)에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2,4","choices":["① 헌법에 의하여 체결․공포된 민사에 관한 조약은 민법의 법원(法源)이 될 수 있다.","② 관습법은 헌법재판소의 위헌법률심판의 대상이 아니다.","③ 관습법의 존재는 특별한 사정이 없으면 당사자의 주장․증명을 기다릴 필요 없이 법원이 직권으로 확정하여야 한다.","④ 사실인 관습은 법원(法源)으로서 법령에 저촉되지 않는 한 법칙으로서의 효력이 있다.","⑤ 공동선조와 성과 본을 같이 하는 후손은 성별의 구별 없이 성년이 되면 당연히 종중의 구성원이 된다고 보는 것이 조리에 합당하다."],"sub_items":[],"expl_core":"관습법의 위헌법률심판 대상 여부와 사실인 관습의 법원(法源) 성격이 쟁점. 헌재는 관습법도 위헌심판 대상이 될 수 있다고 보며(헌재 2003헌가2), 사실인 관습은 법원이 아닌 의사 보충 기능. 이 시험에서는 ②와 ④ 모두 문제 있는 설명으로 취급되었다.","expl_choices":{"1":"맞음. 헌법에 의하여 체결·공포된 민사에 관한 조약은 법률과 같은 효력을 가지므로 민법의 법원이 될 수 있다(헌법 제6조).","2":"틀림. 관습법도 실질적으로 법률과 같은 효력을 가지는 경우 헌법재판소의 위헌법률심판 대상이 될 수 있다(헌재 결정).","3":"맞음. 관습법의 존재는 특별한 사정이 없으면 법원이 직권으로 확정하여야 한다(판례).","4":"틀림. 사실인 관습은 법원(法源)이 아니다. 사실인 관습은 법적 효력이 없고, 당사자의 의사를 해석·보충하는 자료로 기능할 뿐이다.","5":"맞음. 공동선조와 성·본을 같이 하는 후손은 성별 구별 없이 성년이 되면 당연히 종중의 구성원이 된다고 보는 것이 조리에 합당하다(판례)."},"expl_sub":{}},{"num":2,"question":"신의칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 신의칙에 반하는 것은 강행규정에 위반하는 것이므로 당사자의 주장이 없더라도 법원이 직권으로 판단할 수 있다.","② 법정대리인의 동의 없이 신용구매계약을 체결한 미성년자가 나중에 법정대리인의 동의 없음을 이유로 그 계약을 취소하는 것은 신의칙에 반한다.","③ 무권대리인이 본인을 단독상속한 경우, 본인의 지위에서 자신이 한 무권대리행위의 추인을 거절하는 것은 신의칙에 반한다.","④ 병원은 입원환자의 휴대품 등의 도난을 방지하기 위하여 필요한 적절한 조치를 강구하여줄 신의칙상 보호의무가 있다.","⑤ 채권자가 유효하게 성립한 계약에 따른 급부의 이행을 청구하는 경우, 법원이 신의칙에 의하여 그 급부의 일부를 감축하는 것은 원칙적으로 허용되지 않는다."],"sub_items":[],"expl_core":"미성년자가 자신의 미성년을 이유로 계약을 취소하는 것은 신의칙에 반하지 않는다(판례). 미성년자 보호를 위한 취소권 행사 자체를 신의칙 위반이라고 볼 수 없다. ②가 이를 반대로 서술한 오류. 무권대리인 단독 상속 후 추인 거절=신의칙 위반도 함께 정리.","expl_choices":{"1":"맞음. 신의칙 위반은 강행규정에 위반하는 것이므로 법원이 직권으로 판단할 수 있다(판례).","2":"틀림. 법정대리인의 동의 없이 신용구매계약을 체결한 미성년자가 미성년을 이유로 그 계약을 취소하는 것은 신의칙에 반하지 않는다(판례). 미성년자 보호 제도 취지상 허용된다.","3":"맞음. 무권대리인이 본인을 단독 상속한 경우, 본인의 지위에서 자신의 무권대리행위의 추인을 거절하는 것은 신의칙에 반한다(판례).","4":"맞음. 병원은 입원환자의 휴대품 도난을 방지하기 위하여 적절한 조치를 강구할 신의칙상 보호의무를 부담한다(판례).","5":"맞음. 채권자가 유효하게 성립한 계약에 따른 급부의 이행을 청구하는 경우, 법원이 신의칙에 의하여 그 급부의 일부를 감축하는 것은 원칙적으로 허용되지 않는다(판례)."},"expl_sub":{}},{"num":3,"question":"부재와 실종에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":2,"answer_str":"2","choices":["① 부재자로부터 재산처분권을 위임받은 재산관리인은 그 재산을 처분함에 있어 법원의 허가를 받지 않아도 된다.","② 법원이 선임한 부재자 재산관리인의 권한초과행위에 대한 법원의 허가 결정은 기왕의 법률행위를 추인하는 방법으로는 할 수 없다.","③ 법원은 법원이 선임한 부재자 재산관리인으로 하여금 부재자의 재산관리 및 반환에 관하여 상당한 담보를 제공하게 할 수 있다.","④ 실종선고를 받은 자는 실종기간이 만료된 때에 사망한 것으로 본다.","⑤ 부재자의 제1순위 상속인이 있는 경우, 제2순위 상속인은 특별한 사정이 없는 한 부재자에 관한 실종선고를 청구할 수 있는 이해관계인이 아니다."],"sub_items":[],"expl_core":"법원이 선임한 부재자 재산관리인의 권한초과행위에 대하여 법원이 사후 추인 방식으로 허가 결정을 할 수 있다(판례). '추인하는 방법으로는 할 수 없다'는 ②가 오류다. 본인이 정한 관리인과 법원이 선임한 관리인의 권한 범위도 구별.","expl_choices":{"1":"맞음. 부재자로부터 재산처분권을 위임받은 재산관리인은 위임받은 범위 내에서 법원 허가 없이 처분할 수 있다.","2":"틀림. 법원이 선임한 부재자 재산관리인의 권한초과행위에 대한 허가 결정은 기왕의 법률행위를 추인하는 방법으로도 할 수 있다(판례). '추인 방법으로는 할 수 없다'는 서술이 오류다.","3":"맞음. 법원은 선임한 재산관리인에게 부재자의 재산관리 및 반환에 관하여 상당한 담보를 제공하게 할 수 있다(민법 제25조).","4":"맞음. 실종선고를 받은 자는 실종기간이 만료된 때에 사망한 것으로 본다(민법 제28조).","5":"맞음. 제1순위 상속인이 있는 경우, 제2순위 상속인은 특별한 사정이 없는 한 실종선고 청구의 이해관계인이 아니다(판례)."},"expl_sub":{}},{"num":4,"question":"후견에 관한 설명으로 옳지 않은 것은?","answer":5,"answer_str":"5","choices":["① 가정법원은 성년후견개시의 심판을 할 때 본인의 의사를 고려하여야 한다.","② 가정법원이 피성년후견인에 대하여 한정후견개시의 심판을 할 때에는 종전의 성년후견의 종료 심판을 하여야 한다.","③ 피성년후견인의 법률행위는 원칙적으로 취소할 수 있지만, 가정법원은 취소할 수 없는 법률행위의 범위를 정할 수 있다.","④ 가정법원은 피한정후견인이 한정후견인의 동의를 받아야 하는 행위의 범위를 정할 수있다.","⑤ 가정법원은 정신적 제약으로 특정한 사무에 관하여 후원이 필요한 자에 대하여는 본인의 의사에 반하더라도 특정후견의 심판을 할 수 있다."],"sub_items":[],"expl_core":"특정후견의 핵심 제한: 본인의 의사에 반하여 심판 불가(민법 제14조의2 제2항). 성년후견·한정후견은 본인 의사를 '고려'하면 되지만, 특정후견은 의사에 반하는 심판 자체가 금지된다. ⑤가 이를 위반한 서술이다.","expl_choices":{"1":"맞음. 가정법원은 성년후견개시의 심판을 할 때 본인의 의사를 고려하여야 한다(민법 제9조②).","2":"맞음. 피성년후견인에게 한정후견개시 심판을 할 때에는 종전 성년후견의 종료 심판을 하여야 한다(민법 제14조②).","3":"맞음. 피성년후견인의 법률행위는 원칙적으로 취소할 수 있고, 가정법원은 취소할 수 없는 법률행위의 범위를 정할 수 있다(민법 제10조②).","4":"맞음. 가정법원은 피한정후견인이 한정후견인의 동의를 받아야 하는 행위의 범위를 정할 수 있다(민법 제13조①).","5":"틀림. 특정후견의 심판은 본인의 의사에 반하여서는 할 수 없다(민법 제14조의2 제2항). '의사에 반하더라도 할 수 있다'는 서술이 오류다."},"expl_sub":{}},{"num":5,"question":"민법상 법인에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① 재단법인의 기본재산을 새롭게 편입하는 행위는 주무관청의 허가를 받지 않아도 유효하다.","② 재단법인의 감사는 민법상 필수기관이다.","③ 사단법인의 사원권은 정관에 정함이 있는 경우 상속될 수 있다.","④ 사단법인이 정관에 이사의 대표권에 관한 제한을 규정한 경우에는 이를 등기하지 않더 라도 악의의 제3자에게 대항할 수 있다.","⑤ 이사 전원의 의결에 의하여 잔여재산을 처분하도록 한 사단법인의 정관 규정은 성질상 등기하여야만 제3자에게 대항할 수 있는 청산인의 대표권에 관한 제한으로 보아야 한다."],"sub_items":[],"expl_core":"사단법인 사원권의 상속 가능성이 쟁점(정관에 정함이 있으면 상속 가능). 재단법인 기본재산 편입=주무관청 허가 필요, 감사=임의기관, 대표권 제한 등기미경료시 제3자 대항 불가가 함께 출제된 문제다.","expl_choices":{"1":"틀림. 재단법인의 기본재산을 새롭게 편입(추가)하는 행위도 기본재산의 변경에 해당하므로 주무관청의 허가가 필요하다(판례).","2":"틀림. 민법상 재단법인의 감사는 임의기관이다. 반드시 두어야 하는 필수기관이 아니다.","3":"맞음. 사단법인의 사원권은 정관에 상속에 관한 정함이 있는 경우 상속될 수 있다(판례).","4":"틀림. 사단법인이 정관에 이사의 대표권 제한을 규정하였더라도, 이를 등기하지 않으면 선의·악의를 불문하고 제3자에게 대항할 수 없다(민법 제60조, 행정사 시험 기준).","5":"틀림. 이사 전원의 의결로 잔여재산을 처분하도록 한 정관 규정은 청산인의 대표권 제한이 아니라 청산사무 처리 절차에 관한 내부 규정으로, 등기 없이도 제3자에게 효력이 있다(판례)."},"expl_sub":{}},{"num":6,"question":"甲법인의 대표이사 乙은 대표자로서의 모든 권한을 丙에게 포괄적으로 위임하여 丙이 실질적으로 甲법인의 사실상 대표자로서 그 사무를 집행하고 있다. 이에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)","answer":3,"answer_str":"3","choices":["① ㄱ","② ㄴ","③ ㄱ, ㄴ","④ ㄱ, ㄷ","⑤ ㄴ, ㄷ"],"sub_items":["ㄱ. 甲의 사무에 관한 丙의 대행행위는 원칙적으로 甲에게 효력이 미치지 않는다.","ㄴ. 丙이 외관상 직무행위로 인하여 丁에게 손해를 입힌 경우, 甲은 특별한 사정이 없는 한 丁에 대하여 법인의 불법행위책임에 관한 민법 제35조의 손해배상책임을 진다.","ㄷ. 만약 甲이 비법인사단이라면 乙은 甲의 사무 중 정관에서 대리를 금지한 사항의 처리에 대해서도 丙에게 포괄적으로 위임할 수 있다."],"expl_core":"법인 대표자가 모든 권한을 포괄 위임한 경우: ①위임 자체가 원칙적으로 무효여서 대행행위는 법인에 효력 미치지 않음, ②그러나 외관상 직무행위이면 민법 제35조 불법행위 책임 성립, ③정관 대리 금지 사항은 비법인사단이어도 포괄 위임 불가. ㄱ, ㄴ이 맞음.","expl_choices":{"1":"틀림. ①선지 ㄱ만. ㄴ도 맞는 설명이므로 오답이다.","2":"틀림. ②선지 ㄴ만. ㄱ도 맞는 설명이므로 오답이다.","3":"맞음. ③선지 ㄱ, ㄴ. 둘 다 옳은 설명이다. 정답.","4":"틀림. ④선지 ㄱ, ㄷ. ㄷ이 틀린 설명이어서 오답이다.","5":"틀림. ⑤선지 ㄴ, ㄷ. ㄷ이 틀린 설명이어서 오답이다."},"expl_sub":{"ㄱ":"맞음. 대표자가 권한 전부를 타인에게 포괄 위임하는 것은 원칙적으로 허용되지 않으므로 丙의 대행행위는 甲법인에 효력이 미치지 않는다.","ㄴ":"맞음. 포괄 위임이 무효라도 丙이 외관상 직무행위로 丁에게 손해를 입힌 경우, 甲법인은 민법 제35조의 불법행위책임을 질 수 있다(판례).","ㄷ":"틀림. 비법인사단이라도 정관에서 대리를 금지한 사항은 타인에게 위임할 수 없다. 법인에 관한 민법 제62조(이사의 대리금지 사항)가 유추적용된다."}},{"num":7,"question":"민법상 법인의 해산과 청산에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)","answer":5,"answer_str":"5","choices":["① 해산한 법인은 청산의 목적범위 내에서만 권리가 있고 의무를 부담한다.","② 사단법인 총회의 해산결의는 정관에 다른 규정이 없는 한 총사원의 4분의 3 이상의 동의가 필요하다.","③ 민법상 청산절차에 관한 규정에 반하는 잔여재산의 처분행위는 특별한 사정이 없는 한무효이다.","④ 청산 중의 법인은 변제기에 이르지 아니한 채권에 대해서도 변제할 수 있다.","⑤ 법인의 청산인은 채권신고기간 내에는 채권자에 대하여 변제하지 못하므로 법인은 그기간 동안의 지연손해배상의무를 면한다."],"sub_items":[],"expl_core":"채권신고기간 내에 변제하지 못하더라도 법인의 지연손해배상의무는 면제되지 않는다(판례). 민법이 변제를 금지한 것은 채권자 평등을 위한 것이지, 지연책임까지 면제한 것은 아니다. ⑤가 이를 반대로 서술한 오류.","expl_choices":{"1":"맞음. 해산한 법인은 청산 목적 범위 내에서만 권리가 있고 의무를 부담한다(민법 제81조).","2":"맞음. 사단법인 총회의 해산결의는 정관에 다른 규정이 없는 한 총
