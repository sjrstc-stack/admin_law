    <div class="q-meta">
      <span class="q-num">Q${q.num}</span>
      <span class="q-exam-tag">${q.exam} · ${q.year}</span>
      <span class="q-subject-tag">${q.subject}</span>
    </div>`;

  // Stem
  const stemHtml = `<div class="q-stem">${escHtml(q.stem)}</div>`;

  // Choices
  const ans = q.answer;
  const isAllCorrect = (ans === '전부정답');
  const ansNum = typeof ans === 'number' ? ans : null;

  let choicesHtml = '<div class="q-choices">';
  for (const [k, v] of Object.entries(q.choices)) {
    const idx = parseInt(k);
    let cls = 'choice-btn';
    if (ansState) {
      if (isAllCorrect) {
        cls += ' correct-answer';
      } else if (idx === ansNum) {
        cls += ' correct-answer';
      } else if (idx === ansState.selected && idx !== ansNum) {
        cls += ' wrong-answer';
      }
    } else if (ansState === undefined) {
      // not yet answered
    }
    const disabled = ansState ? 'disabled' : '';
    const selectedData = (ansState && ansState.selected === idx) ? 'data-selected="true"' : '';
    choicesHtml += `<button class="${cls}" ${disabled} ${selectedData}
      onclick="selectChoice('${id}', ${idx}, this)"
      data-idx="${idx}">
      <span class="choice-badge">${CIRCLE_NUMS[idx-1]}</span>
      <span class="choice-text">${escHtml(v)}</span>
    </button>`;
  }
  choicesHtml += '</div>';

  // Actions
  let resultHtml = '';
  if (ansState) {
    if (isAllCorrect) {
      resultHtml = `<div class="result-badge all-correct">✦ 전항 정답</div>`;
    } else if (ansState.correct) {
      resultHtml = `<div class="result-badge correct">✓ 정답</div>`;
    } else {
      resultHtml = `<div class="result-badge wrong">✗ 오답 · 정답: ${CIRCLE_NUMS[ansNum-1]}</div>`;
    }
  }

  const submitDisabled = !ansState ? '' : 'disabled';
  const actionsHtml = `
    <div class="q-actions">
      <button class="submit-btn" ${submitDisabled} onclick="submitAnswer('${id}')">
        정답 확인
      </button>
      ${resultHtml}
    </div>`;

  // Explanation (shown after answer)
  let explainHtml = '';
  if (ansState) {
    explainHtml = buildExplanation(q, ansState);
  }

  card.innerHTML = metaHtml + stemHtml + choicesHtml + actionsHtml + explainHtml;

  // Track selected choice
  card._selectedIdx = ansState ? ansState.selected : null;

  return card;
}

function selectChoice(id, idx, btnEl) {
  if (answered[id]) return;
  const card = document.getElementById('card-' + id);
  card.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  card._selectedIdx = idx;
}

function submitAnswer(id) {
  const card = document.getElementById('card-' + id);
  const selected = card._selectedIdx;
  if (!selected) return;

  const q = ALL_Q.find(q => qId(q) === id);
  const ans = q.answer;
  const isAllCorrect = ans === '전부정답';
  const ansNum = typeof ans === 'number' ? ans : null;
  const isCorrect = isAllCorrect || (selected === ansNum);

  answered[id] = { selected, correct: isCorrect };

  // Re-render card
  const newCard = buildCard(q);
  card.replaceWith(newCard);

  updateProgress(getFilteredQs());
}

function buildExplanation(q, ansState) {
  const ans = q.answer;
  const isAllCorrect = ans === '전부정답';
  const ansNum = typeof ans === 'number' ? ans : null;
  const expl = q.explanation || '';

  let html = `<div class="explanation show">
    <div class="explanation-header">
      <span class="explanation-title">해설</span>
    </div>
    <div class="ai-explain-body">${formatExplainStatic(expl, ansNum, ansState.selected, isAllCorrect)}</div>`;

  if (isAllCorrect) {
    html += `<div class="all-correct-note">※ 이 문제는 모든 선지가 정답으로 처리된 문항입니다. (12회 26번)</div>`;
  }

  html += '</div>';
  return html;
}

function formatExplainStatic(text, ansNum, selectedNum, isAllCorrect) {
  if (!text) return '<span style="color:var(--text-muted)">해설 준비 중입니다.</span>';
  const escaped = escHtml(text).replace(/\n/g, '<br>');
  // ★ 핵심 강조
  return escaped
    .replace(/(★ 핵심:[^<]*)/g, '<strong style="color:var(--accent)">$1</strong>')
    .replace(/(✓ 정답[^<]*)/g, '<strong style="color:var(--correct)">$1</strong>');
}


function updateProgress(qs) {
  const answeredCount = qs.filter(q => answered[qId(q)]).length;
  const total = qs.length;
  const pct = total > 0 ? Math.round(answeredCount / total * 100) : 0;

  document.getElementById('progress-text').textContent = `${answeredCount} / ${total} 풀이완료`;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Score panel
  const correctCount = qs.filter(q => answered[qId(q)]?.correct).length;
  const wrongCount = answeredCount - correctCount;
  const scorePct = answeredCount > 0 ? Math.round(correctCount / answeredCount * 100) : 0;

  if (answeredCount > 0) {
    document.getElementById('score-panel').style.display = 'flex';
    document.getElementById('score-correct').textContent = correctCount;
    document.getElementById('score-wrong').textContent = wrongCount;
    document.getElementById('score-pct').textContent = scorePct + '%';
  } else {
    document.getElementById('score-panel').style.display = 'none';
  }
}

function resetAnswers() {
  const qs = getFilteredQs();
  if (qs.length === 0) return;
  const label = currentFilter === 'all' ? '전체 문제' :
    currentFilter.startsWith('exam:') ? currentFilter.slice(5) + ' 문제' :
    currentFilter.slice(5) + ' 주제 문제';
  if (!confirm(`${label} 풀이 기록을 초기화할까요?`)) return;
  for (const q of qs) {
    delete answered[qId(q)];
  }
  renderQuestions();
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Init
buildSidebar();
renderQuestions();
</script>
</body>
</html>
