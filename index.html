<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행정법 기출문제 - 주제별</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #f0f2f8;
    --border: #dde1f0;
    --accent: #3b5bdb;
    --accent2: #7c3aed;
    --text: #1a1d2e;
    --text-muted: #6b7280;
    --correct: #16a34a;
    --correct-bg: rgba(22,163,74,0.08);
    --wrong: #dc2626;
    --wrong-bg: rgba(220,38,38,0.08);
    --highlight: rgba(59,91,219,0.07);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #f5f6fa 0%, #eef0fb 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header-title span {
    color: var(--accent);
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Layout ── */
  .layout {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 0;
    min-height: calc(100vh - 80px);
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: #c5cae9; border-radius: 2px; }

  .sidebar-section {
    margin-bottom: 24px;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 8px;
    margin-bottom: 8px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .filter-btn:hover {
    background: var(--highlight);
    color: var(--text);
  }
  .filter-btn.active {
    background: var(--highlight);
    color: var(--accent);
    font-weight: 500;
  }
  .filter-btn .count {
    font-size: 11px;
    background: var(--surface2);
    padding: 1px 7px;
    border-radius: 20px;
    color: var(--text-muted);
    min-width: 28px;
    text-align: center;
  }
  .filter-btn.active .count {
    background: rgba(59,91,219,0.12);
    color: var(--accent);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 8px 12px;
  }

  /* ── Main Content ── */
  .main {
    padding: 28px 32px;
  }

  .view-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .view-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .view-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .progress-bar {
    width: 120px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* ── Question Card ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .q-card:hover {
    border-color: #3a3f60;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .q-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(108,142,255,0.12);
    padding: 2px 9px;
    border-radius: 20px;
  }
  .q-exam-tag {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 20px;
  }
  .q-subject-tag {
    font-size: 11px;
    color: var(--accent2);
    background: rgba(167,139,250,0.1);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .q-stem {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 16px;
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .q-choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    text-align: left;
    line-height: 1.6;
    transition: all 0.15s;
  }
  .choice-btn:not(:disabled):hover {
    border-color: var(--accent);
    background: var(--highlight);
  }
  .choice-badge {
    font-weight: 700;
    font-size: 13px;
    min-width: 20px;
    color: var(--accent);
    flex-shrink: 0;
    padding-top: 1px;
  }
  .choice-text {
    flex: 1;
  }

  /* Choice states */
  .choice-btn.selected:not(.revealed) {
    border-color: var(--accent);
    background: var(--highlight);
  }
  .choice-btn.correct-answer {
    border-color: var(--correct) !important;
    background: var(--correct-bg) !important;
  }
  .choice-btn.correct-answer .choice-badge {
    color: var(--correct);
  }
  .choice-btn.wrong-answer {
    border-color: var(--wrong) !important;
    background: var(--wrong-bg) !important;
  }
  .choice-btn.wrong-answer .choice-badge {
    color: var(--wrong);
  }
  .choice-btn:disabled {
    cursor: default;
  }

  /* ── Submit/Result ── */
  .q-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .submit-btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .submit-btn:hover:not(:disabled) {
    opacity: 0.9;
    transform: translateY(-1px);
  }
  .submit-btn:disabled {
    opacity: 0.4;
    cursor: default;
    transform: none;
  }

  .result-badge {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
  }
  .result-badge.correct {
    display: flex;
    background: var(--correct-bg);
    color: var(--correct);
    border: 1px solid rgba(74,222,128,0.3);
  }
  .result-badge.wrong {
    display: flex;
    background: var(--wrong-bg);
    color: var(--wrong);
    border: 1px solid rgba(248,113,113,0.3);
  }
  .result-badge.all-correct {
    display: flex;
    background: rgba(108,142,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(108,142,255,0.3);
  }

  /* ── Explanation ── */
  .explanation {
    display: none;
    margin-top: 14px;
    padding: 14px 16px;
    background: #f8f9ff;
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-muted);
    animation: fadeIn 0.2s ease;
  }
  .explanation.show {
    display: block;
  }
  .explanation-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .choice-explain {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .choice-explain:last-child { border-bottom: none; }
  .choice-explain-num {
    font-weight: 700;
    margin-right: 6px;
  }
  .choice-explain-num.is-answer { color: var(--correct); }
  .choice-explain-num.is-wrong-pick { color: var(--wrong); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  /* ── Score panel ── */
  .score-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .score-item {
    text-align: center;
  }
  .score-num {
    font-size: 28px;
    font-weight: 700;
    font-family: 'Noto Serif KR', serif;
    line-height: 1;
  }
  .score-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .score-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      position: static;
      height: auto;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 16px;
    }
    .main { padding: 20px 16px; }
    header { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">행정법 <span>기출문제</span> 주제별 풀기</div>
    <div class="header-sub">행정사 1차 시험 · 2021~2025년 (9~13회) · 행정법 문제만 수록</div>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">전체</div>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">
        <span>전체 문제</span>
        <span class="count" id="count-all">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">회차별</div>
      <div id="exam-filters"></div>
    </div>

    <div class="divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">주제별</div>
      <div id="subject-filters"></div>
    </div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="view-header">
      <div>
        <div class="view-title" id="view-title">전체 문제</div>
        <div class="view-meta" id="view-meta"></div>
      </div>
      <div class="progress-wrap">
        <span id="progress-text">0 / 0 풀이완료</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="score-panel" id="score-panel" style="display:none">
      <div class="score-item">
        <div class="score-num" style="color:var(--correct)" id="score-correct">0</div>
        <div class="score-label">정답</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <div class="score-num" style="color:var(--wrong)" id="score-wrong">0</div>
        <div class="score-label">오답</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <div class="score-num" style="color:var(--accent)" id="score-pct">0%</div>
        <div class="score-label">정답률</div>
      </div>
    </div>

    <div id="q-list"></div>
  </main>
</div>

<script>
const RAW_DATA = {"13회": [{"num": 26, "stem": "26. 행정기본법상 법원칙에 관한 설명이다. ( )에 들어갈 용어는? ( \t)의 원칙 : 행정청은 행정작용을 할 때 상대방에게 해당 행정작용과 실질 적인 관련이 없는 의무를 부과해서는 아니 된다.", "choices": {"1": "신뢰보호", "2": "평등", "3": "부당결부금지", "4": "명확성", "5": "법률유보"}, "answer": 3, "subject": "행정의 법원칙·기본원리", "exam": "13회", "year": 2025}, {"num": 27, "stem": "27. 행정기본법의 조문의 일부이다. ( )에 들어갈 내용으로 옳은 것은? ○ 행정작용은 ( ㄱ )에 위반되어서는 아니 되며, 국민의 권리를 제한하거나 의무를 부과하는 경우와 그 밖에 국민생활에 중요한 영향을 미치는 경우에는 ( ㄱ )에 근거하여야 한다. ○ 당사자의 신청에 따른 처분은 ( ㄴ )등에 특별한 규정이 있거나 처분 당시의 ( ㄴ )등을 적용하기 곤란한 특별한 사정이 있는 경우를 제외하고는 처분 당시의 ( ㄴ )등에 따른다.", "choices": {"1": "ㄱ: 헌법, ㄴ: 법률", "2": "ㄱ: 헌법, ㄴ: 법령", "3": "ㄱ: 법률, ㄴ: 법률", "4": "ㄱ: 법률, ㄴ: 법령", "5": "ㄱ: 법령, ㄴ: 법령"}, "answer": 4, "subject": "행정의 법원칙·기본원리", "exam": "13회", "year": 2025}, {"num": 28, "stem": "28. 행정계획에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정계획이란 특정한 행정목표를 달성하기 위하여 서로 관련되는 행정수단을 종합ㆍ조 정함으로써 장래의 일정한 시점에 일정한 질서를 실현하기 위한 활동기준으로 설정된 것이다.", "2": "행정주체는 구체적인 행정계획을 입안ㆍ결정하면서 비교적 광범위한 형성의 자유를 가진다.", "3": "행정주체가 기반시설을 조성하기 위하여 도시ㆍ군계획시설결정을 할 때 행사하는 재량권 에는 한계가 있다.", "4": "자연환경 보호 등을 목적으로 하는 도시관리계획결정은 행정청의 재량적 판단으로서, 그 내용이 현저히 합리성을 결여하거나 형평이나 비례의 원칙에 뚜렷하게 반하는 등의 사정이 없는 한 폭넓게 존중되어야 한다.", "5": "구) 「도시계획법」상 도시기본계획은 일반 국민에 대한 직접적인 구속력이 있다."}, "answer": 5, "subject": "행정의 법원칙·기본원리", "exam": "13회", "year": 2025}, {"num": 29, "stem": "29. 행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "상급행정기관의 소속 공무원에 대한 업무처리지침은 일반적으로 행정조직 내부에서만 효력을 가진다.", "2": "조례는 집행행위의 개입 없이도 그 자체로서 직접 국민의 구체적인 권리의무에 영향을 미치는 등의 법률상 효과를 발생하는 경우에도 항고소송의 대상이 될 수 없다.", "3": "처분이 행정규칙을 위반하였다고 해서 그러한 사정만으로 곧바로 위법하게 되는 것은 아니다.", "4": "지방의회는 자치사무에 관하여 법률에 특별한 규정이 없는 한 지방자치단체의 장의 고유권한을 침해하지 않는 범위 내에서 조례를 제정할 수 있다.", "5": "법령보충적 행정규칙은 상위법령과 결합하여 대외적 구속력이 있는 법규명령으로서의 효력을 가진다."}, "answer": 2, "subject": "행정입법", "exam": "13회", "year": 2025}, {"num": 30, "stem": "30. 인허가의제 제도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "인허가의제를 받으려면 주된 인허가를 신청할 때, 불가피한 사유로 함께 제출할 수 없는 경우가 아니라면 관련 인허가에 필요한 서류를 함께 제출하여야 한다.", "2": "주된 인허가 행정청은 주된 인허가를 하기 전에 관련 인허가에 관하여 미리 관련 인허가 행정청과 협의하여야 한다.", "3": "인허가의제의 효과는 주된 인허가의 해당 법률에 규정된 관련 인허가에 한정된다.", "4": "인허가의제의 경우 관련 인허가 행정청은 관련 인허가를 직접 한 것으로 보아 관계 법령에 따른 관리ㆍ감독 등 필요한 조치를 하여야 한다.", "5": "인허가의제 제도는 사업시행자의 이익을 위하여 만들어진 것이므로 사업시행자가 반드시 관련 인허가의제 처리를 신청할 의무가 있다."}, "answer": 5, "subject": "인허가의제", "exam": "13회", "year": 2025}, {"num": 31, "stem": "31. 행정행위의 직권취소에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정행위의 취소사유가 있는 경우에는 신뢰보호의 원칙 등을 고려할 필요가 없다.", "2": "처분청은 그 처분의 성립에 하자가 있는 경우 이를 취소할 별도의 법적 근거가 없다고 하더라도 직권으로 이를 취소할 수 있다.", "3": "행정청의 행정행위 취소가 있더라도 취소사유의 내용, 경위 기타 제반 사정을 종합하여 행정행위의 효력을 장래에 향해 소멸시키는 행정행위의 철회에 해당하는지 살펴보아야 한다.", "4": "행정행위의 취소는 일단 유효하게 성립한 행정행위를 성립 당시 존재하던 하자를 사유로 소급하여 효력을 소멸시키는 행정처분이다.", "5": "취소사유로는 위법이 있는 경우만이 아니라 부당한 경우도 포함한다."}, "answer": 1, "subject": "행정의 법원칙·기본원리", "exam": "13회", "year": 2025}, {"num": 32, "stem": "32. 재량행위에 해당하는 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 구)「출입국관리법」상 체류자격변경허가 ㄴ. 구)「농지법」에 따른 농지의 전용행위를 수반하는 건축허가 ㄷ. 구)「공유수면 관리 및 매립에 관한 법률」상 공유수면 점용허가 ㄹ. 구)「국유재산법」에 의한 국유재산의 무단점유 등에 대한 변상금부과", "choices": {"1": "ㄱ, ㄴ", "2": "ㄱ, ㄹ", "3": "ㄷ, ㄹ", "4": "ㄱ, ㄴ, ㄷ", "5": "ㄴ, ㄷ, ㄹ"}, "answer": 4, "subject": "재량행위·기속행위", "exam": "13회", "year": 2025}, {"num": 33, "stem": "33. 행정지도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정지도를 하는 자는 그 상대방에게 그 행정지도의 취지 및 내용과 신분을 밝혀야 한다.", "2": "행정기관은 행정지도의 상대방이 행정지도에 따르지 아니하였다는 것을 이유로 불이익 한 조치를 하여서는 아니 된다.", "3": "「국가배상법」이 정한 배상청구의 요건인 공무원의 직무에는 행정지도와 같은 비권력적 작용은 포함되지 않는다.", "4": "행정지도의 상대방은 해당 행정지도의 방식ㆍ내용 등에 관하여 행정기관에 의견제출을 할 수 있다.", "5": "행정지도는 그 목적 달성에 필요한 최소한도에 그쳐야 하며, 행정지도의 상대방의 의사에 반하여 부당하게 강요하여서는 아니 된다."}, "answer": 3, "subject": "행정지도", "exam": "13회", "year": 2025}, {"num": 34, "stem": "34. 행정절차법상 행정응원을 요청할 수 있는 경우로 명시된 경우가 아닌 것은?", "choices": {"1": "법령등의 이유로 독자적인 직무 수행이 어려운 경우", "2": "행정서비스에 대한 국민의 만족도를 높이기 위하여 필요한 경우", "3": "다른 행정청의 응원을 받아 처리하는 것이 보다 능률적이고 경제적인 경우", "4": "다른 행정청에 소속되어 있는 전문기관의 협조가 필요한 경우", "5": "인원ㆍ장비의 부족 등 사실상의 이유로 독자적인 직무 수행이 어려운 경우"}, "answer": 2, "subject": "행정절차법", "exam": "13회", "year": 2025}, {"num": 35, "stem": "35. 공공기관의 정보공개에 관한 법률상 이의신청에 관한 내용이다. ( )에 알맞은 숫자는? ○ 청구인이 정보공개와 관련한 공공기관의 비공개 결정 또는 부분 공개 결정에 대하여 불복이 있거나 정보공개 청구 후 ( ㄱ )일이 경과하도록 정보공개 결정 이 없는 때에는 공공기관으로부터 정보공개 여부의 결정 통지를 받은 날 또는 정보공개 청구 후 ( ㄱ )일이 경과한 날부터 ( ㄴ )일 이내에 해당 공공기관에 문서로 이의신청을 할 수 있다. ○ 공공기관은 이의신청을 받은 날부터 ( ㄷ )일 이내에 그 이의신청에 대하여 결 정하고 그 결과를 청구인에게 지체 없이 문서로 통지하여야 한다.", "choices": {"1": "ㄱ: 7, ㄴ: 10, ㄷ: 20", "2": "ㄱ: 10, ㄴ: 20, ㄷ: 10", "3": "ㄱ: 10, ㄴ: 20, ㄷ: 30", "4": "ㄱ: 20, ㄴ: 30, ㄷ: 7", "5": "ㄱ: 20, ㄴ: 30, ㄷ: 10"}, "answer": 4, "subject": "공공기관 정보공개법", "exam": "13회", "year": 2025}, {"num": 36, "stem": "36. 개인정보 보호법령상 고정형 영상정보처리기기를 설치ㆍ운영할 수 있는 경우로 명시된 경우가 아닌 것은?", "choices": {"1": "범죄의 예방 및 수사를 위하여 필요한 경우", "2": "화재 예방을 위하여 정당한 권한을 가진 자가 설치ㆍ운영하는 경우", "3": "교통단속을 위하여 정당한 권한을 가진 자가 설치ㆍ운영하는 경우", "4": "촬영 사실을 명확히 표시하여 정보주체가 촬영 사실을 알 수 있도록 하였음에도 불구하고 촬영 거부 의사를 밝히지 아니한 경우", "5": "촬영된 영상정보를 저장하지 아니하는 경우로서 출입자 수, 성별, 연령대 등 통계값 또는 통계적 특성값 산출을 위해 촬영된 영상정보를 일시적으로 처리하는 경우"}, "answer": 4, "subject": "개인정보 보호법", "exam": "13회", "year": 2025}, {"num": 37, "stem": "37. 행정대집행법의 내용에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "행정청은 해가 지기 전에 대집행을 착수한 경우라도 해가 진 후에는 대집행을 하여서는 아니 된다.", "2": "대집행에 요한 비용에 대하여서는 행정청은 사무비의 소속에 따라 국세에 다음가는 순위의 선취득권을 가진다.", "3": "대집행에 대하여는 행정심판을 제기할 수 있다.", "4": "대집행에 요한 비용은 「국세징수법」의 예에 의하여 징수할 수 있다.", "5": "의무자가 동의한 경우 행정청은 해가 뜨기 전에 대집행을 할 수 있다."}, "answer": 1, "subject": "행정대집행", "exam": "13회", "year": 2025}, {"num": 38, "stem": "38. 행정기본법상 행정상 강제에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "외국인의 출입국ㆍ난민인정에 관한 사항에 관하여는 「행정기본법」 제5절(행정상 강제)을 적용하지 아니한다.", "2": "직접강제는 다른 모든 수단으로는 행정목적을 달성할 수 없는 경우에만 허용되며, 이 경우에도 최소한으로만 실시하여야 한다.", "3": "행정청은 이행강제금을 부과받은 자가 납부기한까지 이행강제금을 내지 아니하면 국세 강제징수의 예 또는 「지방행정제재ㆍ부과금의 징수 등에 관한 법률」에 따라 징수한다.", "4": "의무 불이행의 동기, 목적 및 결과는 이행강제금의 부과 금액을 가중하거나 감경할 수 있는 고려사항에 해당한다.", "5": "행정청은 이행강제금을 부과하기 전에 미리 의무자에게 적절한 이행기간을 정하여 그 기한까지 행정상 의무를 이행하지 아니하면 이행강제금을 부과한다는 뜻을 문서로 계고 하여야 한다."}, "answer": 2, "subject": "행정행위 부관", "exa "행정처분에 붙인 부담인 부관이 무효가 되면 그 부담의 이행으로 한 사법상 법률행위도 당연히 무효가 된다.", "5": "｢하천법｣상 하천부지 점용허가에는 그 성질상 부관을 붙일 수 없다.  (Picture6.jpg)  (Picture7.jpg)"}, "answer": 1, "subject": "행정행위 부관", "exam": "12회", "year": 2024}, {"num": 33, "stem": "33. 甲은 건축물을 신축하기 위하여 허가청인 A에게 건축허가(주된 허가)를 신청하였다. 甲은 건축허가를 신청하면서 산지전용허가도 받고자 하는데, 건축법상 甲이 건축허가 를 받으면 산지관리법에 따른 산지전용허가 (관련 허가)를 받은 것으로 의제된다. 이에 관한 설명으로 옳지 않은 것은? (단, 관련 허가의 허가청은 B임)", "choices": {"1": "甲은 건축허가를 A에게 신청하면서 산지전용허가에 필요한 서류를 함께 제출하여야 한다.", "2": "A는 건축허가를 하기 전에 산지전용허가에 관하여 미리 B와 협의하여야 한다.", "3": "B는 산지전용허가에 관한 법령을 위반하여 협의에 응해서는 아니 된다.", "4": "A와 B 사이에 협의가 되면 건축허가와 산지전용허가를 모두 받은 것으로 본다.", "5": "산지전용허가가 의제된 경우 B는 산지전용허가를 직접 한 것으로 보아 관계 법령에 따른 관리ㆍ감독 등 필요한 조치를 하여야 한다."}, "answer": 4, "subject": "인허가의제", "exam": "12회", "year": 2024}, {"num": 34, "stem": "34. 행정절차법상 처분절차에 관한 설명으로 옳은 것은?", "choices": {"1": "행정청은 처분을 할 때에는 단순ㆍ반복적인 처분으로서 당사자가 그 이유를 명백히 알 수 있는 경우에도 당사자에게 그 근거와 이유를 사전에 제시하여야 한다.", "2": "행정청은 처분에 오기(誤記)가 있어서 직권으로 이를 정정한 경우에는 그 사실을 당사자 에게 통지할 필요는 없다.", "3": "행정청은 행정청의 편의를 위하여 신청인이 다른 행정청에 처분을 구하는 신청을 접수 하게 할 수 있다.", "4": "행정청은 다수의 행정청이 관여하는 처분을 구하는 신청을 접수한 경우에는 관계 행정 청과의 신속한 협조를 통하여 그 처분이 지연되지 아니하도록 하여야 한다.", "5": "행정청은 필요한 처분기준을 정하여 공표하는 것이 해당 처분의 성질상 현저히 곤란한 경우라도 그 처분기준을 공표하여야 한다."}, "answer": 4, "subject": "행정절차법", "exam": "12회", "year": 2024}, {"num": 35, "stem": "35. 공공기관의 정보공개에 관한 법률의 내용으로 옳지 않은 것은?", "choices": {"1": "공개될 경우 부동산 투기, 매점매석 등으로 특정인에게 이익 또는 불이익을 줄 우려가 있다고 인정되는 정보라도 공공기관이 보유ㆍ관리하는 정보라면 이를 공개하여야 한다.", "2": "공공기관은 부득이한 사유가 없다면 정보공개의 청구를 받은 날부터 10일 이내에 공개 여부를 결정하여야 한다.", "3": "공공기관은 공개 청구된 공개 대상 정보의 일부가 제3자와 관련이 있다고 인정할 때에는 그 사실을 제3자에게 지체 없이 통지하여야 한다.", "4": "공공기관은 정보의 공개를 결정한 경우 해당 청구인이 사본의 교부를 원하는 때에는 이를 교부하여야 한다.", "5": "정보공개청구는 말로써 할 수 있다."}, "answer": 1, "subject": "공공기관 정보공개법", "exam": "12회", "year": 2024}, {"num": 36, "stem": "36. 행정절차법상 청문에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "행정청은 다수 국민의 이해가 상충되는 처분을 하려는 경우에는 청문 주재자를 2명 이상으로 선정할 수 있다.", "2": "청문은 당사자가 공개를 신청하더라도 제3자의 정당한 이익을 현저히 해칠 우려가 있는 경우에는 공개하여서는 아니 된 }, "answer": 2, "subject": "행정절차법", "exam": "11회", "year": 2023}, {"num": 35, "stem": "35. 행정절차법상 송달 및 기간ㆍ기한에 관한 설명으로 옳은 것은?", "choices": {"1": "정보통신망을 이용한 송달은 송달받을 자의 동의 여부와 상관없이 언제든지 가능하다.", "2": "행정청은 송달하는 문서의 명칭과 송달받는 자의 성명을 확인할 수 있는 기록을 보존하지 않아도 된다.", "3": "송달은 다른 법령등에 특별한 규정이 있는 경우를 제외하고는 해당 문서를 발신한 때 그 효력이 발생한다.", "4": "천재지변으로 기한을 지킬 수 없는 경우에는 그 사유가 끝나는 날이 속하는 주말까지 기간의 진행이 정지된다.", "5": "외국에 거주하거나 체류하는 자에 대한 기간 및 기한은 행정청이 그 우편이나 통신에 걸리는 일수를 고려하여 정하여야 한다."}, "answer": 5, "subject": "행정행위 부관", "exam": "11회", "year": 2023}, {"num": 36, "stem": "36. 개인정보 보호법상 개인정보 보호 원칙에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "개인정보처리자는 개인정보의 처리 목적에 필요한 범위에서 적합하게 개인정보를 처리 하여야 한다.", "2": "개인정보처리자는 개인정보의 처리 목적에 필요한 범위에서 개인정보의 정확성, 완전성 및 최신성이 보장되도록 하여야 한다.", "3": "개인정보처리자는 정보주체의 사생활 침해를 최소화하는 방법으로 개인정보를 처리하여야 한다.", "4": "개인정보처리자는 개인정보 처리방침 등 개인정보의 처리에 관한 사항을 공개하여야 한다.", "5": "개인정보처리자는 개인정보를 익명 또는 가명으로 처리하여서는 아니 된다."}, "answer": 5, "subject": "개인정보 보호법", "exam": "11회", "year": 2023}, {"num": 37, "stem": "37. 행정대집행법의 내용에 관한 설명으로 옳은 것은?", "choices": {"1": "의무자가 동의한 경우라도 행정청은 해가 뜨기 전에는 대집행을 착수 할 수 없다.", "2": "해가 지기 전에 대집행을 착수한 경우라도 해가 진 후에는 행정청은 즉시 대집행을 중단해야 한다.", "3": "대집행에 대하여는 행정심판을 제기할 수 없다.", "4": "대집행에 요한 비용은 「민사집행법」의 예에 의하여 징수하여야 한다.", "5": "대집행에 요한 비용에 대하여서는 행정청은 사무비의 소속에 따라 국세에 다음가는 순위의 선취득권을 가진다."}, "answer": 5, "subject": "행정대집행", "exam": "11회", "year": 2023}, {"num": 38, "stem": "38. 질서위반행위규제법의 내용에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "다른 법률에 특별한 규정이 없는 한 14세가 되지 아니한 자의 질서위반행위에 대해서도 과태료를 부과한다.", "2": "고의 또는 과실이 없는 질서위반행위는 과태료를 부과하지 아니한다.", "3": "법률에 따르지 아니하고는 어떤 행위도 질서위반행위로 과태료를 부과하지 아니한다.", "4": "대한민국 영역 밖에 있는 대한민국의 선박 또는 항공기 안에서 질서위반행위를 한 외국 인에게도 적용한다.", "5": "대한민국 영역 밖에서 질서위반행위를 한 대한민국의 국민에게도 적용한다."}, "answer": 1, "subject": "질서위반행위규제법", "exam": "11회", "year": 2023}, {"num": 39, "stem": "39. 취소소송에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "제약회사는 보건복지부 고시인 ‘약제급여ㆍ비급여 목록 및 급여 상한금액표’ 중 그 제약 회사가 제조ㆍ공급하는 약제의 상한금액 인하 부분의 취소를 구할 원고적격이 있다.", "2": "처분의 효과가 소멸된 뒤에는 그 처분의 취소로 인하  구속성이 상실되기 위해서는 행정청의 별도의 의사표시가 있어야 한다.", "5": "확약은 정당한 권한을 가진 행정청에 의해서 그 권한의 범위 내에서만 발해질 수 있다."}, "answer": 4, "subject": "공법상 계약", "exam": "10회", "year": 2022}, {"num": 35, "stem": "35. 행정절차에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정절차에 관하여 다른 법률에 특별한 규정이 있는 경우에도 「행정절차법」이 우선한다.", "2": "행정청은 청문이 필요하다고 인정하는 경우에도 법령등에서 청문을 하도록 규정한 경우 가 아니면 청문을 할 수 없다.", "3": "신청에 대한 거부처분은 사전통지대상이다.", "4": "행정청은 신청 내용을 모두 그대로 인정하는 처분을 하는 경우 처분의 근거와 이유를 제시하지 않아도 된다.", "5": "「행정절차법」에는 행정지도에 관한 규정을 두고 있지 않다."}, "answer": 4, "subject": "행정지도", "exam": "10회", "year": 2022}, {"num": 36, "stem": "36. 개인정보보호법상 정보주체가 자신의 개인정보 처리와 관련하여 가지는 권리가 아닌 것은?", "choices": {"1": "개인정보의 처리에 관한 정보를 제공받을 권리", "2": "개인정보의 처리 정지를 요구할 권리", "3": "개인정보의 처리 여부를 확인하고 개인정보에 대하여 사본의 발급을 요구할 권리", "4": "개인정보의 처리에 관한 동의 여부, 동의 범위 등을 결정할 권리", "5": "개인정보처리자의 가명정보 처리에 동의할 권리"}, "answer": 5, "subject": "개인정보 보호법", "exam": "10회", "year": 2022}, {"num": 37, "stem": "37. 행정대집행에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 대집행영장에 의한 통지는 취소소송의 대상이 된다. ㄴ. 「행정대집행법」에서는 대집행에 대해 행정심판을 제기할 수 있음을 규정하고 있다. ㄷ. 계고처분의 후속절차인 대집행에 위법이 있다고 하더라도, 그와 같은 후속절차에 위법성이 있다는 점을 들어 선행절차인 계고처분이 부적법하다는 사유로 삼을 수 는 없다. ㄹ. 대집행은 대집행의 대상이 되는 의무를 명하는 처분청이 그 주체가 되며 타인에 게 위탁할 수 없다.", "choices": {"1": "ㄱ", "2": "ㄴ, ㄷ", "3": "ㄱ, ㄴ, ㄷ", "4": "ㄴ, ㄷ, ㄹ", "5": "ㄱ, ㄴ, ㄷ, ㄹ"}, "answer": 3, "subject": "행정대집행", "exam": "10회", "year": 2022}, {"num": 38, "stem": "38. 공공기관의 정보공개에 관한 법령상 정보공개에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "공개청구의 대상이 되는 정보는 공공기관이 보유ㆍ관리하고 있는 정보에 한정된다.", "2": "일정한 요건을 갖춘 외국인은 정보공개 청구를 할 수 있다.", "3": "정보공개 청구권자의 권리구제 가능성이 없는 경우에는 비공개 대상 정보에 해당하지 않는 정보라도 공개하지 않을 수 있다.", "4": "정보공개청구에 대한 공공기관의 비공개결정에 대한 불복절차로 이의신청, 행정심판, 행정소송이 있다.", "5": "법인이 거래하는 금융기관의 계좌번호에 관한 정보는 법인의 영업상 비밀에 관한 사항 으로서 비공개 대상 정보에 해당한다."}, "answer": 3, "subject": "행정심판", "exam": "10회", "year": 2022}, {"num": 39, "stem": "39. 과징금에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정법규 위반에 대해 벌금 이외에 과징금을 부과하는 것은 이중처벌금지의 원칙에 반하지 않는다.", "2": "제재적 행정처분으로서의 과징금은 현실적인 행위자가 아닌 법령상 책임자에게 부과할 수 있다.", "3": "제재적 행정처분으로서의 과징금은 원칙적으로 위반자의 고의 또는 과실을 요한다.", "4": "과징금은 국가의 형벌권을 실행하는 과벌이 아니다.", "5": "법령으로 정한 ‘과징금을 부과하는 위반행위와 과징금의 금액’에 열거되지 않은 위반행위에 대해 사업정지처분을 갈음하여 과징금을 부과할 수 없다."}, "answer": 3, "subject": "과징금", "exam": "10회", "year": 2022}, {"num": 40, "stem": "40. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법령상 손실보상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "토지수용재결시 대상토지의 평가는 재결에서 정한 수용시기가 아닌 수용재결일을 기준 으로 한다.", "2": "관할 토지수용위원회에 잔여지수용청구를 하려는 토지소유자는 사업완료일까지 그 수용 청구를 하여야 한다.", "3": "이주대책대상자는 사업시행자가 이주대책에 대한 구체적인 계획을 수립하여 공고한 때에 수분양권을 취득한다.", "4": "공익사업시행지구 밖의 영업손실에 대해서도 일정한 요건 하에 보상을 받을 수 있다.", "5": "재결에서 정한 보상금액이 일부 보상항목은 과소하고 다른 보상항목은 과다할 경우 법원은 보상항목 상호간의 유용을 허용하여 보상금을 결정할 수 있다."}, "answer": 3, "subject": "행정심판", "exam": "10회", "year": 2022}, {"num": 41, "stem": "41. 행정심판에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "의무이행심판에서 청구가 이유 있으면 신청에 따른 처분을 하거나 처분을 할 것을 피청 구인에게 명하는 재결을 한다.", "2": "심판청구기간을 법상 규정된 기간보다 긴 기간으로 잘못 고지한 경우에도 규정된 행정 심판기간 내에 심판청구를 하여야 한다.", "3": "시ㆍ도지사의 처분에 대한 심판청구는 시ㆍ도지사 소속으로 두는 행정심판위원회에서 심리ㆍ재결한다.", "4": "심리는 구술심리나 서면심리로 하고, 당사자가 구술심리를 신청한 경우에는 서면심리는 할 수 없다.", "5": "항고소송에서의 처분사유의 추가ㆍ변경의 법리는 행정심판에 적용되지 않는다."}, "answer": 1, "subject": "행정심판", "exam": "10회", "year": 2022}, {"num": 42, "stem": "42. 행정심판으로 적법하게 청구된 것을 모두 고른 것은? ㄱ. 국세부과처분에 대해 국세청장에 심사청구 ㄴ. 국가공무원 면직처분에 대해 징계위원회에 재심사청구 ㄷ. 지방토지수용위원회의 수용재결에 대해 중앙토지수용위원회에 이의신청 ㄹ. 지방노동위원회의 구제명령 불이행에 대한 이행강제금부과처분에 대해 중앙 노동위원회에 재심신청", "choices": {"1": "ㄱ, ㄴ", "2": "ㄱ, ㄷ", "3": "ㄴ, ㄷ", "4": "ㄴ, ㄹ", "5": "ㄷ, ㄹ"}, "answer": 2, "subject": "행정상 강제·이행강제금", "exam": "10회", "year": 2022}, {"num": 43, "stem": "43. 국가배상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "공무를 위탁받은 사인의 직무집행행위에 대해서도 국가배상책임이 성립할 수 있다.", "2": "가해행위인 처분에 대해 취소판결이 확정된 경우에는 기판력에 의해 국가배상소송에서도 국가배상책임이 인정된다.", "3": "생명ㆍ신체의 침해로 인한 국가배상을 받을 권리는 압류하지 못한다.", "4": "피해자나 그 법정대리인이 손해 및 가해자를 알지 못한 경우 국가배상청구권의 소멸시효 기간은 5년이다.", "5": "외국인이 피해자인 경우에는 해당 국가와 상호 보증이 있을 때에만 「국가배상법」이 적용된다."}, "answer": 2, "subject": "국가배상", "exam": "10회", "year": 2022}, {"num": 44, "stem": "44. 공물에 관한 설명으로 옳은 것은?", "choices": {"1": "공공용물은 직접 행정주체 자신의 사용에 제공된 공물을 말한다.", "2": "국가 또는 지방자치단체가 소유권자인 공물을 국유공물이라 한다.", "3": "공물의 관리주체와 공물의 귀속주체가 다른 공물을 자유공물(自有公物)이라고 한다.", "4": "경찰견은 동산공물에 해당한다.", "5": "도로, 공원 등은 자연공물에 해당한다."}, "answer": 4, "subject": "지방자치법", "exam": "10회", "year": 2022}, {"num": 45, "stem": "45. 권한의 대리와 위임에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 지방자치단체의 장이 수임한 기관위임사무의 일부를 재위임하고자 하는 경우 위임자의 승인을 얻어 규칙으로 재위임할 수 있다. ㄴ. 내부위임의 경우 수임관청이 자신의 명의로 행정처분을 하였더라도 항고소송 에서의 피고는 위임관청이 된다. ㄷ. 권한의 위임은 반드시 법적 근거를 요하는 것은 아니다. ㄹ. 지정대리란 법정사실이 발생하면 법상 당연히 특정한 자에게 대리권이 부여 되어 대리관계가 성립하는 것을 말한다.", "choices": {"1": "ㄱ", "2": "ㄴ, ㄷ", "3": "ㄱ, ㄴ, ㄷ", "4": "ㄴ, ㄷ, ㄹ", "5": "ㄱ, ㄴ, ㄷ, ㄹ"}, "answer": 1, "subject": "행정소송", "exam": "10회", "year": 2022}, {"num": 46, "stem": "46. 행정조직에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "훈령이란 상급관청이 하급관청의 권한행사를 지휘하기 위해 발하는 명령이다.", "2": "공무원이 대외적 구속력이 없는 훈령에 위반한 경우에도 위법은 아니며 징계책임이 부과될 수 있을 뿐이다.", "3": "상급관청은 직권에 의해 하급관청의 위법ㆍ부당한 행위의 취소를 명할 수 있다.", "4": "징계위원회 같은 의결기관으로서의 위원회는 의결권은 물론이고 정해진 의사를 대외적 으로 표시할 권한을 갖는다.", "5": "주관쟁의결정권이란 하급관청 사이에 권한의 분쟁이 있는 경우, 상급관청이 그 분쟁을 해결하고 결정하는 권한을 말한다."}, "answer": 4, "subject": "행정조직법", "exam": "10회", "year": 2022}, {"num": 47, "stem": "47. 경찰책임에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "행위능력이 없는 자도 경찰책임자가 될 수 있다.", "2": "경찰책임자에 대한 경찰권의 발동이 어려운 경우에는 예외적으로 경찰책임이 없는 자에 게도 경찰권이 발동될 수 있다.", "3": "물건에 대한 권원의 유무와 관계없이 물건을 현실적으로 지배하고 있는 자에게도 상태 책임이 인정된다.", "4": "행위책임의 행위에는 부작위를 포함한다.", "5": "타인을 감독하는 자가 타인의 행위에 대하여 지는 경찰책임은 자기책임이 아니라 타인의 책임을 대신하여 지는 것이다."}, "answer": 5, "subject": "경찰법", "exam": "10회", "year": 2022}, {"num": 48, "stem": "48. 공무원관계에 관한 판례의 태도로 옳은 것은?", "choices": {"1": "공무원임용결격사유가 있는지의 여부는 임용당시가 아닌 채용후보자 명부에 등록한 때에 시행되던 법률을 기준으로 하여 판단하여야 한다.", "2": "임용당시 공무원임용결격사유가 있었다면 비록 국가의 과실에 의하여 임용결격자임을 밝혀내지 못하였다 하더라도 그 임용행위는 당연무효이다.", "3": "국가가 공무원임용결격사유가 있는 자에 대해 결격사유가 있음을 알지 못하고 임용하였 다가 사후에 결격사유가 있는 자임을 발견하고 임용행위를 취소하는 경우, 그 취소권은 시효의 제한을 받는다.", "4": "시험승진후보자명부에서의 삭제  기록된 회의록은 의 사가 결정되거나 의사가 집행된 경우에는 더 이상 의사결정과정에 있는 사항 그 자체라고는 할 수 없으나, 의사결정과정에 있는 사항에 준하는 사항으로서 비공개대상정보에 포함될 수 있다. ㄷ. ‘진행 중인 재판에 관련된 정보’에 해당한다는 사유로 정보공개를 거부하기 위하여는 반드시 그 정보가 진행 중인 재판의 소송기록 자체에 포함되어야 한다.", "choices": {"1": "ㄱ", "2": "ㄴ", "3": "ㄱ, ㄴ", "4": "ㄴ, ㄷ", "5": "ㄱ, ㄴ, ㄷ"}, "answer": 3, "subject": "공공기관 정보공개법", "exam": "9회A", "year": 2021}, {"num": 38, "stem": "38. 행정대집행법상 대집행에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "철거대집행 계고처분 후 행한 제2차 계고는 대집행기한의 연기통지가 아니라 새로운 철 거의무를 부과한 것이다.", "2": "철거명령과 계고처분은 계고서라는 명칭의 1장의 문서로 이루어질 수 있다.", "3": "대집행은 처분청 스스로 하여야 하며, 대집행 권한을 제3자에게 위임․위탁할 수 없다.", "4": "후행처분인 대집행영장발부통보처분의 취소소송에서, 선행처분인 계고처분의 위법을 이 유로 대집행영장발부통보처분이 위법하다는 주장을 할 수 없다.", "5": "행정청이 대집행의 방법으로 건물철거의무의 이행을 실현할 수 있는 경우, 건물철거 대 집행 과정에서 부수적으로 건물의 점유자들에 대한 퇴거 조치를 할 수 없다."}, "answer": 2, "subject": "행정행위 부관", "exam": "9회A", "year": 2021}, {"num": 39, "stem": "39. 행정의 실효성 확보수단에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "건축법상 이행강제금 부과처분은 항고소송으로 다툴 수는 없다.", "2": "이행강제금은 대체적 작위의무의 위반에 대하여 부과될 수 없다.", "3": "건축법상 이행강제금의 납부의무는 상속인에게 승계될 수 없는 일신전속적인 성질의 것이다.", "4": "대집행에 요한 비용은 국세징수법의 예에 의하여 징수할 수 없다.", "5": "병무청장이 병역법에 따라 병역의무 기피자의 인적사항을 인터넷 홈페이지에 공개하는 결정은 항고소송의 대상이 되는 행정처분이 아니다."}, "answer": 3, "subject": "행정대집행", "exam": "9회A", "year": 2021}, {"num": 40, "stem": "40. 행정권한의 위임 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정권한의 위임은 법률에 규정된 행정기관의 장의 권한 중 일부를 그 보조기관 또는 하급행정기관의 장이나 지방자치단체의 장에게 맡겨 그의 권한과 책임 아래 행사하도록 하는 것이다.", "2": "행정권한의 내부위임은 법률이 위임을 허용하고 있지 아니한 경우에도 행정관청의 내부 적인 사무처리의 편의를 도모하기 위하여 그의 보조기관 또는 하급행정관청으로 하여금 그의 권한을 사실상 행사하게 하는 것이다.", "3": "위임기관은 수임기관의 수임사무 처리에 대하여 지휘ㆍ감독하고, 그 처리가 위법하거나 부당하다고 인정될 때에는 이를 취소하거나 정지시킬 수 있다.", "4": "수임사무의 처리에 관하여 위임기관은 수임기관에 대하여 사전승인을 받거나 협의를 할 것을 요구할 수 없다.", "5": "행정기관은 위임을 받은 사무의 전부 또는 일부를 보조기관 또는 하급행정기관에 재위 임할 수 없다."}, "answer": 5, "subject": "권한 위임·대리", "exam": "9회A", "year": 2021}, {"num": 41, "stem": "41. 행정기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "법령에 따라 행정권한을 위탁받은 사인은 행정청이 될 수 없다.", "2": "행정에 관한 의사를 결정하여 표시하는 국가 또는 지방자치단체의 기관은 행정청이다.", "3": "지방자치단체는 그 소관 사무의 일부를 독립하여 수행할 필요가 있으면 법령이나 그 지 방자치단체의 조례로 정하는 바에 따라 합의제행정기관을 설치할 수 있다.", "4": "행정기관의 장은 소관사무를 통할하고 소속공무원을 지휘ㆍ감독한다.", "5": "정부조직법은 합의제행정기관의 설치에 관한 법적 근거를 두고 있다."}, "answer": 1, "subject": "행정입법", "exam": "9회A", "year": 2021}, {"num": 42, "stem": "42. 행정절차법에서 규정하고 있지 않은 것은?", "choices": {"1": "신고", "2": "공법상 계약", "3": "행정지도", "4": "행정예고", "5": "행정상 입법예고"}, "answer": 2, "subject": "행정지도", "exam": "9회A", "year": 2021}, {"num": 43, "stem": "43. 판례에 의할 때 항고소송의 대상인 것을 모두 고른 것은? ㄱ. 어업권 면허에 선행하는 우선순위결정 ㄴ. 농지법상 이행강제금 부과처분 ㄷ. 구 청소년보호법상 청소년유해매체물 결정 및 고시처분 ㄹ. 두밀분교를 폐교하는 경기도의 조례", "choices": {"1": "ㄱ, ㄴ", "2": "ㄱ, ㄷ", "3": "ㄴ, ㄷ", "4": "ㄴ, ㄹ", "5": "ㄷ, ㄹ"}, "answer": 5, "subject": "행정입법", "exam": "9회A", "year": 2021}, {"num": 44, "stem": "44. 행정심판법에 관한 설명으로 옳은 것은?", "choices": {"1": "행정심판위원회는 당사자의 동의가 없더라도 심판청구의 신속하고 공정한 해결을 위하 여 조정을 할 수 있다.", "2": "행정심판위원회는 사정재결시 그 재결의 주문에서 그 처분 또는 부작위가 위법하거나 부 당하다는 것을 구체적으로 밝혀야 한다.", "3": "집행정지로 목적을 달성할 수 있는 경우에도 임시처분이 허용된다.", "4": "처분청이 심판청구기간을 법정기간보다 긴 기간으로 잘못 고지한 경우, 심판청구기간은 당해 처분이 있은 날부터 180일이 된다.", "5": "행정심판위원회는 심판청구의 대상이 되는 처분보다 청구인에게 불리한 재결을 할 수 있다."}, "answer": 2, "subject": "행정심판", "exam": "9회A", "year": 2021}, {"num": 45, "stem": "45. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법률에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "사업인정처분이 당연무효이면 그것이 유효함을 전제로 이루어진 수용재결도 무효이다.", "2": "수용재결에 대한 이의신청은 행정소송을 하기 위한 필수적인 전심절차이다.", "3": "수용재결에 대한 취소소송의 제기는 사업의 진행 및 토지의 수용 또는 사용을 정지시키 지 아니한다.", "4": "토지소유자가 보상금 증액청구소송을 제기할 경우 사업시행자를 피고로 하여야 한다.", "5": "보상금증감청구소송의 제기기간은 이의신청을 거친 경우 이의신청에 대한 재결서를 받 은 날부터 60일 이내이다."}, "answer": 2, "subject": "행정심판", "exam": "9회A", "year": 2021}, {"num": 46, "stem": "46. 국가배상법 제2조 제1항 단서의 이중배상금지에 관한 설명으로 옳지 않은 것은? (다 툼이 있으면 판례에 따름)", "choices": {"1": "피해자가 군인ㆍ군무원ㆍ경찰공무원 또는 예비군대원이어야 한다.", "2": "병역법상 공익근무요원은 군인에 해당하여 이중배상이 금지되는 자에 속한다.", "3": "전투ㆍ훈련 또는 이에 준하는 직무집행 뿐만 아니라 일반 직무집행에 관하여도 적용된다.", "4": "전투훈련 중 민간인이 군인과 공동불법행위를 한 경우 민간인은 자신의 부담 부분만을 피해 군인에게 배상하면 된다는 것이 대법원판례의 입장이다.", "5": "전투ㆍ훈련 등 직무집행과 관련하여 전사ㆍ순직하거나 공상을 입은 손해에 한한다."}, "answer": 2, "subject": "국가배상", "exam": "9회A", "year": 2021}, {"num": 47, "stem": "47. 신청에 대한 거부처분에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "거부처분은 당사자의 권익을 제한하는 처분에 해당하므로 원칙적으로 행정절차법상 사 전통지의 대상이 된다.", "2": "거부처분에 대하여는 행정소송법상 집행정지를 구할 이익이 있어 집행정지가 허용된다.", "3": "거부처분의 취소판결의 취지에 따라 행정청이 처분을 하지 않는 경우, 당사자는 수소법 원에 직접강제를 신청할 수 있다.", "4": "거부처분이 성립되려면 신청인에게 그 행위발동을 요구할 법규상 또는 조리상 신청권이 있어야 한다.", "5": "거부처분에 대하여는 행정소송법상 명문의 규정으로 의무이행소송이 허용된다."}, "answer": 4, "subject": "행정절차법", "exam": "9회A", "year": 2021}, {"num": 48, "stem": "48. 지방자치법상 주민소송에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "주민소송을 제기하기 전에 주민감사청구를 거쳐야 한다.", "2": "지방의회의원에게 손해배상청구를 할 것을 요구하는 주민소송은 인정되지 않는다.", "3": "공금의 부과ㆍ징수 업무를 게을리한 사실의 위법 확인을 요구하는 주민소송은 인정된다.", "4": "행정처분인 해당 행위의 취소를 요구하는 주민소송은 인정된다.", "5": "주민소송의 대상이 되는 위법한 행위나 해태사실은 감사청구한 사항과 동일할 필요는 없고 관련성이 있으면 된다."}, "answer": 2, "subject": "국가배상", "exam": "9회A", "year": 2021}, {"num": 49, "stem": "49. 국가공무원법상 징계처분과 소청 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으 면 판례에 따름)", "choices": {"1": "공무원에 대한 직위해제처분은 징계처분이다.", "2": "직위해제처분과 그 후속 직권면직처분은 별개 독립의 처분으로 일사부재리원칙에 위배 되지 않는다.", "3": "소청심사위원회가 소청 사건을 심사할 때 소청인에게 진술 기회를 주지 아니한 결정은 무효이다.", "4": "소청심사위원회의 결정은 처분 행정청을 기속한다.", "5": "소청심사위원회의 결정은 그 이유를 구체적으로 밝힌 결정서로 하여야 한다."}, "answer": 1, "subject": "공무원법", "exam": "9회A", "year": 2021}, {"num": 50, "stem": "50. 국유재산법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정재산의 사용허가기간은 원칙상 5년 이내로 한다.", "2": "일반재산은 민법상 시효취득의 대상이 되지 아니한다.", "3": "행정재산에는 사권을 설정하지 못한다.", "4": "보존용재산은 법령이나 그 밖의 필요에 따라 국가가 보존하는 재산이다.", "5": "중앙관서의 장은 사용허가한 행정재산을 국가가 직접 공용으로 사용하기 위하여 필요하게 된 경우에는 사용허가를 철회할 수 있다."}, "answer": 2, "subject": "국유재산법", "exam": "9회A", "year": 2021}], "9회B": [{"num": 26, "stem": "26. 법령등 시행일의 기간 계산에 관한 설명으로 옳은 것을 모두 고른 것은? ㄱ. 법령등을 공포한 날부터 시행하는 경우에는 공포한 날을 시행일로 한다. ㄴ. 법령등을 공포한 날부터 일정 기간이 경과한 날부터 시행하는 경우 법령을 공 포한 날을 첫날에 산입하지 아니한다. ㄷ. 법령등을 공포한 날부터 일정 기간이 경과한 날부터 시행하는 경우 그 기간의 말일이 토요일 또  신속히 처리할 필요가 있거나 사안이 경미한 경우에는 말 또는 그 밖 의 방법으로 할 수 있다."}, "answer": 4, "subject": "행정행위 부관", "exam": "9회B", "year": 2021}, {"num": 36, "stem": "36. 판례에 의할 때 공공기관의 정보공개에 관한 법률에 관한 설명으로 옳은 것을 모두 고른 것은? ㄱ. 학교폭력대책자치위원회의 회의록은 ‘공개될 경우 업무의 공정한 수행에 현저 한 지장을 초래한다고 인정할 만한 상당한 이유가 있는 정보’에 해당한다. ㄴ. 의사결정과정에 제공된 회의관련자료나 의사결정과정이 기록된 회의록은 의 사가 결정되거나 의사가 집행된 경우에는 더 이상 의사결정과정에 있는 사항 그 자체라고는 할 수 없으나, 의사결정과정에 있는 사항에 준하는 사항으로서 비공개대상정보에 포함될 수 있다. ㄷ. ‘진행 중인 재판에 관련된 정보’에 해당한다는 사유로 정보공개를 거부하기 위하여는 반드시 그 정보가 진행 중인 재판의 소송기록 자체에 포함되어야 한다.", "choices": {"1": "ㄱ", "2": "ㄴ", "3": "ㄱ, ㄴ", "4": "ㄴ, ㄷ", "5": "ㄱ, ㄴ, ㄷ"}, "answer": 3, "subject": "공공기관 정보공개법", "exam": "9회B", "year": 2021}, {"num": 37, "stem": "37. 공공기관의 정보공개에 관한 법률에 관한 설명으로 옳은 것은? (다툼이 있으면 판례 에 따름)", "choices": {"1": "국내에 학술ㆍ연구를 위하여 일시적으로 체류하는 외국인은 정보공개를 청구할 권리가 없다.", "2": "공개 청구한 정보가 비공개대상인 부분과 공개 가능한 부분이 혼합되어 있는 경우 부분 공개는 할 수 없다.", "3": "사립대학교는 정보공개의무를 지는 공공기관에 해당하지 않는다.", "4": "정보공개를 요구받은 공공기관이 공개를 거부하는 경우에는 비공개사유에 해당하는지를 주장ㆍ입증하지 아니한 채 개괄적인 사유만을 들어 공개를 거부할 수 없다.", "5": "청구인은 공공기관의 비공개 결정에 대하여 불복이 있는 경우 이의신청 절차를 거치지 아니하고는 행정심판을 청구할 수 없다."}, "answer": 4, "subject": "행정심판", "exam": "9회B", "year": 2021}, {"num": 38, "stem": "38. 행정대집행법상 대집행에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "철거대집행 계고처분 후 행한 제2차 계고는 대집행기한의 연기통지가 아니라 새로운 철 거의무를 부과한 것이다.", "2": "철거명령과 계고처분은 계고서라는 명칭의 1장의 문서로 이루어질 수 있다.", "3": "대집행은 처분청 스스로 하여야 하며, 대집행 권한을 제3자에게 위임․위탁할 수 없다.", "4": "후행처분인 대집행영장발부통보처분의 취소소송에서, 선행처분인 계고처분의 위법을 이 유로 대집행영장발부통보처분이 위법하다는 주장을 할 수 없다.", "5": "행정청이 대집행의 방법으로 건물철거의무의 이행을 실현할 수 있는 경우, 건물철거 대 집행 과정에서 부수적으로 건물의 점유자들에 대한 퇴거 조치를 할 수 없다."}, "answer": 2, "subject": "행정행위 부관", "exam": "9회B", "year": 2021}, {"num": 39, "stem": "39. 행정의 실효성 확보수단에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "건축법상 이행강제금 부과처분은 항고소송으로 다툴 수는 없다.", "2": "이행강제금은 대체적 작위의무의 위반에 대하여 부과될 수 없다.", "3": "건축법상 이행강제금의 납부의무는 상속인에게 승계될 수 없는 일신전속적인 성질의 것이다.", "4": "대집행에 요한 비용은 국세징수법의 예에 의하여 징수할 수 없다.", "5": "병무청장이 병역법에 따라 병역의무 기피자의 인적사항을 인터넷 홈페이지에 공개하는 결정은 항고소송의 대상이 되는 행정처분이 아니다."}, "answer": 3, "subject": "행정대집행", "exam": "9회B", "year": 2021}, {"num": 40, "stem": "40. 행정기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "법령에 따라 행정권한을 위탁받은 사인은 행정청이 될 수 없다.", "2": "행정에 관한 의사를 결정하여 표시하는 국가 또는 지방자치단체의 기관은 행정청이다.", "3": "지방자치단체는 그 소관 사무의 일부를 독립하여 수행할 필요가 있으면 법령이나 그 지 방자치단체의 조례로 정하는 바에 따라 합의제행정기관을 설치할 수 있다.", "4": "행정기관의 장은 소관사무를 통할하고 소속공무원을 지휘ㆍ감독한다.", "5": "정부조직법은 합의제행정기관의 설치에 관한 법적 근거를 두고 있다."}, "answer": 1, "subject": "행정입법", "exam": "9회B", "year": 2021}, {"num": 41, "stem": "41. 행정권한의 위임 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정권한의 위임은 법률에 규정된 행정기관의 장의 권한 중 일부를 그 보조기관 또는 하급행정기관의 장이나 지방자치단체의 장에게 맡겨 그의 권한과 책임 아래 행사하도록 하는 것이다.", "2": "행정권한의 내부위임은 법률이 위임을 허용하고 있지 아니한 경우에도 행정관청의 내부 적인 사무처리의 편의를 도모하기 위하여 그의 보조기관 또는 하급행정관청으로 하여금 그의 권한을 사실상 행사하게 하는 것이다.", "3": "위임기관은 수임기관의 수임사무 처리에 대하여 지휘ㆍ감독하고, 그 처리가 위법하거나 부당하다고 인정될 때에는 이를 취소하거나 정지시킬 수 있다.", "4": "수임사무의 처리에 관하여 위임기관은 수임기관에 대하여 사전승인을 받거나 협의를 할 것을 요구할 수 없다.", "5": "행정기관은 위임을 받은 사무의 전부 또는 일부를 보조기관 또는 하급행정기관에 재위 임할 수 없다."}, "answer": 5, "subject": "권한 위임·대리", "exam": "9회B", "year": 2021}, {"num": 42, "stem": "42. 행정절차법에서 규정하고 있지 않은 것은?", "choices": {"1": "신고", "2": "공법상 계약", "3": "행정지도", "4": "행정예고", "5": "행정상 입법예고"}, "answer": 2, "subject": "행정지도", "exam": "9회B", "year": 2021}, {"num": 43, "stem": "43. 판례에 의할 때 항고소송의 대상인 것을 모두 고른 것은? ㄱ. 어업권 면허에 선행하는 우선순위결정 ㄴ. 농지법상 이행강제금 부과처분 ㄷ. 구 청소년보호법상 청소년유해매체물 결정 및 고시처분 ㄹ. 두밀분교를 폐교하는 경기도의 조례", "choices": {"1": "ㄱ, ㄴ", "2": "ㄱ, ㄷ", "3": "ㄴ, ㄷ", "4": "ㄴ, ㄹ", "5": "ㄷ, ㄹ"}, "answer": 5, "subject": "행정입법", "exam": "9회B", "year": 2021}, {"num": 44, "stem": "44. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법률에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "사업인정처분이 당연무효이면 그것이 유효함을 전제로 이루어진 수용재결도 무효이다.", "2": "수용재결에 대한 이의신청은 행정소송을 하기 위한 필수적인 전심절차이다.", "3": "수용재결에 대한 취소소송의 제기는 사업의 진행 및 토지의 수용 또는 사용을 정지시키 지 아니한다.", "4": "토지소유자가 보상금 증액청구소송을 제기할 경우 사업시행자를 피고로 하여야 한다.", "5": "보상금증감청구소송의 제기기간은 이의신청을 거친 경우 이의신청에 대한 재결서를 받 은 날부터 60일 이내이다."}, "answer": 2, "subject": "행정심판", "exam": "9회B", "year": 2021}, {"num": 45, "stem": "45. 행정심판법에 관한 설명으로 옳은 것은?", "choices": {"1": "행정심판위원회는 당사자의 동의가 없더라도 심판청구의 신속하고 공정한 해결을 위하 여 조정을 할 수 있다.", "2": "행정심판위원회는 사정재결시 그 재결의 주문에서 그 처분 또는 부작위가 위법하거나 부 당하다는 것을 구체적으로 밝혀야 한다.", "3": "집행정지로 목적을 달성할 수 있는 경우에도 임시처분이 허용된다.", "4": "처분청이 심판청구기간을 법정기간보다 긴 기간으로 잘못 고지한 경우, 심판청구기간은 당해 처분이 있은 날부터 180일이 된다.", "5": "행정심판위원회는 심판청구의 대상이 되는 처분보다 청구인에게 불리한 재결을 할 수 있다."}, "answer": 2, "subject": "행정심판", "exam": "9회B", "year": 2021}, {"num": 46, "stem": "46. 국가배상법 제2조 제1항 단서의 이중배상금지에 관한 설명으로 옳지 않은 것은? (다 툼이 있으면 판례에 따름)", "choices": {"1": "피해자가 군인ㆍ군무원ㆍ경찰공무원 또는 예비군대원이어야 한다.", "2": "병역법상 공익근무요원은 군인에 해당하여 이중배상이 금지되는 자에 속한다.", "3": "전투ㆍ훈련 또는 이에 준하는 직무집행 뿐만 아니라 일반 직무집행에 관하여도 적용된다.", "4": "전투훈련 중 민간인이 군인과 공동불법행위를 한 경우 민간인은 자신의 부담 부분만을 피해 군인에게 배상하면 된다는 것이 대법원판례의 입장이다.", "5": "전투ㆍ훈련 등 직무집행과 관련하여 전사ㆍ순직하거나 공상을 입은 손해에 한한다."}, "answer": 2, "subject": "국가배상", "exam": "9회B", "year": 2021}, {"num": 47, "stem": "47. 신청에 대한 거부처분에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "거부처분은 당사자의 권익을 제한하는 처분에 해당하므로 원칙적으로 행정절차법상 사 전통지의 대상이 된다.", "2": "거부처분에 대하여는 행정소송법상 집행정지를 구할 이익이 있어 집행정지가 허용된다.", "3": "거부처분의 취소판결의 취지에 따라 행정청이 처분을 하지 않는 경우, 당사자는 수소법 원에 직접강제를 신청할 수 있다.", "4": "거부처분이 성립되려면 신청인에게 그 행위발동을 요구할 법규상 또는 조리상 신청권이 있어야 한다.", "5": "거부처분에 대하여는 행정소송법상 명문의 규정으로 의무이행소송이 허용된다."}, "answer": 4, "subject": "행정절차법", "exam": "9회B", "year": 2021}, {"num": 48, "stem": "48. 국가공무원법상 징계처분과 소청 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으 면 판례에 따름)", "choices": {"1": "공무원에 대한 직위해제처분은 징계처분이다.", "2": "직위해제처분과 그 후속 직권면직처분은 별개 독립의 처분으로 일사부재리원칙에 위배 되지 않는다.", "3": "소청심사위원회가 소청 사건을 심사할 때 소청인에게 진술 기회를 주지 아니한 결정은 무효이다.", "4": "소청심사위원회의 결정은 처분 행정청을 기속한다.", "5": "소청심사위원회의 결정은 그 이유를 구체적으로 밝힌 결정서로 하여야 한다."}, "answer": 1, "subject": "공무원법", "exam": "9회B", "year": 2021}, {"num": 49, "stem": "49. 지방자치법상 주민소송에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "주민소송을 제기하기 전에 주민감사청구를 거쳐야 한다.", "2": "지방의회의원에게 손해배상청구를 할 것을 요구하는 주민소송은 인정되지 않는다.", "3": "공금의 부과ㆍ징수 업무를 게을리한 사실의 위법 확인 }

// Build subject/exam sets
const SUBJECTS = [...new Set(ALL_Q.map(q => q.subject))].sort();
const EXAMS = ['13회','12회','11회','10회','9회A','9회B'];

let currentFilter = 'all';
let answered = {}; // qid -> {selected, correct}

function qId(q) {
  return q.exam + '-' + q.num;
}

// Build sidebar filters
function buildSidebar() {
  // Exam filters
  const examDiv = document.getElementById('exam-filters');
  examDiv.innerHTML = '';
  for (const exam of EXAMS) {
    const qs = ALL_Q.filter(q => q.exam === exam);
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.setAttribute('data-filter', 'exam:' + exam);
    btn.innerHTML = `<span>${exam} (${qs[0].year})</span><span class="count">${qs.length}</span>`;
    btn.onclick = () => setFilter('exam:' + exam, btn);
    examDiv.appendChild(btn);
  }

  // Subject filters
  const subDiv = document.getElementById('subject-filters');
  subDiv.innerHTML = '';
  for (const subj of SUBJECTS) {
    const count = ALL_Q.filter(q => q.subject === subj).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.setAttribute('data-filter', 'subj:' + subj);
    btn.innerHTML = `<span>${subj}</span><span class="count">${count}</span>`;
    btn.onclick = () => setFilter('subj:' + subj, btn);
    subDiv.appendChild(btn);
  }

  document.getElementById('count-all').textContent = ALL_Q.length;
}

function setFilter(filter, btnEl) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  renderQuestions();
}

function getFilteredQs() {
  if (currentFilter === 'all') return ALL_Q;
  if (currentFilter.startsWith('exam:')) {
    const exam = currentFilter.slice(5);
    return ALL_Q.filter(q => q.exam === exam);
  }
  if (currentFilter.startsWith('subj:')) {
    const subj = currentFilter.slice(5);
    return ALL_Q.filter(q => q.subject === subj);
  }
  return ALL_Q;
}

function renderQuestions() {
  const qs = getFilteredQs();
  const list = document.getElementById('q-list');

  // Update title/meta
  if (currentFilter === 'all') {
    document.getElementById('view-title').textContent = '전체 문제';
    document.getElementById('view-meta').textContent = '2021~2025년 행정사 1차 행정법 전체';
  } else if (currentFilter.startsWith('exam:')) {
    const exam = currentFilter.slice(5);
    const year = qs[0]?.year;
    document.getElementById('view-title').textContent = `${exam} (${year}년)`;
    document.getElementById('view-meta').textContent = `26번 ~ 50번, 25문제`;
  } else {
    const subj = currentFilter.slice(5);
    document.getElementById('view-title').textContent = subj;
    document.getElementById('view-meta').textContent = `총 ${qs.length}문제`;
  }

  if (qs.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>문제가 없습니다.</div></div>';
    return;
  }

  list.innerHTML = '';
  for (const q of qs) {
    list.appendChild(buildCard(q));
  }

  updateProgress(qs);
}

const CIRCLE_NUMS = ['①','②','③','④','⑤'];

function buildCard(q) {
  const id = qId(q);
  const ansState = answered[id];

  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = 'card-' + id;

  // Meta tags
  const metaHtml = `
    <div class="q-meta">
      <span class="q-num">Q${q.num}</span>
      <span class="q-exam-tag">${q.exam} · ${q.year}</span>
      <span class="q-subject-tag">${q.subject}</span>
    </div>`;

  // Stem
  const stemHtml = `<div class="q-stem">${escHtml(q.stem)}</div>`;

  // Choices
  const ans = q.answer;
  const isAllCorrect = (ans === '전부정답');
  const ansNum = typeof ans === 'number' ? ans : null;

  let choicesHtml = '<div class="q-choices">';
  for (const [k, v] of Object.entries(q.choices)) {
    const idx = parseInt(k);
    let cls = 'choice-btn';
    if (ansState) {
      if (isAllCorrect) {
        cls += ' correct-answer';
      } else if (idx === ansNum) {
        cls += ' correct-answer';
      } else if (idx === ansState.selected && idx !== ansNum) {
        cls += ' wrong-answer';
      }
    } else if (ansState === undefined) {
      // not yet answered
    }
    const disabled = ansState ? 'disabled' : '';
    const selectedData = (ansState && ansState.selected === idx) ? 'data-selected="true"' : '';
    choicesHtml += `<button class="${cls}" ${disabled} ${selectedData}
      onclick="selectChoice('${id}', ${idx}, this)"
      data-idx="${idx}">
      <span class="choice-badge">${CIRCLE_NUMS[idx-1]}</span>
      <span class="choice-text">${escHtml(v)}</span>
    </button>`;
  }
  choicesHtml += '</div>';

  // Actions
  let resultHtml = '';
  if (ansState) {
    if (isAllCorrect) {
      resultHtml = `<div class="result-badge all-correct">✦ 전항 정답</div>`;
    } else if (ansState.correct) {
      resultHtml = `<div class="result-badge correct">✓ 정답</div>`;
    } else {
      resultHtml = `<div class="result-badge wrong">✗ 오답 · 정답: ${CIRCLE_NUMS[ansNum-1]}</div>`;
    }
  }

  const submitDisabled = !ansState ? '' : 'disabled';
  const actionsHtml = `
    <div class="q-actions">
      <button class="submit-btn" ${submitDisabled} onclick="submitAnswer('${id}')">
        정답 확인
      </button>
      ${resultHtml}
    </div>`;

  // Explanation (shown after answer)
  let explainHtml = '';
  if (ansState) {
    explainHtml = buildExplanation(q, ansState);
  }

  card.innerHTML = metaHtml + stemHtml + choicesHtml + actionsHtml + explainHtml;

  // Track selected choice
  card._selectedIdx = ansState ? ansState.selected : null;

  return card;
}

function selectChoice(id, idx, btnEl) {
  if (answered[id]) return;
  const card = document.getElementById('card-' + id);
  card.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  card._selectedIdx = idx;
}

function submitAnswer(id) {
  const card = document.getElementById('card-' + id);
  const selected = card._selectedIdx;
  if (!selected) return;

  const q = ALL_Q.find(q => qId(q) === id);
  const ans = q.answer;
  const isAllCorrect = ans === '전부정답';
  const ansNum = typeof ans === 'number' ? ans : null;
  const isCorrect = isAllCorrect || (selected === ansNum);

  answered[id] = { selected, correct: isCorrect };

  // Re-render card
  const newCard = buildCard(q);
  card.replaceWith(newCard);

  updateProgress(getFilteredQs());
}

function buildExplanation(q, ansState) {
  const ans = q.answer;
  const isAllCorrect = ans === '전부정답';
  const ansNum = typeof ans === 'number' ? ans : null;

  let html = '<div class="explanation show"><div class="explanation-title">해설</div>';
  
  for (const [k, v] of Object.entries(q.choices)) {
    const idx = parseInt(k);
    let numCls = '';
    let marker = '';
    if (isAllCorrect) {
      numCls = 'is-answer'; marker = '✓';
    } else if (idx === ansNum) {
      numCls = 'is-answer'; marker = '✓ 정답';
    } else if (idx === ansState.selected && idx !== ansNum) {
      numCls = 'is-wrong-pick'; marker = '✗ 선택';
    }
    html += `<div class="choice-explain">
      <span class="choice-explain-num ${numCls}">${CIRCLE_NUMS[idx-1]} ${marker}</span>
      <span>${escHtml(v)}</span>
    </div>`;
  }

  if (isAllCorrect) {
    html += '<div style="margin-top:10px;color:var(--accent);font-size:12px;">※ 이 문제는 모든 선지가 정답으로 처리된 문항입니다. (12회 26번)</div>';
  }

  html += '</div>';
  return html;
}

function updateProgress(qs) {
  const answeredCount = qs.filter(q => answered[qId(q)]).length;
  const total = qs.length;
  const pct = total > 0 ? Math.round(answeredCount / total * 100) : 0;

  document.getElementById('progress-text').textContent = `${answeredCount} / ${total} 풀이완료`;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Score panel
  const correctCount = qs.filter(q => answered[qId(q)]?.correct).length;
  const wrongCount = answeredCount - correctCount;
  const scorePct = answeredCount > 0 ? Math.round(correctCount / answeredCount * 100) : 0;

  if (answeredCount > 0) {
    document.getElementById('score-panel').style.display = 'flex';
    document.getElementById('score-correct').textContent = correctCount;
    document.getElementById('score-wrong').textContent = wrongCount;
    document.getElementById('score-pct').textContent = scorePct + '%';
  } else {
    document.getElementById('score-panel').style.display = 'none';
  }
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Init
buildSidebar();
renderQuestions();
</script>
</body>
</html>
