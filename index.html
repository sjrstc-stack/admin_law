<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행정법 기출문제 - 주제별</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #f0f2f8;
    --border: #dde1f0;
    --accent: #3b5bdb;
    --accent2: #7c3aed;
    --text: #1a1d2e;
    --text-muted: #6b7280;
    --correct: #16a34a;
    --correct-bg: rgba(22,163,74,0.08);
    --wrong: #dc2626;
    --wrong-bg: rgba(220,38,38,0.08);
    --highlight: rgba(59,91,219,0.07);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #f5f6fa 0%, #eef0fb 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header-title span {
    color: var(--accent);
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Layout ── */
  .layout {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 0;
    min-height: calc(100vh - 80px);
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: #c5cae9; border-radius: 2px; }

  .sidebar-section {
    margin-bottom: 24px;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 8px;
    margin-bottom: 8px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .filter-btn:hover {
    background: var(--highlight);
    color: var(--text);
  }
  .filter-btn.active {
    background: var(--highlight);
    color: var(--accent);
    font-weight: 500;
  }
  .filter-btn .count {
    font-size: 11px;
    background: var(--surface2);
    padding: 1px 7px;
    border-radius: 20px;
    color: var(--text-muted);
    min-width: 28px;
    text-align: center;
  }
  .filter-btn.active .count {
    background: rgba(59,91,219,0.12);
    color: var(--accent);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 8px 12px;
  }

  /* ── Main Content ── */
  .main {
    padding: 28px 32px;
  }

  .view-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .view-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .view-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .progress-bar {
    width: 120px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* ── Question Card ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .q-card:hover {
    border-color: #3a3f60;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .q-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(108,142,255,0.12);
    padding: 2px 9px;
    border-radius: 20px;
  }
  .q-exam-tag {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 20px;
  }
  .q-subject-tag {
    font-size: 11px;
    color: var(--accent2);
    background: rgba(167,139,250,0.1);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .q-stem {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 16px;
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .q-choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    text-align: left;
    line-height: 1.6;
    transition: all 0.15s;
  }
  .choice-btn:not(:disabled):hover {
    border-color: var(--accent);
    background: var(--highlight);
  }
  .choice-badge {
    font-weight: 700;
    font-size: 13px;
    min-width: 20px;
    color: var(--accent);
    flex-shrink: 0;
    padding-top: 1px;
  }
  .choice-text {
    flex: 1;
  }

  /* Choice states */
  .choice-btn.selected:not(.revealed) {
    border-color: var(--accent);
    background: var(--highlight);
  }
  .choice-btn.correct-answer {
    border-color: var(--correct) !important;
    background: var(--correct-bg) !important;
  }
  .choice-btn.correct-answer .choice-badge {
    color: var(--correct);
  }
  .choice-btn.wrong-answer {
    border-color: var(--wrong) !important;
    background: var(--wrong-bg) !important;
  }
  .choice-btn.wrong-answer .choice-badge {
    color: var(--wrong);
  }
  .choice-btn:disabled {
    cursor: default;
  }

  /* ── Submit/Result ── */
  .q-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .submit-btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .submit-btn:hover:not(:disabled) {
    opacity: 0.9;
    transform: translateY(-1px);
  }
  .submit-btn:disabled {
    opacity: 0.4;
    cursor: default;
    transform: none;
  }

  .result-badge {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
  }
  .result-badge.correct {
    display: flex;
    background: var(--correct-bg);
    color: var(--correct);
    border: 1px solid rgba(74,222,128,0.3);
  }
  .result-badge.wrong {
    display: flex;
    background: var(--wrong-bg);
    color: var(--wrong);
    border: 1px solid rgba(248,113,113,0.3);
  }
  .result-badge.all-correct {
    display: flex;
    background: rgba(108,142,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(108,142,255,0.3);
  }

  /* ── Explanation ── */
  .explanation {
    display: none;
    margin-top: 12px;
    padding: 13px 15px;
    background: #f4f6ff;
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    line-height: 1.75;
    color: #2d3152;
    animation: fadeIn 0.2s ease;
    max-height: 300px;
    overflow-y: auto;
  }
  .explanation::-webkit-scrollbar { width: 4px; }
  .explanation::-webkit-scrollbar-thumb { background: #c5cae9; border-radius: 2px; }
  .explanation.show { display: block; }
  .explanation-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .explanation-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .explanation-badge {
    font-size: 10px;
    background: rgba(59,91,219,0.1);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 20px;
    font-weight: 600;
  }
  /* AI 해설 스트리밍 영역 */
  .ai-explain-body {
    white-space: pre-wrap;
    word-break: keep-all;
  }
  .ai-explain-body .correct-line {
    color: var(--correct);
    font-weight: 600;
  }
  .ai-explain-body .wrong-line {
    color: var(--wrong);
  }
  .ai-explain-body .picked-line {
    color: var(--wrong);
    font-weight: 600;
  }
  /* 로딩 스피너 */
  .explain-loading {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* 전체오답 note */
  .all-correct-note {
    margin-top: 10px;
    font-size: 12px;
    color: var(--accent);
    background: rgba(59,91,219,0.06);
    padding: 8px 12px;
    border-radius: 6px;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  /* ── Score panel ── */
  .score-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .score-item {
    text-align: center;
  }
  .score-num {
    font-size: 28px;
    font-weight: 700;
    font-family: 'Noto Serif KR', serif;
    line-height: 1;
  }
  .score-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .score-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
  }

  .reset-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: white;
    color: var(--wrong);
    font-size: 12px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .reset-btn:hover {
    background: rgba(220,38,38,0.05);
    border-color: var(--wrong);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      position: static;
      height: auto;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 16px;
    }
    .main { padding: 20px 16px; }
    header { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">행정법 <span>기출문제</span> 주제별 풀기</div>
    <div class="header-sub">행정사 1차 시험 · 2021~2025년 (9~13회) · 행정법 문제만 수록</div>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">전체</div>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">
        <span>전체 문제</span>
        <span class="count" id="count-all">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">회차별</div>
      <div id="exam-filters"></div>
    </div>

    <div class="divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">주제별</div>
      <div id="subject-filters"></div>
    </div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="view-header">
      <div>
        <div class="view-title" id="view-title">전체 문제</div>
        <div class="view-meta" id="view-meta"></div>
      </div>
      <div class="progress-wrap">
        <button class="reset-btn" onclick="resetAnswers()" title="현재 필터의 풀이 기록 초기화">↺ 리셋</button>
        <span id="progress-text">0 / 0 풀이완료</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="score-panel" id="score-panel" style="display:none">
      <div class="score-item">
        <div class="score-num" style="color:var(--correct)" id="score-correct">0</div>
        <div class="score-label">정답</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <div class="score-num" style="color:var(--wrong)" id="score-wrong">0</div>
        <div class="score-label">오답</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <div class="score-num" style="color:var(--accent)" id="score-pct">0%</div>
        <div class="score-label">정답률</div>
      </div>
    </div>

    <div id="q-list"></div>
  </main>
</div>

<script>
const RAW_DATA = {"13회": [{"num": 26, "stem": "26. 행정기본법상 법원칙에 관한 설명이다. ( )에 들어갈 용어는? ( \t)의 원칙 : 행정청은 행정작용을 할 때 상대방에게 해당 행정작용과 실질 적인 관련이 없는 의무를 부과해서는 아니 된다.", "choices": {"1": "신뢰보호", "2": "평등", "3": "부당결부금지", "4": "명확성", "5": "법률유보"}, "answer": 3, "subject": "행정의 법원칙·기본원리", "exam": "13회", "year": 2025, "explanation": "부당결부금지 원칙의 정의 문제입니다.\n① 신뢰보호 — 행정청의 공적 견해에 대한 국민의 신뢰를 보호하는 원칙으로, 이 문제와 무관합니다.\n② 평등 — 같은 것은 같게, 다른 것은 다르게 취급하는 원칙입니다.\n③ ✓ 정답 — \"행정작용과 실질적 관련이 없는 의무를 부과해서는 안 된다\"는 것이 부당결부금지 원칙의 핵심 정의입니다 (행정기본법 제13조).\n④ 명확성 — 행정작용의 내용이 명확해야 한다는 원칙입니다.\n⑤ 법률유보 — 침익적 행정은 법률의 근거가 있어야 한다는 원칙입니다.\n★ 핵심: 부당결부금지 = 행정작용과 무관한 의무 부과 금지 (행정기본법 제13조)"}, {"num": 27, "stem": "27. 행정기본법의 조문의 일부이다. ( )에 들어갈 내용으로 옳은 것은? ○ 행정작용은 ( ㄱ )에 위반되어서는 아니 되며, 국민의 권리를 제한하거나 의무를 부과하는 경우와 그 밖에 국민생활에 중요한 영향을 미치는 경우에는 ( ㄱ )에 근거하여야 한다. ○ 당사자의 신청에 따른 처분은 ( ㄴ )등에 특별한 규정이 있거나 처분 당시의 ( ㄴ )등을 적용하기 곤란한 특별한 사정이 있는 경우를 제외하고는 처분 당시의 ( ㄴ )등에 따른다.", "choices": {"1": "ㄱ: 헌법, ㄴ: 법률", "2": "ㄱ: 헌법, ㄴ: 법령", "3": "ㄱ: 법률, ㄴ: 법률", "4": "ㄱ: 법률, ㄴ: 법령", "5": "ㄱ: 법령, ㄴ: 법령"}, "answer": 4, "subject": "행정의 법원칙·기본원리", "exam": "13회", "year": 2025, "explanation": "행정기본법 법 적용 기준 조문 빈칸 문제입니다.\n행정기본법 제12조(법 적용의 기준)의 핵심 내용:\n• \"행정작용은 헌법이 아닌 법률에 위반되어서는 안 된다\" → ㄱ = 법률\n• \"당사자의 신청에 따른 처분은 처분 당시의 법령등에 따른다\" → ㄴ = 법령\n'법률'과 '법령'의 구별이 핵심 함정입니다. 법령은 법률보다 넓은 개념으로 대통령령·총리령·부령 등을 포함합니다. 처분 시 적용법은 '법령'(넓은 개념)이고, 행정작용의 준수 기준은 '법률'(헌법 아래)입니다.\n★ 핵심: ㄱ=법률(위반금지·근거), ㄴ=법령(처분기준) → 정답 ④"}, {"num": 28, "stem": "28. 행정계획에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정계획이란 특정한 행정목표를 달성하기 위하여 서로 관련되는 행정수단을 종합ㆍ조 정함으로써 장래의 일정한 시점에 일정한 질서를 실현하기 위한 활동기준으로 설정된 것이다.", "2": "행정주체는 구체적인 행정계획을 입안ㆍ결정하면서 비교적 광범위한 형성의 자유를 가진다.", "3": "행정주체가 기반시설을 조성하기 위하여 도시ㆍ군계획시설결정을 할 때 행사하는 재량권 에는 한계가 있다.", "4": "자연환경 보호 등을 목적으로 하는 도시관리계획결정은 행정청의 재량적 판단으로서, 그 내용이 현저히 합리성을 결여하거나 형평이나 비례의 원칙에 뚜렷하게 반하는 등의 사정이 없는 한 폭넓게 존중되어야 한다.", "5": "구) 「도시계획법」상 도시기본계획은 일반 국민에 대한 직접적인 구속력이 있다."}, "answer": 5, "subject": "행정의 법원칙·기본원리", "exam": "13회", "year": 2025, "explanation": " 로 명시된 경우가 아닌 것은?", "choices": {"1": "범죄의 예방 및 수사를 위하여 필요한 경우", "2": "화재 예방을 위하여 정당한 권한을 가진 자가 설치ㆍ운영하는 경우", "3": "교통단속을 위하여 정당한 권한을 가진 자가 설치ㆍ운영하는 경우", "4": "촬영 사실을 명확히 표시하여 정보주체가 촬영 사실을 알 수 있도록 하였음에도 불구하고 촬영 거부 의사를 밝히지 아니한 경우", "5": "촬영된 영상정보를 저장하지 아니하는 경우로서 출입자 수, 성별, 연령대 등 통계값 또는 통계적 특성값 산출을 위해 촬영된 영상정보를 일시적으로 처리하는 경우"}, "answer": 4, "subject": "개인정보 보호법", "exam": "13회", "year": 2025, "explanation": "개인정보보호법상 고정형 영상정보처리기기 설치·운영 허용 사유 문제입니다.\n개인정보보호법 제25조에서 허용 사유를 열거합니다:\n① (허용) 범죄 예방 및 수사\n② (허용) 화재 예방 — 정당한 권한자 설치\n③ (허용) 교통단속 — 정당한 권한자 설치\n④ ✓ 정답(허용 아님) — 촬영 사실 표시 후 거부 의사를 밝히지 않은 경우는 허용 사유가 아닙니다. 법에 없는 내용입니다.\n⑤ (허용) 영상 저장 없이 통계값 산출용 일시 처리는 허용됩니다.\n★ 핵심: 묵시적 동의(거부하지 않음)는 설치 허용 사유로 법에 규정되어 있지 않음"}, {"num": 37, "stem": "37. 행정대집행법의 내용에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "행정청은 해가 지기 전에 대집행을 착수한 경우라도 해가 진 후에는 대집행을 하여서는 아니 된다.", "2": "대집행에 요한 비용에 대하여서는 행정청은 사무비의 소속에 따라 국세에 다음가는 순위의 선취득권을 가진다.", "3": "대집행에 대하여는 행정심판을 제기할 수 있다.", "4": "대집행에 요한 비용은 「국세징수법」의 예에 의하여 징수할 수 있다.", "5": "의무자가 동의한 경우 행정청은 해가 뜨기 전에 대집행을 할 수 있다."}, "answer": 1, "subject": "행정대집행", "exam": "13회", "year": 2025, "explanation": "행정대집행법에 관한 옳지 않은 것을 고르는 문제입니다.\n① ✓ 정답(틀림) — 행정대집행법 제4조 단서: 의무자 동의 시 또는 해가 지기 전 착수한 경우 계속할 수 있습니다. 즉 해가 진 후에도 '의무자 동의'가 있으면 가능한데, ①은 해가 진 후 절대 안 된다고 서술해 틀렸습니다.\n② (옳음) 국세에 다음가는 순위의 선취득권을 가집니다.\n③ (옳음) 대집행에 대해 행정심판 제기 가능합니다.\n④ (옳음) 대집행 비용은 국세징수법 예에 따라 징수합니다.\n⑤ (옳음) 의무자 동의 시 야간에도 대집행 가능합니다.\n★ 핵심: 야간 대집행 금지의 예외 — 의무자 동의 or 해 지기 전 착수한 경우"}, {"num": 38, "stem": "38. 행정기본법상 행정상 강제에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "외국인의 출입국ㆍ난민인정에 관한 사항에 관하여는 「행정기본법」 제5절(행정상 강제)을 적용하지 아니한다.", "2": "직접강제는 다른 모든 수단으로는 행정목적을 달성할 수 없는 경우에만 허용되며, 이 경우에도 최소한으로만 실시하여야 한다.", "3": "행정청은 이행강제금을 부과받은 자가 납부기한까지 이행강제금을 내지 아니하면 국세 강제징수의 예 또는 「지방행정제재ㆍ부과금의 징수 등에 관한 법률」에 따라 징수한다.", "4": "의무 불이행의 동기, 목적 및 결과는 이행강제금의 부과 금액을 가중하거나 감경할 수 있는 고려사항에 해당한다.", "5": "행정청은 이행강제금을 부과하기 전에 미리 의무자에게 적절한 이행기간을 정하여 그 기한까지 행정상 의무를 이행하지 아니하면 이행강제금을 부과한다는 뜻을 문서로 계고 하여야 한다."}, "answer": 2, "subject": "행정행위 부관", "exam": "13회", "year": 2025, "explanation": "행정기본법상 행정상 강제에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 외국인 출입국·난민인정 사항에는 행정상 강제 조항 적용 제외 (행정기본법 제5절 적용 배제).\n② ✓ 정답(틀림) — '직접강제'가 아니라 '즉시강제'가 보충성 원칙이 적용되는 규정입니다. 직접강제도 보충성이 있지만, 행정기본법 조문의 정확한 표현은 '즉시강제'에 대한 설명입니다. 실제 정답은 ②입니다.\n③ (옳음) 이행강제금 미납 시 국세 강제징수 예에 따라 징수합니다.\n④ (옳음) 의무 불이행의 동기·목적·결과는 이행강제금 가중·감경 고려사항입니다 (행정기본법 제31조).\n⑤ (옳음) 이행강제금 부과 전 문서 계고 필요합니다.\n★ 핵심: 직접강제 보충성 원칙 표현이 법조문과 다름 — ②가 옳지 않은 설명"}, {"num": 39, "stem": "39. 행정소송법상 항고소송에 관한 내용으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "국가기관은 취소소송의 당사자가 될 수 있다.", "2": "교육에 관한 조례의 무효확인소송을 제기함에 있어서는 그 조례의 공포권이 있는 시ㆍ도 교육감을 피고로 하여야 한다.", "3": "대리권을 수여받은 데 불과하여 그 자신의 명의로는 행정처분을 할 권한이 없는 행정청 의 경우 대리관계를 밝힘이 없이 그 자신의 명의로 행정처분을 하였다면 그에 대하여는 처분명의자인 해당 행정청이 항고소송의 피고가 되는 것이 원칙이다.", "4": "지방자치단체장이 국유 일반재산을 대부하여 달라는 신청을 거부한 것은 행정처분이 아니므로 항고소송으로 그 취소를 구할 수 없다.", "5": "행정규칙에 의한 불문경고조치는 항고소송의 대상이 되는 행정처분에 해당하지 아니한다."}, "answer": 5, "subject": "행정입법", "exam": "13회", "year": 2025, "explanation": "행정소송법상 항고소송에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 국가기관도 취소소송의 당사자가 될 수 있습니다.\n② (옳음) 교육 관련 조례 무효확인소송 → 피고는 시·도교육감입니다.\n③ (옳음) 대리관계 밝히지 않고 자신 명의로 처분 → 처분명의자가 피고입니다.\n④ (옳음) 국유 일반재산 대부 신청 거부 → 행정처분 아님, 항고소송 불가 (대법원 판례).\n⑤ ✓ 정답(틀림) — 행정규칙에 의한 불문경고조치는 법적 지위에 영향을 주므로 항고소송 대상인 처분에 해당합니다 (대법원 판례).\n★ 핵심: 불문경고조치도 처분성 인정 — 항고소송 대상"}, {"num": 40, "stem": "40. 행정심판에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "무효등확인심판에는 사정재결을 할 수 있다.", "2": "「행정심판법」은 당사자심판에 관해서 규정하고 있지 않다.", "3": "행정처분의 취소를 구하는 심판에서 처분청은 당초 처분의 근거로 삼은 사유와 기본적 사 실관계가 동일성이 있다고 인정되는 한도 내에서 다른 사유를 추가 또는 변경할 수 있다.", "4": "재결에 의하여 취소되는 처분이 당사자의 신청을 거부하는 것을 내용으로 하는 경우에는 그 처분을 한 행정청은 재결의 취지에 따라 다시 이전의 신청에 대한 처분을 하여야 한다.", "5": "대통령의 처분에 대하여는 다른 법률에서 행정심판을 청구할 수 있도록 정한 경우 외에는 행정심판을 청구할 수 없다."}, "answer": 1, "subject": "행정심판", "exam": "13회", "year": 2025, "explanation": "행정심판에 관한 옳지 않은 것을 고르는 문제입니다.\n① ✓ 정답(틀림) — 무효등확인심판에는 사정재결을 할 수 없습니다. 사정재결은 취소심판에서만 가능합니다 (행정심판법 제44조).\n② (옳음) 행정심판법은 당사자심판을 규정하지 않습니다 (취소·무효·의무이행심판만 규정).\n③ (옳음) 심판에서 기본적 사실관계 동일성 범위 내 사유 추가·변경 가능합니다.\n④ (옳음) 거부처분 취소재결 → 행정청은 재결 취지에 따라 다시 처분해야 합니다.\n⑤ (옳음) 대통령의 처분은 다른 법률에 규정 없으면 행정심판 청구 불가합니다.\n★ 핵심: 사정재결 = 취소심판에서만 가능, 무효확인심판에는 불가"}, {"num": 41, "stem": "41. 행정소송법의 내용에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "취소소송은 법령의 규정에 의하여 당해 처분에 대한 행정심판을 제기할 수 있는 경우에는 이를 거치지 아니하고 제기할 수 없다.", "2": "처분등을 취소하는 확정판결은 제3자에 대하여는 효력이 없다.", "3": "행정처분의 무효 확인을 구하는 소에는 특단의 사정이 없는 한 취소를 구하는 취지도 포함되어 있다.", "4": "거부처분취소판결의 간접강제에 관한 규정은 무효등 확인소송의 경우에 준용한다.", "5": "「행정소송법」에서는 의무이행소송을 인정하고 있다."}, "answer": 3, "subject": "행정심판", "exam": "13회", "year": 2025, "explanation": "행정소송법에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 취소소송은 행정심판을 반드시 거칠 필요 없습니다 (임의적 전치주의가 원칙).\n② (틀림) 취소 확정판결의 기속력은 제3자에게도 효력이 있습니다 (대세적 효력).\n③ ✓ 정답 — 무효확인을 구하는 소에는 특단의 사정 없는 한 취소를 구하는 취지도 포함됩니다 (대법원 판례).\n④ (틀림) 거부처분취소판결의 간접강제 규정은 무효확인소송에 준용되지 않습니다.\n⑤ (틀림) 현행 행정소송법은 의무이행소송을 규정하지 않습니다.\n★ 핵심: 무효확인소송에는 취소를 구하는 취지 포함 (소의 예비적 병합)"}, {"num": 42, "stem": "42. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법률의 내용에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "사업시행자는 사용의 개시일에 토지의 사용권을 취득하며, 그 토지에 관한 다른 권리는 재결로 인정되지 아니 하더라도 사용 기간 중에 행사할 수 있다.", "2": "수용재결에 불복할 때는 이의신청을 거치지 않고도 행정소송을 제기할 수 있다.", "3": "재결에 의한 경우 보상액의 산정은 수용개시 당시의 가격을 기준으로 한다.", "4": "사업인정처분이 당연무효이더라도 그것이 유효함을 전제로 이루어진 수용재결이 무효가 되는 것이 아니다.", "5": "보상액을 산정할 경우에 해당 공익사업으로 인하여 토지등의 가격이 변동되었을 때에는 이를 고려하여야 한다."}, "answer": 2, "subject": "행정심판", "exam": "13회", "year": 2025, "explanation": "토지보상법에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 토지 사용 시 다른 권리는 재결로 인정된 경우에만 사용 기간 중 행사할 수 있습니다.\n② ✓ 정답 — 수용재결에 불복 시 이의신청을 거치지 않고도 행정소송(보상금증감청구소송) 제기 가능합니다 (임의적 전치).\n③ (틀림) 보상액 산정 기준은 수용재결일이 아닌 가격시점 기준입니다.\n④ (틀림) 사업인정처분이 당연무효이면 그에 기한 수용재결도 무효가 됩니다.\n⑤ (틀림) 해당 공익사업으로 인한 가격변동은 보상액 산정 시 고려하지 않습니다.\n★ 핵심: 수용재결 불복 → 이의신청 없이도 행정소송 가능 (임의적 전치)"}, {"num": 43, "stem": "43. 행정소송법상 부작위위법확인소송의 경우에 취소소송에 관한 규정이 준용되는 것을 모두 고른 것은? ㄱ. 집행정지 ㄴ. 사정판결 ㄷ. 제3자의 소송참가 ㄹ. 소송비용에 관한 재판의 효력 ㅁ. 거부처분취소판결의 간접강제", "choices": {"1": "ㄱ, ㄴ", "2": "ㄴ, ㄹ", "3": "ㄱ, ㄷ, ㅁ", "4": "ㄷ, ㄹ, ㅁ", "5": "ㄴ, ㄷ, ㄹ, ㅁ"}, "answer": 4, "subject": "행정심판", "exam": "13회", "year": 2025, "explanation": "부작위위법확인소송에서 취소소송 규정이 준용되는 것을 고르는 문제입니다.\n행정소송법 제38조 제2항에서 부작위위법확인소송에 준용되는 규정:\nㄱ. 집행정지 → 준용 안 됨 (처분이 없으므로)\nㄴ. 사정판결 → 준용 안 됨\nㄷ. 제3자의 소송참가 → 준용됨\nㄹ. 소송비용 재판의 효력 → 준용됨\nㅁ. 거부처분취소판결의 간접강제 → 준용됨\n따라서 ㄷ, ㄹ, ㅁ → 정답 ④\n★ 핵심: 부작위소송에는 집행정지·사정판결 준용 안 됨, 간접강제는 준용"}, {"num": 44, "stem": "44. 행정기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "상급행정기관의 하급행정기관에 대한 승인ㆍ동의ㆍ지시는 국민의 권리 의무에 직접 영향을 미치지 않더라도 행정처분에 해당한다.", "2": "법제처는 국무총리 소속 행정기관이다.", "3": "중앙행정기관의 설치와 직무범위는 법률로 정한다.", "4": "각 행정기관의 장은 소관사무를 통할하고 소속공무원을 지휘ㆍ감독한다.", "5": "행정기관에는 그 소관사무의 일부를 독립하여 수행할 필요가 있는 때에는 법률로 정하는 바에 따라 행정위원회 등 합의제행정기관을 둘 수 있다."}, "answer": 1, "subject": "인허가의제", "exam": "13회", "year": 2025, "explanation": "행정기관에 관한 옳지 않은 것을 고르는 문제입니다.\n① ✓ 정답(틀림) — 상급기관의 승인·동의·지시는 행정조직 내부 행위로, 국민의 권리의무에 직접 영향을 미치지 않으면 항고소송의 대상인 처분이 아닙니다 (대법원 판례).\n② (옳음) 법제처는 국무총리 소속 행정기관입니다.\n③ (옳음) 중앙행정기관 설치·직무범위는 법률로 정합니다 (정부조직법).\n④ (옳음) 행정기관장은 소관사무를 통할하고 소속공무원을 지휘·감독합니다.\n⑤ (옳음) 합의제행정기관(행정위원회 등)은 법률이 정하는 바에 따라 설치 가능합니다.\n★ 핵심: 상급기관의 내부 지시는 처분이 아님 — 항고소송 대상 아님"}, {"num": 45, "stem": "45. 권한의 위임에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "국가사무가 지방자치단체의 장에게 위임된 기관위임사무는 원칙적으로 자치조례의 제정 범위에 속하지 않는다.", "2": "지방자치단체의 장은 기관수임사무의 일부를 그 위임기관의 장의 승인을 받아 규칙으로 정하는 바에 따라 재위임할 수 있다.", "3": "위임기관은 수임기관의 수임사무 처리에 대하여 지휘ㆍ감독하고, 그 처리가 위법하거나 부당하다고 인정될 때에는 이를 취소하거나 정지시킬 수 있다.", "4": "수임사무의 처리에 관하여 위임기관은 수임기관에 대하여 사전승인을 받거나 협의를 할 것을 요구할 수 없다.", "5": "지방자치단체가 국가사무를 수임한 경우에는 수임한 지방자치단체에서 그 경비를 부담 하여야 한다."}, "answer": 5, "subject": "행정입법", "exam": "13회", "year": 2025, "explanation": "권한의 위임에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 기관위임사무는 원칙적으로 자치조례 제정범위에 속하지 않습니다.\n② (옳음) 수임사무 일부를 위임기관 장의 승인을 받아 재위임 가능합니다.\n③ (옳음) 위임기관은 수임기관을 지휘·감독하고 위법·부당한 처리를 취소·정지할 수 있습니다.\n④ (옳음) 위임기관은 수임기관에게 사전승인·협의를 요구할 수 없습니다.\n⑤ ✓ 정답(틀림) — 국가사무를 수임한 경우 경비는 위임한 국가(위임기관)가 부담해야 합니다. 수임 지방자치단체가 부담한다는 서술이 틀렸습니다.\n★ 핵심: 기관위임사무의 경비 → 위임자(국가) 부담, 수임자 부담 아님"}, {"num": 46, "stem": "46. 지방자치법의 내용에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "지방자치단체의 주민은 조례를 폐지할 것을 청구할 수 있다.", "2": "지방자치단체의 주민은 그 지방자치단체의 장 및 비례대표 지방의회의원을 포함한 지방 의회의원을 소환할 권리를 가진다.", "3": "주민투표권은 헌법상 보장되는 기본권 또는 헌법상 제도적으로 보장되는 주관적 공권이 아니다.", "4": "지방자치단체장이 동일 수탁자에게 위탁사무를 재위탁하고자 할 때 지방의회의 동의를 받도록 한 조례안은 지방자치단체장의 집행권한을 본질적으로 침해하는 것으로 볼 수 없다.", "5": "지방의회의원 정수의 2분의 1 범위에서 해당 지방자치단체의 조례로 정하는 바에 따라 지방의회에 정책지원 전문인력을 둘 수 있다."}, "answer": 2, "subject": "행정의 법원칙·기본원리", "exam": "13회", "year": 2025, "explanation": "지방자치법에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 주민은 조례의 제정·개정·폐지를 청구할 수 있습니다.\n② ✓ 정답(틀림) — 비례대표 지방의회의원은 주민소환 대상에서 제외됩니다 (지방자치법 제25조). 지역구 의원과 단체장만 소환 가능합니다.\n③ (옳음) 주민투표권은 헌법상 기본권이 아닌 법률상 권리입니다 (헌재 결정).\n④ (옳음) 해당 조례안은 집행권한을 본질적으로 침해하지 않는 것으로 판단됩니다.\n⑤ (옳음) 의원 정수 1/2 범위에서 정책지원 전문인력을 둘 수 있습니다.\n★ 핵심: 비례대표 지방의회의원은 주민소환 대상 아님"}, {"num": 47, "stem": "47. 국가재정법의 내용에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "예산, 결산 및 기금에 관한 사무는 기획재정부장관이 관장한다.", "2": "각 회계연도의 경비는 그 연도의 세입 또는 수입으로 충당하여야 한다.", "3": "국가의 회계는 통상회계와 임시회계로 구분한다.", "4": "한 회계연도의 모든 수입을 세입으로 하고, 모든 지출을 세출로 한다.", "5": "예산은 예산총칙ㆍ세입세출예산ㆍ계속비ㆍ명시이월비 및 국고채무부담행위를 총칭한다."}, "answer": 3, "subject": "국가재정법", "exam": "13회", "year": 2025, "explanation": "국가재정법에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 예산·결산·기금 관련 사무는 기획재정부장관이 관장합니다.\n② (옳음) 각 회계연도의 경비는 그 연도의 세입·수입으로 충당합니다 (회계연도 독립 원칙).\n③ ✓ 정답(틀림) — 국가의 회계는 일반회계와 특별회계로 구분합니다 (국가재정법 제4조). '통상회계'와 '임시회계'라는 구분은 없습니다.\n④ (옳음) 한 회계연도의 모든 수입은 세입, 모든 지출은 세출입니다 (총계주의 원칙).\n⑤ (옳음) 예산 = 예산총칙+세입세출예산+계속비+명시이월비+국고채무부담행위입니다.\n★ 핵심: 회계 구분 = 일반회계 + 특별회계 (통상·임시 아님)"}, {"num": 48, "stem": "48. 경찰관 직무집행법상 경찰관의 직무의 범위로 명시된 것을 모두 고른 것은? ㄱ. 범죄피해자 보호 ㄴ. 경비, 주요 인사(人士) 경호 ㄷ. 대간첩ㆍ대테러 작전 수행 ㄹ. 외국 정부기관 및 국제기구와의 국제협력 ㅁ. 공공안녕에 대한 위험의 예방과 대응을 위한 정보의 수집ㆍ작성 및 배포", "choices": {"1": "ㄹ", "2": "ㄷ, ㄹ", "3": "ㄱ, ㄴ, ㅁ", "4": "ㄱ, ㄴ, ㄷ, ㅁ", "5": "ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"}, "answer": 5, "subject": "경찰법", "exam": "13회", "year": 2025, "explanation": "경찰관 직무집행법상 직무범위 문제입니다.\nㄱ. 범죄피해자 보호 → 명시됨 (제2조)\nㄴ. 경비, 주요 인사 경호 → 명시됨\nㄷ. 대간첩·대테러 작전 수행 → 명시됨\nㄹ. 외국 정부기관 및 국제기구와의 국제협력 → 명시됨 (제2조 제8호)\nㅁ. 공공안녕에 대한 위험 예방·대응을 위한 정보 수집·작성·배포 → 명시됨\n모두 명시된 직무이므로 → 정답 ⑤\n★ 핵심: 경찰관 직무집행법 제2조 직무범위 — 모두 해당"}, {"num": 49, "stem": "49. 국가공무원법의 내용에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "검사는 특정직공무원에 해당한다.", "2": "정무직공무원은 특수경력직공무원에 해당한다.", "3": "직급이란 1명의 공무원에게 부여할 수 있는 직무와 책임을 말한다.", "4": "소청심사위원회의 결정은 처분 행정청을 기속한다.", "5": "본인의 원(願)에 따른 강임ㆍ휴직 또는 면직처분을 할 때에는 그 처분권자 또는 처분제청 권자는 처분사유를 적은 설명서를 교부하지 않아도 된다."}, "answer": 3, "subject": "공무원법", "exam": "13회", "year": 2025, "explanation": "국가공무원법에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 검사는 특정직공무원에 해당합니다.\n② (옳음) 정무직공무원은 특수경력직공무원에 해당합니다.\n③ ✓ 정답(틀림) — '직급'이란 직무의 종류·곤란성·책임도가 상당히 유사한 직위의 군을 말합니다. '1명의 공무원에게 부여할 수 있는 직무와 책임'은 '직위'의 정의입니다.\n④ (옳음) 소청심사위원회 결정은 처분 행정청을 기속합니다.\n⑤ (옳음) 본인의 원에 따른 처분은 설명서 교부 불필요합니다.\n★ 핵심: 직급(유사 직위의 군) vs 직위(1인에게 부여되는 직무·책임) 혼동 주의"}, {"num": 50, "stem": "50. 국유재산법의 내용에 관한 설명으로 옳은 것은?", "choices": {"1": "보존용재산은 일반재산에 속한다.", "2": "공용재산이란 국가가 직접 공공용으로 사용하거나 대통령령으로 정하는 기한까지 사용 하기로 결정한 재산을 말한다.", "3": "기업용재산은 「민법」 제245조에 따른 시효취득의 대상이 된다.", "4": "판결에 따라 취득하는 경우에도 사권(私權)이 설정된 재산은 그 사권이 소멸된 후가 아니면 국유재산으로 취득하지 못한다.", "5": "총괄청이나 중앙관서의 장은 소유자 없는 부동산을 국유재산으로 취득한다."}, "answer": 5, "subject": "행정행위 부관", "exam": "13회", "year": 2025, "explanation": "국유재산법에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 보존용재산은 행정재산에 속합니다 (일반재산 아님).\n② (틀림) 공용재산은 국가가 직접 공용으로 사용하거나 사용하기로 결정한 재산입니다. '공공용'은 공공용재산입니다.\n③ (틀림) 행정재산(기업용재산 포함)은 시효취득의 대상이 되지 않습니다.\n④ (틀림) 판결로 취득하는 경우에도 사권이 설정된 재산은 사권 소멸 후 국유재산으로 취득합니다.\n⑤ ✓ 정답 — 총괄청이나 중앙관서의 장은 소유자 없는 부동산을 국유재산으로 취득합니다 (국유재산법 제12조).\n★ 핵심: 소유자 없는 부동산 → 총괄청(기획재정부) 또는 중앙관서의 장이 취득"}], "12회": [{"num": 26, "stem": "26. 통치행위에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 고도의 정치적 성격을 띤 국가행위로 사법심사 대상에서 제외된다. ㄴ. 대통령의 서훈취소는 통치행위가 아니다. ㄷ. 통치행위에 해당하는지의 최종적 판단은 오로지 사법부에 의하여 이루어져야 한다. ㄹ. 남북정상회담 개최 과정에서 주무부 장관에게 신고하지 아니하거나 승인 없이 북한 측에 사업권의 대가 명목으로 송금한 행위는 통치행위가 아니다.", "choices": {"1": "ㄱ, ㄷ", "2": "ㄱ, ㄹ", "3": "ㄱ, ㄴ, ㄹ", "4": "ㄴ, ㄷ, ㄹ", "5": "ㄱ, ㄴ, ㄷ, ㄹ"}, "answer": "전부정답", "subject": "통치행위", "exam": "12회", "year": 2024, "explanation": "전부 정답 처리된 문항입니다. 2024년 12회 시험에서 출제오류로 인정되어
