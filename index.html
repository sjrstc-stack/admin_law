옳음) 행정규칙은 원칙적으로 대외적 구속력이 없습니다.\n② ✓ 정답(틀림) — 처분이 행정규칙을 따랐다고 해서 자동으로 적법성이 보장되지 않습니다. 상위법령에 위반되면 위법입니다.\n③ (옳음) 행정규칙 위반만으로 처분이 곧바로 위법이 되지는 않습니다.\n④ (옳음) 행정규칙에 따른 처분의 적법성은 상위법령 기준으로 판단합니다.\n⑤ (옳음) 행정관행이 형성되면 자기구속의 법리에 의해 행정청도 구속됩니다.\n★ 핵심: 행정규칙 준수 ≠ 적법성 보장 (상위법령 위반 시 여전히 위법)"}, {"num": 30, "stem": "30. 행정행위의 효력에 관한 판례의 내용으로 옳지 않은 것은?", "choices": {"1": "행정행위는 불가쟁력의 효력이 있어 법령에 의한 불복기간이 경과한 경우에는 당사자는 그 행정처분의 효력을 다툴 수 없다.", "2": "연령미달의 결격자가 타인의 이름으로 운전면허시험에 응시, 합격하여 교부받은 운전 면허는 당연무효는 아니다.", "3": "민사소송에 있어서 어느 행정처분의 당연무효 여부가 선결문제로 되는 때에는 민사법원은 이를 판단하여 당연무효임을 전제로 판결할 수 있다.", "4": "행정처분이 불복기간의 경과로 인하여 확정될 경우, 그 처분의 기초가 된 사실관계나 법률적 판단이 확정된다.", "5": "구 ｢원자력법｣에 따른 원자로 시설의 부지사전승인처분은 그 자체로서 독립한 행정처분  (Picture4.jpg)  (Picture5.jpg) 이다."}, "answer": 4, "subject": "행정행위 효력·취소·철회", "exam": "12회", "year": 2024, "explanation": "행정행위 효력에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 불가쟁력 발생 후에는 효력을 다툴 수 없습니다.\n② (옳음) 타인 이름으로 취득한 운전면허는 당연무효가 아닙니다 (취소사유).\n③ (옳음) 민사법원도 행정처분의 당연무효를 판단할 수 있습니다.\n④ ✓ 정답(틀림) — 처분이 불복기간 경과로 확정되어도 처분의 기초가 된 사실관계·법률적 판단이 확정되어 모순된 주장을 할 수 없는 것은 아닙니다. 기판력은 소송의 확정판결에만 인정됩니다.\n⑤ (옳음) 원자로 부지사전승인처분은 독립한 행정처분입니다 (대법원 판례).\n★ 핵심: 불가쟁력 ≠ 기판력 — 사실관계·법률판단의 확정은 판결의 기판력에서만"}, {"num": 31, "stem": "31. 행정기본법상 행정행위의 취소ㆍ철회에 관한 설명으로 옳은 것은?", "choices": {"1": "위법한 처분의 일부에 대해 취소할 수 없다.", "2": "부당한 처분에 대해서는 취소할 수 없다.", "3": "당사자의 신뢰를 보호할 가치가 있는 경우에는 위법한 처분에 대해 장래를 향하여 취소 할 수 있다.", "4": "적법한 처분은 중대한 공익을 위하여 필요한 경우에도 그 처분의 전부를 철회할 수 없다.", "5": "적법한 처분을 철회하는 경우에는 철회로 인하여 당사자가 입게 될 불이익을 철회로 달성되는 공익과 비교ㆍ형량할 필요는 없다."}, "answer": 3, "subject": "행정행위 효력·취소·철회", "exam": "12회", "year": 2024, "explanation": "행정기본법상 취소·철회에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 위법한 처분의 일부에 대해서도 취소 가능합니다.\n② (틀림) 부당한 처분도 취소할 수 있습니다 (행정기본법 제18조).\n③ ✓ 정답 — 신뢰보호 가치가 있는 경우 위법한 처분이라도 장래를 향해서만 취소할 수 있습니다 (행정기본법 제18조 제2항).\n④ (틀림) 적법한 처분도 중대한 공익을 위해 전부 철회 가능합니다.\n⑤ (틀림) 적법한 처분 철회 시에도 불이익과 공익을 비교·형량해야 합니다.\n★ 핵심: 신뢰보호 가치 있는 경우 위법처분의 취소는 장래효(소급효 아님)"}, {"num": 32, "stem": "32. 행정행위의 부관에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정청은 처분에 재량이 없는 경우에는 법률에 근거가 있는 경우에 부관을 붙일 수 있다.", "2": "부관은 해당 처분과 실질적인 관련이 있어야 하지만, 해당 처분의 목적에는 구속되지 않는다.", "3": "법률이 예정하는 행정행위의 효과를 일부 배제하는 부관은 독립하여 행정소송의 대상이 될 수 있다.", "4": "행정처분에 붙인 부담인 부관이 무효가 되면 그 부담의 이행으로 한 사법상 법률행위도 당연히 무효가 된다.", "5": "｢하천법｣상 하천부지 점용허가에는 그 성질상 부관을 붙일 수 없다.  (Picture6.jpg)  (Picture7.jpg)"}, "answer": 1, "subject": "행정행위 부관", "exam": "12회", "year": 2024, "explanation": "행정행위 부관에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 재량이 없는 경우에도 법률에 근거가 있으면 부관을 붙일 수 있습니다 — 이는 옳은 설명인데 ①이 맞는 것처럼 보이지만, 실제로는 재량이 없는 기속행위에도 법률 근거 있으면 부관 가능합니다. 맞는 서술입니다.\n② (틀림) 부관은 해당 처분과 실질적 관련이 있고 처분의 목적에도 구속됩니다.\n③ ✓ 정답 — 법률이 예정하는 효과를 일부 배제하는 부관(부담)은 독립하여 행정소송의 대상이 될 수 있습니다 (대법원 판례).\n④ (틀림) 부담인 부관이 무효가 되어도 사법상 행위가 당연히 무효가 되지는 않습니다.\n⑤ (틀림) 하천법상 하천부지 점용허가에도 부관을 붙일 수 있습니다.\n★ 핵심: 부담(법률 효과 배제 부관)은 독립하여 항고소송 가능"}, {"num": 33, "stem": "33. 甲은 건축물을 신축하기 위하여 허가청인 A에게 건축허가(주된 허가)를 신청하였다. 甲은 건축허가를 신청하면서 산지전용허가도 받고자 하는데, 건축법상 甲이 건축허가 를 받으면 산지관리법에 따른 산지전용허가 (관련 허가)를 받은 것으로 의제된다. 이에 관한 설명으로 옳지 않은 것은? (단, 관련 허가의 허가청은 B임)", "choices": {"1": "甲은 건축허가를 A에게 신청하면서 산지전용허가에 필요한 서류를 함께 제출하여야 한다.", "2": "A는 건축허가를 하기 전에 산지전용허가에 관하여 미리 B와 협의하여야 한다.", "3": "B는 산지전용허가에 관한 법령을 위반하여 협의에 응해서는 아니 된다.", "4": "A와 B 사이에 협의가 되면 건축허가와 산지전용허가를 모두 받은 것으로 본다.", "5": "산지전용허가가 의제된 경우 B는 산지전용허가를 직접 한 것으로 보아 관계 법령에 따른 관리ㆍ감독 등 필요한 조치를 하여야 한다."}, "answer": 4, "subject": "인허가의제", "exam": "12회", "year": 2024, "explanation": "인허가의제에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 산지전용허가 관련 서류를 건축허가 신청 시 함께 제출해야 합니다.\n② (옳음) A는 건축허가 전에 B(산지전용허가청)와 협의해야 합니다.\n③ (옳음) B는 법령 위반 없이 협의해야 합니다.\n④ ✓ 정답(틀림) — 협의가 이루어지면 건축허가를 받은 것으로 보고, 산지전용허가도 의제됩니다. 그런데 '둘 다 받은 것으로 본다'는 표현이 문제가 있는 것이 아니라, 실제로 의제의 효과가 어떻게 발생하는지의 문제입니다. 실제 정답은 ④로, 협의가 되면 주된 허가(건축)를 받을 때 관련 허가도 의제됩니다.\n⑤ (옳음) 의제된 B는 직접 한 것으로 보아 관리·감독합니다.\n★ 핵심: 인허가의제 — 협의 후 주된 인허가 시 관련 인허가도 의제"}, {"num": 34, "stem": "34. 행정절차법상 처분절차에 관한 설명으로 옳은 것은?", "choices": {"1": "행정청은 처분을 할 때에는 단순ㆍ반복적인 처분으로서 당사자가 그 이유를 명백히 알 수 있는 경우에도 당사자에게 그 근거와 이유를 사전에 제시하여야 한다.", "2": "행정청은 처분에 오기(誤記)가 있어서 직권으로 이를 정정한 경우에는 그 사실을 당사자 에게 통지할 필요는 없다.", "3": "행정청은 행정청의 편의를 위하여 신청인이 다른 행정청에 처분을 구하는 신청을 접수 하게 할 수 있다.", "4": "행정청은 다수의 행정청이 관여하는 처분을 구하는 신청을 접수한 경우에는 관계 행정 청과의 신속한 협조를 통하여 그 처분이 지연되지 아니하도록 하여야 한다.", "5": "행정청은 필요한 처분기준을 정하여 공표하는 것이 해당 처분의 성질상 현저히 곤란한 경우라도 그 처분기준을 공표하여야 한다."}, "answer": 4, "subject": "행정절차법", "exam": "12회", "year": 2024, "explanation": "행정절차법상 처분절차에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 단순·반복적 처분으로 이유를 명백히 아는 경우에는 근거와 이유를 제시하지 않아도 됩니다.\n② (틀림) 오기 정정 시에도 당사자에게 통지해야 합니다.\n③ (틀림) 신청인의 편의를 위해서는 가능하지만, 행정청의 편의를 위한 접수 이전은 허용되지 않습니다.\n④ ✓ 정답 — 다수 행정청이 관여하는 처분 신청을 접수한 경우 신속한 협조로 지연되지 않도록 해야 합니다 (행정절차법 제20조의2).\n⑤ (틀림) 처분기준 공표가 현저히 곤란한 경우에는 공표하지 않아도 됩니다.\n★ 핵심: 다수 행정청 관여 시 → 신속한 협조로 지연 방지 의무"}, {"num": 35, "stem": "35. 공공기관의 정보공개에 관한 법률의 내용으로 옳지 않은 것은?", "choices": {"1": "공개될 경우 부동산 투기, 매점매석 등으로 특정인에게 이익 또는 불이익을 줄 우려가 있다고 인정되는 정보라도 공공기관이 보유ㆍ관리하는 정보라면 이를 공개하여야 한다.", "2": "공공기관은 부득이한 사유가 없다면 정보공개의 청구를 받은 날부터 10일 이내에 공개 여부를 결정하여야 한다.", "3": "공공기관은 공개 청구된 공개 대상 정보의 일부가 제3자와 관련이 있다고 인정할 때에는 그 사실을 제3자에게 지체 없이 통지하여야 한다.", "4": "공공기관은 정보의 공개를 결정한 경우 해당 청구인이 사본의 교부를 원하는 때에는 이를 교부하여야 한다.", "5": "정보공개청구는 말로써 할 수 있다."}, "answer": 1, "subject": "공공기관 정보공개법", "exam": "12회", "year": 2024, "explanation": "공공기관의 정보공개법에 관한 옳지 않은 것을 고르는 문제입니다.\n① ✓ 정답(틀림) — 부동산 투기 등으로 특정인에게 이익·불이익을 줄 우려가 있는 정보는 비공개 대상 정보에 해당합니다 (제9조 제1항 제8호). 따라서 공개하지 않을 수 있습니다.\n② (옳음) 10일 이내에 공개 여부를 결정해야 합니다.\n③ (옳음) 제3자 관련 정보는 즉시 통지해야 합니다.\n④ (옳음) 사본 교부를 원하면 교부해야 합니다.\n⑤ (옳음) 말로도 정보공개 청구 가능합니다.\n★ 핵심: 투기 이익·불이익 우려 정보 = 비공개 가능 (공개 의무 아님)"}, {"num": 36, "stem": "36. 행정절차법상 청문에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "행정청은 다수 국민의 이해가 상충되는 처분을 하려는 경우에는 청문 주재자를 2명 이상으로 선정할 수 있다.", "2": "청문은 당사자가 공개를 신청하더라도 제3자의 정당한 이익을 현저히 해칠 우려가 있는 경우에는 공개하여서는 아니 된다.", "3": "청문 주재자는 직권으로 당사자등이 주장한 사실에 한하여 필요한 조사를 하여야 한다.", "4": "청문 주재자는 필요하다고 인정할 때에는 관계 행정청에 필요한 문서의 제출을 요구할 수 있다.", "5": "누구든지 청문을 통하여 알게 된 경영상의 비밀을 정당한 이유 없이 누설하여서는 아니 된다."}, "answer": 3, "subject": "행정절차법", "exam": "12회", "year": 2024, "explanation": "행정절차법상 청문에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 다수 국민 이해 상충 처분 시 청문 주재자 2명 이상 선정 가능합니다.\n② (옳음) 제3자의 정당한 이익을 현저히 해칠 우려가 있으면 당사자가 공개를 신청해도 비공개로 할 수 있습니다.\n③ ✓ 정답(틀림) — 청문 주재자는 직권으로 당사자가 주장하지 않은 사실에 대해서도 필요한 조사를 할 수 있습니다 (행정절차법 제33조). '주장한 사실에 한하여'라는 표현이 틀렸습니다.\n④ (옳음) 청문 주재자는 관계 행정청에 문서 제출을 요구할 수 있습니다.\n⑤ (옳음) 청문을 통해 알게 된 경영 비밀은 누설 금지됩니다.\n★ 핵심: 청문 주재자의 조사권 = 당사자 주장 여부와 무관하게 직권 조사 가능"}, {"num": 37, "stem": "37. 질서위반행위규제법의 내용으로 옳지 않은 것은?", "choices": {"1": "과태료 재판은 검사의 명령으로써 집행한다.", "2": "신분에 의하여 성립하는 질서위반행위에 신분이 없는 자가 가담한 때에는 신분이 없는 자에 대하여는 질서위반행위가 성립하지 아니한다.", "3": "질서위반행위 후 법률이 변경되어 그 행위가 질서위반행위에 해당하지 아니하게 된 때에는 법률에 특별한 규정이 없는 한 변경된 법률을 적용한다.", "4": "｢질서위반행위규제법｣은 대한민국 영역 밖에서 질서위반행위를 한 대한민국의 국민에게  (Picture8.jpg)  (Picture9.jpg) 적용한다.", "5": "하나의 행위가 2 이상의 질서위반행위에 해당하는 경우에는 각 질서위반행위에 대하여 정한 과태료 중 가장 중한 과태료를 부과한다.     (Picture10.jpg)"}, "answer": 2, "subject": "질서위반행위규제법", "exam": "12회", "year": 2024, "explanation": "질서위반행위규제법에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 과태료 재판은 검사의 명령으로 집행합니다.\n② ✓ 정답(틀림) — 신분에 의해 성립하는 질서위반행위에 신분 없는 자가 가담한 경우, 신분 없는 자에 대해서도 질서위반행위가 성립합니다 (질서위반행위규제법 제12조 제2항). 형법과 달리 질서법에서는 이를 달리 규정합니다.\n③ (옳음) 행위 후 법률 변경으로 질서위반행위에 해당하지 않으면 변경된 법률 적용합니다.\n④ (옳음) 대한민국 영역 밖에서도 국민에게 적용됩니다.\n⑤ (옳음) 하나의 행위가 수개의 질서위반행위에 해당하면 가장 중한 과태료 부과합니다.\n★ 핵심: 신분 없는 자도 가담 시 질서위반행위 성립 (형법과 달리)"}, {"num": 38, "stem": "38. 행정기본법상 의무자가 행정상 의무를 이행하지 아니하는 경우 행정청이 의무자의 신체나 재산에 실력을 행사하여 그 행정상 의무의 이행이 있었던 것과 같은 상태를 실현하는 것은?", "choices": {"1": "행정대집행", "2": "이행강제금의 부과", "3": "직접강제", "4": "강제징수", "5": "즉시강제"}, "answer": 3, "subject": "행정대집행", "exam": "12회", "year": 2024, "explanation": "행정기본법상 직접강제의 정의를 묻는 문제입니다.\n행정기본법 제32조에서 행정상 강제 수단을 정의합니다:\n① 행정대집행 — 대체적 작위의무 불이행 시 의무자 비용으로 대신 이행\n② 이행강제금 부과 — 의무 이행 촉구를 위한 금전 부과\n③ ✓ 정답 — 직접강제 = \"의무자의 신체나 재산에 실력을 행사하여 행정상 의무 이행이 있었던 것과 같은 상태를 실현\"하는 것 (행정기본법 제32조 제1항 제3호)\n④ 강제징수 — 금전 납부 의무 불이행 시 재산 압류·매각\n⑤ 즉시강제 — 급박한 상황에서 사전 의무 부과 없이 직접 실력 행사\n★ 핵심: 직접강제 = 의무자 신체·재산에 실력 행사로 이행 상태 실현"}, {"num": 39, "stem": "39. 국가배상책임에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "｢국가배상법｣ 제2조상의 직무행위에는 입법작용과 사법작용이 포함된다.", "2": "국가가 국가배상책임을 이행한 경우 공무원에게 경과실이 있으면 국가는 그 공무원에게 구상할 수 있다.", "3": "｢국가배상법｣은 ｢민법｣ 제756조 제1항 단서상의 사용자 면책조항에 상응하는 규정을 두고 있지 않다.", "4": "부작위에 의한 국가배상책임의 성립요건 상 직무상 작위의무는 조리에 의해서도 성립할 수 있다.", "5": "｢국가배상법｣ 제5조상의 공공의 영조물에는 행정주체가 적법한 권한에 기하여 관리하고 있는 공물뿐만 아니라 사실상 관리하고 있는 공물도 포함된다."}, "answer": 2, "subject": "국가배상", "exam": "12회", "year": 2024, "explanation": "국가배상책임에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 국가배상법 제2조의 직무행위에는 입법·사법작용도 포함됩니다.\n② ✓ 정답(틀림) — 공무원에게 경과실이 있는 경우 국가는 공무원에게 구상권을 행사할 수 없습니다. 고의·중과실의 경우에만 구상 가능합니다 (대법원 판례).\n③ (옳음) 국가배상법에는 사용자 면책조항이 없습니다 (민법 제756조 제1항 단서 상응 규정 없음).\n④ (옳음) 부작위에 의한 국가배상의 작위의무는 조리에 의해서도 성립합니다.\n⑤ (옳음) 제5조상 영조물에는 사실상 관리 중인 공물도 포함됩니다.\n★ 핵심: 경과실 공무원에게는 구상권 행사 불가 (고의·중과실만 가능)"}, {"num": 40, "stem": "40. 甲의 건축허가 신청에 대하여 관할 군수 乙은 거부처분을 하였으나, 해당 거부처분 에 무효사유에 해당하는 하자가 있어 甲이 행정쟁송으로 다투고자 한다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "甲은 거부처분 무효확인심판을 제기할 수 있다.", "2": "甲은 의무이행심판을 제기할 수 있다.", "3": "甲이 거부처분 무효확인소송을 제기한 경우 무효인 사유를 주장ㆍ증명할 책임은 甲에게 있다.", "4": "甲이 거부처분 무효확인소송을 제기한 경우 ｢행정소송법｣상 취소소송의 사정판결 규정은 준용되지 않는다.", "5": "甲이 무효의 선언을 구하는 의미의 취소소송을 제기한 경우 제소기간의 제한이 없다."}, "answer": 5, "subject": "행정행위 부관", "exam": "12회", "year": 2024, "explanation": "거부처분의 하자 관련 행정쟁송 방법 문제입니다.\n① (옳음) 거부처분 무효확인심판 제기 가능합니다.\n② (옳음) 의무이행심판 제기 가능합니다 (행정심판법 규정).\n③ (옳음) 무효확인소송에서 무효 사유를 주장·증명할 책임은 원고에게 있습니다.\n④ (옳음) 무효확인소송에는 취소소송의 사정판결 규정이 준용되지 않습니다.\n⑤ ✓ 정답(틀림) — 무효의 선언을 구하는 의미의 취소소송도 제소기간의 제한을 받습니다. 무효확인소송은 제소기간 제한이 없지만, 취소소송으로 무효를 구하는 경우는 취소소송의 제소기간을 지켜야 합니다.\n★ 핵심: 취소소송 = 제소기간 있음, 무효확인소송 = 제소기간 없음"}, {"num": 41, "stem": "41. 행정소송상 집행정지에 관한 설명으로 옳은 것을 모두 고른 것은? ㄱ. ｢행정소송법｣상 집행정지는 부작위위법확인소송에는 인정되지 않는다. ㄴ. 처분이 가분적이더라도 처분의 일부에 대한 집행정지는 허용되지 않는다. ㄷ. 처분의 효력정지는 처분등의 집행을 정지함으로써 목적을 달성할 수 있는 경우에는 허용되지 않는다. ㄹ. 집행정지의 결정에 대한 즉시항고에는 결정의 집행을 정지하는 효력이 인정 된다.", "choices": {"1": "ㄱ, ㄴ", "2": "ㄱ, ㄷ", "3": "ㄴ, ㄹ", "4": "ㄱ, ㄷ, ㄹ", "5": "ㄴ, ㄷ, ㄹ     (Picture11.jpg)"}, "answer": 2, "subject": "행정소송", "exam": "12회", "year": 2024, "explanation": "행정소송상 집행정지에 관한 옳은 것을 고르는 문제입니다.\nㄱ. (옳음) 집행정지는 부작위위법확인소송에는 인정되지 않습니다.\nㄴ. (틀림) 처분이 가분적이면 일부에 대한 집행정지도 허용됩니다.\nㄷ. (옳음) 처분의 효력정지는 집행을 정지함으로써 목적 달성 가능한 경우 허용되지 않습니다 (보충성).\nㄹ. (틀림) 집행정지 결정에 대한 즉시항고에는 집행 정지 효력이 없습니다.\n옳은 것: ㄱ, ㄷ → 정답 ②\n★ 핵심: 집행정지는 취소소송에서만, 효력정지는 보충성 있음"}, {"num": 42, "stem": "42. 행정심판법상 직접 처분과 간접강제에 관한 설명으로 옳은 것은?", "choices": {"1": "거부처분 취소심판의 경우 행정심판위원회는 직접 처분을 할 수 있다.", "2": "의무이행심판의 인용재결이 처분명령재결인 경우 행정심판위원회는 직접 처분을 할 수 없다.", "3": "행정심판위원회는 사정의 변경이 있어 당사자가 신청하는 경우에도 간접강제 결정의 내용을 변경할 수 없다.", "4": "행정심판의 청구인은 간접강제 결정에 불복하는 경우 그 결정에 대하여 행정소송을 제기할 수 있다.", "5": "간접강제 결정에 기초한 강제집행에 관하여 ｢행정심판법｣에 특별한 규정이 없는 사항에 대하여는 ｢행정기본법｣의 규정을 준용한다."}, "answer": 4, "subject": "행정심판", "exam": "12회", "year": 2024, "explanation": "행정심판법상 직접 처분과 간접강제에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 거부처분 취소심판에서 행정심판위원회는 직접 처분을 할 수 없습니다 (의무이행심판에서만 가능).\n② (틀림) 처분명령재결인 경우 피청구인이 처분하지 않으면 행정심판위원회가 직접 처분할 수 있습니다.\n③ (틀림) 사정 변경이 있으면 당사자 신청 또는 직권으로 간접강제 결정 내용 변경 가능합니다.\n④ ✓ 정답 — 간접강제 결정에 불복하는 경우 행정소송을 제기할 수 있습니다 (행정심판법 제50조의2).\n⑤ (틀림) 간접강제 결정에 기초한 강제집행은 민사집행법을 준용합니다 (행정기본법 아님).\n★ 핵심: 간접강제 결정 불복 → 행정소송 제기 가능"}, {"num": 43, "stem": "43. 관할 시장 A는 2", "choices": {}, "answer": 1, "subject": "기타", "exam": "12회", "year": 2024, "explanation": "취소소송의 소의 대상과 제소기간 기산일 문제입니다.\n일부취소재결(감액재결) 후 남은 부분에 대한 취소소송:\n• 소의 대상: 원처분(2024.2.5. 과징금부과처분)이 일부취소재결로 700만원으로 감액된 상태로 존재 → 감액된 원처분이 소의 대상\n• 제소기간 기산일: 재결서 정본 송달일(2024.4.24.)\n일부취소재결 고유의 하자가 없는 경우, 감액된 원처분에 대한 취소소송을 제기하되 제소기간은 재결서 정본 송달일부터 기산합니다 (대법원 판례).\n→ 정답 ①\n★ 핵심: 일부취소재결 후 → 감액된 원처분이 소의 대상, 제소기간은 재결서 송달일부터"}, {"num": 44, "stem": "44. 판례에 의할 때 공무원의 신분관계에 관한 설명으로 옳은 것은?", "choices": {"1": "임용 당시 공무원임용 결격사유가 있었다면 비록 국가의 과실에 의하여 임용결격자임을 밝혀내지 못하였다 하더라도 그 임용행위는 당연 무효이다.", "2": "공무원에 대한 직위해제처분이 있은 후 동일한 사유로 다시 해임처분을 하는 것은 일사 부재리의 법리에 어긋난다.", "3": "｢국가공무원법｣상 당연퇴직의 인사발령은 항고소송의 대상이 되는 처분에 해당한다.", "4": "｢국가공무원법｣상의 직위해제처분에는 의견청취에 관한 ｢행정절차법｣ 규정이 적용된다.", "5": "임용행위의 하자로 임용행위가 취소되어 소급적으로 공무원의 지위를 상실한 자도 ｢공무원연금법｣에서 정한 퇴직급여를 청구할 수 있다."}, "answer": 1, "subject": "행정절차법", "exam": "12회", "year": 2024, "explanation": "공무원 신분관계에 관한 옳은 것을 고르는 문제입니다.\n① ✓ 정답 — 임용 당시 결격사유가 있었다면 국가의 과실로 발견하지 못했더라도 임용행위는 당연무효입니다 (대법원 판례).\n② (틀림) 직위해제 후 해임은 다른 처분이므로 일사부재리 위반이 아닙니다.\n③ (틀림) 당연퇴직의 인사발령은 확인적 통보로, 항고소송 대상인 처분이 아닙니다.\n④ (틀림) 직위해제처분에는 행정절차법 의견청취 규정이 적용되지 않습니다 (적용 제외 사항).\n⑤ (틀림) 임용행위 취소로 소급하여 공무원 지위를 상실한 자는 퇴직급여를 청구할 수 없습니다.\n★ 핵심: 임용 당시 결격사유 → 국가 과실 불문하고 임용행위 당연무효"}, {"num": 45, "stem": "45. 권한의 대리와 위임에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 의함)", "choices": {"1": "권한의 위임은 권한 자체를 수임자에게 이전하지 않는 점에서 권한 자체가 이전되는 권한의 대리와 구별된다.", "2": "국가사무가 도지사에게 기관위임된 경우 도지사가 이를 군수에게 재위임하기 위해서는 도 조례에 의하여야 한다.", "3": "｢정부조직법｣에 따르면 권한의 위임은 위임기관의 권한의 일부에 한하여 인정된다.  (Picture12.jpg)  (Picture13.jpg)", "4": "내부위임에 따라 수임관청이 자신의 이름으로 처분을 한 경우 그 처분에 대한 무효확인 소송의 피고는 위임관청이 된다.", "5": "｢행정권한의 위임 및 위탁에 관한 규정｣에 따르면 수임사무의 처리에 관하여 위임기관은  (Picture14.jpg)  (Picture15.jpg) 수임기관에 대하여 사전승인을 받을 것을 요구할 수 있다."}, "answer": 3, "subject": "행정입법", "exam": "12회", "year": 2024, "explanation": "권한의 대리와 위임에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 권한의 위임은 권한 자체를 수임자에게 이전합니다. 대리는 이전 없이 대리관계만 형성됩니다. 설명이 반대입니다.\n② (틀림) 도지사가 군수에게 재위임하려면 도 조례가 아닌 위임자(국가)의 승인 후 규칙으로 해야 합니다.\n③ ✓ 정답 — 정부조직법에 따르면 권한의 위임은 권한의 일부에 한하여 인정됩니다 (전부 위임 불가).\n④ (틀림) 내부위임에서 수임관청이 자신 명의로 처분하면 피고는 처분명의자인 수임관청이 됩니다.\n⑤ (틀림) 수임사무 처리에 관해 위임기관은 사전승인·협의를 요구할 수 없습니다.\n★ 핵심: 권한의 위임은 일부만 가능 (전부 위임 불가)"}, {"num": 46, "stem": "46. 지방자치법상 지방의회의 권한에 해당하지 않는 것은?", "choices": {"1": "청원의 수리와 처리에 관한 의결권", "2": "결산과 관련한 검사위원 선임권", "3": "주민투표 회부권", "4": "지방의회의원의 자격상실에 대한 의결권", "5": "기금의 설치ㆍ운용에 관한 의결권"}, "answer": 3, "subject": "지방자치법", "exam": "12회", "year": 2024, "explanation": "지방자치법상 지방의회 권한에 해당하지 않는 것을 고르는 문제입니다.\n① (권한) 청원의 수리와 처리에 관한 의결권\n② (권한) 결산 관련 검사위원 선임권\n③ ✓ 정답(권한 아님) — 주민투표 회부권은 지방자치단체장의 권한입니다. 지방의회가 주민투표를 직접 회부할 권한은 없습니다.\n④ (권한) 지방의회의원 자격상실에 대한 의결권\n⑤ (권한) 기금의 설치·운용에 관한 의결권\n★ 핵심: 주민투표 회부권 = 지방자치단체장의 권한 (지방의회 아님)"}, {"num": 47, "stem": "47. 경찰관 직무집행법의 내용으로 옳지 않은 것은?", "choices": {"1": "불심검문과정에서 경찰관으로부터 가까운 경찰서로 동행할 것을 요구받은 사람은 그 요구를 거절할 수 있다.", "2": "불심검문과정에서 경찰관은 그 대상이 되는 사람에게 질문을 할 때에 흉기를 가지고 있는지를 조사할 수 있다.", "3": "불심검문과정에서 경찰관으로부터 질문을 받은 사람은 그 의사에 반하여 답변을 강요 당하지 아니한다.", "4": "경찰관은 재산에 중대한 손해를 끼칠 우려가 있는 인공구조물의 파손이 있을 때에는 그 장소에 있는 사람에게 위해를 방지하기 위하여 필요하다고 인정되는 조치를 하게 할 수 있다.", "5": "경찰관의 적법한 직무집행으로 인하여 손실을 입은 자는 그 손실발생의 원인에 대하여 책임이 있는 경우라도 그 손실 전부에 대하여 보상을 받을 수 있다."}, "answer": 5, "subject": "경찰법", "exam": "12회", "year": 2024, "explanation": "경찰관 직무집행법 내용에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 동행 요구 시 거절 가능합니다 (임의동행).\n② (옳음) 질문 시 흉기 소지 조사 가능합니다.\n③ (옳음) 의사에 반한 답변 강요 금지됩니다.\n④ (옳음) 인공구조물 파손 시 필요한 조치를 하게 할 수 있습니다.\n⑤ ✓ 정답(틀림) — 경찰관의 적법한 직무집행으로 손실을 입은 경우, 손실발생 원인에 대해 책임이 있는 자에게는 보상을 하지 않거나 감액할 수 있습니다 (경찰관직무집행법 제11조의2). 전부 보상을 받을 수 있다는 설명이 틀렸습니다.\n★ 핵심: 적법 직무집행 손실보상 — 원인 책임자에게는 보상 감액 또는 불지급 가능"}, {"num": 48, "stem": "48. 공물에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "공공용물의 일반사용의 경우에는 사용료를 납부하여야 한다.", "2": "공물의 인접주민에게는 구체적으로 공물을 사용하지 않고 있더라도 공물에 대한 고양된 일반사용권이 인정된다.", "3": "행정재산이 공용폐지되어 시효취득의 대상이 된다는 증명책임은 시효취득을 주장하는 자에게 있다.", "4": "｢하천법｣상 하천의 점용허가권은 대세적 효력이 있는 물권이다.  (Picture16.jpg)  (Picture17.jpg)", "5": "중앙관서의 장은 특별한 제한 없이 행정재산의 사용허가를 할 수 있다."}, "answer": 3, "subject": "국유재산법", "exam": "12회", "year": 2024, "explanation": "공물에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 공공용물의 일반사용은 원칙적으로 무료입니다.\n② (틀림) 공물 인접주민에게 고양된 일반사용권은 인정되지 않습니다.\n③ ✓ 정답 — 행정재산이 공용폐지되어 시효취득 대상이 된다는 증명책임은 시효취득을 주장하는 자에게 있습니다 (대법원 판례).\n④ (틀림) 하천 점용허가권은 채권적 성격으로, 대세적 효력이 있는 물권이 아닙니다.\n⑤ (틀림) 행정재산의 사용허가는 법률의 범위 내에서 가능하며 제한이 있습니다.\n★ 핵심: 공용폐지 후 시효취득 가능 여부 증명책임 = 주장자(원고)에게"}, {"num": 49, "stem": "49. 국유재산법상 ( )에 들어갈 용어는? ( \t)(이)란 사용허가나 대부계약 없이 국유재산을 사용ㆍ수익하거나 점유한 자 (사용허가나 대부계약 기간이 끝난 후 다시 사용허가나 대부계약 없이 국유재산 을 계속 사용ㆍ수익하거나 점유한 자를 포함한다)에게 부과하는 금액을 말한다.", "choices": {"1": "과징금", "2": "이행강제금", "3": "과태료", "4": "부담금", "5": "변상금"}, "answer": 5, "subject": "행정상 강제·이행강제금", "exam": "12회", "year": 2024, "explanation": "국유재산법상 '변상금'의 정의를 묻는 문제입니다.\n선지 분석:\n① 과징금 — 행정법규 위반에 대한 제재적 금전 부담\n② 이행강제금 — 의무 이행 촉구를 위한 반복 부과 금전\n③ 과태료 — 질서위반행위에 대한 금전 제재\n④ 부담금 — 특정 이익을 얻는 자에게 부과하는 금전\n⑤ ✓ 정답 — 변상금 = 사용허가·대부계약 없이 국유재산을 무단 사용·수익·점유한 자에게 부과하는 금액 (국유재산법 제72조)\n★ 핵심: 무단 국유재산 사용자에게 부과 = 변상금 (국유재산법 제72조)"}, {"num": 50, "stem": "50. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법률상 사업인정과 수용재결에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "사업인정은 항고소송의 대상이 되는 처분에 해당한다.", "2": "사업인정에 불가쟁력이 발생한 경우 당연무효가 아닌 한 사업인정의 하자를 이유로 수용재결의 취소를 구할 수 없다.", "3": "사업인정은 사업인정이 고시된 날부터 효력을 발생한다.", "4": "수용재결은 행정심판의 재결의 성질을 갖는다.", "5": "수용재결의 효과로서 수용에 의한 사업시행자의 토지소유권 취득은 법률의 규정에 의한 원시취득이다."}, "answer": 4, "subject": "행정입법", "exam": "12회", "year": 2024, "explanation": "토지보상법상 사업인정과 수용재결에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 사업인정은 항고소송 대상 처분입니다.\n② (옳음) 사업인정에 불가쟁력 발생 시 당연무효 아닌 한 하자로 수용재결 취소 불가합니다.\n③ (옳음) 사업인정은 고시된 날부터 효력 발생합니다.\n④ ✓ 정답(틀림) — 수용재결은 토지수용위원회의 재결로서 행정심판의 재결과는 다른 성질을 가집니다. 행정심판의 재결은 행정심판위원회가 행하는 것이고, 수용재결은 그와 다른 별도의 행정처분입니다.\n⑤ (옳음) 수용으로 인한 소유권 취득은 원시취득입니다.\n★ 핵심: 수용재결 ≠ 행정심판의 재결 (별개의 법적 성질)"}], "11회": [{"num": 26, "stem": "26. 행정의 법원칙에 관한 판례의 내용이다. ( )에 들어갈 것은? 텔레비전방송수신료 금액의 결정은 수신료에 관한 본질적인 중요한 사항이므로 국회가 스스로 행하여야 하는 사항에 속하는 것임에도 불구하고 한국방송공사법 에서 국회의 결정이나 관여를 배제한 채 한국방송공사로 하여금 수신료금액을 결 정해서 문화관광부장관의 승인을 얻도록 한 것은 ( \t)원칙에 위반된다.", "choices": {"1": "비례", "2": "평등", "3": "신뢰보호", "4": "법률유보", "5": "부당결부금지"}, "answer": 4, "subject": "행정의 법원칙·기본원리", "exam": "11회", "year": 2023, "explanation": "행정의 법원칙 중 법률유보 원칙 위반 사례 문제입니다.\n텔레비전 수신료 금액 결정은 국민의 권리·의무에 관한 본질적 사항으로 국회가 스스로 결정해야 합니다. 그런데 한국방송공사로 하여금 결정하도록 위임한 것은 의회유보 원칙(법률유보 원칙의 핵심)에 위반됩니다.\n① 비례 — 수단과 목적 비례 원칙\n② 평등 — 차별 금지 원칙\n③ 신뢰보호 — 공적 견해표명에 대한 신뢰 보호\n④ ✓ 정답 — 법률유보 원칙 위반 (국민의 기본권 관련 본질적 사항은 국회가 직접 결정해야 함)\n⑤ 부당결부금지 — 무관한 의무 부과 금지\n★ 핵심: 수신료 금액 결정 = 본질적 사항 → 국회가 직접 결정해야 → 법률유보 위반"}, {"num": 27, "stem": "27. 행정기본법상 법 적용의 기준에 관한 내용이다. ( )에 들어갈 것으로 옳은 것은? ○ 당사자의 신청에 따른 처분은 법령등에 특별한 규정이 있거나 ( ㄱ ) 당시의 법령등을 적용하기 곤란한 특별한 사정이 있는 경우를 제외하고는 ( ㄱ ) 당 시의 법령등에 따른다. ○ 법령등을 위반한 행위의 성립과 이에 대한 제재처분은 법령등에 특별한 규정 이 있는 경우를 제외하고는 ( ㄴ ) 당시의 법령등에 따른다. 다만, 법령등을 위반한 행위 후 법령등의 변경에 의하여 그 행위가 법령등을 위반한 행위에 해당하지 아니하거나 제재처분 기준이 가벼워진 경우로서 해당 법령등에 특별 한 규정이 없는 경우에는 변경된 법령등을 적용한다.", "choices": {"1": "ㄱ: 신청, ㄴ: 제재처분", "2": "ㄱ: 신청, ㄴ: 법령등을 위반한 행위", "3": "ㄱ: 처분, ㄴ: 판결", "4": "ㄱ: 처분, ㄴ: 법령등을 위반한 행위", "5": "ㄱ: 판결, ㄴ: 제재처분"}, "answer": 4, "subject": "행정의 법원칙·기본원리", "exam": "11회", "year": 2023, "explanation": "행정기본법 법 적용 기준 빈칸 문제입니다.\n• ㄱ: 신청에 따른 처분 → \"처분 당시\"의 법령등에 따름 → ㄱ = 처분\n• ㄴ: 제재처분 기준 → \"법령등을 위반한 행위 당시\"의 법령등에 따름 → ㄴ = 법령등을 위반한 행위\n따라서 ④ (ㄱ: 처분, ㄴ: 법령등을 위반한 행위)가 정답입니다.\n★ 핵심: 신청처분 → 처분시 법령 적용, 제재처분 → 위반행위시 법령 적용"}, {"num": 28, "stem": "28. 행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "입법 실제에 있어서 통상 대통령령에는 시행령이라는 이름을 붙이고 총리령과 부령에는 시행규칙이라는 이름을 붙인다.", "2": "헌법이 인정하고 있는 위임입법의 형식은 예시적인 것이다.", "3": "상위 법령의 집행을 위하여 필요한 경우에는 상위 법령의 위임이 없더라도 집행명령으로 새로운 국민의 의무를 정할 수 있다.", "4": "법원이 구체적 규범통제를 통해 위헌․위법으로 선언할 심판대상은 원칙적으로 재판의 전제성이 인정되는 조항에 한정된다.", "5": "고시가 다른 집행행위의 매개 없이 그 자체로서 직접 국민의 구체적인 권리의무나 법률 관계를 규율하는 성격을 가질 때에는 항고소송의 대상이 되는 행정처분에 해당한다."}, "answer": 3, "subject": "행정입법", "exam": "11회", "year": 2023, "explanation": "행정입법에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 대통령령=시행령, 총리령·부령=시행규칙\n② (옳음) 헌법상 위임입법 형식(대통령령·총리령·부령·조례 등)은 예시적입니다 (헌재 결정).\n③ ✓ 정답(틀림) — 집행명령은 상위 법령의 위임 없이 집행에 필요한 사항을 정할 수 있지만, 새로운 국민의 의무를 창설하는 것은 불가합니다. 법률의 위임 없이 새로운 의무를 부과할 수 없습니다.\n④ (옳음) 구체적 규범통제 심판대상은 원칙적으로 재판의 전제성이 인정되는 조항에 한합니다.\n⑤ (옳음) 고시가 직접 권리의무에 영향을 미치면 항고소송 대상입니다.\n★ 핵심: 집행명령은 위임 없이 집행 가능하지만, 새로운 의무 창설은 불가"}, {"num": 29, "stem": "29. 판례에 의할 때 항고소송의 대상이 되는 행정처분에 해당하는 것을 모두 고른 것은? ㄱ. 지목변경신청 반려행위 ㄴ. 건축물 용도변경신청 거부행위 ㄷ. 건축물대장 작성신청 반려행위 ㄹ. 토지대장 직권말소행위 ㅁ. 토지대장상의 소유자명의변경신청 거부행위", "choices": {"1": "ㄱ", "2": "ㄴ, ㅁ", "3": "ㄷ, ㄹ, ㅁ", "4": "ㄱ, ㄴ, ㄷ, ㄹ", "5": "ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"}, "answer": 4, "subject": "행정소송", "exam": "11회", "year": 2023, "explanation": "항고소송의 대상인 행정처분을 모두 고르는 문제입니다.\nㄱ. 지목변경신청 반려행위 → 처분성 인정 (대법원 판례)\nㄴ. 건축물 용도변경신청 거부 → 처분성 인정\nㄷ. 건축물대장 작성신청 반려 → 처분성 인정 (대법원 판례)\nㄹ. 토지대장 직권말소 → 처분성 인정 (대법원 판례)\nㅁ. 토지대장 소유자명의변경신청 거부 → 처분성 불인정 (단순 사실행위)\n처분성 인정: ㄱ, ㄴ, ㄷ, ㄹ → 정답 ④\n★ 핵심: 토지대장 소유자명의변경신청 거부는 처분성 없음"}, {"num": 30, "stem": "30. 행정행위의 불가변력과 불가쟁력에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "불가변력은 행정행위의 상대방이나 이해관계인을 구속하는 효력이고 불가쟁력은 행정청을 구속하는 효력이다.", "2": "불가변력은 모든 행정행위에 다 인정되지만, 불가쟁력은 예외적으로 일부 행정행위의 경우에만 인정된다.", "3": "불가변력은 당해 행정행위에 대하여서만 인정되는 것이고, 동종의 행정행위라 하더라도 그 대상을 달리할 때에는 이를 인정할 수 없다.", "4": "행정처분이 불복기간의 경과로 인하여 확정된 경우 처분의 기초가 된 사실관계나 법률 적 판단이 확정되고, 당사자들이나 법원이 이에 기속되어 모순되는 주장이나 판단을 할 수 없게 된다.", "5": "행정심판의 재결은 준사법적 행위로서 불가쟁력이 인정되므로 행정심판 청구인은 제소 기간의 경과 여부를 불문하고 그 재결의 효력을 다툴 수 없게 된다."}, "answer": 3, "subject": "행정행위 효력·취소·철회", "exam": "11회", "year": 2023, "explanation": "불가변력과 불가쟁력에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 반대입니다. 불가쟁력은 상대방을 구속, 불가변력은 행정청을 구속합니다.\n② (틀림) 반대입니다. 불가쟁력은 모든 행정행위에 발생, 불가변력은 일부(재결 등)에만 인정됩니다.\n③ ✓ 정답 — 불가변력은 당해 행정행위에 대해서만 인정되고, 동종이지만 대상이 다른 행위에는 인정되지 않습니다 (대법원 판례).\n④ (틀림) 불복기간 경과 확정은 불가쟁력이고, 기판력과는 다릅니다. 당사자들이 기속되어 모순된 주장을 못 하는 것은 판결의 기판력입니다.\n⑤ (틀림) 행정심판 재결에는 불가변력이 인정되지만, 불가쟁력이 아닙니다. 또한 제소기간과 무관하게 재결의 효력을 다툴 수 없는 것은 아닙니다.\n★ 핵심: 불가변력 = 당해 행정행위에만, 동종·별도 행위에는 미치지 않음"}, {"num": 31, "stem": "31. 행정지도에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "행정지도를 반드시 서면으로 해야 하는 것은 아니다.", "2": "행정기관은 행정지도의 상대방이 행정지도에 따르지 아니하였다는 것을 이유로 불이익한 조치를 하여서는 아니 된다.", "3": "행정기관이 같은 행정목적을 실현하기 위하여 많은 상대방에게 행정지도를 하려는 경우 에는 특별한 사정이 없으면 행정지도에 공통적인 내용이 되는 사항을 공표하여야 한다.", "4": "행정지도의 상대방은 해당 행정지도의 내용뿐만 아니라 행정지도의 방식에 관해서도 행정기관에 의견제출을 할 수 있다.", "5": "「행정기본법」은 임의성의 원칙 등 행정지도의 원칙에 관하여 규정하고 있다."}, "answer": 5, "subject": "행정지도", "exam": "11회", "year": 2023, "explanation": "행정지도에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 행정지도는 서면이 아닌 구두로도 가능합니다.\n② (옳음) 행정지도 불응을 이유로 불이익 조치 금지됩니다.\n③ (옳음) 다수에게 행정지도 시 공통 내용 공표해야 합니다.\n④ (옳음) 방식과 내용 모두에 관해 의견제출 가능합니다.\n⑤ ✓ 정답(틀림) — 행정지도의 임의성 원칙 등은 행정절차법에 규정되어 있습니다. 행정기본법이 아닙니다 (행정절차법 제48조~제51조).\n★ 핵심: 행정지도 원칙 규정 = 행정절차법 (행정기본법 아님)"}, {"num": 32, "stem": "32. 행정행위의 부관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "부담부 행정행위는 부담을 이행하여야 비로소 그 효력이 발생한다.", "2": "부담을 불이행한 것만으로는 주된 행정행위의 효력이 소멸하지 않는다.", "3": "부담은 그 자체로서 행정쟁송의 대상이 될 수 있다.", "4": "행정청은 처분에 재량이 없는 경우에는 법률에 근거가 있는 경우에 부관을 붙일 수 있다.", "5": "어업면허처분 중 면허의 유효기간만 취소하여 달라는 소송을 제기하는 것은 허용될 수 없다."}, "answer": 1, "subject": "행정행위 부관", "exam": "11회", "year": 2023, "explanation": "행정행위 부관에 관한 옳지 않은 것을 고르는 문제입니다.\n① ✓ 정답(틀림) — 부담은 부담을 이행해야 주된 행위의 효력이 발생하는 것이 아닙니다. 부담이 붙은 행정행위는 부담 이행 여부와 무관하게 효력이 발생하고, 부담 불이행 시 행정청이 취소·철회하거나 강제이행할 수 있습니다.\n② (옳음) 부담 불이행만으로는 주된 행위 효력이 소멸하지 않습니다.\n③ (옳음) 부담은 그 자체로 행정쟁송 대상이 됩니다.\n④ (옳음) 기속행위에도 법률 근거가 있으면 부관 가능합니다.\n⑤ (옳음) 면허 유효기간만 취소하는 소송은 허용되지 않습니다 (부관 독립 취소 불가 사례).\n★ 핵심: 부담 ≠ 정지조건 — 부담 이행 전에도 행정행위 효력 발생"}, {"num": 33, "stem": "33. 공법상 계약에 관한 설명으로 옳은 것은?", "choices": {"1": "「행정절차법」은 공법상 계약의 절차에 관한 일반법이다.", "2": "행정청은 공법상 계약의 상대방을 선정하고 계약 내용을 정할 때 공법상 계약의 공공성 만을 고려하여야 하고 제3자의 이해관계를 고려하여서는 아니 된다.", "3": "행정청이 공법상 계약을 체결하는 경우 계약의 목적 및 내용을 명확하게 적은 계약서를 작성하여야 한다.", "4": "공법상 계약에는 법률우위의 원칙이 적용되지 않는다.", "5": "행정청이 공법상 계약을 체결할 때 법령등에 따른 관계 행정청의 동의, 승인 등이 필요 하다고 하여 이를 모두 거쳐야 하는 것은 아니다."}, "answer": 3, "subject": "공법상 계약", "exam": "11회", "year": 2023, "explanation": "공법상 계약에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 행정절차법은 공법상 계약의 일반법이 아닙니다. 행정기본법이 일반법입니다.\n② (틀림) 공법상 계약 체결 시 공공성뿐 아니라 제3자 이해관계도 고려해야 합니다.\n③ ✓ 정답 — 행정청이 공법상 계약 체결 시 내용을 명확히 한 계약서를 작성해야 합니다 (행정기본법 제27조 제3항).\n④ (틀림) 공법상 계약에도 법률우위 원칙이 적용됩니다.\n⑤ (틀림) 법령상 관계 행정청의 동의·승인이 필요한 경우 반드시 거쳐야 합니다.\n★ 핵심: 공법상 계약 = 반드시 계약서 작성 (행정기본법 제27조)"}, {"num": 34, "stem": "34. 행정절차법상 행정청의 관할 및 협조에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "행정청이 그 관할에 속하지 아니하는 사안을 접수한 경우 지체 없이 이를 관할 행정청 에 이송하여야 하고 그 사실을 신청인에게 통지하여야 한다.", "2": "행정응원에 드는 비용은 응원을 하는 행정청이 부담한다.", "3": "행정청은 행정의 원활한 수행을 위하여 서로 협조하여야 한다.", "4": "행정응원을 요청받은 행정청은 응원을 거부하는 경우 그 사유를 응원을 요청한 행정청에 통지하여야 한다.", "5": "행정청의 관할이 분명하지 아니한 경우이지만 공통으로 감독하는 상급 행정청이 없는 경우에는 각 상급 행정청이 협의하여 그 관할을 결정한다."}, "answer": 2, "subject": "행정절차법", "exam": "11회", "year": 2023, "explanation": "행정절차법상 관할 및 협조에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 관할 아닌 사안 접수 시 즉시 이송·통지 의무\n② ✓ 정답(틀림) — 행정응원 비용은 응원을 요청한 행정청이 부담합니다. 응원하는 행정청이 아닙니다 (행정절차법 제8조 제6항).\n③ (옳음) 행정청 간 협조 의무\n④ (옳음) 응원 거부 시 사유 통지 의무\n⑤ (옳음) 공통 상급기관 없으면 각 상급기관이 협의하여 결정\n★ 핵심: 행정응원 비용 = 요청한 행정청(응원받는 쪽) 부담"}, {"num": 35, "stem": "35. 행정절차법상 송달 및 기간ㆍ기한에 관한 설명으로 옳은 것은?", "choices": {"1": "정보통신망을 이용한 송달은 송달받을 자의 동의 여부와 상관없이 언제든지 가능하다.", "2": "행정청은 송달하는 문서의 명칭과 송달받는 자의 성명을 확인할 수 있는 기록을 보존하지 않아도 된다.", "3": "송달은 다른 법령등에 특별한 규정이 있는 경우를 제외하고는 해당 문서를 발신한 때 그 효력이 발생한다.", "4": "천재지변으로 기한을 지킬 수 없는 경우에는 그 사유가 끝나는 날이 속하는 주말까지 기간의 진행이 정지된다.", "5": "외국에 거주하거나 체류하는 자에 대한 기간 및 기한은 행정청이 그 우편이나 통신에 걸리는 일수를 고려하여 정하여야 한다."}, "answer": 5, "subject": "행정행위 부관", "exam": "11회", "year": 2023, "explanation": "행정절차법상 송달·기간·기한에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 정보통신망 이용 송달은 송달받을 자의 동의가 있어야 합니다.\n② (틀림) 송달 문서의 명칭과 수신자 성명 확인 기록을 보존해야 합니다.\n③ (틀림) 송달은 발신한 때가 아닌 도달한 때(수령한 때) 효력이 발생합니다.\n④ (틀림) 천재지변으로 기한을 지킬 수 없는 경우, 사유가 끝나는 날의 다음 날까지 정지됩니다 (주말이 아님).\n⑤ ✓ 정답 — 외국 거주·체류자에 대한 기간·기한은 우편·통신에 걸리는 일수를 고려하여 정해야 합니다 (행정절차법 제17조).\n★ 핵심: 외국 거주자 기간 산정 시 우편·통신 소요 일수 고려 (행정절차법 제17조)"}, {"num": 36, "stem": "36. 개인정보 보호법상 개인정보 보호 원칙에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "개인정보처리자는 개인정보의 처리 목적에 필요한 범위에서 적합하게 개인정보를 처리 하여야 한다.", "2": "개인정보처리자는 개인정보의 처리 목적에 필요한 범위에서 개인정보의 정확성, 완전성 및 최신성이 보장되도록 하여야 한다.", "3": "개인정보처리자는 정보주체의 사생활 침해를 최소화하는 방법으로 개인정보를 처리하여야 한다.", "4": "개인정보처리자는 개인정보 처리방침 등 개인정보의 처리에 관한 사항을 공개하여야 한다.", "5": "개인정보처리자는 개인정보를 익명 또는 가명으로 처리하여서는 아니 된다."}, "answer": 5, "subject": "개인정보 보호법", "exam": "11회", "year": 2023, "explanation": "개인정보보호법상 보호 원칙에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 처리 목적 범위에서 적합하게 처리해야 합니다.\n② (옳음) 정확성·완전성·최신성 보장 의무\n③ (옳음) 사생활 침해 최소화 방법으로 처리해야 합니다.\n④ (옳음) 처리방침 공개 의무\n⑤ ✓ 정답(틀림) — 개인정보처리자는 익명 또는 가명으로 처리할 수 있습니다. 오히려 가명처리를 통한 데이터 활용을 법이 허용하고 있습니다 (개인정보보호법 제28조의2 이하).\n★ 핵심: 가명처리·익명처리는 법적으로 허용됨 (금지 아님)"}, {"num": 37, "stem": "37. 행정대집행법의 내용에 관한 설명으로 옳은 것은?", "choices": {"1": "의무자가 동의한 경우라도 행정청은 해가 뜨기 전에는 대집행을 착수 할 수 없다.", "2": "해가 지기 전에 대집행을 착수한 경우라도 해가 진 후에는 행정청은 즉시 대집행을 중단해야 한다.", "3": "대집행에 대하여는 행정심판을 제기할 수 없다.", "4": "대집행에 요한 비용은 「민사집행법」의 예에 의하여 징수하여야 한다.", "5": "대집행에 요한 비용에 대하여서는 행정청은 사무비의 소속에 따라 국세에 다음가는 순위의 선취득권을 가진다."}, "answer": 5, "subject": "행정대집행", "exam": "11회", "year": 2023, "explanation": "행정대집행법에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 의무자 동의 시 해 뜨기 전에도 대집행 착수 가능합니다.\n② (틀림) 해 지기 전 착수한 경우 계속할 수 있습니다 (즉시 중단 아님).\n③ (틀림) 대집행에 대해서는 행정심판을 제기할 수 있습니다 (행정대집행법 제7조).\n④ (틀림) 대집행 비용은 국세징수법의 예에 따라 징수합니다 (민사집행법 아님).\n⑤ ✓ 정답 — 대집행 비용에 대해 행정청은 국세에 다음가는 순위의 선취득권을 가집니다 (행정대집행법 제6조).\n★ 핵심: 대집행 비용 → 국세 다음 순위의 선취득권 보유"}, {"num": 38, "stem": "38. 질서위반행위규제법의 내용에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "다른 법률에 특별한 규정이 없는 한 14세가 되지 아니한 자의 질서위반행위에 대해서도 과태료를 부과한다.", "2": "고의 또는 과실이 없는 질서위반행위는 과태료를 부과하지 아니한다.", "3": "법률에 따르지 아니하고는 어떤 행위도 질서위반행위로 과태료를 부과하지 아니한다.", "4": "대한민국 영역 밖에 있는 대한민국의 선박 또는 항공기 안에서 질서위반행위를 한 외국 인에게도 적용한다.", "5": "대한민국 영역 밖에서 질서위반행위를 한 대한민국의 국민에게도 적용한다."}, "answer": 1, "subject": "질서위반행위규제법", "exam": "11회", "year": 2023, "explanation": "질서위반행위규제법에 관한 옳지 않은 것을 고르는 문제입니다.\n① ✓ 정답(틀림) — 14세 미만자의 질서위반행위에는 과태료를 부과하지 않습니다 (질서위반행위규제법 제9조). '부과한다'는 표현이 틀렸습니다.\n② (옳음) 고의·과실 없는 질서위반행위는 과태료 부과 안 합니다.\n③ (옳음) 법률에 근거 없이 과태료 부과 불가합니다.\n④ (옳음) 대한민국 선박·항공기 안에서 외국인도 적용됩니다.\n⑤ (옳음) 대한민국 영역 밖에서도 국민에게 적용됩니다.\n★ 핵심: 14세 미만 = 과태료 부과 면제 (형법상 형사미성년자와 유사)"}, {"num": 39, "stem": "39. 취소소송에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "제약회사는 보건복지부 고시인 ‘약제급여ㆍ비급여 목록 및 급여 상한금액표’ 중 그 제약 회사가 제조ㆍ공급하는 약제의 상한금액 인하 부분의 취소를 구할 원고적격이 있다.", "2": "처분의 효과가 소멸된 뒤에는 그 처분의 취소로 인하여 회복되는 법률상 이익이 있어도 그 처분에 대한 취소소송을 제기할 수 없다.", "3": "지방법무사회가 법무사의 사무원 채용승인 신청을 거부한 경우 채용승인을 신청한 법무 사가 아닌 자는 취소소송을 제기하지 못한다.", "4": "기존의 시외버스운송사업자인 甲회사는 동일노선을 운행하는 乙회사에 대한 시외버스운 송사업계획변경인가 처분으로 인하여 甲회사의 수익감소가 예상되는 경우라도 그 처분 의 취소를 구할 법률상의 이익이 없다.", "5": "「주택법」상 입주자는 건축물의 하자를 이유로 그 건축물에 대한 사용검사처분의 취소 를 구할 법률상 이익이 있다."}, "answer": 1, "subject": "행정입법", "exam": "11회", "year": 2023, "explanation": "취소소송에 관한 옳은 것을 고르는 문제입니다.\n① ✓ 정답 — 제약회사는 자신이 제조·공급하는 약제의 급여 상한금액 인하 부분에 대해 직접적 이해관계가 있으므로 취소소송 원고적격이 있습니다 (대법원 판례).\n② (틀림) 처분 효과 소멸 후에도 취소로 회복되는 이익이 있으면 소의 이익이 인정됩니다.\n③ (틀림) 채용승인 신청한 법무사도 이해관계가 있어 취소소송 제기 가능합니다.\n④ (틀림) 동일 노선 버스 사업자는 타 사업자의 인가로 수익 감소 우려 시 원고적격 인정됩니다.\n⑤ (틀림) 입주자는 건축물 하자로 사용검사처분 취소를 구할 법률상 이익이 없습니다 (대법원 판례).\n★ 핵심: 약제 상한금액 인하 → 제약회사 직접 이해관계 → 원고적격 인정"}, {"num": 40, "stem": "40. 행정심판법의 내용에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "부작위란 행정청이 당사자의 신청에 대하여 상당한 기간 내에 일정한 처분을 하여야 할 법률상 의무가 있는데도 처분을 하지 아니하는 것을 말한다.", "2": "행정심판은 처분이 있음을 알게 된 날부터 180일 이내에 청구하여야 한다.", "3": "청구인이 경제적 능력으로 인해 대리인을 선임할 수 없는 경우에는 행정심판위원회에 국선대리인을 선임하여 줄 것을 신청할 수 있다.", "4": "여러 명의 청구인이 공동으로 심판청구를 할 때에는 청구인들 중에서 3명 이하의 선정 대표자를 선정할 수 있다.", "5": "의무이행심판은 처분을 신청한 자로서 행정청의 거부처분 또는 부작위에 대하여 일정한 처분을 구할 법률상 이익이 있는 자가 청구할 수 있다."}, "answer": 2, "subject": "행정심판", "exam": "11회", "year": 2023, "explanation": "행정심판법에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 부작위의 정의 — 법률상 의무 있는데도 처분하지 않는 것.\n② ✓ 정답(틀림) — 행정심판은 처분이 있음을 알게 된 날부터 90일 이내에 청구해야 합니다 (행정심판법 제27조). 180일은 처분이 있었던 날부터의 기간입니다.\n③ (옳음) 경제적 능력 없는 청구인의 국선대리인 신청 가능합니다.\n④ (옳음) 공동 심판청구 시 3명 이하 선정대표자 선정 가능합니다.\n⑤ (옳음) 의무이행심판은 거부처분·부작위에 대해 이익 있는 자가 청구합니다.\n★ 핵심: 심판청구기간 = 안 날로부터 90일 (180일 아님)"}, {"num": 41, "stem": "41. 행정소송법의 내용에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "처분등을 취소하는 확정판결은 당사자에 대해서만 효력이 있다.", "2": "처분등이라 함은 행정청이 행하는 구체적 사실에 관한 법집행으로서의 공권력의 행사 또는 그 거부와 그 밖에 이에 준하는 행정작용 및 행정심판에 대한 재결을 말한다.", "3": "행정소송의 종류로는 항고소송, 당사자소송, 민중소송, 기관소송이 규정되어 있다.", "4": "무효등 확인소송은 처분등의 효력 유무 또는 존재 여부의 확인을 구할 법률상 이익이 있는 자가 제기할 수 있다.", "5": "행정청의 재량에 속하는 처분이라도 재량권의 한계를 넘거나 그 남용이 있는 때에는 법원은 이를 취소할 수 있다."}, "answer": 1, "subject": "재량행위·기속행위", "exam": "11회", "year": 2023, "explanation": "행정소송법에 관한 옳지 않은 것을 고르는 문제입니다.\n① ✓ 정답(틀림) — 취소 확정판결은 당사자뿐 아니라 제3자에게도 효력이 있습니다 (대세적 효력, 행정소송법 제29조).\n② (옳음) 처분등의 정의 — 구체적 사실에 관한 법집행으로서의 공권력 행사·거부 및 재결\n③ (옳음) 행정소송의 4가지 종류 — 항고소송, 당사자소송, 민중소송, 기관소송\n④ (옳음) 무효등확인소송 — 법률상 이익 있는 자가 제기\n⑤ (옳음) 재량권 일탈·남용은 법원이 취소할 수 있습니다.\n★ 핵심: 취소 확정판결 = 당사자 + 제3자에게 효력 있음 (대세효)"}, {"num": 42, "stem": "42. 국가배상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "인사업무담당 공무원이 다른 공무원의 공무원증을 위조한 행위는 직무집행행위에 해당 한다.", "2": "행정처분이 후에 항고소송에서 취소되면 그 기판력에 의하여 당해 행정처분은 공무원의 고의ㆍ과실 여부와 관계없이 곧바로 불법행위를 구성한다.", "3": "생명ㆍ신체의 침해로 인한 국가배상을 받을 권리는 양도하지 못한다.", "4": "경찰관이 범죄수사를 함에 있어 법규상 또는 조리상의 한계를 위반하였다면 이는 법령 을 위반한 경우에 해당한다.", "5": "영조물 설치․관리상의 하자는 공공의 목적에 공여된 영조물이 그 용도에 따라 통상 갖추어야 할 안전성을 갖추지 못한 상태에 있음을 말한다."}, "answer": 2, "subject": "행정소송", "exam": "11회", "year": 2023, "explanation": "국가배상에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 인사업무 담당 공무원의 공무원증 위조도 직무행위로 인정됩니다 (대법원 판례).\n② ✓ 정답(틀림) — 행정처분이 취소되었다고 해서 기판력에 의해 자동으로 불법행위가 구성되지 않습니다. 고의·과실, 상당인과관계 등 국가배상 요건을 별도로 판단해야 합니다.\n③ (옳음) 생명·신체 침해로 인한 국가배상권은 양도 불가합니다.\n④ (옳음) 법규 위반 범위에는 법규상 한계 위반뿐 아니라 조리상 한계 위반도 포함됩니다.\n⑤ (옳음) 영조물 설치·관리상의 하자 = 통상의 안전성을 갖추지 못한 상태\n★ 핵심: 행정처분 취소 ≠ 자동으로 국가배상책임 성립 (별도 요건 심사 필요)"}, {"num": 43, "stem": "43. 행정조직과 권한의 위임 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정기관은 법령으로 정하는 바에 따라 그 소관사무의 일부를 하급행정기관에 위임할 수 있다.", "2": "행정기관 또는 소속기관을 설치하거나 공무원의 정원을 증원할 때에는 반드시 예산상의 조치가 병행되어야 한다.", "3": "행정권한의 위임은 권한의 법적인 귀속을 변경하는 것이므로 법률이 위임을 허용하고 있는 경우에 한하여 인정된다.", "4": "행정권한의 내부위임은 법률이 위임을 허용하고 있는 경우에 한하여 인정된다.", "5": "헌법은 행정각부의 설치ㆍ조직과 직무범위는 법률로 정한다고 규정하고 있다."}, "answer": 4, "subject": "권한 위임·대리", "exam": "11회", "year": 2023, "explanation": "행정조직과 권한 위임에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 행정기관은 법령에 따라 소관사무 일부를 하급기관에 위임 가능합니다.\n② (옳음) 기관·공무원 정원 증원 시 예산 조치가 병행되어야 합니다.\n③ (옳음) 행정권한의 위임은 법률이 허용하는 경우에만 인정됩니다.\n④ ✓ 정답(틀림) — 내부위임은 법률이 허용하지 않아도 내부적 사무처리 편의를 위해 가능합니다. 법률의 근거 없이도 허용되는 것이 내부위임의 특징입니다.\n⑤ (옳음) 헌법은 행정각부 설치·조직·직무범위는 법률로 정한다고 규정합니다 (헌법 제96조).\n★ 핵심: 내부위임 = 법률 근거 불요 (내부적 편의 목적)"}, {"num": 44, "stem": "44. 행정심판법상 재결에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "재결은 서면으로 한다.", "2": "행정심판위원회는 사정재결을 할 수 없다.", "3": "재결은 청구인에게 재결서의 정본이 송달되었을 때에 그 효력이 생긴다.", "4": "행정심판위원회는 심판청구의 대상이 되는 처분보다 청구인에게 불리한 재결을 하지 못 한다.", "5": "행정심판위원회는 심판청구가 적법하지 아니하면 그 심판청구를 각하한다."}, "answer": 2, "subject": "행정절차법", "exam": "11회", "year": 2023, "explanation": "행정심판법상 재결에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 재결은 서면으로 합니다.\n② ✓ 정답(틀림) — 행정심판위원회는 사정재결을 할 수 있습니다 (행정심판법 제44조). 취소심판에서 처분이 위법·부당하더라도 공공복리에 적합하지 않으면 기각할 수 있습니다.\n③ (옳음) 재결은 재결서 정본이 청구인에게 송달될 때 효력이 생깁니다.\n④ (옳음) 불이익변경금지 원칙 — 청구인에게 불리한 재결 금지.\n⑤ (옳음) 부적법한 심판청구는 각하합니다.\n★ 핵심: 행정심판에서 사정재결 가능 (행정심판법 제44조)"}, {"num": 45, "stem": "45. 정부조직법상 국무총리 소속 행정기관에 해당하는 것은?", "choices": {"1": "법제처", "2": "특허청", "3": "국세청", "4": "통계청", "5": "대통령경호처"}, "answer": 1, "subject": "행정조직법", "exam": "11회", "year": 2023, "explanation": "정부조직법상 국무총리 소속 행정기관 문제입니다.\n① ✓ 정답 — 법제처는 국무총리 소속 행정기관입니다 (정부조직법 제23조).\n② 특허청 — 산업통상자원부 소속\n③ 국세청 — 기획재정부 소속\n④ 통계청 — 기획재정부 소속\n⑤ 대통령경호처 — 대통령 직속\n★ 핵심: 국무총리 소속 = 법제처, 국가보훈부, 인사혁신처, 식품의약품안전처 등"}, {"num": 46, "stem": "46. 국가공무원에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "공무원의 신분과 지위의 특수성상 공무원에 대해서는 일반 국민에 비해 보다 넓고 강한 기본권 제한이 가능하다.", "2": "공무원이 그 직무를 수행함에 있어 소속 상관의 명백한 위법 내지 불법한 명령에 따라야 할 의무는 없다.", "3": "법관, 검사, 외무공무원은 일반직공무원에 해당한다.", "4": "모든 공무원은 법령을 준수하며 성실히 직무를 수행하여야 한다.", "5": "국가기관의 장은 소속 공무원을 임용할 때 합리적인 이유 없이 사회적 신분을 이유로 차별해서는 아니 된다."}, "answer": 3, "subject": "공무원법", "exam": "11회", "year": 2023, "explanation": "국가공무원에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 공무원은 신분·지위 특수성으로 더 넓은 기본권 제한 가능합니다.\n② (옳음) 상관의 명백한 위법·불법 명령에 따를 의무 없습니다.\n③ ✓ 정답(틀림) — 법관, 검사, 외무공무원은 특정직공무원에 해당합니다 (국가공무원법 제2조). 일반직이 아닙니다.\n④ (옳음) 모든 공무원은 법령 준수·성실 직무 수행 의무가 있습니다.\n⑤ (옳음) 합리적 이유 없는 사회적 신분에 의한 차별 금지됩니다.\n★ 핵심: 법관·검사·외무공무원 = 특정직공무원 (일반직 아님)"}, {"num": 47, "stem": "47. 경찰관 직무집행법상 사실의 확인을 위하여 경찰관이 출석 요구서를 보내 경찰관서에 출석할 것을 요구할 수 있는 직무수행으로 명시되어 있지 않은 것은?", "choices": {"1": "미아를 인수할 보호자 확인", "2": "유실물을 인수할 권리자 확인", "3": "사고로 인한 사상자 확인", "4": "긴급구호를 요청받은 보건의료기관에 대한 요청사실의 확인", "5": "행정처분을 위한 교통사고 조사에 필요한 사실 확인"}, "answer": 4, "subject": "경찰법", "exam": "11회", "year": 2023, "explanation": "경찰관 직무집행법상 출석 요구 직무수행으로 명시되지 않은 것을 고르는 문제입니다.\n① (명시) 미아를 인수할 보호자 확인\n② (명시) 유실물을 인수할 권리자 확인\n③ (명시) 사고로 인한 사상자 확인\n④ (명시) 긴급구호 요청 보건의료기관에 대한 요청사실 확인\n⑤ ✓ 정답(명시 안 됨) — 행정처분을 위한 교통사고 조사에 필요한 사실 확인은 출석 요구 직무수행으로 명시되어 있지 않습니다 (경찰관직무집행법 제8조).\n★ 핵심: 교통사고 조사 목적의 출석 요구는 경찰관직무집행법 제8조에 없음"}, {"num": 48, "stem": "48. 국가재정법의 내용에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "정부는 재정건전성의 확보를 위하여 최선을 다하여야 한다.", "2": "정부는 「성별영향평가법」에 따른 성별영향평가의 결과를 포함하여 예산이 여성과 남성 에게 미치는 효과를 평가하고, 그 결과를 정부의 예산편성에 반영하기 위하여 노력하여야 한다.", "3": "한 회계연도의 모든 수입을 세입으로 하고, 모든 지출을 세출로 한다.", "4": "예산은 예산총칙ㆍ세입세출예산ㆍ계속비ㆍ명시이월비 및 국고채무부담행위를 총칭한다.", "5": "정부는 예측할 수 없는 예산 외의 지출에 충당하기 위하여 일반회계 예산총액의 100분의 10 이내의 금액을 예비비로 세입세출예산에 계상하여야 한다."}, "answer": 5, "subject": "국가재정법", "exam": "11회", "year": 2023, "explanation": "국가재정법에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 재정건전성 확보 최선 의무\n② (옳음) 성인지 예산 반영 노력 의무\n③ (옳음) 모든 수입=세입, 모든 지출=세출 (총계주의)\n④ (옳음) 예산의 구성 요소 5가지\n⑤ ✓ 정답(틀림) — 예비비는 일반회계 예산총액의 100분의 1 이내로 계상해야 합니다 (국가재정법 제22조). '100분의 10'이 아닙니다.\n★ 핵심: 예비비 한도 = 일반회계 예산총액의 1% (10% 아님)"}, {"num": 49, "stem": "49. 지방자치단체의 관할 구역 경계변경에 관한 지방자치법 조문의 일부이다. ( )에 들어갈 내용으로 옳은 것은? 지방자치단체의 장은 관할 구역과 생활권과의 불일치 등으로 인하여 주민생 활에 불편이 큰 경우 등 대통령령으로 정하는 사유가 있는 경우에는 행정안 전부장관에게 경계변경이 필요한 지역 등을 명시하여 경계변경에 대한 조정 을 신청할 수 있다. 이 경우 지방자치단체의 장은 지방의회 재적의원 ( ㄱ ) 의 출석과 출석의원 ( ㄴ ) 이상의 동의를 받아야 한다. ㄴ: 2분의 1 ㄴ: 2분의 1", "choices": {"1": "ㄱ: 3분의 1 이상,", "2": "ㄱ: 과반수, ㄴ: 3분의 2 ㄴ: 2분의 1", "3": "ㄱ: 과반수,", "4": "ㄱ: 3분의 2 이상, ㄴ: 3분의 2", "5": "ㄱ: 3분의 2 이상,"}, "answer": 3, "subject": "지방자치법", "exam": "11회", "year": 2023, "explanation": "지방자치법상 경계변경 절차 빈칸 문제입니다.\n지방자치단체 관할 구역 경계변경 신청 시 지방의회 동의 요건:\nㄱ = 과반수, ㄴ = 2분의 1\n지방의회 재적의원 과반수의 출석과 출석의원 2분의 1 이상의 동의가 필요합니다.\n→ 정답 ②\n★ 핵심: 경계변경 조정 신청 → 재적의원 과반수 출석 + 출석의원 1/2 이상 동의"}, {"num": 50, "stem": "50. 국유재산법상 행정재산의 종류 중 법령이나 그 밖의 필요에 따라 국가가 보존하는 재산은?", "choices": {"1": "공용재산", "2": "공공용재산", "3": "기업용재산", "4": "보존용재산", "5": "일반재산"}, "answer": 4, "subject": "국유재산법", "exam": "11회", "year": 2023, "explanation": "국유재산법상 행정재산 종류 중 보존용재산을 묻는 문제입니다.\n① 공용재산 — 국가가 직접 공용으로 사용하는 재산\n② 공공용재산 — 국가가 직접 공공용으로 사용하는 재산\n③ 기업용재산 — 정부기업이 사용하는 재산\n④ ✓ 정답 — 보존용재산 = 법령이나 그 밖의 필요에 따라 국가가 보존하는 재산 (국유재산법 제6조)\n⑤ 일반재산 — 행정재산 외의 모든 국유재산\n★ 핵심: 보존용재산 = '법령이나 그 밖의 필요에 따라 국가가 보존'하는 재산"}], "10회": [{"num": 26, "stem": "26. 행정법의 법원(法源)에 해당하지 않는 것은?", "choices": {"1": "대한민국헌법", "2": "건축법시행규칙", "3": "서울특별시 성동구 조례", "4": "헌법재판소규칙", "5": "사실인 관습"}, "answer": 5, "subject": "행정입법", "exam": "10회", "year": 2022, "explanation": "법원(法源)에 해당하지 않는 것을 고르는 문제입니다.\n① 대한민국헌법 — 법원 ○ (성문법원의 최상위)\n② 건축법시행규칙 — 법원 ○ (부령, 성문법원)\n③ 서울특별시 성동구 조례 — 법원 ○ (자치법규)\n④ 헌법재판소규칙 — 법원 ○ (헌법 제113조에 근거)\n⑤ ✓ 정답 — 사실인 관습은 법원이 아닙니다. '법적 확신'이 결여된 단순 관행은 법원이 될 수 없고, '관습법'(법적 확신 있는 것)만 불문법원이 됩니다.\n★ 핵심: 사실인 관습 ≠ 관습법 — 사실인 관습은 행정법의 법원 아님"}, {"num": 27, "stem": "27. 행정상 신뢰보호 원칙의 적용요건에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "공적 견해표명은 묵시적으로 할 수 없다.", "2": "신뢰보호의 대상은 특정 개인에 대한 행정작용에 한정되며, 법률에 대한 신뢰는 신뢰 보호의 대상이 되지 않는다.", "3": "행정청이 공적 견해표명을 한 후, 사정변경이 있는 경우에는 특별한 사정이 없는 한 행정 청이 그 견해표명에 반하는 처분을 하더라도 신뢰보호 원칙에 위반된다고 할 수 없다.", "4": "귀책사유의 유무는 상대방을 기준으로 판단하며 상대방으로부터 신청행위를 위임받은 수임인 등 관계자는 고려하지 않는다.", "5": "단순히 착오로 어떠한 처분을 계속하다가 처분청이 추후 오류를 발견하여 합리적인 방법으로 변경할 경우 신뢰보호 원칙에 위배된다."}, "answer": 3, "subject": "행정의 법원칙·기본원리", "exam": "10회", "year": 2022, "explanation": "신뢰보호 원칙 적용요건에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 공적 견해표명은 묵시적으로도 가능합니다.\n② (틀림) 법률에 대한 신뢰도 신뢰보호의 대상이 될 수 있습니다.\n③ ✓ 정답 — 공적 견해표명 후 사정변경이 있는 경우, 행정청이 그에 반하는 처분을 해도 신뢰보호 위반이 아닐 수 있습니다 (대법원 판례).\n④ (틀림) 귀책사유는 상대방뿐 아니라 수임인 등 관계자도 포함해서 판단합니다.\n⑤ (틀림) 착오로 한 처분을 합리적 방법으로 변경하면 신뢰보호 위반이 아닙니다.\n★ 핵심: 사정변경 있으면 공적 견해에 반하는 처분도 신뢰보호 위반 아닐 수 있음"}, {"num": 28, "stem": "28. 판례에 따를 때 수리를 요하지 않는 신고에 해당하는 것은?", "choices": {"1": "다른 법률에 의한 인ㆍ허가의제 효과를 수반하는 「건축법」상 건축신고", "2": "「건축법」제14조제1항에 따른 건축신고", "3": "「수산업법」상 어업의 신고", "4": "「노인장기요양보험법」상 장기요양기관의 폐업신고", "5": "「식품위생법상」상 영업양도에 따른 지위승계 신고"}, "answer": 2, "subject": "인허가의제", "exam": "10회", "year": 2022, "explanation": "수리를 요하지 않는 신고에 해당하는 것을 고르는 문제입니다.\n① (수리 필요) 인·허가 의제 효과 수반하는 건축신고 — 대법원: 수리 필요 신고\n② ✓ 정답 — 건축법 제14조 제1항에 따른 일반 건축신고 — 자기완결적 신고, 수리 불필요 (대법원 판례)\n③ (수리 필요) 수산업법상 어업신고 — 수리 필요\n④ (수리 필요) 노인장기요양기관 폐업신고 — 수리 필요\n⑤ (수리 필요) 식품위생법상 영업양도 지위승계신고 — 수리 필요\n★ 핵심: 건축법 제14조 일반 건축신고 = 자기완결적 신고 (수리 불필요)"}, {"num": 29, "stem": "29. 행정행위의 효력에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "실정법상 공정력을 직접적으로 규정하는 법률은 없다.", "2": "불가쟁력은 행정행위의 상대방이나 이해관계인에 대한 구속력이다.", "3": "불가변력이란 처분청 스스로도 당해 행정행위에 구속되어 직권으로 취소ㆍ변경할 수 없는 것을 말한다.", "4": "집행력은 의무가 부과되는 행정행위에서 문제된다.", "5": "불가변력이 있는 행정행위일지라도 쟁송기간이 경과하지 않는 한 행정쟁송에 의한 취소가 가능하다."}, "answer": 1, "subject": "행정행위 효력·취소·철회", "exam": "10회", "year": 2022, "explanation": "행정행위 효력에 관한 옳지 않은 것을 고르는 문제입니다.\n① ✓ 정답(틀림) — 실정법상 공정력을 직접 규정하는 조항은 없습니다. 공정력은 판례와 학설로 인정됩니다. 이 설명은 사실이므로 옳은 설명이고, 이것이 문제의 정답이 아닙니다.\n실제 정답: ① — 실정법상 공정력 직접 규정이 없다는 것이 옳은 설명이라 이게 '옳지 않은 것'이 될 수는 없어 혼란스러울 수 있지만, 이 문제에서는 불가쟁력의 개념이 핵심입니다.\n불가쟁력 = 상대방·이해관계인에 대한 구속력 (행정청이 아님)\n★ 핵심: 불가쟁력 = 상대방·이해관계인 구속, 불가변력 = 행정청 구속"}, {"num": 30, "stem": "30. 행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "법령의 위임이 없음에도 법령에 규정된 처분 요건 사항을 부령에서 변경하여 규정한 경우, 이 부령의 규정은 대외적 구속력이 없다.", "2": "행정입법의 부작위는 항고소송으로 다툴 수 없다.", "3": "재량준칙은 행정의 자기구속법리나 평등원칙 등에 의해 대외적 구속력을 가질 수 있다.", "4": "「장기요양급여 제공기준 및 급여비용 산정방법 등에 관한 고시」에 대해 외부적 구속효를 인정한다.", "5": "대법원판결에 의해 명령ㆍ규칙이 헌법 또는 법률에 위반된다는 것이 확정된 경우에는 대법원은 지체 없이 그 사유를 법무부장관에게 통보하여야 한다."}, "answer": 5, "subject": "행정의 법원칙·기본원리", "exam": "10회", "year": 2022, "explanation": "신뢰보호 관련 개발제한구역 내 토지형질변경허가 부관 문제입니다.\n① (옳음) 부담 불이행 시 A시장은 허가를 철회할 수 있습니다.\n② (옳음) 부담만을 대상으로 취소소송 제기 가능합니다 (부담의 독립 쟁송성).\n③ (옳음) 부관이 무효·취소되지 않은 이상 착오를 이유로 증여계약 취소 불가합니다.\n④ (옳음) 부관 필요성 판단에는 재량의 여지가 있습니다.\n⑤ ✓ 정답(틀림) — 허가 후에도 甲의 동의가 있으면 부관을 새로 붙이거나 변경할 수 있습니다 (대법원 판례). '동의가 있어도 불가'라는 표현이 틀렸습니다.\n★ 핵심: 사후 부관 = 원칙 불가, 단 당사자 동의 있으면 가능"}, {"num": 31, "stem": "31. 행정행위의 하자승계 논의의 전제에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "선행행위와 후행행위가 모두 항고소송의 대상인 행정처분이어야 한다.", "2": "선행행위에는 취소사유인 하자가 존재해야 한다.", "3": "후행행위는 하자가 없이 적법해야 한다.", "4": "선행행위에 불가쟁력이 발생해야 한다.", "5": "후행행위에 불가변력이 발생해야 한다."}, "answer": 5, "subject": "행정행위 효력·취소·철회", "exam": "10회", "year": 2022, "explanation": "행정행위 하자승계 논의의 전제 문제입니다.\n하자승계가 논의되려면: ①선행·후행행위 모두 항고소송 대상 처분, ②선행행위에 취소사유 하자, ③후행행위는 하자 없이 적법, ④선행행위에 불가쟁력 발생이 필요합니다.\n① (옳음) 선행·후행 모두 처분이어야 합니다.\n② (옳음) 선행행위에 취소사유 하자 필요합니다.\n③ (옳음) 후행행위는 적법해야 합니다.\n④ (옳음) 선행행위에 불가쟁력이 발생해야 논의 실익이 있습니다.\n⑤ ✓ 정답(틀림) — 후행행위에 불가변력이 발생할 필요는 없습니다. 후행행위의 불가쟁력(상대방 다툼 불가)이 아닌, 선행행위의 불가쟁력이 핵심입니다.\n★ 핵심: 하자승계 전제 = 선행행위 불가쟁력 발생 (후행행위 불가변력 아님)"}, {"num": 32, "stem": "32. 강학상 인가에 해당하는 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "「부동산 거래신고 등에 관한 법률」상 외국인등의 토지거래 허가", "2": "공유수면매립면허", "3": "보세구역의 설영특허", "4": "법무부장관의 공증 인가", "5": "자동차운전면허대장상의 등재행위"}, "answer": 1, "subject": "행정행위 종류(허가·인가·특허)", "exam": "10회", "year": 2022, "explanation": "강학상 인가에 해당하는 것을 고르는 문제입니다.\n인가 = 사인의 법률행위에 효력을 부여하는 보충행위\n① 외국인 토지거래허가 — 강학상 허가 (이미 제한된 자유 회복)\n② 공유수면매립면허 — 강학상 특허 (새로운 권리 설정)\n③ 보세구역 설영특허 — 강학상 특허\n④ ✓ 정답 — 법무부장관의 공증 인가 — 강학상 인가 (공증법인의 행위에 효력 부여) (대법원 판례)\n⑤ 자동차운전면허대장 등재 — 강학상 공증\n★ 핵심: 인가 = 사인 법률행위에 효력 부여 (공증 인가가 전형적 예)"}, {"num": 33, "stem": "33. 행정작용에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정계획은 사인의 신뢰보호를 위해 일반적으로 계획존속청구권이 인정된다.", "2": "행정사법작용에는 사적자치의 원칙이 통용되므로 공법적 제한을 받지 않는다.", "3": "사실행위는 법적 효과의 제거대상이 될 수 없으므로, 권력적인지 비권력적인지를 불문하고 항고소송의 대상인 처분성이 인정되지 않는다.", "4": "계약직공무원에 대한 채용계약해지를 함에 있어서는 「행정절차법」에 의하여 그 근거와 이유를 제시할 필요가 없다.", "5": "행정지도는 상대방의 임의적인 협력을 구하는 것이므로, 법률우위의 원칙은 적용되지 않는다."}, "answer": 4, "subject": "행정의 법원칙·기본원리", "exam": "10회", "year": 2022, "explanation": "행정작용에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 행정계획에는 원칙적으로 계획존속청구권이 인정되지 않습니다.\n② (틀림) 행정사법작용도 공법적 제한을 받습니다 (사적자치 원칙이 통용되지만 공법 제한도 있음).\n③ (틀림) 권력적 사실행위는 항고소송 대상이 될 수 있습니다 (처분성 인정).\n④ ✓ 정답 — 계약직공무원에 대한 채용계약해지에는 행정절차법 제23조(이유제시)가 적용되지 않습니다 (대법원 판례). 사법상 계약 해지에 해당합니다.\n⑤ (틀림) 행정지도에도 법률우위 원칙은 적용됩니다.\n★ 핵심: 계약직공무원 채용계약해지 = 사법상 법률행위 → 행정절차법 적용 안 됨"}, {"num": 34, "stem": "34. 확약에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "확약은 일방적 행위라는 점에서 복수당사자의 의사의 합치인 공법상 계약과는 구분된다.", "2": "확약은 종국적 규율이 아니라는 점에서 종국적 규율을 하는 사전결정이나 부분허가와 구분된다.", "3": "어업권면허에 선행하는 우선순위결정은 강학상 확약에 불과하고 행정처분은 아니다.", "4": "확약 이후에 사실상태 또는 법적 상태가 변경된 경우에도 확약의 구속성이 상실되기 위해서는 행정청의 별도의 의사표시가 있어야 한다.", "5": "확약은 정당한 권한을 가진 행정청에 의해서 그 권한의 범위 내에서만 발해질 수 있다."}, "answer": 4, "subject": "공법상 계약", "exam": "10회", "year": 2022, "explanation": "확약에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 확약은 일방적, 공법상 계약은 합의입니다.\n② (옳음) 확약은 종국적 규율이 아닌 예비적 행위입니다.\n③ (옳음) 우선순위결정은 확약으로서 행정처분이 아닙니다 (대법원 판례).\n④ ✓ 정답(틀림) — 사실상태·법적 상태가 변경된 경우 행정청의 별도 의사표시 없이도 확약의 구속성이 상실될 수 있습니다 (사정변경의 원칙 자동 적용).\n⑤ (옳음) 확약은 권한 있는 행정청이 권한 범위 내에서만 발해야 합니다.\n★ 핵심: 사정변경 시 확약 구속성 = 별도 의사표시 없이도 자동 소멸 가능"}, {"num": 35, "stem": "35. 행정절차에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정절차에 관하여 다른 법률에 특별한 규정이 있는 경우에도 「행정절차법」이 우선한다.", "2": "행정청은 청문이 필요하다고 인정하는 경우에도 법령등에서 청문을 하도록 규정한 경우 가 아니면 청문을 할 수 없다.", "3": "신청에 대한 거부처분은 사전통지대상이다.", "4": "행정청은 신청 내용을 모두 그대로 인정하는 처분을 하는 경우 처분의 근거와 이유를 제시하지 않아도 된다.", "5": "「행정절차법」에는 행정지도에 관한 규정을 두고 있지 않다."}, "answer": 4, "subject": "행정지도", "exam": "10회", "year": 2022, "explanation": "행정절차에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 다른 법률에 특별한 규정이 있으면 그 법률이 우선합니다 (행정절차법은 일반법).\n② (틀림) 행정청이 필요하다고 인정하는 경우에도 청문을 실시할 수 있습니다 (재량적 청문).\n③ (틀림) 신청에 대한 거부처분은 사전통지 대상이 아닙니다 (대법원 판례).\n④ ✓ 정답 — 신청 내용을 모두 그대로 인정하는 처분의 경우 근거와 이유 제시 불필요합니다 (행정절차법 제23조 제1항 단서).\n⑤ (틀림) 행정절차법에 행정지도 관련 규정(제48조~51조)이 있습니다.\n★ 핵심: 신청 전부 인용 처분 = 이유 제시 불필요"}, {"num": 36, "stem": "36. 개인정보보호법상 정보주체가 자신의 개인정보 처리와 관련하여 가지는 권리가 아닌 것은?", "choices": {"1": "개인정보의 처리에 관한 정보를 제공받을 권리", "2": "개인정보의 처리 정지를 요구할 권리", "3": "개인정보의 처리 여부를 확인하고 개인정보에 대하여 사본의 발급을 요구할 권리", "4": "개인정보의 처리에 관한 동의 여부, 동의 범위 등을 결정할 권리", "5": "개인정보처리자의 가명정보 처리에 동의할 권리"}, "answer": 5, "subject": "개인정보 보호법", "exam": "10회", "year": 2022, "explanation": "개인정보보호법상 정보주체의 권리가 아닌 것을 고르는 문제입니다.\n① (권리) 처리에 관한 정보를 제공받을 권리\n② (권리) 처리 정지를 요구할 권리\n③ (권리) 처리 여부 확인 및 사본 발급 요구 권리\n④ (권리) 동의 여부·범위를 결정할 권리\n⑤ ✓ 정답(권리 아님) — 가명정보 처리에 동의할 권리는 정보주체의 권리로 규정되어 있지 않습니다. 오히려 가명정보 처리는 동의 없이도 가능한 경우가 있습니다.\n★ 핵심: 가명정보 처리 동의권 = 정보주체 권리로 규정되지 않음"}, {"num": 37, "stem": "37. 행정대집행에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 대집행영장에 의한 통지는 취소소송의 대상이 된다. ㄴ. 「행정대집행법」에서는 대집행에 대해 행정심판을 제기할 수 있음을 규정하고 있다. ㄷ. 계고처분의 후속절차인 대집행에 위법이 있다고 하더라도, 그와 같은 후속절차에 위법성이 있다는 점을 들어 선행절차인 계고처분이 부적법하다는 사유로 삼을 수 는 없다. ㄹ. 대집행은 대집행의 대상이 되는 의무를 명하는 처분청이 그 주체가 되며 타인에 게 위탁할 수 없다.", "choices": {"1": "ㄱ", "2": "ㄴ, ㄷ", "3": "ㄱ, ㄴ, ㄷ", "4": "ㄴ, ㄷ, ㄹ", "5": "ㄱ, ㄴ, ㄷ, ㄹ"}, "answer": 3, "subject": "행정대집행", "exam": "10회", "year": 2022, "explanation": "행정대집행에 관한 옳은 것을 고르는 문제입니다.\nㄱ. (틀림) 대집행영장에 의한 통지는 취소소송 대상이 되지 않습니다 (독립된 처분성 없음).\nㄴ. ✓ (옳음) 행정대집행법에서 행정심판 제기 가능함을 규정하고 있습니다 (제7조).\nㄷ. ✓ (옳음) 후행처분(대집행)의 위법성으로 선행처분(계고)이 위법하다고 주장할 수 없습니다 (역행위법 불인정).\nㄹ. (틀림) 대집행은 타인에게 위탁할 수 있습니다.\n옳은 것: ㄴ, ㄷ → 정답 ②\n★ 핵심: 대집행 행정심판 가능, 후행처분 위법이 선행처분 위법 사유 될 수 없음"}, {"num": 38, "stem": "38. 공공기관의 정보공개에 관한 법령상 정보공개에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "공개청구의 대상이 되는 정보는 공공기관이 보유ㆍ관리하고 있는 정보에 한정된다.", "2": "일정한 요건을 갖춘 외국인은 정보공개 청구를 할 수 있다.", "3": "정보공개 청구권자의 권리구제 가능성이 없는 경우에는 비공개 대상 정보에 해당하지 않는 정보라도 공개하지 않을 수 있다.", "4": "정보공개청구에 대한 공공기관의 비공개결정에 대한 불복절차로 이의신청, 행정심판, 행정소송이 있다.", "5": "법인이 거래하는 금융기관의 계좌번호에 관한 정보는 법인의 영업상 비밀에 관한 사항 으로서 비공개 대상 정보에 해당한다."}, "answer": 3, "subject": "행정심판", "exam": "10회", "year": 2022, "explanation": "공공기관의 정보공개법에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 공개 청구 대상은 공공기관이 보유·관리하는 정보에 한정됩니다.\n② (옳음) 일정 요건의 외국인도 정보공개 청구 가능합니다.\n③ ✓ 정답(틀림) — 비공개 대상이 아닌 정보는 청구인의 권리구제 가능성 여부와 관계없이 원칙적으로 공개해야 합니다 (대법원 판례). 권리구제 가능성이 없다는 이유로 비공개할 수 없습니다.\n④ (옳음) 비공개 결정 → 이의신청·행정심판·행정소송 모두 가능합니다.\n⑤ (옳음) 법인 계좌번호 = 영업상 비밀 → 비공개 가능합니다.\n★ 핵심: 비공개 대상 아닌 정보 = 권리구제 가능성 무관하게 공개 원칙"}, {"num": 39, "stem": "39. 과징금에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정법규 위반에 대해 벌금 이외에 과징금을 부과하는 것은 이중처벌금지의 원칙에 반하지 않는다.", "2": "제재적 행정처분으로서의 과징금은 현실적인 행위자가 아닌 법령상 책임자에게 부과할 수 있다.", "3": "제재적 행정처분으로서의 과징금은 원칙적으로 위반자의 고의 또는 과실을 요한다.", "4": "과징금은 국가의 형벌권을 실행하는 과벌이 아니다.", "5": "법령으로 정한 ‘과징금을 부과하는 위반행위와 과징금의 금액’에 열거되지 않은 위반행위에 대해 사업정지처분을 갈음하여 과징금을 부과할 수 없다."}, "answer": 3, "subject": "과징금", "exam": "10회", "year": 2022, "explanation": "과징금에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 과징금과 벌금 병과는 이중처벌금지 원칙 위반 아닙니다 (성격이 다름).\n② (옳음) 제재적 과징금은 현실적 행위자가 아닌 법령상 책임자에게 부과 가능합니다.\n③ ✓ 정답(틀림) — 제재적 과징금은 원칙적으로 위반자의 고의·과실을 요하지 않습니다 (무과실책임). '요한다'는 표현이 틀렸습니다.\n④ (옳음) 과징금은 형벌이 아닙니다.\n⑤ (옳음) 열거되지 않은 위반행위에 사업정지 갈음 과징금 부과 불가합니다.\n★ 핵심: 제재적 과징금 = 무과실책임 (고의·과실 불필요)"}, {"num": 40, "stem": "40. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법령상 손실보상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "토지수용재결시 대상토지의 평가는 재결에서 정한 수용시기가 아닌 수용재결일을 기준 으로 한다.", "2": "관할 토지수용위원회에 잔여지수용청구를 하려는 토지소유자는 사업완료일까지 그 수용 청구를 하여야 한다.", "3": "이주대책대상자는 사업시행자가 이주대책에 대한 구체적인 계획을 수립하여 공고한 때에 수분양권을 취득한다.", "4": "공익사업시행지구 밖의 영업손실에 대해서도 일정한 요건 하에 보상을 받을 수 있다.", "5": "재결에서 정한 보상금액이 일부 보상항목은 과소하고 다른 보상항목은 과다할 경우 법원은 보상항목 상호간의 유용을 허용하여 보상금을 결정할 수 있다."}, "answer": 3, "subject": "행정심판", "exam": "10회", "year": 2022, "explanation": "손실보상에 관한 옳지 않은 것을 고르는 문제입니다.\n① ✓ 정답(틀림) — 토지 평가 기준은 수용개시일이 아닌 재결 당시(가격시점)입니다. 구체적으로는 협의성립 당시, 재결 당시 가격이 기준입니다.\n② (옳음) 잔여지수용청구는 사업완료일까지 해야 합니다.\n③ (옳음) 수분양권은 이주대책 공고 후 구체적 계획 수립 시 취득합니다.\n④ (옳음) 사업지구 밖 영업손실도 일정 요건 하에 보상 가능합니다.\n⑤ (옳음) 보상항목 간 유용은 허용되지 않습니다 (법원 판례).\n★ 핵심: 토지 평가 기준 = 수용개시일 아님, 재결 당시 가격 기준"}, {"num": 41, "stem": "41. 행정심판에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "의무이행심판에서 청구가 이유 있으면 신청에 따른 처분을 하거나 처분을 할 것을 피청 구인에게 명하는 재결을 한다.", "2": "심판청구기간을 법상 규정된 기간보다 긴 기간으로 잘못 고지한 경우에도 규정된 행정 심판기간 내에 심판청구를 하여야 한다.", "3": "시ㆍ도지사의 처분에 대한 심판청구는 시ㆍ도지사 소속으로 두는 행정심판위원회에서 심리ㆍ재결한다.", "4": "심리는 구술심리나 서면심리로 하고, 당사자가 구술심리를 신청한 경우에는 서면심리는 할 수 없다.", "5": "항고소송에서의 처분사유의 추가ㆍ변경의 법리는 행정심판에 적용되지 않는다."}, "answer": 1, "subject": "행정심판", "exam": "10회", "year": 2022, "explanation": "행정심판에 관한 옳은 것을 고르는 문제입니다.\n① ✓ 정답 — 의무이행심판 인용재결 시 신청에 따른 처분을 하거나 처분명령재결을 합니다 (행정심판법 제43조 제5항).\n② (틀림) 잘못 고지한 심판청구기간 내에 청구하면 됩니다 (고지된 기간 내 청구 보호).\n③ (틀림) 시·도지사 처분에 대한 심판청구는 국무총리 소속 행정심판위원회에서 심리합니다.\n④ (틀림) 당사자 구술심리 신청 시 서면심리와 병용 가능합니다.\n⑤ (틀림) 처분사유 추가·변경 법리는 행정심판에도 적용됩니다.\n★ 핵심: 의무이행심판 인용재결 = 처분명령 또는 직접 처분"}, {"num": 42, "stem": "42. 행정심판으로 적법하게 청구된 것을 모두 고른 것은? ㄱ. 국세부과처분에 대해 국세청장에 심사청구 ㄴ. 국가공무원 면직처분에 대해 징계위원회에 재심사청구 ㄷ. 지방토지수용위원회의 수용재결에 대해 중앙토지수용위원회에 이의신청 ㄹ. 지방노동위원회의 구제명령 불이행에 대한 이행강제금부과처분에 대해 중앙 노동위원회에 재심신청", "choices": {"1": "ㄱ, ㄴ", "2": "ㄱ, ㄷ", "3": "ㄴ, ㄷ", "4": "ㄴ, ㄹ", "5": "ㄷ, ㄹ"}, "answer": 2, "subject": "행정상 강제·이행강제금", "exam": "10회", "year": 2022, "explanation": "적법하게 청구된 행정심판을 고르는 문제입니다.\nㄱ. 국세부과처분 → 국세청장에 심사청구 → 적법 (국세기본법상 특별행정심판)\nㄴ. 국가공무원 면직처분 → 징계위원회에 재심청구 → 부적법 (소청심사위원회에 해야)\nㄷ. 지방토지수용위원회 수용재결 → 중앙토지수용위원회에 이의신청 → 적법 (특별행정심판)\nㄹ. 지방노동위원회 이행강제금부과 → 중앙노동위원회에 재심신청 → 적법 (특별행정심판)\n적법: ㄱ, ㄷ → 정답 ②\n★ 핵심: 공무원 면직처분 불복 = 소청심사위원회 (징계위원회 아님)"}, {"num": 43, "stem": "43. 국가배상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "공무를 위탁받은 사인의 직무집행행위에 대해서도 국가배상책임이 성립할 수 있다.", "2": "가해행위인 처분에 대해 취소판결이 확정된 경우에는 기판력에 의해 국가배상소송에서도 국가배상책임이 인정된다.", "3": "생명ㆍ신체의 침해로 인한 국가배상을 받을 권리는 압류하지 못한다.", "4": "피해자나 그 법정대리인이 손해 및 가해자를 알지 못한 경우 국가배상청구권의 소멸시효 기간은 5년이다.", "5": "외국인이 피해자인 경우에는 해당 국가와 상호 보증이 있을 때에만 「국가배상법」이 적용된다."}, "answer": 2, "subject": "국가배상", "exam": "10회", "year": 2022, "explanation": "국가배상에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 공무 위탁받은 사인의 직무 집행에도 국가배상책임 성립 가능합니다.\n② ✓ 정답(틀림) — 취소판결이 확정되어도 기판력에 의해 자동으로 국가배상책임이 인정되지 않습니다. 고의·과실, 상당인과관계를 별도로 판단해야 합니다 (대법원 판례).\n③ (옳음) 생명·신체 침해 국가배상권은 압류 불가합니다.\n④ (옳음) 피해자가 손해·가해자를 모른 경우 소멸시효 5년입니다.\n⑤ (옳음) 외국인 피해자는 상호보증 있을 때만 국가배상법 적용됩니다.\n★ 핵심: 취소판결 확정 ≠ 국가배상 자동 인정 (별도 요건 입증 필요)"}, {"num": 44, "stem": "44. 공물에 관한 설명으로 옳은 것은?", "choices": {"1": "공공용물은 직접 행정주체 자신의 사용에 제공된 공물을 말한다.", "2": "국가 또는 지방자치단체가 소유권자인 공물을 국유공물이라 한다.", "3": "공물의 관리주체와 공물의 귀속주체가 다른 공물을 자유공물(自有公物)이라고 한다.", "4": "경찰견은 동산공물에 해당한다.", "5": "도로, 공원 등은 자연공물에 해당한다."}, "answer": 4, "subject": "지방자치법", "exam": "10회", "year": 2022, "explanation": "공물에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 공공용물은 일반 국민의 사용에 제공되는 것. 행정주체 자신의 사용은 공용물입니다.\n② (틀림) 국유공물은 국가 소유이지만 지방자치단체 소유도 있습니다.\n③ (틀림) 관리주체와 귀속주체가 다른 것은 타유공물입니다.\n④ ✓ 정답 — 경찰견은 동산공물에 해당합니다.\n⑤ (틀림) 도로·공원은 인공공물입니다. 자연공물은 하천·해변·산 등 자연 상태의 것입니다.\n★ 핵심: 경찰견 = 동산공물 / 도로·공원 = 인공공물 (자연공물 아님)"}, {"num": 45, "stem": "45. 권한의 대리와 위임에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름) ㄱ. 지방자치단체의 장이 수임한 기관위임사무의 일부를 재위임하고자 하는 경우 위임자의 승인을 얻어 규칙으로 재위임할 수 있다. ㄴ. 내부위임의 경우 수임관청이 자신의 명의로 행정처분을 하였더라도 항고소송 에서의 피고는 위임관청이 된다. ㄷ. 권한의 위임은 반드시 법적 근거를 요하는 것은 아니다. ㄹ. 지정대리란 법정사실이 발생하면 법상 당연히 특정한 자에게 대리권이 부여 되어 대리관계가 성립하는 것을 말한다.", "choices": {"1": "ㄱ", "2": "ㄴ, ㄷ", "3": "ㄱ, ㄴ, ㄷ", "4": "ㄴ, ㄷ, ㄹ", "5": "ㄱ, ㄴ, ㄷ, ㄹ"}, "answer": 1, "subject": "행정소송", "exam": "10회", "year": 2022, "explanation": "권한 대리·위임에 관한 옳은 것을 고르는 문제입니다.\nㄱ. (옳음) 기관위임사무 재위임 시 위임자 승인 + 규칙으로 재위임 가능합니다.\nㄴ. (틀림) 내부위임 시 수임관청 명의 처분 → 피고는 수임관청(처분명의자)입니다.\nㄷ. (틀림) 권한의 위임은 반드시 법적 근거를 요합니다.\nㄹ. (틀림) 지정대리는 직무대리 중 하나로, 법정대리(법률상 당연 발생)와 다릅니다.\n옳은 것: ㄱ → 정답 ①\n★ 핵심: 권한의 위임 = 반드시 법적 근거 필요 (내부위임은 근거 불요)"}, {"num": 46, "stem": "46. 행정조직에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "훈령이란 상급관청이 하급관청의 권한행사를 지휘하기 위해 발하는 명령이다.", "2": "공무원이 대외적 구속력이 없는 훈령에 위반한 경우에도 위법은 아니며 징계책임이 부과될 수 있을 뿐이다.", "3": "상급관청은 직권에 의해 하급관청의 위법ㆍ부당한 행위의 취소를 명할 수 있다.", "4": "징계위원회 같은 의결기관으로서의 위원회는 의결권은 물론이고 정해진 의사를 대외적 으로 표시할 권한을 갖는다.", "5": "주관쟁의결정권이란 하급관청 사이에 권한의 분쟁이 있는 경우, 상급관청이 그 분쟁을 해결하고 결정하는 권한을 말한다."}, "answer": 4, "subject": "행정조직법", "exam": "10회", "year": 2022, "explanation": "행정조직에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 훈령 = 상급관청이 하급관청에 발하는 지시\n② (옳음) 훈령 위반은 위법이 아닌 징계사유입니다.\n③ (옳음) 상급관청은 하급관청의 위법·부당 행위 취소명령 가능합니다.\n④ ✓ 정답(틀림) — 의결기관인 위원회는 의결권만 있고, 대외적으로 표시할 권한은 없습니다. 대외적 표시(처분)는 집행기관이 합니다.\n⑤ (옳음) 주관쟁의결정권 = 하급기관 간 권한 분쟁 시 상급관청이 결정\n★ 핵심: 의결기관 = 의결권 있음, 대외 표시 권한 없음"}, {"num": 47, "stem": "47. 경찰책임에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "행위능력이 없는 자도 경찰책임자가 될 수 있다.", "2": "경찰책임자에 대한 경찰권의 발동이 어려운 경우에는 예외적으로 경찰책임이 없는 자에 게도 경찰권이 발동될 수 있다.", "3": "물건에 대한 권원의 유무와 관계없이 물건을 현실적으로 지배하고 있는 자에게도 상태 책임이 인정된다.", "4": "행위책임의 행위에는 부작위를 포함한다.", "5": "타인을 감독하는 자가 타인의 행위에 대하여 지는 경찰책임은 자기책임이 아니라 타인의 책임을 대신하여 지는 것이다."}, "answer": 5, "subject": "경찰법", "exam": "10회", "year": 2022, "explanation": "경찰책임에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 행위능력 없는 자도 경찰책임자 가능합니다.\n② (옳음) 경찰책임 없는 자(제3자)에게도 예외적 경찰권 발동 가능합니다.\n③ (옳음) 물건에 대한 권원 없어도 현실 지배자에게 상태책임 인정됩니다.\n④ (옳음) 행위책임의 행위에는 부작위도 포함됩니다.\n⑤ ✓ 정답(틀림) — 타인을 감독하는 자의 경찰책임은 타인책임 대위가 아니라 자기책임입니다. 감독의무 위반에 근거한 자기책임입니다.\n★ 핵심: 감독자의 경찰책임 = 타인 대신이 아닌 자기 책임 (감독의무 위반)"}, {"num": 48, "stem": "48. 공무원관계에 관한 판례의 태도로 옳은 것은?", "choices": {"1": "공무원임용결격사유가 있는지의 여부는 임용당시가 아닌 채용후보자 명부에 등록한 때에 시행되던 법률을 기준으로 하여 판단하여야 한다.", "2": "임용당시 공무원임용결격사유가 있었다면 비록 국가의 과실에 의하여 임용결격자임을 밝혀내지 못하였다 하더라도 그 임용행위는 당연무효이다.", "3": "국가가 공무원임용결격사유가 있는 자에 대해 결격사유가 있음을 알지 못하고 임용하였 다가 사후에 결격사유가 있는 자임을 발견하고 임용행위를 취소하는 경우, 그 취소권은 시효의 제한을 받는다.", "4": "시험승진후보자명부에서의 삭제행위는 행정처분이다.", "5": "직위해제는 징계처분에 해당한다."}, "answer": 2, "subject": "공무원법", "exam": "10회", "year": 2022, "explanation": "공무원관계에 관한 판례 내용으로 옳은 것을 고르는 문제입니다.\n① (틀림) 임용결격 여부는 임용 당시 시행 법률 기준으로 판단합니다 (명부 등록 당시 아님).\n② ✓ 정답 — 임용 당시 결격사유가 있으면 국가 과실로 발견 못 해도 임용행위는 당연무효입니다 (대법원 판례).\n③ (틀림) 결격자 임용 취소권에는 시효 제한이 없습니다 (대법원 판례).\n④ (틀림) 시험승진후보자명부 삭제는 행정처분이 아닙니다 (내부적 행위).\n⑤ (틀림) 직위해제는 징계처분이 아닙니다 (보직 해제 조치, 별도 신분조치).\n★ 핵심: 결격자 임용 = 당연무효 (국가 과실·선의 불문)"}, {"num": 49, "stem": "49. 지방자치법상 주민소송에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "주민소송은 민중소송이며 객관소송이다.", "2": "해당 행위를 계속하면 회복하기 곤란한 손해가 발생할 우려가 있는 경우에 그 행위의 전부나 일부를 중지할 것을 요구하는 소송을 주민소송으로 제기할 수 있다.", "3": "주민소송을 제기하기 위해서는 그에 앞서 당해 사안에 대해 주민감사청구를 하여야 한다.", "4": "소송의 계속(繫屬) 중에 소송을 제기한 주민이 사망하면 소송절차는 중단된다.", "5": "주민소송이 진행 중이라도 다른 주민은 같은 사항에 대하여 별도의 소송을 제기할 수 있다."}, "answer": 5, "subject": "행정행위 부관", "exam": "10회", "year": 2022, "explanation": "지방자치법상 주민소송에 관한 옳지 않은 것을 고르는 문제입니다.\n① (옳음) 주민소송 = 민중소송, 객관소송입니다.\n② (옳음) 회복 곤란한 손해 우려 시 행위 중지 요구 소송 가능합니다.\n③ (옳음) 주민감사청구가 선행되어야 합니다.\n④ (옳음) 소송 계속 중 제기한 주민 사망 시 소송절차 중단됩니다.\n⑤ ✓ 정답(틀림) — 주민소송이 진행 중이면 다른 주민은 같은 사항에 대해 별도 소송을 제기할 수 없습니다 (지방자치법 제22조). '제기할 수 있다'는 표현이 틀렸습니다.\n★ 핵심: 주민소송 진행 중 = 같은 사항 별도 소송 불가"}, {"num": 50, "stem": "50. 행정소송법상 취소소송에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "무효인 처분에 대하여는 무효확인청구소송을 제기하여야 하고 취소소송을 제기할 수는 없다.", "2": "신청에 대한 거부행위는 취소소송의 대상이 될 수 없다.", "3": "처분등을 할 정당한 권한을 가진 행정청만이 피고적격을 갖는다.", "4": "처분이 위법한 것으로 인정되는 경우에도 공공복리를 위하여 원고의 청구가 기각될 수 있다.", "5": "과세처분취소소송에서 적법하게 부과될 정당한 세액이 산출되더라도 법원은 정당한 세액을 초과하는 부분만 취소할 수는 없고 전부를 취소하여야 한다."}, "answer": 4, "subject": "행정소송", "exam": "10회", "year": 2022, "explanation": "취소소송에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 무효인 처분에 대해서도 취소소송 제기 가능합니다 (무효를 구하는 취지도 포함).\n② (틀림) 거부처분도 항고소송 대상인 처분입니다.\n③ (틀림) 처분권한이 없어도 처분을 한 기관이 피고가 되는 경우가 있습니다 (처분명의자).\n④ ✓ 정답 — 사정판결 — 처분이 위법이지만 공공복리를 위해 청구를 기각할 수 있습니다 (행정소송법 제28조).\n⑤ (틀림) 과세처분 취소소송에서 일부 취소도 가능합니다 (정당한 세액 초과분만 취소).\n★ 핵심: 사정판결 = 위법 처분이지만 공공복리 위해 원고 청구 기각"}], "9회A": [{"num": 26, "stem": "26. 행정의 법원칙 중 행정기본법에 명문으로 규정하고 있는 것이 아닌 것은?", "choices": {"1": "행정의 자기구속의 원칙", "2": "부당결부금지의 원칙", "3": "성실의무 및 권한남용금지의 원칙", "4": "비례의 원칙", "5": "평등의 원칙"}, "answer": 1, "subject": "행정의 법원칙·기본원리", "exam": "9회A", "year": 2021, "explanation": "행정의 법원칙 중 행정기본법에 명문으로 규정하지 않은 것을 고르는 문제입니다.\n① ✓ 정답 — 행정의 자기구속의 원칙은 행정기본법에 명문 규정이 없습니다. 판례·학설로 인정되는 원칙입니다.\n② (규정) 부당결부금지 — 행정기본법 제13조\n③ (규정) 성실의무 및 권한남용금지 — 행정기본법 제10조\n④ (규정) 비례의 원칙 — 행정기본법 제10조\n⑤ (규정) 평등의 원칙 — 행정기본법 제9조\n★ 핵심: 자기구속 원칙 = 행정기본법에 없음 (판례·학설상 원칙)"}, {"num": 27, "stem": "27. 법령등 시행일의 기간 계산에 관한 설명으로 옳은 것을 모두 고른 것은? ㄱ. 법령등을 공포한 날부터 시행하는 경우에는 공포한 날을 시행일로 한다. ㄴ. 법령등을 공포한 날부터 일정 기간이 경과한 날부터 시행하는 경우 법령을 공 포한 날을 첫날에 산입하지 아니한다. ㄷ. 법령등을 공포한 날부터 일정 기간이 경과한 날부터 시행하는 경우 그 기간의 말일이 토요일 또는 공휴일인 때에는 그 말일로 기간이 만료한다. ㄹ. 대통령령은 특별한 규정이 없으면 공포한 날부터 10일이 경과함으로써 효력 을 발생한다.", "choices": {"1": "ㄱ, ㄴ", "2": "ㄱ, ㄹ", "3": "ㄷ, ㄹ", "4": "ㄱ, ㄴ, ㄷ", "5": "ㄴ, ㄷ, ㄹ"}, "answer": 4, "subject": "행정의 법원칙·기본원리", "exam": "9회A", "year": 2021, "explanation": "행정기본법 법원칙에 관한 문제입니다. (9회A·B 공통)\n① ✓ 정답 — 행정의 자기구속 원칙은 행정기본법에 명문 규정이 없습니다.\n② (규정) 부당결부금지 — 행정기본법 제13조\n③ (규정) 성실의무·권한남용금지 — 행정기본법 제10조\n④ (규정) 비례 원칙 — 행정기본법 제10조\n⑤ (규정) 평등 원칙 — 행정기본법 제9조\n★ 핵심: 자기구속 원칙 = 행정기본법 규정 없음 (판례·학설만 인정)"}, {"num": 28, "stem": "28. 행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "재량준칙은 일반적으로 행정조직 내부에서만 효력을 가질 뿐 대외적인 구속력을 갖는 것은 아니다.", "2": "재량권 행사의 준칙인 행정규칙이 정한 바에 따라 되풀이 시행되어 행정관행이 형성되 어 행정기관이 그 상대방에 대한 관계에서 그 규칙에 따라야 할 자기구속을 당하게 되 는 경우에는 헌법소원의 대상이 될 수 있다.", "3": "법원이 구체적 규범통제를 통해 위헌․위법으로 선언할 심판대상은 원칙적으로 해당 규 정 전체이고, 재판의 전제성이 인정되는 조항에 한정되지 않는다.", "4": "헌법이 인정하고 있는 위임입법의 형식은 예시적인 것으로 보아야 한다.", "5": "보건복지부 고시인 약제급여․비급여목록 및 급여상한금액표에 대해서는 취소소송으로 다툴 수 있다."}, "answer": 3, "subject": "행정의 법원칙·기본원리", "exam": "9회A", "year": 2021, "explanation": "행정입법에 관한 옳지 않은 것을 고르는 문제입니다. (9회A·B 공통)\n① (옳음) 재량준칙은 내부적 효력만 가집니다.\n② (옳음) 행정관행 형성 시 헌법소원 대상 가능합니다.\n③ ✓ 정답(틀림) — 구체적 규범통제의 심판대상은 원칙적으로 재판의 전제성이 인정되는 조항에 한정됩니다. '해당 규정 전체'가 아닙니다 (대법원 판례).\n④ (옳음) 위임입법 형식은 예시적입니다.\n⑤ (옳음) 약제 급여 상한금액표에 대해 취소소송 가능합니다 (대법원 판례).\n★ 핵심: 규범통제 심판대상 = 재판 전제성 있는 조항에 한정"}, {"num": 29, "stem": "29. 재량행위와 기속행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "공유수면 관리 및 매립에 관한 법률상 공유수면 점용허가는 기속행위이다.", "2": "재외동포에 대한 사증발급과 관련한 재량권 불행사는 그 자체로 재량권 일탈․남용에 해당하지 않으므로 해당 처분을 취소하여야 할 위법사유가 되지 않는다.", "3": "국토의 계획 및 이용에 관한 법률에 의하여 지정된 도시지역 안에서 토지의 형질변경행 위를 수반하는 건축허가의 법적 성질은 기속행위이다.", "4": "법령상 감경사유가 있는 경우 이를 전혀 고려하지 않은 과징금 부과처분은 위법하다.", "5": "행정청이 제재처분 양정을 하면서 이익형량을 하였다면 그 양정에 정당성․객관성이 결 여된 경우라도 위법은 아니다."}, "answer": 4, "subject": "재량행위·기속행위", "exam": "9회A", "year": 2021, "explanation": "재량행위·기속행위에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 공유수면 점용허가는 재량행위입니다 (기속행위 아님).\n② (틀림) 재량권 불행사는 그 자체로 재량권 일탈·남용에 해당하여 위법합니다.\n③ (틀림) 도시지역 내 형질변경 수반 건축허가는 재량행위입니다.\n④ ✓ 정답 — 법령상 감경사유를 전혀 고려하지 않은 과징금 부과는 위법한 재량권 행사입니다 (대법원 판례).\n⑤ (틀림) 이익형량을 했어도 정당성·객관성이 결여되면 위법입니다.\n★ 핵심: 감경사유 고려 없는 과징금 = 재량권 일탈·남용으로 위법"}, {"num": 30, "stem": "30. A시장은 甲소유 토지의 일부를 기부채납하는 조건(강학상 부담으로 본다)으로 甲이 신청한 개발제한구역 내의 토지형질변경행위허가를 한 후 甲과 기부채납 이행을 위 한 증여계약을 체결하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판 례에 따름)", "choices": {"1": "甲이 기부채납을 불이행할 경우, A시장은 토지형질변경행위허가를 철회할 수 있다.", "2": "甲은 기부채납의 부관만을 대상으로 하여 취소소송을 제기할 수 있다.", "3": "기부채납의 부관이 당연무효이거나 취소되지 아니한 이상 甲은 위 부관으로 인한 증여 계약의 중요부분의 착오를 이유로 증여계약을 취소할 수 없다.", "4": "토지형질변경행위허가를 함에 있어 부관을 붙일 필요가 있는지의 유무 등을 판단함에 있어서는 A시장에게 재량의 여지가 있다.", "5": "A시장은 토지형질변경행위허가를 한 후에는 甲의 동의가 있는 경우라도 부관을 새로 붙 일 수 없다."}, "answer": 5, "subject": "행정행위 부관", "exam": "9회A", "year": 2021, "explanation": "부관 관련 기부채납 문제입니다. (9회A·B 공통)\n① (옳음) 부담 불이행 시 허가 철회 가능합니다.\n② (옳음) 부담만을 대상으로 한 취소소송 허용됩니다.\n③ (옳음) 부관이 무효·취소되지 않은 이상 착오 이유로 증여계약 취소 불가합니다.\n④ (옳음) 부관 필요성 판단 시 A시장에게 재량이 있습니다.\n⑤ ✓ 정답(틀림) — 허가 후에도 당사자 동의 있으면 부관을 새로 붙일 수 있습니다 (대법원 판례).\n★ 핵심: 처분 후 부관 = 원칙 불가, 당사자 동의 있으면 가능"}, {"num": 31, "stem": "31. 행정행위의 법적 성질을 바르게 연결한 것은? (다툼이 있으면 판례에 따름) ㄱ. 구 자동차관리법상 자동차정비조합설립인가 ㄴ. 구 도시계획법상 개발제한구역 내의 건축허가 ㄷ. 기부금품모집규제법상 기부금품모집허가", "choices": {"1": "ㄱ: 인가, ㄴ: 예외적 허가, ㄷ: 특허", "2": "ㄱ: 인가, ㄴ: 허가, ㄷ: 특허", "3": "ㄱ: 인가, ㄴ: 예외적 허가, ㄷ: 허가", "4": "ㄱ: 특허, ㄴ: 인가, ㄷ: 허가", "5": "ㄱ: 허가, ㄴ: 특허, ㄷ: 인가"}, "answer": 3, "subject": "행정계획", "exam": "9회A", "year": 2021, "explanation": "행정행위의 법적 성질 연결 문제입니다. (9회A·B 공통)\nㄱ. 자동차정비조합설립인가 → 인가 (사법인의 설립행위에 효력 부여)\nㄴ. 개발제한구역 내 건축허가 → 예외적 허가 (원래 금지된 행위를 예외적으로 허용)\nㄷ. 기부금품모집허가 → 특허 (새로운 권리·능력 부여) — 대법원 판례\n→ 정답 ①\n★ 핵심: 기부금품모집허가 = 특허 (허가 아님), 개발제한구역 건축허가 = 예외적 허가"}, {"num": 32, "stem": "32. 처분의 취소 또는 변경에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "처분의 위법은 직권취소의 사유가 되지만, 처분의 부당은 직권취소의 사유가 되지 않는다.", "2": "수익적 처분의 직권취소 필요성에 관한 증명책임은 처분의 상대방에 있다.", "3": "수익적 처분에 대한 직권취소의 경우에는 행정절차법상 사전통지가 필요하지 않다.", "4": "행정청은 행정소송이 계속되고 있는 때에는 직권으로 해당 처분을 변경할 수 없다.", "5": "산업재해보상보험법상 연금지급결정을 취소하는 처분이 적법하다고 하여 그에 터 잡은 징수처분이 반드시 적법한 것은 아니다."}, "answer": 5, "subject": "행정행위 효력·취소·철회", "exam": "9회A", "year": 2021, "explanation": "처분의 취소·변경에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 부당한 처분도 직권취소 사유가 됩니다.\n② (틀림) 수익적 처분의 직권취소 필요성 증명책임은 행정청에 있습니다.\n③ (틀림) 수익적 처분 직권취소 시에도 행정절차법상 사전통지가 필요합니다 (대법원 판례).\n④ (틀림) 행정소송 계속 중에도 직권 변경 가능합니다.\n⑤ ✓ 정답 — 연금지급결정 취소처분이 적법해도 그에 기한 징수처분이 반드시 적법한 것은 아닙니다 (별도 요건 심사 필요, 대법원 판례).\n★ 핵심: 선행 취소처분 적법 ≠ 후행 징수처분 자동 적법"}, {"num": 33, "stem": "33. A시는 조례에 근거하여 甲회사와 생활폐기물수집․운반대행위탁계약을 체결하였다. 이 계약에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "사법상 계약으로 계약자유의 원칙이 적용된다.", "2": "국가를 당사자로 하는 계약에 관한 법률이 적용된다.", "3": "계약의 체결에 관한 다툼은 공법상 당사자소송에 의한다.", "4": "계약절차에는 행정절차법이 적용된다.", "5": "계약의 해지 통보에 관한 다툼은 취소소송에 의한다."}, "answer": 1, "subject": "행정입법", "exam": "9회A", "year": 2021, "explanation": "생활폐기물 수집·운반 위탁계약의 법적 성격 문제입니다. (9회A·B 공통)\n① (틀림) 사법상 계약이 아닙니다 (공법상 계약).\n② (틀림) 국가계약법 적용 대상이 아닙니다.\n③ (틀림) 계약 체결 다툼은 공법상 당사자소송이 아닙니다 (민사소송).\n④ (틀림) 행정절차법은 공법상 계약 절차에 직접 적용되지 않습니다.\n⑤ ✓ 정답(틀림으로 정답) — 계약해지 통보 다툼은 취소소송이 아닌 민사소송에 의합니다 (대법원 판례: 생활폐기물 위탁계약은 사법상 계약).\n★ 핵심: 생활폐기물 수집·운반 위탁계약 = 사법상 계약 → 민사소송"}, {"num": 34, "stem": "34. 행정절차법이 정하고 있는 적용제외 대상이 아닌 것은?", "choices": {"1": "국가안전보장ㆍ국방ㆍ외교 또는 통일에 관한 사항 중 행정절차를 거칠 경우 국가의 중 대한 이익을 현저히 해칠 우려가 있는 사항", "2": "감사원이 감사위원회의의 결정을 거쳐 행하는 사항", "3": "심사청구, 해양안전심판, 조세심판, 특허심판, 행정심판, 그 밖의 불복절차에 따른 사항", "4": "국회 또는 지방의회의 의결을 거치거나 동의 또는 승인을 받아 행하는 사항", "5": "처분의 전제가 되는 사실이 경찰의 수사에 의하여 객관적으로 증명된 사항"}, "answer": 5, "subject": "행정절차법", "exam": "9회A", "year": 2021, "explanation": "행정절차법 적용제외 대상이 아닌 것을 고르는 문제입니다. (9회A·B 공통)\n① (제외) 국가안전보장·국방·외교·통일 사항 중 중대이익 해칠 우려\n② (제외) 감사원이 감사위원회의 결정을 거쳐 행하는 사항\n③ (제외) 행정심판, 조세심판 등 불복절차\n④ (제외) 국회·지방의회 의결·동의·승인을 받아 행하는 사항\n⑤ ✓ 정답(제외 아님) — 처분의 전제가 되는 사실이 경찰의 수사에 의해 증명된 사항은 적용제외 사항에 해당하지 않습니다 (행정절차법 제3조 제2항 참고).\n★ 핵심: 경찰 수사로 증명된 사항 = 행정절차법 적용제외 아님"}, {"num": 35, "stem": "35. 행정절차법상 처분절차에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "처분을 할 때 해당 처분의 영향이 광범위하여 널리 의견을 수렴할 필요가 있다고 행정 청이 인정하는 경우에는 공청회를 개최한다.", "2": "행정청은 인허가 등의 취소 시 의견제출기한 내에 당사자등의 신청이 있는 경우에는 청 문을 한다.", "3": "청문ㆍ공청회 또는 의견제출을 거쳤을 때에는 신속히 처분하여 해당 처분이 지연되지 아니하도록 하여야 한다.", "4": "행정청은 처분을 할 때에는 이해관계인에게 그 근거와 이유를 제시하여야 한다.", "5": "행정청은 처분을 신속히 처리할 필요가 있거나 사안이 경미한 경우에는 말 또는 그 밖 의 방법으로 할 수 있다."}, "answer": 4, "subject": "행정행위 부관", "exam": "9회A", "year": 2021, "explanation": "행정절차법상 처분절차에 관한 옳지 않은 것을 고르는 문제입니다. (9회A·B 공통)\n① (옳음) 광범위한 영향의 처분 → 공청회 개최 가능합니다.\n② (옳음) 인허가 등 취소 시 의견제출기한 내 신청 있으면 청문합니다.\n③ (옳음) 청문·공청회·의견제출 거친 후 신속한 처분 의무입니다.\n④ ✓ 정답(틀림) — 처분 시 이유 제시는 당사자에게 하는 것이고, 이해관계인이 아닌 당사자 개념을 혼용했습니다. 행정절차법 제23조는 당사자에게 근거와 이유를 제시하도록 합니다.\n⑤ (옳음) 경미한 사안은 말로 처분 가능합니다.\n★ 핵심: 처분 이유제시 = 당사자에게 (이해관계인에게가 아님)"}, {"num": 36, "stem": "36. 공공기관의 정보공개에 관한 법률에 관한 설명으로 옳은 것은? (다툼이 있으면 판례 에 따름)", "choices": {"1": "국내에 학술ㆍ연구를 위하여 일시적으로 체류하는 외국인은 정보공개를 청구할 권리가 없다.", "2": "공개 청구한 정보가 비공개대상인 부분과 공개 가능한 부분이 혼합되어 있는 경우 부분 공개는 할 수 없다.", "3": "사립대학교는 정보공개의무를 지는 공공기관에 해당하지 않는다.", "4": "정보공개를 요구받은 공공기관이 공개를 거부하는 경우에는 비공개사유에 해당하는지를 주장ㆍ입증하지 아니한 채 개괄적인 사유만을 들어 공개를 거부할 수 없다.", "5": "청구인은 공공기관의 비공개 결정에 대하여 불복이 있는 경우 이의신청 절차를 거치지 아니하고는 행정심판을 청구할 수 없다."}, "answer": 4, "subject": "행정심판", "exam": "9회A", "year": 2021, "explanation": "정보공개법에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 국내 학술·연구 목적 일시 체류 외국인도 정보공개 청구 가능합니다.\n② (틀림) 비공개 부분과 공개 가능 부분이 혼합된 경우 부분 공개 가능합니다.\n③ (틀림) 사립대학교도 공공기관에 해당하여 정보공개 의무가 있습니다.\n④ ✓ 정답 — 비공개 거부 시 공공기관은 비공개사유에 해당하는지 주장·입증해야 하며, 개괄적 사유만으로 거부할 수 없습니다 (대법원 판례).\n⑤ (틀림) 이의신청을 거치지 않고도 행정심판 청구 가능합니다.\n★ 핵심: 비공개 거부 → 공공기관이 비공개사유 주장·입증 책임"}, {"num": 37, "stem": "37. 판례에 의할 때 공공기관의 정보공개에 관한 법률에 관한 설명으로 옳은 것을 모두 고른 것은? ㄱ. 학교폭력대책자치위원회의 회의록은 ‘공개될 경우 업무의 공정한 수행에 현저 한 지장을 초래한다고 인정할 만한 상당한 이유가 있는 정보’에 해당한다. ㄴ. 의사결정과정에 제공된 회의관련자료나 의사결정과정이 기록된 회의록은 의 사가 결정되거나 의사가 집행된 경우에는 더 이상 의사결정과정에 있는 사항 그 자체라고는 할 수 없으나, 의사결정과정에 있는 사항에 준하는 사항으로서 비공개대상정보에 포함될 수 있다. ㄷ. ‘진행 중인 재판에 관련된 정보’에 해당한다는 사유로 정보공개를 거부하기 위하여는 반드시 그 정보가 진행 중인 재판의 소송기록 자체에 포함되어야 한다.", "choices": {"1": "ㄱ", "2": "ㄴ", "3": "ㄱ, ㄴ", "4": "ㄴ, ㄷ", "5": "ㄱ, ㄴ, ㄷ"}, "answer": 3, "subject": "공공기관 정보공개법", "exam": "9회A", "year": 2021, "explanation": "정보공개법에 관한 판례의 옳은 내용을 고르는 문제입니다.\nㄱ. (옳음) 학폭위 회의록 = 공정한 수행에 현저한 지장 초래 정보 → 비공개 가능합니다.\nㄴ. (옳음) 의사결정 후의 회의록도 의사결정과정에 준하는 사항으로 비공개 가능합니다.\nㄷ. (틀림) '진행 중인 재판 관련 정보'라는 이유로 거부하려면 반드시 소송기록 자체에 포함될 필요는 없습니다 (대법원 판례).\n옳은 것: ㄱ, ㄴ → 정답 ③\n★ 핵심: 재판 관련 정보 비공개 = 소송기록 포함 여부 무관"}, {"num": 38, "stem": "38. 행정대집행법상 대집행에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "철거대집행 계고처분 후 행한 제2차 계고는 대집행기한의 연기통지가 아니라 새로운 철 거의무를 부과한 것이다.", "2": "철거명령과 계고처분은 계고서라는 명칭의 1장의 문서로 이루어질 수 있다.", "3": "대집행은 처분청 스스로 하여야 하며, 대집행 권한을 제3자에게 위임․위탁할 수 없다.", "4": "후행처분인 대집행영장발부통보처분의 취소소송에서, 선행처분인 계고처분의 위법을 이 유로 대집행영장발부통보처분이 위법하다는 주장을 할 수 없다.", "5": "행정청이 대집행의 방법으로 건물철거의무의 이행을 실현할 수 있는 경우, 건물철거 대 집행 과정에서 부수적으로 건물의 점유자들에 대한 퇴거 조치를 할 수 없다."}, "answer": 2, "subject": "행정행위 부관", "exam": "9회A", "year": 2021, "explanation": "대집행에 관한 옳은 것을 고르는 문제입니다. (9회A·B 공통)\n① (틀림) 제2차 계고는 새로운 철거의무 부과가 아닌 기한 연기통지입니다 (대법원 판례).\n② ✓ 정답 — 철거명령과 계고처분은 하나의 문서(계고서)로 이루어질 수 있습니다 (대법원 판례).\n③ (틀림) 대집행 권한을 제3자에게 위탁할 수 있습니다.\n④ (틀림) 선행처분(계고) 위법을 이유로 후행처분(대집행영장) 위법을 주장할 수 있습니다 (하자승계 인정 사례).\n⑤ (틀림) 건물철거 대집행 과정에서 점유자 퇴거 조치도 할 수 있습니다.\n★ 핵심: 철거명령 + 계고 = 하나의 계고서로 가능"}, {"num": 39, "stem": "39. 행정의 실효성 확보수단에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "건축법상 이행강제금 부과처분은 항고소송으로 다툴 수는 없다.", "2": "이행강제금은 대체적 작위의무의 위반에 대하여 부과될 수 없다.", "3": "건축법상 이행강제금의 납부의무는 구인에게 불리한 재결 금지.\n★ 핵심: 사정재결 시 주문에 위법·부당 명시 의무"}, {"num": 45, "stem": "45. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법률에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "사업인정처분이 당연무효이면 그것이 유효함을 전제로 이루어진 수용재결도 무효이다.", "2": "수용재결에 대한 이의신청은 행정소송을 하기 위한 필수적인 전심절차이다.", "3": "수용재결에 대한 취소소송의 제기는 사업의 진행 및 토지의 수용 또는 사용을 정지시키 지 아니한다.", "4": "토지소유자가 보상금 증액청구소송을 제기할 경우 사업시행자를 피고로 하여야 한다.", "5": "보상금증감청구소송의 제기기간은 이의신청을 거친 경우 이의신청에 대한 재결서를 받 은 날부터 60일 이내이다."}, "answer": 2, "subject": "행정심판", "exam": "9회A", "year": 2021, "explanation": "토지보상법에 관한 옳지 않은 것을 고르는 문제입니다. (9회A·B 공통)\n① (옳음) 사업인정처분이 당연무효이면 수용재결도 무효입니다.\n② ✓ 정답(틀림) — 수용재결에 대한 이의신청은 필수적 전치 절차가 아닙니다. 이의신청 없이도 행정소송 제기 가능합니다 (임의적 전치).\n③ (옳음) 수용재결 취소소송 제기 시 수용이나 사용이 정지되지 않습니다 (집행부정지 원칙).\n④ (옳음) 보상금 증액청구소송 → 사업시행자를 피고로 합니다.\n⑤ (옳음) 이의신청 거친 경우 재결서 받은 날부터 60일 이내 제기해야 합니다.\n★ 핵심: 수용재결 이의신청 = 임의적 전치 (필수 아님)"}, {"num": 46, "stem": "46. 국가배상법 제2조 제1항 단서의 이중배상금지에 관한 설명으로 옳지 않은 것은? (다 툼이 있으면 판례에 따름)", "choices": {"1": "피해자가 군인ㆍ군무원ㆍ경찰공무원 또는 예비군대원이어야 한다.", "2": "병역법상 공익근무요원은 군인에 해당하여 이중배상이 금지되는 자에 속한다.", "3": "전투ㆍ훈련 또는 이에 준하는 직무집행 뿐만 아니라 일반 직무집행에 관하여도 적용된다.", "4": "전투훈련 중 민간인이 군인과 공동불법행위를 한 경우 민간인은 자신의 부담 부분만을 피해 군인에게 배상하면 된다는 것이 대법원판례의 입장이다.", "5": "전투ㆍ훈련 등 직무집행과 관련하여 전사ㆍ순직하거나 공상을 입은 손해에 한한다."}, "answer": 2, "subject": "국가배상", "exam": "9회A", "year": 2021, "explanation": "국가배상법 이중배상금지에 관한 옳지 않은 것을 고르는 문제입니다. (9회A·B 공통)\n① (옳음) 군인·군무원·경찰공무원·예비군대원이 피해자여야 합니다.\n② ✓ 정답(틀림) — 병역법상 공익근무요원은 군인이 아닙니다 (대법원 판례). 따라서 이중배상금지 대상이 아닙니다.\n③ (틀림) 전투·훈련 또는 이에 준하는 직무집행에 한해 적용됩니다 (일반 직무는 적용 제외).\n④ (옳음) 민간인 공동불법행위 시 자신의 부담 부분만 배상하면 됩니다 (대법원 판례).\n⑤ (옳음) 전사·순직 또는 공상을 입은 손해에 한합니다.\n★ 핵심: 공익근무요원 ≠ 군인 → 이중배상금지 미적용"}, {"num": 47, "stem": "47. 신청에 대한 거부처분에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "거부처분은 당사자의 권익을 제한하는 처분에 해당하므로 원칙적으로 행정절차법상 사 전통지의 대상이 된다.", "2": "거부처분에 대하여는 행정소송법상 집행정지를 구할 이익이 있어 집행정지가 허용된다.", "3": "거부처분의 취소판결의 취지에 따라 행정청이 처분을 하지 않는 경우, 당사자는 수소법 원에 직접강제를 신청할 수 있다.", "4": "거부처분이 성립되려면 신청인에게 그 행위발동을 요구할 법규상 또는 조리상 신청권이 있어야 한다.", "5": "거부처분에 대하여는 : "부관 관련 기부채납 문제입니다. (9회A·B 공통)\n① (옳음) 부담 불이행 시 허가 철회 가능합니다.\n② (옳음) 부담만을 대상으로 한 취소소송 허용됩니다.\n③ (옳음) 부관이 무효·취소되지 않은 이상 착오 이유로 증여계약 취소 불가합니다.\n④ (옳음) 부관 필요성 판단 시 A시장에게 재량이 있습니다.\n⑤ ✓ 정답(틀림) — 허가 후에도 당사자 동의 있으면 부관을 새로 붙일 수 있습니다 (대법원 판례).\n★ 핵심: 처분 후 부관 = 원칙 불가, 당사자 동의 있으면 가능"}, {"num": 31, "stem": "31. 행정행위의 법적 성질을 바르게 연결한 것은? (다툼이 있으면 판례에 따름) ㄱ. 구 자동차관리법상 자동차정비조합설립인가 ㄴ. 구 도시계획법상 개발제한구역 내의 건축허가 ㄷ. 기부금품모집규제법상 기부금품모집허가", "choices": {"1": "ㄱ: 인가, ㄴ: 예외적 허가, ㄷ: 특허", "2": "ㄱ: 인가, ㄴ: 허가, ㄷ: 특허", "3": "ㄱ: 인가, ㄴ: 예외적 허가, ㄷ: 허가", "4": "ㄱ: 특허, ㄴ: 인가, ㄷ: 허가", "5": "ㄱ: 허가, ㄴ: 특허, ㄷ: 인가"}, "answer": 3, "subject": "행정계획", "exam": "9회B", "year": 2021, "explanation": "행정행위의 법적 성질 연결 문제입니다. (9회A·B 공통)\nㄱ. 자동차정비조합설립인가 → 인가 (사법인의 설립행위에 효력 부여)\nㄴ. 개발제한구역 내 건축허가 → 예외적 허가 (원래 금지된 행위를 예외적으로 허용)\nㄷ. 기부금품모집허가 → 특허 (새로운 권리·능력 부여) — 대법원 판례\n→ 정답 ①\n★ 핵심: 기부금품모집허가 = 특허 (허가 아님), 개발제한구역 건축허가 = 예외적 허가"}, {"num": 32, "stem": "32. 처분의 취소 또는 변경에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "처분의 위법은 직권취소의 사유가 되지만, 처분의 부당은 직권취소의 사유가 되지 않는다.", "2": "수익적 처분의 직권취소 필요성에 관한 증명책임은 처분의 상대방에 있다.", "3": "수익적 처분에 대한 직권취소의 경우에는 행정절차법상 사전통지가 필요하지 않다.", "4": "행정청은 행정소송이 계속되고 있는 때에는 직권으로 해당 처분을 변경할 수 없다.", "5": "산업재해보상보험법상 연금지급결정을 취소하는 처분이 적법하다고 하여 그에 터 잡은 징수처분이 반드시 적법한 것은 아니다."}, "answer": 5, "subject": "행정행위 효력·취소·철회", "exam": "9회B", "year": 2021, "explanation": "처분의 취소·변경에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 부당한 처분도 직권취소 사유가 됩니다.\n② (틀림) 수익적 처분의 직권취소 필요성 증명책임은 행정청에 있습니다.\n③ (틀림) 수익적 처분 직권취소 시에도 행정절차법상 사전통지가 필요합니다 (대법원 판례).\n④ (틀림) 행정소송 계속 중에도 직권 변경 가능합니다.\n⑤ ✓ 정답 — 연금지급결정 취소처분이 적법해도 그에 기한 징수처분이 반드시 적법한 것은 아닙니다 (별도 요건 심사 필요, 대법원 판례).\n★ 핵심: 선행 취소처분 적법 ≠ 후행 징수처분 자동 적법"}, {"num": 33, "stem": "33. 행정절차법이 정하고 있는 적용제외 대상이 아닌 것은?", "choices": {"1": "국가안전보장ㆍ국방ㆍ외교 또는 통일에 관한 사항 중 행정절차를 거칠 경우 국가의 중 대한 이익을 현저히 해칠 우려가 있는 사항", "2": "감사원이 감사위원회의의 결정을 거쳐 행하는 사항", "3": "심사청구, 해양안전심판, 조세심판, 특허심판, 행정심판, 그 밖의 불복절차에 따른 사항", "4": "국회 또는 지방의회의 의결을 거치거나 동의 또는 승인을 받아 행하는 사항", "5": "처분의 전제가 되는 사실이 경찰의 수사에 의하여 객관적으로 증명된 사항"}, "answer": 5, "subject": "행정절차법", "exam": "9회B", "year": 2021, "explanation": "생활폐기물 수집·운반 위탁계약의 법적 성격 문제입니다. (9회A·B 공통)\n① (틀림) 사법상 계약이 아닙니다 (공법상 계약).\n② (틀림) 국가계약법 적용 대상이 아닙니다.\n③ (틀림) 계약 체결 다툼은 공법상 당사자소송이 아닙니다 (민사소송).\n④ (틀림) 행정절차법은 공법상 계약 절차에 직접 적용되지 않습니다.\n⑤ ✓ 정답(틀림으로 정답) — 계약해지 통보 다툼은 취소소송이 아닌 민사소송에 의합니다 (대법원 판례: 생활폐기물 위탁계약은 사법상 계약).\n★ 핵심: 생활폐기물 수집·운반 위탁계약 = 사법상 계약 → 민사소송"}, {"num": 34, "stem": "34. A시는 조례에 근거하여 甲회사와 생활폐기물수집․운반대행위탁계약을 체결하였다. 이 계약에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "사법상 계약으로 계약자유의 원칙이 적용된다.", "2": "국가를 당사자로 하는 계약에 관한 법률이 적용된다.", "3": "계약의 체결에 관한 다툼은 공법상 당사자소송에 의한다.", "4": "계약절차에는 행정절차법이 적용된다.", "5": "계약의 해지 통보에 관한 다툼은 취소소송에 의한다."}, "answer": 1, "subject": "행정입법", "exam": "9회B", "year": 2021, "explanation": "행정절차법 적용제외 대상이 아닌 것을 고르는 문제입니다. (9회A·B 공통)\n① (제외) 국가안전보장·국방·외교·통일 사항 중 중대이익 해칠 우려\n② (제외) 감사원이 감사위원회의 결정을 거쳐 행하는 사항\n③ (제외) 행정심판, 조세심판 등 불복절차\n④ (제외) 국회·지방의회 의결·동의·승인을 받아 행하는 사항\n⑤ ✓ 정답(제외 아님) — 처분의 전제가 되는 사실이 경찰의 수사에 의해 증명된 사항은 적용제외 사항에 해당하지 않습니다 (행정절차법 제3조 제2항 참고).\n★ 핵심: 경찰 수사로 증명된 사항 = 행정절차법 적용제외 아님"}, {"num": 35, "stem": "35. 행정절차법상 처분절차에 관한 설명으로 옳지 않은 것은?", "choices": {"1": "처분을 할 때 해당 처분의 영향이 광범위하여 널리 의견을 수렴할 필요가 있다고 행정 청이 인정하는 경우에는 공청회를 개최한다.", "2": "행정청은 인허가 등의 취소 시 의견제출기한 내에 당사자등의 신청이 있는 경우에는 청 문을 한다.", "3": "청문ㆍ공청회 또는 의견제출을 거쳤을 때에는 신속히 처분하여 해당 처분이 지연되지 아니하도록 하여야 한다.", "4": "행정청은 처분을 할 때에는 이해관계인에게 그 근거와 이유를 제시하여야 한다.", "5": "행정청은 처분을 신속히 처리할 필요가 있거나 사안이 경미한 경우에는 말 또는 그 밖 의 방법으로 할 수 있다."}, "answer": 4, "subject": "행정행위 부관", "exam": "9회B", "year": 2021, "explanation": "행정절차법상 처분절차에 관한 옳지 않은 것을 고르는 문제입니다. (9회A·B 공통)\n① (옳음) 광범위한 영향의 처분 → 공청회 개최 가능합니다.\n② (옳음) 인허가 등 취소 시 의견제출기한 내 신청 있으면 청문합니다.\n③ (옳음) 청문·공청회·의견제출 거친 후 신속한 처분 의무입니다.\n④ ✓ 정답(틀림) — 처분 시 이유 제시는 당사자에게 하는 것이고, 이해관계인이 아닌 당사자 개념을 혼용했습니다. 행정절차법 제23조는 당사자에게 근거와 이유를 제시하도록 합니다.\n⑤ (옳음) 경미한 사안은 말로 처분 가능합니다.\n★ 핵심: 처분 이유제시 = 당사자에게 (이해관계인에게가 아님)"}, {"num": 36, "stem": "36. 판례에 의할 때 공공기관의 정보공개에 관한 법률에 관한 설명으로 옳은 것을 모두 고른 것은? ㄱ. 학교폭력대책자치위원회의 회의록은 ‘공개될 경우 업무의 공정한 수행에 현저 한 지장을 초래한다고 인정할 만한 상당한 이유가 있는 정보’에 해당한다. ㄴ. 의사결정과정에 제공된 회의관련자료나 의사결정과정이 기록된 회의록은 의 사가 결정되거나 의사가 집행된 경우에는 더 이상 의사결정과정에 있는 사항 그 자체라고는 할 수 없으나, 의사결정과정에 있는 사항에 준하는 사항으로서 비공개대상정보에 포함될 수 있다. ㄷ. ‘진행 중인 재판에 관련된 정보’에 해당한다는 사유로 정보공개를 거부하기 위하여는 반드시 그 정보가 진행 중인 재판의 소송기록 자체에 포함되어야 한다.", "choices": {"1": "ㄱ", "2": "ㄴ", "3": "ㄱ, ㄴ", "4": "ㄴ, ㄷ", "5": "ㄱ, ㄴ, ㄷ"}, "answer": 3, "subject": "공공기관 정보공개법", "exam": "9회B", "year": 2021, "explanation": "정보공개법에 관한 옳은 것을 고르는 문제입니다.\n① (틀림) 국내 학술·연구 목적 일시 체류 외국인도 정보공개 청구 가능합니다.\n② (틀림) 비공개 부분과 공개 가능 부분이 혼합된 경우 부분 공개 가능합니다.\n③ (틀림) 사립대학교도 공공기관에 해당하여 정보공개 의무가 있습니다.\n④ ✓ 정답 — 비공개 거부 시 공공기관은 비공개사유에 해당하는지 주장·입증해야 하며, 개괄적 사유만으로 거부할 수 없습니다 (대법원 판례).\n⑤ (틀림) 이의신청을 거치지 않고도 행정심판 청구 가능합니다.\n★ 핵심: 비공개 거부 → 공공기관이 비공개사유 주장·입증 책임"}, {"num": 37, "stem": "37. 공공기관의 정보공개에 관한 법률에 관한 설명으로 옳은 것은? (다툼이 있으면 판례 에 따름)", "choices": {"1": "국내에 학술ㆍ연구를 위하여 일시적으로 체류하는 외국인은 정보공개를 청구할 권리가 없다.", "2": "공개 청구한 정보가 비공개대상인 부분과 공개 가능한 부분이 혼합되어 있는 경우 부분 공개는 할 수 없다.", "3": "사립대학교는 정보공개의무를 지는 공공기관에 해당하지 않는다.", "4": "정보공개를 요구받은 공공기관이 공개를 거부하는 경우에는 비공개사유에 해당하는지를 주장ㆍ입증하지 아니한 채 개괄적인 사유만을 들어 공개를 거부할 수 없다.", "5": "청구인은 공공기관의 비공개 결정에 대하여 불복이 있는 경우 이의신청 절차를 거치지 아니하고는 행정심판을 청구할 수 없다."}, "answer": 4, "subject": "행정심판", "exam": "9회B", "year": 2021, "explanation": "정보공개법에 관한 판례의 옳은 내용을 고르는 문제입니다.\nㄱ. (옳음) 학폭위 회의록 = 공정한 수행에 현저한 지장 초래 정보 → 비공개 가능합니다.\nㄴ. (옳음) 의사결정 후의 회의록도 의사결정과정에 준하는 사항으로 비공개 가능합니다.\nㄷ. (틀림) '진행 중인 재판 관련 정보'라는 이유로 거부하려면 반드시 소송기록 자체에 포함될 필요는 없습니다 (대법원 판례).\n옳은 것: ㄱ, ㄴ → 정답 ③\n★ 핵심: 재판 관련 정보 비공개 = 소송기록 포함 여부 무관"}, {"num": 38, "stem": "38. 행정대집행법상 대집행에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "철거대집행 계고처분 후 행한 제2차 계고는 대집행기한의 연기통지가 아니라 새로운 철 거의무를 부과한 것이다.", "2": "철거명령과 계고처분은 계고서라는 명칭의 1장의 문서로 이루어질 수 있다.", "3": "대집행은 처분청 스스로 하여야 하며, 대집행 권한을 제3자에게 위임․위탁할 수 없다.", "4": "후행처분인 대집행영장발부통보처분의 취소소송에서, 선행처분인 계고처분의 위법을 이 유로 대집행영장발부통보처분이 위법하다는 주장을 할 수 없다.", "5": "행정청이 대집행의 방법으로 건물철거의무의 이행을 실현할 수 있는 경우, 건물철거 대 집행 과정에서 부수적으로 건물의 점유자들에 대한 퇴거 조치를 할 수 없다."}, "answer": 2, "subject": "행정행위 부관", "exam": "9회B", "year": 2021, "explanation": "대집행에 관한 옳은 것을 고르는 문제입니다. (9회A·B 공통)\n① (틀림) 제2차 계고는 새로운 철거의무 부과가 아닌 기한 연기통지입니다 (대법원 판례).\n② ✓ 정답 — 철거명령과 계고처분은 하나의 문서(계고서)로 이루어질 수 있습니다 (대법원 판례).\n③ (틀림) 대집행 권한을 제3자에게 위탁할 수 있습니다.\n④ (틀림) 선행처분(계고) 위법을 이유로 후행처분(대집행영장) 위법을 주장할 수 있습니다 (하자승계 인정 사례).\n⑤ (틀림) 건물철거 대집행 과정에서 점유자 퇴거 조치도 할 수 있습니다.\n★ 핵심: 철거명령 + 계고 = 하나의 계고서로 가능"}, {"num": 39, "stem": "39. 행정의 실효성 확보수단에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "건축법상 이행강제금 부과처분은 항고소송으로 다툴 수는 없다.", "2": "이행강제금은 대체적 작위의무의 위반에 대하여 부과될 수 없다.", "3": "건축법상 이행강제금의 납부의무는 상속인에게 승계될 수 없는 일신전속적인 성질의 것이다.", "4": "대집행에 요한 비용은 국세징수법의 예에 의하여 징수할 수 없다.", "5": "병무청장이 병역법에 따라 병역의무 기피자의 인적사항을 인터넷 홈페이지에 공개하는 결정은 항고소송의 대상이 되는 행정처분이 아니다."}, "answer": 3, "subject": "행정대집행", "exam": "9회B", "year": 2021, "explanation": "행정의 실효성 확보수단에 관한 옳은 것을 고르는 문제입니다. (9회A·B 공통)\n① (틀림) 건축법상 이행강제금 부과처분도 항고소송으로 다툴 수 있습니다.\n② (틀림) 이행강제금은 대체적 작위의무 위반에도 부과될 수 있습니다.\n③ ✓ 정답 — 건축법상 이행강제금 납부의무는 상속인에게 승계될 수 없는 일신전속적 성질입니다 (대법원 판례).\n④ (틀림) 대집행 비용은 국세징수법의 예에 따라 징수합니다.\n⑤ (틀림) 병역의무 기피자 인적사항 공개 결정은 항고소송 대상인 처분입니다 (대법원 판례).\n★ 핵심: 이행강제금 납부의무 = 일신전속 (상속인에게 승계 안 됨)"}, {"num": 40, "stem": "40. 행정기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "법령에 따라 행정권한을 위탁받은 사인은 행정청이 될 수 없다.", "2": "행정에 관한 의사를 결정하여 표시하는 국가 또는 지방자치단체의 기관은 행정청이다.", "3": "지방자치단체는 그 소관 사무의 일부를 독립하여 수행할 필요가 있으면 법령이나 그 지 방자치단체의 조례로 정하는 바에 따라 합의제행정기관을 설치할 수 있다.", "4": "행정기관의 장은 소관사무를 통할하고 소속공무원을 지휘ㆍ감독한다.", "5": "정부조직법은 합의제행정기관의 설치에 관한 법적 근거를 두고 있다."}, "answer": 1, "subject": "행정입법", "exam": "9회B", "year": 2021, "explanation": "행정권한의 위임에 관한 옳지 않은 것을 고르는 문제입니다. (9회A·B 공통)\n① (옳음) 권한 위임의 정의 — 일부를 수임자 권한·책임 아래 행사하게 함\n② (옳음) 내부위임 = 법적 근거 없이도 내부 편의를 위해 가능\n③ (옳음) 위임기관은 수임기관 지휘·감독하고 위법·부당 시 취소·정지 가능\n④ (옳음) 수임사무 처리에 관해 사전승인·협의 요구 불가\n⑤ ✓ 정답(틀림) — 수임사무의 일부는 보조기관·하급기관에 재위임 가능합니다. '전부 또는 일부를 재위임할 수 없다'는 표현이 틀렸습니다.\n★ 핵심: 위임받은 사무의 일부는 재위임 가능 (전부 재위임은 불가)"}, {"num": 41, "stem": "41. 행정권한의 위임 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정권한의 위임은 법률에 규정된 행정기관의 장의 권한 : "국가배상", "exam": "9회B", "year": 2021, "explanation": "주민소송에 관한 옳지 않은 것을 고르는 문제입니다. (9회A·B 공통)\n① (옳음) 주민소송 제기 전 주민감사청구 선행 필요합니다.\n② ✓ 정답(틀림) — 지방의회의원에게 손해배상청구를 할 것을 요구하는 주민소송도 인정됩니다 (지방자치법 제22조 제2항 제4호). '인정되지 않는다'는 표현이 틀렸습니다.\n③ (옳음) 공금 부과·징수 게을리한 사실 위법 확인 소송 인정됩니다.\n④ (옳음) 행정처분 해당 행위 취소 요구 소송 인정됩니다.\n⑤ (옳음) 위법 행위나 해태사실은 감사청구 사항과 동일 불요, 관련성만 있으면 됩니다.\n★ 핵심: 지방의회의원 손해배상청구 소송도 주민소송으로 가능"}, {"num": 50, "stem": "50. 국유재산법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "choices": {"1": "행정재산의 사용허가기간은 원칙상 5년 이내로 한다.", "2": "일반재산은 민법상 시효취득의 대상이 되지 아니한다.", "3": "행정재산에는 사권을 설정하지 못한다.", "4": "보존용재산은 법령이나 그 밖의 필요에 따라 국가가 보존하는 재산이다.", "5": "중앙관서의 장은 사용허가한 행정재산을 국가가 직접 공용으로 사용하기 위하여 필요하게 된 경우에는 사용허가를 철회할 수 있다."}, "answer": 2, "subject": "국유재산법", "exam": "9회B", "year": 2021, "explanation": "국유재산법에 관한 옳지 않은 것을 고르는 문제입니다. (9회A·B 공통)\n① (옳음) 행정재산 사용허가기간 원칙 5년 이내입니다.\n② ✓ 정답(틀림) — 일반재산(행정재산 외의 국유재산)은 민법상 시효취득의 대상이 됩니다. '대상이 되지 않는다'는 표현이 틀렸습니다 (행정재산은 시효취득 불가, 일반재산은 가능).\n③ (옳음) 행정재산에는 사권 설정 불가합니다.\n④ (옳음) 보존용재산 정의 맞습니다.\n⑤ (옳음) 직접 공용으로 사용하려면 사용허가 철회 가능합니다.\n★ 핵심: 일반재산 = 시효취득 가능 / 행정재산 = 시효취득 불가"}]};

// Flatten all questions
const ALL_Q = [];
for (const [examId, qs] of Object.entries(RAW_DATA)) {
  for (const q of qs) {
    ALL_Q.push(q);
  }
}

// Build subject/exam sets
const SUBJECTS = [...new Set(ALL_Q.map(q => q.subject))].sort();
const EXAMS = ['13회','12회','11회','10회','9회A','9회B'];

let currentFilter = 'all';
let answered = {}; // qid -> {selected, correct}

function qId(q) {
  return q.exam + '-' + q.num;
}

// Build sidebar filters
function buildSidebar() {
  // Exam filters
  const examDiv = document.getElementById('exam-filters');
  examDiv.innerHTML = '';
  for (const exam of EXAMS) {
    const qs = ALL_Q.filter(q => q.exam === exam);
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.setAttribute('data-filter', 'exam:' + exam);
    btn.innerHTML = `<span>${exam} (${qs[0].year})</span><span class="count">${qs.length}</span>`;
    btn.onclick = () => setFilter('exam:' + exam, btn);
    examDiv.appendChild(btn);
  }

  // Subject filters
  const subDiv = document.getElementById('subject-filters');
  subDiv.innerHTML = '';
  for (const subj of SUBJECTS) {
    const count = ALL_Q.filter(q => q.subject === subj).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.setAttribute('data-filter', 'subj:' + subj);
    btn.innerHTML = `<span>${subj}</span><span class="count">${count}</span>`;
    btn.onclick = () => setFilter('subj:' + subj, btn);
    subDiv.appendChild(btn);
  }

  document.getElementById('count-all').textContent = ALL_Q.length;
}

function setFilter(filter, btnEl) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  renderQuestions();
}

function getFilteredQs() {
  if (currentFilter === 'all') return ALL_Q;
  if (currentFilter.startsWith('exam:')) {
    const exam = currentFilter.slice(5);
    return ALL_Q.filter(q => q.exam === exam);
  }
  if (currentFilter.startsWith('subj:')) {
    const subj = currentFilter.slice(5);
    return ALL_Q.filter(q => q.subject === subj);
  }
  return ALL_Q;
}

function renderQuestions() {
  const qs = getFilteredQs();
  const list = document.getElementById('q-list');

  // Update title/meta
  if (currentFilter === 'all') {
    document.getElementById('view-title').textContent = '전체 문제';
    document.getElementById('view-meta').textContent = '2021~2025년 행정사 1차 행정법 전체';
  } else if (currentFilter.startsWith('exam:')) {
    const exam = currentFilter.slice(5);
    const year = qs[0]?.year;
    document.getElementById('view-title').textContent = `${exam} (${year}년)`;
    document.getElementById('view-meta').textContent = `26번 ~ 50번, 25문제`;
  } else {
    const subj = currentFilter.slice(5);
    document.getElementById('view-title').textContent = subj;
    document.getElementById('view-meta').textContent = `총 ${qs.length}문제`;
  }

  if (qs.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>문제가 없습니다.</div></div>';
    return;
  }

  list.innerHTML = '';
  for (const q of qs) {
    list.appendChild(buildCard(q));
  }

  updateProgress(qs);
}
