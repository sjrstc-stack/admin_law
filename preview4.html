<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행정학 키워드 마인드맵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #fafafa;
    --bg-hover: #f5f5f5;
    --border: #e5e5e5;
    --border-soft: #ebebeb;
    --text: #1e1e1e;
    --text-secondary: #757575;
    --text-tertiary: #b3b3b3;
    --accent: #0d99ff;
    --line: #d4d4d4;

    --c1: #f24822;
    --c2: #ffa629;
    --c3: #ffcd29;
    --c4: #14ae5c;
    --c5: #0d99ff;
    --c6: #9747ff;
    --c7: #e662a7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Inter', -apple-system, sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    font-feature-settings: 'tnum';
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--bg);
  }

  .title-block {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .title-mark {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: var(--text);
    display: grid; place-items: center;
    color: var(--bg);
    font-weight: 700;
    font-size: 14px;
  }

  h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.2px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  h1 .sub {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-wrap { position: relative; }

  #search {
    background: var(--bg-soft);
    border: 1px solid transparent;
    color: var(--text);
    padding: 7px 12px 7px 32px;
    font-family: inherit;
    font-size: 13px;
    width: 220px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  #search:focus {
    border-color: var(--accent);
    background: var(--bg);
    box-shadow: 0 0 0 3px rgba(13, 153, 255, 0.15);
  }

  #search::placeholder { color: var(--text-tertiary); }

  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    pointer-events: none;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border-soft);
    position: relative;
    z-index: 5;
    background: var(--bg);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
    transition: background 0.12s, color 0.12s;
    font-weight: 500;
  }

  .legend-item:hover {
    background: var(--bg-hover);
    color: var(--text);
  }

  .legend-item.active {
    background: var(--text);
    color: var(--bg);
  }

  .legend-item.dim { opacity: 0.4; }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .legend-count {
    font-size: 11px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }

  .legend-item.active .legend-count { color: rgba(255,255,255,0.7); }

  #canvas {
    position: relative;
    width: 100%;
    height: calc(100vh - 110px);
    min-height: 700px;
    overflow: hidden;
    z-index: 2;
    background:
      linear-gradient(var(--border-soft) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(90deg, var(--border-soft) 1px, transparent 1px) 0 0 / 32px 32px;
    background-color: var(--bg);
  }

  #branches {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .hub {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: var(--text);
    color: var(--bg);
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
    z-index: 5;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.06);
    white-space: nowrap;
    user-select: none;
  }

  .chapter {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 4;
    cursor: pointer;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    min-width: 110px;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  .chapter:hover {
    border-color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transform: translate(-50%, -50%) translateY(-1px);
  }

  .chapter-head {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .chapter-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .chapter-num {
    font-size: 10px;
    color: var(--text-tertiary);
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.5px;
  }

  .chapter-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--text);
  }

  .chapter-meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .chapter.active {
    border-color: var(--text);
    background: var(--text);
  }

  .chapter.active .chapter-name { color: var(--bg); }
  .chapter.active .chapter-num,
  .chapter.active .chapter-meta { color: rgba(255,255,255,0.7); }

  .chapter.dim { opacity: 0.3; }

  .keyword {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 3;
    text-decoration: none;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.1px;
    white-space: nowrap;
    transition: all 0.15s;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 1px 1px rgba(0,0,0,0.02);
  }

  .keyword:hover {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
    transform: translate(-50%, -50%) translateY(-1px);
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    z-index: 6;
  }

  .keyword.match {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 0 3px rgba(13, 153, 255, 0.2);
    z-index: 6;
  }

  .keyword.dim {
    opacity: 0.18;
    pointer-events: none;
  }

  .branch {
    fill: none;
    stroke: var(--line);
    stroke-width: 1;
    transition: opacity 0.2s, stroke 0.2s;
  }

  .branch.major { stroke-width: 1.25; opacity: 0.7; }
  .branch.minor { opacity: 0.5; }
  .branch.dim { opacity: 0.08; }

  footer {
    position: relative;
    z-index: 10;
    padding: 10px 24px;
    border-top: 1px solid var(--border-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-secondary);
    flex-wrap: wrap;
    gap: 8px;
    background: var(--bg);
  }

  footer kbd {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    margin: 0 2px;
  }

  @media (max-width: 900px) {
    #canvas { display: none; }

    .mobile-list {
      display: block !important;
      padding: 16px;
      position: relative;
      z-index: 2;
    }

    .ml-chapter {
      margin-bottom: 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      transition: opacity 0.2s;
    }

    .ml-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .ml-dot {
      width: 8px; height: 8px;
      border-radius: 2px;
    }

    .ml-num {
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
    }

    .ml-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .ml-count {
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }

    .ml-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ml-kw {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      transition: all 0.15s;
    }

    .ml-kw:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .ml-kw.match {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .ml-kw.dim { opacity: 0.25; }

    header { padding: 12px 16px; }
    .legend { padding: 8px 16px; }
    footer { padding: 10px 16px; font-size: 11px; }
    #search { width: 160px; font-size: 12px; }
    h1 .sub { display: none; }
  }

  .mobile-list { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translate(-50%, -50%) translateY(8px); }
    to { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
  }

  .chapter, .keyword {
    animation: fadeUp 0.4s ease backwards;
  }

  @keyframes drawBranch {
    from { stroke-dashoffset: 1000; }
    to { stroke-dashoffset: 0; }
  }

  .branch {
    stroke-dasharray: 1000;
    animation: drawBranch 0.8s ease forwards;
  }
</style>
</head>

    item.className = 'legend-item';
    item.dataset.chapterId = ch.id;
    item.innerHTML = `
      <span class="legend-dot" style="background:${ch.colorHex}"></span>
      ${ch.name}
      <span class="legend-count">${ch.keywords.length}</span>
    `;
    item.addEventListener('click', () => focusChapter(ch.id));
    legend.appendChild(item);
  });

  const canvas = document.getElementById('canvas');
  const branches = document.getElementById('branches');

  function drawMindmap() {
    canvas.querySelectorAll('.chapter, .keyword').forEach(el => el.remove());
    branches.innerHTML = '';

    const rect = canvas.getBoundingClientRect();
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    branches.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
    branches.setAttribute('width', rect.width);
    branches.setAttribute('height', rect.height);

    const chapterRadius = Math.min(rect.width, rect.height) * 0.24;
    const baseKwRadius = Math.min(rect.width, rect.height) * 0.42;

    let angleAcc = -Math.PI / 2;
    const meta = data.map(ch => {
      const span = (ch.keywords.length / totalKeywords) * Math.PI * 2;
      const startA = angleAcc;
      const endA = angleAcc + span;
      const centerA = (startA + endA) / 2;
      angleAcc = endA;
      return { ch, startA, endA, centerA, span };
    });

    meta.forEach((m, idx) => {
      const { ch, startA, endA, centerA, span } = m;
      const ccx = cx + chapterRadius * Math.cos(centerA);
      const ccy = cy + chapterRadius * Math.sin(centerA);

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const midX = cx + chapterRadius * 0.55 * Math.cos(centerA);
      const midY = cy + chapterRadius * 0.55 * Math.sin(centerA);
      path.setAttribute('d', `M ${cx} ${cy} Q ${midX} ${midY} ${ccx} ${ccy}`);
      path.setAttribute('class', 'branch major');
      path.dataset.chapterId = ch.id;
      branches.appendChild(path);

      const chNode = document.createElement('div');
      chNode.className = 'chapter';
      chNode.dataset.chapterId = ch.id;
      chNode.style.left = ccx + 'px';
      chNode.style.top = ccy + 'px';
      chNode.style.animationDelay = (0.05 + idx * 0.05) + 's';
      chNode.innerHTML = `
        <div class="chapter-head">
          <span class="chapter-dot" style="background:${ch.colorHex}"></span>
          <span class="chapter-num">CH ${String(ch.id).padStart(2,'0')}</span>
        </div>
        <div class="chapter-name">${ch.name}</div>
        <div class="chapter-meta">${ch.keywords.length} keywords</div>
      `;
      chNode.addEventListener('click', e => {
        e.stopPropagation();
        focusChapter(ch.id);
      });
      canvas.appendChild(chNode);

      const numKw = ch.keywords.length;
      const useTwoLayers = numKw > 10;

      ch.keywords.forEach((kw, i) => {
        let layer = 0, layerIdx = i, layerCount = numKw;
        if (useTwoLayers) {
          const half = Math.ceil(numKw / 2);
          if (i >= half) { layer = 1; layerIdx = i - half; layerCount = numKw - half; }
          else { layerCount = half; }
        }

        const margin = span * 0.06;
        const usableSpan = span - 2 * margin;
        const t = layerCount === 1 ? 0.5 : layerIdx / (layerCount - 1);
        const angle = (m.startA + margin) + t * usableSpan;
        const r = baseKwRadius + layer * 75;

        const kx = cx + r * Math.cos(angle);
        const ky = cy + r * Math.sin(angle);

        const kPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const kMidX = ccx + (kx - ccx) * 0.5;
        const kMidY = ccy + (ky - ccy) * 0.5;
        kPath.setAttribute('d', `M ${ccx} ${ccy} Q ${kMidX} ${kMidY} ${kx} ${ky}`);
        kPath.setAttribute('class', 'branch minor');
        kPath.dataset.chapterId = ch.id;
        branches.appendChild(kPath);

        const kNode = document.createElement('a');
        kNode.className = 'keyword';
        kNode.href = NOTION_BASE + kw.id;
        kNode.dataset.chapterId = ch.id;
        kNode.dataset.name = kw.name;
        kNode.style.left = kx + 'px';
        kNode.style.top = ky + 'px';
        kNode.style.animationDelay = (0.2 + idx * 0.05 + i * 0.015) + 's';
        kNode.textContent = kw.name;
        canvas.appendChild(kNode);
      });
    });
  }

  let activeChapter = null;
  function focusChapter(id) {
    if (activeChapter === id) {
      activeChapter = null;
      clearFocus();
      return;
    }
    activeChapter = id;
    document.querySelectorAll('.chapter').forEach(c => {
      const isActive = +c.dataset.chapterId === id;
      c.classList.toggle('active', isActive);
      c.classList.toggle('dim', !isActive);
    });
    document.querySelectorAll('.keyword').forEach(k => {
      k.classList.toggle('dim', +k.dataset.chapterId !== id);
      k.classList.remove('match');
    });
    document.querySelectorAll('.branch').forEach(b => {
      b.classList.toggle('dim', +b.dataset.chapterId !== id);
    });
    document.querySelectorAll('.legend-item').forEach(l => {
      const isActive = +l.dataset.chapterId === id;
      l.classList.toggle('active', isActive);
      l.classList.toggle('dim', !isActive);
    });
    document.querySelectorAll('.ml-chapter').forEach(c => {
      c.style.opacity = +c.dataset.chapterId === id ? '1' : '0.25';
    });
  }

  function clearFocus() {
    activeChapter = null;
    document.querySelectorAll('.dim, .active, .match').forEach(el => {
      el.classList.remove('dim', 'active', 'match');
    });
    document.querySelectorAll('.ml-chapter').forEach(c => c.style.opacity = '1');
  }

  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', e => {
    const q = e.target.value.trim().toLowerCase();
    activeChapter = null;
    document.querySelectorAll('.legend-item').forEach(l => l.classList.remove('active', 'dim'));
    document.querySelectorAll('.chapter').forEach(c => c.classList.remove('active'));

    if (!q) { clearFocus(); return; }

    document.querySelectorAll('.keyword, .ml-kw').forEach(k => {
      const matches = k.dataset.name.toLowerCase().includes(q);
      k.classList.toggle('match', matches);
      k.classList.toggle('dim', !matches);
    });
    document.querySelectorAll('.chapter').forEach(c => c.classList.add('dim'));
    document.querySelectorAll('.branch').forEach(b => b.classList.add('dim'));

    const matchedChapters = new Set();
    document.querySelectorAll('.keyword.match, .ml-kw.match').forEach(k => {
      matchedChapters.add(k.dataset.chapterId);
    });
    matchedChapters.forEach(id => {
      const ch = document.querySelector(`.chapter[data-chapter-id="${id}"]`);
      if (ch) ch.classList.remove('dim');
      document.querySelectorAll(`.branch[data-chapter-id="${id}"]`).forEach(b => b.classList.remove('dim'));
    });
  });

  canvas.addEventListener('click', e => {
    if (e.target === canvas || e.target === branches) {
      searchInput.value = '';
      clearFocus();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchInput.blur();
      clearFocus();
    }
  });

  const mobileList = document.getElementById('mobileList');
  data.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'ml-chapter';
    div.dataset.chapterId = ch.id;
    let html = `
      <div class="ml-head">
        <span class="ml-dot" style="background:${ch.colorHex}"></span>
        <span class="ml-num">CH ${String(ch.id).padStart(2,'0')}</span>
        <span class="ml-title">${ch.name}</span>
        <span class="ml-count">${ch.keywords.length}</span>
      </div>
      <div class="ml-keywords">
    `;
    ch.keywords.forEach(kw => {
      html += `<a class="ml-kw" data-chapter-id="${ch.id}" data-name="${kw.name}" href="${NOTION_BASE + kw.id}">${kw.name}</a>`;
    });
    html += '</div>';
    div.innerHTML = html;
    mobileList.appendChild(div);
  });

  drawMindmap();
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(drawMindmap, 200);
  });
</script>
</body>
</html>
