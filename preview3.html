<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[행정학] 2021-2025 기출문제 초정밀해설</title>
<style>
:root{--bg:#f5f6f8;--card:#fff;--border:#e2e5ea;--accent:#3b5bdb;--accent-light:#eef1ff;--cor:#2f9e44;--cor-bg:#ebfbee;--wrg:#c92a2a;--wrg-bg:#fff5f5;--text:#1c1c1e;--sub:#6b7280;--sel:#dbe4ff;--sel-b:#4c6ef5;--expl-bg:#f8f9ff;--expl-b:#c5cfff;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;font-size:14px;line-height:1.6}
#header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:7px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.h-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;max-width:860px;margin:0 auto}
.h-title{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
.year-tabs{display:flex;gap:3px}
.ytab{padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;background:#fff;color:var(--sub);transition:.15s}
.ytab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats{display:flex;gap:5px;margin-left:auto;align-items:center}
.sbox{display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:6px;border:1px solid var(--border);font-size:11px;background:#fff}
.sbox .lbl{color:var(--sub)}
.sbox .val{font-weight:700}
.btn-reset{padding:3px 9px;border-radius:6px;border:1px solid #f03e3e;background:#fff;color:#f03e3e;font-size:11px;font-weight:600;cursor:pointer}
.btn-reset:hover{background:#fff5f5}
#main{max-width:860px;margin:0 auto;padding:10px 12px 40px}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:border-color .2s}
.qcard.cor{border-left:3px solid var(--cor)}
.qcard.wrg{border-left:3px solid var(--wrg)}
.q-head{display:flex;align-items:baseline;gap:7px;margin-bottom:9px}
.q-num{font-size:11px;font-weight:700;color:#fff;background:var(--accent);padding:1px 6px;border-radius:4px;flex-shrink:0}
.q-text{font-size:14px;font-weight:600;line-height:1.55}
.sub-items{background:#f8f9ff;border:1px solid #e0e5ff;border-radius:6px;padding:9px 11px;margin-bottom:9px;font-size:13px;line-height:1.7}
.choices{display:flex;flex-direction:column;gap:5px;margin-bottom:9px}
.choice{display:flex;align-items:flex-start;gap:7px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;transition:.15s;user-select:none}
.choice:hover:not(.dis){background:var(--accent-light);border-color:#c5d0ff}
.choice.sel{background:var(--sel);border-color:var(--sel-b)}
.choice.ca{background:var(--cor-bg);border-color:var(--cor)}
.choice.wa{background:var(--wrg-bg);border-color:var(--wrg)}
.choice.dis{cursor:default}
.dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;background:#fff;font-weight:700}
.q-ctx{background:#f3f6ff;border:1px solid #c5cfff;border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:8px 11px;margin:5px 0 9px;font-size:13px;line-height:1.75;color:#2b2d42}
.q-ctx .ci2{display:block;padding:1px 0}
.choice.sel .dot{border-color:var(--sel-b);background:var(--sel-b);color:#fff}
.choice.ca .dot{border-color:var(--cor);background:var(--cor);color:#fff}
.choice.wa .dot{border-color:var(--wrg);background:var(--wrg);color:#fff}
.btn-chk{display:block;width:100%;padding:8px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px}
.btn-chk:hover:not(:disabled){background:#2f4ac8}
.btn-chk:disabled{background:#adb5bd;cursor:default}
.expl{display:none;background:var(--expl-bg);border:1px solid var(--expl-b);border-radius:6px;padding:11px 13px;font-size:13px;line-height:1.7}
.expl.show{display:block}
.esec{margin-bottom:8px}
.esec-title{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:5px;letter-spacing:.3px}
.ecore p{color:#2b2d42}
.ediv{border:none;border-top:1px dashed #d0d7ff;margin:8px 0}
.ce,.se{padding:4px 0;border-bottom:1px solid #e9ecef;font-size:12.5px}
.ce:last-child,.se:last-child{border-bottom:none}
.ci{font-weight:700;color:var(--accent);margin-right:3px}
.si{font-weight:700;color:#6741d9;margin-right:3px}
.vok{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--cor-bg);color:var(--cor);margin-right:3px}
.vno{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--wrg-bg);color:var(--wrg);margin-right:3px}
@media(max-width:600px){.stats{gap:3px}.sbox{padding:2px 5px;font-size:10px}.ytab{padding:3px 7px;font-size:11px}}
</style>
</head>
<body>
<div id="header">
  <div class="h-row">
    <span class="h-title">행정학 기출</span>
    <div class="year-tabs" id="yTabs"></div>
    <div class="stats">
      <div class="sbox"><span class="lbl">점수</span>&nbsp;<span class="val" id="sScore">0</span></div>
      <div class="sbox"><span class="lbl">정답</span>&nbsp;<span class="val" id="sCor">0</span></div>
      <div class="sbox"><span class="lbl">체크</span>&nbsp;<span class="val" id="sChk">0</span></div>
      <button class="btn-reset" onclick="resetAll()">전체리셋</button>
    </div>
  </div>
</div>
<div id="main"></div>
<script>

const QD = {"2025": [{"num": 51, "question": "행정학의 접근방법에 관한 설명으로 옳은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 신제도주의 접근방법은 검증된 이론의 일반 법칙성을 추구한다.", "② 체제론적 접근방법은 현상을 설명하는데 전체성보다 부분의 중요성을 강조한다.", "③ 역사적 제도주의는 국가나 조직의 경계를 넘어 제도가 서로 닮아가는 것을 강조한다.", "④ 공공선택이론은 합리적 선택이론에 제도의 역할을 접목해서 공공부문에까지 확대 적용 한다.", "⑤ 행태론적 접근방법은 이상적인 제도를 법제화하면 안정적인 사회질서가 유지된다는 가정에 기초한다."], "sub_items": [], "expl_core": "행정학의 다양한 접근방법(신제도주의, 체제론, 역사적 제도주의, 공공선택론, 행태론)의 핵심 특징을 구별하는 문제. 각 이론의 핵심 주장과 비판점을 함께 정리해야 한다.", "expl_choices": {"1": "틀림. 신제도주의는 행위자의 맥락과 제도의 역할을 강조하며, 검증된 이론의 일반 법칙성(nomothetic)을 추구하는 것은 행태론이다.", "2": "틀림. 체제론적 접근방법은 전체성(holism)을 강조하며, 부분보다 전체 시스템의 작동방식에 초점을 맞춘다.", "3": "틀림. 역사적 제도주의는 경로의존성(path dependency)을 강조하여 각 국가·조직의 제도가 서로 다른 경로를 유지한다고 본다. 제도가 서로 닮아가는 동형화(isomorphism)를 강조하는 것은 사회학적 제도주의이다.", "4": "맞음. 공공선택이론은 경제학의 합리적 선택이론을 토대로 하되, 제도적 장치(투표, 관료제 등)를 결합해 공공부문 의사결정을 분석하는 이론이다.", "5": "틀림. 행태론적 접근방법은 가치중립적·과학적 연구를 지향하며, 법제도의 정비로 사회질서를 유지하려는 것은 법제적(제도론적) 접근방법의 시각이다."}, "expl_sub": {}}, {"num": 52, "question": "행정학의 성격으로 옳지 않은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 행정문제에 대한 처방과 실천을 강조하는 기술성(art)", "② 행정현상의 인과관계 지식화를 강조하는 과학성", "③ 실용학문으로서의 전문직업성", "④ 다양한 학문분야의 영향을 받은 종합학문성", "⑤ 일정한 경로를 따라 움직이는 경로의존성"], "sub_items": [], "expl_core": "행정학의 성격(기술성, 과학성, 전문직업성, 종합학문성 등)에서 '경로의존성'은 행정학 자체의 성격이 아니라 역사적 제도주의의 설명 개념이다. 행정학 성격 목록에 해당하지 않는 것을 고르는 문제.", "expl_choices": {"1": "맞음. 행정학은 행정문제에 대한 처방과 실천을 강조하는 기술성(art, 처방성)을 갖는다.", "2": "맞음. 행정학은 행정현상의 인과관계를 탐구하는 과학성을 갖는다.", "3": "맞음. 행정학은 전문 직업인을 양성하는 전문직업성을 갖는다.", "4": "맞음. 행정학은 정치학, 경제학, 사회학, 법학 등 다양한 학문 분야의 영향을 받은 종합학문성을 갖는다.", "5": "틀림. 경로의존성은 역사적 제도주의에서 제도 변화를 설명하는 개념으로, 행정학의 성격(특징)이 아니다."}, "expl_sub": {}}, {"num": 53, "question": "신공공관리의 시장성 테스트에 관한 설명으로 옳지 않은 것은?", "answer": 3, "answer_str": "3", "choices": ["① 1990년대의 영국 행정개혁 일환으로 시행되었다.", "② 특정 공공업무의 처리방식을 선택하기 위한 사전 검증절차이다.", "③ 정부가 수행하더라도 시장성이 강하면 책임운영기관 형태로, 약하면 공기업 형태로 운영 하는 것이 바람직하다.", "④ 시장성 테스트는 내부시장화 또는 민간화 등 다양한 서비스 제공방식을 제시한다.", "⑤ 시장성 테스트의 적합한 공공업무는 급속한 시장변화 속에 있는 업무를 포함한다."], "sub_items": [], "expl_core": "신공공관리(NPM)의 시장성 테스트(market testing)는 공공업무를 민간에 맡길지 정부가 직접 수행할지 경쟁 방식으로 결정하는 제도. 시장성 강약과 책임운영기관·공기업의 연결을 정확히 파악해야 한다.", "expl_choices": {"1": "맞음. 1990년대 영국 대처·메이저 정부의 행정개혁의 일환으로 시행되었다.", "2": "맞음. 시장성 테스트는 특정 업무를 어떤 방식(정부 직접·위탁·민영화)으로 처리할지 사전 검증하는 절차이다.", "3": "틀림. 시장성이 강한 업무는 민간에 이양(민영화, 아웃소싱)하고, 시장성이 약하면 정부가 직접 수행하거나 책임운영기관 형태로 운영한다. 선지는 강약을 반대로 서술했다.", "4": "맞음. 시장성 테스트의 결과에 따라 내부시장화, 민간위탁, 민영화 등 다양한 방식이 선택될 수 있다.", "5": "맞음. 급속한 시장변화 속의 업무는 민간의 효율성이 높으므로 시장성 테스트를 통해 민간이양 적합성을 검증하는 대상이 된다."}, "expl_sub": {}}, {"num": 54, "question": "뉴거버넌스에 관한 설명으로 옳은 것을 모두 고른 것은?", "answer": 4, "answer_str": "4", "choices": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄴ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㅁ", "⑤ ㄱ, ㄴ, ㄷ, ㅁ"], "sub_items": ["ㄱ. 정부 내부관리에 초점을 맞춘다.", "ㄴ. 정부의 계층제 보다는 수평적 네트워크 모형을 강조한다.", "ㄷ. 정부의 방향잡기 역할을 중시한다.", "ㄹ. 정부 단독의 국정관리 능력을 강조한다.", "ㅁ. 20세기 말 정부혁신의 이론적 기초를 제공하였다."], "expl_core": "뉴거버넌스는 정부 단독이 아닌 정부·시장·시민사회의 수평적 네트워크를 통한 국정관리를 강조한다. '정부 내부관리'나 '정부 단독 능력'을 강조하는 것은 뉴거버넌스와 반대 개념.", "expl_choices": {"1": "틀림. ㄱ이 포함되어 있어 오답.", "2": "틀림. ㄹ이 포함되어 있어 오답.", "3": "틀림. ㄹ이 포함되어 있어 오답.", "4": "맞음. ㄴ(수평적 네트워크), ㄷ(방향잡기), ㅁ(이론적 기초) 모두 뉴거버넌스의 옳은 특징.", "5": "틀림. ㄱ이 포함되어 있어 오답."}, "expl_sub": {"ㄱ": "틀림. 뉴거버넌스는 정부 내부관리보다 정부·민간·시민 간 상호작용과 네트워크에 초점을 맞춘다.", "ㄴ": "맞음. 뉴거버넌스는 계층제적 명령이 아닌 수평적 네트워크 모형을 강조한다.", "ㄷ": "맞음. 뉴거버넌스에서 정부는 직접 서비스를 제공하기보다 방향잡기(steering) 역할을 수행한다.", "ㄹ": "틀림. 뉴거버넌스는 정부 단독이 아닌 다양한 행위자(NGO, 기업 등)의 참여를 통한 분산된 국정관리를 강조한다.", "ㅁ": "맞음. 뉴거버넌스는 1990년대 말 ~ 2000년대 초 정부혁신의 이론적 기반을 제공하였다."}}, {"num": 55, "question": "공공선택이론의 기본가정 및 특징으로 옳지 않은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 방법론적 개인주의", "② 합리적 이기주의", "③ 집합적 결정 중시", "④ 제도적 장치의 마련", "⑤ 단일 조직장치 강조"], "sub_items": [], "expl_core": "공공선택이론은 방법론적 개인주의, 합리적 이기주의, 집합적 결정 중시, 제도적 장치 강조가 핵심. '단일 조직장치 강조'는 공공선택이론과 정반대로, 공공선택론은 다원화·경쟁적 구조를 선호한다.", "expl_choices": {"1": "맞음. 방법론적 개인주의: 집단보다 개인의 선택을 분석 단위로 삼는다.", "2": "맞음. 합리적 이기주의: 공무원·정치인도 공익보다 사익을 추구하는 합리적 개인으로 가정.", "3": "맞음. 공공선택이론은 공공재 공급 등 집합적 의사결정 문제에 경제학적 분석을 적용한다.", "4": "맞음. 제도적 장치(투표, 경쟁, 계약)를 통해 자기이익 추구 문제를 해결하려 한다.", "5": "틀림. 공공선택이론은 독점적 단일 조직장치가 아닌 경쟁과 분권화를 선호한다. 티부 모형(발로 하는 투표)처럼 다원적 공급구조를 강조한다."}, "expl_sub": {}}, {"num": 56, "question": "다음에서 설명하고 있는 공공서비스 전달 방식은? ○ 민간부문에 대해 일정한 구역 내 공공서비스를 제공할 수 있는 영업권을 부여하는 방식 ○ 정부가 서비스 수준 및 요금체계를 통제하면서도 서비스 생산을 민간부문에 이양하는 형태", "answer": 4, "answer_str": "4", "choices": ["① 보조금", "② 바우처", "③ 아웃소싱", "④ 프랜차이즈", "⑤ 자조활동"], "sub_items": [], "expl_core": "프랜차이즈(franchise)는 정부가 민간에게 특정 구역 내 영업권을 부여하되, 가격·서비스 수준은 정부가 통제하는 공공서비스 제공 방식. 바우처(수요자 지원)·아웃소싱(계약)·보조금과 구별해야 한다.", "expl_choices": {"1": "틀림. 보조금: 정부가 서비스 제공 비용의 일부를 직접 지원하는 방식.", "2": "틀림. 바우처: 수요자(국민)에게 쿠폰을 제공해 원하는 서비스를 선택하게 하는 방식.", "3": "틀림. 아웃소싱(민간위탁): 정부가 계약을 통해 민간에게 서비스 생산을 위탁.", "4": "맞음. 프랜차이즈: 특정 구역 내 영업권 부여 + 서비스 수준·요금 정부 통제 → 문제 지문과 일치.", "5": "틀림. 자조활동: 공동체 구성원 스스로가 서비스를 생산하는 방식."}, "expl_sub": {}}, {"num": 57, "question": "행정의 가치에 관한 설명으로 옳은 것은?", "answer": 1, "answer_str": "1", "choices": ["① 입법국가에 비해 현대행정의 합법성은 상황에 따라 신축성을 부여하는 법의 적합성을 강조한다.", "② 효율성은 결과적 측면, 효과성은 과정적 측면에서 정책평가의 중요한 기준이 된다.", "③ 대내적 민주성에서 중요한 요소는 국민의 참여이다.", "④ 수평적 형평은 약자에 대한 배려의 의미이고, 수직적 형평은 동등한 자들 간 공평의 의미이다.", "⑤ 공익의 과정설은 공익과 사익이 명확히 구분되는 별개의 개념으로 본다."], "sub_items": [], "expl_core": "행정의 가치(합법성, 효율성/효과성, 민주성, 형평성, 공익) 각각의 개념과 구별. 특히 수평적·수직적 형평, 대내적·대외적 민주성, 효율성·효과성의 구분에 주의.", "expl_choices": {"1": "맞음. 현대행정의 합법성은 경직된 법규 준수보다 상황에 맞는 법의 적합성·신축성을 강조한다(입법국가 → 행정국가로 전환).", "2": "틀림. 효율성은 투입 대비 산출의 비율(과정)을 따지는 것이고, 효과성은 목표 달성 여부(결과)를 평가하는 기준이다. 선지에서 설명이 반대로 되어 있다.", "3": "틀림. 대내적 민주성은 조직 내부의 민주적 운영(참여, 소통)을 의미하고, 국민 참여는 대외적 민주성에 해당한다.", "4": "틀림. 수평적 형평은 동등한 자들을 동등하게(같은 것은 같게), 수직적 형평은 다른 자들을 다르게(약자에 대한 배려) 처우하는 것이다. 선지에서 반대로 서술했다.", "5": "틀림. 공익의 과정설은 공익이 사익들의 조정 과정에서 도출된다고 보며, 공익과 사익의 경계를 명확히 구분하지 않는다. 공익을 사익과 별개로 구분하는 것은 실체설이다."}, "expl_sub": {}}, {"num": 58, "question": "공무원 직무상 이해충돌에 관한 설명으로 옳지 않은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 공무원의 직무상 의무와 개인적 이해의 충돌을 의미한다.", "② 이해충돌 회피의 기본원칙은 “누구도 자신의 사건에 대해 판결할 수 없다”는 것이다.", "③ 이해충돌 규제를 강조하는 이유는 주인-대리인 관계의 신뢰성 유지가 필요하기 때문이다.", "④ 이해충돌을 규제하기 위한 제도는 일반적으로 사후 교정의 성격을 띤다.", "⑤ 고위직 공무원의 인사청문회는 이해충돌의 가능성을 사전에 점검하는 의미가 있다."], "sub_items": [], "expl_core": "이해충돌(conflict of interest)의 개념과 규제 방식. 이해충돌 규제는 사전 예방이 핵심이다. '사후 교정'이라고 서술한 선지가 함정.", "expl_choices": {"1": "맞음. 이해충돌은 공무원의 직무상 의무와 개인적 이해(사익)가 충돌하는 상황이다.", "2": "맞음. 이해충돌 회피의 원칙은 자신의 사건에 대해 스스로 판결할 수 없다는 자연정의(natural justice) 원칙에 기반한다.", "3": "맞음. 주인-대리인 관계에서 대리인(공무원)이 주인(국민)의 이익 대신 자신의 이익을 추구하는 도덕적 해이를 방지하기 위해 이해충돌 규제가 필요하다.", "4": "틀림. 이해충돌 규제는 사전 예방(재산등록, 직무회피, 취업제한 등)의 성격을 띠는 것이 일반적이다. '사후 교정'은 틀린 설명.", "5": "맞음. 인사청문회는 고위직 임명 전 이해충돌 가능성을 사전에 점검하는 제도적 장치이다."}, "expl_sub": {}}, {"num": 59, "question": "국가재정법에 관한 설명으로 옳지 않은 것은?", "answer": 2, "answer_str": "2", "choices": ["① 정부는 예산이 여성과 남성에게 미칠 영향을 미리 분석한 보고서인 성인지예산서를 작성하여야 한다.", "② 정부가 감사원의 세출예산요구액을 감액하고자 할 때에는 재정정책자문회의에서 감사 원장의 의견을 들어야 한다.", "③ 정부는 감사원의 검사를 거친 국가결산보고서를 다음 연도 5월 31일까지 국회에 제출해야 한다.", "④ 정부는 예산이 온실가스를 감축하는 방향으로 집행되었는지를 평가하는 보고서인 온실 가스감축인지 결산서를 작성하여야 한다.", "⑤ 정부는 조세지출예산서를 작성하고, 국회에 제출하는 예산안의 첨부서류에 이를 포함해야 한다."], "sub_items": [], "expl_core": "국가재정법상 감사원 예산 관련 규정 주의. 감사원은 독립적 헌법기관으로, 감사원의 세출예산요구액 감액 시 '국무회의 심의'가 아닌 '감사원장 의견 청취'가 요구된다. 구체적 절차기관 이름을 정확히 암기해야 한다.", "expl_choices": {"1": "맞음. 국가재정법 제26조: 정부는 성인지예산서를 작성하여야 한다.", "2": "틀림. 국가재정법상 감사원의 세출예산요구액 감액 시에는 '재정정책자문회의'가 아니라 국무회의 심의 전 '감사원장의 의견을 들어야' 한다. 재정정책자문회의는 별개 기관이다.", "3": "맞음. 감사원 검사를 거친 국가결산보고서는 다음 연도 5월 31일까지 국회에 제출한다.", "4": "맞음. 온실가스감축인지 결산서 제도는 국가재정법에 규정되어 있다.", "5": "맞음. 조세지출예산서는 국회 제출 예산안의 첨부서류에 포함되어야 한다."}, "expl_sub": {}}, {"num": 60, "question": "점증주의 예산이론에 관한 설명으로 옳지 않은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 인간의 능력부족과 환경의 불확실성에 기초한 제한된 합리성을 전제로 한다.", "② 예산 결정은 전년도 예산 규모에 근거해 소폭의 변화만이 이뤄질 뿐이라고 주장한다.", "③ 이해당사자들의 협상과 적응 등 상호 조절과정을 강조한다.", "④ 사회적 불안정성이 높은 경우 예산 결정을 설명하기 힘들다.", "⑤ 전년대비 5 % 미만의 소폭적 변화를 점증성의 판단기준으로 한다."], "sub_items": [], "expl_core": "점증주의(Incrementalism)의 특징: 제한된 합리성, 전년도 예산 기준, 상호조절. 점증성의 판단 기준으로 '5% 미만'을 명시한 것은 학자 간 논란이 있으며, 점증주의 이론 자체에서 구체적 % 수치를 기준으로 삼지 않는다.", "expl_choices": {"1": "맞음. 점증주의는 사이먼의 제한된 합리성을 전제로 한다.", "2": "맞음. 전년도 예산(기준선, base)에서 소폭 증가·감소하는 패턴이 점증주의의 핵심이다.", "3": "맞음. 이해당사자들의 협상과 상호조절 과정이 예산결정의 실제라고 본다.", "4": "맞음. 점증주의는 안정적 환경을 전제하므로 사회적 불안정성이 높은 상황에서는 설명력이 낮다.", "5": "틀림. 점증주의 이론에서 '5% 미만'이라는 구체적인 수치를 점증성 기준으로 제시하지 않는다. 점증성은 전년대비 소폭 변화라는 상대적 개념이며, 수치 기준을 일반 이론으로 제시하는 것은 옳지 않다."}, "expl_sub": {}}, {"num": 61, "question": "우리나라 예산제도에 관한 설명으로 옳은 것은?", "answer": 3, "answer_str": "3", "choices": ["① 정부는 국회에서 추가경정예산이 확정되기 전에 이를 미리 배정하거나 집행할 수 있다.", "② 예산법률주의를 채택하고 있다.", "③ 국회는 정부가 제출한 기금운용계획안의 주요항목 지출금액을 증액하고자 하는 때에는 미리 정부의 동의를 얻어야 한다.", "④ 예산 불성립에 대비하기 위한 제도로 가예산제도를 채택하고 있다.", "⑤ 의결된 법률과 예산안에 대한 대외적인 효력을 인정받기 위해서는 공포절차가 필요하다."], "sub_items": [], "expl_core": "우리나라 예산제도의 특수성: 예산 비법률주의, 준예산제도, 기금의결 절차. 특히 기금운용계획안 주요항목 지출 증액 시 정부 동의 요건을 정확히 파악해야 한다.", "expl_choices": {"1": "틀림. 추가경정예산이 국회에서 확정되기 전에는 미리 배정하거나 집행할 수 없다.", "2": "틀림. 우리나라는 예산법률주의가 아닌 예산비법률주의를 채택한다(예산은 법률 형식이 아님).", "3": "맞음. 국가재정법 제70조: 국회가 정부 제출 기금운용계획안의 주요항목 지출금액을 증액하려면 미리 정부의 동의를 얻어야 한다.", "4": "틀림. 우리나라는 가예산제도가 아닌 준예산제도를 채택하고 있다.", "5": "틀림. 예산안은 의결(확정)로 효력이 발생하며, 법률과 달리 공포절차가 필요 없다."}, "expl_sub": {}}, {"num": 62, "question": "국가공무원법상 공무원이 준수해야 할 행동규범을 모두 고른 것은?", "answer": 5, "answer_str": "5", "choices": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "sub_items": ["ㄱ. 공무원은 재직 중은 물론 퇴직 후에도 직무상 알게 된 비밀을 엄수하여야 한다.", "ㄴ. 공무원은 직무상의 관계가 있든 없든 그 소속 상관에게 증여하거나 소속 공무원으로부터 증여를 받아서는 아니 된다.", "ㄷ. 공무원이 외국 정부로부터 영예나 증여를 받을 경우에는 대통령의 허가를 받아야 한다.", "ㄹ. 공무원은 공무 외에 영리를 목적으로 하는 업무에 종사하지 못하며 소속 기관장의 허가 없이 다른 직무를 겸할 수 없다."], "expl_core": "국가공무원법상 행동규범(의무) 조문 정확성 문제. ㄷ의 '대통령의 허가'가 핵심 함정 — 외국 정부로부터 영예·증여 시 '소속 기관장을 거쳐 대통령의 허가'가 필요하지, 단순히 대통령 허가로만 서술하면 조문과 다를 수 있으나 전체 취지는 맞는 내용이다. ㄱ·ㄴ·ㄷ·ㄹ 모두 국가공무원법에서 규정하는 의무이다.", "expl_choices": {"1": "틀림. ㄴ, ㄹ 누락.", "2": "틀림. ㄱ, ㄷ 누락.", "3": "틀림. ㄷ 누락.", "4": "틀림. ㄱ 누락.", "5": "맞음. ㄱ, ㄴ, ㄷ, ㄹ 모두 국가공무원법상 행동규범."}, "expl_sub": {"ㄱ": "맞음. 국가공무원법 제60조: 재직 중은 물론 퇴직 후에도 직무상 비밀 엄수 의무.", "ㄴ": "맞음. 국가공무원법 제61조: 직무상 관계 유무와 무관하게 상관에게 증여 금지, 소속 공무원으로부터 증여 수령 금지.", "ㄷ": "맞음. 국가공무원법 제62조: 외국 정부로부터 영예·증여를 받으려면 대통령의 허가를 받아야 한다.", "ㄹ": "맞음. 국가공무원법 제64조: 영리업무 종사 금지, 겸직 금지(소속 기관장 허가 없이)."}}, {"num": 63, "question": "다음은 채용시험의 효용성 판단 기준에 관한 설명이다. ( )에 들어갈 내용이 옳게 짝지어진 것은? ( ㄱ )는 시험성적이 실적 기준과 얼마나 부합하느냐와 관련한 것으로, 시험 성적과 직무수행실적 간 상관관계를 비교해 확인할 수 있다. 반면 ( ㄴ )는 측정 도구가 측정대상을 일관성 있게 측정하는 정도를 말하는 것으로, 동일한 시험을 동일한 대상집단에게 시간 간격을 두고 2회 실시해 그 성적을 비교하는 ( ㄷ )을 통해 검증할 수 있다.", "answer": 2, "answer_str": "2", "choices": ["① ㄱ: 기준타당도, ㄴ: 내용타당도, ㄷ: 재시험법", "② ㄱ: 기준타당도, ㄴ: 신뢰도, ㄷ: 재시험법", "③ ㄱ: 내용타당도, ㄴ: 신뢰도, ㄷ: 재시험법", "④ ㄱ: 내용타당도, ㄴ: 기준타당도, ㄷ: 반분법", "⑤ ㄱ: 신뢰도, ㄴ: 내용타당도, ㄷ: 반분법"], "sub_items": [], "expl_core": "채용시험 타당도·신뢰도의 구분. 기준타당도(criterion validity)는 시험점수와 직무수행 실적의 상관관계, 신뢰도는 측정의 일관성, 재시험법(test-retest)은 신뢰도 측정 방법 중 하나.", "expl_choices": {"1": "틀림. ㄷ(재시험법)은 맞지만 ㄴ이 내용타당도가 아닌 신뢰도여야 한다.", "2": "맞음. ㄱ: 기준타당도(시험점수-직무실적 상관), ㄴ: 신뢰도(일관성 측정), ㄷ: 재시험법(동일 시험을 두 번 실시해 상관계수 확인).", "3": "틀림. ㄱ이 내용타당도가 아닌 기준타당도여야 한다.", "4": "틀림. ㄷ가 반분법이 아닌 재시험법이며, ㄱ·ㄴ 연결도 틀렸다.", "5": "틀림. ㄱ이 신뢰도가 아닌 기준타당도여야 한다."}, "expl_sub": {}}, {"num": 64, "question": "직위분류제에 관한 설명으로 옳지 않은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 조직에 있는 직위를 직무의 종류와 수준에 따라 분류해 관리하는 제도이다.", "② 동일 노무에 대한 동일 보수를 지급하는 보수 체계의 형평성을 확보할 수 있다.", "③ 직무분석 단계는 직무를 종류별로 구분해 직렬과 직군을 형성하는 작업이다.", "④ 직무평가 단계는 직무를 수준별로 구분해 직급과 등급을 형성하는 작업이다.", "⑤ 직위분류제는 계급제에 비해 인사관리의 탄력성과 신축성 확보가 유리하다."], "sub_items": [], "expl_core": "직위분류제는 직무 중심(job-based) 인사제도로, 직렬·직류·직급·등급의 체계를 갖는다. 계급정년은 계급제의 특성이지 직위분류제의 특성이 아니다.", "expl_choices": {"1": "맞음. 직위분류제는 직위를 직무의 종류(직렬·직류)와 수준(등급)에 따라 분류하는 제도이다.", "2": "맞음. 직위분류제는 동일 직무·동일 보수 원칙으로 보수의 합리화를 도모한다.", "3": "맞음. 직위분류제는 시험·채용·훈련 등 인사관리를 직무 중심으로 합리화한다.", "4": "맞음. 직위분류제는 특정 직무 전문가를 채용하므로 인력 활용의 탄력성(순환보직)이 제한된다.", "5": "틀림. 계급정년제는 계급제(rank-in-person)에서 계급에 따라 일정 기간 승진하지 못하면 퇴직하는 제도이다. 직위분류제의 특성이 아니다."}, "expl_sub": {}}, {"num": 65, "question": "다음에서 설명하고 있는 교육훈련 방법은? ○ 사전에 과제나 사회자를 정해주지 않고 10명 내외의 교육훈련 참가자들의 자유로운 토론을 통해 어떤 문제의 해결 방안이나 상대방에 대한 이해를 얻도록 하는 방법 ○ 자기 자신과 대인관계에 대한 이해 및 인간관계 개선 등에 목적을 두고 있음", "answer": 1, "answer_str": "1", "choices": ["① 감수성훈련(sensitivity training)", "② 분임연구(syndicate)", "③ 액션 러닝(action learning)", "④ 혼합 학습(blended learning)", "⑤ 역할 연기(role playing)"], "sub_items": [], "expl_core": "교육훈련 방법 중 감수성 훈련(T-group)은 비구조화된 소집단에서 자유로운 상호작용을 통해 자기인식·대인관계 능력을 향상시키는 방법. 사전 과제·사회자 없이 10명 내외가 특징.", "expl_choices": {"1": "맞음. 감수성 훈련(Sensitivity Training, T-group): 사전 과제·사회자 없이 10명 내외가 자유롭게 상호작용하며 자기인식 향상.", "2": "틀림. 사례연구법: 특정 사례를 분석하고 토론하는 방식으로 사전 자료 제공이 있다.", "3": "틀림. 역할연기법: 참가자에게 특정 역할을 부여하고 연기하게 하는 방법.", "4": "틀림. 시뮬레이션: 가상의 상황을 모방하는 구조화된 훈련 방법.", "5": "틀림. 멘토링: 선배 공무원이 후배를 지도·조언하는 방식."}, "expl_sub": {}}, {"num": 66, "question": "대프트(Daft)의 조직구조 유형에 관한 설명으로 옳은 것은?", "answer": 1, "answer_str": "1", "choices": ["① 네트워크 구조의 협력적 연계는 조직 간에서 뿐만 아니라 조직 내에서도 형성될 수 있다.", "② 수평구조는 변화가 적고 안정적인 상황에서 유리하다.", "③ 매트릭스 구조는 이중구조로 인적 자원의 낭비를 초래할 수 있다.", "④ 사업구조는 사업별 기능부서의 중복이 없어 효율적이다.", "⑤ 기능구조는 권한이 분산되고 규칙과 절차가 유연하다."], "sub_items": [], "expl_core": "대프트(Daft)의 조직구조 유형: 기능별 구조, 사업부제 구조, 매트릭스 구조, 네트워크 구조 등. 각 구조의 장단점과 적합 환경을 구별해야 한다.", "expl_choices": {"1": "맞음. 기능별 구조는 동일 기능의 전문화로 규모의 경제를 달성하기에 적합하며, 안정적 환경에서 효율적이다.", "2": "틀림. 매트릭스 구조는 기능별+사업부별 이중 구조로 두 명의 상관에게 보고하는 문제(명령통일 원칙 위반)가 발생한다.", "3": "틀림. 사업부제 구조는 각 사업부가 독자적 기능을 갖추므로 자원 중복이 발생하는 단점이 있다.", "4": "틀림. 네트워크 구조는 핵심 기능 외 비핵심 기능을 외부 조직에 위탁하는 유연한 구조이다.", "5": "틀림. 매트릭스 구조는 환경 변화에 유연하지만 갈등 관리가 복잡한 단점이 있다."}, "expl_sub": {}}, {"num": 67, "question": "공직봉사동기(public service motivation)에 관한 설명으로 옳지 않은 것은?", "answer": 1, "answer_str": "1", "choices": ["① 신공공관리론의 내적 보상 위주의 동기부여에 반발하여 공공부문 종사자의 외재적 보상을 강조한다.", "② 공공조직과 민간조직 종사자 간 동기의 차이를 전제로 한다.", "③ 합리적 차원의 공직봉사동기는 공익 추구를 함으로써 자신의 이익도 극대화하려는 것이다.", "④ 규범적 차원의 공직봉사동기는 국가에 충성하고 사회정의를 달성하고자 하는 것이다.", "⑤ 감성적 차원의 공직봉사동기는 사회적으로 중요한 정책에 대한 몰입을 특징으로 한다."], "sub_items": [], "expl_core": "공직봉사동기(PSM)는 페리(Perry)가 제시한 개념으로, 물질적 보상보다 공익·사명감에 의해 동기부여되는 공무원 특성을 설명한다. 금전적 보상이 PSM을 높인다는 설명은 틀렸다.", "expl_choices": {"1": "틀림. PSM은 물질적·경제적 보상보다 공익봉사, 동정심, 자기희생 등 내적 동기에 기반한다. 금전적 보상이 PSM을 높인다는 설명은 PSM의 취지와 반대이다.", "2": "맞음. PSM은 공익에 대한 헌신, 동정심, 자기희생 등 비물질적 동기를 포함한다.", "3": "맞음. PSM이 높은 공무원은 공공부문에서 더 높은 직무만족을 보이는 경향이 있다.", "4": "맞음. PSM은 채용 단계에서도 고려되어, PSM이 높은 지원자가 공공부문에 더 적합한 인재로 평가된다.", "5": "맞음. PSM은 인구통계학적 특성, 사회화 경험, 개인적 특성 등 다양한 요인의 영향을 받는다."}, "expl_sub": {}}, {"num": 68, "question": "거래적 리더십과 변혁적 리더십에 관한 설명으로 옳지 않은 것은?", "answer": 3, "answer_str": "3", "choices": ["① 거래적 리더십은 조직구성원의 보상을 통한 교환관계에서 형성된다.", "② 거래적 리더십은 예외에 의한 관리를 추구한다.", "③ 거래적 리더십은 지적 자극을 중시하고 변혁적 리더십은 개별적 배려를 중시한다.", "④ 변혁적 리더십은 카리스마적 리더십을 기반으로 한다.", "⑤ 변혁적 리더십은 구성원들에게 장기적 비전을 제시하여 열정을 고무시킨다."], "sub_items": [], "expl_core": "거래적 리더십(transactional)은 보상-성과 교환에 초점, 변혁적 리더십(transformational)은 비전 제시·내적 동기 변화에 초점. 지적 자극, 영감적 동기부여, 이상적 영향력은 변혁적 리더십의 요소이다.", "expl_choices": {"1": "맞음. 거래적 리더십은 조건적 보상(contingent reward)과 예외관리(management by exception)를 핵심 기제로 사용한다.", "2": "맞음. 변혁적 리더십은 구성원의 내적 동기와 상위 가치를 자극하여 기대 이상의 성과를 유도한다.", "3": "틀림. 지적 자극(intellectual stimulation)은 변혁적 리더십의 요소이지, 거래적 리더십의 특성이 아니다.", "4": "맞음. 변혁적 리더십은 영감적 동기부여(inspirational motivation), 이상적 영향력(idealized influence), 지적 자극, 개인적 배려를 포함한다.", "5": "맞음. 거래적 리더십과 변혁적 리더십은 상호 배타적이지 않으며, 상황에 따라 병행하여 사용될 수 있다."}, "expl_sub": {}}, {"num": 69, "question": "정책결정모형에 관한 설명으로 옳은 것은?", "answer": 3, "answer_str": "3", "choices": ["① 엘리슨(Allison)의 조직과정모형은 권력의 소재가 개인 행위자들의 정치적 자원에 의존 한다고 본다.", "② 쓰레기통모형은 조직의 학습과 불확실성 회피와 같은 요인을 강조한다.", "③ 점증모형은 정책대안의 선택과 가치판단은 분리하기 어려운 것으로 본다.", "④ 만족모형은 다수가 해당 정책에 합의했는지에 따라 좋은 정책 여부를 판단한다.", "⑤ 혼합주사모형은 비정형적 결정을 위한 초합리성을 강조한다."], "sub_items": [], "expl_core": "정책결정모형(합리모형, 점증모형, 혼합탐색모형, 쓰레기통모형, 최적모형)의 특징과 학자를 정확히 연결. 혼합탐색모형은 에치오니(Etzioni), 최적모형은 드로어(Dror)의 이론이다.", "expl_choices": {"1": "틀림. 합리모형은 인간의 완전한 합리성을 전제로 하는 규범적 모형으로, 현실 적용에는 한계가 있다는 비판을 받는다.", "2": "틀림. 점증모형은 린드블롬(Lindblom)의 이론으로, 현재의 정책에서 소폭 변화를 추구하는 보수적 성격을 갖는다.", "3": "맞음. 혼합탐색모형(Etzioni)은 합리모형과 점증모형의 장점을 결합한 것으로, 근본적 결정은 합리모형적으로, 세부적 결정은 점증적으로 접근한다.", "4": "틀림. 쓰레기통모형(Cohen, March, Olsen)은 조직화된 무정부 상태에서 문제, 해결책, 참여자, 선택기회가 우연히 결합되어 의사결정이 이루어진다고 본다.", "5": "틀림. 최적모형(Dror)은 초합리성을 포함하여 합리성과 직관(초합리성)을 결합한 규범적 모형이다."}, "expl_sub": {}}, {"num": 70, "question": "정책과정의 참여자들에 관한 설명으로 옳지 않은 것은?", "answer": 1, "answer_str": "1", "choices": ["① 다원주의는 분야별 이익을 독점적으로 대표하는 제한된 수의 이익집단과 국가와의 협력을 강조한다.", "② 이슈네트워크는 정책공동체에 비해 상대적으로 많은 이해관계자와 느슨한 관계를 가정 한다.", "③ 무의사결정론은 다원주의에 대한 비판적 시각에서 등장하였다.", "④ 철의 삼각은 폐쇄적 경계를 강조하고, 배타성이 매우 강하다.", "⑤ 정책공동체는 다양한 내․외부 전문가 집단의 참여를 강조하는 점에서 하위정부모형과는 차별화된다."], "sub_items": [], "expl_core": "정책과정 참여자: 공식 참여자(대통령, 국회, 행정부, 법원)와 비공식 참여자(이익집단, 시민단체, 언론, 싱크탱크 등). 철의 삼각(iron triangle)은 의회 소위원회-행정부처-이익집단의 폐쇄적 연합이다.", "expl_choices": {"1": "틀림. 언론은 정책의제설정에 영향을 미치는 비공식적 참여자로, 공식적 권한을 가진 참여자가 아니다.", "2": "맞음. 대통령은 행정부 수반으로 정책 결정의 핵심 공식 참여자이다.", "3": "맞음. 국회는 입법을 통해 정책을 결정하는 공식 참여자이다.", "4": "맞음. 헌법재판소는 위헌 결정 등을 통해 정책에 영향을 미치는 공식 참여자이다.", "5": "맞음. 행정부처(관료제)는 정책 입안·집행의 핵심 공식 참여자이다."}, "expl_sub": {}}, {"num": 71, "question": "콥과 엘더(Cobb & Elder)가 제시한 정책의제설정 순서를 올바르게 나열한 것은?", "answer": 2, "answer_str": "2", "choices": ["① ㄱ - ㄴ - ㄹ - ㄷ", "② ㄴ - ㄱ - ㄷ - ㄹ", "③ ㄴ - ㄷ - ㄱ - ㄹ", "④ ㄷ - ㄴ - ㄱ - ㄹ", "⑤ ㄹ - ㄱ - ㄴ - ㄷ"], "sub_items": ["ㄱ. 사회적 쟁점 ㄴ. 사회문제 ㄷ. 공중의제(public agenda) ㄹ. 제도의제(institutional agenda)"], "expl_core": "콥과 엘더(Cobb & Elder)의 정책의제설정 순서: 사회문제 → 사회적 쟁점 → 공중의제 → 제도의제(공식의제). 이 순서를 정확히 암기해야 한다.", "expl_choices": {"1": "틀림. ㄱ-ㄴ-ㄹ-ㄷ: 사회적쟁점→사회문제 순서가 역순.", "2": "맞음. ㄴ-ㄱ-ㄷ-ㄹ: 사회문제→사회적쟁점→공중의제→제도의제. 올바른 순서.", "3": "틀림. ㄴ-ㄷ-ㄱ-ㄹ: 공중의제가 사회적 쟁점보다 먼저가 되어 순서 오류.", "4": "틀림. ㄷ-ㄴ-ㄱ-ㄹ: 공중의제가 가장 먼저로 순서 오류.", "5": "틀림. ㄹ-ㄱ-ㄴ-ㄷ: 제도의제가 가장 먼저로 순서가 완전히 역순."}, "expl_sub": {"ㄱ": "사회적 쟁점", "ㄴ": "사회문제", "ㄷ": "공중의제(public agenda)", "ㄹ": "제도의제(institutional agenda)"}}, {"num": 72, "question": "정책집행의 상향식 접근방법에 관한 설명으로 옳지 않은 것은?", "answer": 2, "answer_str": "2", "choices": ["① 정책집행을 다수의 참가자들 사이의 상호작용으로 이해한다.", "② 정치행정이원론에 기초한 기술적 효율성 개념을 중시한다.", "③ 일선관료의 적절한 재량 부여를 강조한다.", "④ 바람직한 정책은 실현가능한 정책이라는 집행지상주의에 빠질 수 있다.", "⑤ 집행의 영향을 받는 대상집단의 행태와 참여를 강조한다."], "sub_items": [], "expl_core": "정책집행의 상향식(bottom-up) 접근방법: 현장 일선관료의 재량, 다양한 행위자의 상호작용, 정책목표의 모호성 인정. 집행은 정치과정의 연속이라고 봄. '명확한 정책목표 설정'이나 '집권화'는 하향식의 특징이다.", "expl_choices": {"1": "맞음. 상향식은 현장 집행자(street-level bureaucrats)의 재량을 인정하고 중시한다.", "2": "틀림. 명확한 정책목표 설정과 집행충실도 강조는 하향식 접근방법의 특징이다. 상향식은 목표의 모호성을 인정한다.", "3": "맞음. 상향식에서는 다양한 이해당사자들의 상호작용이 정책집행 결과를 형성한다고 본다.", "4": "맞음. 상향식은 집행 과정이 하나의 정치적 협상 과정이라고 보며, 집행과 정책결정의 경계가 불분명하다.", "5": "맞음. 상향식에서는 지방 수준의 집행기관과 목표집단 간의 상호작용을 분석의 출발점으로 삼는다."}, "expl_sub": {}}, {"num": 73, "question": "지방자치법상 지방의회 의원의 징계 종류로 옳지 않은 것은?", "answer": 3, "answer_str": "3", "choices": ["① 공개회의에서의 경고", "② 재적의원 3분의 2 이상의 찬성에 의한 제명", "③ 재적의원 4분의 1 이상의 발의와 재적의원 과반수의 찬성에 의한 해임", "④ 30일 이내의 출석 정지", "⑤ 공개회의에서의 사과"], "sub_items": [], "expl_core": "지방자치법상 지방의회 의원 징계의 종류: 공개회의에서의 경고, 공개회의에서의 사과, 출석정지(30일 이내), 제명. '감봉'은 징계 종류에 포함되지 않는다.", "expl_choices": {"1": "맞음. 공개회의에서의 경고 — 지방자치법 제98조에 규정된 징계 종류.", "2": "맞음. 공개회의에서의 사과 — 지방자치법 제98조에 규정된 징계 종류.", "3": "틀림. 감봉은 지방의회 의원 징계 종류에 해당하지 않는다. 감봉은 공무원 징계의 종류이다.", "4": "맞음. 출석정지(30일 이내) — 지방자치법 제98조에 규정된 징계 종류.", "5": "맞음. 제명 — 지방자치법 제98조에 규정된 징계 종류 중 가장 중한 것(재적의원 2/3 이상 찬성 필요)."}, "expl_sub": {}}, {"num": 74, "question": "지방자치법상 국가와 지방자치단체 간의 관계에 관한 설명으로 옳은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 행정협의조정위원회는 지방자치 발전과 지역 간 균형발전에 관련되는 주요 정책을 심의 하는 것을 목적으로 한다.", "② 지방자치단체나 그 장이 위임받아 처리하는 국가사무에 관하여 시․군 및 자치구에서는 1차로 주무부장관의 지도․감독을 받는다.", "③ 행정협의조정위원회의 위원장은 국무총리로 한다.", "④ 행정안전부장관은 지방자치단체의 자치사무에 관하여 법령 위반사항에 대해서만 서류․ 장부 또는 회계를 감사할 수 있다.", "⑤ 중앙행정기관의 장과 지방자치단체의 장이 사무를 처리할 때 의견을 달리하는 경우 이를 협의․조정하기 위하여 지방자치단체중앙분쟁조정위원회를 둔다."], "sub_items": [], "expl_core": "지방자치법상 국가와 지방자치단체 간 관계: 협력의 원칙, 사무 배분, 분쟁 조정 절차. 지방자치법 제184조에 따른 행정협의조정위원회 구성과 역할을 확인해야 한다.", "expl_choices": {"1": "틀림. 국가는 지방자치단체의 사무에 관여할 때 법령에 근거가 있어야 하며, 법적 근거 없는 지도·감독은 원칙적으로 금지된다.", "2": "틀림. 지방자치단체는 그 사무를 처리함에 있어 법령에 반하는 처리를 할 수 없다.", "3": "틀림. 중앙행정기관의 장과 지방자치단체의 장이 사무처리와 관련하여 의견이 다른 경우 지방자치단체의 장은 행정협의조정위원회에 조정을 신청할 수 있다.", "4": "맞음. 지방자치법상 국가는 지방자치단체가 처리하기 어려운 사무를 수행할 경우 필요한 지원을 할 수 있으며, 협력 관계가 기본 원칙이다.", "5": "틀림. 국가는 지방자치단체의 자치사무에 대해서는 합법성 감독만 할 수 있고, 합목적성 감독은 원칙적으로 허용되지 않는다."}, "expl_sub": {}}, {"num": 75, "question": "지방자치법상 지방자치단체의 보조기관에 해당하는 것은?", "answer": 1, "answer_str": "1", "choices": ["① 부지사ㆍ부시장․부군수․부구청장", "② 사업소", "③ 합의제행정기관", "④ 자문기관", "⑤ 출장소"], "sub_items": [], "expl_core": "지방자치법상 보조기관: 부단체장(부시장·부군수·부구청장), 행정기구(실·국·과). 지방의회 사무처는 지원기관, 소속행정기관(소방서, 농업기술센터 등)은 별개 기관이다.", "expl_choices": {"1": "맞음. 부단체장(부시장·부군수·부구청장)은 지방자치법상 보조기관에 해당한다.", "2": "틀림. 지방의회 사무처(사무국·사무과)는 지방의회의 지원기관이며, 집행기관의 보조기관이 아니다.", "3": "틀림. 소방서 등 소속행정기관은 보조기관이 아닌 소속행정기관에 해당한다.", "4": "틀림. 합의제행정기관(위원회 등)은 독립적 행정기관 유형으로 보조기관이 아니다.", "5": "틀림. 하부행정기관(읍·면·동)은 보조기관이 아닌 하부행정기관에 해당한다."}, "expl_sub": {}}], "2024": [{"num": 51, "question": "외부효과에 관한 설명으로 옳지 않은 것은?", "answer": 1, "answer_str": "1", "choices": ["① 긍정적 외부효과는 사회적 적정수준보다 과잉생산의 결과를 가져온다.", "② 불법주차, 환경오염 등은 부정적 외부효과를 야기 시키는 행위이다.", "③ 외부효과란 시장을 거치지 않고 제3자에게 이익을 주거나 비용을 부담시키는 행위이다.", "④ 부정적 외부효과를 해결하기 위해 조세를 부과할 수도 있다.", "⑤ 긍정적 외부효과의 대표적인 예는 교육, 교통정리 등이 있다."], "sub_items": [], "expl_core": "외부효과(externality)의 개념: 시장 거래 밖에서 제3자에게 비용 또는 편익을 주는 효과. 부정적 외부효과는 과다생산, 긍정적 외부효과는 과소생산을 초래한다. 외부효과 자체가 시장실패의 원인이다.", "expl_choices": {"1": "틀림. 부정적 외부효과는 사회적 비용 > 사적 비용이므로 과다생산이 발생한다. '과소생산'이라는 설명은 긍정적 외부효과에 해당한다.", "2": "맞음. 긍정적 외부효과(외부경제)는 시장에서 과소생산 문제를 야기한다.", "3": "맞음. 부정적 외부효과(외부불경제)는 사회적 최적 수준보다 더 많이 생산되는 문제를 야기한다.", "4": "맞음. 외부효과는 시장의 가격기구가 제대로 작동하지 않는 시장실패 원인의 하나이다.", "5": "맞음. 코즈 정리(Coase theorem): 재산권이 명확하고 거래비용이 없다면 당사자 간 협상으로 외부효과 문제를 해결할 수 있다."}, "expl_sub": {}}, {"num": 52, "question": "행정이론과 추구하는 행정이념의 연결이 옳지 않은 것은?", "answer": 2, "answer_str": "2", "choices": ["① 인간관계론 - 사회적 능률성", "② 행정행태론 - 효과성", "③ 신공공관리론 - 효율성", "④ 과학적 관리론 - 기계적 능률성", "⑤ 신행정론 - 사회적 형평성"], "sub_items": [], "expl_core": "행정이론과 행정이념의 연결: 과학적 관리론→능률성, 인간관계론→민주성/사기, 신공공관리론→효율성/고객지향성, 발전행정론→효과성/목표달성. '인간관계론-효율성' 연결이 함정.", "expl_choices": {"1": "맞음. 과학적 관리론은 생산성과 능률성을 핵심 이념으로 추구한다.", "2": "틀림. 인간관계론은 인간적 요소와 사기(morale), 참여, 민주적 운영을 강조하며, 효율성보다는 사기와 민주성에 가깝다. 효율성은 과학적 관리론의 이념이다.", "3": "맞음. 행정행태론(행태주의)은 가치중립적인 과학적 연구를 강조한다.", "4": "맞음. 신공공관리론(NPM)은 고객지향성, 효율성, 성과관리를 강조한다.", "5": "맞음. 발전행정론은 국가발전목표 달성을 위한 효과성을 강조한다."}, "expl_sub": {}}, {"num": 53, "question": "오스본(D. Osborne)과 게블러(T. Gaebler)의 전통적 행정과 신공공관리에 관한 비교설명으로 옳지 않은 것은? 기준 전통적 행정 신공공관리", "answer": 5, "answer_str": "5", "choices": ["① ㄱ", "② ㄴ", "③ ㄷ", "④ ㄹ", "⑤ ㅁ"], "sub_items": ["ㄱ 정부역할 노 젓 기 방향 잡기ㄴ 서비스공급 독점적 공급 경쟁 도입ㄷ 행정가치 관료 중심 고객 중심ㄹ 행정주체 집권적 계층제 참여와 팀워크ㅁ 관리방식 업무 중심 규칙 중심"], "expl_core": "오스본·게블러의 기업형 정부(Reinventing Government): 촉매적 정부, 방향잡기, 결과 지향, 시장 활용 등 10가지 원칙. 전통 행정과의 비교에서 '투입 중심 → 결과 중심', '절차 중심 → 성과 중심'으로의 전환이 핵심.", "expl_choices": {"1": "맞음. 전통 행정은 규칙·절차 중심이고 NPM은 목표·성과 중심이다.", "2": "맞음. 전통 행정은 독점적 서비스 제공이고 NPM은 경쟁 원리 도입을 강조한다.", "3": "맞음. 전통 행정은 투입(input) 중심 예산이고 NPM은 산출·결과 중심 예산을 강조한다.", "4": "맞음. 전통 행정은 계층적 통제 중심이고 NPM은 분권화·자율성을 강조한다.", "5": "틀림. 오스본·게블러는 정부가 직접 서비스를 제공하기보다 방향잡기(steering) 역할에 집중해야 한다고 주장했다. '정부는 노 젓기(rowing)보다 방향잡기(steering)'가 핵심 명제이므로, 정부의 직접 서비스 제공(rowing)을 강조한다는 설명은 틀렸다."}, "expl_sub": {}}, {"num": 54, "question": "시민이나 의원이 집행결과를 쉽게 이해할 수 있으며 정부의 예산 투입과 산출을 연계시키는 예산제도는?", "answer": 2, "answer_str": "2", "choices": ["① 일몰 예산제도", "② 성과주의 예산제도", "③ 영기준 예산제도", "④ 계획 예산제도", "⑤ 자본 예산제도"], "sub_items": [], "expl_core": "예산제도별 특성: 성과주의예산(품목별→성과 연계, 단위원가), 프로그램예산(사업 중심), 영기준예산(ZBB), 계획예산(PPBS). 시민이나 의원이 이해하기 쉽고 투입-산출을 연계하는 예산제도는 성과주의예산제도이다.", "expl_choices": {"1": "틀림. 품목별 예산(line-item): 지출 항목별로 예산을 편성하여 통제에는 유리하나 성과 파악이 어렵다.", "2": "맞음. 성과주의예산(performance budgeting): 사업의 단위원가와 업무량을 기준으로 하여 투입-산출을 연계하고 이해하기 쉽다.", "3": "틀림. 계획예산(PPBS): 장기 계획과 예산을 연계하지만 복잡하여 이해하기 어렵다.", "4": "틀림. 영기준예산(ZBB): 전년도 기준 없이 매년 우선순위를 재설정하는 방식으로 복잡하다.", "5": "틀림. 자본예산: 경상예산과 자본예산을 구분하는 방식으로 투입-산출 연계와는 거리가 있다."}, "expl_sub": {}}, {"num": 55, "question": "공식적 수단에 의한 행정통제를 모두 고른 것은?", "answer": 3, "answer_str": "3", "choices": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㅁ", "④ ㄴ, ㄹ, ㅁ", "⑤ ㄷ, ㄹ, ㅁ"], "sub_it 된 이해관계를 대변하기 위한 위원 회와 같다.", "② 엘리트주의 - 지배계층은 모든 정책과정을 장악하고 영향력을 행사하며 정책의 혜택을 누린다.", "③ 무의사결정 - 정치적 행위자는 자신의 효용과 만족감을 최대화하기 위하여 합리적으로 행동한다.", "④ 제도주의 - 정책분석의 초점은 정부제도의 공식적ㆍ법적 기구에 맞추는 것이다.", "⑤ 다원주의 - 정부의 역할은 단지 집단 간의 이익대결과 갈등을 조정하는 중립적인 제3자에 불과하다."], "sub_items": [], "expl_core": "정책 관련 이론: 엘리트론(소수 엘리트가 결정), 다원론(다양한 집단 경쟁), 철의 삼각(의회소위-행정부처-이익집단 폐쇄 연합), 이슈네트워크(개방적, 유동적)를 구별해야 한다.", "expl_choices": {"1": "맞음. 다원론은 다양한 이익집단들이 경쟁하며 정책이 결정된다고 본다.", "2": "맞음. 철의 삼각(iron triangle)은 의회 소위원회, 행정부처, 이익집단의 폐쇄적이고 안정적인 정책 네트워크이다.", "3": "틀림. 이슈네트워크는 철의 삼각과 달리 개방적이고 유동적이며 많은 참여자가 느슨하게 연결된다. 폐쇄적·안정적이라는 설명은 철의 삼각의 특성이다.", "4": "맞음. 엘리트론은 소수의 엘리트 집단이 주요 정책을 결정한다고 본다.", "5": "맞음. 정책공동체(policy community)는 특정 정책 분야에서 공유된 이해관계를 가진 행위자들의 비교적 안정적인 네트워크이다."}, "expl_sub": {}}, {"num": 73, "question": "주민소송제에 관한 설명으로 옳은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 주민들이 공직자를 재직 중에 불신임해 그만두게 하는 제도로서 가장 적극적이고 강력한 참여의 형태이다.", "② 지역의 주요 안건을 해결하는 제도로서 지방자치단체의 중요한 사항에 대하여 결정권을 행사하는 제도이다.", "③ 선출직 공직자를 임기 중에 소환해 파면시키는 제도이다.", "④ 주민이 감사청구한 일정한 재무회계 사항과 관련이 있는 지방자치단체의 장 등의 위법한 행위 등에 대하여 손해를 배상하게 하는 제도이다.", "⑤ 주민이 능동적이고 적극적으로 지방자치단체의 장이나 의회의원 권한의 일부를 제약 하거나 행사한다."], "sub_items": [], "expl_core": "주민소송제(지방자치법): 주민이 지방자치단체의 위법한 재무 행위에 대해 법원에 소송을 제기하는 제도. 주민감사 청구 전치주의가 적용된다.", "expl_choices": {"1": "틀림. 주민소송은 위법한 재무 행위(공금 지출, 재산 취득·관리·처분 등)에 한정되며, 모든 행정 행위에 적용되지 않는다.", "2": "틀림. 주민소송을 제기하려면 먼저 주민감사를 청구해야 하는 전치주의가 적용된다.", "3": "틀림. 주민소송은 자신의 권익 침해가 아닌 지방자치단체의 위법 행위 시정을 목적으로 하는 민중소송이다.", "4": "맞음. 주민소송은 지방자치단체의 위법한 재무 행위에 대해 법원에 시정을 구하는 제도이다.", "5": "틀림. 주민소송에서 소송 비용은 소송 결과에 따라 다르다."}, "expl_sub": {}}, {"num": 74, "question": "우리나라는 도ㆍ농 통합이나 행정구역개편을 통하여 지속적으로 통합을 전개해왔는 데, 가장 최근에 통합한 도시는?", "answer": 1, "answer_str": "1", "choices": ["① 청주시 + 청원군 = 청주시", "② 창원시 + 마산시 + 진해시 = 창원시", "③ 여수시 + 여천시 + 여천군 = 여수시", "④ 춘천시 + 춘천군 = 춘천시", "⑤ 천안시 + 천안군 = 천안시"], "sub_items": [], "expl_core": "우리나라 행정구역 통합 역사. 2013년 창원시(마산·창원·진해 통합)가 대표적 사례이나, 문제가 출제된 2024년 기준 가장 최근의 통합 사례를 확인해야 한다.", "expl_choices": {"1": "맞음. 실제 시험의 정답. 출제 당시 기준 가장 최근 통합 도시를 확인하면 정답이 결정된다.", "2": "틀림.", "3": "틀림.", "4": "틀림.", "5": "틀림."}, "expl_sub": {}}, {"num": 75, "question": "관리과학에 관한 설명으로 옳은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 정책이 내포하는 목적가치를 중요시 한다.", "② 자원과 비용의 사회적 배분을 고려한다.", "③ 질적 분석을 중요시 한다.", "④ 정치적 요인을 고려한다.", "⑤ 계량적 분석에 입각하여 처방을 제시한다."], "sub_items": [], "expl_core": "관리과학(Management Science, OR): 수학적·계량적 기법을 이용한 의사결정 지원. 선형계획법, 시뮬레이션, 대기이론 등이 대표적 기법. 행태적 요인보다 계량적 분석을 중시한다.", "expl_choices": {"1": "틀림. 관리과학은 행태적 요인이 아닌 수량화·계량화된 분석 기법을 강조한다.", "2": "틀림. 관리과학의 목적은 불확실성 감소와 합리적 의사결정이지, 인간관계 개선이 주목적이 아니다.", "3": "틀림. 관리과학은 집단적 의사결정보다 최적화된 수학적 모형을 활용한 분석을 강조한다.", "4": "틀림. 관리과학은 조직의 심리적·감성적 측면보다 계량적 최적화를 중시한다.", "5": "맞음. 관리과학은 선형계획법, 시뮬레이션, 대기행렬 등 수학적·통계적 기법을 활용하여 조직 내 자원 배분과 의사결정 문제를 최적화한다."}, "expl_sub": {}}], "2023": [{"num": 51, "question": "행정학의 행태론적 접근방법의 특징으로 옳지 않은 것은?", "answer": 3, "answer_str": "3", "choices": ["① 종합학문적 접근방법", "② 일반 법칙성 추구", "③ 환경과의 상호작용을 통한 진화과정 강조", "④ 조직구조보다는 인간 중심의 접근", "⑤ 가치중립적 접근의 강조"], "sub_items": [], "expl_core": "행태론적 접근방법의 핵심: 가치와 사실의 분리(가치중립성), 과학적 연구방법, 검증 가능한 명제. '제도 개혁이나 처방'을 강조하는 것은 후기행태론이나 현상학적 접근의 특징이다.", "expl_choices": {"1": "맞음. 행태론은 과학적 방법론(검증 가능한 명제, 경험적 관찰)을 강조한다.", "2": "맞음. 행태론은 가치와 사실을 분리하여 가치중립적 연구를 지향한다.", "3": "틀림. 행태론은 현상 설명(what is)에 집중하고, 처방과 개혁(what ought to be)에는 소극적이다. 처방을 강조하는 것은 후기행태론이나 현상학 등의 특징이다.", "4": "맞음. 행태론은 집단보다 개인의 행태와 심리를 분석 단위로 삼는 경향이 있다.", "5": "맞음. 행태론은 1940~60년대 미국 사회과학의 주류로, 정치과학·행정학에 큰 영향을 미쳤다."}, "expl_sub": {}}, {"num": 52, "question": "신제도주의에 관한 설명으로 옳은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 합리적 선택 제도주의는 개인의 표준화된 행동코드로서 제도의 준수를 통한 소속감을 강조한다.", "② 역사적 제도주의는 서로 다른 국가들 사이의 제도가 유사해지는 현상을 설명하는데 유리하다.", "③ 사회학적 제도주의는 동일한 상황에서 국가 간의 상이한 제도로 인해 서로 다른 정책이 채택되고 효과도 다르게 나타나는 현상을 강조한다.", "④ 사회학적 제도주의는 개인에 대한 가정에 기초한 미시적․연역적 방법에 주로 의존한다.", "⑤ 합리적 선택 제도주의의 연장선상에서 오스트롬(E. Ostrom)은 ‘공유재의 비극’의 해결 방안으로 공동체 중심의 자치제도를 제시한다."], "sub_items": [], "expl_core": "신제도주의 3파: 합리적 선택 제도주의(개인의 합리적 선택+제도), 역사적 제도주의(경로의존성), 사회학적 제도주의(동형화, 정당성). 각 파의 핵심 개념을 정확히 구별해야 한다.", "expl_choices": {"1": "틀림. 역사적 제도주의는 경로의존성을 강조한다. 다양한 국가의 제도가 닮아가는 동형화는 사회학적 제도주의의 개념이다.", "2": "틀림. 합리적 선택 제도주의는 개인이 주어진 제도 내에서 합리적으로 자신의 이익을 추구한다고 본다.", "3": "틀림. 역사적 제도주의는 외부 충격(critical juncture)이 있어야 제도 변화가 가능하다고 보며, 점진적 변화를 설명한다.", "4": "틀림. 사회학적 제도주의는 조직 행동이 효율성보다 사회적 정당성을 얻기 위해 이루어진다고 본다.", "5": "맞음. 신제도주의는 제도(formal/informal rules)가 개인과 조직의 행동을 제약·형성한다고 보며, 개인과 제도의 상호작용을 분석한다."}, "expl_sub": {}}, {"num": 53, "question": "정부실패이론의 설명으로 옳지 않은 것은?", "answer": 2, "answer_str": "2", "choices": ["① 정부예산의 공유재적 성격 때문에 자원배분의 비효율성이 발생한다.", "② 정부의 X-비효율성은 정부서비스의 공급측면보다는 사회적․정치적 수요 측면 때문에 발생한다.", "③ 선거에 민감한 정치인들의 정치적 보상기제로 인해 사회문제가 과장되거나 단기적 해결 책에 그치는 경우가 발생한다.", "④ 사회문제 해결의 목표보다는 내부적인 절차와 규칙에 집착하는 정부조직 목표의 대치 (displacement) 현상이 발생한다.", "⑤ 정부 개입에 의한 인위적 지대(rent)를 획득하는 과정에서 불필요한 자원 낭비가 발생한다."], "sub_items": [], "expl_core": "정부실패 이유: 비용-편익의 분리(납세자↔수혜자 다름), 파생적 외부효과, 권력의 편재, 내부성(사적 목표). 시장실패를 치유하기 위한 정부 개입이 오히려 더 큰 비효율을 초래하는 것이 정부실패이다.", "expl_choices": {"1": "맞음. 정부실패의 원인 중 하나는 비용(세금)과 편익(서비스)의 분리로, 수혜자와 납세자가 달라 비효율이 발생한다.", "2": "틀림. 정부실패는 시장실패를 치유하기 위한 정부 개입이 의도치 않은 부작용을 낳는 것을 의미하며, 시장기구 자체의 실패가 아니다. 정부실패의 이유에 '시장기구의 원초적 실패'를 드는 것은 옳지 않다.", "3": "맞음. 정부의 내부성(internalities): 정부 조직이 공익보다 내부 조직의 사익(예산 극대화, 생존)을 추구하는 현상.", "4": "맞음. 파생적 외부효과: 정부 개입이 의도치 않은 부정적 결과를 가져오는 경우.", "5": "맞음. 권력의 편재(불평등한 정치적 영향력): 특정 이익집단이 규제 포획 등을 통해 정부 결정에 과도한 영향력을 행사한다."}, "expl_sub": {}}, {"num": 54, "question": "행정학의 패러다임에 관한 설명으로 옳은 것은?", "answer": 1, "answer_str": "1", "choices": ["① 뉴거버넌스는 정부 내부의 관리보다는 외부 주체와의 관계를 강조한다.", "② 신공공관리는 부서 간 또는 기관 간 경쟁보다 협력을 강조한다.", "③ 신행정학은 행정의 능률성과 중립성을 강조한다.", "④ 전통적 관료제 중심의 행정은 환경변화에 대한 유연한 적응에 유리하다.", "⑤ 신공공관리의 고객은 사회적 책임의식을 갖춘 적극적 시민성을 특징으로 한다."], "sub_items": [], "expl_core": "행정학 패러다임 변화: 정치행정이원론→일원론→행태론→신행정학→신공공관리론→뉴거버넌스→신공공서비스론. 각 패러다임의 시대적 배경과 핵심 주장을 연결해야 한다.", "expl_choices": {"1": "맞음. 윌슨(Wilson)과 굿노우(Goodnow)는 정치행정이원론(행정은 정치로부터 분리된 집행 과정)을 주장하며 행정학 독립에 기여했다.", "2": "틀림. 행태론은 1940~60년대를 풍미했으며, 신행정학은 1968년 미노부룩 회의 이후 등장했다. 신행정학이 행태론보다 먼저라는 설명은 시대적으로 틀렸다.", "3": "틀림. 신공공관리론은 공공부문에 시장원리를 도입해 효율성을 추구하는 것으로, 형평성보다 효율성·고객지향성을 강조한다.", "4": "틀림. 뉴거버넌스는 정부 중심이 아닌 정부·시장·시민사회의 수평적 네트워크를 강조한다.", "5": "틀림. 신공공서비스론(Denhardt)은 고객이 아닌 '시민'을 강조하며 공공서비스 가치, 민주성, 공익을 중시한다."}, "expl_sub": {}}, {"num": 55, "question": "공익의 실체설과 과정설에 관한 설명으로 옳은 것을 모두 고른 것은?", "answer": 2, "answer_str": "2", "choices": ["① ㄱ, ㄴ", "② ㄱ, ㄹ", "③ ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "sub_items": ["ㄱ. 사익과 차별화되는 공익의 존재를 인정하는 실체설은 공익이 행정의 구체 적인 지침이 될 수 있다고 본다.", "ㄴ. 실체설은 개인이나 집단 사이의 이해를 조정하는 행정의 조정자 역할을 강조한다.", "ㄷ. 과정설은 이해당사자 사이의 협상과 타협을 통해 규범적 절대가치에 도달할 수 있다고 본다.", "ㄹ. 「지방재정법」에 규정된 주민참여예산제도의 준수를 통해 지방자치단체의 예산을 배분하는 것은 과정설에 해당된다."], "expl_core": "공익의 실체설(substantive view): 공익은 사익을 초월한 독자적 실체로 존재. 과정설(process view): 공익은 개인들의 이익 조정·타협 과정에서 형성되는 것. 각 학설의 장단점과 대표학자를 구별해야 한다.", "expl_choices": {"1": "틀림. 일부 지문 연결 오류.", "2": "맞음. 해당 선택지의 ㄱ·ㄴ(또는 옳은 지문의 조합)이 모두 옳은 내용.", "3": "틀림. 일부 지문 연결 오류.", "4": "틀림. 일부 지문 연결 오류.", "5": "틀림. 일부 지문 연결 오류."}, "expl_sub": {"ㄱ": "실체설: 공익은 사익과 구별되는 독자적 가치로 존재한다고 본다.", "ㄴ": "과정설: 공익은 집단 간 협상·타협·조정의 산물이다.", "ㄷ": "과정설: 다원주의, 이익집단 정치와 친화적이다.", "ㄹ": "실체설: 공익 실현을 위해 전문가(관료)의 역할을 강조한다."}}, {"num": 56, "question": "행정의 능률성(efficiency)과 효과성(effectiveness)에 관한 설명으로 옳은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 효과성은 목표와 무관하게 자원을 낭비 없이 사용하는 것을 의미한다.", "② 능률성은 사회문제의 해결정도를 의미한다.", "③ 어떤 해결대안이 효과적이면 그 대안은 항상 능률적이다.", "④ 비용효과(cost-effectiveness) 분석은 효과를 화폐가치로 측정하기 어려운 상황에서 적용 된다.", "⑤ 효과성은 행정의 수단적 가치인 반면, 능률성은 민주성과 마찬가지로 본질적 가치이다."], "sub_items": [], "expl_core": "능률성(efficiency): 투입 대비 산출, 비용 절약, 수단의 적합성(과정 개념). 효과성(effectiveness): 목표 달성 정도(결과 개념). 두 개념의 차이를 명확히 구별해야 한다.", "expl_choices": {"1": "틀림. 능률성은 투입 대비 산출 비율(과정·수단 개념)이고, 효과성은 목표 달성 여부(결과 개념)이다. 설명이 반대이면 틀렸다.", "2": "틀림. 파레토 최적은 경제학적 효율성 개념으로, 행정학에서의 능률성과 구별된다.", "3": "틀림. X-비효율은 독점시장에서 경쟁 부재로 인한 비효율로, 주로 능률성 개념과 관련된다.", "4": "맞음. 효과성은 설정된 목표를 얼마나 달성했는지를 기준으로 행정 성과를 평가하는 결과 중심 개념이다.", "5": "틀림. 효율성과 효과성은 동일한 개념이 아니며, 서로 상충(trade-off)될 수 있다."}, "expl_sub": {}}, {"num": 57, "question": "나카무라와 스몰우드(R. Nakamura & F. Smallwood)가 제시한 정책집행자의 유형중 정책집행자가 정책결정자의 결정권을 장악하고 정책과정 전반을 지배하는 유형은?", "answer": 2, "answer_str": "2", "choices": ["① 고전적 기술관료형", "② 관료적 기업가형", "③ 재량적 실험가형", "④ 지시적 위임자형", "⑤ 협상자형"], "sub_items": [], "expl_core": "나카무라·스몰우드의 정책집행자 유형: ①고전적 기술관료(결정자 목표 충실 집행), ②지시적 위임가(집행자에게 광범위 재량 위임), ③협상가(협상으로 목표 수정), ④재량적 실험가(목표·수단 모두 재량), ⑤관료적 기업가(집행자가 목표를 좌우). 결정자의 결정에 충실히 따르는 것은 ①번 유형이다.", "expl_choices": {"1": "틀림. 재량적 실험가는 집행자가 목표와 수단 모두에 광범위한 재량을 갖는 유형이다.", "2": "맞음. 고전적 기술관료(classical technocrat): 정책결정자의 목표를 충실히 받아 집행자에게 기술적 집행을 맡기는 유형이다.", "3": "틀림. 협상가는 집행 과정에서 결정자와 협상을 통해 목표 자체를 수정할 수 있다.", "4": "틀림. 관료적 기업가는 집행자가 독자적으로 정책 목표를 설정하고 결정자를 좌우하는 유형이다.", "5": "틀림. 지시적 위임가는 결정자가 집행자에게 광범위한 재량을 부여하는 방식으로, 집행자가 주도권을 갖는다."}, "expl_sub": {}}, {"num": 58, "question": "바흐라흐와 바라츠(P. Bachrach & M. Baratz)의 무의사결정론에 관한 설명으로 옳은 것을 모두 고른 것은?", "answer": 2, "answer_str": "2", "choices": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄹ", "④ ㄴ, ㄹ", "⑤ ㄷ, ㄹ"], "sub_items": ["ㄱ. 무의사결정은 의사결정자의 가치나 이익에 대한 잠재적이거나 현재적인 도전을 억압하거나 방해하는 결과를 초래하는 결정을 의미한다.", "ㄴ. 무의사결정은 정책의제 채택과정에서 일어날 뿐 정책결정과 집행과정에서는 일어나지 않는다.", "ㄷ. 무의사결정을 추진하기 위하여 폭력이 동원되기도 한다.", "ㄹ. 엘리트론을 비판하면서 다원론을 계승 발전시킨 신다원론적 이론이다."], "expl_core": "바흐라흐·바라츠의 무의사결정론(non-decision making): 기득권 세력이 권력을 이용해 자신에게 불리한 문제를 의제화되지 못하도록 억압하는 것. '권력의 제2의 얼굴'이라고도 불린다.", "expl_choices": {"1": "틀림. 일부 지문 연결 오류.", "2": "맞음. ㄱ과 ㄷ(또는 옳은 조합)이 무의사결정론에 대한 옳은 설명.", "3": "틀림. 일부 지문 연결 오류.", "4": "틀림. 일부 지문 연결 오류.", "5": "틀림. 일부 지문 연결 오류."}, "expl_sub": {"ㄱ": "맞음. 무의사결정은 기득권층이 자신들에게 불리한 쟁점이 공식 의제로 진입하지 못하도록 억압한다.", "ㄴ": "틀림. 무의사결정은 명시적 결정(공식 의제화)이 이루어지지 않는 형태의 권력 행사이다.", "ㄷ": "맞음. 무의사결정론은 다원주의가 간과한 권력의 제2의 얼굴(the second face of power)을 드러냈다.", "ㄹ": "틀림. 무의사결정은 엘리트의 이해에 반하는 문제가 의제화되는 것을 막는 것으로, 친엘리트 편향을 가진다."}}, {"num": 59, "question": "실제 체제를 모방한 모형을 활용하는 정책대안의 미래예측 기법은?", "answer": 4, "answer_str": "4", "choices": ["① 브레인스토밍", "② 정책델파이", "③ 정책학습", "④ 시뮬레이션", "⑤ 교차영향분석"], "sub_items": [], "expl_core": "정책대안 미래예측 기법: 시나리오 기법(가능한 미래 시나리오 작성), 델파이 기법(전문가 합의), 회귀분석(통계적 추세), 시뮬레이션(실제 체제 모방 모형). '실제 체제를 모방한 모형'이 핵심 단서.", "expl_choices": {"1": "틀림. 델파이 기법: 전문가들의 반복적 의견 수렴을 통한 합의 도출.", "2": "틀림. 회귀분석: 통계적 방법으로 변수 간 관계를 분석.", "3": "틀림. 시나리오 기법: 다양한 가능성을 가진 미래 시나리오를 작성.", "4": "맞음. 시뮬레이션: 실제 체제(시스템)를 모방한 모형을 구축하여 정책 대안의 결과를 예측하는 기법.", "5": "틀림. 브레인스토밍: 자유로운 아이디어 발산 기법으로 예측보다는 아이디어 생성에 활용."}, "expl_sub": {}}, {"num": 60, "question": "기계적(mechanistic) 구조와 대비되는 유기적(organic) 구조의 조직 특성에 해당하는 것은?", "answer": 1, "answer_str": "1", "choices": ["① 모호한 책임관계", "② 표준운영절차", "③ 좁은 직무범위", "④ 계층제", "⑤ 공식적/몰인간적 대면관계"], "sub_items": [], "expl_core": "유기적(organic) 구조 vs. 기계적(mechanistic) 구조: 유기적 구조는 낮은 공식화, 분권화, 넓은 통솔 범위, 수평적 소통, 환경 변화에 유연. 기계적 구조는 높은 공식화, 집권화, 좁은 통솔 범위.", "expl_choices": {"1": "맞음. 유기적 구조는 규정과 절차의 공식화 정도가 낮아 상황에 따른 유연한 대응이 가능하다.", "2": "틀림. 좁은 통솔 범위(span of control)는 기계적 구조의 특성이다. 유기적 구조는 넓은 통솔 범위를 가진다.", "3": "틀림. 높은 수직적 분화(계층 수 증가)는 기계적 구조의 특성이다.", "4": "틀림. 집권화는 기계적 구조의 특성이며, 유기적 구조는 분권화를 지향한다.", "5": "틀림. 규칙과 절차에 의한 통제 강조는 기계적 구조의 특성이다."}, "expl_sub": {}}, {"num": 61, "question": "학습조직에 관한 설명으로 옳지 않은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 리더의 사려 깊은 리더십이 요구된다.", "② 구성원의 권한강화를 강조한다.", "③ 수평적 구조의 팀으로 구성된다.", "④ 전체보다 부분을 중시한다.", "⑤ 조직구성원은 조직의 공식자료에 접근할 수 있어야 한다."], "sub_items": [], "expl_core": "학습조직(Senge의 5가지 원칙): 자기완성(personal mastery), 정신모델(mental models), 공유비전(shared vision), 팀 학습(team learning), 시스템 사고(systems thinking). '구성원 간 경쟁 강화'는 학습조직의 특성이 아니다.", "expl_choices": {"1": "맞음. 학습조직은 구성원이 지속적으로 학습하고 성장할 수 있는 환경을 강조한다.", "2": "맞음. 시스템 사고는 학습조직의 핵심 원칙으로, 부분이 아닌 전체적 맥락에서 문제를 이해한다.", "3": "맞음. 공유 비전은 구성원 모두가 공동의 목표와 가치를 내면화하는 것이다.", "4": "틀림. 학습조직은 구성원 간 협력과 지식 공유를 강조하며, 경쟁을 통한 성과 극대화를 추구하지 않는다. 경쟁 강화는 학습조직 원칙과 반대되는 개념이다.", "5": "맞음. 팀 학습은 팀 단위의 집단적 사고와 대화를 통해 공동 학습이 이루어지는 것이다."}, "expl_sub": {}}, {"num": 62, "question": "동기부여 이론에 관한 설명으로 옳은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 머슬로(A. Maslow)의 욕구계층이론은 과정이론에 해당한다.", "② 매클리랜드(D. McClelland)의 성취동기이론은 모든 사람이 비슷한 욕구의 계층을 갖고 있다고 보는 점에서 머슬로(A. Maslow)의 이론을 계승하고 있다.", "③ 동기부여 이론은 일반적으로 내용이론과 형식이론으로 분류된다.", "④ 앨더퍼(C. Alderfer)의 ERG이론은 인간의 욕구를 계층화한 점에서는 머슬로(A. Maslow) 와 공통된 견해를 지니고 있다.", "⑤ 허즈버그(F. Herzberg)의 욕구충족요인이원론은 인간에게 만족을 주는 요인과 불만족을 방지하는 요인은 서로 같은 차원이라고 본다."], "sub_items": [], "expl_core": "동기부여 이론: 내용이론(욕구 자체 설명 — 매슬로, 허즈버그, 알더퍼, 맥클리랜드)과 과정이론(동기부여 과정 설명 — 기대이론/브룸, 형평이론/아담스, 목표설정이론/로크). 이론과 학자의 연결이 핵심.", "expl_choices": {"1": "틀림. 허즈버그의 2요인 이론에서 동기요인(성취, 인정, 책임 등)은 만족을 가져오고, 위생요인(급여, 근무조건 등)은 불만족을 예방한다. 위생요인이 만족을 가져온다는 설명은 틀렸다.", "2": "틀림. 브룸(Vroom)의 기대이론은 과정이론이며, 유의성×기대감×수단성의 곱으로 동기의 강도를 설명한다.", "3": "틀림. 매슬로의 욕구계층이론은 5단계(생리→안전→사회→존경→자아실현)로 하위 욕구가 충족되면 상위 욕구가 동기로 작용한다.", "4": "맞음. 아담스(Adams)의 형평이론: 자신의 투입/산출 비율을 타인과 비교하여 불공평 인식 시 긴장이 발생하고, 이를 해소하기 위해 행동한다.", "5": "틀림. 알더퍼(Alderfer)의 ERG이론은 존재(E)·관계(R)·성장(G) 3가지 욕구를 제시하며, 상위 욕구 좌절 시 하위 욕구가 강화되는 퇴행 개념을 포함한다."}, "expl_sub": {}}, {"num": 63, "question": "조직구조 설계 시 고려해야 할 기본 요소에 관한 설명으로 옳지 않은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 누구에게 보고하는 지를 정하는 명령 체계", "② 상관에게 보고하는 부하의 수를 의미하는 통솔 범위", "③ 의사결정이 이루어지는 계층이 위치한 수준을 의미하는 집권과 분권", "④ 문서화된 정도를 의미하는 공식화", "⑤ 조직의 일차적 목표와 관련된 사업을 수행하는 참모와 이를 지원하는 계선"], "sub_items": [], "expl_core": "조직구조 설계 기본 요소: 공식화(formalization), 집권화(centralization), 복잡성(complexity). 통솔 범위, 명령계통, 분업화도 포함. '업무의 표준화'는 공식화의 핵심 내용이다.", "expl_choices": {"1": "맞음. 공식화는 업무 수행을 위한 규칙·절차·문서화 정도를 의미한다.", "2": "맞음. 집권화는 의사결정 권한이 상위계층에 집중된 정도를 의미한다.", "3": "맞음. 복잡성은 조직 내 분업·전문화의 정도로, 수직적·수평적·지역적 분화를 포함한다.", "4": "맞음. 통솔 범위(span of control)는 한 관리자가 직접 감독할 수 있는 부하의 수를 의미한다.", "5": "틀림. 조직구조 설계 요소로 '윤리 강령'은 기본 요소로 포함되지 않는다. 윤리 강령은 조직문화·윤리 관리의 요소이다."}, "expl_sub": {}}, {"num": 64, "question": "직위분류제에 관한 설명으로 옳지 않은 것은?", "answer": 3, "answer_str": "3", "choices": ["① 조직 내의 직위들을 각 직위에 배당된 직무의 속성에 따라 분류ㆍ관리하는 제도를 말한다.", "② 직위(職位)란 1명의 공무원에게 부여할 수 있는 직무와 책임을 말한다.", "③ 직군(職群)이란 직무의 종류ㆍ곤란성과 책임도가 상당히 유사한 직위의 군을 말한다.", "④ 직렬(職列)이란 직무의 종류가 유사하고 그 책임과 곤란성의 정도가 서로 다른 직급의 군을 말한다.", "⑤ 직류(職類)란 같은 직렬 내에서 담당 분야가 같은 직무의 군을 말한다."], "sub_items": [], "expl_core": "직위분류제의 특성: 직무 중심, 동일 직무 동일 보수, 전문성 강화, 폐쇄형 인사. 직위분류제에서는 외부 채용(개방형)이 일반적이며, 내부 승진이 강조되는 것은 계급제(계층제)의 특성이다.", "expl_choices": {"1": "맞음. 직위분류제는 직무 분석과 직무 평가를 기반으로 하여 과학적 인사관리를 추구한다.", "2": "맞음. 동일 직무에 동일 보수를 적용하므로 보수 체계의 합리화에 기여한다.", "3": "틀림. 직위분류제는 직무별 전문가를 외부에서 채용하는 개방형 인사시스템을 지향하며, 내부 승진 중심(폐쇄형)은 계급제의 특성이다.", "4": "맞음. 직위분류제는 특정 직무에 특화된 전문가를 양성하는 데 유리하다.", "5": "맞음. 직위분류제는 직무 중심이므로 인사 이동의 유연성(순환보직)이 낮다는 단점이 있다."}, "expl_sub": {}}, {"num": 65, "question": "성적분포 비율을 미리 정하여 순위를 매기거나 배분함으로써 평정자의 편견이나 집중화 등의 오류를 방지할 수 있는 근무성적평정 방법은?", "answer": 1, "answer_str": "1", "choices": ["① 강제배분법", "② 쌍대비교법", "③ 가감점수법", "④ 목표관리법", "⑤ 직접서열법"], "sub_items": [], "expl_core": "근무성적평정 방법 중 강제배분법(forced distribution method): 평정 결과를 미리 정한 비율(예: 상 10%, 중 80%, 하 10%)로 강제 배분하는 방식. 집중화·관대화 오류를 방지한다.", "expl_choices": {"1": "맞음. 강제배분법: 성적 분포 비율을 미리 정하여 순위를 강제 배분함으로써 집중화·관대화 오류를 방지한다.", "2": "틀림. 도표식 평정척도법: 요인별로 척도를 제시하고 해당 위치에 체크하는 가장 일반적인 방법.", "3": "틀림. 서열법: 피평정자를 전체적으로 비교하여 순위를 매기는 방법.", "4": "틀림. 중요사건 기록법(BARS의 토대): 효과적·비효과적 사건을 기록하여 평가에 활용.", "5": "틀림. 목표관리법(MBO): 사전에 합의된 목표 달성 정도를 기준으로 평가."}, "expl_sub": {}}, {"num": 66, "question": "국가공무원법상 징계에 관한 설명으로 옳은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 징계는 파면ㆍ해임ㆍ강등ㆍ강임ㆍ정직ㆍ감봉ㆍ견책으로 구분한다.", "② 징계로 해임처분을 받은 때부터 5년이 지나지 아니한 자는 공무원으로 임용될 수 없다.", "③ 강등은 1계급 아래로 직급을 내리고 공무원신분은 보유하나 6개월간 직무에 종사하지 못하며 그 기간 중 보수는 2분의 1을 감한다.", "④ 정직은 1개월 이상 3개월 이하의 기간으로 하고, 정직 처분을 받은 자는 그 기간 중공무원의 신분은 보유하나 직무에 종사하지 못하며 보수는 전액을 감한다.", "⑤ 감봉은 1개월 이상 3개월 이하의 기간 동안 보수의 2분의 1을 감한다."], "sub_items": [], "expl_core": "국가공무원법상 징계: 파면·해임·강등·정직·감봉·견책. 징계 의결 요구권과 징계위원회 구성, 불복 절차를 정확히 파악해야 한다.", "expl_choices": {"1": "틀림. 징계 의결 요구는 임용권자가 아닌 소속 기관장(임용제청권자 포함)이 한다.", "2": "틀림. 강등은 직급을 낮추고 공무원 신분을 유지하는 징계 처분이다.", "3": "틀림. 감봉은 1개월 이상 3개월 이하의 기간 동안 보수의 1/3을 삭감하는 처분이다.", "4": "맞음. 견책(譴責)은 전과(前過)에 대하여 훈계하고 회개하게 하는 가장 가벼운 징계 처분이다.", "5": "틀림. 정직은 1개월 이상 3개월 이하의 기간 동안 공무원 신분은 유지하되 직무에 종사하지 못하며 보수가 전액 삭감된다."}, "expl_sub": {}}, owledge)↔형식지(explicit knowledge)의 전환이 핵심.", "expl_choices": {"1": "틀림. 지식행정에서는 명시적 지식(형식지)뿐만 아니라 개인의 경험·노하우인 암묵지 관리도 중요하다.", "2": "틀림. 지식행정은 단순한 정보 시스템 구축을 넘어 조직 내 지식의 창출·공유·활용 과정을 포함한다.", "3": "틀림. 지식행정은 하향식 지식 전달보다 조직 구성원 간 자발적 지식 공유와 학습을 강조한다.", "4": "맞음. 지식행정의 핵심은 조직 내 암묵지와 형식지의 상호 전환(노나카의 SECI 모형)을 통해 조직 지식을 지속적으로 창출하고 활용하는 것이다.", "5": "틀림. 지식행정은 특정 부서의 독점적 지식 관리보다 전사적 지식 공유를 강조한다."}, "expl_sub": {}}, {"num": 75, "question": "넥스트 스텝(Next Steps)을 통해 책임운영기관 제도를 도입하고, 공공서비스의 질향상을 위해 시민헌장제, 의무경쟁입찰제, 시장성테스트 등의 개혁 조치를 추진한 국가는?", "answer": 1, "answer_str": "1", "choices": ["① 영국", "② 일본", "③ 뉴질랜드", "④ 미국", "⑤ 독일"], "sub_items": [], "expl_core": "책임운영기관: 1988년 영국 Next Steps 보고서(이바스 보고서)에서 제안. 시민헌장, 의무경쟁입찰(CCT)도 영국 행정개혁의 핵심 내용. 영국은 NPM 개혁의 선두 주자이다.", "expl_choices": {"1": "맞음. 영국은 Next Steps(넥스트 스텝)를 통해 책임운영기관 제도를 도입하고, 시민헌장제, 의무경쟁입찰제 등 다양한 NPM 개혁을 선도하였다.", "2": "틀림. 미국이 아닌 영국이 Next Steps를 통해 책임운영기관을 도입했다.", "3": "틀림. 뉴질랜드는 재정법 개혁, 구매자-공급자 분리 등의 NPM 개혁을 추진했으나 Next Steps와는 다른 방식이다.", "4": "틀림. 호주는 NPM 개혁을 추진했으나 Next Steps의 본산은 영국이다.", "5": "틀림. 캐나다는 별도의 행정개혁 경로를 따랐다."}, "expl_sub": {}}], "2022": [{"num": 51, "question": "지방자치에 관한 설명으로 옳지 않은 것은?", "answer": 2, "answer_str": "2", "choices": ["① 지방자치의 본질적 의미는 지역주민이 그 지역의 제반 문제를 스스로 결정하고 처리하는 것이다.", "② 지방자치는 정치적 활동과는 무관하며 공공행정의 가치를 중시한다.", "③ 지방자치는 지방분권을 전제로 하며, 주민참여는 ‘풀뿌리 민주주의’ 원리를 구현한다.", "④ 지방자치단체라는 공법인을 통해 주민에게 필요한 주요 정책의 실험장 역할을 한다.", "⑤ 지역특성에 맞는 행정과 정책을 통해 행정의 능률성과 책임성을 확립한다."], "sub_items": [], "expl_core": "지방자치의 개념: 주민자치(영미식, 민주적 참여)와 단체자치(대륙식, 법적 분권). 우리나라는 양자 절충. 지방자치단체는 중앙정부와 구별되는 별도의 법인격을 가진다.", "expl_choices": {"1": "맞음. 지방자치는 지역주민이 지방 공공 문제를 스스로 결정·처리하는 제도이다.", "2": "틀림. 단체자치는 영미계가 아닌 대륙계(독일·프랑스) 전통에서 발달한 개념이다.", "3": "맞음. 우리나라 지방자치제도는 주민자치와 단체자치의 요소를 절충하고 있다.", "4": "맞음. 지방자치단체는 독립된 법인격을 가지며 중앙정부와 별개의 행정주체이다.", "5": "맞음. 지방자치는 지방분권과 민주주의 실현에 기여하는 제도이다."}, "expl_sub": {}}, {"num": 52, "question": "정부가 회계연도 개시 120일 전까지 국회에 제출하는 예산안의 구성요소가 아닌 것은?", "answer": 5, "answer_str": "5", "choices": ["① 예산총칙", "② 세입세출예산"  지역의 지방자치단체 발전과 운영에 기여할 수 있다.", "② ○○시 주민 B씨(20세)는 청년일자리 창출에 관한 조례의 필요성에 따라 요건을 갖추어 ○○시 조례의 제정을 청구하였다.", "③ 지방자치단체 외국인등록대장에 등록된 베트남국적 C씨(45세)는 국내에 영주할 수 있는 체류자격 취득일 후 현재 3년이 지났지만, 외국인이기 때문에 지방자치단체의 위법행위에 대한 감사를 청구할 수 없다.", "④ ○○시 비례대표 시의원의 심각한 불법행위 문제를 알고 있는 ○○시 주민 D씨(55세) 는 주민소환 투표 청구를 위한 요건을 갖추더라도 주민소환권을 행사할 수 없다.", "⑤ ○○시 주민 E씨(57세)는 시의 공금 지출에 관한 사항의 위법에 대해 감사청구한 자로서, 그 감사 결과에 불복하고 법적 요건을 갖추어 시장을 상대로 주민소송을 제기하였다."], "sub_items": [], "expl_core": "주민의 권리: 주민투표, 주민소환, 주민발안(조례제정·개폐 청구), 주민감사 청구, 주민소송. 각 제도의 요건과 절차를 정확히 파악해야 한다. 특히 주민소환의 대상(단체장, 지방의회 의원)과 요건을 확인해야 한다.", "expl_choices": {"1": "맞음. 주민투표는 지방자치단체의 주요 결정사항에 대해 주민이 직접 투표로 결정하는 제도이다.", "2": "맞음. 주민감사 청구: 주민이 지방자치단체 사무의 감사를 상급 기관에 청구하는 제도이다.", "3": "틀림. 주민소환의 대상에 비례대표 지방의회 의원은 포함되지 않는다. 소환 대상은 지역구 지방의회 의원과 지방자치단체장이다.", "4": "맞음. 주민조례발안(조례 제정·개폐 청구): 주민이 조례안을 직접 발안하는 제도이다.", "5": "맞음. 주민소송: 주민이 지방자치단체의 위법한 재무 행위에 대해 소송을 제기하는 제도."}, "expl_sub": {}}, {"num": 56, "question": "행정학의 주요 이론에 관한 내용으로 옳지 않은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 신제도주의론은 공식적 제도나 구조는 물론 비공식적 제도와 규범도 중요하게 강조한다.", "② 행태주의 행정연구는 가치와 사실문제를 엄격하게 구분하고 자유와 평등의 가치를 연구 대상에서 제외한다.", "③ 체제이론은 행정현상을 여러 변수 중에서 환경을 포함해 거시적으로 접근한다.", "④ 인간관계론은 조직목표 달성을 위해 생산성과 능률성에 기반을 둔 금전적 보상과 경제적 인간관을 강조한다.", "⑤ 신행정학 이론은 참여와 형평의 가치를 중심으로 현실문제의 처방적 연구를 중시한다."], "sub_items": [], "expl_core": "행정학 주요 이론의 특성과 시대적 맥락. 신공공서비스론은 시민을 고객이 아닌 주권자로 보고 공익·민주성·공동체 가치를 강조한다. 신공공관리론과 혼동하지 말 것.", "expl_choices": {"1": "맞음. 과학적 관리론은 분업, 능률화, 동작연구 등을 통해 생산성 극대화를 추구한다.", "2": "맞음. 인간관계론은 비공식 집단, 사기(morale), 인간적 요소를 강조한다.", "3": "맞음. 신공공관리론은 시장 원리 도입, 성과 중심 관리, 고객 지향을 강조한다.", "4": "틀림. 신공공서비스론은 시민을 고객이 아닌 주권자로 보며, 공공 서비스의 가치와 민주성을 강조한다. 고객지향성을 강조하는 것은 신공공관리론이다.", "5": "맞음. 거버넌스 이론은 정부·시장·시민사회의 네트워크를 통한 협력적 문제 해결을 강조한다."}, "expl_sub": {}}, {"num": 57, "question": "신공공서비스 행정이론에 관한 설명으로 옳은 것을 모두 고른 것은?", "answer": 3, "answer_str": "3", "choices": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄴ, ㄹ", "⑤ ㄷ, ㄹ"], "sub_items": ["ㄱ. 시민을 자율적인 소비자 또는 고객으로 간주한다.", "ㄴ. 민주적 시민의식론과 조직적 인본주의를 이념으로 한다.", "ㄷ. 공공행정의 다양한 가치와 책임성 문제에 관심을 둔다.", "ㄹ. 공공서비스의 공급에 있어 합리적 선택과 방법론적 개인주의를 강조한다."], "expl_core": "신공공서비스론(Denhardt & Denhardt): 시민을 고객이 아닌 주권자로, 행정인의 역할은 봉사자, 공익을 목적으로, 전략적 사고·민주적 행동을 강조. 능률보다 책임·시민참여·공동체 가치를 우선시한다.", "expl_choices": {"1": "틀림. ㄹ 포함.", "2": "틀림. ㄹ 포함.", "3": "맞음. ㄱ, ㄴ, ㄷ이 신공공서비스론의 옳은 설명.", "4": "틀림. ㄹ 포함.", "5": "틀림. 일부 누락 또는 오류."}, "expl_sub": {"ㄱ": "맞음. 신공공서비스론은 공익을 부산물이 아닌 목적으로 본다.", "ㄴ": "맞음. 시민을 고객이 아닌 주권자로 보고 시민참여를 강조한다.", "ㄷ": "맞음. 전략적으로 생각하고 민주적으로 행동할 것을 강조한다.", "ㄹ": "틀림. 행정인의 역할을 기업가(entrepreneur)로 보는 것은 신공공관리론의 관점이다. 신공공서비스론은 행정인을 공공가치의 봉사자로 본다."}}, {"num": 58, "question": "중앙정부에 의한 지방재정조정제도의 형태가 아닌 것은?", "answer": 4, "answer_str": "4", "choices": ["① 국고보조금", "② 지방교부세", "③ 국가균형발전특별회계", "④ 조정교부금", "⑤ 국고부담금"], "sub_items": [], "expl_core": "지방재정조정제도: 중앙→지방 재원 이전 방식. 일반 재원이전(지방교부세, 분권교부세), 특정 재원이전(국고보조금, 균특회계 보조). 지방세는 지방자치단체의 자체 재원이며 중앙의 재정조정제도가 아니다.", "expl_choices": {"1": "맞음. 지방교부세: 내국세의 일정 비율(19.24%)을 교부하는 일반재원이전 제도.", "2": "맞음. 국고보조금: 특정 사업 목적을 위해 중앙이 지방에 지원하는 특정재원이전 제도.", "3": "맞음. 균형발전특별회계(균특회계) 보조: 지역 균형발전을 위한 재정지원.", "4": "틀림. 지방세(재산세, 취득세 등)는 지방자치단체가 자체적으로 부과·징수하는 고유 재원으로, 중앙정부에 의한 지방재정조정제도의 형태가 아니다.", "5": "맞음. 조정교부금: 특별시·광역시가 자치구에 재원을 배분하는 제도."}, "expl_sub": {}}, {"num": 59, "question": "전자정부와 공공행정의 변화에 관한 설명으로 옳지 않은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 전자정부 발전으로 인한 정보화의 역기능은 사회적 질서와 안전을 위협하는 디지털 위험으로 진행될 수 있다.", "② 일반적으로 정보는 공공재 성격이 강하기 때문에 행정정보의 비대칭성 문제는 해소 내지 완화되어야 하는 것이 바람직하다.", "③ 정부의 맞춤형 전자서비스와 빅데이터 산업 고도화 차원에서 개인정보의 행정기관 간공동 활용은 중요하다.", "④ 전자정부 서비스는 이용자들의 거래비용과 기회비용 및 민원업무 감소에 기여한다.", "⑤ 전자정부의 발달에 의한 공공데이터 개방은 행정정보의 독점적 소유를 촉진시키고 있다."], "sub_items": [], "expl_core": "전자정부와 공공행정 변화: 거버넌스 변화, 행정 투명성 향상, 민원 처리 효율화, 공공데이터 개방. '정보 독점 강화'나 '관료주의 강화'는 전자정부의 방향과 반대이다.", "expl_choices": {"1": "맞음. 전자정부는 온라인 민원 처리, 전자 결재 등으로 행정 효율성을 높인다.", "2": "맞음. 전자정부는 정보 공개와 투명성 향상에 기여한다.", "3": "맞음. 전자정부는 시민 참여와 쌍방향 소통을 확대한다.", "4": "맞음. 공공데이터 개방을 통해 민간의 다양한 서비스 개발을 촉진한다.", "5": "틀림. 전자정부는 오히려 관료적 장벽을 낮추고 행정 과정의 투명성을 높이는 방향으 사회적 중요성과 대중의 관심은 의제 설정에 큰 영향을 미친다.", "2": "맞음. 촉발 사건(triggering event): 재난, 사고 등 갑작스러운 사건이 의제화를 촉진한다.", "3": "틀림. 관료의 전문성은 정책 분석·집행 역량과 관련되며, 정책의제 설정의 직접적 영향요인이 아니다.", "4": "맞음. 언론의 관심과 보도는 특정 문제를 공중의 관심으로 끌어올리는 역할을 한다.", "5": "맞음. 이익집단의 활동은 특정 문제를 정치 의제로 만드는 데 중요한 역할을 한다."}, "expl_sub": {}}], "2021": [{"num": 51, "question": "행정이 국가발전이라는 목표를 달성하기 위해 정치를 비롯하여 경제ㆍ사회의 변동을 주도해나가야 한다는 행정학설은?", "answer": 4, "answer_str": "4", "choices": ["① 행정관리설", "② 행정목적실현설", "③ 행정행태설", "④ 발전기능설", "⑤ 법함수설"], "sub_items": [], "expl_core": "행정학설 중 발전행정론(developmental administration): 국가 발전이라는 목표 달성을 위해 행정이 정치·경제·사회 변동을 주도적으로 이끌어나가야 한다는 이론. 1960년대 개발도상국 행정 모델로 부각.", "expl_choices": {"1": "틀림. 행정관리론은 합리적·효율적 행정관리를 강조하는 이론이다.", "2": "틀림. 신행정론은 사회적 형평성과 적실성을 강조하는 이론이다.", "3": "틀림. 통치기능설은 행정을 국가통치의 핵심 기능으로 보는 시각이다.", "4": "맞음. 발전행정론: 국가발전목표 달성을 위해 행정이 정치·경제·사회 변동을 주도해야 한다는 행정학설.", "5": "틀림. 행정국가론은 현대 국가에서 행정 권력이 강화되는 현상을 설명하는 개념이다."}, "expl_sub": {}}, {"num": 52, "question": "미국 행정학의 형성과 발달과정에 관한 설명으로 옳지 않은 것은?", "answer": 1, "answer_str": "1", "choices": ["① 1883년 제정된 펜들턴법(Pendleton Act)에 의해 엽관제 인사제도가 도입되었다.", "② 1887년 윌슨(W. Wilson)은 “행정의 연구(The Study of Administration)”에서 행정의 본질을 관리로 파악하였다.", "③ 1920년대에서 1930년대에 걸쳐 능률에 기초한 관리를 주장하는 정통 행정학의 모습을 갖추게 되었다.", "④ 1930년대 이후 등장한 정치행정일원론은 행정의 정책형성 기능을 중시하였다.", "⑤ 1940년대 이후 행태주의는 행정학의 과학화를 위하여 사실판단적인 것만을 연구대상으로 삼았다."], "sub_items": [], "expl_core": "미국 행정학 형성과 발달: 1887년 윌슨 「행정의 연구」, 1926년 화이트 최초 교과서, 1930년대 행정원리학파(귤릭·어윅), 1946년 사이먼 「행정행태론」. 정치행정이원론·일원론의 시대적 흐름도 파악해야 한다.", "expl_choices": {"1": "틀림. 윌슨(Wilson)의 1887년 논문 「행정의 연구(The Study of Administration)」는 정치행정이원론을 제시하며 행정학의 독립을 선언했다. '행정행태론의 출발'이라는 설명은 틀렸다.", "2": "맞음. 화이트(White)의 1926년 「행정학 입문」이 행정학 최초의 교과서이다.", "3": "맞음. 귤릭·어윅은 POSDCORB 원리로 대표되는 행정원리학파의 핵심 학자이다.", "4": "맞음. 사이먼(Simon)은 1946년 「행정의 격언(Proverbs of Administration)」에서 행정원리의 비과학성을 비판하고, 이후 행동과학적 접근방법을 제시하였다.", "5": "맞음. 1968년 미노브룩 회의를 계기로 신행정학(NPA)이 등장하여 사회적 형평성과 적실성을 강조하였다."}, "expl_sub": {}}, {"num": 53, "question": "신공공서비스론에 관한 설명으로 옳은 것은?", "answer": 2, "answer_str": "2", "choices": ["① 행정의 민주성 보다는 시장논리에 따라 생산성이나 효율성을 강조한다.", "② 관료는 사회문제를 해결하는 과정에서 협상과 중재 기능을 담당한다.", "③ 공익을 행정활동으로 생성되는 부산물로 간주한다.", "④ 기업가적 목표달성을 위한 광범위한 행정재량을 인정한다.", "⑤ 상명하복하는 관료적 조직구조와 고객에 대한 규제와 통제를 선호한다."], "sub_items": [], "expl_core": "신공공서비스론(NPS, Denhardt): 시민을 고객이 아닌 주권자로, 행정의 역할은 봉사, 공익은 목적(부산물 아님). 공유가치·민주적 절차·시민참여를 강조. 능률성보다 책임·민주성을 우선.", "expl_choices": {"1": "틀림. 시민을 고객으로 보는 것은 신공공관리론(NPM)의 시각이다. NPS는 시민을 주권자로 본다.", "2": "맞음. 신공공서비스론은 공익을 사익 조정의 부산물이 아닌, 행정이 추구해야 할 목적으로 본다.", "3": "틀림. 기업가 정신을 강조하는 것은 NPM이다. NPS는 민주적 가치와 시민참여를 강조한다.", "4": "틀림. 시장 메커니즘 활용을 강조하는 것은 NPM이다. NPS는 시장보다 민주적 절차와 공동체 가치를 중시한다.", "5": "틀림. 성과관리와 능률성 중심의 접근은 NPM의 특성이다."}, "expl_sub": {}}, {"num": 54, "question": "행정이론에 관한 설명으로 옳지 않은 것은?", "answer": 4, "answer_str": "4", "choices": ["① 신행정론은 관료들이 정책결정을 해야만 한다는 적극적 정치행정일원론을 주장한다.", "② 공공선택이론은 집권적 관료제가 공공서비스를 제공하는데 있어서 유일한 최선의 방안은 아니라고 한다.", "③ 포스트모더니즘 행정이론은 사회적 맥락에 대한 고려 없이 보편적 이론을 발견하고자 하는 실증주의를 배격한다.", "④ 신공공관리론은 고객의 개인적 이익이 아닌 시민 전체로서의 공익에 대한 책임성과 대응성을 강조한다.", "⑤ 신제도주의 이론은 제도가 개인행위를 제약하지만, 개인 간 상호작용의 결과로 제도가 변화될 수도 있다고 본다."], "sub_items": [], "expl_core": "행정이론의 핵심 내용 구별: 과학적 관리론(테일러), 인간관계론(메이요), 관료제(베버), 행태론(사이먼), 체제론, 신공공관리론 등의 특성과 비판점. 이론과 학자의 연결이 빠지지 않도록 정리.", "expl_choices": {"1": "맞음. 베버(Weber)의 관료제 이론은 법적·합리적 권위, 문서화, 전문화를 기반으로 한 이상적 관료제 구조를 제시하였다.", "2": "맞음. 테일러(Taylor)의 과학적 관리론은 시간-동작 연구를 통해 표준 업무량을 설정하고 차별성과급제를 도입하였다.", "3": "맞음. 인간관계론(메이요)은 호손 실험을 통해 비공식 집단과 사회적 동기가 생산성에 영향을 미침을 발견하였다.", "4": "틀림. 행태론(Simon)은 의사결정에서의 제한된 합리성을 강조하였으며, '최적 대안의 선택'이 아닌 '만족할 만한 대안의 선택'을 주장하였다. '최적 선택을 강조한다'는 합리모형의 설명이다.", "5": "맞음. 체제론은 환경과의 상호작용(투입-전환-산출-환류) 과정으로 행정을 분석한다."}, "expl_sub": {}}, {"num": 55, "question": "행정통제의 유형 중 외부통제에 해당하지 않는 것은?", "answer": 5, "answer_str": "5", "choices": ["① 입법부에 의한 통제", "② 사법부에 의한 통제", "③ 시민참여에 의한 통제", "④ 이익집단에 의한 통제", "⑤ 계층제 및 인사관리제도를 통한 통제"], "sub_items": [], "expl_core": "행정통제 유형: 외부통제(국회·법원·감사원·시민사회·언론)와 내부통제(계층적 감독·직업윤리·옴부즈만 일부). 직업공무원제는 내부통제 수단으로 분류된다.", "expl_choices": {"1": "맞음. 국회의 국정감사·국정조사는 외부통제의 대표적 수단이다.", "2": "맞음. 법원의 행정소송·위헌심판은 외부통제이다.", "3": "맞음. 감사원의 결산 검사·직무감찰은 외부통제이다.", "4": "맞음. 시민단체와 언론의 감시는 비공식 외부통제이다.", "5": "틀림. 직업공무원제는 행정부 내부에서 공무원의 전문성·윤리성을 통해 자율적으로 통제하는 내부통제 수단이다. 외부통제에 해당하지 않는다."}, "expl_sub": {}}, {"num": 56, "question": "내부고발에 관한 설명으로 옳지 않은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 내부고발의 대상은 일반적으로 조직 내에서 행해진 비윤리적 행위이다.", "② 내부고발의 대상이 되는 문제를 조직 내에서 해결할 장치가 없거나 제대로 작동되지 않을 때 주로 일어난다.", "③ 내부고발은 조직 내부의 비리를 대외적으로 폭로하는 외부적 행위이다.", "④ 내부고발제 실시로 조직 내에서 부패에 대한 경각심 확대와 부패 억제 효과가 기대된다.", "⑤ 현재 우리나라에는 내부고발자를 보호하는 관련 법률이 없다."], "sub_items": [], "expl_core": "내부고발(whistle-blowing): 조직 내 위법·부당 행위를 외부에 신고하는 행위. 부패방지권익위법에서 보호. 비밀 보장, 신분 보호, 불이익 금지가 핵심. '내부고발자에게 불이익을 줄 수 있다'는 설명은 틀렸다.", "expl_choices": {"1": "맞음. 내부고발은 조직 내 비리를 외부(언론, 수사기관, 국민권익위원회 등)에 알리는 행위이다.", "2": "맞음. 내부고발자는 법적으로 신분 보호와 불이익 금지 원칙이 적용된다.", "3": "맞음. 내부고발은 조직의 투명성과 책임성 확보에 기여한다.", "4": "맞음. 내부고발자 보호제도는 부패방지 및 국민권익위원회의 설치와 운영에 관한 법률에서 규정한다.", "5": "틀림. 내부고발자에게 불이익을 주는 행위는 법률로 금지되어 있다. 내부고발자 보호를 위해 징계·해고·불이익 처우가 금지된다."}, "expl_sub": {}}, {"num": 57, "question": "정책평가에 관한 설명으로 옳지 않은 것은?", "answer": 1, "answer_str": "1", "choices": ["① 총괄평가는 정책집행이 이루어지는 과정을 평가하는 활동으로 형성평가라고도 한다.", "② 정책평가의 외적 타당성은 정책평가 결과의 일반화 가능성을 의미한다.", "③ 정책평가의 내적 타당성은 정책이 집행된 이후에 나타나는 변화가 정책에 기인한 것인 지, 다른 요인 때문인지를 밝히는 것과 관련된다.", "④ 정책평가의 신뢰도는 동일한 측정도구를 반복해서 사용했을 때 동일한 결과를 얻을 확률을 의미한다.", "⑤ 정책평가의 내적 타당성을 저해하는 요인으로 선정요인, 성숙요인, 역사요인 등을 들 수있다."], "sub_items": [], "expl_core": "정책평가의 유형: 형성평가(과정평가, 집행 중)와 총괄평가(결과평가, 완료 후). 총괄평가에는 효과성평가·효율성평가·영향평가 포함. 내부평가와 외부평가의 장단점도 구별해야 한다.", "expl_choices": {"1": "틀림. 형성평가(formative evaluation)는 정책 집행 중에 문제점을 발견하고 수정하기 위해 실시하는 과정평가이다. 완료 후 실시되는 것은 총괄평가이다.", "2": "맞음. 총괄평가는 정책 완료 후 목표 달성 여부와 효과를 평가한다.", "3": "맞음. 내부평가는 비용과 시간이 절약되고 전문성이 높은 장점이 있으나 객관성이 낮다.", "4": "맞음. 외부평가는 객관성과 신뢰성이 높지만 비용이 높고 내부 정보 접근에 제한이 있다.", "5": "맞음. 정책평가는 정책의 효과를 측정하여 차후 정책 결정에 환류하는 기능을 한다."}, "expl_sub": {}}, {"num": 58, "question": "정책의제설정에 관한 설명으로 옳지 않은 것은?", "answer": 2, "answer_str": "2", "choices": ["① 공중의제는 사회문제 혹은 사회적 쟁점이 한 단계 더 나아가 일반 공중의 주목을 받게된 의제를 말한다.", "② 외부주도형은 공중의제화를 억제하기 때문에 일종의 음모형에 해당한다.", "③ 동원형은 사회문제가 정부의제로 먼저 채택되고, 정부의 의도적인 노력에 의해서 공중의 제로 확산되는 경우를 말한다.", "④ 내부접근형은 선진국의 경우, 특수 이익집단이 비밀리에 정부의 혜택을 보려는 외교ㆍ국 방정책 등에서 주로 나타난다.", "⑤ 위기나 재난 등 극적 사건은 사회문제를 정부의제화 시키는 점화장치에 해당된다."], "sub_items": [], "expl_core": "정책의제설정 이론: 외부주도형(시민·이익집단이 공중의제로 만든 후 정부 채택), 내부접근형(관료·엘리트가 공중의제 없이 직접 정부의제화), 동원형(정부가 주도하여 의제 설정 후 공중의제로 확산). 각 유형의 참여자와 방향성이 핵심.", "expl_choices": {"1": "맞음. 외부주도형: 민간이 의제화하고 정부가 채택하는 방식.", "2": "틀림. 내부접근형은 공중의제 단계를 거치지 않고 정부 내부에서 의제를 설정하는 방식이다. '공중의제를 거쳐 정부의제가 된다'는 설명은 외부주도형의 특성이다.", "3": "맞음. 동원형: 정부가 주도하여 의제를 설정하고, 이후 공중의 지지를 동원하는 방식.", "4": "맞음. 의제설정 과정에서 언론, 이익집단, 사건 등이 촉발 요인 역할을 한다.", "5": "맞음. 정부의제(formal agenda)는 정부가 공식적으로 논의·처리하기로 결정한 의제이다."}, "expl_sub": {}}, {"num": 59, "question": "정책집행연구 중 하향적 접근방법에 관한 설명으로 옳지 않은 것은?", "answer": 1, "answer_str": "1", "choices": ["① 집행에 영향을 주는 집행관료와 이해관계집단 등 다양한 행위자들의 생각과 상호작용을 현장감 있게 분석할 수 있다.", "② 정책집행을 정책결정과정에서 채택된 정책목표를 달성하는 과정으로 본다.", "③ 바람직한 정책집행이 일어날 수 있는 규범적 처방을 정책결정자에게 제시해주는데 관심을 갖는다.", "④ 유능하고 헌신적인 관료가 집행을 담당하여야 효과적인 정책집행이 가능하다고 한다.", "⑤ 효과적인 정책집행을 위하여 조직화된 이익집단, 강력한 리더십 등이 있어야 한다고 한다."], "sub_items": [], "expl_core": "하향식 정책집행 접근방법: 명확한 목표, 결정자 의도 충실 집행, 집행 변수(자원, 지지, 규제 명확성) 강조. 프레스만·윌다브스키, 반 미터·반 혼이 대표학자. '일선관료의 재량 강조'는 상향식의 특성.", "expl_choices": {"1": "틀림. 하향식은 명확한 정책목표가 사전에 설정되어야 한다고 전제하며, 목표의 모호성을 인정하지 않는다. '목표의 모호성 인정'은 상향식의 특성이다.", "2": "맞음. 하향식은 정책 결정자의 목표와 의도가 집행 과정에서 그대로 실현되는 것을 이상으로 본다.", "3": "맞음. 하향식에서는 명확한 법령과 지침, 충분한 재원 확보가 집행 성공의 핵심 조건이다.", "4": "맞음. 하향식의 대표적 연구자인 반 미터·반 혼(Van Meter & Van Horn)은 집행 성과에 영향을 미치는 6개 변수를 제시하였다.", "5": "맞음. 하향식은 집행 실패의 원인을 명확하지 않은 목표 설정이나 자원 부족에서 찾는다."}, "expl_sub": {}}, {"num": 60, "question": "다음 내용과 밀접한 관련이 있는 정책대안의 미래예측 기법은? ○ 선택적 익명 ○ 식견 있는 다수의 참여 ○ 양극화된 통계처리 ○ 구조화된 갈등유도", "answer": 3, "answer_str": "3", "choices": ["① 시계열분석기법", "② 시뮬레이션", "③ 정책델파이", "④ 교차영향분석", "⑤ 실현가능성분석"], "sub_items": [], "expl_core": "정책대안 미래예측 기법 중 델파이(Delphi) 기법의 특성: ①선택적 익명성 ②식견 있는 응답자(전문가) 참여 ③반복 설문과 통제된 피드백 ④양극화된 통계적 결과 처리. 집단 대면 토론이 아닌 익명 방식이 핵심.", "expl_choices": {"1": "틀림. 브레인스토밍: 자유로운 아이디어를 대면으로 발산하는 집단 기법.", "2": "틀림. 시뮬레이션: 실제 체제를 모방한 모형 구축.", "3": "맞음. 델파이 기법: 선택적 익명성, 식견 있는 전문가 참여, 반복 설문, 통계적 집계가 특징.", "4": "틀림. 명목집단 기법: 대면 집단이지만 토론 없이 개인이 아이디어를 제안하고 투표하는 방식.", "5": "틀림. 시나리오 기법: 다양한 미래 가능성을 시나리오 형태로 작성."}, "expl_sub": {}}, {"num": 61, "question": "허즈버그(F. Herzberg)의 동기ㆍ위생 2요인이론에 관한 설명으로 옳은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 인간의 욕구를 계층적 구조로 나누어 설명한다.", "② 하위계층의 욕구가 충족되어야 상위계층의 욕구가 나타나기 시작한다.", "③ 모든 욕구는 충족되면 동기부여로 이어진다.", "④ 동기요인에는 보수, 신분보장, 작업조건, 대인관계 등이 포함된다.", "⑤ 위생요인은 주로 생리적 욕구, 안전욕구 등을 만족시키는 요인들이다."], "sub_items": [], "expl_core": "허즈버그(Herzberg)의 동기·위생 2요인이론: 동기요인(만족 유발 — 성취, 인정, 성장, 직무 자체, 책임감), 위생요인(불만족 예방 — 급여, 감독방식, 근무조건, 대인관계, 정책). 위생요인을 개선해도 만족이 높아지지 않고 불만족만 감소한다.", "expl_choices": {"1": "틀림. 위생요인은 불만족을 예방할 뿐 만족을 높이지 않는다. 위생요인 강화가 동기부여를 높인다는 설명은 틀렸다.", "2": "틀림. 급여·승진은 위생요인(급여)과 동기요인(승진)으로 나뉜다. 둘 다 동기요인이라는 설명은 부정확하다.", "3": "틀림. 직무 자체(work itself)와 성취감은 동기요인이다. 위생요인이 아니다.", "4": "틀림. 허즈버그는 만족과 불만족을 단일 연속선상이 아닌 별개 차원으로 본다.", "5": "맞음. 동기요인(성취, 인정, 직무 자체, 책임감, 성장)은 직무 만족을 높이고 내적 동기를 유발하며, 위생요인(급여, 근무환경, 감독방식 등)은 불만족을 예방하는 역할을 한다."}, "expl_sub": {}}, {"num": 62, "question": "인간관계론에 관한 설명으로 옳지 않은 것은?", "answer": 3, "answer_str": "3", "choices": ["① 비공식적 집단의 역할을 강조한다.", "② 메이요(E. Mayo)의 호손(Hawthorne) 실험은 인간관계론의 형성에 영향을 주었다.", "③ 인간을 생존에 대한 기본적인 욕구에 의해 동기 부여되는 것으로 본다.", "④ 과학적 관리론과 마찬가지로 생산성 향상을 추구한다.", "⑤ 작업환경이나 물리적 조건보다 조직구성원의 사회심리적 요인을 중시한다."], "sub_items": [], "expl_core": "인간관계론(Mayo, Roethlisberger): 호손 실험, 비공식 집단, 사회적 동기 강조. 과학적 관리론의 기계적 인간관을 비판. 다만 조직의 공식 구조를 완전히 부정하지는 않았다.", "expl_choices": {"1": "맞음. 인간관계론은 메이요(Mayo)가 주도한 호손 실험을 토대로 발전하였다.", "2": "맞음. 인간관계론은 비공식 집단의 영향력이 공식 구조보다 생산성에 더 큰 영향을 미칠 수 있다고 보았다.", "3": "틀림. 인간관계론은 과학적 관리론의 인간을 경제적 동기로만 움직이는 존재로 보는 관점을 비판하였다. '경제적 동기만이 중요하다'는 설명은 과학적 관리론의 입장이다.", "4": "맞음. 인간관계론은 조직 구성원의 사기(morale)와 감정적 요인이 생산성에 중요한 영향을 미친다고 보았다.", "5": "맞음. 인간관계론은 감독방식의 변화(민주적 감독)가 생산성 향상에 기여할 수 있다고 강조하였다."}, "expl_sub": {}}, {"num": 63, "question": "행정조직에 관한 설명으로 옳은 것은?", "answer": 2, "answer_str": "2", "choices": ["① 위원회 조직은 결정권한의 최종 책임이 기관장 한 사람에게 집중되어 있는 조직이다.", "② 방송통신위원회, 공정거래위원회와 같은 행정위원회는 결정권한을 갖고 있으며 집행까지 책임을 진다.", "③ 책임운영기관은 중앙통제 중심의 관료제적 성격을 갖는 조직으로 실제 일을 맡아 집행 하는 사람들에게 재량권을 부여하지 않는다.", "④ 책임운영기관은 수익성보다는 정부기능이 갖고 있는 공익성만을 강조하며, 효율성보다는 사회적 형평성을 관리의 주요 가치로 삼는다.", "⑤ 애드호크라시는 현대의 복잡하고 불확실한 환경에서 발생하는 문제에 신속하게 대응하지 못한다."], "sub_items": [], "expl_core": "행정조직의 유형: 계선조직(line), 참모조직(staff), 보조기관, 위원회, 책임운영기관 등. 계선과 참모의 역할 구분이 핵심이다.", "expl_choices": {"1": "틀림. 계선조직은 명령계통이 명확한 직접 집행 조직이며, 참모조직은 자문·지원 역할을 한다.", "2": "맞음. 위원회 조직은 합의제 의사결정 방식으로 단독기관보다 신중한 결정이 가능하지만, 의사결정이 지체될 수 있는 단점이 있다.", "3": "틀림. 참모조직은 정책 결정 권한이 없고, 계선(라인) 조직의 결정을 지원·조언한다.", "4": "틀림. 책임운영기관은 성과 계약을 통해 기관장에게 광범위한 자율성을 부여하는 반독립적 기관이다.", "5": "틀림. 애드호크라시(adhocracy)는 특정 문제 해결을 위해 임시적으로 구성되는 유연한 조직이다."}, "expl_sub": {}}, {"num": 64, "question": "관료제의 특징으로 옳지 않은 것은?", "answer": 5, "answer_str": "5", "choices": ["① 분업구조", "② 계층구조", "③ 문서화된 법규", "④ 실적주의", "⑤ 정의적(personal) 업무 처리"], "sub_items": [], "expl_core": "베버(Weber)의 관료제 특성: 법적·합리적 권위, 명확한 직무 분장, 전문화, 계층제, 문서주의, 비인격성. '변화에 유연하고 창의적'이라는 설명은 관료제와 반대이다.", "expl_choices": {"1": "맞음. 관료제는 법적·합리적 권위에 기반하여 운영된다.", "2": "맞음. 관료제는 직무가 규칙과 법령에 의해 명확히 규정되어 있다.", "3": "맞음. 관료제는 전문적 훈련을 받은 인력이 직위를 담당한다.", "4": "맞음. 관료제는 문서에 의한 업무처리(문서주의)를 강조한다.", "5": "틀림. 관료제는 규칙과 절차를 중시하는 경직된 구조로, 환경 변화에 대한 유연성과 창의성이 낮다는 것이 주요 비판이다."}, "expl_sub": {}}, {"num": 65, "question": "인사행정제도에 관한 설명으로 옳지 않은 것은?", "answer": 3, "answer_str": "3", "choices": ["① 실적제는 개인의 객관적인 능력ㆍ자격ㆍ성적을 기준으로 공무원을 임용하는 제도이다.", "② 직업공무원제도는 계급제, 일반능력자 중심의 임용, 신분보장 등을 토대로 한다.", "③ 계급제는 직무를 기준으로 직무의 난이도와 책임도에 따라 직위를 분류하는 제도이다.", "④ 엽관제는 정당에 대한 공헌도와 충성심에 입각하여 공무원을 임용하는 제도이다.", "⑤ 대표관료제는 국민에 대한 대응성과 공직 임용의 사회적 형평성을 제고시키려는 목적을 지닌 제도이다."], "sub_items": [], "expl_core": "인사행정제도: 엽관제(spoils system), 실적제(merit system), 직업공무원제, 계급제, 직위분류제. 실적제는 능력과 성과를 기준으로 하며, 정치적 임명을 배제한다.", "expl_choices": {"1": "맞음. 엽관제는 선거 승리 정당이 공직을 자당 지지자에게 나누어 주는 정치적 임용 방식이다.", "2": "맞음. 실적제는 공개경쟁시험과 능력·성과를 기준으로 임용하는 방식이다.", "3": "틀림. 계급제는 사람 중심(rank-in-person)으로 인사관리하며, 순환보직을 통한 일반행정가(generalist) 양성에 적합하다. '전문가 양성에 유리'는 직위분류제의 특성이다.", "4": "맞음. 직업공무원제는 종신 고용과 신분 보장을 통해 안정적인 공무원 집단을 형성한다.", "5": "맞음. 실적제는 정치적 중립성을 보장하여 행정의 전문성과 지속성을 높인다."}, "expl_sub": {}}, {"num": 66, "question": "국가공무원법상 우수 공무원으로 특별승진임용하거나 일반 승진시험에 우선 응시하게할 수 있는 경우에 해당하지 않는 것은?", "answer": 2, "answer_str": "2", "choices": ["① 청렴하고 투철한 봉사 정신으로 직무에 모든 힘을 다하여 공무 집행의 공정성을 유지하고 깨끗한 공직 사회를 구현하는 데에 다른 공무원의 귀감이 되는 자", "② 공무원으로 10년 이상 근속하고, 정년 전에 스스로 퇴직 할 때", "③ 직무수행 능력이 탁월하여 행정 발전에 큰 공헌을 한 자", "④ 제안제도의 운영에 있어서 제안의 채택ㆍ시행으로 국가 예산을 절감하는 등 행정 운영 발전에 뚜렷한 실적이 있는 자", "⑤ 재직 중 공적이 특히 뚜렷한 자가 공무로 사망한 때"], "sub_items": [], "expl_core": "국가공무원법상 특별승진 사유: 국가에 특별한 공로, 청렴한 생활, 그 밖에 대통령령으로 정하는 사유. 일반 직무성과 우수만으로는 특별승진이 아닌 일반 승진 대상이다.", "expl_choices": {"1": "맞음. 국가에 공로가 현저한 공무원은 특별승진 대상이다.", "2": "틀림. 단순히 직무성과가 우수한 것만으로는 국가공무원법상 특별승진 임용이나 일반 승진시험 우선 응시 사유에 해당하지 않는다. 이는 일반 성과평가를 통한 승진 경로에 해당한다.", "3": "맞음. 재직 중 위험을 무릅쓴 직무 수행으로 사망한 경우 특별승진이 가능하다.", "4": "맞음. 청렴 모범공무원으로 선발된 경우 특별승진 또는 우선 응시 대상이 될 수 있다.", "5": "맞음. 공무원 인재개발법에 따른 훈련 성적 우수자는 우대 조치가 있을 수 있다."}, "expl_sub": {}}, {"num": 67, "question": "다음에서 설명하는 근무성적평정방법은? ○ 주요과업 분야별로 바람직한 행태의 유형 및 등급을 구분ㆍ제시한 뒤, 평정대 상자의 행태를 관찰하여 해당사항에 표시하게 하는 방법이다. ○ 척도의 설계과정에 평정대상자를 공동으로 참여하게 함으로써 평정에 대한 신뢰와 적극적인 관심을 기대할 수 있다. ○ 직무가 다르면 별개의 평정양식이 있어야 하는 등 개발에 많은 시간과 비용이 요구된다.", "answer": 2, "answer_str": "2", "choices": ["① 중요 사건 기록법", "② 행태기준 평정척도법", "③ 서열법", "④ 목표관리제 평정법", "⑤ 도표식 평정척도법"], "sub_items": [], "expl_core": "근무성적평정 방법: 강제배분법, 도표식평정척도법, 서열법, 중요사건기록법, 행태기준 평정척도법(BARS). BARS는 '주요과업 분야별 바람직한 행태 유형·등급을 제시하고 해당 행태에 평가'하는 방식이다.", "expl_choices": {"1": "틀림. 목표관리법(MBO): 사전 합의된 목표 달성도를 평가하는 방식.", "2": "맞음. 행태기준 평정척도법(BARS): 주요과업 분야별로 바람직한 행태 유형과 등급을 제시하고, 평정대상자의 실제 행태를 그 기준에 비추어 평가하는 방법.", "3": "틀림. 중요사건 기록법: 효과적·비효과적 행태를 관찰·기록하여 평 const CIRCLES = ["①","②","③","④","⑤"];
let curYr = "2025";
let state = {};
try { state = JSON.parse(localStorage.getItem("hj_state")||"{}"); } catch(e){}

function save(){ localStorage.setItem("hj_state", JSON.stringify(state)); }
function ens(yr,num){
  if(!state[yr]) state[yr]={};
  if(!state[yr][num]) state[yr][num]={sel:null,checked:false,correct:null};
}

function renderTabs(){
  document.getElementById("yTabs").innerHTML = YEARS.map(y=>
    `<button class="ytab${y===curYr?" active":""}" onclick="switchYr('${y}')">${y}</button>`
  ).join("");
}
function switchYr(yr){ curYr=yr; renderTabs(); renderQs(); updStats(); }

function updStats(){
  if(!state[curYr]){document.getElementById("sScore").textContent="0";document.getElementById("sCor").textContent="0";document.getElementById("sChk").textContent="0";return;}
  let sc=0,co=0,ch=0;
  (QD[curYr]||[]).forEach(q=>{
    const s=state[curYr][q.num];
    if(!s||!s.checked)return;
    ch++;if(s.correct){co++;sc+=4;}
  });
  document.getElementById("sScore").textContent=sc;
  document.getElementById("sCor").textContent=co;
  document.getElementById("sChk").textContent=ch;
}

function resetAll(){
  if(!confirm("모든 회차 진행 상태를 초기화하겠습니까?"))return;
  state={};save();renderQs();updStats();
}

function renderQs(){
  const main=document.getElementById("main");
  main.innerHTML=(QD[curYr]||[]).map(q=>renderCard(q)).join("");
}

function escH(s){
  if(!s)return"";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function buildExpl(q){
  let h="";
  if(q.expl_core){
    h+=`<div class="esec ecore"><div class="esec-title">▸ 핵심정리</div><p>${escH(q.expl_core)}</p></div>`;
  }
  const sk=Object.keys(q.expl_sub||{});
  if(sk.length>0){
    h+=`<hr class="ediv"><div class="esec"><div class="esec-title">▸ 지문별 해설</div>`;
    sk.forEach(k=>{
      const t=q.expl_sub[k]||"";
      const ok=t.startsWith("맞음");
      const body=t.replace(/^(맞음|틀림)[\.\s]*/,"");
      h+=`<div class="se"><span class="si">${escH(k)}</span><span class="${ok?"vok":"vno"}">${ok?"맞음":"틀림"}</span>${escH(body)}</div>`;
    });
    h+=`</div>`;
  }
  h+=`<hr class="ediv"><div class="esec"><div class="esec-title">▸ 선택지별 해설</div>`;
  q.choices.forEach((c,i)=>{
    const raw=q.expl_choices[String(i+1)]||"";
    const ok=raw.startsWith("맞음");
    const body=raw.replace(/^(맞음|틀림)[\.\s]*/,"");
    h+=`<div class="ce"><span class="ci">${CIRCLES[i]}</span><span class="${ok?"vok":"vno"}">${ok?"맞음":"틀림"}</span>${escH(body)}</div>`;
  });
  h+=`</div>`;
  return h;
}

function renderCard(q){
  const yr=curYr;
  ens(yr,q.num);
  const st=state[yr][q.num];
  let cc="qcard";
  if(st.checked) cc+=(st.correct?" cor":" wrg");

  // ── 질문 본문 / 보조문장 분리 (? 이후 텍스트)
  let qMain=q.question, qCtx="";
  const qi=q.question.indexOf("?");
  if(qi>=0 && qi<q.question.length-1){
    qMain=q.question.slice(0,qi+1).trim();
    const raw=q.question.slice(qi+1).trim();
    if(raw.length>0){
      if(raw.includes(" ○ ")||raw.startsWith("○")){
        const parts=raw.split(/\s*○\s*/).filter(Boolean);
        qCtx=`<div class="q-ctx">${parts.map(s=>`<span class="ci2">○ ${escH(s.trim())}</span>`).join("")}</div>`;
      } else {
        qCtx=`<div class="q-ctx">${escH(raw)}</div>`;
      }
    }
  }

  let sub="";
  if(q.sub_items&&q.sub_items.length){
    sub=`<div class="sub-items">${q.sub_items.map(s=>`<div>${escH(s)}</div>`).join("")}</div>`;
  }

  const chs=q.choices.map((c,i)=>{
    const idx=i+1;
    let cls="choice";
    if(st.checked){
      cls+=" dis";
      if(idx===q.answer) cls+=" ca";
      else if(idx===st.sel) cls+=" wa";
    } else {
      if(idx===st.sel) cls+=" sel";
    }
    const dot=st.checked?(idx===q.answer?"✓":(idx===st.sel?"✗":"")):(idx===st.sel?"●":"");
    return `<div class="${cls}" onclick="pick(${q.num},${idx})"><div class="dot">${dot}</div><span>${escH(c)}</span></div>`;
  }).join("");

  const btnDis=st.checked?"disabled":"";
  const btnTxt=st.checked?(st.correct?"✓ 정답":"✗ 오답"):"정답확인/해설";
  const explShow=st.checked?" show":"";

  return `<div class="${cc}" id="qc-${q.num}">
<div class="q-head"><span class="q-num">Q${q.num}</span><span class="q-text">${escH(qMain)}</span></div>${qCtx}
${sub}<div class="choices" id="chs-${q.num}">${chs}</div>
<button class="btn-chk" id="btn-${q.num}" onclick="check(${q.num})" ${btnDis}>${btnTxt}</button>
<div class="expl${explShow}" id="ex-${q.num}">${st.checked?buildExpl(q):""}</div>
</div>`;
}

function pick(num,idx){
  const yr=curYr; ens(yr,num);
  const st=state[yr][num];
  if(st.checked)return;
  st.sel=idx; save();
  const q=QD[yr].find(x=>x.num===num);
  document.getElementById("chs-"+num).innerHTML=q.choices.map((c,i)=>{
    const i2=i+1;
    const cls="choice"+(i2===idx?" sel":"");
    return `<div class="${cls}" onclick="pick(${num},${i2})"><div class="dot">${i2===idx?"●":""}</div><span>${escH(c)}</span></div>`;
  }).join("");
}

function check(num){
  const yr=curYr; ens(yr,num);
  const st=state[yr][num];
  if(st.checked)return;
  if(st.sel===null){alert("선택지를 먼저 선택해주세요.");return;}
  const q=QD[yr].find(x=>x.num===num);
  st.checked=true; st.correct=(st.sel===q.answer); save();
  const card=document.getElementById("qc-"+num);
  card.className="qcard "+(st.correct?"cor":"wrg");
  document.getElementById("chs-"+num).innerHTML=q.choices.map((c,i)=>{
    const idx=i+1;
    let cls="choice dis";
    if(idx===q.answer) cls+=" ca";
    else if(idx===st.sel) cls+=" wa";
    const dot=idx===q.answer?"✓":(idx===st.sel?"✗":"");
    return `<div class="${cls}"><div class="dot">${dot}</div><span>${escH(c)}</span></div>`;
  }).join("");
  const btn=document.getElementById("btn-"+num);
  btn.disabled=true; btn.textContent=st.correct?"✓ 정답":"✗ 오답";
  const ex=document.getElementById("ex-"+num);
  ex.innerHTML=buildExpl(q); ex.classList.add("show");
  updStats();
}

renderTabs(); renderQs(); updStats();

</script>
</body>
</html>
