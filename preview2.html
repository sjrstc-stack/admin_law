은 아님.", "3": "생명·신체 침해로 인한 국가배상청구권은 압류금지 대상임.", "4": "손해 및 가해자를 알지 못한 경우 소멸시효 장기기간은 5년으로 봄.", "5": "외국인 피해자는 상호보증이 있어야 국가배상법 적용을 받을 수 있음."}}}, {"qnum": 44, "answer": 4, "title": "44. 공물에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 공공용물은 직접 행정주체 자신의 사용에 제공된 공물을 말한다.", "② 국가 또는 지방자치단체가 소유권자인 공물을 국유공물이라 한다.", "③ 공물의 관리주체와 공물의 귀속주체가 다른 공물을 자유공물(自有公物)이라고 한다.", "④ 경찰견은 동산공물에 해당한다.", "⑤ 도로, 공원 등은 자연공물에 해당한다."], "explanation": {"summary": "경찰견처럼 행정목적 수행에 제공되는 동산은 동산공물이다. 공공용물·공용물, 자유공물·타유공물, 자연공물·인공공물의 구별을 정확히 해야 함.", "options": {"1": "공공용물은 일반 공중의 공동사용에 제공된 공물이고, 행정주체 자신의 사용에 제공된 것은 공용물임.", "2": "국가 소유면 국유공물, 지방자치단체 소유면 공유공물이다. 선지는 둘을 혼동함.", "3": "관리주체와 귀속주체가 다르면 타유공물이지 자유공물이 아님.", "4": "옳음. 경찰견은 행정목적 수행에 제공되는 동산공물로 볼 수 있음.", "5": "도로·공원은 인공적으로 형성·관리되는 인공공물임."}}}, {"qnum": 45, "answer": 1, "title": "45. 권한의 대리와 위임에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)", "statement_lines": ["ㄱ. 지방자치단체의 장이 수임한 기관위임사무의 일부를 재위임하고자 하는 경우 위임자의 승인을 얻어 규칙으로 재위임할 수 있다.", "ㄴ. 내부위임의 경우 수임관청이 자신의 명의로 행정처분을 하였더라도 항고소송 에서의 피고는 위임관청이 된다.", "ㄷ. 권한의 위임은 반드시 법적 근거를 요하는 것은 아니다.", "ㄹ. 지정대리란 법정사실이 발생하면 법상 당연히 특정한 자에게 대리권이 부여 되어 대리관계가 성립하는 것을 말한다."], "options": ["① ㄱ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "explanation": {"summary": "권한의 위임은 법적 근거가 필요하고, 내부위임은 권한 귀속이 이동하지 않는다. 지정대리는 법정대리가 아니라 지정행위로 성립한다. 따라서 ㄱ만 맞는지 묻는 문제다.", "statements": [{"label": "ㄱ", "text": "지방자치단체의 장이 수임한 기관위임사무의 일부를 재위임하고자 하는 경우 위임자의 승인을 얻어 규칙으로 재위임할 수 있다.", "comment": "옳음. 기관위임사무 재위임의 전형적 요건이다."}, {"label": "ㄴ", "text": "내부위임의 경우 수임관청이 자신의 명의로 행정처분을 하였더라도 항고소송에서의 피고는 위임관청이 된다.", "comment": "틀림. 자신의 명의로 처분이 외부에 표시되었다면 항고소송상 피고적격 판단은 명의자를 기준으로 본다. 내부위임 법리와 피고적격을 기계적으로 연결하면 안 된다."}, {"label": "ㄷ", "text": "권한의 위임은 반드시 법적 근거를 요하는 것은 아니다.", "comment": "틀림. 권한 귀속의 변동을 가져오는 위임은 법적 근거가 필요하다."}, {"label": "ㄹ", "text": "지정대리란 법정사실이 발생하면 법상 당연히 특정한 자에게 대리권이 부여되어 대리관계가 성립하는 것을 말한다.", "comment": "틀림. 이는 법정대리 설명이고, 지정대리는 지정행위로 성립한다."}], "options": {"1": "ㄱ만 옳다. 따라서 이 조합이 맞다.", "2": "ㄴ이 틀리므로 오답이다.", "3": "ㄴ, ㄷ이 모두 틀려 오답이다.", "4": "ㄹ이 틀려 오답이다.", "5": "ㄴ·ㄷ·ㄹ이 모두 틀려 오답이다."}}}, {"qnum": 46, "answer": 4, "title": "46. 행정조직에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 훈령이란 상급관청이 하급관청의 권한행사를 지휘하기 위해 발하는 명령이다.", "② 공무원이 대외적 구속력이 없는 훈령에 위반한 경우에도 위법은 아니며 징계책임이 부과될 수 있을 뿐이다.", "③ 상급관청은 직권에 의해 하급관청의 위법ㆍ부당한 행위의 취소를 명할 수 있다.", "④ 징계위원회 같은 의결기관으로서의 위원회는 의결권은 물론이고 정해진 의사를 대외적 으로 표시할 권한을 갖는다.", "⑤ 주관쟁의결정권이란 하급관청 사이에 권한의 분쟁이 있는 경우, 상급관청이 그 분쟁을 해결하고 결정하는 권한을 말한다."], "explanation": {"summary": "의결기관으로서의 위원회는 원칙적으로 의결권만 있고 대외적 의사표시권은 없다. 훈령 위반의 효력, 직무감독권, 주관쟁의결정권은 행정조직 기본 논점.", "options": {"1": "훈령은 상급관청이 하급관청을 지휘하기 위해 발하는 일반적 명령으로 이해함.", "2": "대외적 구속력 없는 훈령 위반은 일반 국민에 대한 위법과 직결되지 않지만 내부 징계사유가 될 수 있음.", "3": "상급관청은 직무감독권에 따라 하급관청의 위법·부당한 처분 시정을 명할 수 있음.", "4": "틀림. 징계위원회 같은 의결기관은 원칙적으로 의결권만 가질 뿐 대외적 의사표시권은 없음.", "5": "주관쟁의결정권의 설명으로 옳음."}}}, {"qnum": 47, "answer": 5, "title": "47. 경찰책임에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 행위능력이 없는 자도 경찰책임자가 될 수 있다.", "② 경찰책임자에 대한 경찰권의 발동이 어려운 경우에는 예외적으로 경찰책임이 없는 자에 게도 경찰권이 발동될 수 있다.", "③ 물건에 대한 권원의 유무와 관계없이 물건을 현실적으로 지배하고 있는 자에게도 상태 책임이 인정된다.", "④ 행위책임의 행위에는 부작위를 포함한다.", "⑤ 타인을 감독하는 자가 타인의 행위에 대하여 지는 경찰책임은 자기책임이 아니라 타인의 책임을 대신하여 지는 것이다."], "explanation": {"summary": "타인을 감독하는 자의 경찰책임은 대체책임이 아니라 감독의무 위반에 기초한 자기책임으로 이해한다. 나머지는 행위책임·상태책임 일반론에 부합한다.", "options": {"1": "행위능력 없는 자라도 위험원인 제공과 관련되면 경찰책임자가 될 수 있음.", "2": "책임자에게 발동이 곤란하면 예외적으로 비책임자에게도 경찰권 발동이 가능함.", "3": "물건을 현실적으로 지배하면 권원 유무와 별개로 상태책임이 인정될 수 있음.", "4": "행위책임의 행위에는 부작위도 포함됨.", "5": "틀림. 감독자의 책임은 타인의 책임을 대신 지는 것이 아니라 자기의 감독의무 위반에 대한 자기책임임."}}}, {"qnum": 48, "answer": 2, "title": "48. 공무원관계에 관한 판례의 태도로 옳은 것은?", "statement_lines": [], "options": ["① 공무원임용결격사유가 있는지의 여부는 임용당시가 아닌 채용후보자 명부에 등록한 때에 시행되던 법률을 기준으로 하여 판단하여야 한다.", "② 임용당시 공무원임용결격사유가 있었다면 비록 국가의 과실에 의하여 임용결격자임을 밝혀내지 못하였다 하더라도 그 임용행위는 당연무효이다.", "③ 국가가 공무원임용결격사유가 있는 자에 대해 결격사유가 있음을 알지 못하고 임용하였 다가 사후에 결격사유가 있는 자임을 발견하고 임용행위를 취소하는 경우, 그 취소권은 시효의 제한을 받는다.", "④ 시험승진후보자명부에서의 삭제행위는 행정처분이다.", "⑤ 직위해제는 징계처분에 해당한다."], "explanation": {"summary": "임용결격사유가 있는 자에 대한 임용은 원칙적으로 당연무효라는 것이 판례의 기본 태도다. 삭제행위 처분성, 직위해제의 성질도 함께 정리해야 한다.", "options": {"1": "임용결격 여부는 임용 당시 시행 법률을 기준으로 판단하는 것이 원칙이다.", "2": "옳음. 임용 당시 결격사유가 있었다면 국가의 과실과 무관하게 임용행위는 당연무효로 본다.", "3": "당연무효 임용의 취소권 문제로 시효 제한을 논하는 방식은 부적절하다.", "4": "시험승진후보자명부 삭제행위의 처분성은 일반적으로 부정된다.", "5": "직위해제는 징계처분이 아니라 인사행정상 잠정조치다."}}}, {"qnum": 49, "answer": 5, "title": "49. 지방자치법상 주민소송에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 주민소송은 민중소송이며 객관소송이다.", "② 해당 행위를 계속하면 회복하기 곤란한 손해가 발생할 우려가 있는 경우에 그 행위의 전부나 일부를 중지할 것을 요구하는 소송을 주민소송으로 제기할 수 있다.", "③ 주민소송을 제기하기 위해서는 그에 앞서 당해 사안에 대해 주민감사청구를 하여야 한다.", "④ 소송의 계속(繫屬) 중에 소송을 제기한 주민이 사망하면 소송절차는 중단된다.", "⑤ 주민소송이 진행 중이라도 다른 주민은 같은 사항에 대하여 별도의 소송을 제기할 수있다."], "explanation": {"summary": "주민소송은 같은 사항에 대해 중복제기가 허용되지 않는다. 이미 같은 사항에 대한 소송이 계속 중이면 다른 주민은 참가하거나 그 결과에 따르는 구조이지 별도 제기할 수 없음.", "options": {"1": "주민소송은 객관적 적법성 통제를 위한 민중소송 성격을 가짐.", "2": "행위 중지를 구하는 소송유형도 주민소송에 포함됨.", "3": "주민감사청구는 주민소송의 전치요건임.", "4": "제기 주민 사망 시 절차중단이 문제된다는 설명 자체는 법 구조와 부합함.", "5": "틀림. 동일 사항에 대해 별도의 주민소송을 중복 제기할 수 없음."}}}, {"qnum": 50, "answer": 4, "title": "50. 행정소송법상 취소소송에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 무효인 처분에 대하여는 무효확인청구소송을 제기하여야 하고 취소소송을 제기할 수는 없다.", "② 신청에 대한 거부행위는 취소소송의 대상이 될 수 없다.", "③ 처분등을 할 정당한 권한을 가진 행정청만이 피고적격을 갖는다.", "④ 처분이 위법한 것으로 인정되는 경우에도 공공복리를 위하여 원고의 청구가 기각될 수있다.", "⑤ 과세처분취소소송에서 적법하게 부과될 정당한 세액이 산출되더라도 법원은 정당한 세액을 초과하는 부분만 취소할 수는 없고 전부를 취소하여야 한다."], "explanation": {"summary": "취소소송에서도 사정판결이 가능하다. 처분이 위법해도 취소가 현저히 공공복리에 적합하지 않으면 법원은 청구를 기각할 수 있다는 점이 핵심.", "options": {"1": "무효인 처분도 취소소송으로 다툴 수 있음. 무효확인소송만 가능한 것이 아님.", "2": "신청에 대한 거부처분도 항고소송의 대상이 됨.", "3": "피고는 처분등을 외부에 명의로 행한 행정청이며, 실질 권한 보유자와 일치하지 않을 수 있음.", "4": "옳음. 처분이 위법하더라도 공공복리를 위해 사정판결로 청구를 기각할 수 있음.", "5": "과세처분은 정당세액 범위를 넘는 부분만 일부취소가 가능함."}}}]}, {"id": "2021", "title": "2021년도 제9회 행정사 1차 1교시 A형 ( 22 - 9 )", "label": "2021 제9회 1교시 A형", "questions": [{"qnum": 26, "answer": 1, "title": "26. 행정의 법원칙 중 행정기본법에 명문으로 규정하고 있는 것이 아닌 것은?", "statement_lines": [], "options": ["① 행정의 자기구속의 원칙", "② 부당결부금지의 원칙", "③ 성실의무 및 권한남용금지의 원칙", "④ 비례의 원칙", "⑤ 평등의 원칙"], "explanation": {"summary": "행정기본법에 명문 규정된 원칙과 판례상 인정되는 원칙을 구분하면 됨. 행정기본법은 비례·평등·성실·권한남용금지·부당결부금지를 규정하지만, 자기구속은 명문 규정이 아니라 평등원칙에서 파생된 판례상 원칙임.", "options": {"1": "자기구속의 원칙은 행정기본법의 명문 규정이 아니라 판례상 원칙임. 따라서 정답.", "2": "부당결부금지 원칙은 행정기본법에 명문으로 규정됨.", "3": "성실의무 및 권한남용금지 원칙도 행정기본법상 명문화되어 있음.", "4": "비례의 원칙 역시 행정기본법상 명문 원칙임.", "5": "평등의 원칙도 행정기본법이 명시하고 있음."}}}, {"qnum": 27, "answer": 4, "title": "27. 법령등 시행일의 기간 계산에 관한 설명으로 옳은 것을 모두 고른 것은?", "statement_lines": ["ㄱ. 법령등을 공포한 날부터 시행하는 경우에는 공포한 날을 시행일로 한다.", "ㄴ. 법령등을 공포한 날부터 일정 기간이 경과한 날부터 시행하는 경우 법령을 공포한 날을 첫날에 산입하지 아니한다.", "ㄷ. 법령등을 공포한 날부터 일정 기간이 경과한 날부터 시행하는 경우 그 기간의 말일이 토요일 또는 공휴일인 때에는 그 말일로 기간이 만료한다.", "ㄹ. 대통령령은 특별한 규정이 없으면 공포한 날부터 10일이 경과함으로써 효력을 발생한다."], "options": ["① ㄱ, ㄴ", "② ㄱ, ㄹ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄴ, ㄷ, ㄹ"], "explanation": {"summary": "시행일 계산은 '첫날 산입 여부'와 '말일이 공휴일인 경우'를 나눠 보면 됨. 공포한 날부터 시행이면 그날이 시행일이고, 일정 기간 경과 후 시행이면 공포일은 산입하지 않음. 기간 말일이 토요일·공휴일이면 그 말일로 만료한다는 점도 주의.", "statements": {"ㄱ": "맞음. '공포한 날부터 시행'이면 공포일 자체가 시행일임.", "ㄴ": "맞음. 공포한 날부터 일정 기간이 경과한 날부터 시행하는 경우 공포일은 초일 불산입임.", "ㄷ": "맞음. 시행일 계산에 관한 특례로 말일이 토요일·공휴일이어도 그 말일에 기간이 만료함.", "ㄹ": "틀림. 법률은 특별한 규정이 없으면 공포 후 20일 경과로 효력 발생하지만, 대통령령을 일률적으로 10일 경과 후 효력 발생으로 볼 수 없음."}, "options": {"1": "ㄱ, ㄴ만 맞다고 보면 ㄷ을 빠뜨린 것이라 틀림.", "2": "ㄹ이 틀리므로 이 조합은 틀림.", "3": "ㄷ은 맞지만 ㄹ이 틀려서 오답.", "4": "ㄱ, ㄴ, ㄷ이 맞고 ㄹ이 틀리므로 정답 조합.", "5": "ㄹ이 포함되어 틀림."}}}, {"qnum": 28, "answer": 3, "title": "28. 행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 재량준칙은 일반적으로 행정조직 내부에서만 효력을 가질 뿐 대외적인 구속력을 갖는 것은 아니다.", "② 재량권 행사의 준칙인 행정규칙이 정한 바에 따라 되풀이 시행되어 행정관행이 형성되어 행정기관이 그 상대방에 대한 관계에서 그 규칙에 따라야 할 자기구속을 당하게 되는 경우에는 헌법소원의 대상이 될 수 있다.", "③ 법원이 구체적 규범통제를 통해 위헌․위법으로 선언할 심판대상은 원칙적으로 해당 규정 전체이고, 재판의 전제성이 인정되는 조항에 한정되지 않는다.", "④ 헌법이 인정하고 있는 위임입법의 형식은 예시적인 것으로 보아야 한다.", "⑤ 보건복지부 고시인 약제급여․비급여목록 및 급여상한금액표에 대해서는 취소소송으로 다툴 수 있다."], "explanation": {"summary": "구체적 규범통제에서 법원이 심판대상으로 삼는 범위는 '재판의 전제가 된 규정'임. 판례는 문제된 조항 전체를 무한정 심판하는 것이 아니라 재판의 전제성이 인정되는 부분으로 한정함.", "options": {"1": "옳음. 재량준칙은 원칙적으로 내부규율인 행정규칙임.", "2": "옳음. 재량준칙이 반복 적용되어 행정관행이 형성되면 자기구속이 문제되고, 경우에 따라 헌법소원 대상이 될 수 있음.", "3": "틀림. 구체적 규범통제의 심판대상은 원칙적으로 재판의 전제성이 인정되는 조항으로 한정됨. 규정 전체가 당연히 대상이 되는 것은 아님.", "4": "옳음. 헌법상 위임입법 형식은 반드시 열거된 형식에 한정된다고 보지 않음.", "5": "옳음. 약제급여 고시는 대외적 구속력을 가지므로 취소소송으로 다툴 수 있음."}}}, {"qnum": 29, "answer": 4, "title": "29. 재량행위와 기속행위에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 공유수면 관리 및 매립에 관한 법률상 공유수면 점용허가는 기속행위이다.", "② 재외동포에 대한 사증발급과 관련한 재량권 불행사는 그 자체로 재량권 일탈․남용에 해당하지 않으므로 해당 처분을 취소하여야 할 위법사유가 되지 않는다.", "③ 국토의 계획 및 이용에 관한 법률에 의하여 지정된 도시지역 안에서 토지의 형질변경행 위를 수반하는 건축허가의 법적 성질은 기속행위이다.", "④ 법령상 감경사유가 있는 경우 이를 전혀 고려하지 않은 과징금 부과처분은 위법하다.", "⑤ 행정청이 제재처분 양정을 하면서 이익형량을 하였다면 그 양정에 정당성․객관성이 결여된 경우라도 위법은 아니다."], "explanation": {"summary": "제재처분에서 법령상 감경사유를 전혀 고려하지 않으면 재량권을 제대로 행사하지 않은 것으로 위법이 됨. 재량이라도 형량을 해야 하고, 법정 감경요소를 배제하면 재량권 일탈·남용 문제가 바로 생김.", "options": {"1": "틀림. 공유수면 점용허가는 공익·환경·이용조정 판단이 수반되어 재량행위로 봄.", "2": "틀림. 재량권 불행사도 고려해야 할 사항을 전혀 고려하지 않은 경우 재량권 일탈·남용으로 위법사유가 될 수 있음.", "3": "틀림. 토지 형질변경을 수반하는 건축허가는 공익판단이 수반되어 재량행위로 봄.", "4": "옳음. 법령상 감경사유를 전혀 고려하지 않은 과징금 부과는 재량권 행사 자체에 하자가 있어 위법함.", "5": "틀림. 이익형량을 했다는 형식만으로 족하지 않음. 양정에 정당성·객관성이 없으면 위법할 수 있음."}}}, {"qnum": 30, "answer": 5, "title": "30. A시장은 甲소유 토지의 일부를 기부채납하는 조건(강학상 부담으로 본다)으로 甲이 신청한 개발제한구역 내의 토지형질변경행위허가를 한 후 甲과 기부채납 이행을 위한 증여계약을 체결하였다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 甲이 기부채납을 불이행할 경우, A시장은 토지형질변경행위허가를 철회할 수 있다.", "② 甲은 기부채납의 부관만을 대상으로 하여 취소소송을 제기할 수 있다.", "③ 기부채납의 부관이 당연무효이거나 취소되지 아니한 이상 甲은 위 부관으로 인한 증여 계약의 중요부분의 착오를 이유로 증여계약을 취소할 수 없다.", "④ 토지형질변경행위허가를 함에 있어 부관을 붙일 필요가 있는지의 유무 등을 판단함에 있어서는 A시장에게 재량의 여지가 있다.", "⑤ A시장은 토지형질변경행위허가를 한 후에는 甲의 동의가 있는 경우라도 부관을 새로 붙일 수 없다."], "explanation": {"summary": "부관은 주된 행정행위와 독립해 다툴 수 있고, 위법한 부관에 기초한 후속 법률행위 문제도 별도로 검토해야 함. 다만 상대방 동의가 있으면 사후에 새로운 부관을 붙이는 것도 가능하다는 판례 태도를 기억해야 함.", "options": {"1": "옳음. 부담 불이행은 허가철회의 사유가 될 수 있음.", "2": "옳음. 부담은 독립쟁송가능성이 인정되어 부관만을 대상으로 취소소송 가능.", "3": "옳음. 부관이 유효하게 존속하는 이상 그에 기초한 증여계약의 중요부분 착오를 쉽게 주장할 수 없음.", "4": "옳음. 부관 부가 필요성·내용은 허가권자의 재량판단 영역이 있음.", "5": "틀림. 상대방의 동의가 있으면 허가 후에도 새로운 부관을 붙일 수 있음."}}}, {"qnum": 31, "answer": 3, "title": "31. 행정행위의 법적 성질을 바르게 연결한 것은? (다툼이 있으면 판례에 따름)", "statement_lines": ["ㄱ. 구 자동차관리법상 자동차정비조합설립인가 ㄴ. 구 도시계획법상 개발제한구역 내의 건축허가 ㄷ. 기부금품모집규제법상 기부금품모집허가"], "options": ["① ㄱ: 인가, ㄴ: 예외적 허가, ㄷ: 특허", "② ㄱ: 인가, ㄴ: 허가, ㄷ: 특허", "③ ㄱ: 인가, ㄴ: 예외적 허가, ㄷ: 허가", "④ ㄱ: 특허, ㄴ: 인가, ㄷ: 허가", "⑤ ㄱ: 허가, ㄴ: 특허, ㄷ: 인가"], "explanation": {"summary": "행정행위의 법적 성질은 기본행위의 자유회복인지, 금지해제인지, 새로운 권리설정인지로 구별하면 정리됨. 자동차정비조합설립인가는 기본행위의 효력을 완성하는 인가, 개발제한구역 내 건축허가는 금지해제의 성격을 넘어선 예외적 허가, 기부금품모집허가는 일반적 금지를 해제하는 허가임.", "statements": {"ㄱ": "자동차정비조합설립인가는 조합설립행위의 효력을 완성하는 인가.", "ㄴ": "개발제한구역 내 건축허가는 일반 건축자유를 제한한 상태에서 예외적으로 허용하는 예외적 허가.", "ㄷ": "기부금품모집허가는 일반적 금지를 특정인에게 해제하는 허가."}, "options": {"1": "ㄷ을 특허로 본 점이 틀림.", "2": "ㄴ을 단순 허가로 본 점이 틀림.", "3": "ㄱ 인가, ㄴ 예외적 허가, ㄷ 허가로 올바른 연결임.", "4": "ㄱ, ㄴ의 성질이 모두 틀림.", "5": "전부 잘못 연결됨."}}}, {"qnum": 32, "answer": 5, "title": "32. 처분의 취소 또는 변경에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 처분의 위법은 직권취소의 사유가 되지만, 처분의 부당은 직권취소의 사유가 되지 않는다.", "② 수익적 처분의 직권취소 필요성에 관한 증명책임은 처분의 상대방에 있다.", "③ 수익적 처분에 대한 직권취소의 경우에는 행정절차법상 사전통지가 필요하지 않다.", "④ 행정청은 행정소송이 계속되고 있는 때에는 직권으로 해당 처분을 변경할 수 없다.", "⑤ 산업재해보상보험법상 연금지급결정을 취소하는 처분이 적법하다고 하여 그에 터 잡은 징수처분이 반드시 적법한 것은 아니다."], "explanation": {"summary": "직권취소는 위법뿐 아니라 부당도 사유가 될 수 있고, 수익적 처분 취소에는 신뢰보호·사전통지 문제가 함께 따라옴. 또 본처분과 후행 징수처분은 별개의 처분이라 각각 적법요건을 따져야 함.", "options": {"1": "틀림. 직권취소 사유에는 위법뿐 아니라 부당도 포함될 수 있음.", "2": "틀림. 수익적 처분의 직권취소 필요성은 이를 주장하는 처분청이 증명해야 함.", "3": "틀림. 수익적 처분을 불이익하게 직권취소하는 경우 원칙적으로 사전통지가 필요함.", "4": "틀림. 소송 계속 중에도 행정청은 직권으로 처분을 변경·취소할 수 있음.", "5": "옳음. 연금지급결정 취소가 적법하더라도, 그에 기초한 징수처분은 별도의 법적 근거와 요건을 갖추어야 하므로 당연히 적법해지는 것은 아님."}}}, {"qnum": 33, "answer": 1, "title": "33. A시는 조례에 근거하여 甲회사와 생활폐기물수집․운반대행위탁계약을 체결하였다.", "statement_lines": ["이 계약에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)"], "options": ["① 사법상 계약으로 계약자유의 원칙이 적용된다.", "② 국가를 당사자로 하는 계약에 관한 법률이 적용된다.", "③ 계약의 체결에 관한 다툼은 공법상 당사자소송에 의한다.", "④ 계약절차에는 행정절차법이 적용된다.", "⑤ 계약의 해지 통보에 관한 다툼은 취소소송에 의한다."], "explanation": {"summary": "생활폐기물 수집·운반 대행위탁계약은 판례상 사법상 계약으로 봄. 따라서 체결·해지 등 분쟁은 원칙적으로 민사소송 사항이고, 행정절차법이나 항고소송 구조로 풀지 않음.", "options": {"1": "옳음. 해당 대행위탁계약은 사법상 계약으로 보아 계약자유 원칙이 적용됨.", "2": "틀림. 국가계약법이 당연 적용되는 구조가 아님.", "3": "틀림. 공법상 당사자소송이 아니라 민사소송으로 다툼.", "4": "틀림. 계약 체결절차 전반에 행정절차법이 직접 적용되는 것은 아님.", "5": "틀림. 해지 통보도 사법상 의사표시 문제이므로 취소소송 대상이 아님."}}}, {"qnum": 34, "answer": 5, "title": "34. 행정절차법이 정하고 있는 적용제외 대상이 아닌 것은?", "statement_lines": [], "options": ["① 국가안전보장ㆍ국방ㆍ외교 또는 통일에 관한 사항 중 행정절차를 거칠 경우 국가의 중대한 이익을 현저히 해칠 우려가 있는 사항", "② 감사원이 감사위원회의의 결정을 거쳐 행하는 사항", "③ 심사청구, 해양안전심판, 조세심판, 특허심판, 행정심판, 그 밖의 불복절차에 따른 사항", "④ 국회 또는 지방의회의 의결을 거치거나 동의 또는 승인을 받아 행하는 사항", "⑤ 처분의 전제가 되는 사실이 경찰의 수사에 의하여 객관적으로 증명된 사항"], "explanation": {"summary": "행정절차법은 일정 사항을 적용제외로 두지만, '수사로 사실이 객관적으로 증명된 사항'은 적용제외 사유가 아니라 의견청취 생략 등 일부 절차의 예외 사유로 다뤄짐. 적용제외와 절차생략을 구별해야 함.", "options": {"1": "행정절차법상 적용제외 대상임.", "2": "감사원 결정에 따른 사항은 적용제외 대상임.", "3": "각종 불복절차에 따른 사항 역시 적용제외 대상임.", "4": "국회·지방의회 의결 등을 거쳐 행하는 사항도 적용제외 대상임.", "5": "적용제외 대상이 아님. 이는 일부 절차생략 사유와 연결될 수 있을 뿐, 행정절차법 전체의 적용제외 사유는 아님."}}}, {"qnum": 35, "answer": 4, "title": "35. 행정절차법상 처분절차에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 처분을 할 때 해당 처분의 영향이 광범위하여 널리 의견을 수렴할 필요가 있다고 행정 청이 인정하는 경우에는 공청회를 개최한다.", "② 행정청은 인허가 등의 취소 시 의견제출기한 내에 당사자등의 신청이 있는 경우에는 청문을 한다.", "③ 청문ㆍ공청회 또는 의견제출을 거쳤을 때에는 신속히 처분하여 해당 처분이 지연되지 아니하도록 하여야 한다.", "④ 행정청은 처분을 할 때에는 이해관계인에게 그 근거와 이유를 제시하여야 한다.", "⑤ 행정청은 처분을 신속히 처리할 필요가 있거나 사안이 경미한 경우에는 말 또는 그 밖의 방법으로 할 수 있다."], "explanation": {"summary": "이유제시는 처분의 직접 상대방인 '당사자'에게 하는 것이 원칙임. 이해관계인 일반에게까지 이유제시의무가 있다고 보면 범위를 과도하게 넓힌 것임.", "options": {"1": "옳음. 영향이 광범위하면 행정청은 공청회를 개최할 수 있음.", "2": "옳음. 인허가 등 취소 시 일정한 경우 청문이 요구됨.", "3": "옳음. 의견청취를 마치면 신속히 처분해야 함.", "4": "틀림. 이유제시의 상대방은 원칙적으로 '당사자'이지 이해관계인 일반이 아님.", "5": "옳음. 신속처리 필요 또는 경미한 사안은 말 등 간이한 방법으로 가능."}}}, {"qnum": 36, "answer": 4, "title": "36. 공공기관의 정보공개에 관한 법률에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 국내에 학술ㆍ연구를 위하여 일시적으로 체류하는 외국인은 정보공개를 청구할 권리가 없다.", "② 공개 청구한 정보가 비공개대상인 부분과 공개 가능한 부분이 혼합되어 있는 경우 부분 공개는 할 수 없다.", "③ 사립대학교는 정보공개의무를 지는 공공기관에 해당하지 않는다.", "④ 정보공개를 요구받은 공공기관이 공개를 거부하는 경우에는 비공개사유에 해당하는지를 주장ㆍ입증하지 아니한 채 개괄적인 사유만을 들어 공개를 거부할 수 없다.", "⑤ 청구인은 공공기관의 비공개 결정에 대하여 불복이 있는 경우 이의신청 절차를 거치지 아니하고는 행정심판을 청구할 수 없다."], "explanation": {"summary": "정보비공개처분은 비공개사유에 해당한다는 점을 공공기관이 구체적으로 주장·입증해야 함. 막연한 추상적 사유만으로는 비공개 정당화가 안 됨.", "options": {"1": "틀림. 일정한 요건을 갖춘 외국인도 정보공개청구권이 인정될 수 있음.", "2": "틀림. 비공개 부분을 제외하고 공개 가능한 부분은 부분공개가 가능함.", "3": "틀림. 사립대학교도 법률상 공공기관에 해당하면 정보공개의무를 질 수 있음.", "4": "옳음. 공공기관은 비공개사유 해당성을 구체적으로 주장·입증해야 하고, 개괄적 사유만으로는 부족함.", "5": "틀림. 이의신청은 임의절차로서 거치지 않고도 행정심판 청구 가능."}}}, {"qnum": 37, "answer": 3, "title": "37. 판례에 의할 때 공공기관의 정보공개에 관한 법률에 관한 설명으로 옳은 것을 모두 고른 것은?", "statement_lines": ["ㄱ. 학교폭력대책자치위원회의 회의록은 ‘공개될 경우 업무의 공정한 수행에 현저한 지장을 초래한다고 인정할 만한 상당한 이유가 있는 정보’에 해당한다.", "ㄴ. 의사결정과정에 제공된 회의관련자료나 의사결정과정이 기록된 회의록은 의사가 결정되거나 의사가 집행된 경우에는 더 이상 의사결정과정에 있는 사항그 자체라고는 할 수 없으나, 의사결정과정에 있는 사항에 준하는 사항으로서 비공개대상정보에 포함될 수 있다.", "ㄷ. ‘진행 중인 재판에 관련된 정보’에 해당한다는 사유로 정보공개를 거부하기 위하여는 반드시 그 정보가 진행 중인 재판의 소송기록 자체에 포함되어야 한다."], "options": ["① ㄱ", "② ㄴ", "③ ㄱ, ㄴ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "explanation": {"summary": "의사결정과정 정보는 결정이 끝났다고 해서 항상 공개되는 것이 아니고, 결정과정에 준하는 정보로서 비공개될 수 있음. 반면 재판관련 정보는 반드시 소송기록 자체일 필요는 없다는 점이 자주 함정으로 나옴.", "statements": {"ㄱ": "맞음. 학교폭력대책자치위원회 회의록은 공개 시 업무의 공정한 수행에 지장을 초래할 상당한 이유가 있는 정보로 볼 수 있음.", "ㄴ": "맞음. 의사결정이 끝난 뒤에도 관련 자료·회의록이 의사결정과정에 준하는 사항으로서 비공개대상정보가 될 수 있음.", "ㄷ": "틀림. '진행 중인 재판 관련 정보'는 반드시 소송기록 자체일 필요는 없고, 재판과 구체적으로 관련된 정보도 포함될 수 있음."}, "options": {"1": "ㄱ만 보면 ㄴ을 빠뜨려 오답.", "2": "ㄴ만 보면 ㄱ을 빠뜨려 오답.", "3": "ㄱ, ㄴ만 옳으므로 정답.", "4": "ㄷ이 틀리므로 오답.", "5": "ㄷ까지 포함해 틀림."}}}, {"qnum": 38, "answer": 2, "title": "38. 행정대집행법상 대집행에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 철거대집행 계고처분 후 행한 제2차 계고는 대집행기한의 연기통지가 아니라 새로운 철거의무를 부과한 것이다.", "② 철거명령과 계고처분은 계고서라는 명칭의 1장의 문서로 이루어질 수 있다.", "③ 대집행은 처분청 스스로 하여야 하며, 대집행 권한을 제3자에게 위임․위탁할 수 없다.", "④ 후행처분인 대집행영장발부통보처분의 취소소송에서, 선행처분인 계고처분의 위법을 이유로 대집행영장발부통보처분이 위법하다는 주장을 할 수 없다.", "⑤ 행정청이 대집행의 방법으로 건물철거의무의 이행을 실현할 수 있는 경우, 건물철거 대집행 과정에서 부수적으로 건물의 점유자들에 대한 퇴거 조치를 할 수 없다."], "explanation": {"summary": "계고는 의무이행을 촉구하고 불이행 시 대집행을 예고하는 처분이므로, 선행 철거명령과 하나의 문서에 함께 기재될 수 있음. 명칭보다 내용과 기능으로 판단하는 문제임.", "options": {"1": "틀림. 제2차 계고는 사정에 따라 기한 연기 통지로 볼 수 있으며, 언제나 새로운 의무 부과로 보지 않음.", "2": "옳음. 철거명령과 계고처분은 하나의 문서에 함께 기재될 수 있음.", "3": "틀림. 대집행 실행은 제3자에게 위탁할 수 있음.", "4": "틀림. 후행 대집행영장발부통보처분 취소소송에서 선행 계고처분의 위법을 선결문제로 다툴 수 있음.", "5": "틀림. 건물철거를 위해 필요한 범위의 점유자 퇴거조치는 부수적으로 가능함."}}}, {"qnum": 39, "answer": 3, "title": "39. 행정의 실효성 확보수단에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 건축법상 이행강제금 부과처분은 항고소송으로 다툴 수는 없다.", "② 이행강제금은 대체적 작위의무의 위반에 대하여 부과될 수 없다.", "③ 건축법상 이행강제금의 납부의무는 상속인에게 승계될 수 없는 일신전속적인 성질의 것이다.", "④ 대집행에 요한 비용은 국세징수법의 예에 의하여 징수할 수 없다.", "⑤ 병무청장이 병역법에 따라 병역의무 기피자의 인적사항을 인터넷 홈페이지에 공개하는 결정은 항고소송의 대상이 되는 행정처분이 아니다."], "explanation": {"summary": "건축법상 이행강제금 납부의무는 제재적 성격이 강하여 상속인에게 승계되지 않는 일신전속적 성질로 봄. 반면 이행강제금 부과처분 자체는 처분성이 인정되고, 비용징수·명단공개도 처분성 여부를 따져야 함.", "options": {"1": "틀림. 이행강제금 부과처분은 항고소송의 대상이 됨.", "2": "틀림. 이행강제금은 대체적 작위의무 위반에 대해서도 법률이 정한 경우 부과될 수 있음.", "3": "옳음. 건축법상 이행강제금 납부의무는 일신전속적 성격으로 상속인에게 승계되지 않음.", "4": "틀림. 대집행비용은 국세징수법의 예에 따라 징수 가능함.", "5": "틀림. 병역의무 기피자 인적사항 공개결정은 권익에 직접 영향을 미쳐 처분성이 인정됨."}}}, {"qnum": 40, "answer": 5, "title": "40. 행정권한의 위임 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정권한의 위임은 법률에 규정된 행정기관의 장의 권한 중 일부를 그 보조기관 또는 하급행정기관의 장이나 지방자치단체의 장에게 맡겨 그의 권한과 책임 아래 행사하도록 하는 것이다.", "② 행정권한의 내부위임은 법률이 위임을 허용하고 있지 아니한 경우에도 행정관청의 내부 적인 사무처리의 편의를 도모하기 위하여 그의 보조기관 또는 하급행정관청으로 하여금 그의 권한을 사실상 행사하게 하는 것이다.", "③ 위임기관은 수임기관의 수임사무 처리에 대하여 지휘ㆍ감독하고, 그 처리가 위법하거나 부당하다고 인정될 때에는 이를 취소하거나 정지시킬 수 있다.", "④ 수임사무의 처리에 관하여 위임기관은 수임기관에 대하여 사전승인을 받거나 협의를 할것을 요구할 수 없다.", "⑤ 행정기관은 위임을 받은 사무의 전부 또는 일부를 보조기관 또는 하급행정기관에 재위 임할 수 없다."], "explanation": {"summary": "재위임은 일률적으로 금지되는 것이 아니라 법령상 근거 등 일정 요건 아래 허용될 수 있음. 위임·내부위임·재위임을 구별해야 함.", "options": {"1": "옳음. 위임의 일반적 정의에 맞음.", "2": "옳음. 내부위임은 법률상 위임근거가 없어도 내부 사무처리 편의를 위해 이루어질 수 있음.", "3": "옳음. 위임기관은 수임기관을 지휘·감독하고 위법·부당 처리에 대해 취소·정지시킬 수 있음.", "4": "옳음. 수임사무 처리에 대해 사전승인이나 협의를 일률적으로 요구할 수 없다는 취지임.", "5": "틀림. 재위임은 절대 금지가 아니며, 법령상 근거나 승인 아래 허용될 수 있음."}}}, {"qnum": 41, "answer": 1, "title": "41. 행정기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 법령에 따라 행정권한을 위탁받은 사인은 행정청이 될 수 없다.", "② 행정에 관한 의사를 결정하여 표시하는 국가 또는 지방자치단체의 기관은 행정청이다.", "③ 지방자치단체는 그 소관 사무의 일부를 독립하여 수행할 필요가 있으면 법령이나 그 지방자치단체의 조례로 정하는 바에 따라 합의제행정기관을 설치할 수 있다.", "④ 행정기관의 장은 소관사무를 통할하고 소속공무원을 지휘ㆍ감독한다.", "⑤ 정부조직법은 합의제행정기관의 설치에 관한 법적 근거를 두고 있다."], "explanation": {"summary": "행정청은 국가나 지방자치단체의 기관만을 뜻하지 않음. 법령에 따라 공권력을 행사하도록 권한을 위탁받은 사인도 그 범위 안에서 행정청이 될 수 있음.", "options": {"1": "틀림. 권한을 위탁받은 사인은 그 범위 안에서 행정청이 될 수 있음.", "2": "옳음. 행정에 관한 의사를 결정·표시하는 기관은 행정청임.", "3": "옳음. 지방자치단체는 법령 또는 조례에 따라 합의제행정기관을 설치할 수 있음.", "4": "옳음. 행정기관의 장은 소관사무를 통할하고 소속공무원을 지휘·감독함.", "5": "옳음. 정부조직법은 합의제행정기관 설치의 근거를 둠."}}}, {"qnum": 42, "answer": 2, "title": "42. 행정절차법에서 규정하고 있지 않은 것은?", "statement_lines": [], "options": ["① 신고", "② 공법상 계약", "③ 행정지도", "④ 행정예고", "⑤ 행정상 입법예고"], "explanation": {"summary": "행정절차법은 처분·신고·행정지도·행정예고·입법예고를 규율하지만, 공법상 계약을 일반적으로 규정하지는 않음. 따라서 조문상 규정 유무를 묻는 문제.", "options": {"1": "행정절차법에 규정되어 있음.", "2": "공법상 계약은 행정절차법이 일반적으로 규정하고 있지 않으므로 정답.", "3": "행정지도는 규정되어 있음.", "4": "행정예고도 규정되어 있음.", "5": "행정상 입법예고 역시 규정되어 있음."}}}, {"qnum": 43, "answer": 5, "title": "43. 판례에 의할 때 항고소송의 대상인 것을 모두 고른 것은?", "statement_lines": ["ㄱ. 어업권 면허에 선행하는 우선순위결정 ㄴ. 농지법상 이행강제금 부과처분 ㄷ. 구 청소년보호법상 청소년유해매체물 결정 및 고시처분 ㄹ. 두밀분교를 폐교하는 경기도의 조례"], "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄴ, ㄹ", "⑤ ㄷ, ㄹ"], "explanation": {"summary": "항고소송 대상이 되려면 국민의 권리의무에 직접 구체적으로 영향을 미치는 처분이어야 함. 고시형 결정과 직접효를 갖는 조례는 처분성이 인정될 수 있지만, 선행적 내부결정이나 모든 제재조치는 당연히 처분이 되는 것은 아님.", "statements": {"ㄱ": "틀림. 어업권 면허에 선행하는 우선순위결정은 최종 면허처분의 전단계 판단으로서 독립된 처분성이 부정됨.", "ㄴ": "틀림. 이 문제에서는 농지법상 이행강제금 부과처분을 항고소송 대상으로 보지 않는 취지로 출제됨.", "ㄷ": "맞음. 청소년유해매체물 결정·고시는 직접 대외적 법률효과를 발생시켜 처분성 인정.", "ㄹ": "맞음. 특정 분교 폐교를 내용으로 하는 조례처럼 직접 구체적 권리의무에 영향을 미치는 경우 예외적으로 처분성이 인정됨."}, "options": {"1": "ㄱ, ㄴ은 모두 처분성이 부정되어 틀림.", "2": "ㄱ이 틀려 오답.", "3": "ㄴ을 포함해 오답.", "4": "ㄹ은 맞지만 ㄴ이 틀려 오답.", "5": "ㄷ, ㄹ이 항고소송 대상이므로 정답."}}}, {"qnum": 44, "answer": 2, "title": "44. 행정심판법에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 행정심판위원회는 당사자의 동의가 없더라도 심판청구의 신속하고 공정한 해결을 위하여 조정을 할 수 있다.", "② 행정심판위원회는 사정재결시 그 재결의 주문에서 그 처분 또는 부작위가 위법하거나 부당하다는 것을 구체적으로 밝혀야 한다.", "③ 집행정지로 목적을 달성할 수 있는 경우에도 임시처분이 허용된다.", "④ 처분청이 심판청구기간을 법정기간보다 긴 기간으로 잘못 고지한 경우, 심판청구기간은 당해 처분이 있은 날부터 180일이 된다.", "⑤ 행정심판위원회는 심판청구의 대상이 되는 처분보다 청구인에게 불리한 재결을 할 수있다."], "explanation": {"summary": "사정재결은 처분이나 부작위가 위법·부당하더라도 재결로 이를 취소·변경하지 않는 제도이므로, 재결 주문에서 위법·부당성을 구체적으로 밝혀야 함. 조정은 당사자 쌍방 동의가 필요하고, 임시처분은 집행정지로 목적 달성이 어려운 경우에만 가능.", "options": {"1": "틀림. 조정은 당사자의 동의가 있어야 함.", "2": "옳음. 사정재결을 할 때에는 주문에서 처분 또는 부작위의 위법·부당함을 구체적으로 밝혀야 함.", "3": "틀림. 임시처분은 집행정지로 목적을 달성할 수 없는 경우에 예외적으로 허용됨.", "4": "틀림. 잘못 고지한 경우에는 그 고지한 기간 내에 청구하면 되고, 일률적으로 처분일부터 180일이 되는 것은 아님.", "5": "틀림. 행정심판에도 불이익변경금지 원칙이 적용됨."}}}, {"qnum": 45, "answer": 2, "title": "45. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법률에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 사업인정처분이 당연무효이면 그것이 유효함을 전제로 이루어진 수용재결도 무효이다.", "② 수용재결에 대한 이의신청은 행정소송을 하기 위한 필수적인 전심절차이다.", "③ 수용재결에 대한 취소소송의 제기는 사업의 진행 및 토지의 수용 또는 사용을 정지시키지 아니한다.", "④ 토지소유자가 보상금 증액청구소송을 제기할 경우 사업시행자를 피고로 하여야 한다.", "⑤ 보상금증감청구소송의 제기기간은 이의신청을 거친 경우 이의신청에 대한 재결서를 받은 날부터 60일 이내이다."], "explanation": {"summary": "토지수용법상 이의신청은 소송을 위한 필요적 전심이 아님. 보상금 증감청구소송과 취소소송의 구조, 피고적격, 제소기간을 구분해야 함.", "options": {"1": "옳음. 기초가 되는 사업인정이 당연무효이면 그 전제 위의 수용재결도 무효.", "2": "틀림. 수용재결에 대한 이의신청은 임의적 절차일 뿐, 행정소송의 필수적 전심절차가 아님.", "3": "옳음. 수용재결 취소소송 제기만으로 사업진행이나 수용·사용이 정지되지는 않음.", "4": "옳음. 보상금 증액청구소송의 피고 const STATE_KEY = 'adminlaw_exam_verified_v1';

function createEmptyState() {
  const state = {};
  for (const round of EXAM_DATA.rounds) {
    state[round.id] = {};
    for (const q of round.questions) {
      state[round.id][q.qnum] = { selected: null, checked: false };
    }
  }
  return state;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return createEmptyState();
    const parsed = JSON.parse(raw);
    const base = createEmptyState();
    for (const round of EXAM_DATA.rounds) {
      if (!parsed[round.id]) continue;
      for (const q of round.questions) {
        const saved = parsed[round.id][q.qnum];
        if (!saved) continue;
        const selected = Number(saved.selected);
        base[round.id][q.qnum] = {
          selected: Number.isInteger(selected) && selected >= 1 && selected <= 5 ? selected : null,
          checked: !!saved.checked
        };
      }
    }
    return base;
  } catch (e) {
    return createEmptyState();
  }
}

const state = loadState();
let currentRoundId = EXAM_DATA.rounds[0].id;

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

function getRound(roundId) {
  return EXAM_DATA.rounds.find(r => r.id === roundId);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function renderRoundOptions() {
  const select = document.getElementById('roundSelect');
  select.innerHTML = EXAM_DATA.rounds.map(r =>
    `<option value="${r.id}">${escapeHtml(r.label || r.title)}</option>`
  ).join('');
  select.value = currentRoundId;
}

function statForRound(roundId) {
  const round = getRound(roundId);
  let checked = 0;
  let correct = 0;
  for (const q of round.questions) {
    const s = state[roundId][q.qnum];
    if (s.checked) {
      checked += 1;
      if (s.selected === q.answer) correct += 1;
    }
  }
  return { checked, correct, score: correct * 4, total: round.questions.length };
}

function updateStats() {
  const stat = statForRound(currentRoundId);
  document.getElementById('scoreStat').textContent = `${stat.score}점`;
  document.getElementById('correctStat').textContent = `${stat.correct}`;
  document.getElementById('checkedStat').textContent = `${stat.checked}`;
}

function renderMeta() {
  const round = getRound(currentRoundId);
  document.getElementById('roundMeta').innerHTML =
    `<strong>${escapeHtml(round.title)}</strong> <span class="muted">· 26~50 / 정답확인 후 점수 반영</span>`;
}

function buildExplanationHtml(q) {
  const ex = q.explanation || {};
  const parts = [];

  if (ex.summary) {
    parts.push(`
      <div class="block-title">핵심정리</div>
      <div class="explain-box">${escapeHtml(ex.summary)}</div>
    `);
  }

  if (ex.statements && Object.keys(ex.statements).length) {
    const items = Object.entries(ex.statements).map(([k, v]) =>
      `<div class="explain-item"><strong>${escapeHtml(k)}</strong> · ${escapeHtml(v)}</div>`
    ).join('');
    parts.push(`
      <div class="block-title">지문별 해설</div>
      <div class="explain-list">${items}</div>
    `);
  }

  if (ex.options && Object.keys(ex.options).length) {
    const items = [1, 2, 3, 4, 5].filter(n => ex.options[String(n)]).map(n =>
      `<div class="explain-item"><strong>${n}번</strong> · ${escapeHtml(ex.options[String(n)])}</div>`
    ).join('');
    parts.push(`
      <div class="block-title">선택지별 해설</div>
      <div class="explain-list">${items}</div>
    `);
  }

  if (!parts.length) {
    parts.push(`<div class="explain-box">해설 데이터가 없음.</div>`);
  }

  return parts.join('');
}

function renderQuestions() {
  const round = getRound(currentRoundId);
  const list = document.getElementById('questionList');
  list.innerHTML = round.questions.map(q => {
    const s = state[currentRoundId][q.qnum];
    const checked = s.checked;
    const selected = s.selected;

    const statementsHtml = (q.statement_lines || []).map(line =>
      `<div class="statement">${escapeHtml(line)}</div>`
    ).join('');

    const optionsHtml = (q.options || []).map((optText, idx) => {
      const n = idx + 1;
      let cls = 'opt';
      if (selected === n) cls += ' selected';
      if (checked && n === q.answer) cls += ' correct';
      if (checked && selected === n && selected !== q.answer) cls += ' wrong';

      return `
        <label class="${cls}">
          <input type="radio" name="q_${q.qnum}" value="${n}" ${selected === n ? 'checked' : ''} ${checked ? 'disabled' : ''}>
          <span>${escapeHtml(optText)}</span>
        </label>
      `;
    }).join('');

    let statusClass = 'status-chip';
    let statusText = '미확인';
    if (checked) {
      statusClass += (selected === q.answer) ? ' correct' : ' wrong';
      statusText = '채점완료';
    }

    return `
      <section class="question" data-qnum="${q.qnum}">
        <div class="q-title">${escapeHtml(q.title)}</div>
        ${statementsHtml}
        <div class="options">${optionsHtml}</div>
        <div class="actions">
          <button class="btn check-btn" type="button" data-action="check" data-qnum="${q.qnum}" ${checked ? 'disabled' : ''}>정답확인/해설</button>
          <span class="${statusClass}">${statusText}</span>
        </div>
        <div class="explanation ${checked ? 'show' : ''}">${buildExplanationHtml(q)}</div>
      </section>
    `;
  }).join('');
}

function onSelectChange(event) {
  const target = event.target;
  if (!target.matches('input[type="radio"]')) return;
  const card = target.closest('.question');
  const qnum = Number(card.dataset.qnum);
  state[currentRoundId][qnum].selected = Number(target.value);
  saveState();
  renderQuestions();
  updateStats();
}

function onActionClick(event) {
  const button = event.target.closest('button[data-action="check"]');
  if (!button) return;
  const qnum = Number(button.dataset.qnum);
  const s = state[currentRoundId][qnum];
  if (!s.selected) {
    alert('답안을 먼저 체크해.');
    return;
  }
  s.checked = true;
  saveState();
  renderQuestions();
  updateStats();
}

function resetAll() {
  if (!confirm('모든 회차의 선택과 채점기록을 전부 초기화할까?')) return;
  const fresh = createEmptyState();
  for (const roundId of Object.keys(state)) delete state[roundId];
  for (const roundId of Object.keys(fresh)) state[roundId] = fresh[roundId];
  saveState();
  renderQuestions();
  updateStats();
}

function renderAll() {
  renderRoundOptions();
  renderMeta();
  renderQuestions();
  updateStats();
}

document.getElementById('roundSelect').addEventListener('change', (e) => {
  currentRoundId = e.target.value;
  renderAll();
});
document.getElementById('questionList').addEventListener('change', onSelectChange);
document.getElementById('questionList').addEventListener('click', onActionClick);
document.getElementById('resetAllBtn').addEventListener('click', resetAll);

renderAll();
</script>
</body>
</html>
