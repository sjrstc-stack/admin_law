<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>행정법 기출 연습</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: #f6f7fb;
    color: #111827;
    line-height: 1.5;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 12px; }
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: rgba(246,247,251,.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid #e5e7eb;
  }
  .topbar-inner {
    max-width: 980px; margin: 0 auto; padding: 10px 12px;
    display: grid; grid-template-columns: minmax(180px,1.2fr) repeat(3, 88px) auto;
    gap: 8px; align-items: center;
  }
  .round-select {
    width: 100%; height: 38px; border: 1px solid #d1d5db; border-radius: 10px;
    background: #fff; padding: 0 12px; font-size: 14px;
  }
  .stat {
    background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
    padding: 6px 8px; min-height: 38px; display: flex; flex-direction: column; justify-content: center;
  }
  .stat .k { font-size: 11px; color: #6b7280; }
  .stat .v { font-size: 15px; font-weight: 700; }
  .btn {
    height: 38px; border: 1px solid #d1d5db; border-radius: 10px; background: #fff;
    padding: 0 12px; cursor: pointer; font-size: 13px;
  }
  .btn:hover { background: #f9fafb; }
  .meta {
    margin: 10px 0 12px; color: #4b5563; font-size: 13px;
  }
  .question {
    background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 12px; margin-bottom: 10px;
  }
  .q-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .statement {
    margin: 6px 0; color: #1f2937; font-size: 14px;
  }
  .options { margin-top: 8px; display: grid; gap: 6px; }
  .opt {
    display: flex; gap: 8px; align-items: flex-start;
    border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 10px; background: #fff;
  }
  .opt input { margin-top: 2px; }
  .opt.selected { border-color: #94a3b8; background: #f8fafc; }
  .opt.correct { border-color: #16a34a; background: #f0fdf4; }
  .opt.wrong { border-color: #dc2626; background: #fef2f2; }
  .actions { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
  .check-btn {
    background: #111827; color: #fff; border-color: #111827;
  }
  .check-btn:hover { background: #0f172a; }
  .status-chip {
    display: inline-flex; align-items: center; min-height: 30px;
    padding: 0 10px; border-radius: 999px; font-size: 12px;
    border: 1px solid #e5e7eb; background: #f9fafb; color: #374151;
  }
  .status-chip.correct { border-color: #bbf7d0; background: #f0fdf4; color: #166534; }
  .status-chip.wrong { border-color: #fecaca; background: #fef2f2; color: #991b1b; }
  .explanation {
    margin-top: 10px; border-top: 1px dashed #d1d5db; padding-top: 10px; display: none;
  }
  .explanation.show { display: block; }
  .block-title { font-size: 13px; font-weight: 700; margin: 10px 0 6px; color: #111827; }
  .explain-box {
    background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; font-size: 13px;
  }
  .explain-list { display: grid; gap: 6px; }
  .explain-item {
    border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 10px; background: #fff; font-size: 13px;
  }
  .muted { color: #6b7280; }
  @media (max-width: 720px) {
    .topbar-inner { grid-template-columns: 1fr 1fr 1fr; }
    .topbar-inner > :first-child { grid-column: 1 / -1; }
    .topbar-inner > :last-child { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <select id="roundSelect" class="round-select"></select>
      <div class="stat"><div class="k">점수</div><div class="v" id="scoreStat">0점</div></div>
      <div class="stat"><div class="k">정답</div><div class="v" id="correctStat">0</div></div>
      <div class="stat"><div class="k">체크완료</div><div class="v" id="checkedStat">0</div></div>
      <button id="resetAllBtn" class="btn" type="button">전체리셋</button>
    </div>
  </div>

  <div class="wrap">
    <div id="roundMeta" class="meta"></div>
    <div id="questionList"></div>
  </div>

<script>
const EXAM_DATA = {"title": "행정법 기출 연습", "rounds": [{"id": "2025", "title": "2025년도 제13회 행정사 1차 1교시 A형 ( 22 - 8 )", "label": "2025 제13회 1교시 A형", "questions": [{"qnum": 26, "answer": 3, "title": "26. 행정기본법상 법원칙에 관한 설명이다. ( )에 들어갈 용어는?", "statement_lines": ["( )의 원칙 : 행정청은 행정작용을 할 때 상대방에게 해당 행정작용과 실질 적인 관련이 없는 의무를 부과해서는 아니 된다."], "options": ["① 신뢰보호", "② 평등", "③ 부당결부금지", "④ 명확성", "⑤ 법률유보"], "explanation": {"summary": "행정기본법이 명문화한 원칙 중 문장 자체가 바로 부당결부금지 원칙의 정의임. 행정청은 어떤 처분을 하면서 그 처분과 실질적 관련이 없는 반대급부나 의무를 붙일 수 없음.", "options": {"1": "신뢰보호 원칙 아님. 신뢰보호는 행정청의 선행조치에 대한 국민의 정당한 신뢰를 보호하는 문제임.", "2": "평등 원칙 아님. 평등은 합리적 이유 없는 차별금지를 뜻함.", "3": "처분과 실질적 관련 없는 의무를 결부하지 못한다는 내용은 부당결부금지 원칙의 정식 내용임.", "4": "명확성 원칙 아님. 법규 내용이 불명확하여 자의적 집행 가능성이 커지는 것을 막는 원칙임.", "5": "법률유보 원칙 아님. 국민의 권리 제한·의무 부과는 법률 또는 법률의 근거가 필요하다는 원칙임."}}}, {"qnum": 27, "answer": 4, "title": "27. 행정기본법의 조문의 일부이다. ( )에 들어갈 내용으로 옳은 것은?", "statement_lines": ["○ 행정작용은 ( ㄱ )에 위반되어서는 아니 되며, 국민의 권리를 제한하거나 의무를 부과하는 경우와 그 밖에 국민생활에 중요한 영향을 미치는 경우에는 ( ㄱ )에 근거하여야 한다.", "○ 당사자의 신청에 따른 처분은 ( ㄴ )등에 특별한 규정이 있거나 처분 당시의 ( ㄴ )등을 적용하기 곤란한 특별한 사정이 있는 경우를 제외하고는 처분 당시의 ( ㄴ )등에 따른다."], "options": ["① ㄱ: 헌법, ㄴ: 법률", "② ㄱ: 헌법, ㄴ: 법령", "③ ㄱ: 법률, ㄴ: 법률", "④ ㄱ: 법률, ㄴ: 법령", "⑤ ㄱ: 법령, ㄴ: 법령"], "explanation": {"summary": "행정기본법은 법치행정의 두 축을 조문으로 정리함. 행정작용은 법률에 위반되면 안 되고, 중요한 행정작용은 법률에 근거해야 함. 또 신청에 따른 처분은 원칙적으로 처분 당시의 법령을 기준으로 판단함.", "options": {"1": "ㄱ이 틀림. 법률유보·법률우위의 직접 기준은 '헌법'이 아니라 '법률'임. ㄴ도 법률이 아니라 법령임.", "2": "ㄱ이 틀림. 행정작용은 법률에 위반되어서는 아니 되며, 중요한 경우 법률에 근거해야 함.", "3": "ㄴ이 틀림. 신청에 따른 처분은 원칙적으로 처분 당시의 '법령' 등에 따름.", "4": "ㄱ=법률, ㄴ=법령이 행정기본법 조문에 맞음.", "5": "ㄱ이 틀림. 행정작용의 법적 기준은 법령 일반이 아니라 법률유보·법률우위의 관점에서 '법률'임."}}}, {"qnum": 28, "answer": 5, "title": "28. 행정계획에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정계획이란 특정한 행정목표를 달성하기 위하여 서로 관련되는 행정수단을 종합ㆍ조 정함으로써 장래의 일정한 시점에 일정한 질서를 실현하기 위한 활동기준으로 설정된 것이다.", "② 행정주체는 구체적인 행정계획을 입안ㆍ결정하면서 비교적 광범위한 형성의 자유를 가진다.", "③ 행정주체가 기반시설을 조성하기 위하여 도시ㆍ군계획시설결정을 할 때 행사하는 재량권 에는 한계가 있다.", "④ 자연환경 보호 등을 목적으로 하는 도시관리계획결정은 행정청의 재량적 판단으로서, 그 내용이 현저히 합리성을 결여하거나 형평이나 비례의 원칙에 뚜렷하게 반하는 등의 사정이 없는 한 폭넓게 존중되어야 한다.", "⑤ 구) 「도시계획법」상 도시기본계획은 일반 국민에 대한 직접적인 구속력이 있다."], "explanation": {"summary": "행정계획은 광범위한 형성의 자유가 인정되지만 무제한은 아님. 특히 도시기본계획은 일반 국민에 대한 직접적 구속력까지는 없는 상위계획이라는 점이 자주 출제됨.", "options": {"1": "옳음. 행정계획의 일반적 개념 정의에 해당함.", "2": "옳음. 행정계획은 장래예측·이익형량이 수반되므로 비교적 넓은 형성의 자유가 인정됨.", "3": "옳음. 도시·군계획시설결정은 재량영역이지만 공익과 사익의 형량, 비례원칙 위반 여부 등 한계가 존재함.", "4": "옳음. 자연환경 보호 목적의 도시관리계획결정은 전문적·정책적 판단영역이라 법원은 현저한 합리성 결여 등이 없는 한 폭넓게 존중함.", "5": "틀림. 도시기본계획은 도시관리계획의 지침이 되는 상위계획일 뿐 일반 국민에게 직접 구속력을 갖는 처분성 있는 계획으로 보지 않음."}}}, {"qnum": 29, "answer": 2, "title": "29. 행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 상급행정기관의 소속 공무원에 대한 업무처리지침은 일반적으로 행정조직 내부에서만 효력을 가진다.", "② 조례는 집행행위의 개입 없이도 그 자체로서 직접 국민의 구체적인 권리의무에 영향을 미치는 등의 법률상 효과를 발생하는 경우에도 항고소송의 대상이 될 수 없다.", "③ 처분이 행정규칙을 위반하였다고 해서 그러한 사정만으로 곧바로 위법하게 되는 것은 아니다.", "④ 지방의회는 자치사무에 관하여 법률에 특별한 규정이 없는 한 지방자치단체의 장의 고유권한을 침해하지 않는 범위 내에서 조례를 제정할 수 있다.", "⑤ 법령보충적 행정규칙은 상위법령과 결합하여 대외적 구속력이 있는 법규명령으로서의 효력을 가진다."], "explanation": {"summary": "조례라도 집행행위를 기다릴 필요 없이 직접 국민의 권리의무에 영향을 미치면 예외적으로 항고소송 대상이 될 수 있음. 나머지는 행정입법 일반론·판례 태도에 부합.", "options": {"1": "옳음. 상급기관이 하급기관 공무원에게 내리는 내부 업무처리지침은 원칙적으로 대외적 구속력이 없는 행정규칙임.", "2": "틀림. 조례라도 그 자체로 직접 구체적 권리의무에 변동을 일으키면 항고소송의 대상이 될 수 있음. '반드시 안 된다'고 할 수 없음.", "3": "옳음. 행정규칙 위반만으로 곧바로 대외적 위법이 되는 것은 아니고, 그 규칙의 성질·평등원칙 위반 여부 등을 추가로 봐야 함.", "4": "옳음. 자치사무에 관한 조례제정권은 넓게 인정되나 단체장의 고유권한을 본질적으로 침해해서는 안 됨.", "5": "옳음. 법령보충적 행정규칙은 상위법령의 위임·수권과 결합하여 대외적 구속력을 가질 수 있음."}}}, {"qnum": 30, "answer": 5, "title": "30. 인허가의제 제도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 인허가의제를 받으려면 주된 인허가를 신청할 때, 불가피한 사유로 함께 제출할 수 없는 경우가 아니라면 관련 인허가에 필요한 서류를 함께 제출하여야 한다.", "② 주된 인허가 행정청은 주된 인허가를 하기 전에 관련 인허가에 관하여 미리 관련 인허가 행정청과 협의하여야 한다.", "③ 인허가의제의 효과는 주된 인허가의 해당 법률에 규정된 관련 인허가에 한정된다.", "④ 인허가의제의 경우 관련 인허가 행정청은 관련 인허가를 직접 한 것으로 보아 관계 법령에 따른 관리ㆍ감독 등 필요한 조치를 하여야 한다.", "⑤ 인허가의제 제도는 사업시행자의 이익을 위하여 만들어진 것이므로 사업시행자가 반드시 관련 인허가의제 처리를 신청할 의무가 있다."], "explanation": {"summary": "인허가의제는 절차간소화 제도일 뿐 사업시행자에게 의제신청을 강제하는 제도가 아님. 관련서류 제출·사전협의·효과범위 제한·사후 감독은 모두 제도 취지에 맞음.", "options": {"1": "옳음. 원칙적으로 주된 인허가 신청 시 관련 인허가 서류도 함께 제출해야 함.", "2": "옳음. 주된 인허가청은 주된 인허가 전에 관련 인허가청과 미리 협의해야 함.", "3": "옳음. 의제의 효과는 해당 법률이 열거한 관련 인허가 범위로 한정됨.", "4": "옳음. 관련 인허가청은 직접 인허가한 것으로 보아 사후 관리·감독권을 행사함.", "5": "틀림. 인허가의제는 신청인의 편의를 위한 선택 가능한 간소화 장치이지, 반드시 의제처리를 신청해야 하는 의무를 부과하는 제도가 아님."}}}, {"qnum": 31, "answer": 1, "title": "31. 행정행위의 직권취소에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정행위의 취소사유가 있는 경우에는 신뢰보호의 원칙 등을 고려할 필요가 없다.", "② 처분청은 그 처분의 성립에 하자가 있는 경우 이를 취소할 별도의 법적 근거가 없다고 하더라도 직권으로 이를 취소할 수 있다.", "③ 행정청의 행정행위 취소가 있더라도 취소사유의 내용, 경위 기타 제반 사정을 종합하여 행정행위의 효력을 장래에 향해 소멸시키는 행정행위의 철회에 해당하는지 살펴보아야 한다.", "④ 행정행위의 취소는 일단 유효하게 성립한 행정행위를 성립 당시 존재하던 하자를 사유로 소급하여 효력을 소멸시키는 행정처분이다.", "⑤ 취소사유로는 위법이 있는 경우만이 아니라 부당한 경우도 포함한다."], "explanation": {"summary": "직권취소는 하자 있는 행정행위를 행정청 스스로 소급적으로 제거하는 것임. 다만 취소사유가 있다고 해서 언제나 곧바로 취소할 수 있는 것은 아니고, 상대방의 신뢰보호와 법적 안정성도 함께 고려해야 함.", "options": {"1": "틀림. 직권취소에서는 처분의 위법성·부당성뿐 아니라 상대방의 신뢰, 기득권, 법적 안정성도 함께 형량해야 함.", "2": "옳음. 별도 명문근거가 없어도 처분청은 자기의 하자 있는 처분을 직권취소할 수 있음.", "3": "옳음. 명칭이 '취소'라도 실제로는 장래효만 발생시키는 철회인지 여부를 취소사유·경위·제반사정으로 판단해야 함.", "4": "옳음. 취소는 성립 당시 하자를 이유로 소급하여 효력을 소멸시키는 점에서 철회와 구별됨.", "5": "옳음. 직권취소의 사유에는 위법뿐 아니라 부당도 포함될 수 있음."}}}, {"qnum": 32, "answer": 4, "title": "32. 재량행위에 해당하는 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)", "statement_lines": ["ㄱ. 구)「출입국관리법」상 체류자격변경허가", "ㄴ. 구)「농지법」에 따른 농지의 전용행위를 수반하는 건축허가", "ㄷ. 구)「공유수면 관리 및 매립에 관한 법률」상 공유수면 점용허가", "ㄹ. 구)「국유재산법」에 의한 국유재산의 무단점유 등에 대한 변상금부과"], "options": ["① ㄱ, ㄴ", "② ㄱ, ㄹ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄴ, ㄷ, ㄹ"], "explanation": {"summary": "재량행위인지 여부는 법문 형식만이 아니라 행위의 성질, 공익판단 필요성, 판례 태도로 판단함. 체류자격변경허가·농지전용 수반 건축허가·공유수면 점용허가는 재량, 변상금 부과는 기속으로 보는 것이 판례 흐름임.", "options": {"1": "틀림. ㄷ이 빠지고 ㄹ이 포함되지 않았다는 점은 맞지만, 정답조합 전체가 아님.", "2": "틀림. ㄹ이 재량이 아니므로", "3": "틀림. ㄷ은 맞지만 ㄹ이 틀려", "4": "재량행위는 ㄱ, ㄴ, ㄷ임.", "5": "틀림. ㄹ이 포함되어"}, "statements": []}}, {"qnum": 33, "answer": 3, "title": "33. 행정지도에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정지도를 하는 자는 그 상대방에게 그 행정지도의 취지 및 내용과 신분을 밝혀야 한다.", "② 행정기관은 행정지도의 상대방이 행정지도에 따르지 아니하였다는 것을 이유로 불이익한 조치를 하여서는 아니 된다.", "③ 「국가배상법」이 정한 배상청구의 요건인 공무원의 직무에는 행정지도와 같은 비권력적 작용은 포함되지 않는다.", "④ 행정지도의 상대방은 해당 행정지도의 방식ㆍ내용 등에 관하여 행정기관에 의견제출을할 수 있다.", "⑤ 행정지도는 그 목적 달성에 필요한 최소한도에 그쳐야 하며, 행정지도의 상대방의 의사에 반하여 부당하게 강요하여서는 아니 된다."], "explanation": {"summary": "행정지도는 비권력적 사실행위이나 공무원의 직무성은 부정되지 않음. 따라서 행정지도 과정의 위법행위도 국가배상책임의 문제될 수 있음.", "options": {"1": "옳음. 행정지도 담당자는 상대방에게 취지·내용·신분을 밝혀야 함.", "2": "옳음. 불이익취급금지는 행정지도 규율의 핵심임.", "3": "틀림. 국가배상법상 '공무원의 직무'에는 권력적 작용만이 아니라 행정지도 같은 비권력적 작용도 포함될 수 있음.", "4": "옳음. 상대방은 방식·내용 등에 관해 의견을 제출할 수 있음.", "5": "옳음. 행정지도는 최소한도에 그쳐야 하고 임의성 원칙에 반하여 강요되어서는 안 됨."}}}, {"qnum": 34, "answer": 2, "title": "34. 행정절차법상 행정응원을 요청할 수 있는 경우로 명시된 경우가 아닌 것은?", "statement_lines": [], "options": ["① 법령등의 이유로 독자적인 직무 수행이 어려운 경우", "② 행정서비스에 대한 국민의 만족도를 높이기 위하여 필요한 경우", "③ 다른 행정청의 응원을 받아 처리하는 것이 보다 능률적이고 경제적인 경우", "④ 다른 행정청에 소속되어 있는 전문기관의 협조가 필요한 경우", "⑤ 인원ㆍ장비의 부족 등 사실상의 이유로 독자적인 직무 수행이 어려운 경우"], "explanation": {"summary": "행정응원은 관할은 유지한 채 다른 행정청의 인력·장비·전문성을 빌려 업무를 수행하는 제도임. 법은 응원사유를 한정적으로 열거하고 있고 단순한 만족도 제고는 포함되지 않음.", "options": {"1": "옳은 응원사유. 법령상의 이유로 독자 수행이 어려운 경우 포함됨.", "2": "'국민 만족도 제고'는 행정절차법이 열거한 행정응원 요청사유가 아님.", "3": "옳은 응원사유. 보다 능률적·경제적인 경우가 포함됨.", "4": "옳은 응원사유. 다른 행정청 소속 전문기관의 협조가 필요한 경우 포함됨.", "5": "옳은 응원사유. 인원·장비 부족 등 사실상의 이유도 포함됨."}}}, {"qnum": 35, "answer": 4, "title": "35. 공공기관의 정보공개에 관한 법률상 이의신청에 관한 내용이다. ( )에 알맞은 숫자는?", "statement_lines": ["○ 청구인이 정보공개와 관련한 공공기관의 비공개 결정 또는 부분 공개 결정에 대하여 불복이 있거나 정보공개 청구 후 ( ㄱ )일이 경과하도록 정보공개 결정이 없는 때에는 공공기관으로부터 정보공개 여부의 결정 통지를 받은 날 또는 정보공개 청구 후 ( ㄱ )일이 경과한 날부터 ( ㄴ )일 이내에 해당 공공기관에 문서로 이의신청을 할 수 있다.", "○ 공공기관은 이의신청을 받은 날부터 ( ㄷ )일 이내에 그 이의신청에 대하여 결정하고 그 결과를 청구인에게 지체 없이 문서로 통지하여야 한다."], "options": ["① ㄱ: 7, ㄴ: 10, ㄷ: 20", "② ㄱ: 10, ㄴ: 20, ㄷ: 10", "③ ㄱ: 10, ㄴ: 20, ㄷ: 30", "④ ㄱ: 20, ㄴ: 30, ㄷ: 7", "⑤ ㄱ: 20, ㄴ: 30, ㄷ: 10"], "explanation": {"summary": "정보공개법은 정보공개청구 후 20일 동안 결정이 없으면 다툴 수 있고, 그 날부터 30일 이내 이의신청, 기관은 받은 날부터 7일 이내 결정함. 숫자암기형 문제임.", "options": {"1": "틀림. ㄱ·ㄴ·ㄷ 모두 법정기간과 맞지 않음.", "2": "틀림. ㄱ이 20일이 아니고 ㄷ도 7일이 아님.", "3": "틀림. ㄷ이 7일이어야 함.", "4": "ㄱ 20일, ㄴ 30일, ㄷ 7일이 정확한 조문 내용임.", "5": "틀림. ㄷ이 10일이 아니라 7일임."}}}, {"qnum": 36, "answer": 4, "title": "36. 개인정보 보호법령상 고정형 영상정보처리기기를 설치ㆍ운영할 수 있는 경우로 명시된 경우가 아닌 것은?", "statement_lines": [], "options": ["① 범죄의 예방 및 수사를 위하여 필요한 경우", "② 화재 예방을 위하여 정당한 권한을 가진 자가 설치ㆍ운영하는 경우", "③ 교통단속을 위하여 정당한 권한을 가진 자가 설치ㆍ운영하는 경우", "④ 촬영 사실을 명확히 표시하여 정보주체가 촬영 사실을 알 수 있도록 하였음에도 불구하고 촬영 거부 의사를 밝히지 아니한 경우", "⑤ 촬영된 영상정보를 저장하지 아니하는 경우로서 출입자 수, 성별, 연령대 등 통계값 또는 통계적 특성값 산출을 위해 촬영된 영상정보를 일시적으로 처리하는 경우"], "explanation": {"summary": "고정형 영상정보처리기기의 설치·운영은 법정사유가 있어야 함. 단순히 촬영사실을 알렸고 정보주체가 명시적으로 거부하지 않았다는 사정만으로 설치 근거가 생기지는 않음.", "options": {"1": "옳음. 범죄 예방 및 수사는 명문 사유임.", "2": "옳음. 화재예방 목적 설치도 정당한 권한자에 의한 경우 허용됨.", "3": "옳음. 교통단속 목적 설치도 허용 사유임.", "4": "틀림. 정보주체가 거부의사를 표시하지 않았다는 사정은 법정 허용사유가 아님. 영상기기 설치는 동의의 추정이 아니라 법령상 근거가 필요함.", "5": "옳음. 저장 없이 통계값 산출을 위한 일시적 처리는 예외적으로 허용됨."}}}, {"qnum": 37, "answer": 1, "title": "37. 행정대집행법의 내용에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 행정청은 해가 지기 전에 대집행을 착수한 경우라도 해가 진 후에는 대집행을 하여서는 아니 된다.", "② 대집행에 요한 비용에 대하여서는 행정청은 사무비의 소속에 따라 국세에 다음가는 순위의 선취득권을 가진다.", "③ 대집행에 대하여는 행정심판을 제기할 수 있다.", "④ 대집행에 요한 비용은 「국세징수법」의 예에 의하여 징수할 수 있다.", "⑤ 의무자가 동의한 경우 행정청은 해가 뜨기 전에 대집행을 할 수 있다."], "explanation": {"summary": "행정대집행법은 원칙적으로 일출 전·일몰 후 집행을 금지하지만, 의무자 동의나 급박한 사정이 있으면 예외가 가능함. 따라서 '해가 지면 절대 불가'라는 서술은 틀림.", "options": {"1": "틀림. 원칙적 제한일 뿐 절대적 금지는 아님. 예외사유가 있으면 일몰 후에도 가능함.", "2": "옳음. 대집행비용에 대해 국세 다음 순위의 선취특권이 인정됨.", "3": "옳음. 대집행은 행정심판의 대상이 될 수 있음.", "4": "옳음. 비용징수는 국세징수법의 예에 따름.", "5": "옳음. 의무자 동의가 있으면 해뜨기 전 집행 가능함."}}}, {"qnum": 38, "answer": 2, "title": "38. 행정기본법상 행정상 강제에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 외국인의 출입국ㆍ난민인정에 관한 사항에 관하여는 「행정기본법」 제5절(행정상 강제)을 적용하지 아니한다.", "② 직접강제는 다른 모든 수단으로는 행정목적을 달성할 수 없는 경우에만 허용되며, 이경우에도 최소한으로만 실시하여야 한다.", "③ 행정청은 이행강제금을 부과받은 자가 납부기한까지 이행강제금을 내지 아니하면 국세 강제징수의 예 또는 「지방행정제재ㆍ부과금의 징수 등에 관한 법률」에 따라 징수한다.", "④ 의무 불이행의 동기, 목적 및 결과는 이행강제금의 부과 금액을 가중하거나 감경할 수있는 고려사항에 해당한다.", "⑤ 행정청은 이행강제금을 부과하기 전에 미리 의무자에게 적절한 이행기간을 정하여 그기한까지 행정상 의무를 이행하지 아니하면 이행강제금을 부과한다는 뜻을 문서로 계고 하여야 한다."], "explanation": {"summary": "행정기본법은 직접강제에 관하여 '법률에 근거', '의무 성질상 대체적 이행이 불가능하거나 현저히 곤란', '다른 수단으로 목적 달성 곤란', '최소한도 실시'라는 요건을 둠. 단순히 '다른 모든 수단'이 완전히 소진되어야만 하는 것은 아님.", "options": {"1": "옳음. 출입국·난민인정 사항에는 행정기본법상 행정상 강제 규정을 적용하지 않음.", "2": "틀림. 직접강제는 보충성·최소침해성이 요구되지만, 표현 그대로 '다른 모든 수단으로는'이라는 절대적 요건은 아님. 법은 다른 수단으로 목적 달성이 현저히 곤란한 경우 등을 요구함.", "3": "옳음. 이행강제금 미납 시 국세강제징수 또는 지방행정제재·부과금 징수법에 따라 징수함.", "4": "옳음. 위반의 동기·목적·결과 등은 가중·감경 요소가 됨.", "5": "옳음. 이행강제금 부과 전 문서계고가 필요함."}}}, {"qnum": 39, "answer": 5, "title": "39. 행정소송법상 항고소송에 관한 내용으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 국가기관은 취소소송의 당사자가 될 수 있다.", "② 교육에 관한 조례의 무효확인소송을 제기함에 있어서는 그 조례의 공포권이 있는 시ㆍ도 교육감을 피고로 하여야 한다.", "③ 대리권을 수여받은 데 불과하여 그 자신의 명의로는 행정처분을 할 권한이 없는 행정청의 경우 대리관계를 밝힘이 없이 그 자신의 명의로 행정처분을 하였다면 그에 대하여는 처분명의자인 해당 행정청이 항고소송의 피고가 되는 것이 원칙이다.", "④ 지방자치단체장이 국유 일반재산을 대부하여 달라는 신청을 거부한 것은 행정처분이 아니므로 항고소송으로 그 취소를 구할 수 없다.", "⑤ 행정규칙에 의한 불문경고조치는 항고소송의 대상이 되는 행정처분에 해당하지 아니한다."], "explanation": {"summary": "항고소송의 대상인 처분성 판단이 핵심. 행정규칙상 불문경고라도 장래 승진·평가·인사에 불이익을 주는 실질이 있으면 처분성이 문제될 수 있고, 판례도 일률 부정이 아님.", "options": {"1": "옳음. 국가기관도 법률상 이익이 있으면 취소소송 당사자가 될 수 있음.", "2": "옳음. 조례 무효확인소송에서 피고는 공포권자임.", "3": "옳음. 대리관계를 숨기고 자기 명의로 처분하면 원칙적으로 명의자를 피고로 삼음.", "4": "옳음. 국유 일반재산 대부신청 거부는 사법상 계약관계 문제로 보아 항고소송 대상이 아님.", "5": "틀림. 불문경고가 내부적 주의조치에 그치지 않고 인사상 불이익 등 구체적 법률효과를 가지면 처분성이 인정될 여지가 있음. 따라서 일률적으로 처분이 아니라고 할 수 없음."}}}, {"qnum": 40, "answer": 1, "title": "40. 행정심판에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 무효등확인심판에는 사정재결을 할 수 있다.", "② 「행정심판법」은 당사자심판에 관해서 규정하고 있지 않다.", "③ 행정처분의 취소를 구하는 심판에서 처분청은 당초 처분의 근거로 삼은 사유와 기본적 사실관계가 동일성이 있다고 인정되는 한도 내에서 다른 사유를 추가 또는 변경할 수 있다.", "④ 재결에 의하여 취소되는 처분이 당사자의 신청을 거부하는 것을 내용으로 하는 경우에는그 처분을 한 행정청은 재결의 취지에 따라 다시 이전의 신청에 대한 처분을 하여야 한다.", "⑤ 대통령의 처분에 대하여는 다른 법률에서 행정심판을 청구할 수 있도록 정한 경우 외에는 행정심판을 청구할 수 없다."], "explanation": {"summary": "행정심판에서는 사정재결이 취소심판·의무이행심판에서 문제되며, 무효등확인심판에는 허용되지 않음. 나머지 선택지는 심판 구조와 재결 효력에 부합.", "options": {"1": "틀림. 무효등확인심판에는 사정재결을 할 수 없음.", "2": "옳음. 현행 행정심판법은 당사자심판 제도를 두고 있지 않음.", "3": "옳음. 기본적 사실관계 동일성 범위 내에서는 처분사유의 추가·변경이 가능함.", "4": "옳음. 신청거부처분이 취소되면 행정청은 재결 취지에 따라 다시 처분해야 함.", "5": "옳음. 대통령 처분은 다른 법률에 특별규정이 있는 경우 외에는 행정심판 대상이 아님."}}}, {"qnum": 41, "answer": 3, "title": "41. 행정소송법의 내용에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 취소소송은 법령의 규정에 의하여 당해 처분에 대한 행정심판을 제기할 수 있는 경우에는 이를 거치지 아니하고 제기할 수 없다.", "② 처분등을 취소하는 확정판결은 제3자에 대하여는 효력이 없다.", "③ 행정처분의 무효 확인을 구하는 소에는 특단의 사정이 없는 한 취소를 구하는 취지도 포함되어 있다.", "④ 거부처분취소판결의 간접강제에 관한 규정은 무효등 확인소송의 경우에 준용한다.", "⑤ 「행정소송법」에서는 의무이행소송을 인정하고 있다."], "explanation": {"summary": "무효확인소송에 취소취지도 포함되는지 여부는 실무상 매우 중요한 논점. 판례는 특단의 사정이 없는 한 무효확인을 구하는 소에 취소를 구하는 취지도 포함된다고 봄.", "options": {"1": "틀림. 행정심판전치주의는 예외적 제도이고, 현행법상 원칙은 임의적 전치임.", "2": "틀림. 처분 등을 취소하는 확정판결은 제3자에게도 효력이 미침.", "3": "옳음. 무효확인을 구하는 소에는 특단의 사정이 없는 한 취소를 구하는 취지도 포함된다고 봄.", "4": "틀림. 거부처분취소판결의 간접강제 규정은 부작위위법확인소송에 준용됨. 무효등확인소송 일반에 당연히 준용되는 것이 아님.", "5": "틀림. 행정소송법은 독립한 일반적 의무이행소송을 인정하지 않음."}}}, {"qnum": 42, "answer": 2, "title": "42. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법률의 내용에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 사업시행자는 사용의 개시일에 토지의 사용권을 취득하며, 그 토지에 관한 다른 권리는 재결로 인정되지 아니 하더라도 사용 기간 중에 행사할 수 있다.", "② 수용재결에 불복할 때는 이의신청을 거치지 않고도 행정소송을 제기할 수 있다.", "③ 재결에 의한 경우 보상액의 산정은 수용개시 당시의 가격을 기준으로 한다.", "④ 사업인정처분이 당연무효이더라도 그것이 유효함을 전제로 이루어진 수용재결이 무효가 되는 것이 아니다.", "⑤ 보상액을 산정할 경우에 해당 공익사업으로 인하여 토지등의 가격이 변동되었을 때에는 이를 고려하여야 한다."], "explanation": {"summary": "토지보상법상 수용재결 불복은 이의신청이 임의절차이므로 곧바로 행정소송 가능. 보상액 산정 시점은 원칙적으로 재결 당시의 가격이며, 공익사업으로 인한 가격변동은 배제함.", "options": {"1": "틀림. 사용재결이 있어도 재결로 인정된 권리는 사용기간 중 제한되고, 선택지처럼 자유롭게 행사된다고 볼 수 없음.", "2": "옳음. 수용재결에 대한 이의신청은 필요적 전치가 아니므로 곧바로 행정소송을 제기할 수 있음.", "3": "틀림. 보상액 산정의 기준 시점은 수용개시시가 아니라 재결 당시 가격이 원칙임.", "4": "틀림. 선행 사업인정이 당연무효이면 이를 전제로 한 수용재결도 하자가 중대·명백하여 무효가 될 수 있음.", "5": "틀림. 공익사업으로 인한 가격변동은 보상액 산정에서 고려하지 않고 배제하는 것이 원칙임."}}}, {"qnum": 43, "answer": 4, "title": "43. 행정소송법상 부작위위법확인소송의 경우에 취소소송에 관한 규정이 준용되는 것을 모두 고른 것은?", "statement_lines": ["ㄱ. 집행정지", "ㄴ. 사정판결", "ㄷ. 제3자의 소송참가", "ㄹ. 소송비용에 관한 재판의 효력", "ㅁ. 거부처분취소판결의 간접강제"], "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄱ, ㄷ, ㅁ", "④ ㄷ, ㄹ, ㅁ", "⑤ ㄴ, ㄷ, ㄹ, ㅁ"], "explanation": {"summary": "부작위위법확인소송은 처분을 직접 취소하는 소송은 아니므로 집행정지·사정판결은 맞지 않는 부분이 많다. 다만 절차적 규정인 제3자 참가, 소송비용 재판의 효력, 거부처분취소판결의 간접강제는 준용됨.", "options": {"1": "틀림. ㄱ, ㄴ은 준용되지 않음.", "2": "틀림. ㄷ, ㅁ이 빠짐.", "3": "틀림. ㄱ이 포함되어", "4": "준용되는 것은 ㄷ, ㄹ, ㅁ임.", "5": "틀림. ㄴ은 준용되지 않음."}, "statements": []}}, {"qnum": 44, "answer": 1, "title": "44. 행정기관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 상급행정기관의 하급행정기관에 대한 승인ㆍ동의ㆍ지시는 국민의 권리 의무에 직접 영향을 미치지 않더라도 행정처분에 해당한다.", "② 법제처는 국무총리 소속 행정기관이다.", "③ 중앙행정기관의 설치와 직무범위는 법률로 정한다.", "④ 각 행정기관의 장은 소관사무를 통할하고 소속공무원을 지휘ㆍ감독한다.", "⑤ 행정기관에는 그 소관사무의 일부를 독립하여 수행할 필요가 있는 때에는 법률로 정하는 바에 따라 행정위원회 등 합의제행정기관을 둘 수 있다."], "explanation": {"summary": "행정기관 상호 간 승인·동의·지시는 원칙적으로 내부행위라서 직접 국민의 권리의무에 영향을 주지 않는 한 처분성이 부정됨. 나머지는 정부조직 관련 기본 내용.", "options": {"1": "틀림. 상급기관의 승인·동의·지시는 원칙적으로 행정조직 내부행위로서 직접 대외적 효과가 없으면 처분이 아님.", "2": "옳음. 법제처는 국무총리 소속 행정기관임.", "3": "옳음. 중앙행정기관의 설치와 직무범위는 법률로 정함.", "4": "옳음. 각 행정기관의 장은 소관사무를 통할하고 소속 공무원을 지휘·감독함.", "5": "옳음. 필요시 법률에 따라 합의제행정기관을 둘 수 있음."}}}, {"qnum": 45, "answer": 5, "title": "45. 권한의 위임에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 국가사무가 지방자치단체의 장에게 위임된 기관위임사무는 원칙적으로 자치조례의 제정 범위에 속하지 않는다.", "② 지방자치단체의 장은 기관수임사무의 일부를 그 위임기관의 장의 승인을 받아 규칙으로 정하는 바에 따라 재위임할 수 있다.", "③ 위임기관은 수임기관의 수임사무 처리에 대하여 지휘ㆍ감독하고, 그 처리가 위법하거나 부당하다고 인정될 때에는 이를 취소하거나 정지시킬 수 있다.", "④ 수임사무의 처리에 관하여 위임기관은 수임기관에 대하여 사전승인을 받거나 협의를 할것을 요구할 수 없다.", "⑤ 지방자치단체가 국가사무를 수임한 경우에는 수임한 지방자치단체에서 그 경비를 부담 하여야 한다."], "explanation": {"summary": "기관위임사무·기관수임사무의 법리와 경비부담 주체를 묻는 문제. 국가사무를 위임받아 처리하는 경우 경비는 원칙적으로 국가가 부담함.", "options": {"1": "옳음. 기관위임사무는 자치입법권의 본래 범위 밖에 있으므로 자치조례로 정할 수 없음이 원칙.", "2": "옳음. 기관수임사무 일부는 승인받아 규칙으로 재위임 가능함.", "3": "옳음. 위임기관은 지휘·감독하고 위법·부당한 처리에 대해 취소·정지 가능.", "4": "옳음. 수임기관에 대해 사전승인이나 협의를 요구할 수 없다는 취지의 선택지로, 자치권 과도 침해 방지 논리에 부합함.", "5": "틀림. 국가사무를 지방자치단체가 수임 처리하는 경우 그 경비는 원칙적으로 국가가 부담해야 함."}}}, {"qnum": 46, "answer": 2, "title": "46. 지방자치법의 내용에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 지방자치단체의 주민은 조례를 폐지할 것을 청구할 수 있다.", "② 지방자치단체의 주민은 그 지방자치단체의 장 및 비례대표 지방의회의원을 포함한 지방 의회의원을 소환할 권리를 가진다.", "③ 주민투표권은 헌법상 보장되는 기본권 또는 헌법상 제도적으로 보장되는 주관적 공권이 아니다.", "④ 지방자치단체장이 동일 수탁자에게 위탁사무를 재위탁하고자 할 때 지방의회의 동의를 받도록 한 조례안은 지방자치단체장의 집행권한을 본질적으로 침해하는 것으로 볼 수없다.", "⑤ 지방의회의원 정수의 2분의 1 범위에서 해당 지방자치단체의 조례로 정하는 바에 따라 지방의회에 정책지원 전문인력을 둘 수 있다."], "explanation": {"summary": "주민소환은 비례대표 지방의회의원에게는 인정되지 않음. 주민조례청구, 주민투표권의 법적 성질, 정책지원 전문인력 규정은 모두 기본 조문 내용.", "options": {"1": "옳음. 주민은 조례의 제정뿐 아니라 폐지도 청구할 수 있음.", "2": "틀림. 주민소환 대상은 단체장과 지역구 지방의회의원 등이 중심이고 비례대표 지방의회의원은 소환 대상이 아님.", "3": "옳음. 주민투표권은 헌법상 직접 보장된 기본권이나 주관적 공권으로 보지 않음.", "4": "옳음. 동일 수탁자 재위탁 시 의회 동의를 요구하는 조례가 곧바로 집행권 본질 침해라고 볼 수 없다는 판례 태도임.", "5": "옳음. 정책지원 전문인력은 의원 정수의 2분의 1 범위에서 둘 수 있음."}}}, {"qnum": 47, "answer": 3, "title": "47. 국가재정법의 내용에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 예산, 결산 및 기금에 관한 사무는 기획재정부장관이 관장한다.", "② 각 회계연도의 경비는 그 연도의 세입 또는 수입으로 충당하여야 한다.", "③ 국가의 회계는 통상회계와 임시회계로 구분한다.", "④ 한 회계연도의 모든 수입을 세입으로 하고, 모든 지출을 세출로 한다.", "⑤ 예산은 예산총칙ㆍ세입세출예산ㆍ계속비ㆍ명시이월비 및 국고채무부담행위를 총칭한다."], "explanation": {"summary": "국가재정법상 국가회계 구분은 일반회계와 특별회계임. '통상회계·임시회계'는 국가회계 분류가 아님.", "options": {"1": "옳음. 예산·결산·기금 사무는 기획재정부장관이 관장함.", "2": "옳음. 회계연도독립의 원칙 내용임.", "3": "틀림. 국가는 일반회계와 특별회계로 구분함. 통상회계·임시회계라는 분류는 법정 개념이 아님.", "4": "옳음. 총계주의의 내용임.", "5": "옳음. 예산의 구성요소를 정확히 나열한 것임."}}}, {"qnum": 48, "answer": 5, "title": "48. 경찰관 직무집행법상 경찰관의 직무의 범위로 명시된 것을 모두 고른 것은?", "statement_lines": ["ㄱ. 범죄피해자 보호", "ㄴ. 경비, 주요 인사(人士) 경호", "ㄷ. 대간첩ㆍ대테러 작전 수행", "ㄹ. 외국 정부기관 및 국제기구와의 국제협력", "ㅁ. 공공안녕에 대한 위험의 예방과 대응을 위한 정보의 수집ㆍ작성 및 배포"], "options": ["① ㄹ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㅁ", "④ ㄱ, ㄴ, ㄷ, ㅁ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "explanation": {"summary": "경찰관 직무집행법은 범죄피해자 보호, 경비·경호, 대간첩·대테러, 국제협력, 정보수집·작성·배포 등을 경찰 직무 범위로 폭넓게 규정함. 전부 맞는 조합 문제.", "options": {"1": "틀림. ㄱ·ㄴ·ㄷ·ㅁ도 모두 포함됨.", "2": "틀림. 일부만 고른 것이라", "3": "틀림. ㄷ·ㄹ이 빠짐.", "4": "틀림. ㄹ도 포함되므로", "5": "ㄱ, ㄴ, ㄷ, ㄹ, ㅁ 모두 맞음."}, "statements": []}}, {"qnum": 49, "answer": 3, "title": "49. 국가공무원법의 내용에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 검사는 특정직공무원에 해당한다.", "② 정무직공무원은 특수경력직공무원에 해당한다.", "③ 직급이란 1명의 공무원에게 부여할 수 있는 직무와 책임을 말한다.", "④ 소청심사위원회의 결정은 처분 행정청을 기속한다.", "⑤ 본인의 원(願)에 따른 강임ㆍ휴직 또는 면직처분을 할 때에는 그 처분권자 또는 처분제청 권자는 처분사유를 적은 설명서를 교부하지 않아도 된다."], "explanation": {"summary": "국가공무원법에서 '직급'과 '직위'를 구별해야 함. 1인의 공무원에게 부여할 수 있는 직무와 책임은 직위의 개념이고, 직급은 직무의 종류·곤란성과 책임도가 상당히 유사한 직위의 군을 뜻함.", "options": {"1": "옳음. 검사는 특정직공무원에 해당함.", "2": "옳음. 정무직공무원은 특수경력직공무원에 포함됨.", "3": "틀림. 선택지의 설명은 '직위'의 정의임. 직급은 유사한 직위의 군을 의미함.", "4": "옳음. 소청심사위원회의 결정은 처분 행정청을 기속함.", "5": "옳음. 본인의 원에 의한 강임·휴직·면직은 설명서 교부 예외에 해당함."}}}, {"qnum": 50, "answer": 5, "title": "50. 국유재산법의 내용에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 보존용재산은 일반재산에 속한다.", "② 공용재산이란 국가가 직접 공공용으로 사용하거나 대통령령으로 정하는 기한까지 사용 하기로 결정한 재산을 말한다.", "③ 기업용재산은 「민법」 제245조에 따른 시효취득의 대상이 된다.", "④ 판결에 따라 취득하는 경우에도 사권(私權)이 설정된 재산은 그 사권이 소멸된 후가 아니면 국유재산으로 취득하지 못한다.", "⑤ 총괄청이나 중앙관서의 장은 소유자 없는 부동산을 국유재산으로 취득한다."], "explanation": {"summary": "국유재산 취득에서는 소유자 없는 부동산의 국유귀속이 중요한 포인트. 나머지는 재산 종류 구별과 취득제한 관련 기본 조문을 틀리게 섞어 놓은 선택지들임.", "options": {"1": "틀림. 보존용재산은 일반재산이 아니라 행정재산의 한 종류임.", "2": "틀림. 국가가 직접 공공용으로 사용하는 재산은 '공공용재산'이고, 공용재산은 국가가 직접 사무·사업 또는 공무원 거주용으로 사용하는 재산임.", "3": "틀림. 기업용재산도 국유재산이므로 민법상 취득시효의 일반 대상이 아님.", "4": "틀림. 판결로 취득하는 경우 등은 사권소멸 전 취득금지의 예외가 인정되는 경우가 있음. 따라서 무조건 취득 못한다고 할 수 없음.", "5": "옳음. 총괄청 또는 중앙관서의 장은 소유자 없는 부동산을 국유재산으로 취득함."}}}]}, {"id": "2024", "title": "2024년도 제12회 행정사 1차 1교시 A형 ( 22 - 9 )", "label": "2024 제12회 1교시 A형", "questions": [{"qnum": 26, "answer": 5, "title": "26. 통치행위에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)", "statement_lines": ["ㄱ. 고도의 정치적 성격을 띤 국가행위로 사법심사 대상에서 제외된다.", "ㄴ. 대통령의 서훈취소는 통치행위가 아니다.", "ㄷ. 통치행위에 해당하는지의 최종적 판단은 오로지 사법부에 의하여 이루어져야 한다.", "ㄹ. 남북정상회담 개최 과정에서 주무부 장관에게 신고하지 아니하거나 승인 없이 북한 측에 사업권의 대가 명목으로 송금한 행위는 통치행위가 아니다."], "options": ["① ㄱ, ㄷ", "② ㄱ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "explanation": {"summary": "통치행위는 국가의 고도의 정치적 결단이 작용하는 영역이라 사법자제가 문제되지만, 무엇이 통치행위인지는 결국 법원이 심사함. 다만 개인의 구체적 권리·의무에 직접 영향을 미치는 영역까지 무제한으로 넓히면 안 됨.", "statements": [{"label": "ㄱ", "text": "고도의 정치적 성격을 띤 국가행위로 사법심사 대상에서 제외된다.", "comment": "맞음. 통치행위론의 출발점 자체가 고도의 정치성을 이유로 한 사법자제에 있음."}, {"label": "ㄴ", "text": "대통령의 서훈취소는 통치행위가 아니다.", "comment": "맞음. 서훈취소는 특정 개인의 법적 지위에 영향을 미치는 구체적 행정작용으로 보아야 하므로 통치행위로 보기 어려움."}, {"label": "ㄷ", "text": "통치행위에 해당하는지의 최종적 판단은 오로지 사법부에 의하여 이루어져야 한다.", "comment": "맞음. 어떤 행위를 통치행위로 볼지 여부 자체는 법원이 판단할 사항임."}, {"label": "ㄹ", "text": "남북정상회담 개최 과정에서 ... 송금한 행위는 통치행위가 아니다.", "comment": "맞음. 정상회담이라는 정치적 배경이 있더라도 개별 송금행위 자체까지 곧바로 통치행위가 되는 것은 아님."}], "options": {"1": "틀림. ㄴ이 빠졌고, ㄹ도 포함되어야 함.", "2": "틀림. ㄴ, ㄷ이 누락됨.", "3": "틀림. ㄷ도 옳음.", "4": "틀림. ㄱ도 옳음.", "5": "옳음. 제시된 ㄱ, ㄴ, ㄷ, ㄹ이 모두 판례 취지에 부합함."}}}, {"qnum": 27, "answer": 5, "title": "27. 공법관계에 관한 소송이 아닌 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정재산의 사용허가 신청에 대한 거부를 다투는 소송", "② 서울시립무용단 단원의 해촉에 관한 소송", "③ 공익사업으로 인하여 이주하게 된 주거용 건축물의 세입자에게 인정되는 주거이전비 보상을 둘러싼 소송", "④ 주민등록전입신고와 그 수리 여부에 관한 소송", "⑤ 한국마사회 기수의 면허취소를 다투는 소송"], "explanation": {"summary": "핵심은 해당 분쟁의 법률관계가 공권력 행사·공법상 법률관계인지, 아니면 사법상 계약·단체 내부관계인지 구별하는 것임. 한국마사회 기수 면허취소는 사단·공법기관의 처분이 아니라 사법상 관계로 봄.", "options": {"1": "행정재산 사용허가 및 그 거부는 공법상 재산관리작용으로서 항고소송의 대상이 되는 처분성이 문제되는 전형적 공법관계임.", "2": "시립무용단 단원의 해촉은 공법관계로 본 판례가 있음. 공무원은 아니더라도 공공단체의 공법상 근무관계가 문제됨.", "3": "주거이전비 보상은 공익사업법상 손실보상 문제이므로 공법관계이고, 보상금 증감은 당사자소송으로 다툼.", "4": "주민등록전입신고의 수리 여부는 공권력 행사 여부와 결부되어 공법관계임.", "5": "한국마사회 기수 면허는 국가면허가 아니라 한국마사회와의 사법상 관계에서 문제되는 자격으로 보아, 그 취소를 다투는 소송은 공법관계 소송이 아님."}}}, {"qnum": 28, "answer": 5, "title": "28. 공법상 계약에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 공법상 계약에는 법률우위의 원칙이 적용된다.", "② 공법상 계약의 체결 시 계약의 목적 및 내용을 명확하게 적은 계약서를 작성하여야 한다.", "③ 공법상 계약에 따른 권리ㆍ의무의 확인 소송은 공법상 당사자소송에 의한다.", "④ 확약은 일방적 행위라는 점에서 복수당사자의 의사의 합치인 공법상 계약과는 구분된다.", "⑤ ｢국가를 당사자로 하는 계약에 관한 법률｣에 따라 국가가 당사자가 되는 공공계약은 공법상 계약에 해당한다."], "explanation": {"summary": "공법상 계약도 행정작용이므로 법률우위 원칙이 적용되고, 권리·의무의 존부는 당사자소송으로 다툼. 다만 국가를 당사자로 하는 모든 공공계약이 곧바로 공법상 계약이 되는 것은 아님.", "options": {"1": "맞음. 공법상 계약도 행정법 질서 안에서 이루어지므로 법률에 위반될 수 없음.", "2": "맞음. 행정기본법은 공법상 계약 체결 시 목적·내용을 명확히 적은 계약서 작성을 요구함.", "3": "맞음. 공법상 계약의 효력이나 이행 문제는 공법상 당사자소송으로 처리하는 것이 원칙임.", "4": "맞음. 확약은 장래 처분에 관한 일방적 의사표시이고, 공법상 계약은 당사자 의사의 합치라는 점에서 구조가 다름.", "5": "틀림. 국가계약법상 공공계약은 원칙적으로 사법상 계약으로 이해함. 국가가 당사자라는 이유만으로 공법상 계약이 되지 않음."}}}, {"qnum": 29, "answer": 2, "title": "29. 행정규칙에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정규칙은 특별한 사정이 없는 한 대외적으로 국민이나 법원을 구속하는 효력이 없다.", "② 처분이 행정규칙을 따른 것이면 적법성이 보장된다.", "③ 처분이 행정규칙을 위반하였다고 해서 그러한 사정만으로 곧바로 위법하게 되는 것은 아니다.", "④ 행정규칙에 따른 처분의 적법성 여부는 상위법령의 규정과 입법 목적 등에 적합한지 여부에 따라 판단해야 한다.", "⑤ 행정규칙이 그 정한 바에 따라 되풀이 시행되어 행정관행이 이루어지게 되면 행정기관은그 상대방에 대한 관계에서 그 규칙에 따라야 할 자기구속을 받게 된다."], "explanation": {"summary": "행정규칙은 원칙적으로 내부규범이어서 직접 국민을 구속하지 않음. 처분의 적법성은 행정규칙 준수 여부가 아니라 상위법령 적합성으로 판단함.", "options": {"1": "맞음. 특별한 사정이 없는 한 행정규칙은 행정조직 내부에서만 효력을 가짐.", "2": "틀림. 행정규칙을 따랐더라도 상위법령에 어긋나면 처분은 위법할 수 있음. 적법성의 기준은 법률과 법규명령임.", "3": "맞음. 행정규칙 위반만으로 곧바로 위법이 되는 것은 아니고, 자기구속이나 평등원칙 위반까지 연결되는지 따져야 함.", "4": "맞음. 결국 처분은 상위법령의 취지와 문언에 부합해야 적법함.", "5": "맞음. 행정규칙이 반복 시행되어 관행이 형성되면 자기구속 원칙이 문제될 수 있음."}}}, {"qnum": 30, "answer": 4, "title": "30. 행정행위의 효력에 관한 판례의 내용으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 행정행위는 불가쟁력의 효력이 있어 법령에 의한 불복기간이 경과한 경우에는 당사자는그 행정처분의 효력을 다툴 수 없다.", "② 연령미달의 결격자가 타인의 이름으로 운전면허시험에 응시, 합격하여 교부받은 운전 면허는 당연무효는 아니다.", "③ 민사소송에 있어서 어느 행정처분의 당연무효 여부가 선결문제로 되는 때에는 민사법원은 이를 판단하여 당연무효임을 전제로 판결할 수 있다.", "④ 행정처분이 불복기간의 경과로 인하여 확정될 경우, 그 처분의 기초가 된 사실관계나 법률적 판단이 확정된다.", "⑤ 구 ｢원자력법｣에 따른 원자로 시설의 부지사전승인처분은 그 자체로서 독립한 행정처분 이다."], "explanation": {"summary": "불가쟁력은 쟁송으로 다툴 수 없게 되는 효력일 뿐, 처분의 기초사실이나 법률판단까지 절대적으로 확정시키는 효력은 아님. 그 부분은 기판력과 혼동하면 안 됨.", "options": {"1": "맞음. 적법한 불복기간이 지나면 원칙적으로 그 처분을 취소소송 등으로 다툴 수 없게 됨.", "2": "맞음. 결격자가 타인 명의로 받은 운전면허라도 중대·명백한 하자가 아니면 당연무효가 아니라 취소사유에 그친다고 봄.", "3": "맞음. 민사법원은 선결문제로서 행정처분의 당연무효 여부를 스스로 판단할 수 있음.", "4": "틀림. 불가쟁력은 처분의 존속을 안정시키는 효력이지, 그 기초 사실관계와 법률판단 자체를 확정하는 효력은 아님.", "5": "맞음. 원자로 시설 부지사전승인은 후행처분과 별도로 독립한 처분성이 인정됨."}}}, {"qnum": 31, "answer": 3, "title": "31. 행정기본법상 행정행위의 취소ㆍ철회에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 위법한 처분의 일부에 대해 취소할 수 없다.", "② 부당한 처분에 대해서는 취소할 수 없다.", "③ 당사자의 신뢰를 보호할 가치가 있는 경우에는 위법한 처분에 대해 장래를 향하여 취소할 수 있다.", "④ 적법한 처분은 중대한 공익을 위하여 필요한 경우에도 그 처분의 전부를 철회할 수 없다.", "⑤ 적법한 처분을 철회하는 경우에는 철회로 인하여 당사자가 입게 될 불이익을 철회로 달성되는 공익과 비교ㆍ형량할 필요는 없다."], "explanation": {"summary": "행정기본법은 위법한 처분이라도 신뢰보호가 필요한 경우 장래효 취소를 인정함. 취소와 철회 모두 공익과 사익의 비교형량이 핵심임.", "options": {"1": "틀림. 위법한 처분이라도 일부만 취소할 수 있음.", "2": "틀림. 부당한 처분도 취소할 수 있음. 취소사유는 위법에 한정되지 않음.", "3": "맞음. 상대방의 신뢰를 보호할 가치가 있으면 소급효를 제한하여 장래를 향해 취소할 수 있음.", "4": "틀림. 적법한 처분도 법률상 요건 아래 공익상 필요가 있으면 철회할 수 있음.", "5": "틀림. 철회에서도 당사자 불이익과 철회로 달성되는 공익을 비교·형량해야 함."}}}, {"qnum": 32, "answer": 1, "title": "32. 행정행위의 부관에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정청은 처분에 재량이 없는 경우에는 법률에 근거가 있는 경우에 부관을 붙일 수 있다.", "② 부관은 해당 처분과 실질적인 관련이 있어야 하지만, 해당 처분의 목적에는 구속되지 않는다.", "③ 법률이 예정하는 행정행위의 효과를 일부 배제하는 부관은 독립하여 행정소송의 대상이될 수 있다.", "④ 행정처분에 붙인 부담인 부관이 무효가 되면 그 부담의 이행으로 한 사법상 법률행위도 당연히 무효가 된다.", "⑤ ｢하천법｣상 하천부지 점용허가에는 그 성질상 부관을 붙일 수 없다."], "explanation": {"summary": "부관은 주된 처분의 목적 범위 안에서 붙어야 하고, 재량행위가 원칙적 무대임. 기속행위에는 법적 근거가 있을 때만 예외적으로 부관이 가능함.", "options": {"1": "맞음. 기속행위에는 원칙적으로 부관을 붙일 수 없고, 붙이려면 법률상 근거가 필요함.", "2": "틀림. 부관은 주된 처분과 실질적 관련성뿐 아니라 그 목적에도 부합해야 함.", "3": "틀림. 부담은 독립쟁송성이 인정되지만, 법률이 예정한 효과를 일부 배제하는 조건·기한 등은 일반적으로 독립취소소송 대상이 되지 않음.", "4": "틀림. 부담이 무효라고 해서 그 이행으로 한 사법상 행위가 당연히 무효가 되는 것은 아님. 별도 법률행위의 효력은 따로 판단함.", "5": "틀림. 하천부지 점용허가는 재량행위라서 성질상 부관 부가가 가능함."}}}, {"qnum": 33, "answer": 4, "title": "33. 甲은 건축물을 신축하기 위하여 허가청인 A에게 건축허가(주된 허가)를 신청하였다.", "statement_lines": ["甲은 건축허가를 신청하면서 산지전용허가도 받고자 하는데, 건축법상 甲이 건축허가를 받으면 산지관리법에 따른 산지전용허가 (관련 허가)를 받은 것으로 의제된다. 이에 관한 설명으로 옳지 않은 것은? (단, 관련 허가의 허가청은 B임)"], "options": ["① 甲은 건축허가를 A에게 신청하면서 산지전용허가에 필요한 서류를 함께 제출하여야 한다.", "② A는 건축허가를 하기 전에 산지전용허가에 관하여 미리 B와 협의하여야 한다.", "③ B는 산지전용허가에 관한 법령을 위반하여 협의에 응해서는 아니 된다.", "④ A와 B 사이에 협의가 되면 건축허가와 산지전용허가를 모두 받은 것으로 본다.", "⑤ 산지전용허가가 의제된 경우 B는 산지전용허가를 직접 한 것으로 보아 관계 법령에 따른 관리ㆍ감독 등 필요한 조치를 하여야 한다."], "explanation": {"summary": "인허가의제는 주된 허가를 받으면 관련 허가도 받은 것으로 보는 절차간소화 제도임. 다만 효과는 관련 허가가 '의제'될 뿐, 주된 허가까지 함께 받은 것으로 보는 것은 아님.", "options": {"1": "맞음. 원칙적으로 주된 허가 신청 시 관련 허가 서류도 함께 제출해야 함.", "2": "맞음. 주된 허가청은 관련 허가청과 사전에 협의해야 함.", "3": "맞음. 협의기관도 관련 법령에 반하는 협의를 해서는 안 됨.", "4": "틀림. 건축허가를 받으면 산지전용허가를 받은 것으로 의제되는 것이지, 협의만으로 건축허가와 산지전용허가를 '모두 받은 것'이 되는 것은 아님. 주된 허가는 별도의 허가행위로 이루어져야 함.", "5": "맞음. 관련 허가청은 직접 허가한 것으로 보아 사후 관리·감독 권한을 행사함."}}}, {"qnum": 34, "answer": 4, "title": "34. 행정절차법상 처분절차에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 행정청은 처분을 할 때에는 단순ㆍ반복적인 처분으로서 당사자가 그 이유를 명백히알 수 있는 경우에도 당사자에게 그 근거와 이유를 사전에 제시하여야 한다.", "② 행정청은 처분에 오기(誤記)가 있어서 직권으로 이를 정정한 경우에는 그 사실을 당사자 에게 통지할 필요는 없다.", "③ 행정청은 행정청의 편의를 위하여 신청인이 다른 행정청에 처분을 구하는 신청을 접수 하게 할 수 있다.", "④ 행정청은 다수의 행정청이 관여하는 처분을 구하는 신청을 접수한 경우에는 관계 행정 청과의 신속한 협조를 통하여 그 처분이 지연되지 아니하도록 하여야 한다.", "⑤ 행정청은 필요한 처분기준을 정하여 공표하는 것이 해당 처분의 성질상 현저히 곤란한 경우라도 그 처분기준을 공표하여야 한다."], "explanation": {"summary": "행정절차법은 신청 접수 단계부터 관계기관 협조로 지연을 막도록 하고, 이유제시·통지·처분기준 공표에도 여러 예외를 둠.", "options": {"1": "틀림. 단순·반복적 처분 등 당사자가 이유를 명백히 알 수 있는 경우에는 이유제시 예외가 인정됨.", "2": "틀림. 오기의 직권정정이라도 그 사실은 당사자에게 알려야 함.", "3": "틀림. 신청은 원칙적으로 권한 있는 행정청이 접수해야 하고, 행정청 편의만으로 다른 행정청에 접수시키는 식은 허용되지 않음.", "4": "맞음. 다수 행정청이 관여하는 신청을 접수한 때에는 관계기관과 신속히 협조하여 처분 지연을 막아야 함.", "5": "틀림. 처분기준 공표도 성질상 현저히 곤란한 경우에는 예외가 인정됨."}}}, {"qnum": 35, "answer": 1, "title": "35. 공공기관의 정보공개에 관한 법률의 내용으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 공개될 경우 부동산 투기, 매점매석 등으로 특정인에게 이익 또는 불이익을 줄 우려가 있다고 인정되는 정보라도 공공기관이 보유ㆍ관리하는 정보라면 이를 공개하여야 한다.", "② 공공기관은 부득이한 사유가 없다면 정보공개의 청구를 받은 날부터 10일 이내에 공개 여부를 결정하여야 한다.", "③ 공공기관은 공개 청구된 공개 대상 정보의 일부가 제3자와 관련이 있다고 인정할 때에는그 사실을 제3자에게 지체 없이 통지하여야 한다.", "④ 공공기관은 정보의 공개를 결정한 경우 해당 청구인이 사본의 교부를 원하는 때에는 이를 교부하여야 한다.", "⑤ 정보공개청구는 말로써 할 수 있다."], "explanation": {"summary": "정보공개법은 투기·매점매석 우려 정보 등은 비공개 대상이 될 수 있음. 공개원칙이지만 법이 열거한 비공개사유는 별도로 봐야 함.", "options": {"1": "틀림. 공개될 경우 특정인에게 이익·불이익을 줄 우려가 있는 정보는 비공개 대상이 될 수 있음.", "2": "맞음. 원칙적 결정기간은 10일 이내이고, 부득이한 경우 연장 가능.", "3": "맞음. 제3자 관련 정보가 포함되면 그 사실을 제3자에게 지체 없이 통지해야 함.", "4": "맞음. 공개결정 후 청구인이 사본 교부를 원하면 이를 교부해야 함.", "5": "맞음. 정보공개청구는 구술로도 가능하고, 이 경우 담당 공무원이 청구서를 작성해 줌."}}}, {"qnum": 36, "answer": 3, "title": "36. 행정절차법상 청문에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 행정청은 다수 국민의 이해가 상충되는 처분을 하려는 경우에는 청문 주재자를 2명 이상으로 선정할 수 있다.", "② 청문은 당사자가 공개를 신청하더라도 제3자의 정당한 이익을 현저히 해칠 우려가 있는 경우에는 공개하여서는 아니 된다.", "③ 청문 주재자는 직권으로 당사자등이 주장한 사실에 한하여 필요한 조사를 하여야 한다.", "④ 청문 주재자는 필요하다고 인정할 때에는 관계 행정청에 필요한 문서의 제출을 요구할수 있다.", "⑤ 누구든지 청문을 통하여 알게 된 경영상의 비밀을 정당한 이유 없이 누설하여서는 아니 된다."], "explanation": {"summary": "청문 주재자는 당사자 주장사실에만 묶이지 않고 직권으로 필요한 조사도 할 수 있음. 청문은 실체적 진실과 절차보장을 위한 제도임.", "options": {"1": "맞음. 이해관계가 넓게 충돌하는 경우 청문 주재자를 2명 이상 둘 수 있음.", "2": "맞음. 당사자가 공개를 원해도 제3자의 정당한 이익을 현저히 해칠 우려가 있으면 비공개해야 함.", "3": "틀림. 청문 주재자는 당사자 등이 주장한 사실에 한정되지 않고 직권으로도 필요한 조사를 할 수 있음.", "4": "맞음. 필요하면 관계 행정청에 문서 제출 요구 가능.", "5": "맞음. 청문을 통해 알게 된 경영상 비밀은 정당한 이유 없이 누설할 수 없음."}}}, {"qnum": 37, "answer": 2, "title": "37. 질서위반행위규제법의 내용으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 과태료 재판은 검사의 명령으로써 집행한다.", "② 신분에 의하여 성립하는 질서위반행위에 신분이 없는 자가 가담한 때에는 신분이 없는 자에 대하여는 질서위반행위가 성립하지 아니한다.", "③ 질서위반행위 후 법률이 변경되어 그 행위가 질서위반행위에 해당하지 아니하게 된때에는 법률에 특별한 규정이 없는 한 변경된 법률을 적용한다.", "④ ｢질서위반행위규제법｣은 대한민국 영역 밖에서 질서위반행위를 한 대한민국의 국민에게 적용한다.", "⑤ 하나의 행위가 2 이상의 질서위반행위에 해당하는 경우에는 각 질서위반행위에 대하여 정한 과태료 중 가장 중한 과태료를 부과한다."], "explanation": {"summary": "질서위반행위는 형벌이 아니라 행정질서벌이지만 공범, 법률변경, 국외적용, 경합 규정을 별도로 둠. 신분범에도 비신분자의 가담이 배제되는 것은 아님.", "options": {"1": "맞음. 과태료 재판의 집행은 검사의 명령으로 이루어짐.", "2": "틀림. 신분에 의하여 성립하는 질서위반행위에도 신분 없는 자가 가담하면 일정한 범위에서 책임을 질 수 있으므로, 전면 부정하는 서술은 틀림.", "3": "맞음. 행위 후 법률이 변경되어 더 이상 질서위반행위가 아니게 되면 변경법 적용이 원칙.", "4": "맞음. 영역 외 행위라도 대한민국 국민에게 적용될 수 있음.", "5": "맞음. 하나의 행위가 여러 질서위반행위에 해당하면 가장 중한 과태료 하나만 부과."}}}, {"qnum": 38, "answer": 3, "title": "38. 행정기본법상 의무자가 행정상 의무를 이행하지 아니하는 경우 행정청이 의무자의 신체나 재산에 실력을 행사하여 그 행정상 의무의 이행이 있었던 것과 같은 상태를 실현하는 것은?", "statement_lines": [], "options": ["① 행정대집행", "② 이행강제금의 부과", "③ 직접강제", "④ 강제징수", "⑤ 즉시강제"], "explanation": {"summary": "의무자의 신체·재산에 직접 실력을 가해 의무이행이 있었던 것과 같은 상태를 실현하는 것은 직접강제임. 대집행은 대체적 작위의무를 행정청이 대신 이행하는 방식이라는 점에서 다름.", "options": {"1": "행정대집행은 대체적 작위의무를 대신 실현하는 제도여서 정의와 다름.", "2": "이행강제금은 금전압박 수단일 뿐 실력행사 그 자체가 아님.", "3": "맞음. 의무자의 신체나 재산에 직접 실력을 가하여 의무이행 상태를 실현하는 것이 직접강제임.", "4": "강제징수는 금전급부의무를 강제로 징수하는 절차임.", "5": "즉시강제는 의무위반 전후와 무관하게 급박한 위해 방지를 위한 별도 제도임."}}}, {"qnum": 39, "answer": 2, "title": "39. 국가배상책임에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① ｢국가배상법｣ 제2조상의 직무행위에는 입법작용과 사법작용이 포함된다.", "② 국가가 국가배상책임을 이행한 경우 공무원에게 경과실이 있으면 국가는 그 공무원에게 구상할 수 있다.", "③ ｢국가배상법｣은 ｢민법｣ 제756조 제1항 단서상의 사용자 면책조항에 상응하는 규정을 두고 있지 않다.", "④ 부작위에 의한 국가배상책임의 성립요건 상 직무상 작위의무는 조리에 의해서도 성립할수 있다.", "⑤ ｢국가배상법｣ 제5조상의 공공의 영조물에는 행정주체가 적법한 권한에 기하여 관리하고 있는 공물뿐만 아니라 사실상 관리하고 있는 공물도 포함된다."], "explanation": {"summary": "국가배상 후 공무원에 대한 구상은 고의 또는 중과실이 있어야 가능함. 단순 경과실만으로는 구상할 수 없음.", "options": {"1": "맞음. 입법작용과 사법작용도 일정 요건 아래 국가배상법상 직무행위가 될 수 있음.", "2": "틀림. 국가는 공무원에게 고의 또는 중과실이 있을 때만 구상 가능함. 경과실만으로는 부족함.", "3": "맞음. 국가배상법에는 민법 제756조 단서와 같은 사용자 면책규정이 없음.", "4": "맞음. 작위의무는 법령뿐 아니라 조리상 의무로도 인정될 수 있음.", "5": "맞음. 공공의 영조물에는 적법한 관리뿐 아니라 사실상 관리 중인 공물도 포함된다고 봄."}}}, {"qnum": 40, "answer": 5, "title": "40. 甲의 건축허가 신청에 대하여 관할 군수 乙은 거부처분을 하였으나, 해당 거부처분에 무효사유에 해당하는 하자가 있어 甲이 행정쟁송으로 다투고자 한다. 이에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 甲은 거부처분 무효확인심판을 제기할 수 있다.", "② 甲은 의무이행심판을 제기할 수 있다.", "③ 甲이 거부처분 무효확인소송을 제기한 경우 무효인 사유를 주장ㆍ증명할 책임은 甲에게 있다.", "④ 甲이 거부처분 무효확인소송을 제기한 경우 ｢행정소송법｣상 취소소송의 사정판결 규정은 준용되지 않는다.", "⑤ 甲이 무효의 선언을 구하는 의미의 취소소송을 제기한 경우 제소기간의 제한이 없다."], "explanation": {"summary": "무효선언을 구하는 의미의 취소소송이라도 형식은 취소소송이므로 제소기간 제한을 받음. 제소기간 제한이 없는 것은 무효등확인소송임.", "options": {"1": "맞음. 거부처분에 중대·명백한 하자가 있으면 무효확인심판 가능.", "2": "맞음. 거부처분에 대해서는 의무이행심판도 가능.", "3": "맞음. 무효확인소송에서는 원고가 무효사유를 주장·증명해야 함.", "4": "맞음. 무효등확인소송에는 취소소송의 사정판결 규정이 준용되지 않음.", "5": "틀림. 무효의 선언을 구하는 의미의 취소소송이라도 취소소송 형식을 취한 이상 제소기간 제한을 받음."}}}, {"qnum": 41, "answer": 2, "title": "41. 행정소송상 집행정지에 관한 설명으로 옳은 것을 모두 고른 것은?", "statement_lines": ["ㄱ. ｢행정소송법｣상 집행정지는 부작위위법확인소송에는 인정되지 않는다.", "ㄴ. 처분이 가분적이더라도 처분의 일부에 대한 집행정지는 허용되지 않는다.", "ㄷ. 처분의 효력정지는 처분등의 집행을 정지함으로써 목적을 달성할 수 있는 경우에는 허용되지 않는다.", "ㄹ. 집행정지의 결정에 대한 즉시항고에는 결정의 집행을 정지하는 효력이 인정 된다."], "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "explanation": {"summary": "집행정지는 효력정지·집행정지·절차정지로 나뉘고, 효력정지는 다른 방법으로 목적 달성이 가능하면 보충적으로 제한됨. 즉시항고에는 집행정지 효력이 없음.", "statements": [{"label": "ㄱ", "text": "맞음", "comment": "집행정지는 처분등 또는 재결의 효력·집행·절차 속행을 정지하는 제도이므로 부작위위법확인소송에는 인정되지 않음."}, {"label": "ㄴ", "text": "틀림", "comment": "처분이 가분적이면 일부에 대한 집행정지도 가능함."}, {"label": "ㄷ", "text": "맞음", "comment": "효력정지는 집행정지로 목적을 달성할 수 없는 경우에만 예외적으로 허용되는 보충적 수단임."}, {"label": "ㄹ", "text": "틀림", "comment": "집행정지 결정에 대한 즉시항고에는 원칙적으로 집행정지 효력이 없음."}], "options": {"1": "ㄴ이 틀리므로 오답.", "2": "맞음. 옳은 것은 ㄱ, ㄷ.", "3": "ㄹ이 틀리므로 오답.", "4": "ㄹ이 틀리므로 오답.", "5": "ㄴ, ㄹ이 모두 틀려 오답."}}}, {"qnum": 42, "answer": 4, "title": "42. 행정심판법상 직접 처분과 간접강제에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 거부처분 취소심판의 경우 행정심판위원회는 직접 처분을 할 수 있다.", "② 의무이행심판의 인용재결이 처분명령재결인 경우 행정심판위원회는 직접 처분을 할 수 없다.", "③ 행정심판위원회는 사정의 변경이 있어 당사자가 신청하는 경우에도 간접강제 결정의 내용을 변경할 수 없다.", "④ 행정심판의 청구인은 간접강제 결정에 불복하는 경우 그 결정에 대하여 행정소송을 제기할 수 있다.", "⑤ 간접강제 결정에 기초한 강제집행에 관하여 ｢행정심판법｣에 특별한 규정이 없는 사항에 대하여는 ｢행정기본법｣의 규정을 준용한다."], "explanation": {"summary": "간접강제 결정은 별도의 재판적 성격을 가지므로 그에 대한 불복은 항고소송으로 다툴 수 있음. 직접처분은 모든 인용재결에서 허용되는 것이 아니라 법이 정한 경우에만 가능함.", "options": {"1": "틀림. 거부처분 취소심판에서 바로 직접처분이 항상 가능한 것은 아님.", "2": "틀림. 처분명령재결 후에도 일정 요건 아래 직접처분이 가능하므로 전면 부정은 틀림.", "3": "틀림. 사정변경이나 기타 사유가 있으면 간접강제 결정의 내용을 변경할 수 있음.", "4": "맞음. 간접강제 결정은 독립된 처분성이 인정되어 이에 대해 행정소송으로 다툴 수 있음.", "5": "틀림. 강제집행에 관한 보충 규정은 민사집행법 체계가 문제되지, 행정기본법 준용이 아님."}}}, {"qnum": 43, "answer": 1, "title": "43. 관할 시장 A는 2024. 2. 5. 甲에 대하여 1,000만 원의 과징금부과처분을 하였고, 甲 은 2024. 2. 6. 처분서를 수령하였다. 甲은 과징금부과처분 취소심판을 제기하였는데, 관할 행정심판위원회는 2024. 4. 23. 1,000만 원의 과징금부과처분을 700만 원으로 감액하는 일부취소재결을 하여, 해당 재결서의 정본이 2024. 4. 24. 甲에게 송달되었 다. 이때 甲이 일부취소재결에도 아직 취소되지 않고 남아있는 부분이 위법하다고 보아 취소소송을 제기하는 경우 소의 대상과 제소기간의 기산일은? (일부취소재결 고유의 하자는 없으며, 다툼이 있으면 판례에 따름)", "statement_lines": ["소의 대상 제소기간 기산일"], "options": ["① 700만 원으로 감액된 2024. 2. 5. 자 과징금부과처분 2024. 4. 24.", "② 700만 원으로 감액된 2024. 2. 5. 자 과징금부과처분 2024. 2. 6.", "③ 700만 원으로 감액한 2024. 4. 23. 자 일부취소재결 2024. 4. 24.", "④ 700만 원으로 감액한 2024. 4. 23. 자 일부취소재결 2024. 2. 6.", "⑤ 2024. 2. 5. 자 1,000만 원의 과징금부과처분 2024. 2. 6."], "explanation": {"summary": "일부취소재결에 고유하자가 없으면 소송대상은 원처분이고, 재결로 감액된 내용이 반영된 변경 후 원처분을 다툼. 제소기간은 재결서를 송달받은 날부터 기산함.", "options": {"1": "맞음. 일부취소재결에 고유한 하자가 없으므로 소송대상은 700만 원으로 감액된 원처분이고, 제소기간은 재결서 정본 송달일인 2024. 4. 24.부터 기산함.", "2": "틀림. 재결을 거친 경우 제소기간은 재결서 송달일 기준이므로 2024. 2. 6.이 아님.", "3": "틀림. 일부취소재결 자체가 아니라 감액된 원처분이 소의 대상임.", "4": "틀림. 소의 대상도 잘못되었고 제소기간 기산일도 잘못됨.", "5": "틀림. 원처분은 재결로 일부취소되어 내용이 변경되었으므로 그대로 1,000만 원 처분을 대상으로 볼 수 없음."}}}, {"qnum": 44, "answer": 1, "title": "44. 판례에 의할 때 공무원의 신분관계에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 임용 당시 공무원임용 결격사유가 있었다면 비록 국가의 과실에 의하여 임용결격자임을 밝혀내지 못하였다 하더라도 그 임용행위는 당연 무효이다.", "② 공무원에 대한 직위해제처분이 있은 후 동일한 사유로 다시 해임처분을 하는 것은 일사 부재리의 법리에 어긋난다.", "③ ｢국가공무원법｣상 당연퇴직의 인사발령은 항고소송의 대상이 되는 처분에 해당한다.", "④ ｢국가공무원법｣상의 직위해제처분에는 의견청취에 관한 ｢행정절차법｣ 규정이 적용된다.", "⑤ 임용행위의 하자로 임용행위가 취소되어 소급적으로 공무원의 지위를 상실한 자도 ｢공무원연금법｣에서 정한 퇴직급여를 청구할 수 있다."], "explanation": {"summary": "임용 당시 결격사유가 있으면 임용행위는 당연무효라는 것이 기본 판례 태도임. 공무원 신분관계에서는 직위해제·당연퇴직·연금 문제를 각각 구별해야 함.", "options": {"1": "맞음. 임용결격자는 국가의 과실 유무와 관계없이 임용행위가 원칙적으로 당연무효임.", "2": "틀림. 직위해제와 후속 해임은 성질과 효과가 다른 별개 처분이어서 일사부재리 문제로 볼 수 없음.", "3": "틀림. 당연퇴직은 법률상 당연히 발생하는 효과를 확인하는 것에 불과한 경우 처분성이 부정됨이 원칙임.", "4": "틀림. 직위해제처분에는 행정절차법상 의견청취 규정이 직접 적용되지 않는다고 봄.", "5": "틀림. 임용이 소급적으로 무효·취소되어 공무원 지위를 상실하면 퇴직급여 청구가 당연히 인정되지 않음."}}}, {"qnum": 45, "answer": 3, "title": "45. 권한의 대리와 위임에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 의함)", "statement_lines": [], "options": ["① 권한의 위임은 권한 자체를 수임자에게 이전하지 않는 점에서 권한 자체가 이전되는 권한의 대리와 구별된다.", "② 국가사무가 도지사에게 기관위임된 경우 도지사가 이를 군수에게 재위임하기 위해서는도 조례에 의하여야 한다.", "③ ｢정부조직법｣에 따르면 권한의 위임은 위임기관의 권한의 일부에 한하여 인정된다.", "④ 내부위임에 따라 수임관청이 자신의 이름으로 처분을 한 경우 그 처분에 대한 무효확인 소송의 피고는 위임관청이 된다.", "⑤ ｢행정권한의 위임 및 위탁에 관한 규정｣에 따르면 수임사무의 처리에 관하여 위임기관은 수임기관에 대하여 사전승인을 받을 것을 요구할 수 있다."], "explanation": {"summary": "권한의 위임은 권한 자체의 이전이고, 대리는 권한은 본인에게 남은 채 대리인이 본인 이름으로 행사하는 것임. 정부조직법은 권한의 '일부' 위임만 허용한다.", "options": {"1": "틀림. 설명이 뒤바뀜. 권한 자체가 이전되는 것은 위임이고, 대리는 권한이 본인에게 남아 있음.", "2": "틀림. 기관위임사무의 재위임은 법령 근거가 필요하며 단순히 도 조례로 할 수 있는 문제가 아님.", "3": "맞음. 정부조직법상 권한의 위임은 위임기관의 권한 전부가 아니라 일부에 한하여 인정됨.", "4": "틀림. 내부위임에서 수임자가 자기 이름으로 처분했다면 실질 권한자는 위임관청이므로 피고 문제는 별도 판례 법리에 따라 판단해야 하나, 이 진술은 일반론으로 단정할 수 없음.", "5": "틀림. 위임기관의 지휘·감독은 가능하나 일률적으로 사전승인을 요구할 수 있다고 단정할 수 없음."}}}, {"qnum": 46, "answer": 3, "title": "46. 지방자치법상 지방의회의 권한에 해당하지 않는 것은?", "statement_lines": [], "options": ["① 청원의 수리와 처리에 관한 의결권", "② 결산과 관련한 검사위원 선임권", "③ 주민투표 회부권", "④ 지방의회의원의 자격상실에 대한 의결권", "⑤ 기금의 설치ㆍ운용에 관한 의결권"], "explanation": {"summary": "지방의회는 결산 승인, 청원, 자격상실 의결, 기금 설치·운용 등 여러 의결권을 가지지만, 주민투표 회부권은 지방자치단체장의 권한임.", "options": {"1": "지방의회 권한에 해당함.", "2": "지방의회 권한에 해당함. 결산검사위원 선임권이 있음.", "3": "맞음. 주민투표 회부는 지방의회의 권한이 아니라 지방자치단체장 권한임.", "4": "지방의회 권한에 해당함.", "5": "지방의회 권한에 해당함."}}}, {"qnum": 47, "answer": 5, "title": "47. 경찰관 직무집행법의 내용으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 불심검문과정에서 경찰관으로부터 가까운 경찰서로 동행할 것을 요구받은 사람은 그요구를 거절할 수 있다.", "② 불심검문과정에서 경찰관은 그 대상이 되는 사람에게 질문을 할 때에 흉기를 가지고 있는지를 조사할 수 있다.", "③ 불심검문과정에서 경찰관으로부터 질문을 받은 사람은 그 의사에 반하여 답변을 강요 당하지 아니한다.", "④ 경찰관은 재산에 중대한 손해를 끼칠 우려가 있는 인공구조물의 파손이 있을 때에는 그장소에 있는 사람에게 위해를 방지하기 위하여 필요하다고 인정되는 조치를 하게 할 수있다.", "⑤ 경찰관의 적법한 직무집행으로 인하여 손실을 입은 자는 그 손실발생의 원인에 대하여 책임이 있는 경우라도 그 손실 전부에 대하여 보상을 받을 수 있다."], "explanation": {"summary": "경찰의 적법한 직무집행으로 손실이 발생해도 손실발생 원인에 대해 당사자에게 책임이 있으면 그 전부를 보상받는 것은 아님. 손실보상은 책임 없는 특별한 희생 전보가 중심임.", "options": {"1": "맞음. 동행요구는 임의수사적 성격이므로 거절 가능.", "2": "맞음. 질문 과정에서 흉기 소지 여부를 조사할 수 있음.", "3": "맞음. 답변강요는 허용되지 않음.", "4": "맞음. 위해 방지를 위해 필요한 조치를 명할 수 있음.", "5": "틀림. 손실발생 원인에 본인 책임이 있으면 그 손실 전부 보상을 당연히 청구할 수 없음."}}}, {"qnum": 48, "answer": 3, "title": "48. 공물에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 공공용물의 일반사용의 경우에는 사용료를 납부하여야 한다.", "② 공물의 인접주민에게는 구체적으로 공물을 사용하지 않고 있더라도 공물에 대한 고양된 일반사용권이 인정된다.", "③ 행정재산이 공용폐지되어 시효취득의 대상이 된다는 증명책임은 시효취득을 주장하는 자에게 있다.", "④ ｢하천법｣상 하천의 점용허가권은 대세적 효력이 있는 물권이다.", "⑤ 중앙관서의 장은 특별한 제한 없이 행정재산의 사용허가를 할 수 있다."], "explanation": {"summary": "행정재산이 공용폐지되어 시효취득 대상이 되었다는 점은 시효취득을 주장하는 자가 증명해야 함. 공물 일반사용은 원칙적으로 무상이고, 하천점용권은 물권이 아님.", "options": {"1": "틀림. 공공용물의 일반사용은 원칙적으로 자유·무상 사용임.", "2": "틀림. 고양된 일반사용권은 공물과 특별한 생활상 이해관계가 있는 인접주민 등에게 예외적으로 인정되지만, 아무런 구체적 이용관계 없이 당연히 인정되는 것은 아님.", "3": "맞음. 공용폐지로 사권의 객체가 되었다는 사실은 시효취득 주장자가 입증해야 함.", "4": "틀림. 하천점용허가로 얻는 권리는 공법상 사용권일 뿐 대세적 물권이 아님.", "5": "틀림. 행정재산 사용허가는 법령상 제한과 요건 아래서만 가능함."}}}, {"qnum": 49, "answer": 5, "title": "49. 국유재산법상 ( )에 들어갈 용어는?", "statement_lines": ["( )(이)란 사용허가나 대부계약 없이 국유재산을 사용ㆍ수익하거나 점유한 자 (사용허가나 대부계약 기간이 끝난 후 다시 사용허가나 대부계약 없이 국유재산을 계속 사용ㆍ수익하거나 점유한 자를 포함한다)에게 부과하는 금액을 말한다."], "options": ["① 과징금", "② 이행강제금", "③ 과태료", "④ 부담금", "⑤ 변상금"], "explanation": {"summary": "사용허가나 대부계약 없이 국유재산을 점유·사용하는 자에게 부과하는 금액은 국유재산법상 변상금임. 과징금·이행강제금·과태료와 구별해야 함.", "options": {"1": "과징금은 행정법상 제재금으로, 무단점유 대가 개념이 아님.", "2": "이행강제금은 의무불이행 압박수단임.", "3": "과태료는 질서위반행위에 대한 행정질서벌임.", "4": "부담금은 공익사업 비용 분담을 위한 공과금 성격임.", "5": "맞음. 무단점유·무단사용에 대해 부과하는 금액은 변상금."}}}, {"qnum": 50, "answer": 4, "title": "50. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법률상 사업인정과 수용재결에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 사업인정은 항고소송의 대상이 되는 처분에 해당한다.", "② 사업인정에 불가쟁력이 발생한 경우 당연무효가 아닌 한 사업인정의 하자를 이유로 수용재결의 취소를 구할 수 없다.", "③ 사업인정은 사업인정이 고시된 날부터 효력을 발생한다.", "④ 수용재결은 행정심판의 재결의 성질을 갖는다.", "⑤ 수용재결의 효과로서 수용에 의한 사업시행자의 토지소유권 취득은 법률의 규정에 의한 원시취득이다."], "explanation": {"summary": "수용재결은 행정심판의 재결이 아니라 독립한 행정처분임. 사업인정과 수용재결은 모두 처분성이 인정되지만 법적 성질은 구별해야 함.", "options": {"1": "맞음. 사업인정은 항고소송 대상이 되는 처분임.", "2": "맞음. 사업인정에 불가쟁력이 생기면 당연무효가 아닌 한 그 하자를 들어 수용재결을 다툴 수 없음.", "3": "맞음. 사업인정은 고시된 날 효력이 발생함.", "4": "틀림. 수용재결은 토지수용위원회의 독립한 행정처분이지 행정심판법상 재결의 성질을 갖는 것은 아님.", "5": "맞음. 수용에 의한 소유권 취득은 법률 규정에 의한 원시취득으로 봄."}}}]}, {"id": "2023", "title": "2023년도 제11회 행정사 1차 1교시 A형 ( 22 - 9 )", "label": "2023 제11회 1교시 A형", "questions": [{"qnum": 26, "answer": 4, "title": "26. 행정의 법원칙에 관한 판례의 내용이다. ( )에 들어갈 것은?", "statement_lines": ["텔레비전방송수신료 금액의 결정은 수신료에 관한 본질적인 중요한 사항이므로 국회가 스스로 행하여야 하는 사항에 속하는 것임에도 불구하고 한국방송공사법 에서 국회의 결정이나 관여를 배제한 채 한국방송공사로 하여금 수신료금액을 결정해서 문화관광부장관의 승인을 얻도록 한 것은 ( )원칙에 위반된다."], "options": ["① 비례", "② 평등", "③ 신뢰보호", "④ 법률유보", "⑤ 부당결부금지"], "explanation": {"summary": "수신료 금액 결정처럼 국민 부담에 직접 연결되는 본질적 사항은 국회가 스스로 정하거나 적어도 법률상 통제가 확보되어야 함. 이를 공사와 장관 승인에만 맡긴 것은 본질적 사항 유보에 반해 법률유보 원칙 위반으로 본 사례임.", "options": {"1": "비례원칙 문제 아님. 수단과 목적의 비례가 아니라 본질적 사항을 누가 정하느냐가 쟁점임.", "2": "평등원칙 문제 아님. 차별취급 여부가 아니라 입법자가 스스로 정해야 할 사항의 위임 한계가 문제임.", "3": "신뢰보호원칙 문제 아님. 선행조치에 대한 신뢰 침해 사안이 아님.", "4": "맞음. 본질적 중요사항을 법률이 직접 정하지 않고 사실상 외부에 맡긴 것이어서 법률유보 원칙 위반임.", "5": "부당결부금지원칙 아님. 서로 무관한 의무를 결부한 사안이 아님."}}}, {"qnum": 27, "answer": 4, "title": "27. 행정기본법상 법 적용의 기준에 관한 내용이다. ( )에 들어갈 것으로 옳은 것은?", "statement_lines": ["○ 당사자의 신청에 따른 처분은 법령등에 특별한 규정이 있거나 ( ㄱ ) 당시의 법령등을 적용하기 곤란한 특별한 사정이 있는 경우를 제외하고는 ( ㄱ ) 당시의 법령등에 따른다.", "○ 법령등을 위반한 행위의 성립과 이에 대한 제재처분은 법령등에 특별한 규정이 있는 경우를 제외하고는 ( ㄴ ) 당시의 법령등에 따른다. 다만, 법령등을 위반한 행위 후 법령등의 변경에 의하여 그 행위가 법령등을 위반한 행위에 해당하지 아니하거나 제재처분 기준이 가벼워진 경우로서 해당 법령등에 특별한 규정이 없는 경우에는 변경된 법령등을 적용한다."], "options": ["① ㄱ: 신청, ㄴ: 제재처분", "② ㄱ: 신청, ㄴ: 법령등을 위반한 행위", "③ ㄱ: 처분, ㄴ: 판결", "④ ㄱ: 처분, ㄴ: 법령등을 위반한 행위", "⑤ ㄱ: 판결, ㄴ: 제재처분"], "explanation": {"summary": "행정기본법은 신청처분은 원칙적으로 처분 당시 법령을, 제재는 원칙적으로 위반행위 당시 법령을 기준으로 삼음. 제재 기준이 완화되거나 위반성이 사라지면 변경법령을 적용하는 예외가 붙음.", "statements": [{"label": "ㄱ", "text": "신청에 따른 처분의 기준시", "comment": "맞음. 특별한 사정이 없으면 처분 당시의 법령등이 기준임."}, {"label": "ㄴ", "text": "제재처분의 기준시", "comment": "맞음. 원칙은 위반행위 당시 법령등이고, 사후 법령이 유리하게 바뀌면 예외적으로 변경법령 적용 가능."}], "options": {"1": "틀림. ㄱ이 잘못됨. 신청이 아니라 처분 당시가 기준임.", "2": "틀림. ㄱ이 잘못됨.", "3": "틀림. ㄱ, ㄴ 모두 조문과 다름.", "4": "맞음. ㄱ은 처분 당시, ㄴ은 위반행위 당시가 기준임.", "5": "틀림. 둘 다 틀림."}}}, {"qnum": 28, "answer": 3, "title": "28. 행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 입법 실제에 있어서 통상 대통령령에는 시행령이라는 이름을 붙이고 총리령과 부령에는 시행규칙이라는 이름을 붙인다.", "② 헌법이 인정하고 있는 위임입법의 형식은 예시적인 것이다.", "③ 상위 법령의 집행을 위하여 필요한 경우에는 상위 법령의 위임이 없더라도 집행명령으로 새로운 국민의 의무를 정할 수 있다.", "④ 법원이 구체적 규범통제를 통해 위헌․위법으로 선언할 심판대상은 원칙적으로 재판의 전제성이 인정되는 조항에 한정된다.", "⑤ 고시가 다른 집행행위의 매개 없이 그 자체로서 직접 국민의 구체적인 권리의무나 법률 관계를 규율하는 성격을 가질 때에는 항고소송의 대상이 되는 행정처분에 해당한다."], "explanation": {"summary": "행정입법은 형식보다 내용이 중요함. 집행명령은 상위법 집행에 필요한 사항만 정할 수 있을 뿐 새로운 국민의 권리제한·의무부과는 불가함.", "options": {"1": "옳음. 실무상 대통령령은 시행령, 총리령·부령은 시행규칙이라는 명칭을 주로 사용함.", "2": "옳음. 헌법상 위임입법 형식은 대통령령·총리령·부령에 한정된 폐쇄열거가 아니라 예시적 성격으로 이해됨.", "3": "틀림. 집행명령은 상위법의 집행을 위한 세칙일 뿐 새로운 국민의 의무를 창설할 수 없음.", "4": "옳음. 구체적 규범통제는 원칙적으로 재판의 전제성이 인정되는 규정이 심판대상이 됨.", "5": "옳음. 고시가 직접 국민의 권리의무를 규율하면 처분성을 인정함."}}}, {"qnum": 29, "answer": 4, "title": "29. 판례에 의할 때 항고소송의 대상이 되는 행정처분에 해당하는 것을 모두 고른 것은?", "statement_lines": ["ㄱ. 지목변경신청 반려행위 ㄴ. 건축물 용도변경신청 거부행위 ㄷ. 건축물대장 작성신청 반려행위 ㄹ. 토지대장 직권말소행위 ㅁ. 토지대장상의 소유자명의변경신청 거부행위"], "options": ["① ㄱ", "② ㄴ, ㅁ", "③ ㄷ, ㄹ, ㅁ", "④ ㄱ, ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "explanation": {"summary": "공부 포인트는 공부·대장 관련 행위라도 권리관계에 실질적 변동을 일으키는지임. 단순 사실증명·공적장부 정리행위는 원칙적으로 처분성이 부정되지만, 신청 거부가 곧 권리행사 봉쇄로 이어지면 처분성이 인정됨.", "statements": [{"label": "ㄱ", "text": "지목변경신청 반려행위", "comment": "맞음. 지목변경은 토지의 공적 공시에 직접 영향을 미쳐 신청 반려에 처분성이 인정됨."}, {"label": "ㄴ", "text": "건축물 용도변경신청 거부행위", "comment": "맞음. 신청인의 법적 지위에 직접 영향을 주는 거부처분임."}, {"label": "ㄷ", "text": "건축물대장 작성신청 반려행위", "comment": "맞음. 건축물대장 작성 거부는 이후 법률관계 형성에 중대한 영향을 주어 처분성이 인정됨."}, {"label": "ㄹ", "text": "토지대장 직권말소행위", "comment": "맞음. 대장상 기재 말소는 공적 공시에 직접 변동을 주므로 처분성이 인정됨."}, {"label": "ㅁ", "text": "토지대장상의 소유자명의변경신청 거부행위", "comment": "틀림. 토지대장은 소유권 공시 그 자체가 아니라 사실증명적 성격이어서 명의변경 거부의 처분성은 부정됨."}], "options": {"1": "틀림. ㄴ, ㄷ, ㄹ도 처분에 해당함.", "2": "틀림. ㅁ은 처분성이 부정됨.", "3": "틀림. ㅁ이 포함되어 틀림.", "4": "맞음. ㄱ, ㄴ, ㄷ, ㄹ만 처분에 해당함.", "5": "틀림. ㅁ까지 포함해서 틀림."}}}, {"qnum": 30, "answer": 3, "title": "30. 행정행위의 불가변력과 불가쟁력에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 불가변력은 행정행위의 상대방이나 이해관계인을 구속하는 효력이고 불가쟁력은 행정청을 구속하는 효력이다.", "② 불가변력은 모든 행정행위에 다 인정되지만, 불가쟁력은 예외적으로 일부 행정행위의 경우에만 인정된다.", "③ 불가변력은 당해 행정행위에 대하여서만 인정되는 것이고, 동종의 행정행위라 하더라도그 대상을 달리할 때에는 이를 인정할 수 없다.", "④ 행정처분이 불복기간의 경과로 인하여 확정된 경우 처분의 기초가 된 사실관계나 법률적 판단이 확정되고, 당사자들이나 법원이 이에 기속되어 모순되는 주장이나 판단을 할수 없게 된다.", "⑤ 행정심판의 재결은 준사법적 행위로서 불가쟁력이 인정되므로 행정심판 청구인은 제소 기간의 경과 여부를 불문하고 그 재결의 효력을 다툴 수 없게 된다."], "explanation": {"summary": "불가쟁력은 상대방이 다투지 못하게 되는 효력, 불가변력은 행정청이 임의로 바꾸지 못하는 효력임. 불가변력은 모든 처분에 인정되는 것이 아니라 재결 등 일부에 한정됨.", "options": {"1": "틀림. 양자가 뒤바뀜. 불가쟁력은 상대방·이해관계인을, 불가변력은 행정청을 구속하는 효력임.", "2": "틀림. 오히려 불가쟁력은 일반적으로 인정되고, 불가변력은 예외적으로 인정됨.", "3": "맞음. 불가변력은 당해 처분 자체에 관한 것이지 별개의 대상에 대한 동종처분까지 미치지 않음.", "4": "틀림. 불복기간 경과로 처분을 다투기 어려워질 뿐, 민사판결의 기판력처럼 사실관계·법률판단이 전면 확정되는 것은 아님.", "5": "틀림. 재결도 제소기간 내에는 재결소송 등으로 다툴 수 있음."}}}, {"qnum": 31, "answer": 5, "title": "31. 행정지도에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 행정지도를 반드시 서면으로 해야 하는 것은 아니다.", "② 행정기관은 행정지도의 상대방이 행정지도에 따르지 아니하였다는 것을 이유로 불이익한 조치를 하여서는 아니 된다.", "③ 행정기관이 같은 행정목적을 실현하기 위하여 많은 상대방에게 행정지도를 하려는 경우 에는 특별한 사정이 없으면 행정지도에 공통적인 내용이 되는 사항을 공표하여야 한다.", "④ 행정지도의 상대방은 해당 행정지도의 내용뿐만 아니라 행정지도의 방식에 관해서도 행정기관에 의견제출을 할 수 있다.", "⑤ 「행정기본법」은 임의성의 원칙 등 행정지도의 원칙에 관하여 규정하고 있다."], "explanation": {"summary": "행정지도는 비권력적·임의적 수단이고, 일반적 규율은 행정절차법에 있음. 상대방이 따르지 않았다는 이유만으로 불이익을 주면 임의성 원칙에 반함.", "options": {"1": "옳음. 행정지도는 원칙적으로 구두도 가능하고, 상대방이 요구하면 서면교부가 문제될 뿐임.", "2": "옳음. 행정지도 불응을 이유로 불이익조치 금지.", "3": "옳음. 다수인을 상대로 같은 행정지도를 하려면 공통내용 공표가 원칙임.", "4": "옳음. 상대방은 내용뿐 아니라 방식에 대해서도 의견을 낼 수 있음.", "5": "틀림. 행정지도의 일반원칙은 행정절차법이 규율하고, 행정기본법 규정으로 볼 수 없음."}}}, {"qnum": 32, "answer": 1, "title": "32. 행정행위의 부관에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 부담부 행정행위는 부담을 이행하여야 비로소 그 효력이 발생한다.", "② 부담을 불이행한 것만으로는 주된 행정행위의 효력이 소멸하지 않는다.", "③ 부담은 그 자체로서 행정쟁송의 대상이 될 수 있다.", "④ 행정청은 처분에 재량이 없는 경우에는 법률에 근거가 있는 경우에 부관을 붙일 수 있다.", "⑤ 어업면허처분 중 면허의 유효기간만 취소하여 달라는 소송을 제기하는 것은 허용될 수없다."], "explanation": {"summary": "부담은 주된 행정행위에 부가된 별도의 의무라서 이를 이행하지 않아도 본처분 효력이 당연히 발생하고, 불이행만으로 당연 소멸하지도 않음. 정지조건과 혼동하면 틀림.", "options": {"1": "틀림. 부담은 조건이 아니므로 부담을 이행해야만 효력이 발생하는 것이 아님. 처분은 일단 효력이 발생함.", "2": "옳음. 부담 불이행만으로 주된 처분이 당연히 소멸하지 않음.", "3": "옳음. 부담은 독립해 쟁송대상이 될 수 있음.", "4": "옳음. 기속행위라도 법률 근거가 있으면 부관 부가 가능.", "5": "옳음. 면허 유효기간은 본체와 분리된 독립쟁송 대상으로 보기 어려움."}}}, {"qnum": 33, "answer": 3, "title": "33. 공법상 계약에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 「행정절차법」은 공법상 계약의 절차에 관한 일반법이다.", "② 행정청은 공법상 계약의 상대방을 선정하고 계약 내용을 정할 때 공법상 계약의 공공성 만을 고려하여야 하고 제3자의 이해관계를 고려하여서는 아니 된다.", "③ 행정청이 공법상 계약을 체결하는 경우 계약의 목적 및 내용을 명확하게 적은 계약서를 작성하여야 한다.", "④ 공법상 계약에는 법률우위의 원칙이 적용되지 않는다.", "⑤ 행정청이 공법상 계약을 체결할 때 법령등에 따른 관계 행정청의 동의, 승인 등이 필요 하다고 하여 이를 모두 거쳐야 하는 것은 아니다."], "explanation": {"summary": "행정기본법은 공법상 계약의 일반원칙을 규정함. 핵심은 서면계약, 법령 준수, 공공성과 함께 상대방 및 제3자 이해관계까지 고려해야 한다는 점임.", "options": {"1": "틀림. 공법상 계약의 일반법은 행정절차법이 아니라 행정기본법임.", "2": "틀림. 공공성만 볼 것이 아니라 상대방·제3자의 이해관계도 함께 고려해야 함.", "3": "맞음. 계약 목적과 내용을 명확히 적은 계약서를 작성해야 함.", "4": "틀림. 공법상 계약에도 당연히 법률우위 원칙이 적용됨.", "5": "틀림. 관계 행정청의 동의·승인 등이 법령상 필요하면 거쳐야 함."}}}, {"qnum": 34, "answer": 2, "title": "34. 행정절차법상 행정청의 관할 및 협조에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 행정청이 그 관할에 속하지 아니하는 사안을 접수한 경우 지체 없이 이를 관할 행정청에 이송하여야 하고 그 사실을 신청인에게 통지하여야 한다.", "② 행정응원에 드는 비용은 응원을 하는 행정청이 부담한다.", "③ 행정청은 행정의 원활한 수행을 위하여 서로 협조하여야 한다.", "④ 행정응원을 요청받은 행정청은 응원을 거부하는 경우 그 사유를 응원을 요청한 행정청에 통지하여야 한다.", "⑤ 행정청의 관할이 분명하지 아니한 경우이지만 공통으로 감독하는 상급 행정청이 없는 경우에는 각 상급 행정청이 협의하여 그 관할을 결정한다."], "explanation": {"summary": "행정응원 비용은 원칙적으로 응원을 요청한 행정청이 부담함. 관할 불명확 사안의 조정과 상호협조는 행정절차법의 기본 틀임.", "options": {"1": "옳음. 비관할 사안을 받으면 지체 없이 이송하고 신청인에게 통지해야 함.", "2": "틀림. 비용은 응원하는 행정청이 아니라 응원을 요청한 행정청이 부담함.", "3": "옳음. 상호협조는 조문상 원칙임.", "4": "옳음. 거부하면 그 사유를 통지해야 함.", "5": "옳음. 공통 상급청이 없으면 각 상급청이 협의해 관할을 정함."}}}, {"qnum": 35, "answer": 5, "title": "35. 행정절차법상 송달 및 기간ㆍ기한에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 정보통신망을 이용한 송달은 송달받을 자의 동의 여부와 상관없이 언제든지 가능하다.", "② 행정청은 송달하는 문서의 명칭과 송달받는 자의 성명을 확인할 수 있는 기록을 보존하지 않아도 된다.", "③ 송달은 다른 법령등에 특별한 규정이 있는 경우를 제외하고는 해당 문서를 발신한 때그 효력이 발생한다.", "④ 천재지변으로 기한을 지킬 수 없는 경우에는 그 사유가 끝나는 날이 속하는 주말까지 기간의 진행이 정지된다.", "⑤ 외국에 거주하거나 체류하는 자에 대한 기간 및 기한은 행정청이 그 우편이나 통신에 걸리는 일수를 고려하여 정하여야 한다."], "explanation": {"summary": "송달은 상대방 도달이 원칙이고, 전자송달은 동의가 필요함. 외국 거주자 기간은 우편·통신 소요일수를 고려해 정함.", "options": {"1": "틀림. 전자송달은 원칙적으로 송달받을 자의 동의가 있어야 함.", "2": "틀림. 행정청은 문서 명칭과 수령인 성명을 확인할 수 있는 기록을 보존해야 함.", "3": "틀림. 발신시가 아니라 도달시 효력 발생이 원칙임.", "4": "틀림. 천재지변이 끝나는 날까지 진행이 정지되고, 주말까지라는 표현은 조문 아님.", "5": "맞음. 외국 거주·체류자에 대한 기간·기한은 우편·통신 일수를 고려하여 정함."}}}, {"qnum": 36, "answer": 5, "title": "36. 개인정보 보호법상 개인정보 보호 원칙에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 개인정보처리자는 개인정보의 처리 목적에 필요한 범위에서 적합하게 개인정보를 처리 하여야 한다.", "② 개인정보처리자는 개인정보의 처리 목적에 필요한 범위에서 개인정보의 정확성, 완전성및 최신성이 보장되도록 하여야 한다.", "③ 개인정보처리자는 정보주체의 사생활 침해를 최소화하는 방법으로 개인정보를 처리하여야 한다.", "④ 개인정보처리자는 개인정보 처리방침 등 개인정보의 처리에 관한 사항을 공개하여야 한다.", "⑤ 개인정보처리자는 개인정보를 익명 또는 가명으로 처리하여서는 아니 된다."], "explanation": {"summary": "개인정보 보호 원칙은 목적적합성, 정확성·최신성, 최소침해, 투명성 확보가 핵심임. 익명·가명처리는 금지가 아니라 오히려 보호 강화 수단으로 활용 가능함.", "options": {"1": "옳음. 목적에 필요한 범위에서 적합하게 처리해야 함.", "2": "옳음. 정확성·완전성·최신성 보장 의무가 있음.", "3": "옳음. 사생활 침해 최소화 원칙임.", "4": "옳음. 처리방침 등 공개 의무가 있음.", "5": "틀림. 익명처리·가명처리를 해서는 안 되는 것이 아니라, 적법하게 활용할 수 있음."}}}, {"qnum": 37, "answer": 5, "title": "37. 행정대집행법의 내용에 관한 설명으로 옳은 것은?", "statement_lines": [], "options": ["① 의무자가 동의한 경우라도 행정청은 해가 뜨기 전에는 대집행을 착수 할 수 없다.", "② 해가 지기 전에 대집행을 착수한 경우라도 해가 진 후에는 행정청은 즉시 대집행을 중단해야 한다.", "③ 대집행에 대하여는 행정심판을 제기할 수 없다.", "④ 대집행에 요한 비용은 「민사집행법」의 예에 의하여 징수하여야 한다.", "⑤ 대집행에 요한 비용에 대하여서는 행정청은 사무비의 소속에 따라 국세에 다음가는 순위의 선취득권을 가진다."], "explanation": {"summary": "행정대집행 비용 징수는 국세징수법 계열로 이해하면 정리됨. 비용에 대해서는 국세 다음 순위의 선취특권이 인정됨.", "options": {"1": "틀림. 급박한 사정 등 법정 예외가 있으면 야간·휴일 집행 제한이 절대적이지 않음.", "2": "틀림. 해지기 전에 착수했다면 필요한 범위에서 계속 가능함.", "3": "틀림. 대집행 각 단계의 처분성 인정이 가능하여 행정쟁송이 전면 배제되는 것은 아님.", "4": "틀림. 대집행 비용은 민사집행법이 아니라 국세징수의 예에 따라 징수함.", "5": "맞음. 대집행 비용은 국세 다음 순위의 선취특권이 인정됨."}}}, {"qnum": 38, "answer": 1, "title": "38. 질서위반행위규제법의 내용에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 다른 법률에 특별한 규정이 없는 한 14세가 되지 아니한 자의 질서위반행위에 대해서도 과태료를 부과한다.", "② 고의 또는 과실이 없는 질서위반행위는 과태료를 부과하지 아니한다.", "③ 법률에 따르지 아니하고는 어떤 행위도 질서위반행위로 과태료를 부과하지 아니한다.", "④ 대한민국 영역 밖에 있는 대한민국의 선박 또는 항공기 안에서 질서위반행위를 한 외국 인에게도 적용한다.", "⑤ 대한민국 영역 밖에서 질서위반행위를 한 대한민국의 국민에게도 적용한다."], "explanation": {"summary": "질서위반행위규제법은 책임주의와 법률주의를 취함. 14세 미만자에게는 원칙적으로 과태료를 부과하지 않음.", "options": {"1": "틀림. 다른 법률에 특별규정이 없는 한 14세 미만자의 질서위반행위에는 과태료를 부과하지 않음.", "2": "옳음. 고의·과실 없는 경우 과태료 부과 불가.", "3": "옳음. 법률 없는 과태료 부과는 불가.", "4": "옳음. 대한민국 선박·항공기 안의 질서위반행위에도 적용됨.", "5": "옳음. 국외에서 한 대한민국 국민의 질서위반행위에도 적용 가능."}}}, {"qnum": 39, "answer": 1, "title": "39. 취소소송에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 제약회사는 보건복지부 고시인 ‘약제급여ㆍ비급여 목록 및 급여 상한금액표’ 중 그 제약 회사가 제조ㆍ공급하는 약제의 상한금액 인하 부분의 취소를 구할 원고적격이 있다.", "② 처분의 효과가 소멸된 뒤에는 그 처분의 취소로 인하여 회복되는 법률상 이익이 있어도그 처분에 대한 취소소송을 제기할 수 없다.", "③ 지방법무사회가 법무사의 사무원 채용승인 신청을 거부한 경우 채용승인을 신청한 법무 사가 아닌 자는 취소소송을 제기하지 못한다.", "④ 기존의 시외버스운송사업자인 甲회사는 동일노선을 운행하는 乙회사에 대한 시외버스운 송사업계획변경인가 처분으로 인하여 甲회사의 수익감소가 예상되는 경우라도 그 처분의 취소를 구할 법률상의 이익이 없다.", "⑤ 「주택법」상 입주자는 건축물의 하자를 이유로 그 건축물에 대한 사용검사처분의 취소를 구할 법률상 이익이 있다."], "explanation": {"summary": "취소소송의 원고적격은 처분 근거법규가 보호하는 개별적·직접적·구체적 이익이 있는지로 판단함. 약가인하 고시는 해당 제약회사 약제의 상한금액을 직접 낮추므로 원고적격이 인정됨.", "options": {"1": "맞음. 상한금액 인하 고시는 해당 제약회사의 법률상 이익을 직접 침해하므로 원고적격이 인정됨.", "2": "틀림. 처분 효과가 소멸해도 회복되는 법률상 이익이 있으면 소의 이익이 남을 수 있음.", "3": "틀림. 채용승인 거부와 법률상 관련된 자에게는 원고적격이 문제될 수 있어 단정할 수 없음.", "4": "틀림. 경쟁사업자라도 근거법규가 보호하는 이익이 인정되면 원고적격이 있을 수 있음.", "5": "틀림. 건축물 하자를 이유로 사용검사처분 취소를 구할 입주자의 법률상 이익은 일반적으로 부정됨."}}}, {"qnum": 40, "answer": 2, "title": "40. 행정심판법의 내용에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 부작위란 행정청이 당사자의 신청에 대하여 상당한 기간 내에 일정한 처분을 하여야 할법률상 의무가 있는데도 처분을 하지 아니하는 것을 말한다.", "② 행정심판은 처분이 있음을 알게 된 날부터 180일 이내에 청구하여야 한다.", "③ 청구인이 경제적 능력으로 인해 대리인을 선임할 수 없는 경우에는 행정심판위원회에 국선대리인을 선임하여 줄 것을 신청할 수 있다.", "④ 여러 명의 청구인이 공동으로 심판청구를 할 때에는 청구인들 중에서 3명 이하의 선정 대표자를 선정할 수 있다.", "⑤ 의무이행심판은 처분을 신청한 자로서 행정청의 거부처분 또는 부작위에 대하여 일정한 처분을 구할 법률상 이익이 있는 자가 청구할 수 있다."], "explanation": {"summary": "행정심판 제기기간은 '안 날부터 90일, 있은 날부터 180일'이 기본. 180일만 기억하면 오답이 됨.", "options": {"1": "옳음. 부작위는 신청에 대한 처분의무가 있는데 상당한 기간 내 처분하지 않는 것.", "2": "틀림. 안 날부터는 180일이 아니라 90일 이내임.", "3": "옳음. 일정 요건에서 국선대리인 선임 신청 가능.", "4": "옳음. 공동청구인은 3명 이하의 선정대표자를 둘 수 있음.", "5": "옳음. 의무이행심판은 거부처분 또는 부작위에 대해 일정 처분을 구하는 심판임."}}}, {"qnum": 41, "answer": 1, "title": "41. 행정소송법의 내용에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 처분등을 취소하는 확정판결은 당사자에 대해서만 효력이 있다.", "② 처분등이라 함은 행정청이 행하는 구체적 사실에 관한 법집행으로서의 공권력의 행사 또는 그 거부와 그 밖에 이에 준하는 행정작용 및 행정심판에 대한 재결을 말한다.", "③ 행정소송의 종류로는 항고소송, 당사자소송, 민중소송, 기관소송이 규정되어 있다.", "④ 무효등 확인소송은 처분등의 효력 유무 또는 존재 여부의 확인을 구할 법률상 이익이 있는 자가 제기할 수 있다.", "⑤ 행정청의 재량에 속하는 처분이라도 재량권의 한계를 넘거나 그 남용이 있는 때에는 법원은 이를 취소할 수 있다."], "explanation": {"summary": "취소판결 효력은 당사자에만 머무르지 않고 제3자 및 관계행정청에도 미치는 대세효가 핵심임.", "options": {"1": "틀림. 처분 등을 취소하는 확정판결에는 제3자에도 미치는 형성력·대세효가 인정됨.", "2": "옳음. 행정소송법상 처분등의 정의에 맞음.", "3": "옳음. 행정소송의 네 종류를 열거한 내용임.", "4": "옳음. 무효등확인소송은 법률상 이익 있는 자가 제기함.", "5": "옳음. 재량권 일탈·남용이 있으면 취소 가능."}}}, {"qnum": 42, "answer": 2, "title": "42. 국가배상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 인사업무담당 공무원이 다른 공무원의 공무원증을 위조한 행위는 직무집행행위에 해당 한다.", "② 행정처분이 후에 항고소송에서 취소되면 그 기판력에 의하여 당해 행정처분은 공무원의 고의ㆍ과실 여부와 관계없이 곧바로 불법행위를 구성한다.", "③ 생명ㆍ신체의 침해로 인한 국가배상을 받을 권리는 양도하지 못한다.", "④ 경찰관이 범죄수사를 함에 있어 법규상 또는 조리상의 한계를 위반하였다면 이는 법령을 위반한 경우에 해당한다.", "⑤ 영조물 설치․관리상의 하자는 공공의 목적에 공여된 영조물이 그 용도에 따라 통상 갖추어야 할 안전성을 갖추지 못한 상태에 있음을 말한다."], "explanation": {"summary": "위법한 처분이 취소되었다고 해서 곧바로 국가배상 책임이 성립하는 것은 아님. 배상책임은 별도로 공무원의 고의·과실과 위법성 판단이 필요함.", "options": {"1": "옳음. 외형상 직무관련성이 인정되면 직무집행행위로 평가될 수 있음.", "2": "틀림. 처분취소의 기판력만으로 곧바로 불법행위가 성립하지 않음. 국가배상은 고의·과실 등 별도 요건 심사가 필요함.", "3": "옳음. 생명·신체 침해로 인한 배상청구권은 양도 제한이 있음.", "4": "옳음. 수사상 한계 위반은 국가배상법상 법령위반에 포함됨.", "5": "옳음. 영조물 하자의 전형적 정의임."}}}, {"qnum": 43, "answer": 4, "title": "43. 행정조직과 권한의 위임 등에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정기관은 법령으로 정하는 바에 따라 그 소관사무의 일부를 하급행정기관에 위임할수 있다.", "② 행정기관 또는 소속기관을 설치하거나 공무원의 정원을 증원할 때에는 반드시 예산상의 조치가 병행되어야 한다.", "③ 행정권한의 위임은 권한의 법적인 귀속을 변경하는 것이므로 법률이 위임을 허용하고 있는 경우에 한하여 인정된다.", "④ 행정권한의 내부위임은 법률이 위임을 허용하고 있는 경우에 한하여 인정된다.", "⑤ 헌법은 행정각부의 설치ㆍ조직과 직무범위는 법률로 정한다고 규정하고 있다."], "explanation": {"summary": "권한의 위임은 법적 귀속이 바뀌므로 법률상 근거가 필요하지만, 내부위임은 권한 귀속은 그대로 두고 내부 처리권한만 나누는 것이어서 별도 법률 근거가 필수는 아님.", "options": {"1": "옳음. 법령 근거에 따라 일부 사무를 하급기관에 위임 가능.", "2": "옳음. 기관 설치나 정원 증원에는 예산조치가 수반되어야 함.", "3": "옳음. 권한 위임은 귀속주체 변경이므로 법률상 허용이 필요.", "4": "틀림. 내부위임은 권한 귀속의 변경이 아니어서 법률의 개별적 허용이 반드시 필요한 것은 아님.", "5": "옳음. 헌법 규정 내용 그대로임."}}}, {"qnum": 44, "answer": 2, "title": "44. 행정심판법상 재결에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 재결은 서면으로 한다.", "② 행정심판위원회는 사정재결을 할 수 없다.", "③ 재결은 청구인에게 재결서의 정본이 송달되었을 때에 그 효력이 생긴다.", "④ 행정심판위원회는 심판청구의 대상이 되는 처분보다 청구인에게 불리한 재결을 하지 못한다.", "⑤ 행정심판위원회는 심판청구가 적법하지 아니하면 그 심판청구를 각하한다."], "explanation": {"summary": "행정심판에서도 사정재결이 가능함. 위법은 인정되지만 공공복리를 이유로 처분을 취소하지 않는 구조를 떠올리면 됨.", "options": {"1": "옳음. 재결은 서면으로 함.", "2": "틀림. 행정심판위원회는 사정재결을 할 수 있음.", "3": "옳음. 재결은 재결서 정본 송달 시 효력 발생.", "4": "옳음. 불이익변경금지 원칙이 적용됨.", "5": "옳음. 부적법하면 각하 재결."}}}, {"qnum": 45, "answer": 1, "title": "45. 정부조직법상 국무총리 소속 행정기관에 해당하는 것은?", "statement_lines": [], "options": ["① 법제처", "② 특허청", "③ 국세청", "④ 통계청", "⑤ 대통령경호처"], "explanation": {"summary": "정부조직법 기관 소속은 암기문제임. 법제처는 국무총리 소속, 특허청·국세청·통계청은 각 부 소속 외청, 대통령경호처는 대통령 소속임.", "options": {"1": "맞음. 법제처는 국무총리 소속 행정기관임.", "2": "틀림. 특허청은 산업통상자원부 소속 외청.", "3": "틀림. 국세청은 기획재정부 소속 외청.", "4": "틀림. 통계청은 기획재정부가 아니라 통상적으로 경제부처 소속 외청으로 보나 국무총리 소속은 아님.", "5": "틀림. 대통령경호처는 대통령 소속."}}}, {"qnum": 46, "answer": 3, "title": "46. 국가공무원에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 공무원의 신분과 지위의 특수성상 공무원에 대해서는 일반 국민에 비해 보다 넓고 강한 기본권 제한이 가능하다.", "② 공무원이 그 직무를 수행함에 있어 소속 상관의 명백한 위법 내지 불법한 명령에 따라야할 의무는 없다.", "③ 법관, 검사, 외무공무원은 일반직공무원에 해당한다.", "④ 모든 공무원은 법령을 준수하며 성실히 직무를 수행하여야 한다.", "⑤ 국가기관의 장은 소속 공무원을 임용할 때 합리적인 이유 없이 사회적 신분을 이유로 차별해서는 아니 된다."], "explanation": {"summary": "국가공무원은 일반직·특정직 등으로 구분됨. 법관·검사·외무공무원은 일반직이 아니라 특정직이라는 점이 핵심 포인트임.", "options": {"1": "옳음. 공무원은 직무의 특수성 때문에 기본권 제한 폭이 더 넓게 인정될 수 있음.", "2": "옳음. 명백히 위법한 명령에는 복종의무가 없음.", "3": "틀림. 법관·검사·외무공무원은 일반직이 아니라 특정직 공무원임.", "4": "옳음. 성실의무는 기본적 의무임.", "5": "옳음. 합리적 이유 없는 사회적 신분 차별은 허용되지 않음."}}}, {"qnum": 47, "answer": 4, "title": "47. 경찰관 직무집행법상 사실의 확인을 위하여 경찰관이 출석 요구서를 보내 경찰관서에 출석할 것을 요구할 수 있는 직무수행으로 명시되어 있지 않은 것은?", "statement_lines": [], "options": ["① 미아를 인수할 보호자 확인", "② 유실물을 인수할 권리자 확인", "③ 사고로 인한 사상자 확인", "④ 긴급구호를 요청받은 보건의료기관에 대한 요청사실의 확인", "⑤ 행정처분을 위한 교통사고 조사에 필요한 사실 확인"], "explanation": {"summary": "출석요구는 경찰관 직무집행법이 열거한 사실확인 목적에 한정됨. 보건의료기관에 대한 긴급구호 요청사실 확인은 그 열거에 포함되지 않음.", "options": {"1": "명시된 대상임. 미아 인수 보호자 확인은 출석요구 가능.", "2": "명시된 대상임. 유실물 인수 권리자 확인 가능.", "3": "명시된 대상임. 사고 사상자 확인 가능.", "4": "맞음. 긴급구호 요청을 받은 보건의료기관에 대한 요청사실 확인은 명시 열거 대상이 아님.", "5": "명시된 대상임. 행정처분을 위한 교통사고 조사 사실확인 가능."}}}, {"qnum": 48, "answer": 5, "title": "48. 국가재정법의 내용에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 정부는 재정건전성의 확보를 위하여 최선을 다하여야 한다.", "② 정부는 「성별영향평가법」에 따른 성별영향평가의 결과를 포함하여 예산이 여성과 남성 에게 미치는 효과를 평가하고, 그 결과를 정부의 예산편성에 반영하기 위하여 노력하여야 한다.", "③ 한 회계연도의 모든 수입을 세입으로 하고, 모든 지출을 세출로 한다.", "④ 예산은 예산총칙ㆍ세입세출예산ㆍ계속비ㆍ명시이월비 및 국고채무부담행위를 총칭한다.", "⑤ 정부는 예측할 수 없는 예산 외의 지출에 충당하기 위하여 일반회계 예산총액의 100분의 10 이내의 금액을 예비비로 세입세출예산에 계상하여야 한다."], "explanation": {"summary": "예비비 비율 숫자 함정 문제임. 국가재정법상 예비비는 일반회계 예산총액의 100분의 1 이내가 원칙임.", "options": {"1": "옳음. 재정건전성 확보 노력 의무가 있음.", "2": "옳음. 성인지 예산 취지를 반영한 내용임.", "3": "옳음. 회계연도 독립과 총계주의에 부합함.", "4": "옳음. 예산의 구성요소 설명이 맞음.", "5": "틀림. 100분의 10이 아니라 100분의 1 이내임."}}}, {"qnum": 49, "answer": 3, "title": "49. 지방자치단체의 관할 구역 경계변경에 관한 지방자치법 조문의 일부이다. ( )에 들어갈 내용으로 옳은 것은?", "statement_lines": ["지방자치단체의 장은 관할 구역과 생활권과의 불일치 등으로 인하여 주민생 활에 불편이 큰 경우 등 대통령령으로 정하는 사유가 있는 경우에는 행정안 전부장관에게 경계변경이 필요한 지역 등을 명시하여 경계변경에 대한 조정을 신청할 수 있다. 이 경우 지방자치단체의 장은 지방의회 재적의원 ( ㄱ ) 의 출석과 출석의원 ( ㄴ ) 이상의 동의를 받아야 한다."], "options": ["① ㄱ: 3분의 1 이상, ㄴ: 2분의 1", "② ㄱ: 과반수, ㄴ: 2분의 1", "③ ㄱ: 과반수, ㄴ: 3분의 2", "④ ㄱ: 3분의 2 이상, ㄴ: 2분의 1", "⑤ ㄱ: 3분의 2 이상, ㄴ: 3분의 2"], "explanation": {"summary": "경계변경 조정 신청은 지방의회 의결요건 숫자를 정확히 기억해야 함. 재적의원 과반수 출석 + 출석의원 3분의 2 이상 동의임.", "options": {"1": "틀림. 출석정족수와 의결정족수 모두 부족함.", "2": "틀림. 의결정족수가 부족함.", "3": "맞음. 재적의원 과반수 출석, 출석의원 3분의 2 이상 동의가 맞음.", "4": "틀림. 출석정족수는 과반수이지 3분의 2가 아님.", "5": "틀림. 출석정족수는 맞지 않고 동의요건만 맞음."}}}, {"qnum": 50, "answer": 4, "title": "50. 국유재산법상 행정재산의 종류 중 법령이나 그 밖의 필요에 따라 국가가 보존하는 재산은?", "statement_lines": [], "options": ["① 공용재산", "② 공공용재산", "③ 기업용재산", "④ 보존용재산", "⑤ 일반재산"], "explanation": {"summary": "행정재산 분류의 단순 암기 문제. 국가가 법령이나 필요에 따라 보존하는 재산은 보존용재산임.", "options": {"1": "틀림. 공용재산은 국가기관이 직접 사무·사업에 사용하는 재산.", "2": "틀림. 공공용재산은 일반 공중의 이용에 제공되는 재산.", "3": "틀림. 기업용재산은 정부기업용 재산.", "4": "맞음. 법령이나 그 밖의 필요에 따라 국가가 보존하는 재산은 보존용재산.", "5": "틀림. 일반재산은 행정재산이 아닌 나머지 재산."}}}]}, {"id": "2022", "title": "2022년도 제10회 행정사 1차 1교시 A형 ( 22 - 10 )", "label": "2022 제10회 1교시 A형", "questions": [{"qnum": 26, "answer": 5, "title": "26. 행정법의 법원(法源)에 해당하지 않는 것은?", "statement_lines": [], "options": ["① 대한민국헌법", "② 건축법시행규칙", "③ 서울특별시 성동구 조례", "④ 헌법재판소규칙", "⑤ 사실인 관습"], "explanation": {"summary": "행정법의 법원은 헌법·법률·명령·조례·규칙과 관습법임. 사실인 관습은 사회생활상 반복된 사실상 관행일 뿐 규범적 효력이 없어 법원이 아님.", "options": {"1": "헌법은 최상위 성문법으로 당연히 행정법의 법원에 포함됨.", "2": "건축법시행규칙은 총리령·부령 계열 규칙으로 성문법규범이므로 법원에 해당함.", "3": "지방자치단체의 조례는 자치입법으로서 법원에 해당함.", "4": "헌법재판소규칙도 헌법과 법률이 수권한 규범이므로 법원에 포함됨.", "5": "사실인 관습은 법적 확신을 수반한 관습법과 다름. 단순한 사회적 관행이므로 법원으로 볼 수 없음."}}}, {"qnum": 27, "answer": 3, "title": "27. 행정상 신뢰보호 원칙의 적용요건에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 공적 견해표명은 묵시적으로 할 수 없다.", "② 신뢰보호의 대상은 특정 개인에 대한 행정작용에 한정되며, 법률에 대한 신뢰는 신뢰 보호의 대상이 되지 않는다.", "③ 행정청이 공적 견해표명을 한 후, 사정변경이 있는 경우에는 특별한 사정이 없는 한 행정 청이 그 견해표명에 반하는 처분을 하더라도 신뢰보호 원칙에 위반된다고 할 수 없다.", "④ 귀책사유의 유무는 상대방을 기준으로 판단하며 상대방으로부터 신청행위를 위임받은 수임인 등 관계자는 고려하지 않는다.", "⑤ 단순히 착오로 어떠한 처분을 계속하다가 처분청이 추후 오류를 발견하여 합리적인 방법으로 변경할 경우 신뢰보호 원칙에 위배된다."], "explanation": {"summary": "신뢰보호는 공적 견해표명, 상대방의 귀책사유 없음, 신뢰에 기초한 처분 또는 행위, 신뢰보호 필요성이 있어야 함. 사정변경이 생기면 원칙적으로 장래처분은 가능하므로 그 부분이 핵심.", "options": {"1": "공적 견해표명은 명시적일 수도 있고 묵시적일 수도 있음. 상대방이 정당하게 신뢰할 수 있으면 됨.", "2": "법률 그 자체에 대한 신뢰도 일정한 경우 보호대상이 될 수 있으므로 지나치게 좁은 서술임.", "3": "판례는 공적 견해표명 후 사실관계나 법령상태가 변경되면 특별한 사정이 없는 한 그와 다른 처분을 하더라도 곧바로 신뢰보호 위반으로 보지 않음.", "4": "귀책사유는 본인뿐 아니라 신청행위를 대리·위임받은 자 등 관계자의 사정까지 함께 고려함.", "5": "단순한 행정청의 착오 시정이 언제나 신뢰보호 위반이 되는 것은 아님. 공익과 신뢰이익을 형량해야 함."}}}, {"qnum": 28, "answer": 2, "title": "28. 판례에 따를 때 수리를 요하지 않는 신고에 해당하는 것은?", "statement_lines": [], "options": ["① 다른 법률에 의한 인ㆍ허가의제 효과를 수반하는 「건축법」상 건축신고", "② 「건축법」제14조제1항에 따른 건축신고", "③ 「수산업법」상 어업의 신고", "④ 「노인장기요양보험법」상 장기요양기관의 폐업신고", "⑤ 「식품위생법상」상 영업양도에 따른 지위승계 신고"], "explanation": {"summary": "수리를 요하지 않는 신고는 적법한 신고가 도달하면 효력이 발생하는 자기완결적 행위임. 건축법 제14조 제1항의 일반 건축신고가 대표적 예시로 자주 출제됨.", "options": {"1": "인허가의제 효과가 결합된 건축신고는 단순 통지행위가 아니라 실질적 심사가 예정되어 수리를 요하는 신고로 봄.", "2": "건축법 제14조 제1항의 건축신고는 판례상 수리를 요하지 않는 신고의 대표적 사례임.", "3": "어업의 신고는 법령 구조상 행정청의 심사와 수리가 예정되어 자기완결적 신고로 보기 어려움.", "4": "장기요양기관 폐업신고는 행정청이 신고요건을 심사하여 수리하는 구조로 이해됨.", "5": "영업양도에 따른 지위승계신고도 일정한 요건 심사가 필요해 수리요 신고로 분류됨."}}}, {"qnum": 29, "answer": 1, "title": "29. 행정행위의 효력에 관한 설명으로 옳지 않은 것은?", "statement_lines": [], "options": ["① 실정법상 공정력을 직접적으로 규정하는 법률은 없다.", "② 불가쟁력은 행정행위의 상대방이나 이해관계인에 대한 구속력이다.", "③ 불가변력이란 처분청 스스로도 당해 행정행위에 구속되어 직권으로 취소ㆍ변경할 수 없는 것을 말한다.", "④ 집행력은 의무가 부과되는 행정행위에서 문제된다.", "⑤ 불가변력이 있는 행정행위일지라도 쟁송기간이 경과하지 않는 한 행정쟁송에 의한 취소가 가능하다."], "explanation": {"summary": "공정력은 명문 규정이 아니라 행정행위의 특성에서 인정되는 효력임. 따라서 '직접적으로 규정한 법률이 없다'는 서술이 옳고, 나머지는 각 효력 개념을 정확히 구별해야 함.", "options": {"1": "틀림. 공정력은 이론상 행정행위의 특성에서 설명되지만, 실정법상 전혀 규정이 없다고 단정하는 것은 부정확하다는 취지의 지문이다.", "2": "옳음. 불가쟁력은 상대방·이해관계인이 더 이상 다투지 못하게 되는 효력이다.", "3": "옳음. 불가변력은 처분청 자신이 임의로 취소·변경하지 못하는 효력을 말한다.", "4": "옳음. 집행력은 의무부과적 행정행위에서 문제된다.", "5": "옳음. 불가변력이 있더라도 쟁송기간 내라면 행정쟁송으로 취소를 구할 수 있다. 불가변력과 불가쟁력은 다른 개념이다."}}}, {"qnum": 30, "answer": 5, "title": "30. 행정입법에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 법령의 위임이 없음에도 법령에 규정된 처분 요건 사항을 부령에서 변경하여 규정한 경우, 이 부령의 규정은 대외적 구속력이 없다.", "② 행정입법의 부작위는 항고소송으로 다툴 수 없다.", "③ 재량준칙은 행정의 자기구속법리나 평등원칙 등에 의해 대외적 구속력을 가질 수 있다.", "④ 「장기요양급여 제공기준 및 급여비용 산정방법 등에 관한 고시」에 대해 외부적 구속효를 인정한다.", "⑤ 대법원판결에 의해 명령ㆍ규칙이 헌법 또는 법률에 위반된다는 것이 확정된 경우에는 대법원은 지체 없이 그 사유를 법무부장관에게 통보하여야 한다."], "explanation": {"summary": "대법원이 명령·규칙의 위법을 확정하면 그 통보대상은 법무부장관이 아니라 관계 중앙행정기관의 장 등임. 이 지점이 숫자·기관 암기형 함정.", "options": {"1": "위임 없이 법률상 처분요건을 부령이 변경하면 그 규정은 대외적 구속력이 없음.", "2": "행정입법 부작위는 일반적으로 항고소송의 대상이 되는 처분이 아니어서 다투기 어려움.", "3": "재량준칙은 자기구속·평등원칙을 매개로 대외적 효과가 문제될 수 있음.", "4": "장기요양급여 제공기준 고시에 대해 판례는 대외적 구속효를 인정함.", "5": "틀림. 위헌·위법 명령·규칙 통보 상대를 법무부장관이라고 한 부분이 틀림."}}}, {"qnum": 31, "answer": 5, "title": "31. 행정행위의 하자승계 논의의 전제에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 선행행위와 후행행위가 모두 항고소송의 대상인 행정처분이어야 한다.", "② 선행행위에는 취소사유인 하자가 존재해야 한다.", "③ 후행행위는 하자가 없이 적법해야 한다.", "④ 선행행위에 불가쟁력이 발생해야 한다.", "⑤ 후행행위에 불가변력이 발생해야 한다."], "explanation": {"summary": "하자승계 논의의 전제는 선행·후행행위가 모두 처분이고, 선행행위에 취소사유가 있으며, 선행행위에 불가쟁력이 발생해 선행행위를 직접 다투기 어려운 상황이라는 점임. 후행행위의 불가변력은 전제요건이 아님.", "options": {"1": "선행·후행행위가 모두 처분이어야 하자승계 문제가 의미를 가짐.", "2": "선행행위가 당연무효면 승계가 아니라 무효를 직접 주장하면 되므로 보통 취소사유가 전제됨.", "3": "후행행위가 독자 하자가 없고 선행행위 하자만 문제되는 구조여야 승계 논의가 선명함.", "4": "선행행위에 불가쟁력이 생겨 직접 다툴 수 없을 때 후행처분 소송에서 선행하자를 주장할 수 있는지가 문제됨.", "5": "틀림. 후행행위에 불가변력이 발생해야 한다는 것은 하자승계 논의의 전제가 아님."}}}, {"qnum": 32, "answer": 1, "title": "32. 강학상 인가에 해당하는 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 「부동산 거래신고 등에 관한 법률」상 외국인등의 토지거래 허가", "② 공유수면매립면허", "③ 보세구역의 설영특허", "④ 법무부장관의 공증 인가", "⑤ 자동차운전면허대장상의 등재행위"], "explanation": {"summary": "강학상 인가는 이미 존재하는 사법상·공법상 행위의 효력을 보충해 완성시키는 행위임. 외국인등의 토지거래허가는 대표적 인가로 본다.", "options": {"1": "외국인등의 토지거래허가는 판례상 강학상 인가로 분류됨.", "2": "공유수면매립면허는 새로운 법률효과를 설정하는 특허에 가까움.", "3": "보세구역 설영특허는 명칭 그대로 특허로 이해함.", "4": "공증 인가는 자격·감독 요소가 있으나 여기서 묻는 전형적 강학상 인가와 다름.", "5": "자동차운전면허대장 등재는 단순 공증적·준법률행위적 행정행위 성격이 문제될 뿐 인가가 아님."}}}, {"qnum": 33, "answer": 4, "title": "33. 행정작용에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정계획은 사인의 신뢰보호를 위해 일반적으로 계획존속청구권이 인정된다.", "② 행정사법작용에는 사적자치의 원칙이 통용되므로 공법적 제한을 받지 않는다.", "③ 사실행위는 법적 효과의 제거대상이 될 수 없으므로, 권력적인지 비권력적인지를 불문하고 항고소송의 대상인 처분성이 인정되지 않는다.", "④ 계약직공무원에 대한 채용계약해지를 함에 있어서는 「행정절차법」에 의하여 그 근거와 이유를 제시할 필요가 없다.", "⑤ 행정지도는 상대방의 임의적인 협력을 구하는 것이므로, 법률우위의 원칙은 적용되지 않는다."], "explanation": {"summary": "계약직공무원 채용계약 해지는 공법상 계약관계 종료로 보지만, 해지 의사표시의 이유제시는 행정절차법이 직접 적용되지 않는다는 판례가 포인트임.", "options": {"1": "행정계획에는 일반적으로 계획존속청구권이 인정되지 않음. 신뢰보호는 예외적으로 문제될 뿐임.", "2": "행정사법작용도 공법 목적과 법률상 한계로부터 완전히 자유롭지 않음.", "3": "사실행위라도 권력적 사실행위 중 법적 효과가 직접 발생하는 경우 처분성이 문제될 수 있어 전면 부정은 틀림.", "4": "판례는 계약직공무원 채용계약 해지에 행정절차법상 이유제시의무가 직접 적용되지 않는다고 봄.", "5": "행정지도도 법률우위 원칙과 행정절차법상 규율을 받음. 임의성만으로 법치주의 밖에 있는 것이 아님."}}}, {"qnum": 34, "answer": 4, "title": "34. 확약에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 확약은 일방적 행위라는 점에서 복수당사자의 의사의 합치인 공법상 계약과는 구분된다.", "② 확약은 종국적 규율이 아니라는 점에서 종국적 규율을 하는 사전결정이나 부분허가와 구분된다.", "③ 어업권면허에 선행하는 우선순위결정은 강학상 확약에 불과하고 행정처분은 아니다.", "④ 확약 이후에 사실상태 또는 법적 상태가 변경된 경우에도 확약의 구속성이 상실되기 위해서는 행정청의 별도의 의사표시가 있어야 한다.", "⑤ 확약은 정당한 권한을 가진 행정청에 의해서 그 권한의 범위 내에서만 발해질 수 있다."], "explanation": {"summary": "확약은 장래 처분 발령을 미리 약속하는 독립한 행정행위다. 확약 후 사실상태·법령상태가 변경되면 구속력 자체가 상실될 수 있으므로 별도 철회표시가 항상 필요한 것은 아님.", "options": {"1": "확약은 일방적 의사표시라는 점에서 공법상 계약과 구별됨.", "2": "확약은 종국처분 이전 단계의 예비적 규율이라는 점에서 사전결정·부분허가와 구별됨.", "3": "어업권면허에 선행하는 우선순위결정은 판례상 확약으로 이해되는 대표사례임.", "4": "틀림. 확약 후 중대한 사실·법률 상태 변경이 있으면 별도 의사표시가 없어도 구속력이 소멸될 수 있음.", "5": "확약도 권한 있는 행정청이 권한 범위 내에서만 할 수 있음."}}}, {"qnum": 35, "answer": 4, "title": "35. 행정절차에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정절차에 관하여 다른 법률에 특별한 규정이 있는 경우에도 「행정절차법」이 우선한다.", "② 행정청은 청문이 필요하다고 인정하는 경우에도 법령등에서 청문을 하도록 규정한 경우가 아니면 청문을 할 수 없다.", "③ 신청에 대한 거부처분은 사전통지대상이다.", "④ 행정청은 신청 내용을 모두 그대로 인정하는 처분을 하는 경우 처분의 근거와 이유를 제시하지 않아도 된다.", "⑤ 「행정절차법」에는 행정지도에 관한 규정을 두고 있지 않다."], "explanation": {"summary": "신청 내용을 모두 그대로 인정하는 처분은 이유제시를 생략할 수 있음. 거부처분 사전통지 부정, 행정지도 규정 존재, 특별법 우선 등이 기본 포인트.", "options": {"1": "행정절차에 특별한 규정이 있으면 특별법이 우선함.", "2": "행정청은 법령상 의무가 없더라도 필요하다고 인정하면 청문을 실시할 수 있음.", "3": "신청에 대한 거부처분은 일반적으로 사전통지 대상이 아님.", "4": "옳음. 신청 내용을 그대로 인정하는 처분은 상대방에게 불이익이 없어 이유제시를 생략할 수 있음.", "5": "행정절차법은 행정지도에 관한 장을 두고 있음."}}}, {"qnum": 36, "answer": 5, "title": "36. 개인정보보호법상 정보주체가 자신의 개인정보 처리와 관련하여 가지는 권리가 아닌 것은?", "statement_lines": [], "options": ["① 개인정보의 처리에 관한 정보를 제공받을 권리", "② 개인정보의 처리 정지를 요구할 권리", "③ 개인정보의 처리 여부를 확인하고 개인정보에 대하여 사본의 발급을 요구할 권리", "④ 개인정보의 처리에 관한 동의 여부, 동의 범위 등을 결정할 권리", "⑤ 개인정보처리자의 가명정보 처리에 동의할 권리"], "explanation": {"summary": "개인정보보호법은 정보주체에게 열람·정정·삭제·처리정지 요구 등 권리를 인정하지만, 개인정보처리자의 가명정보 처리에 대한 '동의권'을 별도로 권리로 규정하지는 않음.", "options": {"1": "정보주체는 개인정보 처리에 관한 정보를 제공받을 권리가 있음.", "2": "정보주체는 처리정지를 요구할 권리를 가짐.", "3": "처리 여부 확인과 개인정보 사본 발급 요구도 권리로 인정됨.", "4": "동의 여부와 범위를 스스로 결정할 권리도 당연히 포함됨.", "5": "가명정보 처리에 대한 별도 동의권은 법이 일반적 권리로 규정하지 않음."}}}, {"qnum": 37, "answer": 3, "title": "37. 행정대집행에 관한 설명으로 옳은 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)", "statement_lines": ["ㄱ. 대집행영장에 의한 통지는 취소소송의 대상이 된다.", "ㄴ. 「행정대집행법」에서는 대집행에 대해 행정심판을 제기할 수 있음을 규정하고 있다.", "ㄷ. 계고처분의 후속절차인 대집행에 위법이 있다고 하더라도, 그와 같은 후속절차에 위법성이 있다는 점을 들어 선행절차인 계고처분이 부적법하다는 사유로 삼을 수는 없다.", "ㄹ. 대집행은 대집행의 대상이 되는 의무를 명하는 처분청이 그 주체가 되며 타인에게 위탁할 수 없다."], "options": ["① ㄱ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "explanation": {"summary": "행정대집행에서 대집행영장 통지는 독립한 처분성이 인정되고, 계고와 대집행은 별개 단계다. 반면 대집행은 행정청이 현실 집행을 타인에게 위탁할 수 있어 '타인에게 위탁 불가'가 틀림.", "statements": [{"label": "ㄱ", "text": "대집행영장에 의한 통지는 취소소송의 대상이 된다.", "comment": "옳음. 대집행 실행단계에서 상대방의 법적 지위에 직접 영향을 미치므로 독립한 처분성이 인정된다."}, {"label": "ㄴ", "text": "행정대집행법에서는 대집행에 대해 행정심판을 제기할 수 있음을 규정하고 있다.", "comment": "옳음. 법에 명문이 있다."}, {"label": "ㄷ", "text": "계고처분의 후속절차인 대집행에 위법이 있다고 하더라도, 그와 같은 후속절차에 위법성이 있다는 점을 들어 선행절차인 계고처분이 부적법하다는 사유로 삼을 수는 없다.", "comment": "옳음. 선행처분의 위법 여부는 그 단계 기준으로 판단한다."}, {"label": "ㄹ", "text": "대집행은 대집행의 대상이 되는 의무를 명하는 처분청이 그 주체가 되며 타인에게 위탁할 수 없다.", "comment": "틀림. 대집행은 행정청 책임 아래 타인에게 실제 집행을 맡길 수 있다."}], "options": {"1": "ㄱ만 고르면 ㄴ·ㄷ의 옳은 진술을 놓치게 됨.", "2": "ㄴ·ㄷ만 고르면 ㄱ을 빠뜨리게 됨.", "3": "ㄱ·ㄴ·ㄷ이 옳고 ㄹ만 틀리므로 맞는 조합임.", "4": "ㄹ이 포함되어 틀린 조합임.", "5": "ㄹ까지 모두 옳다고 보면 안 됨."}}}, {"qnum": 38, "answer": 3, "title": "38. 공공기관의 정보공개에 관한 법령상 정보공개에 관한 설명으로 옳지 않은 것은?", "statement_lines": ["(다툼이 있으면 판례에 따름)"], "options": ["① 공개청구의 대상이 되는 정보는 공공기관이 보유ㆍ관리하고 있는 정보에 한정된다.", "② 일정한 요건을 갖춘 외국인은 정보공개 청구를 할 수 있다.", "③ 정보공개 청구권자의 권리구제 가능성이 없는 경우에는 비공개 대상 정보에 해당하지 않는 정보라도 공개하지 않을 수 있다.", "④ 정보공개청구에 대한 공공기관의 비공개결정에 대한 불복절차로 이의신청, 행정심판, 행정소송이 있다.", "⑤ 법인이 거래하는 금융기관의 계좌번호에 관한 정보는 법인의 영업상 비밀에 관한 사항 으로서 비공개 대상 정보에 해당한다."], "explanation": {"summary": "정보공개는 원칙공개가 기본이다. 권리구제 가능성이 없다는 이유만으로 공개를 거부할 수는 없고, 비공개사유는 법률이 정한 경우에 한정된다.", "options": {"1": "공개대상은 공공기관이 보유·관리하는 정보로 한정됨.", "2": "상호주의 등 요건을 갖춘 외국인도 청구 가능함.", "3": "틀림. 청구인의 권리구제 가능성 유무는 비공개사유가 아님. 법정 비공개사유가 없는 한 공개가 원칙임.", "4": "비공개결정에 대해서는 이의신청, 행정심판, 행정소송으로 다툴 수 있음.", "5": "법인 계좌번호는 영업상 비밀로서 비공개 대상이 될 수 있음."}}}, {"qnum": 39, "answer": 3, "title": "39. 과징금에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 행정법규 위반에 대해 벌금 이외에 과징금을 부과하는 것은 이중처벌금지의 원칙에 반하지 않는다.", "② 제재적 행정처분으로서의 과징금은 현실적인 행위자가 아닌 법령상 책임자에게 부과할수 있다.", "③ 제재적 행정처분으로서의 과징금은 원칙적으로 위반자의 고의 또는 과실을 요한다.", "④ 과징금은 국가의 형벌권을 실행하는 과벌이 아니다.", "⑤ 법령으로 정한 ‘과징금을 부과하는 위반행위와 과징금의 금액’에 열거되지 않은 위반행위에 대해 사업정지처분을 갈음하여 과징금을 부과할 수 없다."], "explanation": {"summary": "제재적 과징금은 행정질서 확보수단이므로 형벌이 아니고 이중처벌금지와도 별개다. 다만 원칙적으로 고의·과실을 요하지 않는다는 점이 시험 포인트.", "options": {"1": "벌금과 별도로 과징금을 부과해도 곧바로 이중처벌금지 위반이 되지 않음.", "2": "법령상 책임자에게 제재적 과징금을 부과할 수 있다는 판례 입장과 부합함.", "3": "틀림. 제재적 행정처분은 특별한 사정이 없는 한 고의·과실을 요하지 않는 것이 원칙임.", "4": "과징금은 형벌이 아니라 행정상 제재금임.", "5": "법령이 정한 위반행위와 과징금액 범위를 넘어서 과징금을 부과할 수 없음."}}}, {"qnum": 40, "answer": 3, "title": "40. 공익사업을 위한 토지 등의 취득 및 보상에 관한 법령상 손실보상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 토지수용재결시 대상토지의 평가는 재결에서 정한 수용시기가 아닌 수용재결일을 기준 으로 한다.", "② 관할 토지수용위원회에 잔여지수용청구를 하려는 토지소유자는 사업완료일까지 그 수용 청구를 하여야 한다.", "③ 이주대책대상자는 사업시행자가 이주대책에 대한 구체적인 계획을 수립하여 공고한 때에 수분양권을 취득한다.", "④ 공익사업시행지구 밖의 영업손실에 대해서도 일정한 요건 하에 보상을 받을 수 있다.", "⑤ 재결에서 정한 보상금액이 일부 보상항목은 과소하고 다른 보상항목은 과다할 경우 법원은 보상항목 상호간의 유용을 허용하여 보상금을 결정할 수 있다."], "explanation": {"summary": "이주대책대상자는 대상자 확정만으로 바로 수분양권을 취득하는 것이 아니라, 사업시행자가 구체적 이주대책을 수립·공고한 때 비로소 구체적 권리가 형성된다.", "options": {"1": "재결시 보상평가는 원칙적으로 재결일을 기준으로 함.", "2": "잔여지수용청구는 사업완료일까지 해야 한다는 점을 묻는 조문형 지문임.", "3": "틀림. 이주대책대상자라는 지위만으로 곧바로 수분양권이 생기는 것이 아니라, 구체적 이주대책 수립·공고가 있어야 권리가 구체화됨.", "4": "사업지구 밖 영업손실도 상당인과관계 등 요건을 갖추면 보상 가능함.", "5": "옳음. 보상항목별 산정에 과부족이 있을 때 전체 보상액의 적정성을 기준으로 항목 상호 간 유용을 허용해 판단할 수 있다는 판례 취지가 출제 포인트다."}}}, {"qnum": 41, "answer": 1, "title": "41. 행정심판에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 의무이행심판에서 청구가 이유 있으면 신청에 따른 처분을 하거나 처분을 할 것을 피청 구인에게 명하는 재결을 한다.", "② 심판청구기간을 법상 규정된 기간보다 긴 기간으로 잘못 고지한 경우에도 규정된 행정 심판기간 내에 심판청구를 하여야 한다.", "③ 시ㆍ도지사의 처분에 대한 심판청구는 시ㆍ도지사 소속으로 두는 행정심판위원회에서 심리ㆍ재결한다.", "④ 심리는 구술심리나 서면심리로 하고, 당사자가 구술심리를 신청한 경우에는 서면심리는할 수 없다.", "⑤ 항고소송에서의 처분사유의 추가ㆍ변경의 법리는 행정심판에 적용되지 않는다."], "explanation": {"summary": "의무이행심판 인용재결은 행정청 스스로 처분을 하는 것이 아니라 피청구인에게 처분을 하거나 처분할 것을 명하는 재결을 하는 구조다.", "options": {"1": "옳음. 의무이행심판의 인용재결 내용은 신청에 따른 처분을 하거나 처분할 것을 명하는 것임.", "2": "잘못 고지한 경우에는 신뢰보호 차원에서 그 고지기간 내 청구를 허용하는 특례가 있음.", "3": "시·도지사 처분에 대한 심판청구는 일반적으로 중앙행정심판위원회 관할이 문제됨.", "4": "당사자가 구술심리를 신청해도 위원회는 필요에 따라 서면심리 병행이 가능함.", "5": "처분사유 추가·변경 법리는 행정심판에도 준용될 수 있다는 판례가 있음."}}}, {"qnum": 42, "answer": 2, "title": "42. 행정심판으로 적법하게 청구된 것을 모두 고른 것은?", "statement_lines": ["ㄱ. 국세부과처분에 대해 국세청장에 심사청구 ㄴ. 국가공무원 면직처분에 대해 징계위원회에 재심사청구 ㄷ. 지방토지수용위원회의 수용재결에 대해 중앙토지수용위원회에 이의신청 ㄹ. 지방노동위원회의 구제명령 불이행에 대한 이행강제금부과처분에 대해 중앙 노동위원회에 재심신청"], "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄴ, ㄹ", "⑤ ㄷ, ㄹ"], "explanation": {"summary": "행정심판은 법정 불복절차를 거쳐야만 가능한 경우가 많다. 국세심사청구와 중앙토지수용위원회 이의신청은 적법한 예이지만, 징계위원회 재심사청구나 노동위 재심신청 대상의 설정은 잘못됐다.", "statements": [{"label": "ㄱ", "text": "국세부과처분에 대해 국세청장에 심사청구", "comment": "옳음. 국세 불복절차로서 적법한 심사청구 경로다."}, {"label": "ㄴ", "text": "국가공무원 면직처분에 대해 징계위원회에 재심사청구", "comment": "틀림. 국가공무원 인사불복은 소청심사위원회가 문제되며 징계위원회 재심사청구가 아님."}, {"label": "ㄷ", "text": "지방토지수용위원회의 수용재결에 대해 중앙토지수용위원회에 이의신청", "comment": "옳음. 토지수용재결 불복의 전형적 경로다."}, {"label": "ㄹ", "text": "지방노동위원회의 구제명령 불이행에 대한 이행강제금부과처분에 대해 중앙노동위원회에 재심신청", "comment": "틀림. 재심신청 대상과 구조를 혼동한 지문이다."}], "options": {"1": "ㄱ은 맞지만 ㄴ은 틀림.", "2": "ㄱ·ㄷ이 적법한 조합임.", "3": "ㄴ이 포함되어 틀림.", "4": "ㄹ이 포함되어 틀림.", "5": "ㄹ이 포함되어 틀림."}}}, {"qnum": 43, "answer": 2, "title": "43. 국가배상에 관한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 따름)", "statement_lines": [], "options": ["① 공무를 위탁받은 사인의 직무집행행위에 대해서도 국가배상책임이 성립할 수 있다.", "② 가해행위인 처분에 대해 취소판결이 확정된 경우에는 기판력에 의해 국가배상소송에서도 국가배상책임이 인정된다.", "③ 생명ㆍ신체의 침해로 인한 국가배상을 받을 권리는 압류하지 못한다.", "④ 피해자나 그 법정대리인이 손해 및 가해자를 알지 못한 경우 국가배상청구권의 소멸시효 기간은 5년이다.", "⑤ 외국인이 피해자인 경우에는 해당 국가와 상호 보증이 있을 때에만 「국가배상법」이 적용된다."], "explanation": {"summary": "취소판결 확정이 곧바로 국가배상책임을 확정하는 것은 아니다. 위법성 판단에 강한 자료가 될 뿐, 과실·손해·인과관계 등 국가배상 요건은 별도로 심리해야 한다.", "options": {"1": "공무수탁사인의 직무집행에도 국가배상책임이 성립할 수 있음.", "2": "틀림. 취소판결의 기판력이 국가배상소송에 그대로 미쳐 배상책임이 자동 인정되는 것
